<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Database Design Roadmap</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#080c14;--card:#141d2e;--border:#1e2d45;--text:#dde4f0;--text-dim:#8892a4;--green:#4ade80;--cyan:#22d3ee;--purple:#a78bfa;--gradient:linear-gradient(135deg,#4ade80,#22d3ee,#a78bfa)}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
code,pre,.code{font-family:'JetBrains Mono',monospace}
.header{position:sticky;top:0;z-index:1000;background:rgba(8,12,20,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:12px 24px}
.header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:1.4rem;font-weight:700;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.progress-container{flex:1;max-width:300px;margin-left:24px}
.progress-label{font-size:0.7rem;color:var(--text-dim);margin-bottom:4px;text-align:right}
.progress-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:var(--gradient);border-radius:3px;transition:width 0.5s ease}
.page{display:none;padding:40px 24px 80px;max-width:900px;margin:0 auto;animation:fadeIn 0.3s ease}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.roadmap{position:relative;padding-left:60px}
.roadmap::before{content:'';position:absolute;left:28px;top:0;bottom:0;width:2px;background:linear-gradient(to bottom,var(--green),var(--cyan),var(--purple));opacity:0.4}
.node{position:relative;margin-bottom:24px;cursor:pointer;transition:transform 0.2s ease}
.node:hover{transform:translateX(4px)}
.node-number{position:absolute;left:-48px;top:16px;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.8rem;border:2px solid;background:var(--bg)}
.node-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px 24px;transition:border-color 0.2s,box-shadow 0.2s}
.node:hover .node-card{border-color:var(--cyan);box-shadow:0 4px 20px rgba(34,211,238,0.1)}
.node-title{font-size:1.1rem;font-weight:600;margin-bottom:8px}
.node-chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{font-size:0.65rem;padding:3px 8px;border-radius:4px;background:rgba(255,255,255,0.05);border:1px solid var(--border);color:var(--text-dim)}
.node-progress{font-size:0.7rem;color:var(--text-dim);margin-top:8px}
.back-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);cursor:pointer;font-family:'Sora',sans-serif;font-size:0.85rem;margin-bottom:24px;transition:border-color 0.2s}
.back-btn:hover{border-color:var(--cyan)}
.detail-header{margin-bottom:24px}
.detail-title{font-size:1.8rem;font-weight:700;margin-bottom:8px}
.detail-subtitle{font-size:0.85rem;color:var(--text-dim)}
.tabs{display:flex;gap:4px;margin-bottom:24px;background:var(--card);border-radius:10px;padding:4px;border:1px solid var(--border)}
.tab{flex:1;padding:10px 16px;text-align:center;border-radius:8px;cursor:pointer;font-size:0.85rem;font-weight:500;color:var(--text-dim);transition:all 0.2s}
.tab.active{background:var(--border);color:var(--text)}
.tab:hover:not(.active){color:var(--text)}
.tab-content{display:none;animation:fadeIn 0.3s ease}
.tab-content.active{display:block}
.theory-section{margin-bottom:24px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px}
.theory-title{font-size:1rem;font-weight:600;margin-bottom:12px;color:var(--cyan)}
.theory-point{font-size:0.85rem;color:var(--text-dim);margin-bottom:8px;padding-left:16px;position:relative;line-height:1.6}
.theory-point::before{content:'>';position:absolute;left:0;color:var(--green)}
pre.code-block{background:rgba(0,0,0,0.4);border:1px solid var(--border);border-radius:8px;padding:16px;margin-top:12px;overflow-x:auto;font-size:0.8rem;line-height:1.6}
.example-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:16px}
.example-title{font-size:0.9rem;font-weight:600;margin-bottom:8px;color:var(--purple)}
.example-desc{font-size:0.82rem;color:var(--text-dim);margin-bottom:12px}
.practice-item{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;transition:border-color 0.2s}
.practice-item:hover{border-color:var(--cyan)}
.practice-item input[type="checkbox"]{width:18px;height:18px;margin-top:2px;accent-color:var(--green);cursor:pointer}
.practice-item.done{opacity:0.6;border-color:var(--green)}
.practice-text{flex:1;font-size:0.82rem;line-height:1.5}
.difficulty{font-size:0.65rem;padding:2px 8px;border-radius:4px;font-weight:600;white-space:nowrap}
.difficulty.easy{background:rgba(74,222,128,0.15);color:#4ade80}
.difficulty.medium{background:rgba(251,191,36,0.15);color:#fbbf24}
.difficulty.hard{background:rgba(244,114,182,0.15);color:#f472b6}
@media(max-width:640px){.roadmap{padding-left:40px}.roadmap::before{left:16px}.node-number{left:-32px;width:26px;height:26px;font-size:0.7rem}.header-inner{flex-wrap:wrap;gap:8px}.progress-container{max-width:100%;margin-left:0}}
</style>
</head>

<header class="header"><div class="header-inner"><div class="logo">Database Design</div><div class="progress-container"><div class="progress-label"><span id="progressText">0 / 0</span> completed</div><div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div></div></div></header>
<div class="page active" id="roadmapPage"><div class="roadmap" id="roadmapContainer"></div></div>

<button class="back-btn" onclick="showRoadmap()">&#8592; Back to Roadmap</button>

<div class="tabs"><div class="tab active" onclick="switchTab('theory')">Theory</div><div class="tab" onclick="switchTab('examples')">Examples</div><div class="tab" onclick="switchTab('practice')">Practice</div><div class="tab" onclick="switchTab('solutions')">Solutions</div></div>
<div class="tab-content active" id="theoryContent"></div><div class="tab-content" id="examplesContent"></div><div class="tab-content" id="practiceContent"></div><div class="tab-content" id="solutionsContent"></div>
</div>
<script>
let currentTopic = null;
const STORAGE_KEY = 'db_design_roadmap_progress';

const topics = [
{id:1,title:"ER Modeling",color:"#38bdf8",chips:["Entities","Relationships","Cardinality","Attributes","ERD"],
subtopics:[
{name:"Entities & Attributes",theory:["An entity represents a real-world object or concept (Customer, Order, Product).","Attributes describe properties of entities: simple, composite, derived, multi-valued.","Each entity needs a primary key attribute that uniquely identifies each instance."],code:"-- Entity: Customer\n-- Attributes: customer_id (PK), name, email, phone, registration_date\n\nCREATE TABLE customers (\n    customer_id   SERIAL PRIMARY KEY,     -- identifying attribute\n    first_name    VARCHAR(50) NOT NULL,    -- simple attribute\n    last_name     VARCHAR(50) NOT NULL,\n    email         VARCHAR(100) UNIQUE,     -- simple, unique\n    phone         VARCHAR(20),\n    full_address  TEXT,                    -- composite in ER → single col or normalized\n    registration_date DATE DEFAULT CURRENT_DATE  -- simple\n);\n\n-- Derived attribute: age (calculated from birth_date)\n-- Don't store derived values; compute on query\nSELECT name, birth_date,\n    EXTRACT(YEAR FROM AGE(CURRENT_DATE, birth_date)) AS age\nFROM customers;"},
{name:"Relationships & Cardinality",theory:["Relationships connect entities: 1:1, 1:Many (most common), Many:Many.","Cardinality defines how many instances of one entity relate to another.","1:Many → FK in the 'many' side; Many:Many → junction/bridge table needed."],code:"-- 1:Many → Department has many Employees\nCREATE TABLE departments (\n    dept_id   SERIAL PRIMARY KEY,\n    dept_name VARCHAR(50) NOT NULL\n);\n\nCREATE TABLE employees (\n    emp_id    SERIAL PRIMARY KEY,\n    name      VARCHAR(100),\n    dept_id   INT REFERENCES departments(dept_id)  -- FK on 'many' side\n);\n\n-- Many:Many → Students enroll in Courses\nCREATE TABLE students (student_id SERIAL PRIMARY KEY, name VARCHAR(100));\nCREATE TABLE courses (course_id SERIAL PRIMARY KEY, title VARCHAR(200));\n\nCREATE TABLE enrollments (  -- junction/bridge table\n    student_id INT REFERENCES students(student_id),\n    course_id  INT REFERENCES courses(course_id),\n    enrolled_at DATE DEFAULT CURRENT_DATE,\n    grade       CHAR(2),\n    PRIMARY KEY (student_id, course_id)\n);\n\n-- 1:1 → User has one Profile\nCREATE TABLE user_profiles (\n    user_id INT PRIMARY KEY REFERENCES users(user_id),\n    bio     TEXT,\n    avatar  VARCHAR(500)\n);"},
{name:"ER Diagram Notation",theory:["Chen notation: rectangles (entities), diamonds (relationships), ovals (attributes).","Crow's foot notation: most popular in industry; uses line endings to show cardinality.","UML class diagrams: also common for database modeling; shows multiplicity as 1..*, 0..1, etc."],code:"-- ER Diagram translates to tables:\n--\n-- [Customer] 1 ----< M [Order] M >---- M [Product]\n--                                 (via OrderItems)\n--\n-- Reading: One Customer places Many Orders\n--          One Order contains Many Products (via junction)\n\n-- Implementation:\nCREATE TABLE customers (\n    customer_id SERIAL PRIMARY KEY,\n    name VARCHAR(100) NOT NULL,\n    email VARCHAR(255) UNIQUE\n);\n\nCREATE TABLE orders (\n    order_id    SERIAL PRIMARY KEY,\n    customer_id INT NOT NULL REFERENCES customers(customer_id),\n    order_date  DATE DEFAULT CURRENT_DATE,\n    status      VARCHAR(20) DEFAULT 'pending'\n);\n\nCREATE TABLE order_items (  -- resolves M:M between orders and products\n    order_id   INT REFERENCES orders(order_id),\n    product_id INT REFERENCES products(product_id),\n    quantity   INT NOT NULL CHECK (quantity > 0),\n    unit_price DECIMAL(10,2) NOT NULL,\n    PRIMARY KEY (order_id, product_id)\n);"}
],
examples:[
{title:"E-commerce ER Model",desc:"Design the core entities for an online store.",code:"-- Entities: Customer, Product, Order, Category, Review\n-- Relationships:\n--   Customer 1:M Order\n--   Order M:M Product (via order_items)\n--   Category 1:M Product\n--   Customer 1:M Review, Product 1:M Review\n\nCREATE TABLE categories (\n    category_id SERIAL PRIMARY KEY,\n    name VARCHAR(50) NOT NULL,\n    parent_id INT REFERENCES categories(category_id)  -- self-ref hierarchy\n);\n\nCREATE TABLE products (\n    product_id  SERIAL PRIMARY KEY,\n    name        VARCHAR(200) NOT NULL,\n    price       DECIMAL(10,2) NOT NULL CHECK (price >= 0),\n    category_id INT REFERENCES categories(category_id),\n    stock_qty   INT DEFAULT 0\n);\n\nCREATE TABLE reviews (\n    review_id   SERIAL PRIMARY KEY,\n    customer_id INT REFERENCES customers(customer_id),\n    product_id  INT REFERENCES products(product_id),\n    rating      INT CHECK (rating BETWEEN 1 AND 5),\n    comment     TEXT,\n    created_at  TIMESTAMP DEFAULT NOW()\n);"}
],

{q:"Create a Many:Many relationship with a junction table that has its own attributes.",d:"M"},

{q:"Design a complete ER model for a social media platform (users, posts, comments, likes, follows).",d:"H"},
{q:"Convert a complex ER diagram with weak entities and identifying relationships into DDL.",d:"H"},
{q:"Model a polymorphic relationship (e.g., comments on both posts AND photos) and discuss trade-offs.",d:"H"}
]},

{id:2,title:"Normalization",color:"#34d399",chips:["1NF","2NF","3NF","BCNF","Functional Dependencies"],
subtopics:[
{name:"First Normal Form (1NF)",theory:["1NF: Each column contains atomic (indivisible) values; no repeating groups or arrays.","Each row must be unique (has a primary key); no duplicate rows allowed.","Violations: comma-separated values in one column, multiple phone columns (phone1, phone2)."],code:"-- VIOLATES 1NF: multi-valued column\n-- | student | courses           |\n-- | Alice   | Math, Science, Art|\n\n-- FIX: separate table\nCREATE TABLE students (student_id SERIAL PRIMARY KEY, name VARCHAR(100));\nCREATE TABLE student_courses (\n    student_id INT REFERENCES students(student_id),\n    course     VARCHAR(50),\n    PRIMARY KEY (student_id, course)\n);\n\n-- VIOLATES 1NF: repeating groups\n-- | order_id | item1 | item2 | item3 |\n\n-- FIX: one row per item\nCREATE TABLE order_items (\n    order_id INT,\n    item_name VARCHAR(100),\n    quantity INT,\n    PRIMARY KEY (order_id, item_name)\n);"},
{name:"Second Normal Form (2NF)",theory:["2NF: Must be in 1NF AND every non-key column depends on the ENTIRE primary key (no partial dependencies).","Only relevant for composite primary keys; single-column PK tables are automatically in 2NF.","Fix: move partially-dependent columns to a separate table with their own key."],code:"-- VIOLATES 2NF (composite PK: student_id + course_id)\n-- | student_id | course_id | student_name | grade |\n-- student_name depends only on student_id (partial dependency)\n\n-- FIX: split into two tables\nCREATE TABLE students (\n    student_id   SERIAL PRIMARY KEY,\n    student_name VARCHAR(100) NOT NULL\n);\n\nCREATE TABLE enrollments (\n    student_id INT REFERENCES students(student_id),\n    course_id  INT REFERENCES courses(course_id),\n    grade      CHAR(2),\n    PRIMARY KEY (student_id, course_id)\n    -- grade depends on the FULL key (student + course)\n);\n\n-- Now student_name is in its own table,\n-- depending on its own key (student_id)"},
{name:"Third Normal Form (3NF)",theory:["3NF: Must be in 2NF AND no non-key column depends on another non-key column (no transitive dependencies).","If A → B → C, and B is not a key, then C transitively depends on A through B.","Fix: move the transitively-dependent columns to their own table keyed by the intermediate column."],code:"-- VIOLATES 3NF:\n-- | emp_id | emp_name | dept_id | dept_name | dept_location |\n-- dept_name and dept_location depend on dept_id, not on emp_id directly\n-- Transitive: emp_id → dept_id → dept_name\n\n-- FIX: separate department table\nCREATE TABLE departments (\n    dept_id       SERIAL PRIMARY KEY,\n    dept_name     VARCHAR(50) NOT NULL,\n    dept_location VARCHAR(100)\n);\n\nCREATE TABLE employees (\n    emp_id   SERIAL PRIMARY KEY,\n    emp_name VARCHAR(100) NOT NULL,\n    dept_id  INT REFERENCES departments(dept_id)\n    -- Only stores the FK; dept details live in departments table\n);\n\n-- Benefit: update dept_name in ONE place, not every employee row"},
{name:"BCNF & Beyond",theory:["BCNF (Boyce-Codd): every determinant must be a candidate key; stricter than 3NF.","4NF: no multi-valued dependencies; 5NF: no join dependencies; rarely needed in practice.","Most real databases aim for 3NF/BCNF as the sweet spot between integrity and practicality."],code:"-- BCNF violation example:\n-- Table: Teaching(student, subject, teacher)\n-- FD: teacher → subject (teacher teaches one subject)\n-- But teacher is not a candidate key!\n\n-- Candidate keys: (student, subject) or (student, teacher)\n-- teacher → subject violates BCNF because teacher is not a superkey\n\n-- FIX: decompose\nCREATE TABLE teacher_subjects (\n    teacher VARCHAR(100) PRIMARY KEY,\n    subject VARCHAR(100) NOT NULL\n);\n\nCREATE TABLE student_teachers (\n    student VARCHAR(100),\n    teacher VARCHAR(100) REFERENCES teacher_subjects(teacher),\n    PRIMARY KEY (student, teacher)\n);\n\n-- Now we can derive student-subject from the join,\n-- and teacher → subject is respected as teacher is the PK"}
],
examples:[
{title:"Normalizing a Flat Table",desc:"Step-by-step normalization from unnormalized to 3NF.",code:"-- UNNORMALIZED (flat file):\n-- | order_id | date | customer_name | customer_email | product | qty | price | category |\n\n-- Step 1 → 1NF: already atomic, add PK\n-- Step 2 → 2NF: (composite key not needed here, single PK)\n-- Step 3 → 3NF: remove transitive dependencies\n\nCREATE TABLE customers (\n    customer_id SERIAL PRIMARY KEY,\n    name        VARCHAR(100),\n    email       VARCHAR(255) UNIQUE\n);\n\nCREATE TABLE categories (\n    category_id SERIAL PRIMARY KEY,\n    name        VARCHAR(50)\n);\n\nCREATE TABLE products (\n    product_id  SERIAL PRIMARY KEY,\n    name        VARCHAR(200),\n    price       DECIMAL(10,2),\n    category_id INT REFERENCES categories(category_id)\n);\n\nCREATE TABLE orders (\n    order_id    SERIAL PRIMARY KEY,\n    order_date  DATE,\n    customer_id INT REFERENCES customers(customer_id)\n);\n\nCREATE TABLE order_items (\n    order_id   INT REFERENCES orders(order_id),\n    product_id INT REFERENCES products(product_id),\n    quantity   INT,\n    unit_price DECIMAL(10,2),\n    PRIMARY KEY (order_id, product_id)\n);"}
],
practice:[
{q:"Identify 1NF violations in a given table and fix them.",d:"E"},
{q:"Take a table with a composite PK and identify partial dependencies (2NF violation).",d:"E"},
{q:"Identify a transitive dependency in a table and normalize to 3NF.",d:"M"},
{q:"Normalize a flat 'orders' spreadsheet from UNF all the way to 3NF, showing each step.",d:"M"},
{q:"Given functional dependencies, determine the highest normal form of a table.",d:"M"},
{q:"Find a BCNF violation and decompose the table losslessly.",d:"H"},

{id:3,title:"Denormalization & Trade-offs",color:"#a78bfa",chips:["Denormalization","Read vs Write","Redundancy","Performance"],
subtopics:[
{name:"Why Denormalize",theory:["Denormalization intentionally adds redundancy to reduce JOINs and speed up reads.","Trade-off: faster SELECT queries but slower INSERT/UPDATE (must maintain redundant data).","Common in reporting databases, caches, data warehouses, and read-heavy applications."],code:"-- Normalized: requires JOIN for every order display\nSELECT o.order_id, c.name, p.product_name, oi.quantity\nFROM orders o\nJOIN customers c ON o.customer_id = c.customer_id\nJOIN order_items oi ON o.order_id = oi.order_id\nJOIN products p ON oi.product_id = p.product_id;\n\n-- Denormalized: pre-joined for fast reads\nCREATE TABLE order_summary (\n    order_id      INT PRIMARY KEY,\n    customer_name VARCHAR(100),   -- redundant (copied from customers)\n    order_date    DATE,\n    total_amount  DECIMAL(10,2),  -- pre-calculated\n    item_count    INT             -- pre-calculated\n);\n\n-- Trade-off:\n-- Read: single table scan (very fast)\n-- Write: must update customer_name here if customer renames\n-- Best for: dashboards, reports, read-heavy APIs"},
{name:"Denormalization Patterns",theory:["Pre-computed aggregates: store COUNT, SUM in parent table (updated by triggers or application).","Materialized paths: store full hierarchy path as string for fast tree queries.","Embedded data: store frequently-accessed related data directly (JSON or copied columns)."],code:"-- Pattern 1: Pre-computed count\nALTER TABLE departments ADD COLUMN employee_count INT DEFAULT 0;\n-- Maintained by trigger or application on INSERT/DELETE\n\n-- Pattern 2: Materialized path for hierarchy\nCREATE TABLE categories (\n    id        SERIAL PRIMARY KEY,\n    name      VARCHAR(50),\n    parent_id INT REFERENCES categories(id),\n    path      TEXT  -- e.g., '/electronics/phones/smartphones'\n);\n-- Fast descendant query:\nSELECT * FROM categories WHERE path LIKE '/electronics/%';\n\n-- Pattern 3: Cached latest value\nCREATE TABLE customers (\n    customer_id     SERIAL PRIMARY KEY,\n    name            VARCHAR(100),\n    last_order_date DATE,         -- denormalized from orders\n    total_spent     DECIMAL(12,2) -- pre-aggregated\n);"},
{name:"When to Denormalize (Decision Framework)",theory:["Denormalize when: read frequency >> write frequency AND queries are slow due to JOINs.","Keep normalized when: data integrity is critical, writes are frequent, storage is a concern.","Hybrid approach: normalized source of truth + denormalized views/caches for reads."],code:"-- Decision framework:\n-- Q1: How often is this data read vs written?\n--     Read 1000x per sec, Write 1x per min → denormalize\n--     Read 10x per sec, Write 100x per sec → keep normalized\n\n-- Q2: How stale can the denormalized data be?\n--     Real-time required → triggers (complex) or skip denormalization\n--     Minutes OK → periodic refresh (materialized view)\n--     Hours OK → nightly batch job\n\n-- Hybrid architecture:\n-- Source of truth: normalized (employees, departments)\n-- Read cache: materialized view refreshed every 5 min\nCREATE MATERIALIZED VIEW employee_directory AS\nSELECT e.emp_id, e.name, e.email,\n       d.dept_name, m.name AS manager_name\nFROM employees e\nJOIN departments d ON e.dept_id = d.dept_id\nLEFT JOIN employees m ON e.manager_id = m.emp_id;\n\n-- Application reads from employee_directory (fast, no JOINs)\n-- Application writes to normalized tables (data integrity)"}
],
examples:[
{title:"E-commerce Denormalization Strategy",desc:"Decide what to denormalize in an online store.",code:"-- Product listing page: needs name, price, category, avg_rating, review_count\n-- Normalized: 3 JOINs + aggregate subquery for every page load\n-- Solution: denormalize popular read fields\n\nALTER TABLE products\n    ADD COLUMN avg_rating DECIMAL(3,2) DEFAULT 0,\n    ADD COLUMN review_count INT DEFAULT 0,\n    ADD COLUMN category_name VARCHAR(50);  -- copied from categories\n\n-- Maintain with trigger:\nCREATE OR REPLACE FUNCTION update_product_stats()\nRETURNS TRIGGER AS $$\nBEGIN\n    UPDATE products SET\n        avg_rating = (SELECT AVG(rating) FROM reviews WHERE product_id = NEW.product_id),\n        review_count = (SELECT COUNT(*) FROM reviews WHERE product_id = NEW.product_id)\n    WHERE product_id = NEW.product_id;\n    RETURN NEW;\nEND; $$ LANGUAGE plpgsql;\n\nCREATE TRIGGER trg_review_stats\nAFTER INSERT OR DELETE ON reviews\nFOR EACH ROW EXECUTE FUNCTION update_product_stats();"}
],
practice:[
{q:"Identify a query that requires 3+ JOINs and create a denormalized version for fast reads.",d:"E"},

]},

{id:4,title:"Keys & Naming Conventions",color:"#fbbf24",chips:["Surrogate","Natural","Naming","Conventions","Standards"],
subtopics:[
{name:"Surrogate vs Natural Keys",theory:["Surrogate key: system-generated (SERIAL, UUID); no business meaning; stable over time.","Natural key: business-meaningful column (email, SSN, ISBN); can change, causing cascade issues.","Best practice: use surrogate PK for relationships; add UNIQUE constraint on natural key for lookups."],code:"-- Surrogate key (recommended)\nCREATE TABLE customers (\n    customer_id SERIAL PRIMARY KEY,        -- surrogate: stable\n    email       VARCHAR(255) UNIQUE NOT NULL -- natural: for lookups\n);\n\n-- Natural key (risky: what if email changes?)\nCREATE TABLE customers_bad (\n    email VARCHAR(255) PRIMARY KEY  -- if email changes, all FKs break\n);\n\n-- UUID as PK (good for distributed systems)\nCREATE TABLE events (\n    event_id UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n    payload  JSONB\n);\n\n-- Composite natural key (sometimes appropriate)\nCREATE TABLE country_codes (\n    country_code CHAR(2) PRIMARY KEY,  -- 'US', 'IN', etc.\n    country_name VARCHAR(100)\n    -- Natural key is OK here: ISO codes are stable and universal\n);"},
{name:"Naming Conventions",theory:["Tables: plural nouns (employees, orders) or singular (employee, order) — be consistent!","Columns: snake_case (first_name, order_date); avoid abbreviations; be descriptive.","Foreign keys: referenced_table_singular_id (e.g., customer_id in orders table)."],code:"-- Recommended naming conventions:\n\n-- Tables: plural, snake_case\nCREATE TABLE order_items (...);\nCREATE TABLE user_sessions (...);\n\n-- Columns: descriptive, snake_case\n-- Good:\ncustomer_id, first_name, order_date, total_amount, is_active\n-- Bad:\ncid, fname, od, ta, flag\n\n-- Foreign key columns: match referenced table\nCREATE TABLE orders (\n    order_id    SERIAL PRIMARY KEY,\n    customer_id INT REFERENCES customers(customer_id),  -- clear!\n    product_id  INT REFERENCES products(product_id)\n);\n\n-- Indexes: idx_tablename_columns\nCREATE INDEX idx_orders_customer_id ON orders(customer_id);\nCREATE INDEX idx_orders_date_status ON orders(order_date, status);\n\n-- Constraints: tablename_columnname_type\nALTER TABLE orders ADD CONSTRAINT orders_amount_check CHECK (amount >= 0);\nALTER TABLE orders ADD CONSTRAINT orders_customer_fk FOREIGN KEY (customer_id) REFERENCES customers(customer_id);"},
{name:"Schema Organization",theory:["Schemas group related tables (public, auth, billing, analytics); like namespaces.","Separate operational (OLTP) tables from reporting/analytics tables using schemas.","Use consistent prefixes or schemas for staging, temp, and archive tables."],code:"-- Organize by domain\nCREATE SCHEMA auth;\nCREATE SCHEMA billing;\nCREATE SCHEMA analytics;\n\n-- Auth domain\nCREATE TABLE auth.users (user_id SERIAL PRIMARY KEY, email VARCHAR(255));\nCREATE TABLE auth.sessions (session_id UUID PRIMARY KEY, user_id INT);\nCREATE TABLE auth.permissions (permission_id SERIAL PRIMARY KEY, name VARCHAR(50));\n\n-- Billing domain\nCREATE TABLE billing.invoices (invoice_id SERIAL PRIMARY KEY, user_id INT);\nCREATE TABLE billing.payments (payment_id SERIAL PRIMARY KEY, invoice_id INT);\n\n-- Analytics (denormalized for fast reads)\nCREATE TABLE analytics.daily_metrics (date DATE, metric VARCHAR(50), value NUMERIC);\n\n-- Cross-schema references\nCREATE TABLE billing.invoices (\n    invoice_id SERIAL PRIMARY KEY,\n    user_id    INT REFERENCES auth.users(user_id)\n);"}
],
examples:[
{title:"Complete Naming Standard Document",desc:"A reference for consistent database naming.",code:"-- === NAMING STANDARDS ===\n-- Tables:     plural, snake_case (customers, order_items)\n-- Columns:    snake_case, descriptive (first_name, created_at)\n-- PK:         table_singular_id (customer_id, order_id)\n-- FK:         same as referenced PK name (customer_id)\n-- Booleans:   is_/has_ prefix (is_active, has_verified)\n-- Dates:      _at suffix for timestamps, _date for dates\n--             (created_at, updated_at, birth_date)\n-- Indexes:    idx_table_columns (idx_orders_customer_id)\n-- Constraints: table_column_type (orders_amount_check)\n-- Schemas:    domain name (auth, billing, inventory)\n\n-- Example applying all conventions:\nCREATE TABLE billing.subscriptions (\n    subscription_id  SERIAL PRIMARY KEY,\n    customer_id      INT NOT NULL REFERENCES customers(customer_id),\n    plan_name        VARCHAR(50) NOT NULL,\n    monthly_price    DECIMAL(8,2) NOT NULL,\n    is_active        BOOLEAN DEFAULT TRUE,\n    started_at       TIMESTAMP DEFAULT NOW(),\n    cancelled_at     TIMESTAMP,\n    created_at       TIMESTAMP DEFAULT NOW(),\n    updated_at       TIMESTAMP DEFAULT NOW()\n);"}
],

{id:5,title:"Schema Migrations & Versioning",color:"#f472b6",chips:["Migrations","Versioning","Rollback","Zero-Downtime"],
subtopics:[
{name:"Migration Concepts",theory:["Schema migrations are versioned DDL changes applied in sequence (like git commits for your schema).","Each migration has an UP (apply) and DOWN (rollback) script; numbered sequentially.","Tools: Flyway, Liquibase, Alembic, Knex, Django migrations, Rails ActiveRecord migrations."],code:"-- Migration 001_create_users.sql (UP)\nCREATE TABLE users (\n    user_id    SERIAL PRIMARY KEY,\n    email      VARCHAR(255) UNIQUE NOT NULL,\n    name       VARCHAR(100),\n    created_at TIMESTAMP DEFAULT NOW()\n);\n\n-- Migration 001_create_users_down.sql (ROLLBACK)\nDROP TABLE IF EXISTS users;\n\n-- Migration 002_add_user_phone.sql (UP)\nALTER TABLE users ADD COLUMN phone VARCHAR(20);\n\n-- Migration 002_add_user_phone_down.sql (ROLLBACK)\nALTER TABLE users DROP COLUMN phone;\n\n-- Tracking table (how tools track applied migrations)\nCREATE TABLE schema_migrations (\n    version     VARCHAR(50) PRIMARY KEY,\n    applied_at  TIMESTAMP DEFAULT NOW(),\n    description TEXT\n);"},
{name:"Safe Migration Patterns",theory:["Add column: safe (nullable or with default); drop column: dangerous (ensure nothing reads it).","Rename column: risky; use add-copy-drop pattern (add new, copy data, drop old) over multiple deploys.","Add NOT NULL to existing column: first add default, backfill NULLs, then add constraint."],code:"-- SAFE: Add nullable column\nALTER TABLE users ADD COLUMN middle_name VARCHAR(50);\n\n-- SAFE: Add column with default (PG 11+ is instant)\nALTER TABLE users ADD COLUMN is_verified BOOLEAN DEFAULT FALSE;\n\n-- UNSAFE → SAFE: Add NOT NULL constraint\n-- Step 1: Add column nullable with default\nALTER TABLE users ADD COLUMN status VARCHAR(20) DEFAULT 'active';\n-- Step 2: Backfill existing rows\nUPDATE users SET status = 'active' WHERE status IS NULL;\n-- Step 3: Add NOT NULL constraint\nALTER TABLE users ALTER COLUMN status SET NOT NULL;\n\n-- RENAME safely (multi-deploy):\n-- Deploy 1: Add new column, copy data\nALTER TABLE users ADD COLUMN full_name VARCHAR(100);\nUPDATE users SET full_name = name;\n-- Deploy 2: App reads from full_name\n-- Deploy 3: Drop old column\nALTER TABLE users DROP COLUMN name;"},
{name:"Zero-Downtime Migrations",theory:["Avoid locking: ALTER TABLE ADD COLUMN is instant in PG 11+; but some ALTERs lock the table.","CREATE INDEX CONCURRENTLY avoids blocking writes (but takes longer).","Large data backfills should happen in batches to avoid long-running transactions."],code:"-- Non-blocking index creation\nCREATE INDEX CONCURRENTLY idx_users_email ON users(email);\n-- Takes longer but doesn't lock the table\n\n-- Batched backfill (avoid locking entire table)\nDO $$\nDECLARE\n    batch_size INT := 10000;\n    affected INT := 1;\nBEGIN\n    WHILE affected > 0 LOOP\n        UPDATE users\n        SET status = 'active'\n        WHERE user_id IN (\n            SELECT user_id FROM users\n            WHERE status IS NULL\n            LIMIT batch_size\n            FOR UPDATE SKIP LOCKED\n        );\n        GET DIAGNOSTICS affected = ROW_COUNT;\n        COMMIT;  -- release locks between batches\n    END LOOP;\nEND $$;\n\n-- Check for locks before running migrations\nSELECT * FROM pg_locks WHERE relation = 'users'::regclass;"}
],
examples:[
{title:"Complete Migration Workflow",desc:"A real-world migration sequence for adding a feature.",code:"-- === Feature: Add user addresses ===\n\n-- Migration 010_create_addresses.sql\nCREATE TABLE addresses (\n    address_id  SERIAL PRIMARY KEY,\n    user_id     INT NOT NULL REFERENCES users(user_id) ON DELETE CASCADE,\n    line1       VARCHAR(200) NOT NULL,\n    line2       VARCHAR(200),\n    city        VARCHAR(100) NOT NULL,\n    state       VARCHAR(50),\n    postal_code VARCHAR(20),\n    country     CHAR(2) NOT NULL DEFAULT 'US',\n    is_default  BOOLEAN DEFAULT FALSE,\n    created_at  TIMESTAMP DEFAULT NOW()\n);\n\nCREATE INDEX idx_addresses_user ON addresses(user_id);\n\n-- Migration 011_add_address_to_orders.sql\nALTER TABLE orders ADD COLUMN shipping_address_id INT\n    REFERENCES addresses(address_id);\n\n-- Migration 011_rollback.sql\nALTER TABLE orders DROP COLUMN shipping_address_id;\nDROP TABLE addresses;"}

{id:6,title:"OLTP vs OLAP & Design Patterns",color:"#22d3ee",chips:["OLTP","OLAP","Soft Delete","Audit","History"],
subtopics:[
{name:"OLTP vs OLAP Design",theory:["OLTP (Online Transaction Processing): normalized, optimized for writes, row-oriented storage.","OLAP (Online Analytical Processing): denormalized, optimized for reads/aggregations, column-oriented.","Same data, different models: OLTP source → ETL → OLAP warehouse."],code:"-- OLTP design: normalized, fast writes\nCREATE TABLE orders (\n    order_id    SERIAL PRIMARY KEY,\n    customer_id INT NOT NULL REFERENCES customers(customer_id),\n    order_date  TIMESTAMP DEFAULT NOW(),\n    status      VARCHAR(20) NOT NULL\n);\nCREATE TABLE order_items (\n    item_id    SERIAL PRIMARY KEY,\n    order_id   INT REFERENCES orders(order_id),\n    product_id INT REFERENCES products(product_id),\n    quantity   INT,\n    unit_price DECIMAL(10,2)\n);\n\n-- OLAP design: denormalized, fast reads\nCREATE TABLE fact_sales (\n    sale_id       BIGSERIAL PRIMARY KEY,\n    order_date    DATE,\n    customer_name VARCHAR(100),  -- denormalized\n    product_name  VARCHAR(200),  -- denormalized\n    category      VARCHAR(50),   -- denormalized\n    quantity      INT,\n    revenue       DECIMAL(12,2),\n    region        VARCHAR(50)\n);\n-- Single scan answers: 'Revenue by category by month by region'"},
{name:"Soft Deletes",theory:["Soft delete: mark rows as deleted (is_deleted = TRUE) instead of physically removing them.","Pros: data recovery, audit trail, referential integrity preserved; Cons: added complexity in every query.","Implementation: add deleted_at timestamp (NULL = active); filter in all queries or use views."],code:"-- Soft delete pattern\nCREATE TABLE customers (\n    customer_id SERIAL PRIMARY KEY,\n    name        VARCHAR(100) NOT NULL,\n    email       VARCHAR(255) UNIQUE,\n    deleted_at  TIMESTAMP   -- NULL = active, timestamp = deleted\n);\n\n-- All application queries filter soft-deleted:\nSELECT * FROM customers WHERE deleted_at IS NULL;\n\n-- 'Delete' a customer:\nUPDATE customers SET deleted_at = NOW() WHERE customer_id = 42;\n\n-- Restore:\nUPDATE customers SET deleted_at = NULL WHERE customer_id = 42;\n\n-- View for convenience:\nCREATE VIEW active_customers AS\nSELECT * FROM customers WHERE deleted_at IS NULL;\n\n-- Unique constraint issue: deleted users can't reuse email!\n-- Fix: partial unique index\nCREATE UNIQUE INDEX idx_unique_active_email\n    ON customers(email) WHERE deleted_at IS NULL;"},
{name:"Audit Columns & History Tables",theory:["Audit columns: created_at, updated_at, created_by, updated_by on every table.","History/changelog table: stores every change (INSERT/UPDATE/DELETE) with before/after values.","Trigger-based audit: automatic; application-based: more control but can be bypassed."],code:"-- Audit columns pattern\nCREATE TABLE products (\n    product_id  SERIAL PRIMARY KEY,\n    name        VARCHAR(200),\n    price       DECIMAL(10,2),\n    -- Audit columns\n    created_at  TIMESTAMP DEFAULT NOW(),\n    updated_at  TIMESTAMP DEFAULT NOW(),\n    created_by  VARCHAR(100),\n    updated_by  VARCHAR(100)\n);\n\n-- Auto-update updated_at with trigger\nCREATE OR REPLACE FUNCTION update_timestamp()\nRETURNS TRIGGER AS $$\nBEGIN\n    NEW.updated_at = NOW();\n    RETURN NEW;\nEND; $$ LANGUAGE plpgsql;\n\nCREATE TRIGGER trg_products_updated\n    BEFORE UPDATE ON products\n    FOR EACH ROW EXECUTE FUNCTION update_timestamp();\n\n-- History/audit log table\nCREATE TABLE audit_log (\n    audit_id    BIGSERIAL PRIMARY KEY,\n    table_name  VARCHAR(50) NOT NULL,\n    record_id   INT NOT NULL,\n    action      VARCHAR(10) NOT NULL,  -- INSERT/UPDATE/DELETE\n    old_values  JSONB,\n    new_values  JSONB,\n    changed_by  VARCHAR(100),\n    changed_at  TIMESTAMP DEFAULT NOW()\n);"}
],
examples:[
{title:"Complete Auditable Table Design",desc:"A production-ready table with all design patterns applied.",code:"CREATE TABLE orders (\n    -- Core data\n    order_id     SERIAL PRIMARY KEY,\n    customer_id  INT NOT NULL REFERENCES customers(customer_id),\n    status       VARCHAR(20) NOT NULL DEFAULT 'draft',\n    total_amount DECIMAL(12,2) NOT NULL DEFAULT 0,\n\n    -- Soft delete\n    deleted_at   TIMESTAMP,\n\n    -- Audit columns\n    created_at   TIMESTAMP NOT NULL DEFAULT NOW(),\n    updated_at   TIMESTAMP NOT NULL DEFAULT NOW(),\n    created_by   INT REFERENCES auth.users(user_id),\n    updated_by   INT REFERENCES auth.users(user_id),\n\n    -- Constraints\n    CONSTRAINT orders_status_check\n        CHECK (status IN ('draft','pending','confirmed','shipped','delivered','cancelled')),\n    CONSTRAINT orders_amount_check\n        CHECK (total_amount >= 0)\n);\n\n-- Indexes\nCREATE INDEX idx_orders_customer ON orders(customer_id) WHERE deleted_at IS NULL;\nCREATE INDEX idx_orders_status ON orders(status) WHERE deleted_at IS NULL;\nCREATE INDEX idx_orders_date ON orders(created_at DESC);"}

function highlightSQL(code) {
    let html = code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    html = html.replace(/(--.*)/g, '<span style="color:#6b7280">$1</span>');
    html = html.replace(/('(?:[^'\\]|\\.)*')/g, '<span style="color:#fbbf24">$1</span>');
    html = html.replace(/\b(\d+\.?\d*)\b/g, '<span style="color:#f472b6">$1</span>');
    const keywords = ['SELECT','FROM','WHERE','INSERT','INTO','VALUES','UPDATE','SET','DELETE','CREATE','ALTER','DROP','TABLE','INDEX','VIEW','SCHEMA','DATABASE','BEGIN','COMMIT','ROLLBACK','JOIN','INNER','LEFT','RIGHT','FULL','OUTER','CROSS','ON','AND','OR','NOT','IN','EXISTS','BETWEEN','LIKE','IS','NULL','AS','CASE','WHEN','THEN','ELSE','END','ORDER','BY','GROUP','HAVING','LIMIT','OFFSET','UNION','ALL','DISTINCT','ASC','DESC','WITH','OVER','PARTITION','PRIMARY','KEY','FOREIGN','REFERENCES','UNIQUE','CHECK','DEFAULT','CONSTRAINT','CASCADE','IF','REPLACE','SERIAL','RETURNS','RETURN','DECLARE','FUNCTION','PROCEDURE','TRIGGER','BEFORE','AFTER','FOR','EACH','ROW','EXECUTE','MATERIALIZED','REFRESH','TRUNCATE','ADD','COLUMN','RENAME','TO','TYPE','USING','DO','RAISE','EXCEPTION','TRUE','FALSE','INT','INTEGER','BIGINT','BIGSERIAL','SMALLINT','DECIMAL','NUMERIC','FLOAT','VARCHAR','CHAR','TEXT','BOOLEAN','DATE','TIME','TIMESTAMP','INTERVAL','JSONB','JSON','UUID','ENUM','COALESCE','NULLIF','CAST','EXTRACT','NOW','CURRENT_DATE','CURRENT_TIMESTAMP','COUNT','SUM','AVG','MIN','MAX','ROUND','NEW','OLD','LANGUAGE','PLPGSQL','CONCURRENTLY'];
    const kwPattern = new RegExp('\\b(' + keywords.join('|') + ')\\b', 'gi');
    html = html.replace(kwPattern, '<span style="color:#22d3ee">$1</span>');
    return html;
}
function getProgress(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||{};}catch{return {};}}
function saveProgress(d){localStorage.setItem(STORAGE_KEY,JSON.stringify(d));}
function getTotalPractice(){return topics.reduce((s,t)=>s+t.practice.length,0);}
function getCompletedCount(){return Object.values(getProgress()).filter(v=>v).length;}
function updateProgressBar(){const total=getTotalPractice(),done=getCompletedCount();document.getElementById('progressFill').style.width=(total>0?done/total*100:0)+'%';document.getElementById('progressText').textContent=done+' / '+total;}
function getTopicProgress(id){const p=getProgress(),t=topics.find(x=>x.id===id);if(!t)return{done:0,total:0};let d=0;t.practice.forEach((_,i)=>{if(p[id+'_'+i])d++;});return{done:d,total:t.practice.length};}
function renderRoadmap(){const c=document.getElementById('roadmapContainer');c.innerHTML='';topics.forEach(t=>{const p=getTopicProgress(t.id),n=document.createElement('div');n.className='node';n.onclick=()=>showDetail(t.id);n.innerHTML=`<div class="node-number" style="border-color:${t.color};color:${t.color}">${t.id}</div><div class="node-card"><div class="node-title" style="color:${t.color}">${t.title}</div><div class="node-chips">${t.chips.map(c=>'<span class="chip">'+c+'</span>').join('')}</div><div class="node-progress">${p.done} / ${p.total} practice completed</div></div>`;c.appendChild(n);});}
function showDetail(id){currentTopic=topics.find(t=>t.id===id);if(!currentTopic)return;document.getElementById('roadmapPage').classList.remove('active');document.getElementById('detailPage').classList.add('active');document.getElementById('detailTitle').textContent=currentTopic.title;document.getElementById('detailTitle').style.color=currentTopic.color;document.getElementById('detailSubtitle').textContent=currentTopic.subtopics.map(s=>s.name).join(' • ');renderTheory();renderExamples();renderPractice();switchTab('theory');window.scrollTo(0,0);}
function showRoadmap(){document.getElementById('detailPage').classList.remove('active');document.getElementById('roadmapPage').classList.add('active');renderRoadmap();updateProgressBar();}
function switchTab(tab){document.querySelectorAll('.tab').forEach((t,i)=>{t.classList.toggle('active',['theory','examples','practice','solutions'][i]===tab);});document.querySelectorAll('.tab-content').forEach((tc,i)=>{tc.classList.toggle('active',['theory','examples','practice','solutions'][i]===tab);});if(tab==='solutions')renderSolutions();}
function renderTheory(){document.getElementById('theoryContent').innerHTML=currentTopic.subtopics.map(s=>`<div class="theory-section"><div class="theory-title">${s.name}</div>${s.theory.map(t=>'<p class="theory-point">'+t+'</p>').join('')}<pre class="code-block">${highlightSQL(s.code)}</pre></div>`).join('');}
function renderExamples(){document.getElementById('examplesContent').innerHTML=currentTopic.examples.map(e=>`<div class="example-card"><div class="example-title">${e.title}</div><p class="example-desc">${e.desc}</p><pre class="code-block">${highlightSQL(e.code)}</pre></div>`).join('');}
function renderPractice(){const prog=getProgress();document.getElementById('practiceContent').innerHTML=currentTopic.practice.map((p,i)=>{const key=currentTopic.id+'_'+i,ch=prog[key]?'checked':'',dc=prog[key]?'done':'',df=p.d==='E'?'easy':p.d==='M'?'medium':'hard',dl=p.d==='E'?'Easy':p.d==='M'?'Medium':'Hard';return`<div class="practice-item ${dc}"><input type="checkbox" ${ch} onchange="togglePractice('${key}',this)"><span class="practice-text">${i+1}. ${p.q}</span><span class="difficulty ${df}">${dl}</span></div>`;}).join('');}
function togglePractice(key,el){const p=getProgress();p[key]=el.checked;saveProgress(p);updateProgressBar();el.parentElement.classList.toggle('done',el.checked);}
function renderSolutions(){document.getElementById('solutionsContent').innerHTML='<div class="theory-section"><div class="theory-title">Solutions Coming Soon</div><p class="theory-point">Practice solving these problems on your own first. Solutions will be added in a future update.</p></div>';}
renderRoadmap();updateProgressBar();
</script>
