<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PL/SQL & T-SQL Roadmap</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#080c14;--card:#141d2e;--border:#1e2d45;--text:#dde4f0;--text-dim:#8892a4;--green:#4ade80;--cyan:#22d3ee;--purple:#a78bfa;--gradient:linear-gradient(135deg,#4ade80,#22d3ee,#a78bfa)}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
code,pre,.code{font-family:'JetBrains Mono',monospace}
.header{position:sticky;top:0;z-index:1000;background:rgba(8,12,20,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:12px 24px}
.header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:1.4rem;font-weight:700;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.progress-container{flex:1;max-width:300px;margin-left:24px}
.progress-label{font-size:0.7rem;color:var(--text-dim);margin-bottom:4px;text-align:right}
.progress-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:var(--gradient);border-radius:3px;transition:width 0.5s ease}
.page{display:none;padding:40px 24px 80px;max-width:900px;margin:0 auto;animation:fadeIn 0.3s ease}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.roadmap{position:relative;padding-left:60px}
.roadmap::before{content:'';position:absolute;left:28px;top:0;bottom:0;width:2px;background:linear-gradient(to bottom,var(--green),var(--cyan),var(--purple));opacity:0.4}
.node{position:relative;margin-bottom:24px;cursor:pointer;transition:transform 0.2s ease}
.node:hover{transform:translateX(4px)}
.node-number{position:absolute;left:-48px;top:16px;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.8rem;border:2px solid;background:var(--bg)}
.node-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px 24px;transition:border-color 0.2s,box-shadow 0.2s}
.node:hover .node-card{border-color:var(--cyan);box-shadow:0 4px 20px rgba(34,211,238,0.1)}
.node-title{font-size:1.1rem;font-weight:600;margin-bottom:8px}
.node-chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{font-size:0.65rem;padding:3px 8px;border-radius:4px;background:rgba(255,255,255,0.05);border:1px solid var(--border);color:var(--text-dim)}
.node-progress{font-size:0.7rem;color:var(--text-dim);margin-top:8px}
.back-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);cursor:pointer;font-family:'Sora',sans-serif;font-size:0.85rem;margin-bottom:24px;transition:border-color 0.2s}
.back-btn:hover{border-color:var(--cyan)}
.detail-header{margin-bottom:24px}
.detail-title{font-size:1.8rem;font-weight:700;margin-bottom:8px}
.detail-subtitle{font-size:0.85rem;color:var(--text-dim)}
.tabs{display:flex;gap:4px;margin-bottom:24px;background:var(--card);border-radius:10px;padding:4px;border:1px solid var(--border)}
.tab{flex:1;padding:10px 16px;text-align:center;border-radius:8px;cursor:pointer;font-size:0.85rem;font-weight:500;color:var(--text-dim);transition:all 0.2s}
.tab.active{background:var(--border);color:var(--text)}
.tab:hover:not(.active){color:var(--text)}
.tab-content{display:none;animation:fadeIn 0.3s ease}
.tab-content.active{display:block}
.theory-section{margin-bottom:24px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px}
.theory-title{font-size:1rem;font-weight:600;margin-bottom:12px;color:var(--cyan)}
.theory-point{font-size:0.85rem;color:var(--text-dim);margin-bottom:8px;padding-left:16px;position:relative;line-height:1.6}
.theory-point::before{content:'>';position:absolute;left:0;color:var(--green)}
pre.code-block{background:rgba(0,0,0,0.4);border:1px solid var(--border);border-radius:8px;padding:16px;margin-top:12px;overflow-x:auto;font-size:0.8rem;line-height:1.6}
.example-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:16px}
.example-title{font-size:0.9rem;font-weight:600;margin-bottom:8px;color:var(--purple)}
.example-desc{font-size:0.82rem;color:var(--text-dim);margin-bottom:12px}
.practice-item{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;transition:border-color 0.2s}
.practice-item:hover{border-color:var(--cyan)}
.practice-item input[type="checkbox"]{width:18px;height:18px;margin-top:2px;accent-color:var(--green);cursor:pointer}
.practice-item.done{opacity:0.6;border-color:var(--green)}
.practice-text{flex:1;font-size:0.82rem;line-height:1.5}
.difficulty{font-size:0.65rem;padding:2px 8px;border-radius:4px;font-weight:600;white-space:nowrap}
.difficulty.easy{background:rgba(74,222,128,0.15);color:#4ade80}
.difficulty.medium{background:rgba(251,191,36,0.15);color:#fbbf24}
.difficulty.hard{background:rgba(244,114,182,0.15);color:#f472b6}
@media(max-width:640px){.roadmap{padding-left:40px}.roadmap::before{left:16px}.node-number{left:-32px;width:26px;height:26px;font-size:0.7rem}.header-inner{flex-wrap:wrap;gap:8px}.progress-container{max-width:100%;margin-left:0}}
</style>
</head>

<script>
let currentTopic = null;
const STORAGE_KEY = 'plsql_tsql_roadmap_progress';

const topics = [
{id:1,title:"Variables & Control Flow",color:"#38bdf8",chips:["DECLARE","IF/ELSE","LOOP","WHILE","FOR"],
subtopics:[
{name:"Variables & Assignment",theory:["DECLARE block defines variables with name, type, and optional default value.","PostgreSQL uses DO $$ ... $$ for anonymous blocks; PL/pgSQL is the procedural language.","SQL Server uses DECLARE @var TYPE; SET @var = value; or SELECT @var = col FROM..."],code:"-- PostgreSQL (PL/pgSQL anonymous block)\nDO $$\nDECLARE\n    emp_name VARCHAR(100);\n    emp_salary DECIMAL(10,2) := 0;\n    hire_date DATE := CURRENT_DATE;\n    is_active BOOLEAN := TRUE;\nBEGIN\n    emp_name := 'Alice Smith';\n    emp_salary := 75000.00;\n    RAISE NOTICE 'Employee: %, Salary: %', emp_name, emp_salary;\nEND $$;\n\n-- SQL Server (T-SQL)\n-- DECLARE @emp_name VARCHAR(100);\n-- DECLARE @emp_salary DECIMAL(10,2) = 0;\n-- SET @emp_name = 'Alice Smith';\n-- SELECT @emp_salary = salary FROM employees WHERE emp_id = 1;\n-- PRINT 'Employee: ' + @emp_name;"},
{name:"IF / ELSIF / ELSE",theory:["Conditional branching: IF condition THEN ... ELSIF ... ELSE ... END IF.","T-SQL uses IF...ELSE (no ELSIF, use nested IF or CASE).","Conditions can include AND, OR, NOT, IS NULL, comparison operators."],code:"-- PostgreSQL IF/ELSIF/ELSE\nDO $$\nDECLARE\n    score INT := 85;\n    grade VARCHAR(2);\nBEGIN\n    IF score >= 90 THEN\n        grade := 'A';\n    ELSIF score >= 80 THEN\n        grade := 'B';\n    ELSIF score >= 70 THEN\n        grade := 'C';\n    ELSE\n        grade := 'F';\n    END IF;\n    RAISE NOTICE 'Score: %, Grade: %', score, grade;\nEND $$;\n\n-- SQL Server equivalent:\n-- IF @score >= 90 SET @grade = 'A'\n-- ELSE IF @score >= 80 SET @grade = 'B'\n-- ELSE IF @score >= 70 SET @grade = 'C'\n-- ELSE SET @grade = 'F';"},
{name:"LOOP, WHILE, FOR",theory:["LOOP: unconditional loop; use EXIT WHEN or EXIT to break out.","WHILE condition LOOP ... END LOOP: repeats while condition is true.","FOR var IN start..end LOOP: iterates through a range; FOR rec IN query LOOP: iterates query results."],code:"-- Basic LOOP with EXIT\nDO $$\nDECLARE\n    counter INT := 1;\nBEGIN\n    LOOP\n        EXIT WHEN counter > 5;\n        RAISE NOTICE 'Counter: %', counter;\n        counter := counter + 1;\n    END LOOP;\nEND $$;\n\n-- WHILE loop\nDO $$\nDECLARE\n    total INT := 0;\n    i INT := 1;\nBEGIN\n    WHILE i <= 100 LOOP\n        total := total + i;\n        i := i + 1;\n    END LOOP;\n    RAISE NOTICE 'Sum 1-100: %', total;\nEND $$;\n\n-- FOR loop (range)\nDO $$\nBEGIN\n    FOR i IN 1..10 LOOP\n        RAISE NOTICE 'i = %', i;\n    END LOOP;\n    -- Reverse\n    FOR i IN REVERSE 10..1 LOOP\n        RAISE NOTICE 'countdown: %', i;\n    END LOOP;\nEND $$;"},
{name:"FOR with Query Results",theory:["FOR record IN SELECT ... LOOP iterates over each row returned by a query.","The loop variable is a RECORD type; access columns with record.column_name.","RETURN NEXT in functions outputs one row at a time (set-returning function)."],code:"-- Iterate over query results\nDO $$\nDECLARE\n    emp RECORD;\nBEGIN\n    FOR emp IN\n        SELECT name, salary FROM employees WHERE dept_id = 1 ORDER BY salary DESC\n    LOOP\n        RAISE NOTICE '% earns %', emp.name, emp.salary;\n    END LOOP;\nEND $$;\n\n-- Dynamic query in FOR loop\nDO $$\nDECLARE\n    rec RECORD;\n    tbl_name TEXT;\nBEGIN\n    FOR rec IN\n        SELECT tablename FROM pg_tables WHERE schemaname = 'public'\n    LOOP\n        RAISE NOTICE 'Table: %', rec.tablename;\n    END LOOP;\nEND $$;"}
],
examples:[
{title:"Process All Departments",desc:"Loop through departments and calculate stats for each.",code:"DO $$\nDECLARE\n    dept RECORD;\n    emp_count INT;\n    avg_sal DECIMAL;\nBEGIN\n    FOR dept IN SELECT dept_id, dept_name FROM departments LOOP\n        SELECT COUNT(*), AVG(salary)\n        INTO emp_count, avg_sal\n        FROM employees\n        WHERE dept_id = dept.dept_id;\n\n        RAISE NOTICE 'Dept: % | Employees: % | Avg Salary: %',\n            dept.dept_name, emp_count, ROUND(COALESCE(avg_sal, 0), 2);\n    END LOOP;\nEND $$;"}
],
practice:[
{q:"Declare 3 variables of different types, assign values, and print them with RAISE NOTICE.",d:"E"},
{q:"Write an IF/ELSIF/ELSE block that classifies a temperature as Cold/Warm/Hot.",d:"E"},
{q:"Write a WHILE loop that calculates the factorial of a given number.",d:"M"},
{q:"Use a FOR loop to iterate over query results and print each employee's name and salary.",d:"M"},
{q:"Write a nested loop that generates a multiplication table (1-10).",d:"M"},
{q:"Implement a loop with CONTINUE WHEN to skip even numbers in a range.",d:"M"},

]},

{id:2,title:"Stored Procedures",color:"#34d399",chips:["CREATE PROCEDURE","IN/OUT","CALL","Parameters"],
subtopics:[
{name:"Creating Procedures",theory:["Stored procedures encapsulate reusable logic on the database server; called with CALL.","Unlike functions, procedures can perform transactions (COMMIT/ROLLBACK) and don't return a value.","Parameters: IN (input, default), OUT (output), INOUT (both input and output)."],code:"-- PostgreSQL stored procedure\nCREATE OR REPLACE PROCEDURE transfer_funds(\n    IN from_account INT,\n    IN to_account INT,\n    IN amount DECIMAL(10,2)\n)\nLANGUAGE plpgsql\nAS $$\nBEGIN\n    -- Debit source account\n    UPDATE accounts SET balance = balance - amount\n    WHERE account_id = from_account;\n\n    -- Credit destination account\n    UPDATE accounts SET balance = balance + amount\n    WHERE account_id = to_account;\n\n    -- Commit within procedure\n    COMMIT;\nEND;\n$$;\n\n-- Call the procedure\nCALL transfer_funds(1, 2, 500.00);"},
{name:"Parameters (IN, OUT, INOUT)",theory:["IN parameters pass values into the procedure; they are read-only inside the body.","OUT parameters return values to the caller; set within the procedure body.","INOUT parameters are both input and output; modified value is returned to caller."],code:"-- Procedure with OUT parameters\nCREATE OR REPLACE PROCEDURE get_employee_stats(\n    IN p_dept_id INT,\n    OUT p_count INT,\n    OUT p_avg_salary DECIMAL(10,2),\n    OUT p_max_salary DECIMAL(10,2)\n)\nLANGUAGE plpgsql\nAS $$\nBEGIN\n    SELECT COUNT(*), AVG(salary), MAX(salary)\n    INTO p_count, p_avg_salary, p_max_salary\n    FROM employees\n    WHERE dept_id = p_dept_id;\nEND;\n$$;\n\n-- Call with OUT params (PostgreSQL)\nDO $$\nDECLARE\n    v_count INT;\n    v_avg DECIMAL;\n    v_max DECIMAL;\nBEGIN\n    CALL get_employee_stats(1, v_count, v_avg, v_max);\n    RAISE NOTICE 'Count: %, Avg: %, Max: %', v_count, v_avg, v_max;\nEND $$;"},
{name:"Procedure Best Practices",theory:["Keep procedures focused: one procedure = one task; compose larger workflows by calling others.","Always handle errors with EXCEPTION blocks; log errors for debugging.","Avoid business logic sprawl: don't put everything in stored procedures; balance with application code."],code:"-- Well-structured procedure with validation & error handling\nCREATE OR REPLACE PROCEDURE create_order(\n    IN p_customer_id INT,\n    IN p_product_id INT,\n    IN p_quantity INT\n)\nLANGUAGE plpgsql\nAS $$\nDECLARE\n    v_stock INT;\n    v_price DECIMAL(10,2);\nBEGIN\n    -- Validation\n    IF p_quantity <= 0 THEN\n        RAISE EXCEPTION 'Quantity must be positive';\n    END IF;\n\n    -- Check stock\n    SELECT stock_qty, price INTO v_stock, v_price\n    FROM products WHERE product_id = p_product_id FOR UPDATE;\n\n    IF v_stock < p_quantity THEN\n        RAISE EXCEPTION 'Insufficient stock: % available, % requested', v_stock, p_quantity;\n    END IF;\n\n    -- Create order\n    INSERT INTO orders (customer_id, product_id, quantity, total)\n    VALUES (p_customer_id, p_product_id, p_quantity, v_price * p_quantity);\n\n    -- Update stock\n    UPDATE products SET stock_qty = stock_qty - p_quantity\n    WHERE product_id = p_product_id;\n\n    COMMIT;\nEXCEPTION\n    WHEN OTHERS THEN\n        ROLLBACK;\n        RAISE;\nEND;\n$$;"}
],
examples:[
{title:"Batch Processing Procedure",desc:"Process expired subscriptions in batches.",code:"CREATE OR REPLACE PROCEDURE expire_subscriptions(IN batch_size INT DEFAULT 1000)\nLANGUAGE plpgsql\nAS $$\nDECLARE\n    affected INT := 1;\n    total_expired INT := 0;\nBEGIN\n    WHILE affected > 0 LOOP\n        UPDATE subscriptions\n        SET status = 'expired', expired_at = NOW()\n        WHERE subscription_id IN (\n            SELECT subscription_id FROM subscriptions\n            WHERE status = 'active' AND end_date < CURRENT_DATE\n            LIMIT batch_size\n            FOR UPDATE SKIP LOCKED\n        );\n        GET DIAGNOSTICS affected = ROW_COUNT;\n        total_expired := total_expired + affected;\n        COMMIT;\n    END LOOP;\n    RAISE NOTICE 'Total expired: %', total_expired;\nEND;\n$$;\n\nCALL expire_subscriptions(500);"}
],
practice:[
{q:"Create a simple stored procedure that inserts a new employee given name, dept, and salary.",d:"E"},
{q:"Write a procedure with IN and OUT parameters that returns department statistics.",d:"E"},
{q:"Create a procedure that validates input and raises an exception for invalid data.",d:"M"},
{q:"Write a procedure that transfers money between accounts with proper validation.",d:"M"},
{q:"Implement a procedure that processes records in batches using a loop.",d:"M"},
{q:"Create a procedure that calls other procedures to compose a multi-step workflow.",d:"H"},
{q:"Write a procedure with transaction management that commits on success and rolls back on error.",d:"H"},
{q:"Implement an idempotent procedure that can be safely re-run without duplicating data.",d:"H"}
]},

{id:3,title:"Functions",color:"#a78bfa",chips:["CREATE FUNCTION","RETURNS","IMMUTABLE","STABLE","VOLATILE"],
subtopics:[
{name:"Scalar Functions",theory:["Functions return a value; can be used in SELECT, WHERE, and expressions.","Must be side-effect free (no DML in non-volatile functions); use IMMUTABLE/STABLE/VOLATILE to hint.","IMMUTABLE: same input always same output (used in indexes); STABLE: consistent within transaction."],code:"-- Scalar function: returns single value\nCREATE OR REPLACE FUNCTION calculate_tax(\n    amount DECIMAL(10,2),\n    rate DECIMAL(4,2) DEFAULT 0.08\n)\nRETURNS DECIMAL(10,2)\nLANGUAGE plpgsql\nIMMUTABLE\nAS $$\nBEGIN\n    RETURN ROUND(amount * rate, 2);\nEND;\n$$;\n\n-- Use in queries\nSELECT product_name, price, calculate_tax(price) AS tax,\n       price + calculate_tax(price) AS total\nFROM products;\n\n-- Function with logic\nCREATE OR REPLACE FUNCTION get_salary_band(salary DECIMAL)\nRETURNS VARCHAR(20)\nLANGUAGE plpgsql\nIMMUTABLE\nAS $$\nBEGIN\n    IF salary >= 100000 THEN RETURN 'Senior';\n    ELSIF salary >= 70000 THEN RETURN 'Mid';\n    ELSIF salary >= 40000 THEN RETURN 'Junior';\n    ELSE RETURN 'Entry';\n    END IF;\nEND;\n$$;"},
{name:"Table-Returning Functions",theory:["RETURNS TABLE defines a function that returns a result set (like a parameterized view).","RETURNS SETOF type returns multiple rows of an existing type.","Use RETURN QUERY to output a SELECT result; RETURN NEXT for row-by-row output."],code:"-- Function returning a table\nCREATE OR REPLACE FUNCTION get_department_report(p_dept_id INT)\nRETURNS TABLE (\n    employee_name VARCHAR,\n    salary DECIMAL,\n    salary_rank INT\n)\nLANGUAGE plpgsql\nSTABLE\nAS $$\nBEGIN\n    RETURN QUERY\n    SELECT e.name, e.salary,\n        RANK() OVER (ORDER BY e.salary DESC)::INT\n    FROM employees e\n    WHERE e.dept_id = p_dept_id\n    ORDER BY e.salary DESC;\nEND;\n$$;\n\n-- Use like a table\nSELECT * FROM get_department_report(1);\nSELECT * FROM get_department_report(2) WHERE salary > 60000;\n\n-- Function returning SETOF existing type\nCREATE OR REPLACE FUNCTION active_employees()\nRETURNS SETOF employees\nLANGUAGE plpgsql\nSTABLE\nAS $$\nBEGIN\n    RETURN QUERY SELECT * FROM employees WHERE is_active = TRUE;\nEND;\n$$;"},
{name:"SQL vs PL/pgSQL Functions",theory:["LANGUAGE SQL: simple, just a SQL expression; best for simple calculations and wrappers.","LANGUAGE plpgsql: full procedural logic; needed for variables, loops, conditions.","SQL functions are often inlined by the optimizer (faster); PL/pgSQL functions are black boxes."],code:"-- Simple SQL function (optimizer can inline)\nCREATE FUNCTION full_name(first VARCHAR, last VARCHAR)\nRETURNS VARCHAR\nLANGUAGE SQL\nIMMUTABLE\nAS $$\n    SELECT first || ' ' || last;\n$$;\n\n-- SQL function returning query\nCREATE FUNCTION recent_orders(days INT DEFAULT 30)\nRETURNS SETOF orders\nLANGUAGE SQL\nSTABLE\nAS $$\n    SELECT * FROM orders\n    WHERE order_date >= CURRENT_DATE - days\n    ORDER BY order_date DESC;\n$$;\n\n-- PL/pgSQL (needed for logic)\nCREATE FUNCTION safe_divide(a DECIMAL, b DECIMAL)\nRETURNS DECIMAL\nLANGUAGE plpgsql\nIMMUTABLE\nAS $$\nBEGIN\n    IF b = 0 THEN\n        RETURN NULL;  -- or raise exception\n    END IF;\n    RETURN a / b;\nEND;\n$$;\n\n-- Usage\nSELECT full_name('John', 'Doe');\nSELECT * FROM recent_orders(7);\nSELECT safe_divide(10, 0);  -- NULL"}
],
examples:[
{title:"Utility Function Library",desc:"Common reusable functions for an application.",code:"-- Generate slug from title\nCREATE FUNCTION slugify(title TEXT)\nRETURNS TEXT\nLANGUAGE SQL IMMUTABLE AS $$\n    SELECT LOWER(REGEXP_REPLACE(\n        REGEXP_REPLACE(TRIM(title), '[^a-zA-Z0-9\\s-]', '', 'g'),\n        '\\s+', '-', 'g'\n    ));\n$$;\n\n-- Format currency\nCREATE FUNCTION format_currency(amount DECIMAL, currency CHAR(3) DEFAULT 'USD')\nRETURNS TEXT\nLANGUAGE SQL IMMUTABLE AS $$\n    SELECT CASE currency\n        WHEN 'USD' THEN '$' || TO_CHAR(amount, 'FM999,999,990.00')\n        WHEN 'EUR' THEN TO_CHAR(amount, 'FM999,999,990.00') || ' EUR'\n        ELSE TO_CHAR(amount, 'FM999,999,990.00') || ' ' || currency\n    END;\n$$;\n\nSELECT slugify('Hello World! This is a Test');  -- 'hello-world-this-is-a-test'\nSELECT format_currency(1234.5);                  -- '$1,234.50'"}
],
practice:[

]},

{id:4,title:"Cursors",color:"#fbbf24",chips:["DECLARE CURSOR","FETCH","OPEN","CLOSE","Refcursor"],
subtopics:[
{name:"Cursor Basics",theory:["A cursor is a pointer to a query result set; allows row-by-row processing.","Explicit cursors: DECLARE → OPEN → FETCH → CLOSE; manual control over iteration.","Implicit cursors: FOR rec IN query LOOP (preferred in most cases — simpler and safer)."],code:"-- Explicit cursor (PostgreSQL)\nDO $$\nDECLARE\n    emp_cursor CURSOR FOR\n        SELECT name, salary FROM employees WHERE dept_id = 1;\n    emp_rec RECORD;\nBEGIN\n    OPEN emp_cursor;\n    LOOP\n        FETCH emp_cursor INTO emp_rec;\n        EXIT WHEN NOT FOUND;\n        RAISE NOTICE '% earns %', emp_rec.name, emp_rec.salary;\n    END LOOP;\n    CLOSE emp_cursor;\nEND $$;\n\n-- Implicit cursor (preferred - simpler)\nDO $$\nDECLARE\n    emp RECORD;\nBEGIN\n    FOR emp IN SELECT name, salary FROM employees WHERE dept_id = 1\n    LOOP\n        RAISE NOTICE '% earns %', emp.name, emp.salary;\n    END LOOP;\nEND $$;"},
{name:"Parameterized Cursors",theory:["Cursors can accept parameters, making them reusable with different filter values.","Declare with parameters: CURSOR(param TYPE) FOR SELECT ... WHERE col = param.","Useful when you need to open the same cursor structure with different arguments."],code:"-- Parameterized cursor\nDO $$\nDECLARE\n    dept_cursor CURSOR(p_dept INT) FOR\n        SELECT name, salary\n        FROM employees\n        WHERE dept_id = p_dept\n        ORDER BY salary DESC;\n    emp RECORD;\nBEGIN\n    -- Process department 1\n    RAISE NOTICE '--- Department 1 ---';\n    FOR emp IN dept_cursor(1) LOOP\n        RAISE NOTICE '  %: %', emp.name, emp.salary;\n    END LOOP;\n\n    -- Same cursor, different department\n    RAISE NOTICE '--- Department 2 ---';\n    FOR emp IN dept_cursor(2) LOOP\n        RAISE NOTICE '  %: %', emp.name, emp.salary;\n    END LOOP;\nEND $$;"},
{name:"When to Avoid Cursors",theory:["Cursors process row-by-row (RBAR: Row By Agonizing Row); set-based operations are almost always faster.","Use cursors only when: processing requires external calls, complex conditional logic per row, or memory constraints.","Alternative: rewrite as UPDATE with CASE, window functions, or batch operations."],code:"-- SLOW: cursor approach (row by row)\nDO $$\nDECLARE\n    emp RECORD;\nBEGIN\n    FOR emp IN SELECT emp_id, salary, dept_id FROM employees LOOP\n        IF emp.dept_id = 1 THEN\n            UPDATE employees SET salary = emp.salary * 1.15 WHERE emp_id = emp.emp_id;\n        ELSIF emp.dept_id = 2 THEN\n            UPDATE employees SET salary = emp.salary * 1.10 WHERE emp_id = emp.emp_id;\n        END IF;\n    END LOOP;\nEND $$;\n\n-- FAST: set-based approach (single statement)\nUPDATE employees\nSET salary = CASE\n    WHEN dept_id = 1 THEN salary * 1.15\n    WHEN dept_id = 2 THEN salary * 1.10\n    ELSE salary\nEND\nWHERE dept_id IN (1, 2);\n\n-- The set-based version is typically 10-100x faster"}
],
examples:[
{title:"Cursor for Complex Processing",desc:"When a cursor is actually justified: external API-like processing.",code:"-- Justified cursor use: complex per-row logic with multiple steps\nDO $$\nDECLARE\n    order_rec RECORD;\n    shipping_cost DECIMAL;\nBEGIN\n    FOR order_rec IN\n        SELECT order_id, customer_id, total_amount, shipping_address\n        FROM orders WHERE status = 'pending' AND total_amount > 0\n    LOOP\n        -- Complex logic that can't be a simple UPDATE\n        -- (e.g., different shipping providers, external lookups)\n        IF order_rec.total_amount > 100 THEN\n            shipping_cost := 0;  -- free shipping\n        ELSE\n            shipping_cost := 9.99;\n        END IF;\n\n        UPDATE orders\n        SET shipping_cost = shipping_cost,\n            status = 'processing'\n        WHERE order_id = order_rec.order_id;\n\n        INSERT INTO order_log (order_id, action, ts)\n        VALUES (order_rec.order_id, 'processed', NOW());\n    END LOOP;\nEND $$;"}
],

{id:5,title:"Triggers",color:"#f472b6",chips:["BEFORE","AFTER","ROW","STATEMENT","NEW/OLD"],
subtopics:[
{name:"Trigger Concepts",theory:["Triggers fire automatically on INSERT, UPDATE, or DELETE events on a table.","BEFORE triggers can modify data before it's written; AFTER triggers react after the change.","Row-level triggers fire once per affected row; statement-level fire once per statement."],code:"-- Trigger function (PostgreSQL)\nCREATE OR REPLACE FUNCTION update_timestamp()\nRETURNS TRIGGER\nLANGUAGE plpgsql\nAS $$\nBEGIN\n    NEW.updated_at := NOW();\n    RETURN NEW;\nEND;\n$$;\n\n-- Attach trigger to table\nCREATE TRIGGER trg_employees_updated\n    BEFORE UPDATE ON employees\n    FOR EACH ROW\n    EXECUTE FUNCTION update_timestamp();\n\n-- Now any UPDATE automatically sets updated_at\nUPDATE employees SET salary = 80000 WHERE emp_id = 1;\n-- updated_at is automatically set to NOW()"},
{name:"BEFORE vs AFTER Triggers",theory:["BEFORE INSERT/UPDATE: can validate or modify NEW record; RETURN NULL to cancel the operation.","AFTER INSERT/UPDATE/DELETE: data is already committed; good for logging, notifications, cascading.","NEW refers to the new row (INSERT/UPDATE); OLD refers to the previous row (UPDATE/DELETE)."],code:"-- BEFORE trigger: validate data\nCREATE OR REPLACE FUNCTION validate_salary()\nRETURNS TRIGGER AS $$\nBEGIN\n    IF NEW.salary < 0 THEN\n        RAISE EXCEPTION 'Salary cannot be negative: %', NEW.salary;\n    END IF;\n    IF NEW.salary > 1000000 THEN\n        RAISE EXCEPTION 'Salary exceeds maximum: %', NEW.salary;\n    END IF;\n    RETURN NEW;  -- allow the operation\nEND;\n$$ LANGUAGE plpgsql;\n\nCREATE TRIGGER trg_check_salary\n    BEFORE INSERT OR UPDATE ON employees\n    FOR EACH ROW EXECUTE FUNCTION validate_salary();\n\n-- AFTER trigger: audit logging\nCREATE OR REPLACE FUNCTION log_salary_change()\nRETURNS TRIGGER AS $$\nBEGIN\n    INSERT INTO salary_audit (emp_id, old_salary, new_salary, changed_at)\n    VALUES (OLD.emp_id, OLD.salary, NEW.salary, NOW());\n    RETURN NEW;\nEND;\n$$ LANGUAGE plpgsql;\n\nCREATE TRIGGER trg_salary_audit\n    AFTER UPDATE OF salary ON employees\n    FOR EACH ROW\n    WHEN (OLD.salary IS DISTINCT FROM NEW.salary)\n    EXECUTE FUNCTION log_salary_change();"},
{name:"Trigger Patterns & Pitfalls",theory:["Common patterns: auto-timestamp, audit trail, maintaining denormalized counts, enforcing business rules.","Pitfalls: cascading triggers (trigger fires another trigger), performance overhead, hard to debug.","Best practice: keep triggers simple; complex logic should be in application code or procedures."],code:"-- Pattern: maintain denormalized count\nCREATE OR REPLACE FUNCTION update_dept_count()\nRETURNS TRIGGER AS $$\nBEGIN\n    IF TG_OP = 'INSERT' THEN\n        UPDATE departments SET employee_count = employee_count + 1\n        WHERE dept_id = NEW.dept_id;\n    ELSIF TG_OP = 'DELETE' THEN\n        UPDATE departments SET employee_count = employee_count - 1\n        WHERE dept_id = OLD.dept_id;\n    ELSIF TG_OP = 'UPDATE' AND OLD.dept_id != NEW.dept_id THEN\n        UPDATE departments SET employee_count = employee_count - 1\n        WHERE dept_id = OLD.dept_id;\n        UPDATE departments SET employee_count = employee_count + 1\n        WHERE dept_id = NEW.dept_id;\n    END IF;\n    RETURN COALESCE(NEW, OLD);\nEND;\n$$ LANGUAGE plpgsql;\n\nCREATE TRIGGER trg_dept_count\n    AFTER INSERT OR UPDATE OR DELETE ON employees\n    FOR EACH ROW EXECUTE FUNCTION update_dept_count();"}
],
examples:[
{title:"Complete Audit Trigger",desc:"Automatically log all changes to a table into an audit table.",code:"CREATE TABLE audit_log (\n    id         BIGSERIAL PRIMARY KEY,\n    table_name VARCHAR(50),\n    action     VARCHAR(10),\n    row_id     INT,\n    old_data   JSONB,\n    new_data   JSONB,\n    changed_by VARCHAR(100) DEFAULT current_user,\n    changed_at TIMESTAMP DEFAULT NOW()\n);\n\nCREATE OR REPLACE FUNCTION audit_trigger()\nRETURNS TRIGGER AS $$\nBEGIN\n    IF TG_OP = 'INSERT' THEN\n        INSERT INTO audit_log (table_name, action, row_id, new_data)\n        VALUES (TG_TABLE_NAME, 'INSERT', NEW.emp_id, to_jsonb(NEW));\n    ELSIF TG_OP = 'UPDATE' THEN\n        INSERT INTO audit_log (table_name, action, row_id, old_data, new_data)\n        VALUES (TG_TABLE_NAME, 'UPDATE', NEW.emp_id, to_jsonb(OLD), to_jsonb(NEW));\n    ELSIF TG_OP = 'DELETE' THEN\n        INSERT INTO audit_log (table_name, action, row_id, old_data)\n        VALUES (TG_TABLE_NAME, 'DELETE', OLD.emp_id, to_jsonb(OLD));\n    END IF;\n    RETURN COALESCE(NEW, OLD);\nEND;\n$$ LANGUAGE plpgsql;\n\nCREATE TRIGGER trg_employees_audit\n    AFTER INSERT OR UPDATE OR DELETE ON employees\n    FOR EACH ROW EXECUTE FUNCTION audit_trigger();"}
],

{id:6,title:"Error Handling",color:"#22d3ee",chips:["EXCEPTION","TRY/CATCH","RAISE","SQLSTATE","Custom Errors"],
subtopics:[
{name:"Exception Handling (PL/pgSQL)",theory:["EXCEPTION block catches errors in a BEGIN...END block; prevents transaction abort.","Named exceptions: NO_DATA_FOUND, UNIQUE_VIOLATION, FOREIGN_KEY_VIOLATION, etc.","SQLSTATE codes: 5-char codes for specific errors (23505 = unique violation, 23503 = FK violation)."],code:"-- Basic exception handling\nDO $$\nDECLARE\n    v_name VARCHAR;\nBEGIN\n    SELECT name INTO STRICT v_name\n    FROM employees WHERE emp_id = 99999;  -- doesn't exist\n\n    RAISE NOTICE 'Found: %', v_name;\nEXCEPTION\n    WHEN NO_DATA_FOUND THEN\n        RAISE NOTICE 'Employee not found!';\n    WHEN TOO_MANY_ROWS THEN\n        RAISE NOTICE 'Multiple matches found!';\n    WHEN OTHERS THEN\n        RAISE NOTICE 'Unexpected error: % %', SQLSTATE, SQLERRM;\nEND $$;\n\n-- Catching specific violations\nDO $$\nBEGIN\n    INSERT INTO employees (emp_id, name, email)\n    VALUES (1, 'Duplicate', 'existing@mail.com');\nEXCEPTION\n    WHEN unique_violation THEN\n        RAISE NOTICE 'Email or ID already exists';\n    WHEN foreign_key_violation THEN\n        RAISE NOTICE 'Referenced record does not exist';\nEND $$;"},
{name:"RAISE & Custom Exceptions",theory:["RAISE NOTICE: informational message (doesn't stop execution); RAISE WARNING: warning.","RAISE EXCEPTION: stops execution and throws an error; caught by EXCEPTION block or caller.","Custom error codes with ERRCODE; add DETAIL and HINT for better error messages."],code:"-- RAISE levels\nDO $$\nBEGIN\n    RAISE DEBUG 'Debug info';       -- only visible if client_min_messages = debug\n    RAISE NOTICE 'Info message';     -- informational\n    RAISE WARNING 'Be careful!';     -- warning (continues)\n    RAISE EXCEPTION 'Something broke!';  -- stops execution\nEND $$;\n\n-- Custom exceptions with details\nCREATE OR REPLACE FUNCTION withdraw(account_id INT, amount DECIMAL)\nRETURNS VOID AS $$\nDECLARE\n    v_balance DECIMAL;\nBEGIN\n    SELECT balance INTO v_balance FROM accounts WHERE id = account_id;\n\n    IF v_balance IS NULL THEN\n        RAISE EXCEPTION 'Account not found'\n            USING ERRCODE = 'P0001',\n                  DETAIL = 'Account ID: ' || account_id,\n                  HINT = 'Verify the account exists';\n    END IF;\n\n    IF v_balance < amount THEN\n        RAISE EXCEPTION 'Insufficient funds'\n            USING ERRCODE = 'P0002',\n                  DETAIL = format('Balance: %s, Requested: %s', v_balance, amount);\n    END IF;\n\n    UPDATE accounts SET balance = balance - amount WHERE id = account_id;\nEND;\n$$ LANGUAGE plpgsql;"},
{name:"T-SQL Error Handling (TRY/CATCH)",theory:["SQL Server uses BEGIN TRY...END TRY / BEGIN CATCH...END CATCH for structured error handling.","ERROR_NUMBER(), ERROR_MESSAGE(), ERROR_LINE() provide error details in CATCH block.","THROW re-raises the caught error; RAISERROR creates custom error messages."],code:"-- SQL Server TRY/CATCH pattern:\n-- BEGIN TRY\n--     BEGIN TRANSACTION;\n--     INSERT INTO orders (...) VALUES (...);\n--     INSERT INTO order_items (...) VALUES (...);\n--     COMMIT TRANSACTION;\n-- END TRY\n-- BEGIN CATCH\n--     ROLLBACK TRANSACTION;\n--     DECLARE @msg NVARCHAR(4000) = ERROR_MESSAGE();\n--     DECLARE @sev INT = ERROR_SEVERITY();\n--     RAISERROR(@msg, @sev, 1);\n-- END CATCH;\n\n-- PostgreSQL equivalent:\nDO $$\nBEGIN\n    -- Simulate TRY/CATCH with nested blocks\n    BEGIN\n        INSERT INTO orders (customer_id, amount) VALUES (999, 100);\n        INSERT INTO order_items (order_id, product_id) VALUES (currval('orders_id_seq'), 1);\n    EXCEPTION\n        WHEN OTHERS THEN\n            RAISE WARNING 'Transaction failed: %', SQLERRM;\n            -- In procedure: ROLLBACK;\n            RAISE;  -- re-throw\n    END;\nEND $$;"}
],
examples:[
{title:"Robust Error Handling Pattern",desc:"Production-ready error handling with logging.",code:"CREATE OR REPLACE FUNCTION safe_transfer(\n    p_from INT, p_to INT, p_amount DECIMAL\n)\nRETURNS BOOLEAN AS $$\nDECLARE\n    v_balance DECIMAL;\nBEGIN\n    -- Validate\n    IF p_amount <= 0 THEN\n        RAISE EXCEPTION 'Invalid amount: %', p_amount\n            USING ERRCODE = 'P0001';\n    END IF;\n\n    -- Lock and check balance\n    SELECT balance INTO v_balance\n    FROM accounts WHERE id = p_from FOR UPDATE;\n\n    IF NOT FOUND THEN\n        RAISE EXCEPTION 'Source account % not found', p_from;\n    END IF;\n\n    IF v_balance < p_amount THEN\n        RAISE EXCEPTION 'Insufficient funds (balance: %, needed: %)', v_balance, p_amount;\n    END IF;\n\n    -- Execute transfer\n    UPDATE accounts SET balance = balance - p_amount WHERE id = p_from;\n    UPDATE accounts SET balance = balance + p_amount WHERE id = p_to;\n\n    RETURN TRUE;\nEXCEPTION\n    WHEN OTHERS THEN\n        -- Log error\n        INSERT INTO error_log (function_name, error_code, error_message, created_at)\n        VALUES ('safe_transfer', SQLSTATE, SQLERRM, NOW());\n        RETURN FALSE;\nEND;\n$$ LANGUAGE plpgsql;"}
],

{id:7,title:"Dynamic SQL & Security",color:"#fb923c",chips:["EXECUTE","Format","SQL Injection","Prepared Statements"],
subtopics:[
{name:"Dynamic SQL",theory:["Dynamic SQL builds and executes SQL strings at runtime; use EXECUTE in PL/pgSQL.","Needed when table names, column names, or entire query structure is determined at runtime.","Always use parameterized queries (USING clause) for values to prevent SQL injection."],code:"-- Basic dynamic SQL\nDO $$\nDECLARE\n    v_table TEXT := 'employees';\n    v_count INT;\nBEGIN\n    EXECUTE format('SELECT COUNT(*) FROM %I', v_table)\n    INTO v_count;\n    RAISE NOTICE 'Table % has % rows', v_table, v_count;\nEND $$;\n\n-- Dynamic SQL with parameters (SAFE)\nDO $$\nDECLARE\n    v_sql TEXT;\n    v_result RECORD;\nBEGIN\n    v_sql := 'SELECT name, salary FROM employees WHERE dept_id = $1 AND salary > $2';\n    FOR v_result IN EXECUTE v_sql USING 1, 70000 LOOP\n        RAISE NOTICE '% : %', v_result.name, v_result.salary;\n    END LOOP;\nEND $$;\n\n-- format() with identifiers (%I) and literals (%L)\nDO $$\nDECLARE\n    v_col TEXT := 'salary';\n    v_table TEXT := 'employees';\nBEGIN\n    EXECUTE format('SELECT AVG(%I) FROM %I', v_col, v_table);\nEND $$;"},
{name:"SQL Injection Prevention",theory:["NEVER concatenate user input directly into SQL strings; always use parameterization.","format(%I) safely quotes identifiers; format(%L) safely quotes literal values.","USING clause in EXECUTE passes values as parameters (like prepared statements)."],code:"-- VULNERABLE (never do this!)\n-- v_sql := 'SELECT * FROM users WHERE name = ''' || user_input || '''';\n-- If user_input = \"'; DROP TABLE users; --\"  → disaster!\n\n-- SAFE: using parameters\nCREATE OR REPLACE FUNCTION find_user(p_name TEXT)\nRETURNS SETOF users AS $$\nBEGIN\n    RETURN QUERY EXECUTE\n        'SELECT * FROM users WHERE name = $1'\n    USING p_name;  -- parameterized, safe!\nEND;\n$$ LANGUAGE plpgsql;\n\n-- SAFE: format with %I and %L\nCREATE OR REPLACE FUNCTION dynamic_filter(\n    p_table TEXT, p_column TEXT, p_value TEXT\n)\nRETURNS INT AS $$\nDECLARE\n    v_count INT;\nBEGIN\n    -- %I quotes identifiers, %L quotes literals\n    EXECUTE format(\n        'SELECT COUNT(*) FROM %I WHERE %I = %L',\n        p_table, p_column, p_value\n    ) INTO v_count;\n    RETURN v_count;\nEND;\n$$ LANGUAGE plpgsql;\n\n-- Even safer: validate table/column names against catalog\n-- SELECT EXISTS(SELECT 1 FROM information_schema.tables WHERE table_name = p_table)"},
{name:"Dynamic Table Operations",theory:["Dynamic DDL: create/alter/drop tables with runtime-determined names (migrations, multi-tenant).","Dynamic pivot: when pivot columns are determined by data at runtime.","Use sparingly: dynamic SQL is harder to debug, cannot be plan-cached, and is error-prone."],code:"-- Dynamic table creation (multi-tenant pattern)\nCREATE OR REPLACE FUNCTION create_tenant_schema(tenant_name TEXT)\nRETURNS VOID AS $$\nBEGIN\n    -- Validate tenant name (prevent injection)\n    IF tenant_name !~ '^[a-z][a-z0-9_]{2,20}$' THEN\n        RAISE EXCEPTION 'Invalid tenant name: %', tenant_name;\n    END IF;\n\n    EXECUTE format('CREATE SCHEMA %I', tenant_name);\n    EXECUTE format('CREATE TABLE %I.users (id SERIAL PRIMARY KEY, name TEXT)', tenant_name);\n    EXECUTE format('CREATE TABLE %I.orders (id SERIAL PRIMARY KEY, user_id INT)', tenant_name);\n\n    RAISE NOTICE 'Created schema and tables for tenant: %', tenant_name;\nEND;\n$$ LANGUAGE plpgsql;\n\n-- Dynamic pivot (runtime columns)\nCREATE OR REPLACE FUNCTION dynamic_pivot()\nRETURNS TEXT AS $$\nDECLARE\n    v_columns TEXT;\n    v_sql TEXT;\nBEGIN\n    -- Build column list from data\n    SELECT STRING_AGG(\n        format('SUM(CASE WHEN category = %L THEN amount END) AS %I', category, category),\n        ', '\n    ) INTO v_columns\n    FROM (SELECT DISTINCT category FROM sales ORDER BY category) t;\n\n    v_sql := format('SELECT month, %s FROM monthly_sales GROUP BY month', v_columns);\n    RAISE NOTICE 'Generated SQL: %', v_sql;\n    RETURN v_sql;\nEND;\n$$ LANGUAGE plpgsql;"}
],
examples:[
{title:"Safe Dynamic Search",desc:"Build a flexible search query with optional filters.",code:"CREATE OR REPLACE FUNCTION search_employees(\n    p_name TEXT DEFAULT NULL,\n    p_dept_id INT DEFAULT NULL,\n    p_min_salary DECIMAL DEFAULT NULL,\n    p_max_salary DECIMAL DEFAULT NULL\n)\nRETURNS SETOF employees AS $$\nDECLARE\n    v_sql TEXT := 'SELECT * FROM employees WHERE 1=1';\n    v_params TEXT[] := '{}';\n    v_idx INT := 0;\nBEGIN\n    IF p_name IS NOT NULL THEN\n        v_idx := v_idx + 1;\n        v_sql := v_sql || format(' AND name ILIKE $%s', v_idx);\n    END IF;\n    IF p_dept_id IS NOT NULL THEN\n        v_idx := v_idx + 1;\n        v_sql := v_sql || format(' AND dept_id = $%s', v_idx);\n    END IF;\n\n    -- Execute with USING for all params\n    RETURN QUERY EXECUTE v_sql\n    USING\n        CASE WHEN p_name IS NOT NULL THEN '%' || p_name || '%' END,\n        p_dept_id;\nEND;\n$$ LANGUAGE plpgsql;"}
],

function highlightSQL(code) {
    let html = code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    html = html.replace(/(--.*)/g, '<span style="color:#6b7280">$1</span>');
    html = html.replace(/('(?:[^'\\]|\\.)*')/g, '<span style="color:#fbbf24">$1</span>');
    html = html.replace(/\b(\d+\.?\d*)\b/g, '<span style="color:#f472b6">$1</span>');
    const keywords = ['SELECT','FROM','WHERE','INSERT','INTO','VALUES','UPDATE','SET','DELETE','CREATE','ALTER','DROP','TABLE','INDEX','VIEW','SCHEMA','BEGIN','COMMIT','ROLLBACK','JOIN','INNER','LEFT','RIGHT','FULL','OUTER','CROSS','ON','AND','OR','NOT','IN','EXISTS','BETWEEN','LIKE','IS','NULL','AS','CASE','WHEN','THEN','ELSE','END','ORDER','BY','GROUP','HAVING','LIMIT','UNION','ALL','DISTINCT','ASC','DESC','WITH','OVER','PARTITION','PRIMARY','KEY','FOREIGN','REFERENCES','UNIQUE','CHECK','DEFAULT','CONSTRAINT','CASCADE','IF','ELSIF','REPLACE','SERIAL','RETURNS','RETURN','DECLARE','FUNCTION','PROCEDURE','TRIGGER','BEFORE','AFTER','FOR','EACH','ROW','EXECUTE','TRUNCATE','ADD','COLUMN','RENAME','TO','TYPE','USING','DO','RAISE','EXCEPTION','NOTICE','WARNING','TRUE','FALSE','INT','INTEGER','BIGINT','DECIMAL','NUMERIC','FLOAT','VARCHAR','CHAR','TEXT','BOOLEAN','DATE','TIMESTAMP','INTERVAL','JSONB','JSON','RECORD','LOOP','WHILE','EXIT','WHEN','FOUND','STRICT','CURSOR','OPEN','FETCH','CLOSE','NEXT','NEW','OLD','TG_OP','TG_TABLE_NAME','LANGUAGE','PLPGSQL','SQL','IMMUTABLE','STABLE','VOLATILE','SETOF','QUERY','DIAGNOSTICS','ROW_COUNT','FORMAT','SQLSTATE','SQLERRM','ERRCODE','DETAIL','HINT','COALESCE','NOW','CURRENT_DATE','COUNT','SUM','AVG','MIN','MAX','ROUND','RANK','ILIKE','CALL','INOUT','OUT','GET','INTO','VOID','OTHERS'];
    const kwPattern = new RegExp('\\b(' + keywords.join('|') + ')\\b', 'gi');
    html = html.replace(kwPattern, '<span style="color:#22d3ee">$1</span>');
    return html;
}
function getProgress(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||{};}catch{return {};}}
function saveProgress(d){localStorage.setItem(STORAGE_KEY,JSON.stringify(d));}
function getTotalPractice(){return topics.reduce((s,t)=>s+t.practice.length,0);}
function getCompletedCount(){return Object.values(getProgress()).filter(v=>v).length;}
function updateProgressBar(){const t=getTotalPractice(),d=getCompletedCount();document.getElementById('progressFill').style.width=(t>0?d/t*100:0)+'%';document.getElementById('progressText').textContent=d+' / '+t;}
function getTopicProgress(id){const p=getProgress(),t=topics.find(x=>x.id===id);if(!t)return{done:0,total:0};let d=0;t.practice.forEach((_,i)=>{if(p[id+'_'+i])d++;});return{done:d,total:t.practice.length};}
function renderRoadmap(){const c=document.getElementById('roadmapContainer');c.innerHTML='';topics.forEach(t=>{const p=getTopicProgress(t.id),n=document.createElement('div');n.className='node';n.onclick=()=>showDetail(t.id);n.innerHTML=`<div class="node-number" style="border-color:${t.color};color:${t.color}">${t.id}</div><div class="node-card"><div class="node-title" style="color:${t.color}">${t.title}</div><div class="node-chips">${t.chips.map(c=>'<span class="chip">'+c+'</span>').join('')}</div><div class="node-progress">${p.done} / ${p.total} practice completed</div></div>`;c.appendChild(n);});}
function showDetail(id){currentTopic=topics.find(t=>t.id===id);if(!currentTopic)return;document.getElementById('roadmapPage').classList.remove('active');document.getElementById('detailPage').classList.add('active');document.getElementById('detailTitle').textContent=currentTopic.title;document.getElementById('detailTitle').style.color=currentTopic.color;document.getElementById('detailSubtitle').textContent=currentTopic.subtopics.map(s=>s.name).join(' • ');renderTheory();renderExamples();renderPractice();switchTab('theory');window.scrollTo(0,0);}
function showRoadmap(){document.getElementById('detailPage').classList.remove('active');document.getElementById('roadmapPage').classList.add('active');renderRoadmap();updateProgressBar();}
function switchTab(tab){document.querySelectorAll('.tab').forEach((t,i)=>{t.classList.toggle('active',['theory','examples','practice','solutions'][i]===tab);});document.querySelectorAll('.tab-content').forEach((tc,i)=>{tc.classList.toggle('active',['theory','examples','practice','solutions'][i]===tab);});if(tab==='solutions')renderSolutions();}
function renderTheory(){document.getElementById('theoryContent').innerHTML=currentTopic.subtopics.map(s=>`<div class="theory-section"><div class="theory-title">${s.name}</div>${s.theory.map(t=>'<p class="theory-point">'+t+'</p>').join('')}<pre class="code-block">${highlightSQL(s.code)}</pre></div>`).join('');}
function renderExamples(){document.getElementById('examplesContent').innerHTML=currentTopic.examples.map(e=>`<div class="example-card"><div class="example-title">${e.title}</div><p class="example-desc">${e.desc}</p><pre class="code-block">${highlightSQL(e.code)}</pre></div>`).join('');}
function renderPractice(){const prog=getProgress();document.getElementById('practiceContent').innerHTML=currentTopic.practice.map((p,i)=>{const key=currentTopic.id+'_'+i,ch=prog[key]?'checked':'',dc=prog[key]?'done':'',df=p.d==='E'?'easy':p.d==='M'?'medium':'hard',dl=p.d==='E'?'Easy':p.d==='M'?'Medium':'Hard';return`<div class="practice-item ${dc}"><input type="checkbox" ${ch} onchange="togglePractice('${key}',this)"><span class="practice-text">${i+1}. ${p.q}</span><span class="difficulty ${df}">${dl}</span></div>`;}).join('');}
function togglePractice(key,el){const p=getProgress();p[key]=el.checked;saveProgress(p);updateProgressBar();el.parentElement.classList.toggle('done',el.checked);}
function renderSolutions(){document.getElementById('solutionsContent').innerHTML='<div class="theory-section"><div class="theory-title">Solutions Coming Soon</div><p class="theory-point">Practice solving these problems on your own first. Solutions will be added in a future update.</p></div>';}
renderRoadmap();updateProgressBar();
</script>
</body>
</html>
