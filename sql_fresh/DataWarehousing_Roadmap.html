<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Warehousing Roadmap</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#080c14;--card:#141d2e;--border:#1e2d45;--text:#dde4f0;--text-dim:#8892a4;--green:#4ade80;--cyan:#22d3ee;--purple:#a78bfa;--gradient:linear-gradient(135deg,#4ade80,#22d3ee,#a78bfa)}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
code,pre,.code{font-family:'JetBrains Mono',monospace}
.header{position:sticky;top:0;z-index:1000;background:rgba(8,12,20,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:12px 24px}
.header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:1.4rem;font-weight:700;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.progress-container{flex:1;max-width:300px;margin-left:24px}
.progress-label{font-size:0.7rem;color:var(--text-dim);margin-bottom:4px;text-align:right}
.progress-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:var(--gradient);border-radius:3px;transition:width 0.5s ease}
.page{display:none;padding:40px 24px 80px;max-width:900px;margin:0 auto;animation:fadeIn 0.3s ease}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.roadmap{position:relative;padding-left:60px}
.roadmap::before{content:'';position:absolute;left:28px;top:0;bottom:0;width:2px;background:linear-gradient(to bottom,var(--green),var(--cyan),var(--purple));opacity:0.4}
.node{position:relative;margin-bottom:24px;cursor:pointer;transition:transform 0.2s ease}
.node:hover{transform:translateX(4px)}
.node-number{position:absolute;left:-48px;top:16px;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.8rem;border:2px solid;background:var(--bg)}
.node-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px 24px;transition:border-color 0.2s,box-shadow 0.2s}
.node:hover .node-card{border-color:var(--cyan);box-shadow:0 4px 20px rgba(34,211,238,0.1)}
.node-title{font-size:1.1rem;font-weight:600;margin-bottom:8px}
.node-chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{font-size:0.65rem;padding:3px 8px;border-radius:4px;background:rgba(255,255,255,0.05);border:1px solid var(--border);color:var(--text-dim)}
.node-progress{font-size:0.7rem;color:var(--text-dim);margin-top:8px}
.back-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);cursor:pointer;font-family:'Sora',sans-serif;font-size:0.85rem;margin-bottom:24px;transition:border-color 0.2s}
.back-btn:hover{border-color:var(--cyan)}
.detail-header{margin-bottom:24px}
.detail-title{font-size:1.8rem;font-weight:700;margin-bottom:8px}
.detail-subtitle{font-size:0.85rem;color:var(--text-dim)}
.tabs{display:flex;gap:4px;margin-bottom:24px;background:var(--card);border-radius:10px;padding:4px;border:1px solid var(--border)}
.tab{flex:1;padding:10px 16px;text-align:center;border-radius:8px;cursor:pointer;font-size:0.85rem;font-weight:500;color:var(--text-dim);transition:all 0.2s}
.tab.active{background:var(--border);color:var(--text)}
.tab:hover:not(.active){color:var(--text)}
.tab-content{display:none;animation:fadeIn 0.3s ease}
.tab-content.active{display:block}
.theory-section{margin-bottom:24px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px}
.theory-title{font-size:1rem;font-weight:600;margin-bottom:12px;color:var(--cyan)}
.theory-point{font-size:0.85rem;color:var(--text-dim);margin-bottom:8px;padding-left:16px;position:relative;line-height:1.6}
.theory-point::before{content:'>';position:absolute;left:0;color:var(--green)}
pre.code-block{background:rgba(0,0,0,0.4);border:1px solid var(--border);border-radius:8px;padding:16px;margin-top:12px;overflow-x:auto;font-size:0.8rem;line-height:1.6}
.example-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:16px}
.example-title{font-size:0.9rem;font-weight:600;margin-bottom:8px;color:var(--purple)}
.example-desc{font-size:0.82rem;color:var(--text-dim);margin-bottom:12px}
.practice-item{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;transition:border-color 0.2s}
.practice-item:hover{border-color:var(--cyan)}
.practice-item input[type="checkbox"]{width:18px;height:18px;margin-top:2px;accent-color:var(--green);cursor:pointer}
.practice-item.done{opacity:0.6;border-color:var(--green)}
.practice-text{flex:1;font-size:0.82rem;line-height:1.5}
.difficulty{font-size:0.65rem;padding:2px 8px;border-radius:4px;font-weight:600;white-space:nowrap}
.difficulty.easy{background:rgba(74,222,128,0.15);color:#4ade80}
.difficulty.medium{background:rgba(251,191,36,0.15);color:#fbbf24}
.difficulty.hard{background:rgba(244,114,182,0.15);color:#f472b6}
@media(max-width:640px){.roadmap{padding-left:40px}.roadmap::before{left:16px}.node-number{left:-32px;width:26px;height:26px;font-size:0.7rem}.header-inner{flex-wrap:wrap;gap:8px}.progress-container{max-width:100%;margin-left:0}}
</style>
</head>

<script>
let currentTopic = null;
const STORAGE_KEY = 'dw_roadmap_progress';

const topics = [
{id:1,title:"OLTP vs OLAP",color:"#38bdf8",chips:["Transactional","Analytical","Row vs Column","Workloads"],
subtopics:[
{name:"OLTP Characteristics",theory:["OLTP (Online Transaction Processing): handles day-to-day operations — inserts, updates, lookups.","Optimized for: high concurrency, low latency, row-level operations, normalized schema.","Examples: e-commerce checkouts, banking transactions, user registrations, inventory updates."],code:"-- OLTP query patterns: simple, fast, row-level\n-- 1. Point lookup\nSELECT * FROM orders WHERE order_id = 12345;\n\n-- 2. Insert new record\nINSERT INTO orders (customer_id, product_id, quantity, amount)\nVALUES (42, 101, 2, 59.98);\n\n-- 3. Update status\nUPDATE orders SET status = 'shipped' WHERE order_id = 12345;\n\n-- 4. Short join (few rows)\nSELECT o.order_id, c.name, o.amount\nFROM orders o JOIN customers c ON o.customer_id = c.customer_id\nWHERE o.order_id = 12345;\n\n-- OLTP schema: normalized (3NF+)\n-- Many small tables, foreign keys, indexes on PK and lookup columns"},
{name:"OLAP Characteristics",theory:["OLAP (Online Analytical Processing): handles reporting, dashboards, trend analysis.","Optimized for: large scans, aggregations, complex joins across millions/billions of rows.","Column-oriented storage: reads only needed columns; massive compression for repeated values."],code:"-- OLAP query patterns: complex, scan-heavy, aggregate\n-- 1. Monthly revenue by region and category\nSELECT region, category,\n    DATE_TRUNC('month', order_date) AS month,\n    SUM(revenue) AS total_revenue,\n    COUNT(DISTINCT customer_id) AS unique_customers\nFROM fact_sales\nWHERE order_date BETWEEN '2024-01-01' AND '2024-12-31'\nGROUP BY region, category, DATE_TRUNC('month', order_date)\nORDER BY month, total_revenue DESC;\n\n-- 2. Year-over-year comparison\nSELECT category,\n    SUM(CASE WHEN year = 2024 THEN revenue END) AS rev_2024,\n    SUM(CASE WHEN year = 2023 THEN revenue END) AS rev_2023,\n    ROUND(100.0 * (SUM(CASE WHEN year = 2024 THEN revenue END) -\n        SUM(CASE WHEN year = 2023 THEN revenue END)) /\n        NULLIF(SUM(CASE WHEN year = 2023 THEN revenue END), 0), 1) AS growth_pct\nFROM fact_sales\nGROUP BY category;"},
{name:"When to Use Each",theory:["OLTP: your application database (PostgreSQL, MySQL, SQL Server) — serves users directly.","OLAP: your analytics warehouse (Snowflake, BigQuery, Redshift, ClickHouse) — serves analysts/reports.","Modern pattern: OLTP → ETL/ELT → OLAP; keep both, optimized for their workload."],code:"-- Architecture overview:\n-- [App] → [OLTP DB] → [ETL Pipeline] → [Data Warehouse]\n--                                              ↓\n--                                    [BI Tools / Dashboards]\n\n-- OLTP (PostgreSQL): normalized, indexes, transactions\nCREATE TABLE orders (order_id SERIAL PRIMARY KEY, ...);\nCREATE TABLE order_items (item_id SERIAL PRIMARY KEY, order_id INT REFERENCES orders, ...);\nCREATE TABLE products (product_id SERIAL PRIMARY KEY, ...);\n\n-- OLAP (warehouse): denormalized, columnar, partitioned\nCREATE TABLE fact_sales (\n    sale_date      DATE,\n    product_key    INT,\n    customer_key   INT,\n    store_key      INT,\n    quantity       INT,\n    revenue        DECIMAL(12,2),\n    cost           DECIMAL(12,2)\n) PARTITION BY RANGE (sale_date);\n-- No foreign keys, no normalization — optimized for scans"}
],
examples:[
{title:"OLTP vs OLAP Query Comparison",desc:"Same business question, different approaches for each system.",code:"-- Question: What is our total revenue by product category this year?\n\n-- OLTP approach (slow on large data):\nSELECT c.category_name, SUM(oi.quantity * oi.unit_price) AS revenue\nFROM order_items oi\nJOIN orders o ON oi.order_id = o.order_id\nJOIN products p ON oi.product_id = p.product_id\nJOIN categories c ON p.category_id = c.category_id\nWHERE o.order_date >= '2024-01-01'\nGROUP BY c.category_name\nORDER BY revenue DESC;\n-- 4 JOINs, slow on millions of rows\n\n-- OLAP approach (fast — pre-joined, columnar):\nSELECT category, SUM(revenue) AS total_revenue\nFROM fact_sales\nWHERE sale_date >= '2024-01-01'\nGROUP BY category\nORDER BY total_revenue DESC;\n-- Single table scan, columnar reads only 2 columns"}
],
practice:[

{q:"Design an architecture diagram showing OLTP → ETL → OLAP with specific technology choices.",d:"H"}
]},

{id:2,title:"Star & Snowflake Schemas",color:"#34d399",chips:["Star Schema","Snowflake","Fact Tables","Dimension Tables"],
subtopics:[
{name:"Star Schema",theory:["Star schema: central fact table surrounded by dimension tables; simplest DW design.","Fact table: contains measurements/metrics (revenue, quantity, cost) and foreign keys to dimensions.","Dimension tables: descriptive attributes (customer name, product category, store location)."],code:"-- Star Schema: Sales analysis\n\n-- Fact table (center of the star)\nCREATE TABLE fact_sales (\n    sale_key       BIGSERIAL PRIMARY KEY,\n    date_key       INT NOT NULL,\n    product_key    INT NOT NULL,\n    customer_key   INT NOT NULL,\n    store_key      INT NOT NULL,\n    -- Measures (what we analyze)\n    quantity       INT NOT NULL,\n    unit_price     DECIMAL(10,2) NOT NULL,\n    revenue        DECIMAL(12,2) NOT NULL,\n    cost           DECIMAL(12,2) NOT NULL,\n    discount       DECIMAL(10,2) DEFAULT 0\n);\n\n-- Dimension tables (points of the star)\nCREATE TABLE dim_date (\n    date_key       INT PRIMARY KEY,\n    full_date      DATE NOT NULL,\n    year           INT, quarter INT, month INT, day INT,\n    day_of_week    VARCHAR(10),\n    is_weekend     BOOLEAN,\n    is_holiday     BOOLEAN,\n    fiscal_year    INT, fiscal_quarter INT\n);\n\nCREATE TABLE dim_product (\n    product_key    INT PRIMARY KEY,\n    product_id     VARCHAR(20),  -- business/natural key\n    product_name   VARCHAR(200),\n    category       VARCHAR(50),\n    subcategory    VARCHAR(50),\n    brand          VARCHAR(50),\n    unit_cost      DECIMAL(10,2)\n);"},
{name:"Snowflake Schema",theory:["Snowflake: dimension tables are further normalized (category → subcategory in separate table).","Pros: less storage, less redundancy; Cons: more JOINs, slower queries, more complex.","Star schema is preferred for most DW because query speed matters more than storage savings."],code:"-- Snowflake: product dimension is normalized\nCREATE TABLE dim_category (\n    category_key INT PRIMARY KEY,\n    category_name VARCHAR(50)\n);\n\nCREATE TABLE dim_subcategory (\n    subcategory_key INT PRIMARY KEY,\n    subcategory_name VARCHAR(50),\n    category_key INT REFERENCES dim_category(category_key)\n);\n\nCREATE TABLE dim_product (\n    product_key     INT PRIMARY KEY,\n    product_name    VARCHAR(200),\n    brand           VARCHAR(50),\n    subcategory_key INT REFERENCES dim_subcategory(subcategory_key)\n);\n\n-- Star schema equivalent (denormalized — preferred):\nCREATE TABLE dim_product_star (\n    product_key     INT PRIMARY KEY,\n    product_name    VARCHAR(200),\n    brand           VARCHAR(50),\n    subcategory     VARCHAR(50),  -- flattened\n    category        VARCHAR(50)   -- flattened\n);\n-- Star: 1 JOIN to dim_product\n-- Snowflake: 3 JOINs (product → subcategory → category)"},
{name:"Fact Table Types",theory:["Transaction fact: one row per event (each sale, each click); most detailed grain.","Periodic snapshot: one row per period per entity (daily balance, monthly inventory).","Accumulating snapshot: one row per process with milestones (order lifecycle: placed → shipped → delivered)."],code:"-- Transaction fact (most common)\nCREATE TABLE fact_sales (\n    date_key INT, product_key INT, customer_key INT,\n    quantity INT, revenue DECIMAL(12,2)\n);\n-- Grain: one row per line item sold\n\n-- Periodic snapshot fact\nCREATE TABLE fact_daily_inventory (\n    date_key       INT,\n    product_key    INT,\n    warehouse_key  INT,\n    qty_on_hand    INT,\n    qty_on_order   INT,\n    days_supply    INT\n);\n-- Grain: one row per product per warehouse per day\n\n-- Accumulating snapshot fact\nCREATE TABLE fact_order_lifecycle (\n    order_key         INT PRIMARY KEY,\n    customer_key      INT,\n    order_date_key    INT,  -- milestone 1\n    ship_date_key     INT,  -- milestone 2\n    deliver_date_key  INT,  -- milestone 3\n    return_date_key   INT,  -- milestone 4 (nullable)\n    order_amount      DECIMAL(12,2),\n    days_to_ship      INT,\n    days_to_deliver   INT\n);\n-- Grain: one row per order, updated as it progresses"}
],
examples:[
{title:"Complete Star Schema for Retail",desc:"A production-ready star schema for retail analytics.",code:"-- Dimensions\nCREATE TABLE dim_date (date_key INT PRIMARY KEY, full_date DATE, year INT, quarter INT, month INT, month_name VARCHAR(10), day INT, day_name VARCHAR(10), is_weekend BOOLEAN);\nCREATE TABLE dim_customer (customer_key INT PRIMARY KEY, customer_id VARCHAR(20), name VARCHAR(100), city VARCHAR(50), state VARCHAR(50), country VARCHAR(50), segment VARCHAR(20));\nCREATE TABLE dim_product (product_key INT PRIMARY KEY, sku VARCHAR(20), name VARCHAR(200), category VARCHAR(50), subcategory VARCHAR(50), brand VARCHAR(50));\nCREATE TABLE dim_store (store_key INT PRIMARY KEY, store_id VARCHAR(10), store_name VARCHAR(100), city VARCHAR(50), state VARCHAR(50), region VARCHAR(30));\n\n-- Fact\nCREATE TABLE fact_sales (\n    date_key INT REFERENCES dim_date,\n    customer_key INT REFERENCES dim_customer,\n    product_key INT REFERENCES dim_product,\n    store_key INT REFERENCES dim_store,\n    quantity INT, revenue DECIMAL(12,2), cost DECIMAL(12,2), profit DECIMAL(12,2)\n);\n\n-- Typical analytical query:\nSELECT d.year, d.quarter, p.category, s.region,\n    SUM(f.revenue) AS revenue, SUM(f.profit) AS profit\nFROM fact_sales f\nJOIN dim_date d ON f.date_key = d.date_key\nJOIN dim_product p ON f.product_key = p.product_key\nJOIN dim_store s ON f.store_key = s.store_key\nWHERE d.year = 2024\nGROUP BY d.year, d.quarter, p.category, s.region;"}
],
practice:[
{q:"Draw (describe) a star schema with 1 fact table and 3 dimension tables.",d:"E"},
{q:"Create a dim_date table with common date attributes (year, quarter, month, day_of_week).",d:"E"},
{q:"Explain the difference between star and snowflake schemas with pros/cons.",d:"M"},
{q:"Design a star schema for a streaming music service (plays fact, artist/song/user dimensions).",d:"M"},
{q:"Create all three fact table types (transaction, periodic, accumulating) for an order system.",d:"M"},
{q:"Build a complete star schema for a hospital (patient visits fact, patient/doctor/procedure dimensions).",d:"H"},
{q:"Implement a conformed dimension that is shared across multiple fact tables.",d:"H"},
{q:"Design a factless fact table (event tracking with no measures) and explain its use cases.",d:"H"}
]},

{id:3,title:"Slowly Changing Dimensions",color:"#a78bfa",chips:["SCD Type 0","Type 1","Type 2","Type 3","Type 6"],
subtopics:[
{name:"SCD Type 0 & Type 1",theory:["Type 0 (Fixed): dimension never changes; original value is retained forever (birth date, SSN).","Type 1 (Overwrite): simply update the value in place; no history kept; simplest approach.","Type 1 problem: historical reports show current values, not values at time of transaction."],code:"-- Type 0: never changes\nCREATE TABLE dim_customer (\n    customer_key INT PRIMARY KEY,\n    birth_date   DATE,        -- Type 0: never changes\n    original_state VARCHAR(50) -- Type 0: state at registration\n);\n\n-- Type 1: overwrite (no history)\nCREATE TABLE dim_customer (\n    customer_key INT PRIMARY KEY,\n    name         VARCHAR(100),\n    email        VARCHAR(255),   -- Type 1: just UPDATE\n    city         VARCHAR(50),    -- Type 1: just UPDATE\n    segment      VARCHAR(20)     -- Type 1: just UPDATE\n);\n\n-- When customer moves cities:\nUPDATE dim_customer SET city = 'New York' WHERE customer_key = 42;\n-- History lost! Old city gone forever.\n-- Old fact rows now appear to be from 'New York' customer"},
{name:"SCD Type 2 (Full History)",theory:["Type 2: create a new row for each change; most common for tracking history.","Each row has valid_from, valid_to dates and is_current flag; only one row is current.","Fact table FK points to the specific dimension version active at transaction time."],code:"-- Type 2: full history tracking\nCREATE TABLE dim_customer (\n    customer_key    SERIAL PRIMARY KEY,  -- surrogate key (new per version)\n    customer_id     VARCHAR(20) NOT NULL, -- natural/business key (stays same)\n    name            VARCHAR(100),\n    city            VARCHAR(50),\n    segment         VARCHAR(20),\n    -- SCD2 metadata\n    valid_from      DATE NOT NULL,\n    valid_to        DATE DEFAULT '9999-12-31',\n    is_current      BOOLEAN DEFAULT TRUE\n);\n\n-- Customer moves from Boston to New York:\n-- Step 1: Close current record\nUPDATE dim_customer\nSET valid_to = CURRENT_DATE - 1, is_current = FALSE\nWHERE customer_id = 'CUST-042' AND is_current = TRUE;\n\n-- Step 2: Insert new version\nINSERT INTO dim_customer (customer_id, name, city, segment, valid_from)\nVALUES ('CUST-042', 'Alice Smith', 'New York', 'Premium', CURRENT_DATE);\n\n-- Query current state:\nSELECT * FROM dim_customer WHERE customer_id = 'CUST-042' AND is_current = TRUE;\n\n-- Query point-in-time (what city was customer in on 2023-06-15?):\nSELECT * FROM dim_customer\nWHERE customer_id = 'CUST-042'\n  AND '2023-06-15' BETWEEN valid_from AND valid_to;"},
{name:"SCD Type 3 & Type 6 (Hybrid)",theory:["Type 3: store current and previous value in separate columns; limited history (only 1 prior value).","Type 6 (Hybrid 1+2+3): combines Type 2 rows with Type 1 overwrite column for current value.","Type 6 allows both historical accuracy AND current-value reporting without JOINs."],code:"-- Type 3: current + previous value columns\nCREATE TABLE dim_customer (\n    customer_key    INT PRIMARY KEY,\n    customer_id     VARCHAR(20),\n    name            VARCHAR(100),\n    current_city    VARCHAR(50),    -- current value\n    previous_city   VARCHAR(50),    -- one prior value only\n    city_changed_on DATE\n);\n\n-- Update: shift current to previous\nUPDATE dim_customer\nSET previous_city = current_city,\n    current_city = 'New York',\n    city_changed_on = CURRENT_DATE\nWHERE customer_key = 42;\n\n-- Type 6 (Hybrid): Type 2 rows + Type 1 column\nCREATE TABLE dim_customer (\n    customer_key    SERIAL PRIMARY KEY,\n    customer_id     VARCHAR(20),\n    name            VARCHAR(100),\n    historical_city VARCHAR(50),  -- value at this version (Type 2)\n    current_city    VARCHAR(50),  -- always current value (Type 1 overwrite)\n    valid_from      DATE,\n    valid_to        DATE DEFAULT '9999-12-31',\n    is_current      BOOLEAN DEFAULT TRUE\n);\n-- When city changes:\n-- 1. Insert new Type 2 row with new historical_city\n-- 2. UPDATE ALL rows for this customer: SET current_city = 'New York'"}
],
examples:[
{title:"SCD Type 2 MERGE Pattern",desc:"Automated SCD2 loading using MERGE/upsert logic.",code:"-- Load new customer data from staging into SCD2 dimension\n-- Step 1: Identify changes\nWITH changes AS (\n    SELECT s.customer_id, s.name, s.city, s.segment\n    FROM staging_customers s\n    JOIN dim_customer d ON s.customer_id = d.customer_id AND d.is_current = TRUE\n    WHERE s.name != d.name OR s.city != d.city OR s.segment != d.segment\n)\n-- Step 2: Close old records\nUPDATE dim_customer d\nSET valid_to = CURRENT_DATE - 1, is_current = FALSE\nFROM changes c\nWHERE d.customer_id = c.customer_id AND d.is_current = TRUE;\n\n-- Step 3: Insert new versions\nINSERT INTO dim_customer (customer_id, name, city, segment, valid_from)\nSELECT customer_id, name, city, segment, CURRENT_DATE\nFROM changes;\n\n-- Step 4: Insert brand new customers\nINSERT INTO dim_customer (customer_id, name, city, segment, valid_from)\nSELECT s.customer_id, s.name, s.city, s.segment, CURRENT_DATE\nFROM staging_customers s\nWHERE NOT EXISTS (\n    SELECT 1 FROM dim_customer d WHERE d.customer_id = s.customer_id\n);"}
],
practice:[
{q:"Explain the differences between SCD Type 0, 1, 2, and 3 with examples.",d:"E"},
{q:"Create a SCD Type 2 dimension table with valid_from, valid_to, and is_current columns.",d:"E"},
{q:"Write SQL to close the current record and insert a new version (Type 2 update).",d:"M"},
{q:"Query a Type 2 dimension to find a customer's city at a specific past date.",d:"M"},
{q:"Implement a full SCD2 load process: identify changes, close old, insert new, handle new customers.",d:"H"},
{q:"Design a Type 6 (hybrid) dimension and demonstrate both historical and current-value queries.",d:"H"},
{q:"Build an automated SCD2 merge process that runs daily from a staging table.",d:"H"}
]},

{id:4,title:"ETL vs ELT & Data Pipelines",color:"#fbbf24",chips:["ETL","ELT","Staging","Pipelines","dbt"],
subtopics:[
{name:"ETL (Extract, Transform, Load)",theory:["ETL: data is extracted from sources, transformed in a separate engine, then loaded into warehouse.","Traditional approach: transformations happen outside the DB (in tools like Informatica, SSIS, Talend).","Good for: complex transformations, data cleansing, when warehouse compute is expensive."],code:"-- ETL flow:\n-- 1. EXTRACT: pull data from source systems\n-- Source: OLTP database, APIs, flat files\n\n-- 2. TRANSFORM (outside DB): clean, enrich, reshape\n-- - Remove duplicates\n-- - Standardize formats (dates, currencies)\n-- - Apply business rules\n-- - Generate surrogate keys\n-- - Lookup dimension keys\n\n-- 3. LOAD: bulk insert into warehouse\nCOPY fact_sales FROM '/data/transformed/sales_2024_03.csv'\nWITH (FORMAT CSV, HEADER TRUE);\n\n-- Staging table pattern (landing zone)\nCREATE TABLE staging.raw_orders (\n    order_id    VARCHAR(50),\n    order_date  VARCHAR(30),  -- raw format\n    customer_id VARCHAR(50),\n    amount      VARCHAR(20),  -- might have currency symbols\n    loaded_at   TIMESTAMP DEFAULT NOW()\n);\n-- Load raw data first, then transform in SQL"},
{name:"ELT (Extract, Load, Transform)",theory:["ELT: data loaded raw into warehouse first, then transformed using warehouse SQL engine.","Modern approach: leverages powerful warehouse compute (BigQuery, Snowflake, Databricks).","dbt (data build tool) is the standard framework for ELT transformations using SQL + Jinja."],code:"-- ELT flow:\n-- 1. EXTRACT + LOAD: raw data into staging\nCREATE TABLE raw.orders AS\nSELECT * FROM source_database.orders;  -- direct copy\n\n-- 2. TRANSFORM: SQL inside the warehouse\n-- Staging → Clean → Business layer\n\n-- Clean layer (basic type casting and deduplication)\nCREATE TABLE clean.orders AS\nSELECT DISTINCT\n    order_id::INT,\n    order_date::DATE,\n    customer_id::INT,\n    REPLACE(amount, '$', '')::DECIMAL(10,2) AS amount,\n    status\nFROM raw.orders\nWHERE order_id IS NOT NULL;\n\n-- Business layer (joins, calculations, final model)\nCREATE TABLE analytics.fact_sales AS\nSELECT\n    d.date_key,\n    c.customer_key,\n    p.product_key,\n    o.quantity,\n    o.amount AS revenue,\n    o.amount - (p.unit_cost * o.quantity) AS profit\nFROM clean.orders o\nJOIN dim_date d ON o.order_date = d.full_date\nJOIN dim_customer c ON o.customer_id = c.customer_id AND c.is_current\nJOIN dim_product p ON o.product_id = p.product_id;"},
{name:"Medallion Architecture (Bronze/Silver/Gold)",theory:["Bronze (raw): exact copy of source data; append-only; no transformations; full history.","Silver (cleaned): deduped, typed, validated; business entities modeled; SCD applied here.","Gold (curated): aggregated, business-ready; star schemas, KPI tables, ready for BI tools."],code:"-- Bronze layer: raw ingestion (append-only)\nCREATE SCHEMA bronze;\nCREATE TABLE bronze.orders (\n    _raw_data    JSONB,        -- raw payload\n    _source      VARCHAR(50),  -- source system\n    _loaded_at   TIMESTAMP DEFAULT NOW()\n);\n\n-- Silver layer: cleaned and modeled\nCREATE SCHEMA silver;\nCREATE TABLE silver.orders (\n    order_id     INT PRIMARY KEY,\n    customer_id  INT NOT NULL,\n    order_date   DATE NOT NULL,\n    amount       DECIMAL(12,2),\n    status       VARCHAR(20),\n    _processed_at TIMESTAMP DEFAULT NOW()\n);\n\n-- Gold layer: business-ready aggregates\nCREATE SCHEMA gold;\nCREATE TABLE gold.daily_revenue (\n    report_date    DATE PRIMARY KEY,\n    total_orders   INT,\n    total_revenue  DECIMAL(14,2),\n    avg_order_value DECIMAL(10,2),\n    new_customers  INT\n);\n\n-- Gold: dimension + fact (star schema)\nCREATE TABLE gold.fact_sales (...);\nCREATE TABLE gold.dim_customer (...);\nCREATE TABLE gold.dim_product (...);"}
],

{title:"dbt-Style Transformation",desc:"SQL transformation following dbt/ELT patterns.",code:"-- dbt model: models/marts/fact_sales.sql\n-- This would be a SQL file in dbt that materializes as a table\n\nWITH source_orders AS (\n    SELECT * FROM {{ ref('stg_orders') }}  -- dbt reference\n),\n\nenriched AS (\n    SELECT\n        o.order_id,\n        o.order_date,\n        d.date_key,\n        c.customer_key,\n        o.quantity,\n        o.amount AS revenue,\n        o.amount * 0.7 AS estimated_cost  -- business rule\n    FROM source_orders o\n    JOIN {{ ref('dim_date') }} d ON o.order_date = d.full_date\n    JOIN {{ ref('dim_customer') }} c ON o.customer_id = c.customer_id\n        AND c.is_current = TRUE\n)\n\nSELECT * FROM enriched\n\n-- In pure SQL (without dbt):\nCREATE TABLE gold.fact_sales AS\nWITH source_orders AS (SELECT * FROM silver.orders)\nSELECT ... FROM source_orders ...;"}
],

{id:5,title:"Grain & Measures",color:"#f472b6",chips:["Grain","Additive","Semi-Additive","Non-Additive","Measures"],
subtopics:[
{name:"Defining the Grain",theory:["Grain = what one row in the fact table represents; the most critical DW design decision.","Examples: one row per sale transaction, per daily balance, per monthly subscription per customer.","Rule: declare the grain FIRST, then identify dimensions and facts that match that grain."],code:"-- Grain: one row per ORDER LINE ITEM\nCREATE TABLE fact_order_items (\n    order_id     INT,\n    line_item_id INT,\n    date_key     INT,      -- when ordered\n    product_key  INT,      -- what was ordered\n    customer_key INT,      -- who ordered\n    store_key    INT,      -- where purchased\n    quantity     INT,      -- how many\n    unit_price   DECIMAL,  -- at what price\n    revenue      DECIMAL,  -- total line amount\n    PRIMARY KEY (order_id, line_item_id)\n);\n-- Each row = one specific product in one specific order\n-- NOT one row per order (that would lose product-level detail)\n\n-- Grain: one row per DAY per PRODUCT per WAREHOUSE\nCREATE TABLE fact_inventory_daily (\n    date_key      INT,\n    product_key   INT,\n    warehouse_key INT,\n    qty_on_hand   INT,\n    qty_on_order  INT,\n    PRIMARY KEY (date_key, product_key, warehouse_key)\n);\n-- Can answer: 'What was stock of product X in warehouse Y on date Z?'"},
{name:"Measure Types",theory:["Additive measures: can be summed across ALL dimensions (revenue, quantity, cost).","Semi-additive: can be summed across some dimensions but not time (account balance, inventory count).","Non-additive: cannot be summed at all (ratios, percentages, unit prices); must recompute."],code:"-- Additive measures (SUM works across all dimensions)\nSELECT SUM(revenue) FROM fact_sales;                    -- total revenue\nSELECT SUM(revenue) FROM fact_sales WHERE date_key = 20240315; -- daily revenue\nSELECT SUM(revenue) FROM fact_sales WHERE product_key = 42;    -- product revenue\n-- All valid! Revenue is fully additive.\n\n-- Semi-additive measures (DON'T sum across time)\nSELECT SUM(balance) FROM fact_account_balance;  -- WRONG! Sums all daily snapshots\nSELECT balance FROM fact_account_balance\nWHERE date_key = 20240315 AND account_key = 1;  -- Correct: point-in-time\n-- For totals: use latest date only, or AVG for period\nSELECT SUM(balance) FROM fact_account_balance\nWHERE date_key = (SELECT MAX(date_key) FROM fact_account_balance);\n\n-- Non-additive (must recalculate)\n-- unit_price: can't sum prices! Use weighted average\nSELECT SUM(revenue) / NULLIF(SUM(quantity), 0) AS avg_price\nFROM fact_sales;\n-- profit_margin: must recalculate from revenue and cost\nSELECT SUM(revenue - cost) / NULLIF(SUM(revenue), 0) AS margin\nFROM fact_sales;"},
{name:"Degenerate Dimensions & Junk Dimensions",theory:["Degenerate dimension: dimension value stored directly in fact table (order_id, invoice_number).","Junk dimension: combines low-cardinality flags/indicators into one small dimension table.","Bridge table: handles M:M relationships between fact and dimension (one order → multiple promos)."],code:"-- Degenerate dimension: no separate dim table\nCREATE TABLE fact_sales (\n    date_key       INT,\n    product_key    INT,\n    customer_key   INT,\n    order_number   VARCHAR(20),  -- degenerate dim (no dim table needed)\n    invoice_number VARCHAR(20),  -- degenerate dim\n    quantity       INT,\n    revenue        DECIMAL(12,2)\n);\n\n-- Junk dimension: combine flags into one table\nCREATE TABLE dim_order_flags (\n    flag_key        INT PRIMARY KEY,\n    is_gift         BOOLEAN,\n    is_rush         BOOLEAN,\n    is_online       BOOLEAN,\n    payment_method  VARCHAR(20)  -- cash, card, crypto\n);\n-- Pre-populate all combinations (small: 2×2×2×3 = 24 rows)\n-- Fact table uses flag_key FK instead of 4 separate columns\n\n-- Bridge table (M:M: one order can have multiple promotions)\nCREATE TABLE bridge_order_promotion (\n    order_key     INT,\n    promotion_key INT,\n    allocation_pct DECIMAL(5,2) DEFAULT 1.0  -- weight factor\n);"}
],
examples:[
{title:"Choosing the Right Grain",desc:"Compare different grain choices and their trade-offs.",code:"-- Grain choice 1: Transaction grain (finest)\n-- One row per product per order\nfact_order_items: order_id, product_key, quantity, price\n-- Answers: 'What products did customer X buy on date Y?'\n-- Rows: ~millions per year for mid-size retailer\n\n-- Grain choice 2: Daily aggregate grain\n-- One row per product per store per day\nfact_daily_sales: date_key, product_key, store_key, total_qty, total_revenue\n-- Answers: 'What was daily revenue for product X in store Y?'\n-- Cannot answer: 'What did customer Z buy?'\n-- Rows: much fewer (products × stores × days)\n\n-- Grain choice 3: Monthly summary\nfact_monthly_sales: month_key, product_key, total_qty, total_revenue\n-- Fastest queries but least flexible\n-- Cannot drill down to day or customer\n\n-- Best practice: start with finest grain, aggregate in views/cubes\nCREATE MATERIALIZED VIEW mv_daily_sales AS\nSELECT date_key, product_key, store_key,\n    SUM(quantity) AS qty, SUM(revenue) AS revenue\nFROM fact_order_items GROUP BY 1,2,3;"}
],

{id:6,title:"Modern Data Platforms",color:"#22d3ee",chips:["Snowflake","BigQuery","Redshift","Databricks","Lakehouse"],
subtopics:[
{name:"Cloud Data Warehouses",theory:["Snowflake: separated storage and compute; auto-scaling; time travel; pay per query.","BigQuery: serverless; columnar; supports standard SQL; built-in ML; slot-based pricing.","Redshift: AWS managed; columnar; supports Redshift Spectrum for querying S3 directly."],code:"-- Snowflake-style SQL\n-- Create warehouse (compute cluster)\n-- CREATE WAREHOUSE analytics_wh WITH WAREHOUSE_SIZE = 'MEDIUM';\n\n-- Time travel (query data as it was 1 hour ago)\nSELECT * FROM orders AT(OFFSET => -3600);\nSELECT * FROM orders BEFORE(TIMESTAMP => '2024-03-15 10:00:00');\n\n-- Clone a table (zero-copy)\n-- CREATE TABLE orders_backup CLONE orders;\n\n-- BigQuery-style\n-- SELECT * FROM `project.dataset.table`\n-- WHERE _PARTITIONDATE = '2024-03-15';\n\n-- Common modern DW features:\n-- 1. Auto-scaling compute\n-- 2. Separation of storage and compute\n-- 3. Time travel / versioning\n-- 4. Semi-structured data support (JSON, Parquet)\n-- 5. Data sharing across accounts/orgs"},
{name:"Data Lakehouse",theory:["Lakehouse: combines data lake (cheap storage, any format) with warehouse (ACID, SQL, performance).","Delta Lake / Iceberg / Hudi: open table formats that add transactions and time travel to data lakes.","Databricks: unified platform for ETL, ML, and analytics on lakehouse architecture."],code:"-- Lakehouse concept:\n-- Store raw data as Parquet/Delta on object storage (S3, GCS, ADLS)\n-- Query with SQL engine that supports ACID transactions\n\n-- Delta Lake (Databricks) syntax:\n-- CREATE TABLE sales\n-- USING DELTA\n-- LOCATION 's3://bucket/sales/'\n-- PARTITIONED BY (year, month);\n\n-- Iceberg table:\n-- CREATE TABLE warehouse.sales (\n--     order_id BIGINT,\n--     order_date DATE,\n--     amount DECIMAL(12,2)\n-- ) USING ICEBERG\n-- PARTITIONED BY (months(order_date));\n\n-- Key lakehouse features:\n-- 1. ACID transactions on data lake\n-- 2. Schema evolution (add/rename columns)\n-- 3. Time travel (query previous versions)\n-- 4. Efficient upserts (MERGE operations)\n-- 5. Unified batch + streaming"},
{name:"Data Marts & Serving Layer",theory:["Data mart: subset of warehouse focused on one business domain (marketing mart, finance mart).","Serving layer: final aggregated tables/views optimized for specific BI tool or dashboard.","Semantic layer: defines metrics and dimensions in a tool like Looker, dbt metrics, or Cube."],code:"-- Data mart: marketing-focused subset\nCREATE SCHEMA mart_marketing;\n\nCREATE TABLE mart_marketing.customer_ltv AS\nSELECT\n    c.customer_key,\n    c.name,\n    c.segment,\n    c.acquisition_channel,\n    MIN(f.date_key) AS first_purchase_date,\n    MAX(f.date_key) AS last_purchase_date,\n    COUNT(DISTINCT f.date_key) AS purchase_days,\n    SUM(f.revenue) AS lifetime_revenue,\n    AVG(f.revenue) AS avg_order_value\nFROM gold.fact_sales f\nJOIN gold.dim_customer c ON f.customer_key = c.customer_key\nGROUP BY 1,2,3,4;\n\n-- Serving layer: pre-built for dashboard\nCREATE MATERIALIZED VIEW mart_marketing.weekly_acquisition AS\nSELECT\n    DATE_TRUNC('week', d.full_date) AS week,\n    c.acquisition_channel,\n    COUNT(DISTINCT c.customer_key) AS new_customers,\n    SUM(f.revenue) AS first_week_revenue\nFROM gold.fact_sales f\nJOIN gold.dim_date d ON f.date_key = d.date_key\nJOIN gold.dim_customer c ON f.customer_key = c.customer_key\n    AND d.full_date = c.first_purchase_date\nGROUP BY 1, 2;"}
],
examples:[
{title:"Modern DW Architecture",desc:"Complete modern data stack with specific technologies.",code:"-- Modern Data Stack Architecture:\n--\n-- Sources: PostgreSQL, Stripe API, Google Analytics, Salesforce\n--    ↓\n-- Ingestion: Fivetran / Airbyte (EL - Extract & Load)\n--    ↓\n-- Storage: Snowflake / BigQuery / Databricks (cloud DW)\n--    ↓\n-- Transform: dbt (SQL transformations, testing, docs)\n--    ↓\n-- Serving: Materialized views, data marts\n--    ↓\n-- BI: Looker / Metabase / Tableau / Superset\n--    ↓\n-- Reverse ETL: Census / Hightouch (push data back to tools)\n\n-- dbt project structure:\n-- models/\n--   staging/          (source-specific cleaning)\n--     stg_stripe_payments.sql\n--     stg_postgres_orders.sql\n--   intermediate/     (cross-source joins)\n--     int_orders_payments.sql\n--   marts/            (business-ready)\n--     finance/\n--       fct_revenue.sql\n--       dim_customer.sql\n--     marketing/\n--       fct_campaigns.sql"}
],

function highlightSQL(code) {
    let html = code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    html = html.replace(/(--.*)/g, '<span style="color:#6b7280">$1</span>');
    html = html.replace(/('(?:[^'\\]|\\.)*')/g, '<span style="color:#fbbf24">$1</span>');
    html = html.replace(/\b(\d+\.?\d*)\b/g, '<span style="color:#f472b6">$1</span>');
    const keywords = ['SELECT','FROM','WHERE','INSERT','INTO','VALUES','UPDATE','SET','DELETE','CREATE','ALTER','DROP','TABLE','INDEX','VIEW','SCHEMA','BEGIN','COMMIT','JOIN','INNER','LEFT','RIGHT','FULL','OUTER','CROSS','ON','AND','OR','NOT','IN','EXISTS','BETWEEN','LIKE','IS','NULL','AS','CASE','WHEN','THEN','ELSE','END','ORDER','BY','GROUP','HAVING','LIMIT','OFFSET','UNION','ALL','DISTINCT','ASC','DESC','WITH','OVER','PARTITION','PRIMARY','KEY','FOREIGN','REFERENCES','UNIQUE','CHECK','DEFAULT','CONSTRAINT','CASCADE','IF','REPLACE','SERIAL','BIGSERIAL','MATERIALIZED','REFRESH','TRUNCATE','ADD','COLUMN','USING','TRUE','FALSE','INT','INTEGER','BIGINT','DECIMAL','NUMERIC','FLOAT','VARCHAR','CHAR','TEXT','BOOLEAN','DATE','TIMESTAMP','INTERVAL','JSONB','JSON','COALESCE','NULLIF','CAST','NOW','CURRENT_DATE','COUNT','SUM','AVG','MIN','MAX','ROUND','DATE_TRUNC','EXTRACT','COPY','FORMAT','CSV','HEADER'];
    const kwPattern = new RegExp('\\b(' + keywords.join('|') + ')\\b', 'gi');
    html = html.replace(kwPattern, '<span style="color:#22d3ee">$1</span>');
    return html;
}
function getProgress(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||{};}catch{return {};}}
function saveProgress(d){localStorage.setItem(STORAGE_KEY,JSON.stringify(d));}
function getTotalPractice(){return topics.reduce((s,t)=>s+t.practice.length,0);}
function getCompletedCount(){return Object.values(getProgress()).filter(v=>v).length;}
function updateProgressBar(){const t=getTotalPractice(),d=getCompletedCount();document.getElementById('progressFill').style.width=(t>0?d/t*100:0)+'%';document.getElementById('progressText').textContent=d+' / '+t;}
function getTopicProgress(id){const p=getProgress(),t=topics.find(x=>x.id===id);if(!t)return{done:0,total:0};let d=0;t.practice.forEach((_,i)=>{if(p[id+'_'+i])d++;});return{done:d,total:t.practice.length};}
function renderRoadmap(){const c=document.getElementById('roadmapContainer');c.innerHTML='';topics.forEach(t=>{const p=getTopicProgress(t.id),n=document.createElement('div');n.className='node';n.onclick=()=>showDetail(t.id);n.innerHTML=`<div class="node-number" style="border-color:${t.color};color:${t.color}">${t.id}</div><div class="node-card"><div class="node-title" style="color:${t.color}">${t.title}</div><div class="node-chips">${t.chips.map(c=>'<span class="chip">'+c+'</span>').join('')}</div><div class="node-progress">${p.done} / ${p.total} practice completed</div></div>`;c.appendChild(n);});}
function showDetail(id){currentTopic=topics.find(t=>t.id===id);if(!currentTopic)return;document.getElementById('roadmapPage').classList.remove('active');document.getElementById('detailPage').classList.add('active');document.getElementById('detailTitle').textContent=currentTopic.title;document.getElementById('detailTitle').style.color=currentTopic.color;document.getElementById('detailSubtitle').textContent=currentTopic.subtopics.map(s=>s.name).join(' • ');renderTheory();renderExamples();renderPractice();switchTab('theory');window.scrollTo(0,0);}
function showRoadmap(){document.getElementById('detailPage').classList.remove('active');document.getElementById('roadmapPage').classList.add('active');renderRoadmap();updateProgressBar();}
function switchTab(tab){document.querySelectorAll('.tab').forEach((t,i)=>{t.classList.toggle('active',['theory','examples','practice','solutions'][i]===tab);});document.querySelectorAll('.tab-content').forEach((tc,i)=>{tc.classList.toggle('active',['theory','examples','practice','solutions'][i]===tab);});if(tab==='solutions')renderSolutions();}
function renderTheory(){document.getElementById('theoryContent').innerHTML=currentTopic.subtopics.map(s=>`<div class="theory-section"><div class="theory-title">${s.name}</div>${s.theory.map(t=>'<p class="theory-point">'+t+'</p>').join('')}<pre class="code-block">${highlightSQL(s.code)}</pre></div>`).join('');}
function renderExamples(){document.getElementById('examplesContent').innerHTML=currentTopic.examples.map(e=>`<div class="example-card"><div class="example-title">${e.title}</div><p class="example-desc">${e.desc}</p><pre class="code-block">${highlightSQL(e.code)}</pre></div>`).join('');}
function renderPractice(){const prog=getProgress();document.getElementById('practiceContent').innerHTML=currentTopic.practice.map((p,i)=>{const key=currentTopic.id+'_'+i,ch=prog[key]?'checked':'',dc=prog[key]?'done':'',df=p.d==='E'?'easy':p.d==='M'?'medium':'hard',dl=p.d==='E'?'Easy':p.d==='M'?'Medium':'Hard';return`<div class="practice-item ${dc}"><input type="checkbox" ${ch} onchange="togglePractice('${key}',this)"><span class="practice-text">${i+1}. ${p.q}</span><span class="difficulty ${df}">${dl}</span></div>`;}).join('');}
function togglePractice(key,el){const p=getProgress();p[key]=el.checked;saveProgress(p);updateProgressBar();el.parentElement.classList.toggle('done',el.checked);}
function renderSolutions(){document.getElementById('solutionsContent').innerHTML='<div class="theory-section"><div class="theory-title">Solutions Coming Soon</div><p class="theory-point">Practice solving these problems on your own first. Solutions will be added in a future update.</p></div>';}
renderRoadmap();updateProgressBar();
</script>
