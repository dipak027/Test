{title:"Pipeline Performance Profiler",desc:"Profile pipeline execution to identify bottlenecks.",code:"import time\nfrom functools import wraps\nfrom collections import defaultdict\n\nclass PipelineProfiler:\n    def __init__(self):\n        self.timings = defaultdict(list)\n        self.row_counts = {}\n    \n    def profile(self, step_name):\n        def decorator(fn):\n            @wraps(fn)\n            def wrapper(*args, **kwargs):\n                start = time.time()\n                result = fn(*args, **kwargs)\n                duration = time.time() - start\n                self.timings[step_name].append(duration)\n                if hasattr(result, '__len__'):\n                    self.row_counts[step_name] = len(result)\n                return result\n            return wrapper\n        return decorator\n    \n    def report(self):\n        print('\\n Pipeline Performance Report')\n        print('=' * 50)\n        total = 0\n        for step, times in self.timings.items():\n            avg = sum(times) / len(times)\n            total += avg\n            rows = self.row_counts.get(step, 'N/A')\n            throughput = f\"{rows/avg:.0f} rows/s\" if isinstance(rows, int) else 'N/A'\n            print(f\"  {step:.<30} {avg:.2f}s  ({throughput})\")\n        print(f\"  {'TOTAL':.<30} {total:.2f}s\")\n\nprofiler = PipelineProfiler()\n\n@profiler.profile('extract')\ndef extract(): return fetch_data()\n\n@profiler.profile('transform')\ndef transform(data): return clean(data)\n\n@profiler.profile('load')\ndef load(data): return write(data)"},
{title:"Adaptive Batch Size Optimizer",desc:"Dynamically adjust batch sizes based on processing speed and memory.",code:"import time\nimport psutil\n\nclass AdaptiveBatcher:\n    def __init__(self, initial_batch=1000, min_batch=100, max_batch=50000):\n        self.batch_size = initial_batch\n        self.min_batch = min_batch\n        self.max_batch = max_batch\n        self.history = []\n    \n    def process_adaptive(self, data, process_fn):\n        \"\"\"Process data with auto-tuning batch sizes\"\"\"\n        offset = 0\n        total_processed = 0\n        \n        while offset < len(data):\n            batch = data[offset:offset + self.batch_size]\n            \n            start = time.time()\n            mem_before = psutil.virtual_memory().percent\n            \n            process_fn(batch)\n            \n            duration = time.time() - start\n            mem_after = psutil.virtual_memory().percent\n            throughput = len(batch) / duration\n            \n            self.history.append({\n                'batch_size': self.batch_size,\n                'duration': duration,\n                'throughput': throughput,\n                'memory_pct': mem_after\n            })\n            \n            # Adjust batch size\n            if mem_after > 85:  # Memory pressure\n                self.batch_size = max(self.min_batch, self.batch_size // 2)\n            elif duration < 1.0 and mem_after < 70:  # Room to grow\n                self.batch_size = min(self.max_batch, int(self.batch_size * 1.5))\n            \n            offset += len(batch)\n            total_processed += len(batch)\n        \n        return total_processed"},
{title:"Distributed Processing with Chunking",desc:"Process large datasets by distributing chunks across workers.",code:"import pandas as pd\nfrom concurrent.futures import ProcessPoolExecutor\nimport math\n\ndef distributed_process(input_path, output_path, transform_fn, chunk_size=100000, max_workers=4):\n    \"\"\"Process large file in distributed chunks\"\"\"\n    # Count total rows for progress tracking\n    total_rows = sum(1 for _ in open(input_path)) - 1  # Subtract header\n    num_chunks = math.ceil(total_rows / chunk_size)\n    print(f'Processing {total_rows} rows in {num_chunks} chunks with {max_workers} workers')\n    \n    # Read and process in chunks\n    chunks = pd.read_csv(input_path, chunksize=chunk_size)\n    results = []\n    \n    with ProcessPoolExecutor(max_workers=max_workers) as executor:\n        futures = []\n        for i, chunk in enumerate(chunks):\n            future = executor.submit(transform_fn, chunk)\n            futures.append((i, future))\n        \n        for i, future in futures:\n            try:\n                result = future.result(timeout=300)\n                results.append(result)\n                print(f'  Chunk {i+1}/{num_chunks} complete ({len(result)} rows)')\n            except Exception as e:\n                print(f'  Chunk {i+1} FAILED: {e}')\n    \n    # Combine results\n    final_df = pd.concat(results, ignore_index=True)\n    final_df.to_parquet(output_path, index=False)\n    print(f'Done: {len(final_df)} rows written to {output_path}')\n    return final_df"}

// State
let currentTopic = null;
const STORAGE_KEY = 'de_roadmap_progress';

function getProgress() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
    catch { return {}; }
}
function saveProgress(data) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}
function getTotalPractice() {
    return topics.reduce((sum, t) => sum + t.practice.length, 0);
}
function getCompletedCount() {
    const prog = getProgress();
    return Object.values(prog).filter(v => v).length;
}
function updateProgressBar() {
    const total = getTotalPractice();
    const done = getCompletedCount();
    const pct = total > 0 ? (done / total * 100) : 0;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressText').textContent = done + ' / ' + total;
}
function getTopicProgress(topicId) {
    const prog = getProgress();
    const topic = topics.find(t => t.id === topicId);
    if (!topic) return {done: 0, total: 0};
    let done = 0;
    topic.practice.forEach((_, i) => {
        if (prog[topicId + '_' + i]) done++;
    });
    return {done, total: topic.practice.length};
}

// Syntax highlighting
function highlightCode(code) {
    let html = code
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    // SQL comments
    html = html.replace(/(--.*)/g, '<span class="cm">$1</span>');
    // Python comments
    html = html.replace(/(#.*)/g, '<span class="cm">$1</span>');
    // Multi-line strings
    html = html.replace(/("""[\s\S]*?"""|'''[\s\S]*?''')/g, '<span class="str">$1</span>');
    // Strings
    html = html.replace(/(f?"[^"\\]*(?:\\.[^"\\]*)*")/g, '<span class="str">$1</span>');
    html = html.replace(/(f?'[^'\\]*(?:\\.[^'\\]*)*')/g, '<span class="str">$1</span>');
    // Numbers
    html = html.replace(/\b(\d+\.?\d*)\b/g, '<span class="num">$1</span>');
    // Python keywords
    const pyKeywords = ['def','class','import','from','return','yield','if','elif','else','for','while','break','continue','pass','try','except','finally','raise','with','as','lambda','and','or','not','in','is','True','False','None','async','await','del','assert','global'];
    pyKeywords.forEach(kw => {
        html = html.replace(new RegExp('\\b(' + kw + ')\\b', 'g'), '<span class="kw">$1</span>');
    });
    // SQL keywords
    const sqlKeywords = ['SELECT','FROM','WHERE','JOIN','LEFT','RIGHT','INNER','OUTER','ON','GROUP','BY','ORDER','HAVING','INSERT','INTO','VALUES','UPDATE','SET','DELETE','CREATE','TABLE','ALTER','DROP','INDEX','VIEW','AS','AND','OR','NOT','NULL','PRIMARY','KEY','FOREIGN','REFERENCES','DEFAULT','SERIAL','INT','BIGINT','VARCHAR','TEXT','DECIMAL','BOOLEAN','DATE','TIMESTAMP','PARTITION','CLUSTER','WITH','CASE','WHEN','THEN','ELSE','END','DISTINCT','COUNT','SUM','AVG','MAX','MIN','LIKE','BETWEEN','EXISTS','UNION','ALL','LIMIT','OFFSET','CASCADE','SCHEMA','USING','MERGE','CONFLICT','EXCLUDED','COPY','FORMAT','VACUUM','OPTIMIZE'];
    sqlKeywords.forEach(kw => {
        html = html.replace(new RegExp('\\b(' + kw + ')\\b', 'gi'), '<span class="kw">$1</span>');
    });
    // Built-in functions
    const builtins = ['print','len','range','type','int','float','str','bool','list','dict','set','tuple','input','open','sum','max','min','abs','enumerate','zip','map','filter','sorted','isinstance','super','hasattr','getattr','setattr'];
    builtins.forEach(fn => {
        html = html.replace(new RegExp('\\b(' + fn + ')\\b(?=\\()', 'g'), '<span class="fn">$1</span>');
    });
    return html;
}

// Render roadmap
function renderRoadmap() {
    const container = document.getElementById('roadmapContainer');
    container.innerHTML = '';
    topics.forEach(topic => {
        const prog = getTopicProgress(topic.id);
        const node = document.createElement('div');
        node.className = 'node';
        node.onclick = () => showDetail(topic.id);
        node.innerHTML = `
            <div class="node-number" style="border-color:${topic.color};color:${topic.color}">${topic.id}</div>
            <div class="node-card">
                <div class="node-title" style="color:${topic.color}">${topic.title}</div>
                <div class="node-chips">${topic.chips.map(c => '<span class="chip">' + c + '</span>').join('')}</div>
                <div class="node-progress">${prog.done} / ${prog.total} practice completed</div>
            </div>
        `;
        container.appendChild(node);
    });
}

function showDetail(topicId) {
    currentTopic = topics.find(t => t.id === topicId);
    if (!currentTopic) return;
    document.getElementById('roadmapPage').classList.remove('active');
    document.getElementById('detailPage').classList.add('active');
    document.getElementById('detailTitle').textContent = currentTopic.title;
    document.getElementById('detailTitle').style.color = currentTopic.color;
    document.getElementById('detailSubtitle').textContent = currentTopic.subtopics.map(s => s.name).join(' \u2022 ');
    renderTheory();
    renderExamples();
    renderPractice();
    switchTab('theory');
    window.scrollTo(0, 0);
}

function showRoadmap() {
    document.getElementById('detailPage').classList.remove('active');
    document.getElementById('roadmapPage').classList.add('active');
    renderRoadmap();
    updateProgressBar();
}

function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t, i) => {
        t.classList.toggle('active', ['theory','examples','practice','solutions'][i] === tab);
    });
    document.querySelectorAll('.tab-content').forEach((tc, i) => {
        tc.classList.toggle('active', ['theory','examples','practice','solutions'][i] === tab);
    });
    if (tab === 'solutions') renderSolutions();
}

function renderTheory() {
    const container = document.getElementById('theoryContent');
    container.innerHTML = currentTopic.subtopics.map(sub => `
        <div class="theory-section">
            <div class="theory-title">${sub.name}</div>
            ${sub.theory.map(t => '<p class="theory-point">' + t + '</p>').join('')}
            <pre class="code-block">${highlightCode(sub.code)}</pre>
        </div>
    `).join('');
}

function renderExamples() {
    const container = document.getElementById('examplesContent');
    container.innerHTML = currentTopic.examples.map(ex => `
        <div class="example-card">
            <div class="example-title">${ex.title}</div>
            <p class="example-desc">${ex.desc}</p>
            <pre class="code-block">${highlightCode(ex.code)}</pre>
        </div>
    `).join('');
}

function renderPractice() {
    const container = document.getElementById('practiceContent');
    const prog = getProgress();
    container.innerHTML = currentTopic.practice.map((p, i) => {
        const key = currentTopic.id + '_' + i;
        const checked = prog[key] ? 'checked' : '';
        const doneClass = prog[key] ? 'done' : '';
        const diffClass = p.d === 'E' ? 'easy' : p.d === 'M' ? 'medium' : 'hard';
        const diffLabel = p.d === 'E' ? 'Easy' : p.d === 'M' ? 'Medium' : 'Hard';
        return `
            <div class="practice-item ${doneClass}">
                <input type="checkbox" ${checked} onchange="togglePractice('${key}', this)">
                <span class="practice-text">${i+1}. ${p.q}</span>
                <span class="difficulty ${diffClass}">${diffLabel}</span>
            </div>
        `;
    }).join('');
}

function togglePractice(key, el) {
    const prog = getProgress();
    prog[key] = el.checked;
    saveProgress(prog);
    updateProgressBar();
    el.parentElement.classList.toggle('done', el.checked);
}

`import pandas as pd\nimport numpy as np\n\ndef transform(df, column_map=None, required_cols=None):\n    df = df.copy()\n    # Handle nulls\n    for col in df.select_dtypes(include=['object']).columns:\n        df[col] = df[col].fillna('UNKNOWN')\n    for col in df.select_dtypes(include=['number']).columns:\n        df[col] = df[col].fillna(0)\n    # Type conversion\n    if 'date' in df.columns:\n        df['date'] = pd.to_datetime(df['date'], errors='coerce')\n    # Column renaming\n    if column_map:\n        df = df.rename(columns=column_map)\n    return df`,

`import logging\nimport pandas as pd\nfrom datetime import datetime\n\nclass ETLPipeline:\n    def __init__(self, name):\n        self.name = name\n        self.logger = logging.getLogger(name)\n        logging.basicConfig(level=logging.INFO)\n    \n    def extract(self, source):\n        self.logger.info(f"Extracting from {source}")\n        df = pd.read_csv(source)\n        self.logger.info(f"Extracted {len(df)} rows")\n        return df\n    \n    def transform(self, df):\n        self.logger.info("Transforming data")\n        df = df.dropna()\n        return df\n    \n    def load(self, df, target):\n        self.logger.info(f"Loading {len(df)} rows to {target}")\n        df.to_parquet(target, index=False)\n    \n    def run(self, source, target):\n        start = datetime.now()\n        data = self.extract(source)\n        transformed = self.transform(data)\n        self.load(transformed, target)\n        self.logger.info(f"Pipeline completed in {datetime.now()-start}")`,

`import pandas as pd\n\ndef validate_quality(df, checks):\n    results = []\n    for check in checks:\n        if check['type'] == 'not_null':\n            null_pct = df[check['column']].isnull().mean()\n            results.append({'check': f"{check['column']} not null", 'passed': null_pct == 0, 'value': f'{null_pct:.1%}'})\n        elif check['type'] == 'type_check':\n            valid = df[check['column']].apply(lambda x: isinstance(x, check['expected_type'])).all()\n            results.append({'check': f"{check['column']} type", 'passed': valid})\n        elif check['type'] == 'range':\n            in_range = df[check['column']].between(check['min'], check['max']).all()\n            results.append({'check': f"{check['column']} range", 'passed': in_range})\n    return results`,

`import json\nimport os\n\ndef batch_process_with_checkpoint(files, process_fn, checkpoint_file):\n    # Load checkpoint\n    if os.path.exists(checkpoint_file):\n        with open(checkpoint_file) as f:\n            checkpoint = json.load(f)\n    else:\n        checkpoint = {'last_processed': None, 'count': 0}\n    \n    for file in files:\n        if checkpoint['last_processed'] and file <= checkpoint['last_processed']:\n            continue\n        try:\n            process_fn(file)\n            checkpoint['last_processed'] = file\n            checkpoint['count'] += 1\n            with open(checkpoint_file, 'w') as f:\n                json.dump(checkpoint, f)\n        except Exception as e:\n            print(f"Failed on {file}: {e}")\n            break\n    return checkpoint`,
`import time\nfrom functools import wraps\n\ndef etl_logger(func):\n    @wraps(func)\n    def wrapper(*args, **kwargs):\n        start = time.time()\n        print(f"[START] {func.__name__}")\n        result = func(*args, **kwargs)\n        duration = time.time() - start\n        row_count = len(result) if hasattr(result, '__len__') else 'N/A'\n        print(f"[END] {func.__name__} | {duration:.2f}s | rows: {row_count}")\n        return result\n    return wrapper\n\n@etl_logger\ndef extract(path):\n    import pandas as pd\n    return pd.read_csv(path)`,

`import yaml\nfrom abc import ABC, abstractmethod\n\nclass Extractor(ABC):\n    @abstractmethod\n    def extract(self, config): pass\n\nclass CSVExtractor(Extractor):\n    def extract(self, config):\n        import pandas as pd\n        return pd.read_csv(config['path'])\n\nclass APIExtractor(Extractor):\n    def extract(self, config):\n        import requests\n        return requests.get(config['url']).json()\n\nclass Transformer(ABC):\n    @abstractmethod\n    def transform(self, data, config): pass\n\nclass GenericPipeline:\n    extractors = {'csv': CSVExtractor(), 'api': APIExtractor()}\n    \n    def run(self, config):\n        ext = self.extractors[config['source']['type']]\n        data = ext.extract(config['source'])\n        # Apply transforms...\n        return data`,

`Star Schema: Central fact table with denormalized dimension tables radiating out (star shape).\n- Pros: Simple queries (fewer joins), fast aggregations, intuitive for business users\n- Cons: Data redundancy in dimensions, larger storage\n\nSnowflake Schema: Normalized dimension tables (dimensions have sub-dimensions).\n- Pros: Less redundancy, smaller storage, easier dimension updates\n- Cons: More complex queries (more joins), slower query performance`,
`CREATE TABLE dim_date (date_key INT PRIMARY KEY, full_date DATE, year INT, month INT, day INT);\nCREATE TABLE dim_product (product_key INT PRIMARY KEY, name VARCHAR(200), category VARCHAR(100));\nCREATE TABLE dim_customer (customer_key INT PRIMARY KEY, name VARCHAR(200), email VARCHAR(200));\n\nCREATE TABLE fact_orders (\n    order_key BIGINT PRIMARY KEY,\n    date_key INT REFERENCES dim_date(date_key),\n    product_key INT REFERENCES dim_product(product_key),\n    customer_key INT REFERENCES dim_customer(customer_key),\n    quantity INT,\n    amount DECIMAL(10,2)\n);`,
`OLTP (Online Transaction Processing):\n- Purpose: Handle day-to-day transactions (orders, payments, updates)\n- Optimized for: Fast INSERT/UPDATE on single rows\n- Schema: Normalized (3NF), row-oriented\n- Example: Banking app, e-commerce checkout, inventory management\n\nOLAP (Online Analytical Processing):\n- Purpose: Complex analytical queries over large datasets\n- Optimized for: Aggregations, GROUP BY, full-column scans\n- Schema: Denormalized (star/snowflake), column-oriented\n- Example: Sales reporting, customer analytics, BI dashboards`,
`CREATE TABLE dim_date (\n    date_key INT PRIMARY KEY,\n    full_date DATE NOT NULL,\n    year INT,\n    quarter INT,\n    month INT,\n    month_name VARCHAR(20),\n    week_of_year INT,\n    day_of_month INT,\n    day_of_week INT,\n    day_name VARCHAR(20),\n    is_weekend BOOLEAN,\n    is_holiday BOOLEAN DEFAULT FALSE\n);`,
`Transaction Facts: One row per business event.\n  Example: fact_sales - each row is one sale transaction\n\nPeriodic Snapshot Facts: One row per time period per entity.\n  Example: fact_daily_balance - one row per account per day showing end-of-day balance\n\nAccumulating Snapshot Facts: One row per process lifecycle.\n  Example: fact_order_fulfillment - tracks order_date, ship_date, delivery_date milestones`,
`SELECT\n    d.year, d.month,\n    p.category,\n    SUM(f.amount) as monthly_revenue,\n    COUNT(*) as order_count\nFROM fact_orders f\nJOIN dim_date d ON f.date_key = d.date_key\nJOIN dim_product p ON f.product_key = p.product_key\nJOIN dim_customer c ON f.customer_key = c.customer_key\nGROUP BY d.year, d.month, p.category\nORDER BY d.year, d.month, monthly_revenue DESC;`,
`Surrogate keys are system-generated integers (SERIAL/IDENTITY) used as primary keys in warehouse tables.\nWhy use them:\n1. Natural keys can change (email, phone) - surrogate keys are stable\n2. Enable SCD Type 2 (multiple rows per natural key with history)\n3. Smaller join keys (INT vs VARCHAR) improve performance\n4. Source-system independence - works even if source key format changes`,
`-- SCD Type 1: Simply overwrite the old value\nUPDATE dim_customer\nSET city = 'New York',\n    email = 'new_email@mail.com',\n    updated_at = CURRENT_TIMESTAMP\nWHERE customer_id = 'C001';`,
`-- SCD Type 2 implementation\n-- Step 1: Expire current record\nUPDATE dim_customer\nSET expiry_date = CURRENT_DATE - 1,\n    is_current = FALSE\nWHERE customer_id = 'C001' AND is_current = TRUE;\n\n-- Step 2: Insert new version\nINSERT INTO dim_customer (customer_id, name, email, city, effective_date, expiry_date, is_current)\nVALUES ('C001', 'Alice Smith', 'alice@mail.com', 'New York', CURRENT_DATE, '9999-12-31', TRUE);`,
`-- E-commerce Star Schema Design\nCREATE TABLE dim_date (date_key INT PRIMARY KEY, full_date DATE, year INT, quarter INT, month INT, day_of_week INT);\nCREATE TABLE dim_product (product_key INT PRIMARY KEY, product_id VARCHAR(50), name VARCHAR(200), category VARCHAR(100), brand VARCHAR(100), price DECIMAL(10,2));\nCREATE TABLE dim_customer (customer_key INT PRIMARY KEY, customer_id VARCHAR(50), name VARCHAR(200), email VARCHAR(200), segment VARCHAR(50), city VARCHAR(100));\nCREATE TABLE dim_channel (channel_key INT PRIMARY KEY, channel_name VARCHAR(50), device_type VARCHAR(50));\n\nCREATE TABLE fact_orders (\n    order_key BIGSERIAL PRIMARY KEY,\n    date_key INT REFERENCES dim_date,\n    product_key INT REFERENCES dim_product,\n    customer_key INT REFERENCES dim_customer,\n    channel_key INT REFERENCES dim_channel,\n    quantity INT, unit_price DECIMAL(10,2), discount DECIMAL(10,2), total_amount DECIMAL(12,2)\n);`,
`import pandas as pd\n\ndef generate_date_dim(start_year, end_year):\n    dates = pd.date_range(f'{start_year}-01-01', f'{end_year}-12-31')\n    return pd.DataFrame({\n        'date_key': dates.strftime('%Y%m%d').astype(int),\n        'full_date': dates,\n        'year': dates.year,\n        'quarter': dates.quarter,\n        'month': dates.month,\n        'month_name': dates.strftime('%B'),\n        'week': dates.isocalendar().week.astype(int),\n        'day_of_week': dates.dayofweek,\n        'day_name': dates.strftime('%A'),\n        'is_weekend': dates.dayofweek >= 5\n    })\n\ndim_date = generate_date_dim(2020, 2030)\nprint(dim_date.head())`,
`Conformed dimensions are dimensions shared identically across multiple fact tables/data marts.\nWhy they matter:\n- Enable consistent reporting across business areas (same customer definition everywhere)\n- Allow drilling across fact tables (join sales + marketing on same dim_customer)\n- Enforce single source of truth for business entities\n- Part of Kimball bus architecture for enterprise consistency`,
`CREATE TABLE fact_order_fulfillment (\n    order_key INT PRIMARY KEY,\n    customer_key INT,\n    product_key INT,\n    order_date_key INT,       -- When ordered\n    payment_date_key INT,     -- When paid\n    ship_date_key INT,        -- When shipped\n    delivery_date_key INT,    -- When delivered\n    return_date_key INT,      -- When returned (if applicable)\n    days_to_pay INT,\n    days_to_ship INT,\n    days_to_deliver INT,\n    order_amount DECIMAL(10,2)\n);\n-- Each row tracks one order through its lifecycle stages`,
`-- Periodic Snapshot: Daily inventory levels\nCREATE TABLE fact_daily_inventory (\n    date_key INT,\n    product_key INT,\n    warehouse_key INT,\n    quantity_on_hand INT,\n    quantity_reserved INT,\n    quantity_available INT,\n    reorder_point INT,\n    days_of_supply DECIMAL(5,1),\n    PRIMARY KEY (date_key, product_key, warehouse_key)\n);\n-- One row per product per warehouse per day`,
`SELECT\n    d.full_date,\n    SUM(f.amount) as daily_revenue,\n    SUM(SUM(f.amount)) OVER (ORDER BY d.full_date) as running_total,\n    AVG(SUM(f.amount)) OVER (ORDER BY d.full_date ROWS BETWEEN 6 PRECEDING AND CURRENT ROW) as rolling_7day_avg\nFROM fact_orders f\nJOIN dim_date d ON f.date_key = d.date_key\nWHERE d.year = 2024\nGROUP BY d.full_date\nORDER BY d.full_date;`,
`-- Hospital Data Warehouse Schema\nCREATE TABLE dim_patient (patient_key INT PRIMARY KEY, patient_id VARCHAR(50), name VARCHAR(200), dob DATE, gender VARCHAR(10), blood_type VARCHAR(5));\nCREATE TABLE dim_doctor (doctor_key INT PRIMARY KEY, doctor_id VARCHAR(50), name VARCHAR(200), specialty VARCHAR(100), department VARCHAR(100));\nCREATE TABLE dim_diagnosis (diagnosis_key INT PRIMARY KEY, icd_code VARCHAR(10), description VARCHAR(500), category VARCHAR(100));\nCREATE TABLE dim_date (date_key INT PRIMARY KEY, full_date DATE, year INT, month INT);\n\nCREATE TABLE fact_treatment (\n    treatment_key BIGSERIAL PRIMARY KEY, patient_key INT, doctor_key INT, diagnosis_key INT,\n    admission_date_key INT, discharge_date_key INT,\n    length_of_stay INT, total_cost DECIMAL(12,2), insurance_covered DECIMAL(12,2)\n);`,
`import pandas as pd\nfrom datetime import date\n\ndef scd2_merge(existing, incoming, natural_key, tracked_cols):\n    today = date.today()\n    updates = []\n    inserts = []\n    \n    for _, inc in incoming.iterrows():\n        current = existing[(existing[natural_key] == inc[natural_key]) & (existing['is_current'] == True)]\n        if current.empty:\n            rec = inc.to_dict()\n            rec['effective_date'] = today\n            rec['expiry_date'] = date(9999,12,31)\n            rec['is_current'] = True\n            inserts.append(rec)\n        else:\n            curr = current.iloc[0]\n            changed = any(curr[c] != inc[c] for c in tracked_cols)\n            if changed:\n                updates.append(curr.name)  # Index to expire\n                rec = inc.to_dict()\n                rec['effective_date'] = today\n                rec['expiry_date'] = date(9999,12,31)\n                rec['is_current'] = True\n                inserts.append(rec)\n    \n    # Apply updates\n    existing.loc[updates, 'is_current'] = False\n    existing.loc[updates, 'expiry_date'] = today\n    return pd.concat([existing, pd.DataFrame(inserts)], ignore_index=True)`,
`-- Bridge table for M:N relationship (customer can have multiple accounts)\nCREATE TABLE bridge_customer_account (\n    bridge_key SERIAL PRIMARY KEY,\n    customer_key INT REFERENCES dim_customer(customer_key),\n    account_key INT REFERENCES dim_account(account_key),\n    relationship_type VARCHAR(50),  -- 'primary', 'joint', 'authorized'\n    weight_factor DECIMAL(5,4) DEFAULT 1.0  -- For proportional allocation\n);\n\n-- Usage in query (allocate revenue proportionally)\nSELECT c.customer_name, SUM(f.amount * b.weight_factor) as attributed_revenue\nFROM fact_transactions f\nJOIN bridge_customer_account b ON f.account_key = b.account_key\nJOIN dim_customer c ON b.customer_key = c.customer_key\nGROUP BY c.customer_name;`,
`-- Data Vault for Banking\n-- HUB: Customer\nCREATE TABLE hub_customer (hub_customer_hk CHAR(32) PRIMARY KEY, customer_bk VARCHAR(50), load_date TIMESTAMP, record_source VARCHAR(100));\n-- HUB: Account\nCREATE TABLE hub_account (hub_account_hk CHAR(32) PRIMARY KEY, account_bk VARCHAR(50), load_date TIMESTAMP, record_source VARCHAR(100));\n-- LINK: Customer-Account relationship\nCREATE TABLE link_customer_account (link_hk CHAR(32) PRIMARY KEY, hub_customer_hk CHAR(32), hub_account_hk CHAR(32), load_date TIMESTAMP);\n-- SATELLITE: Customer details (historized)\nCREATE TABLE sat_customer (hub_customer_hk CHAR(32), load_date TIMESTAMP, name VARCHAR(200), email VARCHAR(200), address VARCHAR(500), hash_diff CHAR(32), PRIMARY KEY(hub_customer_hk, load_date));`,
`class StarSchemaGenerator:\n    def __init__(self, config):\n        self.config = config\n    \n    def generate_ddl(self):\n        ddl = []\n        # Generate dimension tables\n        for dim in self.config['dimensions']:\n            cols = [f"{dim['key']} SERIAL PRIMARY KEY"]\n            cols += [f"{c['name']} {c['type']}" for c in dim['columns']]\n            ddl.append(f"CREATE TABLE {dim['name']} ({', '.join(cols)});")\n        # Generate fact table\n        fact = self.config['fact']\n        cols = [f"{fact['key']} BIGSERIAL PRIMARY KEY"]\n        cols += [f"{d['key'].replace('dim_','')}_key INT REFERENCES {d['name']}({d['key']})" for d in self.config['dimensions']]\n        cols += [f"{m['name']} {m['type']}" for m in fact['measures']]\n        ddl.append(f"CREATE TABLE {fact['name']} ({', '.join(cols)});")\n        return '\\n'.join(ddl)`

3:[`1NF: Atomic values, no repeating groups. Violation: storing "Math,Science,English" in one cell.\n2NF: No partial dependencies. Violation: composite key (student_id, course_id) with student_name depending only on student_id.\n3NF: No transitive dependencies. Violation: employee table with dept_name -> dept_location (dept info depends on dept, not employee).`,`-- Normalize: orders(order_id, customer_name, customer_email, product, price)\n-- Into 3NF:\nCREATE TABLE customers (customer_id SERIAL PRIMARY KEY, name VARCHAR(100), email VARCHAR(200) UNIQUE);\nCREATE TABLE products (product_id SERIAL PRIMARY KEY, name VARCHAR(200), price DECIMAL(10,2));\nCREATE TABLE orders (order_id SERIAL PRIMARY KEY, customer_id INT REFERENCES customers, product_id INT REFERENCES products, order_date DATE DEFAULT CURRENT_DATE);`,`Cardinality defines how many instances of one entity relate to another.\n1:1 - One person has one passport. Each passport belongs to one person.\n1:N - One customer has many orders. Each order belongs to one customer.\nM:N - Students enroll in many courses; courses have many students. Needs junction table.`,`CREATE TABLE students (student_id SERIAL PRIMARY KEY, name VARCHAR(200), email VARCHAR(200));\nCREATE TABLE courses (course_id SERIAL PRIMARY KEY, course_name VARCHAR(200), credits INT);\nCREATE TABLE enrollments (\n    student_id INT REFERENCES students(student_id),\n    course_id INT REFERENCES courses(course_id),\n    enrollment_date DATE DEFAULT CURRENT_DATE,\n    grade VARCHAR(2),\n    PRIMARY KEY (student_id, course_id)\n);`,`Kimball (Bottom-up): Build data marts first, integrate later. Choose when: need quick wins, business-driven, smaller org.\nInmon (Top-down): Build enterprise warehouse first, derive marts. Choose when: enterprise consistency critical, large org, strong data governance needed.\nKimball is faster to deliver value; Inmon ensures long-term consistency.`,`CREATE TABLE dim_product (product_key SERIAL PRIMARY KEY, name VARCHAR(200), category VARCHAR(100), brand VARCHAR(100));\nCREATE TABLE dim_date (date_key INT PRIMARY KEY, full_date DATE, year INT, month INT, quarter INT);\nCREATE TABLE dim_store (store_key SERIAL PRIMARY KEY, store_name VARCHAR(200), city VARCHAR(100), region VARCHAR(50));\nCREATE TABLE fact_sales (\n    sale_key BIGSERIAL PRIMARY KEY,\n    product_key INT REFERENCES dim_product,\n    date_key INT REFERENCES dim_date,\n    store_key INT REFERENCES dim_store,\n    quantity INT, amount DECIMAL(10,2), discount DECIMAL(10,2)\n);`,`Denormalization intentionally introduces redundancy to improve read performance.\nAppropriate when:\n- Read-heavy workloads (analytics/reporting) far exceed writes\n- Join complexity slows queries unacceptably\n- Data warehouse/OLAP context (not OLTP)\n- Materialized views or summary tables needed for dashboards`,`-- Normalize: Employee(emp_id, name, dept_name, dept_location, project_name, hours)\n-- 3NF result:\nCREATE TABLE departments (dept_id SERIAL PRIMARY KEY, dept_name VARCHAR(100), location VARCHAR(100));\nCREATE TABLE employees (emp_id INT PRIMARY KEY, name VARCHAR(200), dept_id INT REFERENCES departments);\nCREATE TABLE projects (project_id SERIAL PRIMARY KEY, project_name VARCHAR(200));\nCREATE TABLE employee_projects (emp_id INT REFERENCES employees, project_id INT REFERENCES projects, hours DECIMAL(5,1), PRIMARY KEY(emp_id, project_id));`,`-- Library System ER Model\nCREATE TABLE authors (author_id SERIAL PRIMARY KEY, name VARCHAR(200), nationality VARCHAR(100));\nCREATE TABLE books (book_id SERIAL PRIMARY KEY, title VARCHAR(300), isbn VARCHAR(20) UNIQUE, published_year INT);\nCREATE TABLE book_authors (book_id INT REFERENCES books, author_id INT REFERENCES authors, PRIMARY KEY(book_id, author_id));\nCREATE TABLE members (member_id SERIAL PRIMARY KEY, name VARCHAR(200), email VARCHAR(200), join_date DATE);\nCREATE TABLE loans (loan_id SERIAL PRIMARY KEY, book_id INT REFERENCES books, member_id INT REFERENCES members, loan_date DATE, due_date DATE, return_date DATE);`,`-- Data Vault for Customer-Order system\nCREATE TABLE hub_customer (hk CHAR(32) PRIMARY KEY, customer_bk VARCHAR(50), load_date TIMESTAMP, source VARCHAR(50));\nCREATE TABLE hub_order (hk CHAR(32) PRIMARY KEY, order_bk VARCHAR(50), load_date TIMESTAMP, source VARCHAR(50));\nCREATE TABLE link_customer_order (hk CHAR(32) PRIMARY KEY, hub_customer_hk CHAR(32), hub_order_hk CHAR(32), load_date TIMESTAMP);\nCREATE TABLE sat_customer_details (hub_customer_hk CHAR(32), load_date TIMESTAMP, name VARCHAR(200), email VARCHAR(200), hash_diff CHAR(32), PRIMARY KEY(hub_customer_hk, load_date));\nCREATE TABLE sat_order_details (hub_order_hk CHAR(32), load_date TIMESTAMP, amount DECIMAL(10,2), status VARCHAR(20), hash_diff CHAR(32), PRIMARY KEY(hub_order_hk, load_date));`,`-- Streaming Music Dimensional Model\nCREATE TABLE dim_user (user_key INT PRIMARY KEY, user_id VARCHAR(50), username VARCHAR(100), plan_type VARCHAR(20), country VARCHAR(50));\nCREATE TABLE dim_song (song_key INT PRIMARY KEY, song_id VARCHAR(50), title VARCHAR(300), artist VARCHAR(200), album VARCHAR(200), genre VARCHAR(50), duration_sec INT);\nCREATE TABLE dim_time (time_key INT PRIMARY KEY, full_timestamp TIMESTAMP, hour INT, day_of_week INT, is_peak_hour BOOLEAN);\nCREATE TABLE fact_plays (play_key BIGSERIAL, user_key INT, song_key INT, time_key INT, listen_duration_sec INT, completed BOOLEAN, source VARCHAR(20));`,`import pandas as pd\n\ndef detect_normalization_issues(df):\n    issues = []\n    # Check for repeating groups (lists in cells)\n    for col in df.columns:\n        if df[col].astype(str).str.contains(',').any():\n            issues.append(f"1NF violation: {col} may contain repeating groups")\n    # Check for partial dependencies (columns correlating with subset of potential key)\n    # Simplified: find columns with low unique ratio that might be repeated\n    for col in df.columns:\n        unique_ratio = df[col].nunique() / len(df)\n        if unique_ratio < 0.1 and df[col].dtype == 'object':\n            issues.append(f"Potential redundancy: {col} has only {df[col].nunique()} unique values across {len(df)} rows")\n    return issues`,`The bus matrix maps business processes (rows) to dimensions (columns).\nPurpose:\n- Identifies conformed dimensions shared across data marts\n- Ensures enterprise-wide consistency\n- Prioritizes which data marts to build first (most shared dimensions)\n- Serves as communication tool between business and technical teams`,`-- Airline Booking ER (as DDL)\nCREATE TABLE passengers (passenger_id SERIAL PRIMARY KEY, name VARCHAR(200), passport_no VARCHAR(50), email VARCHAR(200));\nCREATE TABLE airports (airport_code CHAR(3) PRIMARY KEY, name VARCHAR(200), city VARCHAR(100), country VARCHAR(100));\nCREATE TABLE flights (flight_id SERIAL PRIMARY KEY, flight_number VARCHAR(10), origin CHAR(3) REFERENCES airports, destination CHAR(3) REFERENCES airports, departure_time TIMESTAMP, arrival_time TIMESTAMP, aircraft_type VARCHAR(50));\nCREATE TABLE bookings (booking_id SERIAL PRIMARY KEY, passenger_id INT REFERENCES passengers, flight_id INT REFERENCES flights, seat_class VARCHAR(20), price DECIMAL(10,2), booking_date TIMESTAMP, status VARCHAR(20));`,`-- Denormalized wide fact table\nCREATE TABLE fact_orders_wide AS\nSELECT o.order_id, o.order_date, c.name as customer_name, c.email, c.city,\n    p.product_name, p.category, p.brand, oi.quantity, oi.unit_price, oi.quantity * oi.unit_price as line_total\nFROM orders o\nJOIN customers c ON o.customer_id = c.customer_id\nJOIN order_items oi ON o.order_id = oi.order_id\nJOIN products p ON oi.product_id = p.product_id;`,`Design:\n- OLTP layer: normalized 3NF for app transactions (PostgreSQL)\n- Change stream: CDC captures all changes in real-time\n- OLAP layer: star schema in columnar store (Redshift/BigQuery)\n- Sync: CDC events transform and load to OLAP within minutes\n- Benefit: app gets fast writes, analytics gets fast reads\n- Views: create API views on OLTP for simple reads, analytics dashboards on OLAP`,`import pandas as pd\nimport itertools\n\ndef find_functional_dependencies(df, sample_size=1000):\n    if len(df) > sample_size:\n        df = df.sample(sample_size)\n    deps = []\n    cols = df.columns.tolist()\n    for det in cols:\n        for dep in cols:\n            if det == dep: continue\n            # Check if det -> dep (determinant determines dependent)\n            grouped = df.groupby(det)[dep].nunique()\n            if (grouped == 1).all():\n                deps.append(f"{det} -> {dep}")\n    return deps`,`Design: Bi-temporal model\n- Valid time: when the fact was true in the real world (valid_from, valid_to)\n- Transaction time: when the fact was recorded in the database (recorded_at, superseded_at)\n- Allows: "What did we know about X at time T?" and "What was true about X at time T?"\n- Useful for: auditing, regulatory compliance, correction tracking`,`class SchemaEvolution:\n    def __init__(self, conn, table):\n        self.conn = conn\n        self.table = table\n    \n    def add_column(self, name, dtype, default=None):\n        sql = f"ALTER TABLE {self.table} ADD COLUMN {name} {dtype}"\n        if default is not None:\n            sql += f" DEFAULT {default}"\n        self.conn.execute(sql)\n    \n    def rename_column(self, old_name, new_name):\n        self.conn.execute(f"ALTER TABLE {self.table} RENAME COLUMN {old_name} TO {new_name}")\n    \n    def migrate(self, changes):\n        for change in changes:\n            if change['action'] == 'add':\n                self.add_column(change['name'], change['type'], change.get('default'))\n            elif change['action'] == 'rename':\n                self.rename_column(change['old'], change['new'])`,`Design: Polyglot Persistence\n- User profiles: Document DB (MongoDB) - flexible schema, nested data\n- Sessions/cache: Redis - fast key-value access, TTL support\n- Transactions: PostgreSQL - ACID compliance, relational integrity\n- Search: Elasticsearch - full-text search, fuzzy matching\n- Time-series metrics: InfluxDB/TimescaleDB - optimized for time-ordered data\n- Graph relationships: Neo4j - friend networks, recommendations\n- Analytics: BigQuery/Redshift - columnar, petabyte-scale aggregations`],

4:[`CSV: Simple, human-readable, no types. Use for: small data, quick exports, legacy systems.\nJSON: Nested structures, self-describing. Use for: APIs, config, semi-structured data.\nParquet: Columnar, compressed, typed. Use for: analytics, data lakes, big data.\nAvro: Row-based, schema in file. Use for: Kafka messages, write-heavy, schema evolution.`,`import pandas as pd\ndf = pd.read_csv('data.csv')\ndf.to_parquet('data.parquet', compression='snappy', index=False)\nprint(f"Converted {len(df)} rows to Parquet")`,`Columnar storage stores data by column instead of by row.\nBetter for analytics because:\n1. Only reads columns needed for query (column pruning) - less I/O\n2. Same-type data compresses much better (all integers together)\n3. Vectorized operations on columns are CPU-cache friendly`,`import json\n# Read JSON\nwith open('data.json') as f:\n    data = json.load(f)\n# Write as NDJSON (one JSON object per line)\nwith open('data.jsonl', 'w') as f:\n    for record in data:\n        f.write(json.dumps(record) + '\\n')`,`Predicate pushdown: Filter is applied during file reading (skip row groups where min/max don't match filter). Avoids reading irrelevant data.\nColumn pruning: Only requested columns are read from disk. In Parquet, each column is stored separately, so unneeded columns are never loaded into memory.`,`import pandas as pd\nimport os\n\ndf = pd.DataFrame({'id': range(10000), 'value': range(10000), 'name': ['test']*10000})\ndf.to_csv('data.csv', index=False)\ndf.to_json('data.json', orient='records')\ndf.to_parquet('data.parquet')\n\nfor f in ['data.csv', 'data.json', 'data.parquet']:\n    print(f"{f}: {os.path.getsize(f)/1024:.1f} KB")`,`Schema-on-write: Schema enforced when data is written (RDBMS, typed Parquet). Data must conform.\nSchema-on-read: Schema applied when reading data (data lake, raw JSON). Store anything, interpret later.\nWrite: better quality guarantees. Read: more flexible, faster ingestion.`,`import pandas as pd\nimport os\n\ndef write_partitioned(df, path, partition_cols):\n    for keys, group in df.groupby(partition_cols):\n        if not isinstance(keys, tuple): keys = (keys,)\n        parts = '/'.join(f'{c}={v}' for c, v in zip(partition_cols, keys))\n        full_path = os.path.join(path, parts)\n        os.makedirs(full_path, exist_ok=True)\n        group.drop(columns=partition_cols).to_parquet(f'{full_path}/data.parquet', index=False)`,`# Avro schema for order with line items\navro_schema = {\n    "type": "record", "name": "Order",\n    "fields": [\n        {"name": "order_id", "type": "int"},\n        {"name": "customer_id", "type": "int"},\n        {"name": "order_date", "type": "string"},\n        {"name": "items", "type": {"type": "array", "items": {\n            "type": "record", "name": "LineItem",\n            "fields": [\n                {"name": "product_id", "type": "int"},\n                {"name": "quantity", "type": "int"},\n                {"name": "price", "type": "double"}\n            ]\n        }}}\n    ]\n}`,`Design:\n- Hot (recent 7 days): Parquet on SSD/local, Snappy compression, optimized for fast queries\n- Warm (7-90 days): Parquet on S3 Standard, Zstd compression, partitioned by day\n- Cold (90+ days): Parquet on S3 Glacier, Gzip compression, optimized for storage cost\n- Lifecycle policy auto-transitions data between tiers based on age`,`import pyarrow.parquet as pq\n\n# Read with predicate pushdown (row group filtering)\ntable = pq.read_table('data.parquet', filters=[('year', '=', 2024), ('month', '>=', 6)])\nprint(f"Read {len(table)} rows with filter pushdown")`,`import pyarrow.parquet as pq\nimport pyarrow as pa\nimport pandas as pd\n\ndef merge_schemas(file_paths):\n    tables = []\n    all_fields = {}\n    for path in file_paths:\n        t = pq.read_table(path)\n        for field in t.schema:\n            all_fields[field.name] = field.type\n        tables.append(t)\n    target_schema = pa.schema([(k, v) for k, v in all_fields.items()])\n    # Add missing columns as null\n    aligned = []\n    for t in tables:\n        for name, dtype in all_fields.items():\n            if name not in t.column_names:\n                t = t.append_column(name, pa.array([None]*len(t), type=dtype))\n        aligned.append(t.select(list(all_fields.keys())))\n    return pa.concat_tables(aligned)`,`Delta Lake ACID Transactions:\n- Atomicity: writes either fully succeed or fully fail (no partial files)\n- Consistency: schema enforcement prevents writing wrong types\n- Isolation: concurrent readers/writers don't interfere\n- Durability: committed data persists reliably\nTime Travel: query any previous version by timestamp or version number. Enables: auditing, debugging, rollbacks.`,`import pandas as pd\nimport time\nimport os\n\ndef benchmark_formats(df, base_name='benchmark'):\n    results = []\n    # CSV\n    start = time.time()\n    df.to_csv(f'{base_name}.csv', index=False)\n    write_time = time.time() - start\n    start = time.time()\n    pd.read_csv(f'{base_name}.csv')\n    read_time = time.time() - start\n    results.append({'format': 'CSV', 'write_s': write_time, 'read_s': read_time, 'size_kb': os.path.getsize(f'{base_name}.csv')/1024})\n    # Parquet\n    start = time.time()\n    df.to_parquet(f'{base_name}.parquet')\n    write_time = time.time() - start\n    start = time.time()\n    pd.read_parquet(f'{base_name}.parquet')\n    read_time = time.time() - start\n    results.append({'format': 'Parquet', 'write_s': write_time, 'read_s': read_time, 'size_kb': os.path.getsize(f'{base_name}.parquet')/1024})\n    return pd.DataFrame(results)`,`import os\nimport pandas as pd\n\ndef compact_partition(path, target_size_mb=256):\n    files = [f for f in os.listdir(path) if f.endswith('.parquet')]\n    small = [f for f in files if os.path.getsize(os.path.join(path,f)) < target_size_mb*0.5*1024*1024]\n    if len(small) < 2: return "No compaction needed"\n    dfs = [pd.read_parquet(os.path.join(path, f)) for f in small]\n    combined = pd.concat(dfs, ignore_index=True)\n    combined.to_parquet(os.path.join(path, 'compacted.parquet'), index=False)\n    for f in small: os.remove(os.path.join(path, f))\n    return f"Compacted {len(small)} files into 1"`,`Design: Delta-like versioning system:\n- Each write creates new Parquet files (never modify existing)\n- JSON metadata log tracks: version, timestamp, files added/removed\n- Read: find latest metadata, read listed files\n- Time travel: read metadata at specific version\n- Compaction: rewrite small files, update metadata to point to new files`,`Design: Migration strategy:\n1. Assessment: catalog all CSV files, schemas, sizes, access patterns\n2. Parallel write: new data written to both CSV and Parquet during transition\n3. Convert cold data first (less accessed) in background batches\n4. Update read paths to prefer Parquet when available, fall back to CSV\n5. Validate: compare query results between formats\n6. Cutover: update all readers to Parquet-only, archive CSV to cold storage`,`import json\n\nclass SchemaRegistry:\n    def __init__(self):\n        self.schemas = {}\n    \n    def register(self, name, version, schema):\n        key = f"{name}:v{version}"\n        self.schemas[key] = schema\n    \n    def validate(self, name, version, record):\n        key = f"{name}:v{version}"\n        schema = self.schemas.get(key)\n        if not schema: raise ValueError(f"Schema {key} not found")\n        errors = []\n        for field in schema['fields']:\n            if field['name'] not in record and 'null' not in str(field.get('type', '')):\n                errors.append(f"Missing required field: {field['name']}")\n        return errors`,`# Custom Parquet writer with row group control\nimport pyarrow as pa\nimport pyarrow.parquet as pq\n\ndef write_with_row_groups(df, path, row_group_size=100000):\n    table = pa.Table.from_pandas(df)\n    writer = pq.ParquetWriter(path, table.schema, compression='snappy')\n    for i in range(0, len(table), row_group_size):\n        chunk = table.slice(i, min(row_group_size, len(table)-i))\n        writer.write_table(chunk)\n    writer.close()\n    # Verify\n    pf = pq.ParquetFile(path)\n    print(f"Written {pf.metadata.num_row_groups} row groups")`,`Design: Iceberg-like format:\n- Table metadata: JSON file pointing to manifest list\n- Manifest list: lists all manifest files for current snapshot\n- Manifest files: lists data files with partition values and stats\n- Hidden partitioning: partition transform defined in metadata, not in path\n- Snapshot isolation: each write creates new snapshot; readers use consistent snapshot\n- Schema evolution: metadata tracks column changes without rewriting data`],

5:[`Data profiling analyzes datasets to understand structure, content, and quality.\nMetrics to capture: data types, null percentages, unique counts, min/max values, value distributions, patterns, outliers, and correlations between columns.`,`import pandas as pd\ndef check_nulls(df, columns):\n    report = []\n    for col in columns:\n        null_count = df[col].isnull().sum()\n        null_pct = null_count / len(df) * 100\n        report.append({'column': col, 'null_count': null_count, 'null_pct': f'{null_pct:.1f}%'})\n    return pd.DataFrame(report)\n\n# Usage: check_nulls(df, ['email', 'phone', 'address'])`,`Common data quality issues:\n1. Missing values (nulls in required fields)\n2. Duplicates (same record appearing multiple times)\n3. Inconsistent formats (dates as '2024-01-15' vs '01/15/2024')\n4. Outliers/impossible values (age=999, negative prices)\n5. Referential integrity violations (orders with non-existent customer_ids)`,`import pandas as pd\ndef deduplicate(df, key_cols, keep='last'):\n    before = len(df)\n    df = df.drop_duplicates(subset=key_cols, keep=keep)\n    print(f"Removed {before - len(df)} duplicates")\n    return df`,`Schema drift is when the structure of incoming data changes unexpectedly (new columns, renamed columns, type changes).\nDetect by: comparing current schema against a registered/expected schema, alerting on differences like new columns, missing columns, or type changes.`,`import pandas as pd\nimport re\ndef validate_formats(df):\n    issues = []\n    email_pattern = r'^[\\w.+-]+@[\\w-]+\\.[a-zA-Z]{2,}$'\n    for idx, row in df.iterrows():\n        if not re.match(email_pattern, str(row.get('email', ''))):\n            issues.append(f"Row {idx}: invalid email")\n        phone = str(row.get('phone', ''))\n        if phone and not re.match(r'^\\+?[\\d\\-\\s]{10,15}$', phone):\n            issues.append(f"Row {idx}: invalid phone")\n    return issues`,`import pandas as pd\ndef profile(df):\n    report = []\n    for col in df.columns:\n        stats = {'column': col, 'dtype': str(df[col].dtype), 'null_pct': f"{df[col].isnull().mean()*100:.1f}%", 'unique_pct': f"{df[col].nunique()/len(df)*100:.1f}%"}\n        if df[col].dtype in ['int64','float64']:\n            stats.update({'min': df[col].min(), 'max': df[col].max(), 'mean': f"{df[col].mean():.2f}"})\n        report.append(stats)\n    return pd.DataFrame(report)`,`def check_completeness(df, rules):\n    results = []\n    for col, min_fill in rules.items():\n        fill_rate = (1 - df[col].isnull().mean()) * 100\n        passed = fill_rate >= min_fill\n        results.append({'column': col, 'fill_rate': f'{fill_rate:.1f}%', 'required': f'{min_fill}%', 'status': 'PASS' if passed else 'FAIL'})\n    return results\n# Usage: check_completeness(df, {'email': 99, 'phone': 70, 'address': 50})`,`import pandas as pd\nimport numpy as np\ndef detect_outliers_iqr(df, columns):\n    outliers = {}\n    for col in columns:\n        Q1 = df[col].quantile(0.25)\n        Q3 = df[col].quantile(0.75)\n        IQR = Q3 - Q1\n        lower = Q1 - 1.5 * IQR\n        upper = Q3 + 1.5 * IQR\n        mask = (df[col] < lower) | (df[col] > upper)\n        outliers[col] = {'count': mask.sum(), 'lower_bound': lower, 'upper_bound': upper}\n    return outliers`,`Design: Configurable DQ Framework\n- Define rules in YAML: {column, check_type, params, severity}\n- Check types: not_null, unique, range, pattern, referential, custom_sql\n- Runner: iterate rules, apply to DataFrame, collect results\n- Reporter: generate HTML report with pass/fail per rule\n- Integration: plug into pipeline as validation step between transform and load`,`from difflib import SequenceMatcher\ndef fuzzy_dedup(df, col, threshold=0.85):\n    values = df[col].tolist()\n    drop_indices = set()\n    for i in range(len(values)):\n        if i in drop_indices: continue\n        for j in range(i+1, len(values)):\n            if j in drop_indices: continue\n            sim = SequenceMatcher(None, str(values[i]).lower(), str(values[j]).lower()).ratio()\n            if sim >= threshold:\n                drop_indices.add(j)\n    return df.drop(index=list(drop_indices)).reset_index(drop=True)`,`import pandas as pd\ndef detect_drift(baseline, current, cols, threshold=0.2):\n    alerts = []\n    for col in cols:\n        if baseline[col].dtype in ['int64','float64']:\n            base_mean = baseline[col].mean()\n            curr_mean = current[col].mean()\n            change = abs(curr_mean - base_mean) / (abs(base_mean) + 1e-10)\n            if change > threshold:\n                alerts.append(f"DRIFT: {col} mean changed {change*100:.0f}%")\n        else:\n            new_vals = set(current[col].unique()) - set(baseline[col].unique())\n            if new_vals:\n                alerts.append(f"DRIFT: {col} has new values: {new_vals}")\n    return alerts`,`import re\ndef validate_schema(record, schema):\n    errors = []\n    for field, rules in schema.items():\n        val = record.get(field)\n        if rules.get('required') and val is None:\n            errors.append(f"{field}: required")\n            continue\n        if val is None: continue\n        if 'type' in rules and not isinstance(val, rules['type']):\n            errors.append(f"{field}: wrong type")\n        if 'pattern' in rules and not re.match(rules['pattern'], str(val)):\n            errors.append(f"{field}: pattern mismatch")\n        if 'min' in rules and val < rules['min']:\n            errors.append(f"{field}: below min")\n    return errors`,`Design: DQ Dashboard\n- Track metrics per table: completeness, freshness, uniqueness, validity scores\n- Store daily snapshots in a metrics table\n- Visualize trends: line charts showing quality scores over time\n- Alert thresholds: red/yellow/green based on configurable limits\n- Drill-down: click table to see per-column details and failing records`,`def check_referential_integrity(child_df, parent_df, child_fk, parent_pk):\n    child_keys = set(child_df[child_fk].dropna())\n    parent_keys = set(parent_df[parent_pk])\n    orphans = child_keys - parent_keys\n    if orphans:\n        return f"FAIL: {len(orphans)} orphan records in {child_fk}. Examples: {list(orphans)[:5]}"\n    return "PASS: All foreign keys valid"`,`class DQChecker:\n    def __init__(self, df):\n        self.df = df\n        self.results = []\n    def expect_not_null(self, col):\n        self.results.append({'check': f'{col} not_null', 'passed': self.df[col].notna().all()})\n        return self\n    def expect_unique(self, col):\n        self.results.append({'check': f'{col} unique', 'passed': self.df[col].nunique() == len(self.df)})\n        return self\n    def expect_in_range(self, col, min_v, max_v):\n        self.results.append({'check': f'{col} range', 'passed': self.df[col].between(min_v, max_v).all()})\n        return self\n    def report(self):\n        for r in self.results:\n            print(f"[{'PASS' if r['passed'] else 'FAIL'}] {r['check']}")`,`Design: Automated DQ System\n- Quarantine: records failing validation go to quarantine table with error reason\n- Threshold alerts: if >X% records fail, halt pipeline and alert\n- Auto-remediation: for known patterns (e.g., null -> default), auto-fix\n- Escalation: critical failures page on-call, warnings go to Slack\n- Reconciliation: count source vs target rows after each load`,`import pandas as pd\nfrom datetime import datetime, timedelta\ndef detect_volume_anomaly(daily_counts, lookback=30, threshold=2.0):\n    mean = daily_counts[-lookback:].mean()\n    std = daily_counts[-lookback:].std()\n    latest = daily_counts.iloc[-1]\n    z_score = abs(latest - mean) / (std + 1e-10)\n    if z_score > threshold:\n        return f"ANOMALY: today={latest}, expected={mean:.0f}+/-{std:.0f}, z={z_score:.1f}"\n    return "OK"`,`def reconcile(source_conn, target_conn, table, key_col):\n    source_df = pd.read_sql(f"SELECT {key_col}, COUNT(*) as cnt FROM {table} GROUP BY {key_col}", source_conn)\n    target_df = pd.read_sql(f"SELECT {key_col}, COUNT(*) as cnt FROM {table} GROUP BY {key_col}", target_conn)\n    merged = source_df.merge(target_df, on=key_col, how='outer', suffixes=('_src','_tgt'))\n    mismatches = merged[merged['cnt_src'] != merged['cnt_tgt']]\n    return f"Reconciliation: {len(mismatches)} mismatches out of {len(merged)} keys"`,`Design: DQ SLA System\n- Quality Score = weighted average of completeness, validity, freshness, uniqueness (0-100)\n- SLA per table: minimum quality score, max staleness, min row count\n- Lineage: track which upstream tables affect downstream quality\n- Dashboard: real-time quality scores with traffic-light indicators\n- Auto-remediation: pre-defined fix actions for common failures\n- Reporting: weekly quality summary emails to data owners`],

6:[`Idempotency means running an operation multiple times produces the same result as running it once.\nCritical because: pipelines fail and get retried; without idempotency, retries create duplicates or corrupt data. Implement via DELETE-INSERT (overwrite partition) or UPSERT (merge on key).`,`# Cron expressions:\n# Daily at 3AM:        0 3 * * *\n# Every 6 hours:       0 */6 * * *\n# Weekly Monday midnight: 0 0 * * 1`,`Full Load: Replace entire target table each run.\n+ Simple, always consistent\n- Expensive for large tables, slow\n\nIncremental Load: Only process new/changed records.\n+ Fast, efficient for large tables\n- More complex, needs watermark tracking, may miss deletes`,`def idempotent_load(conn, df, table, partition_col, partition_val):\n    conn.execute(f"DELETE FROM {table} WHERE {partition_col} = '{partition_val}'")\n    df.to_sql(table, conn, if_exists='append', index=False)\n    conn.commit()\n    print(f"Loaded {len(df)} rows for {partition_col}={partition_val}")`,`Checkpointing saves pipeline progress so it can resume from the last successful point after a failure, rather than restarting from scratch. Stores: last processed record ID, file offset, or partition timestamp.`,`import json, os\nclass Checkpoint:\n    def __init__(self, path):\n        self.path = path\n        self.state = json.load(open(path)) if os.path.exists(path) else {}\n    def save(self, key, value):\n        self.state[key] = value\n        with open(self.path, 'w') as f: json.dump(self.state, f)\n    def get(self, key, default=None):\n        return self.state.get(key, default)`,`A backfill reprocesses historical data for a range of dates/partitions.\nNeeded when: pipeline logic changes, new source added, bug fix requires reprocessing, or data was corrupted and needs to be rebuilt from source.`,`def incremental_extract(conn, table, ts_col, last_watermark):\n    import pandas as pd\n    query = f"SELECT * FROM {table} WHERE {ts_col} > '{last_watermark}' ORDER BY {ts_col}"\n    df = pd.read_sql(query, conn)\n    new_wm = str(df[ts_col].max()) if len(df) > 0 else last_watermark\n    return df, new_wm`,`import logging\ndef batch_with_error_handling(items, process_fn, batch_size=100):\n    logger = logging.getLogger('batch')\n    success, failed = 0, 0\n    for i in range(0, len(items), batch_size):\n        batch = items[i:i+batch_size]\n        try:\n            process_fn(batch)\n            success += len(batch)\n        except Exception as e:\n            logger.error(f"Batch {i//batch_size} failed: {e}")\n            failed += len(batch)\n    return {'success': success, 'failed': failed}`,`Design: 5 pipelines scheduling strategy\n- Pipeline A (source extract): 1:00 AM daily\n- Pipeline B (depends on A): 2:00 AM daily, sensor waits for A\n- Pipeline C (independent): Every 6 hours\n- Pipeline D (depends on B+C): 3:00 AM, waits for both B and C's latest run\n- Pipeline E (weekly aggregate): Sunday 4:00 AM, depends on all daily runs completing`,`def upsert(conn, df, table, key_cols):\n    import pandas as pd\n    for _, row in df.iterrows():\n        key_filter = ' AND '.join(f"{k} = '{row[k]}'" for k in key_cols)\n        existing = pd.read_sql(f"SELECT 1 FROM {table} WHERE {key_filter}", conn)\n        if len(existing) > 0:\n            sets = ', '.join(f"{c} = '{row[c]}'" for c in df.columns if c not in key_cols)\n            conn.execute(f"UPDATE {table} SET {sets} WHERE {key_filter}")\n        else:\n            row.to_frame().T.to_sql(table, conn, if_exists='append', index=False)\n    conn.commit()`,`from datetime import date, timedelta\ndef backfill(start, end, pipeline_fn):\n    current = start\n    results = []\n    while current <= end:\n        try:\n            pipeline_fn(current)\n            results.append({'date': current, 'status': 'success'})\n        except Exception as e:\n            results.append({'date': current, 'status': 'failed', 'error': str(e)})\n        current += timedelta(days=1)\n    return results`,`Design: Retry strategy\n- Attempt 1: immediate\n- Attempt 2: wait 30 seconds\n- Attempt 3: wait 2 minutes\n- Attempt 4: wait 10 minutes\n- After 4 failures: send alert, move to dead letter queue\n- Add jitter: multiply delay by random(0.5, 1.5) to avoid thundering herd`,`import json, os\nclass FileCheckpointer:\n    def __init__(self, checkpoint_dir):\n        self.dir = checkpoint_dir\n        os.makedirs(checkpoint_dir, exist_ok=True)\n    def save(self, pipeline_name, state):\n        path = os.path.join(self.dir, f'{pipeline_name}.json')\n        with open(path, 'w') as f: json.dump(state, f)\n    def load(self, pipeline_name):\n        path = os.path.join(self.dir, f'{pipeline_name}.json')\n        if os.path.exists(path):\n            return json.load(open(path))\n        return {}`,`def check_freshness(conn, table, ts_col, max_hours=24):\n    import pandas as pd\n    from datetime import datetime\n    result = pd.read_sql(f"SELECT MAX({ts_col}) as latest FROM {table}", conn)\n    latest = pd.to_datetime(result['latest'].iloc[0])\n    hours_old = (datetime.now() - latest).total_seconds() / 3600\n    if hours_old > max_hours:\n        raise ValueError(f"Data too stale: {hours_old:.1f}h old (max {max_hours}h)")\n    return True`,`class BatchFramework:\n    def __init__(self):\n        self.steps = []\n    def add_step(self, name, fn, depends_on=None, rollback_fn=None):\n        self.steps.append({'name': name, 'fn': fn, 'deps': depends_on or [], 'rollback': rollback_fn})\n    def run(self):\n        completed = []\n        for step in self.steps:\n            try:\n                step['fn']()\n                completed.append(step['name'])\n            except Exception as e:\n                print(f"FAILED: {step['name']} - {e}")\n                # Rollback completed steps in reverse\n                for name in reversed(completed):\n                    s = next(s for s in self.steps if s['name'] == name)\n                    if s['rollback']: s['rollback']()\n                raise`,`Design: Exactly-once processing\n1. Use at-least-once delivery (Kafka with acks=all, retries)\n2. Make processing idempotent (dedup on message ID or natural key)\n3. Use transactional writes: commit offset + write result atomically\n4. Or: use target-side dedup (UPSERT/MERGE on unique key)\nResult: messages may be delivered multiple times but processed exactly once.`,`from concurrent.futures import ProcessPoolExecutor\nimport json\n\nclass ParallelBatch:\n    def __init__(self, num_workers=4, checkpoint_path='checkpoint.json'):\n        self.workers = num_workers\n        self.cp_path = checkpoint_path\n    \n    def process(self, items, fn):\n        done = self.load_checkpoint()\n        remaining = [i for i in items if i not in done]\n        with ProcessPoolExecutor(self.workers) as executor:\n            for item, result in zip(remaining, executor.map(fn, remaining)):\n                done.add(item)\n                self.save_checkpoint(done)\n    \n    def load_checkpoint(self):\n        try: return set(json.load(open(self.cp_path)))\n        except: return set()\n    def save_checkpoint(self, done):\n        json.dump(list(done), open(self.cp_path, 'w'))`,`Design: Smart scheduling\n- Monitor source data arrival times (track when new data appears)\n- Use sensors/polls to detect data readiness\n- Auto-adjust schedule: if data consistently arrives at 1:30 AM, schedule pipeline for 2:00 AM\n- Adaptive: if data arrives early, trigger early; if late, wait with timeout\n- SLA tracking: alert if pipeline hasn't completed by deadline regardless of start time`,`class CDCProcessor:\n    def __init__(self, conn):\n        self.conn = conn\n    def process(self, changes):\n        # Sort by timestamp to maintain order\n        changes = changes.sort_values('_cdc_timestamp')\n        for _, row in changes.iterrows():\n            op = row['_cdc_operation']\n            if op == 'INSERT':\n                self.conn.execute(f"INSERT INTO target ...")\n            elif op == 'UPDATE':\n                self.conn.execute(f"UPDATE target SET ... WHERE id = {row['id']}")\n            elif op == 'DELETE':\n                self.conn.execute(f"DELETE FROM target WHERE id = {row['id']}")\n        self.conn.commit()`],
7:[`A DAG (Directed Acyclic Graph) defines workflow as tasks (nodes) connected by dependencies (edges).\nMust be acyclic because: circular dependencies would create infinite loops - task A waits for B which waits for A. Airflow needs a clear execution order.`,`from airflow import DAG\nfrom airflow.operators.python import PythonOperator\nfrom datetime import datetime\n\ndef task_a(): print("Extracting")\ndef task_b(): print("Transforming")\ndef task_c(): print("Loading")\n\nwith DAG('simple_dag', start_date=datetime(2024,1,1), schedule_interval='@daily', catchup=False) as dag:\n    a = PythonOperator(task_id='extract', python_callable=task_a)\n    b = PythonOperator(task_id='transform', python_callable=task_b)\n    c = PythonOperator(task_id='load', python_callable=task_c)\n    a >> b >> c`,`Operators: Define what work to do (run Python, execute SQL, transfer data). They execute immediately.\nSensors: Wait for a condition to be true before proceeding (file exists, API healthy, upstream done). They poll/check repeatedly until condition met or timeout.`,`from airflow import DAG\nfrom airflow.sensors.filesystem import FileSensor\nfrom airflow.operators.python import PythonOperator\nfrom datetime import datetime\n\nwith DAG('file_dag', start_date=datetime(2024,1,1), schedule_interval='@daily') as dag:\n    wait = FileSensor(task_id='wait_file', filepath='/data/input_{{ ds }}.csv', poke_interval=60, timeout=3600)\n    process = PythonOperator(task_id='process', python_callable=lambda: print("Processing file"))\n    wait >> process`,`XComs (Cross-Communication) allow tasks to share small pieces of data (file paths, row counts, status flags).\nUse when: passing metadata between tasks (path to file, number of records extracted).\nDon't use when: passing large datasets - use external storage (S3, database) instead. XCom has size limits.`,`from airflow.operators.python import PythonOperator\n\ndef push_task(**ctx):\n    file_path = '/data/output_' + ctx['ds'] + '.parquet'\n    ctx['ti'].xcom_push(key='output_path', value=file_path)\n    return file_path\n\ndef pull_task(**ctx):\n    path = ctx['ti'].xcom_pull(task_ids='push', key='output_path')\n    print(f"Processing file at: {path}")\n\npush = PythonOperator(task_id='push', python_callable=push_task)\npull = PythonOperator(task_id='pull', python_callable=pull_task)\npush >> pull`,`catchup=True: Airflow runs all missed DAG runs between start_date and now. Use when: you need to backfill historical data (e.g., process every day since Jan 1).\ncatchup=False: Only run current/future schedules, skip past. Use when: pipeline only needs current data, no backfill needed (e.g., real-time dashboards).`,`from airflow.operators.python import BranchPythonOperator, PythonOperator\n\ndef decide_load_type(**ctx):\n    # Check if it's the first of the month for full load\n    from datetime import datetime\n    if datetime.strptime(ctx['ds'], '%Y-%m-%d').day == 1:\n        return 'full_load'\n    return 'incremental_load'\n\nbranch = BranchPythonOperator(task_id='decide', python_callable=decide_load_type)\nfull = PythonOperator(task_id='full_load', python_callable=lambda: print("Full load"))\nincr = PythonOperator(task_id='incremental_load', python_callable=lambda: print("Incremental"))\nbranch >> [full, incr]`,`from airflow import DAG\nfrom airflow.operators.python import PythonOperator\nfrom airflow.utils.task_group import TaskGroup\nfrom datetime import datetime\n\nwith DAG('grouped_dag', start_date=datetime(2024,1,1), schedule_interval='@daily') as dag:\n    with TaskGroup('extract') as extract_group:\n        e1 = PythonOperator(task_id='extract_users', python_callable=lambda: None)\n        e2 = PythonOperator(task_id='extract_orders', python_callable=lambda: None)\n    with TaskGroup('transform') as transform_group:\n        t1 = PythonOperator(task_id='clean', python_callable=lambda: None)\n    with TaskGroup('quality') as qc_group:\n        q1 = PythonOperator(task_id='null_check', python_callable=lambda: None)\n        q2 = PythonOperator(task_id='schema_check', python_callable=lambda: None)\n    extract_group >> qc_group >> transform_group`,`Design: Multi-source ETL DAG\n- extract_users, extract_orders, extract_products run in PARALLEL (no dependencies)\n- After all 3 complete: validate_schema task checks all sources\n- transform_join: joins users + orders + products into unified model\n- load_warehouse: loads joined data to target\n- notify: sends completion message\nDependency: [extract_users, extract_orders, extract_products] >> validate >> transform_join >> load >> notify`,`from airflow import DAG\nfrom airflow.operators.python import PythonOperator\nfrom datetime import datetime, timedelta\n\ndef on_failure(context):\n    print(f"ALERT: {context['task_instance'].task_id} failed!")\n\ndefault_args = {\n    'retries': 3,\n    'retry_delay': timedelta(minutes=5),\n    'retry_exponential_backoff': True,\n    'max_retry_delay': timedelta(minutes=30),\n    'on_failure_callback': on_failure\n}\n\nwith DAG('retry_dag', default_args=default_args, start_date=datetime(2024,1,1)) as dag:\n    task = PythonOperator(task_id='flaky_task', python_callable=lambda: None)`,`import yaml\nfrom airflow import DAG\nfrom airflow.operators.python import PythonOperator\nfrom datetime import datetime\n\nsources = [{'name': 'users', 'schedule': '@daily'}, {'name': 'orders', 'schedule': '@hourly'}]\n\nfor src in sources:\n    dag = DAG(f"etl_{src['name']}", schedule_interval=src['schedule'], start_date=datetime(2024,1,1), catchup=False)\n    extract = PythonOperator(task_id='extract', python_callable=lambda s=src: print(f"Extract {s['name']}"), dag=dag)\n    load = PythonOperator(task_id='load', python_callable=lambda s=src: print(f"Load {s['name']}"), dag=dag)\n    extract >> load\n    globals()[f"etl_{src['name']}"] = dag`,`from airflow.models import BaseOperator\nfrom airflow.utils.decorators import apply_defaults\nimport requests\n\nclass APIToS3Operator(BaseOperator):\n    @apply_defaults\n    def __init__(self, endpoint, s3_bucket, s3_key, **kwargs):\n        super().__init__(**kwargs)\n        self.endpoint = endpoint\n        self.s3_bucket = s3_bucket\n        self.s3_key = s3_key\n    \n    def execute(self, context):\n        response = requests.get(self.endpoint)\n        response.raise_for_status()\n        # Upload to S3\n        import boto3\n        s3 = boto3.client('s3')\n        s3.put_object(Bucket=self.s3_bucket, Key=self.s3_key, Body=response.content)\n        return self.s3_key`,`Design: Warehouse refresh DAG structure\n1. [staging_users, staging_orders, staging_products] - parallel staging loads\n2. [dim_customer, dim_product, dim_date] - dimension loads (depend on staging)\n3. [fact_sales, fact_inventory] - fact loads (depend on dimensions)\n4. [agg_daily_sales, agg_monthly_summary] - aggregations (depend on facts)\n5. notify_completion - final notification`,`from airflow import DAG\nfrom airflow.sensors.external_task import ExternalTaskSensor\nfrom airflow.operators.python import PythonOperator\nfrom datetime import datetime\n\nwith DAG('downstream_dag', start_date=datetime(2024,1,1), schedule_interval='@daily') as dag:\n    wait = ExternalTaskSensor(\n        task_id='wait_upstream',\n        external_dag_id='upstream_etl',\n        external_task_id='final_task',\n        timeout=7200,\n        mode='reschedule'\n    )\n    process = PythonOperator(task_id='process', python_callable=lambda: print("Running after upstream"))\n    wait >> process`,`# Complete production DAG with all components\n# Includes: sensor, extract, validate, transform, load, alert\n# See Theory section "Complete ETL DAG" example for full implementation\n# Key additions: SLA monitoring, failure callbacks, quality gates between steps`,`Design: Multi-tenant Airflow\n- Config store: YAML/DB per client with source configs, schedules, transformations\n- DAG factory: Python module reads all client configs, generates DAGs dynamically\n- Isolation: separate pools per client (resource limits), separate connections\n- Variables: client-specific Airflow Variables for credentials/paths\n- Monitoring: per-client dashboards and alerting rules`,`from airflow.plugins_manager import AirflowPlugin\nfrom airflow.models import BaseOperator\nfrom airflow.hooks.base import BaseHook\nfrom airflow.sensors.base import BaseSensorOperator\n\nclass CustomHook(BaseHook):\n    def get_conn(self): return "custom_connection"\n\nclass CustomOperator(BaseOperator):\n    def execute(self, context): pass\n\nclass CustomSensor(BaseSensorOperator):\n    def poke(self, context): return True\n\nclass CustomPlugin(AirflowPlugin):\n    name = "custom_plugin"\n    hooks = [CustomHook]\n    operators = [CustomOperator]\n    sensors = [CustomSensor]`,`Design: ML Pipeline DAG\n1. data_extraction: pull training data from warehouse\n2. feature_engineering: compute features, handle missing values\n3. data_split: train/test/validation split\n4. model_training: train model (may branch for multiple algorithms)\n5. model_evaluation: compare metrics, select best\n6. model_validation: test against baseline, check for bias\n7. model_deployment: push to model registry, update serving endpoint\n8. monitoring_setup: configure prediction monitoring alerts`,`# Self-healing DAG concept:\n# 1. Main DAG runs daily with SLA\n# 2. Health-check DAG runs hourly, checks for missed/failed runs\n# 3. If failures detected: trigger backfill DAG for missed dates\n# 4. Backfill DAG: parameterized with date range, runs with lower priority\n# Uses: ExternalTaskSensor, TriggerDagRunOperator, and XComs for state`],

8:[`Batch: processes accumulated data at scheduled intervals (hourly/daily). Good for large volumes, complex transforms.\nStream: processes data record-by-record in real-time as it arrives. Good for low latency, alerts, live dashboards.`,`from kafka import KafkaProducer\nimport json\nproducer = KafkaProducer(bootstrap_servers='localhost:9092', value_serializer=lambda v: json.dumps(v).encode())\nproducer.send('events', value={'user_id': 1, 'action': 'click', 'ts': '2024-01-15T10:00:00'})\nproducer.flush()`,`Consumer groups: multiple consumers share partitions of a topic.\n- Each partition is read by exactly one consumer in the group\n- Adding consumers = more parallelism (up to number of partitions)\n- If consumer fails, its partitions are rebalanced to remaining consumers`,`from kafka import KafkaConsumer\nimport json\nconsumer = KafkaConsumer('events', bootstrap_servers='localhost:9092', group_id='analytics', value_deserializer=lambda m: json.loads(m.decode()))\nfor msg in consumer:\n    print(f"Partition:{msg.partition} Offset:{msg.offset} Value:{msg.value}")`,`Tumbling: Fixed-size non-overlapping windows. [0-5min][5-10min][10-15min]\nSliding: Fixed-size overlapping windows. Window every 1min of size 5min.\nSession: Dynamic windows based on activity. Close after N minutes of inactivity per user.`,`from collections import defaultdict\nclass EventCounter:\n    def __init__(self):\n        self.counts = defaultdict(int)\n    def count(self, event):\n        category = event.get('category', 'unknown')\n        self.counts[category] += 1\n    def report(self):\n        return dict(self.counts)`,`At-most-once: Send and forget. Fast but may lose messages.\nAt-least-once: Retry until acknowledged. No loss but may duplicate.\nExactly-once: Each message processed exactly once. Requires: idempotent processing + transactional commits.`,`from collections import defaultdict\nimport time\nclass TumblingWindow:\n    def __init__(self, window_sec=300):\n        self.window_sec = window_sec\n        self.windows = defaultdict(lambda: {'count':0,'sum':0})\n    def add(self, value, ts=None):\n        ts = ts or int(time.time())\n        w = ts - (ts % self.window_sec)\n        self.windows[w]['count'] += 1\n        self.windows[w]['sum'] += value\n    def get_window(self, ts):\n        w = ts - (ts % self.window_sec)\n        return self.windows[w]`,`def route_event(event):\n    event_type = event.get('type', '')\n    routing = {'purchase': 'revenue_topic', 'error': 'alerts_topic', 'click': 'analytics_topic'}\n    return routing.get(event_type, 'default_topic')`,`Design: Real-time fraud detection\n1. Payment events stream to Kafka topic\n2. Stream processor enriches with user history (from cache)\n3. Rule engine checks: amount > threshold, frequency anomaly, geo mismatch\n4. ML model scores transaction risk in real-time\n5. High-risk: block + alert. Medium: flag for review. Low: allow.\n6. Feedback loop: confirmed fraud updates ML model`,`class IdempotentConsumer:\n    def __init__(self):\n        self.processed = set()\n    def process(self, message):\n        msg_id = message.get('id') or hash(str(message))\n        if msg_id in self.processed:\n            return None  # Skip duplicate\n        result = self.handle(message)\n        self.processed.add(msg_id)\n        return result\n    def handle(self, message):\n        return {'processed': message}`,`class StreamEnricher:\n    def __init__(self, lookup_data):\n        self.cache = {r['id']: r for r in lookup_data}\n    def enrich(self, event):\n        key = event.get('user_id')\n        if key in self.cache:\n            event['user_name'] = self.cache[key].get('name')\n            event['user_segment'] = self.cache[key].get('segment')\n        return event`,`Design: Event-driven order processing\n- OrderPlaced -> PaymentService (validate payment)\n- PaymentConfirmed -> InventoryService (reserve stock)\n- InventoryReserved -> ShippingService (create shipment)\n- Each service publishes events, subscribes to relevant topics\n- Saga pattern handles failures (compensating transactions)`,`class DeadLetterQueue:\n    def __init__(self):\n        self.dlq = []\n    def process_with_dlq(self, messages, handler):\n        for msg in messages:\n            try:\n                handler(msg)\n            except Exception as e:\n                self.dlq.append({'message': msg, 'error': str(e)})\n    def retry_dlq(self, handler):\n        retry = self.dlq[:]\n        self.dlq = []\n        self.process_with_dlq(retry, handler)`,`class SessionWindow:\n    def __init__(self, gap_sec=300):\n        self.gap = gap_sec\n        self.sessions = {}  # user -> {events, last_ts}\n    def add(self, user_id, event, ts):\n        if user_id in self.sessions and ts - self.sessions[user_id]['last'] > self.gap:\n            closed = self.sessions.pop(user_id)  # Close old session\n            return closed  # Return completed session\n        if user_id not in self.sessions:\n            self.sessions[user_id] = {'events': [], 'last': 0}\n        self.sessions[user_id]['events'].append(event)\n        self.sessions[user_id]['last'] = ts\n        return None`,`# Watermark-based processor handles late events\n# See Theory section "Stream Processing Patterns" for implementation\n# Key concept: watermark = max_event_time - allowed_lateness\n# Events arriving after watermark passes their window are dropped or sent to late-data handler`,`Design: Exactly-once with Kafka\n1. Producer: enable.idempotence=true (no duplicate sends)\n2. Transactional producer: atomic multi-partition writes\n3. Consumer: read_committed isolation (only see committed messages)\n4. Processing: consume + transform + produce in single transaction\n5. Offset commit included in transaction (atomic with output)`,`# Stream-stream join: correlate events from two topics within time window\n# Example: join page_views with purchases within 30-minute window\n# Implementation: buffer events from both streams keyed by us
