{title:"Real-Time Event Counter",desc:"Count events per category in real-time using tumbling windows.",code:"from collections import defaultdict\nimport time\nimport json\n\nclass RealTimeCounter:\n    def __init__(self, window_seconds=60):\n        self.window_size = window_seconds\n        self.current_window = defaultdict(int)\n        self.window_start = int(time.time())\n    \n    def process_event(self, event):\n        now = int(time.time())\n        # Check if window expired\n        if now - self.window_start >= self.window_size:\n            self.emit_window()\n            self.current_window = defaultdict(int)\n            self.window_start = now\n        \n        category = event.get('category', 'unknown')\n        self.current_window[category] += 1\n    \n    def emit_window(self):\n        print(f'Window {self.window_start}: {dict(self.current_window)}')\n\n# Simulate\ncounter = RealTimeCounter(window_seconds=10)\nevents = [{'category': 'click'}, {'category': 'purchase'}, {'category': 'click'}]\nfor e in events:\n    counter.process_event(e)"},
{title:"Kafka Producer-Consumer Pipeline",desc:"Complete Kafka pipeline with producer, processing, and dead letter queue.",code:"from kafka import KafkaProducer, KafkaConsumer\nimport json\n\nclass EventPipeline:\n    def __init__(self, bootstrap_servers):\n        self.producer = KafkaProducer(\n            bootstrap_servers=bootstrap_servers,\n            value_serializer=lambda v: json.dumps(v).encode()\n        )\n        self.consumer = KafkaConsumer(\n            'input_events',\n            bootstrap_servers=bootstrap_servers,\n            group_id='processor_group',\n            value_deserializer=lambda m: json.loads(m.decode())\n        )\n    \n    def process_events(self):\n        for message in self.consumer:\n            try:\n                result = self.transform(message.value)\n                self.producer.send('output_events', value=result)\n            except Exception as e:\n                # Send to dead letter queue\n                error_event = {'original': message.value, 'error': str(e)}\n                self.producer.send('dead_letter_queue', value=error_event)\n    \n    def transform(self, event):\n        event['processed_at'] = '2024-01-01T00:00:00'\n        event['amount_usd'] = event.get('amount', 0) * 1.0\n        return event"},
{title:"Stream Aggregation with Late Events",desc:"Handle late-arriving events in stream aggregation using watermarks.",code:"from datetime import datetime, timedelta\nfrom collections import defaultdict\n\nclass WatermarkAggregator:\n    def __init__(self, window_size_min=5, watermark_delay_min=2):\n        self.window_size = timedelta(minutes=window_size_min)\n        self.watermark_delay = timedelta(minutes=watermark_delay_min)\n        self.windows = defaultdict(lambda: {'count': 0, 'sum': 0, 'closed': False})\n        self.watermark = datetime.min\n    \n    def process(self, event_time, value):\n        # Update watermark\n        self.watermark = max(self.watermark, event_time - self.watermark_delay)\n        \n        # Find window for this event\n        window_start = event_time.replace(second=0, microsecond=0)\n        window_start -= timedelta(minutes=window_start.minute % 5)\n        \n        # Check if event is too late\n        if window_start + self.window_size < self.watermark:\n            print(f'LATE EVENT dropped: {event_time}')\n            return None\n        \n        self.windows[window_start]['count'] += 1\n        self.windows[window_start]['sum'] += value\n        \n        # Close windows past watermark\n        for ws in list(self.windows.keys()):\n            if ws + self.window_size <= self.watermark and not self.windows[ws]['closed']:\n                self.windows[ws]['closed'] = True\n                self.emit(ws, self.windows[ws])\n    \n    def emit(self, window_start, data):\n        print(f'Window [{window_start}]: count={data[\"count\"]}, sum={data[\"sum\"]}')"}
],

{name:"Data Lake Architecture & Zones",theory:["Data lakes store raw data in its native format on cheap object storage (S3, ADLS, GCS).","Medallion architecture: Bronze (raw), Silver (cleaned/conformed), Gold (aggregated/business-ready).","Each zone has different quality expectations, access patterns, and retention policies."],code:"# Data Lake zone structure\nDATA_LAKE_STRUCTURE = {\n    'bronze': {\n        'path': 's3://datalake/bronze/',\n        'description': 'Raw data as-is from source',\n        'format': 'json/csv/parquet',\n        'retention': '7 years',\n        'access': 'data_engineers'\n    },\n    'silver': {\n        'path': 's3://datalake/silver/',\n        'description': 'Cleaned, validated, conformed',\n        'format': 'delta/parquet',\n        'retention': '3 years',\n        'access': 'data_engineers, analysts'\n    },\n    'gold': {\n        'path': 's3://datalake/gold/',\n        'description': 'Business aggregates, KPIs',\n        'format': 'delta',\n        'retention': '5 years',\n        'access': 'all_users'\n    }\n}\n\n# Typical path pattern\n# s3://datalake/bronze/{source}/{table}/year={YYYY}/month={MM}/day={DD}/data.parquet"},
{name:"Delta Lake",theory:["Delta Lake adds ACID transactions, schema enforcement, and time travel on top of Parquet data lakes.","Transaction log (_delta_log/) records every change; enables rollback, audit, and concurrent writes.","MERGE operation enables upserts; VACUUM removes old files; OPTIMIZE compacts small files."],code:"# Delta Lake operations with PySpark\nfrom pyspark.sql import SparkSession\nfrom delta import DeltaTable\n\nspark = SparkSession.builder \\\n    .config('spark.jars.packages', 'io.delta:delta-core_2.12:2.4.0') \\\n    .config('spark.sql.extensions', 'io.delta.sql.DeltaSparkSessionExtension') \\\n    .getOrCreate()\n\n# Write Delta table\ndf.write.format('delta').mode('overwrite').save('/lake/silver/users')\n\n# Time travel\ndf_yesterday = spark.read.format('delta') \\\n    .option('timestampAsOf', '2024-01-14') \\\n    .load('/lake/silver/users')\n\n# MERGE (upsert)\ndelta_table = DeltaTable.forPath(spark, '/lake/silver/users')\ndelta_table.alias('t').merge(\n    updates_df.alias('s'), 't.user_id = s.user_id'\n).whenMatchedUpdateAll() \\\n .whenNotMatchedInsertAll() \\\n .execute()\n\n# Maintenance\nspark.sql('OPTIMIZE delta.`/lake/silver/users`')  # Compact files\nspark.sql('VACUUM delta.`/lake/silver/users` RETAIN 168 HOURS')  # Clean old"},
{name:"Apache Iceberg",theory:["Iceberg is an open table format with hidden partitioning - users query without knowing partition scheme.","Supports schema evolution (add/rename/drop columns) without rewriting data files.","Snapshot isolation allows concurrent reads and writes; metadata tracks which files belong to each snapshot."],code:"# Apache Iceberg with PySpark\nspark.sql(\"\"\"\n    CREATE TABLE catalog.db.events (\n        event_id BIGINT,\n        event_time TIMESTAMP,\n        user_id INT,\n        action STRING,\n        amount DECIMAL(10,2)\n    )\n    USING iceberg\n    PARTITIONED BY (days(event_time), bucket(16, user_id))\n\"\"\")\n\n# Hidden partitioning - query without partition knowledge\nspark.sql(\"\"\"\n    SELECT * FROM catalog.db.events\n    WHERE event_time > '2024-01-01'\n    AND user_id = 12345\n\"\"\")  # Automatically uses partition pruning\n\n# Schema evolution\nspark.sql(\"ALTER TABLE catalog.db.events ADD COLUMN region STRING\")\nspark.sql(\"ALTER TABLE catalog.db.events RENAME COLUMN action TO event_type\")\n\n# Time travel\nspark.sql(\"SELECT * FROM catalog.db.events VERSION AS OF 12345\")\nspark.sql(\"SELECT * FROM catalog.db.events TIMESTAMP AS OF '2024-01-14 10:00:00'\")"},
{name:"Apache Hudi",theory:["Hudi (Hadoop Upserts Deletes Incrementals) specializes in record-level upserts on data lakes.","Two table types: Copy-on-Write (optimize reads) and Merge-on-Read (optimize writes).","Built-in incremental queries pull only changed records since last read - ideal for CDC pipelines."],code:"# Hudi operations with PySpark\nhudi_options = {\n    'hoodie.table.name': 'users',\n    'hoodie.datasource.write.recordkey.field': 'user_id',\n    'hoodie.datasource.write.partitionpath.field': 'country',\n    'hoodie.datasource.write.precombine.field': 'updated_at',\n    'hoodie.datasource.write.operation': 'upsert',\n    'hoodie.upsert.shuffle.parallelism': 2\n}\n\n# Write/Upsert to Hudi table\ndf.write.format('hudi') \\\n    .options(**hudi_options) \\\n    .mode('append') \\\n    .save('/lake/hudi/users')\n\n# Incremental query (only changes since last read)\nincremental_df = spark.read.format('hudi') \\\n    .option('hoodie.datasource.query.type', 'incremental') \\\n    .option('hoodie.datasource.read.begin.instanttime', '20240114100000') \\\n    .load('/lake/hudi/users')"},
{name:"Partitioning Strategies",theory:["Partitioning divides data into subdirectories for efficient query pruning (skip irrelevant data).","Common partition keys: date (year/month/day), region, category - choose based on query patterns.","Avoid over-partitioning (too many small files) and under-partitioning (full scans on large data)."],code:"# Partitioning strategies\nimport pandas as pd\n\n# Time-based partitioning (most common)\n# Path: /data/events/year=2024/month=01/day=15/part-0000.parquet\ndf.to_parquet(\n    '/data/events/',\n    partition_cols=['year', 'month', 'day'],\n    engine='pyarrow'\n)\n\n# Partition sizing guidelines\n# Target: 128MB - 1GB per partition file\n# Too many partitions = small files problem\n# Too few partitions = slow queries\n\n# Calculate optimal partitions\ntotal_size_gb = 100\ntarget_file_mb = 256\nnum_partitions = int(total_size_gb * 1024 / target_file_mb)\nprint(f'Optimal partitions: {num_partitions}')\n\n# Bucketing (hash partitioning for even distribution)\n# Useful for join keys with high cardinality\n# PySpark: df.write.bucketBy(16, 'user_id').saveAsTable('events')"}
],
examples:[
{title:"Medallion Architecture Pipeline",desc:"Complete Bronze -> Silver -> Gold pipeline using Delta Lake patterns.",code:"# Bronze: Raw ingestion (as-is)\ndef bronze_ingest(source_path, bronze_path):\n    raw_df = spark.read.json(source_path)\n    raw_df.withColumn('_ingested_at', current_timestamp()) \\\n          .withColumn('_source_file', input_file_name()) \\\n          .write.format('delta') \\\n          .mode('append') \\\n          .save(bronze_path)\n\n# Silver: Clean and conform\ndef silver_transform(bronze_path, silver_path):\n    bronze_df = spark.read.format('delta').load(bronze_path)\n    silver_df = bronze_df \\\n        .filter(col('user_id').isNotNull()) \\\n        .withColumn('email', lower(trim(col('email')))) \\\n        .withColumn('event_date', to_date(col('timestamp'))) \\\n        .dropDuplicates(['user_id', 'event_date', 'event_type'])\n    \n    # MERGE into silver (upsert)\n    DeltaTable.forPath(spark, silver_path).alias('t').merge(\n        silver_df.alias('s'), 't.user_id = s.user_id AND t.event_date = s.event_date'\n    ).whenMatchedUpdateAll().whenNotMatchedInsertAll().execute()\n\n# Gold: Business aggregates\ndef gold_aggregate(silver_path, gold_path):\n    silver_df = spark.read.format('delta').load(silver_path)\n    gold_df = silver_df.groupBy('event_date', 'event_type') \\\n        .agg(count('*').alias('event_count'), countDistinct('user_id').alias('unique_users'))\n    gold_df.write.format('delta').mode('overwrite').save(gold_path)"},
{title:"Data Lake File Organization",desc:"Organize a data lake with proper naming, partitioning, and metadata.",code:"import os\nfrom datetime import datetime\n\nclass DataLakeOrganizer:\n    def __init__(self, base_path):\n        self.base = base_path\n    \n    def get_path(self, zone, source, table, date=None, version=None):\n        path = f\"{self.base}/{zone}/{source}/{table}\"\n        if date:\n            path += f\"/year={date.year}/month={date.month:02d}/day={date.day:02d}\"\n        if version:\n            path += f\"/v{version}\"\n        return path\n    \n    def catalog_entry(self, zone, source, table):\n        return {\n            'table_name': f\"{zone}.{source}.{table}\",\n            'location': self.get_path(zone, source, table),\n            'format': 'delta' if zone in ['silver', 'gold'] else 'parquet',\n            'partition_cols': ['year', 'month', 'day'] if zone == 'bronze' else ['date'],\n            'owner': 'data_engineering',\n            'created_at': datetime.now().isoformat()\n        }\n\nlake = DataLakeOrganizer('s3://company-datalake')\nprint(lake.get_path('bronze', 'salesforce', 'contacts', datetime(2024,1,15)))"},
{title:"Small Files Compaction",desc:"Detect and compact small files in a data lake partition.",code:"import os\nimport pandas as pd\n\ndef compact_small_files(partition_path, target_size_mb=256):\n    \"\"\"Merge small files in a partition into larger ones\"\"\"\n    files = [f for f in os.listdir(partition_path) if f.endswith('.parquet')]\n    \n    # Check file sizes\n    small_files = []\n    for f in files:\n        size_mb = os.path.getsize(os.path.join(partition_path, f)) / (1024*1024)\n        if size_mb < target_size_mb * 0.5:  # Less than half target\n            small_files.append(f)\n    \n    if len(small_files) < 2:\n        print('No compaction needed')\n        return\n    \n    print(f'Compacting {len(small_files)} small files')\n    \n    # Read all small files\n    dfs = [pd.read_parquet(os.path.join(partition_path, f)) for f in small_files]\n    combined = pd.concat(dfs, ignore_index=True)\n    \n    # Write as single file\n    output_path = os.path.join(partition_path, 'compacted_part.parquet')\n    combined.to_parquet(output_path, index=False, compression='snappy')\n    \n    # Remove old small files\n    for f in small_files:\n        os.remove(os.path.join(partition_path, f))\n    \n    print(f'Compacted {len(small_files)} files -> 1 file ({len(combined)} rows)')"}
],

{id:10,title:"Cloud Data Engineering",color:"#f87171",chips:["AWS S3/Glue/Redshift","Azure ADF","GCP BigQuery"],
subtopics:[
{name:"AWS S3 & Data Lake Storage",theory:["S3 is the foundation for AWS data lakes: virtually unlimited, durable (11 nines), and cheap object storage.","Storage classes: Standard (frequent), IA (infrequent), Glacier (archive) - lifecycle policies automate transitions.","Best practices: use prefixes wisely for performance, enable versioning, encrypt at rest."],code:"import boto3\nimport pandas as pd\nfrom io import BytesIO\n\n# S3 client setup\ns3 = boto3.client('s3')\n\n# Upload data to S3\ndef upload_to_s3(df, bucket, key):\n    buffer = BytesIO()\n    df.to_parquet(buffer, index=False)\n    buffer.seek(0)\n    s3.put_object(Bucket=bucket, Key=key, Body=buffer.getvalue())\n    print(f'Uploaded to s3://{bucket}/{key}')\n\n# Read from S3\ndef read_from_s3(bucket, key):\n    obj = s3.get_object(Bucket=bucket, Key=key)\n    df = pd.read_parquet(BytesIO(obj['Body'].read()))\n    return df\n\n# List objects with prefix (partition discovery)\ndef list_partitions(bucket, prefix):\n    paginator = s3.get_paginator('list_objects_v2')\n    for page in paginator.paginate(Bucket=bucket, Prefix=prefix, Delimiter='/'):\n        for p in page.get('CommonPrefixes', []):\n            print(p['Prefix'])"},
{name:"AWS Glue ETL",theory:["Glue is a serverless ETL service with built-in Spark runtime, crawlers, and data catalog.","Crawlers auto-discover schema from S3/databases and register tables in the Glue Data Catalog.","Glue jobs run PySpark or Python shell scripts for transformation; auto-scaling and job bookmarks for incremental."],code:"# AWS Glue ETL job script\nimport sys\nfrom awsglue.transforms import *\nfrom awsglue.utils import getResolvedOptions\nfrom awsglue.context import GlueContext\nfrom pyspark.context import SparkContext\nfrom awsglue.job import Job\n\nargs = getResolvedOptions(sys.argv, ['JOB_NAME'])\nsc = SparkContext()\nglueContext = GlueContext(sc)\nspark = glueContext.spark_session\njob = Job(glueContext)\njob.init(args['JOB_NAME'], args)\n\n# Read from Glue Catalog\nsource = glueContext.create_dynamic_frame.from_catalog(\n    database='raw_db',\n    table_name='user_events'\n)\n\n# Transform\ntransformed = ApplyMapping.apply(\n    frame=source,\n    mappings=[\n        ('user_id', 'long', 'user_id', 'long'),\n        ('event_type', 'string', 'event_type', 'string'),\n        ('timestamp', 'string', 'event_time', 'timestamp')\n    ]\n)\n\n# Write to S3 in Parquet\nglueContext.write_dynamic_frame.from_options(\n    frame=transformed,\n    connection_type='s3',\n    connection_options={'path': 's3://lake/silver/events/'},\n    format='parquet'\n)\njob.commit()"},
{name:"Amazon Redshift",theory:["Redshift is a columnar MPP (Massively Parallel Processing) data warehouse for petabyte-scale analytics.","Distribution styles (KEY, EVEN, ALL) determine how data is spread across nodes for join optimization.","Sort keys define physical data ordering; Redshift Spectrum queries S3 data without loading."],code:"-- Redshift table with distribution and sort keys\nCREATE TABLE analytics.fact_sales (\n    sale_id BIGINT IDENTITY(1,1),\n    sale_date DATE SORTKEY,\n    customer_id INT,\n    product_id INT,\n    quantity INT,\n    amount DECIMAL(12,2)\n)\nDISTKEY(customer_id)  -- Distribute by join key\nCOMPOUND SORTKEY(sale_date, customer_id);\n\n-- COPY command for bulk loading from S3\nCOPY analytics.fact_sales\nFROM 's3://bucket/data/sales/'\nIAM_ROLE 'arn:aws:iam::123:role/RedshiftLoadRole'\nFORMAT AS PARQUET;\n\n-- Redshift Spectrum: query S3 directly\nCREATE EXTERNAL SCHEMA spectrum_schema\nFROM DATA CATALOG\nDATABASE 'lake_db'\nIAM_ROLE 'arn:aws:iam::123:role/SpectrumRole';\n\nSELECT date, COUNT(*) FROM spectrum_schema.events\nWHERE year = 2024 GROUP BY date;"},
{name:"Azure Data Factory & Synapse",theory:["Azure Data Factory (ADF) is a cloud ETL/ELT orchestration service with visual pipeline designer.","Synapse Analytics combines big data (Spark pools) and data warehousing (dedicated SQL pools) in one service.","ADLS Gen2 is Azure's data lake storage with hierarchical namespace for better file operations."],code:"# Azure Data Factory pipeline (JSON definition)\nadf_pipeline = {\n    'name': 'DailyETLPipeline',\n    'properties': {\n        'activities': [\n            {\n                'name': 'CopyFromSQL',\n                'type': 'Copy',\n                'inputs': [{'referenceName': 'SqlServerSource'}],\n                'outputs': [{'referenceName': 'ADLSSink'}],\n                'typeProperties': {\n                    'source': {'type': 'SqlSource', 'sqlReaderQuery': 'SELECT * FROM orders WHERE date = @{pipeline().parameters.date}'},\n                    'sink': {'type': 'ParquetSink'}\n                }\n            },\n            {\n                'name': 'RunDatabricks',\n                'type': 'DatabricksNotebook',\n                'dependsOn': [{'activity': 'CopyFromSQL', 'dependencyConditions': ['Succeeded']}],\n                'typeProperties': {\n                    'notebookPath': '/Transforms/silver_orders'\n                }\n            }\n        ]\n    }\n}\n\n# Python SDK for ADLS Gen2\nfrom azure.storage.filedatalake import DataLakeServiceClient\n\nservice = DataLakeServiceClient(account_url='https://account.dfs.core.windows.net', credential=cred)\nfs = service.get_file_system_client('datalake')\nfile = fs.get_file_client('bronze/orders/2024/01/data.parquet')"},
{name:"GCP BigQuery",theory:["BigQuery is a serverless, petabyte-scale analytics warehouse with built-in ML and geospatial support.","Columnar storage with automatic optimization; no indexes needed - full column scans are efficient.","Pricing model: on-demand (per TB scanned) or flat-rate (reserved slots); partitioning reduces costs."],code:"from google.cloud import bigquery\nimport pandas as pd\n\n# BigQuery client\nclient = bigquery.Client(project='my-project')\n\n# Load data from DataFrame\njob_config = bigquery.LoadJobConfig(\n    write_disposition='WRITE_TRUNCATE',\n    schema=[\n        bigquery.SchemaField('user_id', 'INTEGER'),\n        bigquery.SchemaField('event', 'STRING'),\n        bigquery.SchemaField('timestamp', 'TIMESTAMP'),\n    ]\n)\n\njob = client.load_table_from_dataframe(df, 'project.dataset.events', job_config=job_config)\njob.result()  # Wait for completion\n\n# Query with partitioning\nquery = '''\n    SELECT DATE(timestamp) as date, COUNT(*) as events\n    FROM `project.dataset.events`\n    WHERE timestamp >= '2024-01-01'\n    GROUP BY date\n    ORDER BY date\n'''\nresult_df = client.query(query).to_dataframe()\n\n# Create partitioned table\nclient.query('''\n    CREATE TABLE dataset.events_partitioned\n    PARTITION BY DATE(timestamp)\n    CLUSTER BY user_id\n    AS SELECT * FROM dataset.events\n''').result()"}
],

{title:"Multi-Cloud Data Pipeline",desc:"Abstract storage operations to support AWS S3 and GCS interchangeably.",code:"from abc import ABC, abstractmethod\n\nclass CloudStorage(ABC):\n    @abstractmethod\n    def upload(self, data, path): pass\n    @abstractmethod\n    def download(self, path): pass\n    @abstractmethod\n    def list_files(self, prefix): pass\n\nclass S3Storage(CloudStorage):\n    def __init__(self, bucket):\n        import boto3\n        self.s3 = boto3.client('s3')\n        self.bucket = bucket\n    def upload(self, data, path):\n        self.s3.put_object(Bucket=self.bucket, Key=path, Body=data)\n    def download(self, path):\n        return self.s3.get_object(Bucket=self.bucket, Key=path)['Body'].read()\n    def list_files(self, prefix):\n        resp = self.s3.list_objects_v2(Bucket=self.bucket, Prefix=prefix)\n        return [obj['Key'] for obj in resp.get('Contents', [])]\n\nclass GCSStorage(CloudStorage):\n    def __init__(self, bucket):\n        from google.cloud import storage\n        self.client = storage.Client()\n        self.bucket = self.client.bucket(bucket)\n    def upload(self, data, path):\n        self.bucket.blob(path).upload_from_string(data)\n    def download(self, path):\n        return self.bucket.blob(path).download_as_bytes()\n    def list_files(self, prefix):\n        return [b.name for b in self.bucket.list_blobs(prefix=prefix)]"},
{title:"Serverless ETL with AWS Lambda + Glue",desc:"Event-driven ETL: S3 upload triggers Lambda which starts Glue job.",code:"# Lambda function triggered by S3 event\nimport json\nimport boto3\n\ndef lambda_handler(event, context):\n    glue = boto3.client('glue')\n    \n    # Get file info from S3 event\n    record = event['Records'][0]\n    bucket = record['s3']['bucket']['name']\n    key = record['s3']['object']['key']\n    \n    # Parse partition from path: bronze/orders/year=2024/month=01/\n    parts = key.split('/')\n    source = parts[1]  # 'orders'\n    \n    # Trigger appropriate Glue job\n    response = glue.start_job_run(\n        JobName=f'transform_{source}',\n        Arguments={\n            '--source_path': f's3://{bucket}/{key}',\n            '--execution_date': context.invoked_function_arn\n        }\n    )\n    \n    return {\n        'statusCode': 200,\n        'body': json.dumps(f\"Started job run: {response['JobRunId']}\")\n    }"},
{title:"BigQuery Cost Optimization",desc:"Techniques to reduce BigQuery query costs with partitioning and clustering.",code:"from google.cloud import bigquery\n\nclient = bigquery.Client()\n\n# Estimate query cost before running\ndef estimate_cost(query, cost_per_tb=5.0):\n    job_config = bigquery.QueryJobConfig(dry_run=True, use_query_cache=False)\n    job = client.query(query, job_config=job_config)\n    bytes_processed = job.total_bytes_processed\n    cost = (bytes_processed / 1e12) * cost_per_tb\n    print(f'Estimated: {bytes_processed/1e9:.2f} GB, Cost: ${cost:.4f}')\n    return cost\n\n# Optimized: partition + cluster + column selection\noptimized_query = '''\n    SELECT user_id, event_type, COUNT(*) as cnt\n    FROM `project.dataset.events`\n    WHERE DATE(event_time) BETWEEN '2024-01-01' AND '2024-01-31'\n    AND event_type IN ('purchase', 'signup')\n    GROUP BY 1, 2\n'''\n\n# Anti-pattern: SELECT * without partition filter\nbad_query = 'SELECT * FROM `project.dataset.events`'\n\nestimate_cost(optimized_query)  # Much cheaper\nestimate_cost(bad_query)        # Full table scan = expensive"}
],

{name:"Pipeline Orchestration Patterns",theory:["Orchestration coordinates multiple tasks with dependencies, scheduling, and state management.","Fan-out/fan-in: split work into parallel branches then merge results for final processing.","Event-driven vs time-driven: trigger on data arrival vs fixed schedules (or hybrid)."],code:"# Pipeline orchestration framework\nfrom enum import Enum\nfrom datetime import datetime\n\nclass TaskStatus(Enum):\n    PENDING = 'pending'\n    RUNNING = 'running'\n    SUCCESS = 'success'\n    FAILED = 'failed'\n    SKIPPED = 'skipped'\n\nclass Pipeline:\n    def __init__(self, name):\n        self.name = name\n        self.tasks = {}\n        self.dependencies = {}\n    \n    def add_task(self, name, fn, depends_on=None):\n        self.tasks[name] = {'fn': fn, 'status': TaskStatus.PENDING}\n        self.dependencies[name] = depends_on or []\n    \n    def get_ready_tasks(self):\n        ready = []\n        for name, task in self.tasks.items():\n            if task['status'] != TaskStatus.PENDING:\n                continue\n            deps_met = all(\n                self.tasks[d]['status'] == TaskStatus.SUCCESS\n                for d in self.dependencies[name]\n            )\n            if deps_met:\n                ready.append(name)\n        return ready\n    \n    def run(self):\n        while True:\n            ready = self.get_ready_tasks()\n            if not ready:\n                break\n            for task_name in ready:\n                self.execute_task(task_name)"},
{name:"Error Handling & Dead Letter Queues",theory:["Classify errors: transient (retry-able: timeouts, rate limits) vs permanent (bad data, schema mismatch).","Dead Letter Queues (DLQ) capture failed records for later investigation without blocking the pipeline.","Circuit breaker pattern: stop calling a failing service after N consecutive failures to prevent cascade."],code:"import time\nfrom functools import wraps\n\nclass PipelineError(Exception):\n    def __init__(self, message, record=None, retryable=True):\n        super().__init__(message)\n        self.record = record\n        self.retryable = retryable\n\nclass DeadLetterQueue:\n    def __init__(self):\n        self.failed_records = []\n    \n    def send(self, record, error, task_name):\n        self.failed_records.append({\n            'record': record,\n            'error': str(error),\n            'task': task_name,\n            'timestamp': time.time()\n        })\n    \n    def get_failures(self, task_name=None):\n        if task_name:\n            return [r for r in self.failed_records if r['task'] == task_name]\n        return self.failed_records\n\ndef process_with_dlq(records, processor, dlq, task_name):\n    \"\"\"Process records, sending failures to DLQ\"\"\"\n    success_count = 0\n    for record in records:\n        try:\n            processor(record)\n            success_count += 1\n        except Exception as e:\n            dlq.send(record, e, task_name)\n    return {'success': success_count, 'failed': len(records) - success_count}"},
{name:"Retry Strategies",theory:["Exponential backoff: wait 1s, 2s, 4s, 8s... between retries to avoid overwhelming failing services.","Jitter adds randomness to backoff to prevent thundering herd when many clients retry simultaneously.","Max retries and timeout caps prevent infinite retry loops; after max retries, send to DLQ."],code:"import time\nimport random\nfrom functools import wraps\n\ndef retry_with_backoff(max_retries=3, base_delay=1, max_delay=60, jitter=True):\n    \"\"\"Decorator for retry with exponential backoff\"\"\"\n    def decorator(func):\n        @wraps(func)\n        def wrapper(*args, **kwargs):\n            for attempt in range(max_retries + 1):\n                try:\n                    return func(*args, **kwargs)\n                except Exception as e:\n                    if attempt == max_retries:\n                        raise\n                    delay = min(base_delay * (2 ** attempt), max_delay)\n                    if jitter:\n                        delay = delay * (0.5 + random.random())\n                    print(f'Retry {attempt+1}/{max_retries} after {delay:.1f}s: {e}')\n                    time.sleep(delay)\n        return wrapper\n    return decorator\n\n@retry_with_backoff(max_retries=5, base_delay=2)\ndef call_api(endpoint):\n    response = requests.get(endpoint, timeout=30)\n    response.raise_for_status()\n    return response.json()"},
{name:"Monitoring & Alerting",theory:["Monitor: pipeline duration, row counts, error rates, data freshness, and resource utilization.","Set SLAs (Service Level Agreements) for data availability; alert when delivery time exceeds threshold.","Structured logging with correlation IDs enables tracing a single record through the entire pipeline."],code:"import logging\nimport time\nfrom datetime import datetime\n\n# Structured logging setup\nlogging.basicConfig(format='%(asctime)s [%(levelname)s] %(message)s')\nlogger = logging.getLogger('pipeline')\n\nclass PipelineMonitor:\n    def __init__(self, pipeline_name):\n        self.pipeline = pipeline_name\n        self.metrics = {}\n    \n    def start_task(self, task_name):\n        self.metrics[task_name] = {'start': time.time(), 'status': 'running'}\n        logger.info(f'[{self.pipeline}] Task {task_name} STARTED')\n    \n    def end_task(self, task_name, row_count=0, status='success'):\n        duration = time.time() - self.metrics[task_name]['start']\n        self.metrics[task_name].update({\n            'duration': duration, 'rows': row_count, 'status': status\n        })\n        logger.info(f'[{self.pipeline}] Task {task_name} {status.upper()} '\n                   f'({duration:.1f}s, {row_count} rows)')\n    \n    def check_sla(self, max_duration_minutes):\n        total = sum(m.get('duration', 0) for m in self.metrics.values())\n        if total / 60 > max_duration_minutes:\n            logger.warning(f'SLA BREACH: {total/60:.1f} min > {max_duration_minutes} min')\n            self.send_alert(f'Pipeline {self.pipeline} exceeded SLA')\n    \n    def send_alert(self, message):\n        # Send to Slack/PagerDuty/email\n        logger.critical(f'ALERT: {message}')"},
{name:"Pipeline Design Patterns",theory:["Mediator pattern: central coordinator manages task execution order and data flow between steps.","Pipeline as code: define pipelines in version-controlled code for reproducibility and CI/CD.","Separation of concerns: keep extraction, transformation, and loading logic in separate modules."],code:"# Pipeline as code - modular design\nfrom abc import ABC, abstractmethod\n\nclass PipelineStep(ABC):\n    @abstractmethod\n    def run(self, context: dict) -> dict:\n        pass\n    \n    @property\n    def name(self) -> str:\n        return self.__class__.__name__\n\nclass ExtractUsers(PipelineStep):\n    def run(self, context):\n        df = pd.read_sql('SELECT * FROM users', context['source_conn'])\n        context['users_df'] = df\n        context['extract_count'] = len(df)\n        return context\n\nclass ValidateUsers(PipelineStep):\n    def run(self, context):\n        df = context['users_df']\n        assert df['email'].notna().all(), 'Null emails found'\n        assert len(df) > 0, 'No records extracted'\n        return context\n\nclass LoadUsers(PipelineStep):\n    def run(self, context):\n        df = context['users_df']\n        df.to_sql('dim_users', context['target_conn'], if_exists='replace')\n        return context\n\n# Execute pipeline\ndef run_pipeline(steps, initial_context):\n    context = initial_context\n    for step in steps:\n        print(f'Running: {step.name}')\n        context = step.run(context)\n    return context\n\nrun_pipeline([ExtractUsers(), ValidateUsers(), LoadUsers()], {'source_conn': src, 'target_conn': tgt})"}

{title:"Production Pipeline with Full Observability",desc:"Pipeline with monitoring, alerting, retry, and dead letter queue.",code:"import time\nimport logging\n\nclass ProductionPipeline:\n    def __init__(self, name):\n        self.name = name\n        self.monitor = PipelineMonitor(name)\n        self.dlq = DeadLetterQueue()\n        self.logger = logging.getLogger(name)\n    \n    @retry_with_backoff(max_retries=3)\n    def extract(self, source):\n        self.monitor.start_task('extract')\n        data = fetch_data(source)\n        self.monitor.end_task('extract', row_count=len(data))\n        return data\n    \n    def transform(self, data):\n        self.monitor.start_task('transform')\n        results = process_with_dlq(data, transform_record, self.dlq, 'transform')\n        self.monitor.end_task('transform', row_count=results['success'])\n        if results['failed'] > len(data) * 0.1:  # >10% failure\n            raise Exception(f\"Too many failures: {results['failed']}/{len(data)}\")\n        return results\n    \n    def run(self):\n        try:\n            data = self.extract('api://source')\n            results = self.transform(data)\n            self.monitor.check_sla(max_duration_minutes=30)\n            self.logger.info(f'Pipeline {self.name} completed successfully')\n        except Exception as e:\n            self.logger.error(f'Pipeline {self.name} FAILED: {e}')\n            self.monitor.send_alert(str(e))\n            raise"},
{title:"Circuit Breaker Pattern",desc:"Stop calling a failing service after consecutive failures.",code:"import time\n\nclass CircuitBreaker:\n    def __init__(self, failure_threshold=5, reset_timeout=60):\n        self.failure_threshold = failure_threshold\n        self.reset_timeout = reset_timeout\n        self.failures = 0\n        self.last_failure_time = 0\n        self.state = 'CLOSED'  # CLOSED, OPEN, HALF_OPEN\n    \n    def call(self, func, *args, **kwargs):\n        if self.state == 'OPEN':\n            if time.time() - self.last_failure_time > self.reset_timeout:\n                self.state = 'HALF_OPEN'\n            else:\n                raise Exception('Circuit breaker is OPEN')\n        \n        try:\n            result = func(*args, **kwargs)\n            self.on_success()\n            return result\n        except Exception as e:\n            self.on_failure()\n            raise\n    \n    def on_success(self):\n        self.failures = 0\n        self.state = 'CLOSED'\n    \n    def on_failure(self):\n        self.failures += 1\n        self.last_failure_time = time.time()\n        if self.failures >= self.failure_threshold:\n            self.state = 'OPEN'\n\n# Usage\nbreaker = CircuitBreaker(failure_threshold=3, reset_timeout=30)\ntry:\n    result = breaker.call(requests.get, 'https://api.example.com/data')\nexcept Exception as e:\n    print(f'Service unavailable: {e}')"},
{title:"Data Pipeline DAG Executor",desc:"Execute a DAG of tasks respecting dependencies with parallel execution.",code:"from concurrent.futures import ThreadPoolExecutor, as_completed\n\nclass DAGExecutor:\n    def __init__(self, max_workers=4):\n        self.tasks = {}\n        self.deps = {}\n        self.results = {}\n        self.max_workers = max_workers\n    \n    def add_task(self, name, fn, depends_on=None):\n        self.tasks[name] = fn\n        self.deps[name] = set(depends_on or [])\n    \n    def run(self):\n        completed = set()\n        with ThreadPoolExecutor(max_workers=self.max_workers) as executor:\n            while len(completed) < len(self.tasks):\n                # Find ready tasks\n                ready = [\n                    name for name, deps in self.deps.items()\n                    if name not in completed and deps.issubset(completed)\n                ]\n                futures = {executor.submit(self.tasks[name]): name for name in ready}\n                for future in as_completed(futures):\n                    name = futures[future]\n                    try:\n                        self.results[name] = future.result()\n                        completed.add(name)\n                        print(f'Task {name}: SUCCESS')\n                    except Exception as e:\n                        print(f'Task {name}: FAILED - {e}')\n                        raise\n        return self.results\n\ndag = DAGExecutor()\ndag.add_task('extract_a', lambda: extract('source_a'))\ndag.add_task('extract_b', lambda: extract('source_b'))\ndag.add_task('join', lambda: join_data(), depends_on=['extract_a', 'extract_b'])\ndag.run()"}

{name:"Database Connections & Pooling",theory:["Connection pooling reuses database connections instead of creating/destroying per query - reduces overhead.","Pool parameters: min_connections, max_connections, idle_timeout, max_lifetime control resource usage.","Context managers ensure connections are properly returned to the pool even if exceptions occur."],code:"import psycopg2\nfrom psycopg2 import pool\nfrom contextlib import contextmanager\n\n# Connection pool setup\ndb_pool = pool.ThreadedConnectionPool(\n    minconn=2,\n    maxconn=10,\n    host='localhost',\n    database='warehouse',\n    user='etl_user',\n    password='secret'\n)\n\n@contextmanager\ndef get_connection():\n    conn = db_pool.getconn()\n    try:\n        yield conn\n        conn.commit()\n    except Exception:\n        conn.rollback()\n        raise\n    finally:\n        db_pool.putconn(conn)\n\n# Usage\nwith get_connection() as conn:\n    cursor = conn.cursor()\n    cursor.execute('SELECT COUNT(*) FROM users')\n    count = cursor.fetchone()[0]\n    print(f'Users: {count}')"},
{name:"Transactions & ACID",theory:["ACID: Atomicity (all or nothing), Consistency (valid state), Isolation (concurrent safety), Durability (persisted).","Isolation levels: READ UNCOMMITTED, READ COMMITTED, REPEATABLE READ, SERIALIZABLE - trade safety for performance.","Batch operations should use transactions: commit after all records succeed, rollback on any failure."],code:"import psycopg2\n\ndef transactional_load(conn, records, batch_size=1000):\n    \"\"\"Load records in a transaction with batch commits\"\"\"\n    cursor = conn.cursor()\n    try:\n        for i in range(0, len(records), batch_size):\n            batch = records[i:i+batch_size]\n            # Use executemany for bulk insert\n            cursor.executemany(\n                'INSERT INTO events (id, type, data) VALUES (%s, %s, %s)',\n                batch\n            )\n            conn.commit()  # Commit each batch\n            print(f'Committed batch {i//batch_size + 1}')\n    except Exception as e:\n        conn.rollback()  # Rollback current batch on failure\n        print(f'Failed at record {i}: {e}')\n        raise\n    finally:\n        cursor.close()\n\n# Transaction isolation\ncursor.execute('SET TRANSACTION ISOLATION LEVEL REPEATABLE READ')\ncursor.execute('BEGIN')\n# ... operations ...\ncursor.execute('COMMIT')"},
{name:"Indexing Strategies",theory:["B-tree indexes: default for equality and range queries; balanced tree structure with O(log n) lookup.","Hash indexes: O(1) for equality lookups only; not useful for range or sorting operations.","Composite indexes: multi-column; order matters - leftmost prefix principle for query matching."],code:"-- B-tree index (default, most common)\nCREATE INDEX idx_users_email ON users(email);\n\n-- Composite index (order matters!)\nCREATE INDEX idx_events_user_date ON events(user_id, event_date);\n-- This index helps: WHERE user_id = 1 AND event_date > '2024-01-01'\n-- Also helps: WHERE user_id = 1 (leftmost prefix)\n-- Does NOT help: WHERE event_date > '2024-01-01' (skips first column)\n\n-- Partial index (only index subset of rows)\nCREATE INDEX idx_active_users ON users(email) WHERE status = 'active';\n\n-- Covering index (includes all needed columns)\nCREATE INDEX idx_events_covering ON events(user_id, event_date)\n    INCLUDE (event_type, amount);  -- No table lookup needed\n\n-- Check index usage\nEXPLAIN ANALYZE SELECT * FROM users WHERE email = 'alice@mail.com';\n-- Should show: Index Scan using idx_users_email"},
{name:"Query Optimization",theory:["EXPLAIN ANALYZE shows the actual execution plan: sequential scans, index scans, joins, sorts with costs.","Common optimizations: add indexes, rewrite correlated subqueries as JOINs, limit result sets early.","Query planner decisions depend on: table statistics, data distribution, and available indexes."],code:"-- Analyze query performance\nEXPLAIN (ANALYZE, BUFFERS, FORMAT TEXT)\nSELECT u.name, COUNT(o.order_id) as order_count\nFROM users u\nJOIN orders o ON u.user_id = o.user_id\nWHERE o.order_date >= '2024-01-01'\nGROUP BY u.name\nHAVING COUNT(o.order_id) > 5;\n\n-- ANTI-PATTERN: Correlated subquery (runs per row)\nSELECT * FROM users u\nWHERE (SELECT COUNT(*) FROM orders WHERE user_id = u.user_id) > 5;\n\n-- OPTIMIZED: JOIN with aggregate\nSELECT u.*\nFROM users u\nJOIN (SELECT user_id, COUNT(*) as cnt FROM orders GROUP BY user_id HAVING COUNT(*) > 5) o\n    ON u.user_id = o.user_id;\n\n-- Update statistics for query planner\nANALYZE users;\nANALYZE orders;"},
{name:"Bulk Loading Techniques",theory:["COPY command is fastest for bulk loading: bypasses SQL parsing, uses binary protocol.","Batch INSERT with executemany is slower but allows per-record error handling.","Temporary staging tables + MERGE pattern is best for upsert operations at scale."],code:"import psycopg2\nfrom io import StringIO\nimport pandas as pd\n\ndef bulk_load_copy(conn, df, table_name):\n    \"\"\"Fastest method: use COPY FROM with CSV buffer\"\"\"\n    buffer = StringIO()\n    df.to_csv(buffer, index=False, header=False)\n    buffer.seek(0)\n    \n    cursor = conn.cursor()\n    cursor.copy_from(\n        buffer,\n        table_name,\n        sep=',',\n        null=''\n    )\n    conn.commit()\n    print(f'Bulk loaded {len(df)} rows via COPY')\n\ndef bulk_upsert(conn, df, table, key_cols):\n    \"\"\"Upsert via temp table + MERGE\"\"\"\n    cursor = conn.cursor()\n    # Load to temp table\n    cursor.execute(f'CREATE TEMP TABLE tmp_load (LIKE {table})')\n    bulk_load_copy(conn, df, 'tmp_load')\n    \n    # MERGE from temp to target\n    key_match = ' AND '.join(f't.{k} = s.{k}' for k in key_cols)\n    cols = ', '.join(df.columns)\n    cursor.execute(f\"\"\"\n        INSERT INTO {table} ({cols})\n        SELECT {cols} FROM tmp_load s\n        ON CONFLICT ({', '.join(key_cols)}) DO UPDATE\n        SET {', '.join(f'{c} = EXCLUDED.{c}' for c in df.columns if c not in key_cols)}\n    \"\"\")\n    cursor.execute('DROP TABLE tmp_load')\n    conn.commit()"}
],

{title:"Database Connection Manager",desc:"Production-ready connection manager with pooling, retry, and health checks.",code:"import time\nfrom contextlib import contextmanager\n\nclass DatabaseManager:\n    def __init__(self, config):\n        self.config = config\n        self.pool = self._create_pool()\n    \n    def _create_pool(self):\n        import psycopg2.pool\n        return psycopg2.pool.ThreadedConnectionPool(\n            minconn=self.config.get('min_conn', 2),\n            maxconn=self.config.get('max_conn', 10),\n            **self.config['connection']\n        )\n    \n    @contextmanager\n    def connection(self):\n        conn = self.pool.getconn()\n        try:\n            yield conn\n            conn.commit()\n        except Exception:\n            conn.rollback()\n            raise\n        finally:\n            self.pool.putconn(conn)\n    \n    @contextmanager\n    def cursor(self):\n        with self.connection() as conn:\n            cur = conn.cursor()\n            try:\n                yield cur\n            finally:\n                cur.close()\n    \n    def health_check(self):\n        try:\n            with self.cursor() as cur:\n                cur.execute('SELECT 1')\n                return True\n        except Exception:\n            return False\n\ndb = DatabaseManager({'connection': {'host': 'localhost', 'dbname': 'warehouse', 'user': 'etl'}})"},
{title:"Query Performance Analyzer",desc:"Analyze and compare query execution plans programmatically.",code:"import psycopg2\nimport json\n\ndef analyze_query(conn, query):\n    \"\"\"Get execution plan and key metrics\"\"\"\n    cursor = conn.cursor()\n    cursor.execute(f'EXPLAIN (ANALYZE, FORMAT JSON) {query}')\n    plan = cursor.fetchone()[0][0]\n    \n    result = {\n        'total_time_ms': plan['Execution Time'],\n        'planning_time_ms': plan['Planning Time'],\n        'node_type': plan['Plan']['Node Type'],\n        'total_cost': plan['Plan']['Total Cost'],\n        'actual_rows': plan['Plan']['Actual Rows'],\n        'loops': plan['Plan']['Actual Loops']\n    }\n    \n    # Check for sequential scans (potential optimization)\n    def find_seq_scans(node, scans=[]):\n        if node.get('Node Type') == 'Seq Scan':\n            scans.append(node.get('Relation Name'))\n        for child in node.get('Plans', []):\n            find_seq_scans(child, scans)\n        return scans\n    \n    result['seq_scans'] = find_seq_scans(plan['Plan'])\n    if result['seq_scans']:\n        result['recommendation'] = f\"Consider adding indexes on: {result['seq_scans']}\"\n    \n    return result\n\nresult = analyze_query(conn, 'SELECT * FROM orders WHERE customer_id = 123')\nprint(json.dumps(result, indent=2))"},
{title:"ETL Bulk Loader with Error Handling",desc:"High-performance bulk loader with validation and error tracking.",code:"import pandas as pd\nfrom io import StringIO\n\nclass BulkLoader:\n    def __init__(self, conn, table, batch_size=10000):\n        self.conn = conn\n        self.table = table\n        self.batch_size = batch_size\n        self.loaded = 0\n        self.errors = []\n    \n    def load(self, df):\n        for i in range(0, len(df), self.batch_size):\n            batch = df.iloc[i:i+self.batch_size]\n            try:\n                self._bulk_insert(batch)\n                self.loaded += len(batch)\n            except Exception as e:\n                self.errors.append({'batch': i//self.batch_size, 'error': str(e)})\n                # Try row-by-row for failed batch\n                self._fallback_insert(batch)\n        return self.report()\n    \n    def _bulk_insert(self, df):\n        buffer = StringIO()\n        df.to_csv(buffer, index=False, header=False)\n        buffer.seek(0)\n        cur = self.conn.cursor()\n        cur.copy_from(buffer, self.table, sep=',')\n        self.conn.commit()\n    \n    def _fallback_insert(self, df):\n        for _, row in df.iterrows():\n            try:\n                cur = self.conn.cursor()\n                cur.execute(f\"INSERT INTO {self.table} VALUES ({','.join(['%s']*len(row))})\", tuple(row))\n                self.conn.commit()\n                self.loaded += 1\n            except Exception as e:\n                self.conn.rollback()\n                self.errors.append({'row': row.to_dict(), 'error': str(e)})\n    \n    def report(self):\n        return {'loaded': self.loaded, 'errors': len(self.errors)}"}
],

{name:"REST API Extraction",theory:["REST APIs use HTTP methods (GET/POST) with JSON responses; most common data source for SaaS integrations.","Authentication methods: API keys, OAuth 2.0 bearer tokens, basic auth, or signed requests (AWS SigV4).","Always handle: HTTP errors (4xx/5xx), timeouts, connection resets, and malformed responses."],code:"import requests\nfrom requests.adapters import HTTPAdapter\nfrom urllib3.util.retry import Retry\n\ndef create_session(base_url, api_key, max_retries=3):\n    session = requests.Session()\n    session.headers.update({\n        'Authorization': f'Bearer {api_key}',\n        'Content-Type': 'application/json'\n    })\n    # Auto-retry on transient errors\n    retry = Retry(total=max_retries, backoff_factor=1,\n                  status_forcelist=[429, 500, 502, 503])\n    session.mount('https://', HTTPAdapter(max_retries=retry))\n    return session\n\ndef extract_endpoint(session, url, params=None):\n    response = session.get(url, params=params, timeout=30)\n    response.raise_for_status()\n    return response.json()\n\n# Usage\nsession = create_session('https://api.example.com', 'my-api-key')\ndata = extract_endpoint(session, 'https://api.example.com/v1/users', {'status': 'active'})"},
{name:"Pagination Strategies",theory:["Offset pagination: ?page=1&per_page=100 - simple but slow for deep pages (DB must skip rows).","Cursor pagination: ?cursor=abc123 - uses last item ID as bookmark; consistent and scalable.","Link-header pagination: follow 'next' URL from response headers until no more pages."],code:"import requests\n\ndef paginate_offset(session, url, per_page=100):\n    \"\"\"Offset-based pagination\"\"\"\n    all_data = []\n    page = 1\n    while True:\n        resp = session.get(url, params={'page': page, 'per_page': per_page})\n        data = resp.json()\n        if not data['results']:\n            break\n        all_data.extend(data['results'])\n        page += 1\n    return all_data\n\ndef paginate_cursor(session, url, per_page=100):\n    \"\"\"Cursor-based pagination (more efficient)\"\"\"\n    all_data = []\n    cursor = None\n    while True:\n        params = {'limit': per_page}\n        if cursor:\n            params['cursor'] = cursor\n        resp = session.get(url, params=params)\n        data = resp.json()\n        all_data.extend(data['results'])\n        cursor = data.get('next_cursor')\n        if not cursor:\n            break\n    return all_data\n\ndef paginate_link_header(session, url):\n    \"\"\"Follow Link header pagination\"\"\"\n    all_data = []\n    while url:\n        resp = session.get(url)\n        all_data.extend(resp.json())\n        url = resp.links.get('next', {}).get('url')\n    return all_data"},
{name:"Rate Limiting & Throttling",theory:["Rate limits protect APIs from overload: typically N requests per minute/hour with 429 status on breach.","Respect rate limits: check response headers (X-RateLimit-Remaining, Retry-After) and throttle accordingly.","Token bucket algorithm: accumulate tokens over time; each request costs one token; wait when empty."],code:"import time\nimport threading\n\nclass RateLimiter:\n    \"\"\"Token bucket rate limiter\"\"\"\n    def __init__(self, requests_per_second):\n        self.rate = requests_per_second\n        self.tokens = requests_per_second\n        self.max_tokens = requests_per_second\n        self.last_refill = time.time()\n        self.lock = threading.Lock()\n    \n    def acquire(self):\n        with self.lock:\n            now = time.time()\n            elapsed = now - self.last_refill\n            self.tokens = min(self.max_tokens, self.tokens + elapsed * self.rate)\n            self.last_refill = now\n            \n            if self.tokens >= 1:\n                self.tokens -= 1\n                return True\n            else:\n                wait_time = (1 - self.tokens) / self.rate\n                time.sleep(wait_time)\n                self.tokens = 0\n                self.last_refill = time.time()\n                return True\n\n# Usage with API calls\nlimiter = RateLimiter(requests_per_second=10)\n\ndef api_call_with_rate_limit(session, url):\n    limiter.acquire()  # Wait if needed\n    return session.get(url)"},
{name:"Change Data Capture (CDC)",theory:["CDC captures row-level changes (INSERT, UPDATE, DELETE) from source databases in real-time or near-real-time.","Methods: log-based (read DB transaction log), trigger-based (DB triggers write to change table), timestamp-based (poll for changes).","Debezium is a popular open-source CDC tool that streams changes from MySQL/PostgreSQL/MongoDB to Kafka."],code:"# Timestamp-based CDC (polling approach)\nimport pandas as pd\nfrom datetime import datetime\n\nclass TimestampCDC:\n    def __init__(self, source_conn, target_conn):\n        self.source = source_conn\n        self.target = target_conn\n    \n    def capture_changes(self, table, timestamp_col, last_sync):\n        \"\"\"Pull all changes since last sync time\"\"\"\n        query = f\"\"\"\n            SELECT *, \n                CASE \n                    WHEN created_at > '{last_sync}' THEN 'INSERT'\n                    WHEN updated_at > '{last_sync}' THEN 'UPDATE'\n                END as _cdc_operation\n            FROM {table}\n            WHERE updated_at > '{last_sync}' OR created_at > '{last_sync}'\n            ORDER BY updated_at\n        \"\"\"\n        return pd.read_sql(query, self.source)\n    \n    def apply_changes(self, changes_df, target_table, key_col):\n        \"\"\"Apply CDC changes to target\"\"\"\n        for _, row in changes_df.iterrows():\n            if row['_cdc_operation'] == 'INSERT':\n                # Insert new record\n                row.drop('_cdc_operation').to_frame().T.to_sql(\n                    target_table, self.target, if_exists='append'\n                )\n            elif row['_cdc_operation'] == 'UPDATE':\n                # Update existing record\n                self.target.execute(\n                    f\"UPDATE {target_table} SET ... WHERE {key_col} = %s\",\n                    (row[key_col],)\n                )"},
{name:"Webhooks & Event Ingestion",theory:["Webhooks push data to your endpoint when events occur - no polling needed; near real-time.","Design webhook receivers: validate signatures, respond quickly (202 Accepted), process async.","Handle out-of-order delivery, duplicates, and replay by using idempotency keys."],code:"from flask import Flask, request, jsonify\nimport hashlib\nimport hmac\nimport json\n\napp = Flask(__name__)\nWEBHOOK_SECRET = 'your-secret-key'\n\ndef verify_signature(payload, signature):\n    \"\"\"Verify webhook signature for authenticity\"\"\"\n    expected = hmac.new(\n        WEBHOOK_SECRET.encode(),\n        payload,\n        hashlib.sha256\n    ).hexdigest()\n    return hmac.compare_digest(f'sha256={expected}', signature)\n\n@app.route('/webhook/events', methods=['POST'])\ndef receive_webhook():\n    # Verify signature\n    signature = request.headers.get('X-Hub-Signature-256', '')\n    if not verify_signature(request.data, signature):\n        return jsonify({'error': 'Invalid signature'}), 401\n    \n    # Parse event\n    event = request.json\n    event_id = event.get('id')  # Idempotency key\n    \n    # Check if already processed (dedup)\n    if is_already_processed(event_id):\n        return jsonify({'status': 'already_processed'}), 200\n    \n    # Queue for async processing\n    queue.enqueue(process_event, event)\n    mark_as_processing(event_id)\n    \n    # Respond quickly\n    return jsonify({'status': 'accepted'}), 202"}

{title:"Full API Extraction Pipeline",desc:"Complete API extraction with auth, pagination, rate limiting, and error handling.",code:"import requests\nimport time\nimport json\n\nclass APIExtractor:\n    def __init__(self, base_url, api_key, rate_limit=10):\n        self.base_url = base_url\n        self.session = requests.Session()\n        self.session.headers['Authorization'] = f'Bearer {api_key}'\n        self.rate_limiter = RateLimiter(rate_limit)\n        self.errors = []\n    \n    def extract_all(self, endpoint, params=None):\n        url = f'{self.base_url}/{endpoint}'\n        all_records = []\n        cursor = None\n        \n        while True:\n            self.rate_limiter.acquire()\n            req_params = {**(params or {}), 'limit': 100}\n            if cursor:\n                req_params['cursor'] = cursor\n            \n            try:\n                resp = self.session.get(url, params=req_params, timeout=30)\n                if resp.status_code == 429:\n                    retry_after = int(resp.headers.get('Retry-After', 60))\n                    time.sleep(retry_after)\n                    continue\n                resp.raise_for_status()\n                data = resp.json()\n                all_records.extend(data['data'])\n                cursor = data.get('pagination', {}).get('next_cursor')\n                if not cursor:\n                    break\n            except Exception as e:\n                self.errors.append({'url': url, 'error': str(e)})\n                break\n        \n        return all_records\n\nextractor = APIExtractor('https://api.company.com/v2', 'key-123')\nusers = extractor.extract_all('users', {'status': 'active'})"},
{title:"Debezium CDC Configuration",desc:"Configure Debezium connector for PostgreSQL CDC to Kafka.",code:"# Debezium connector configuration (JSON)\ndebezium_config = {\n    'name': 'postgres-connector',\n    'config': {\n        'connector.class': 'io.debezium.connector.postgresql.PostgresConnector',\n        'database.hostname': 'postgres-host',\n        'database.port': '5432',\n        'database.user': 'debezium',\n        'database.password': 'secret',\n        'database.dbname': 'production',\n        'database.server.name': 'prod-db',\n        'table.include.list': 'public.users,public.orders',\n        'plugin.name': 'pgoutput',\n        'publication.name': 'debezium_pub',\n        'slot.name': 'debezium_slot',\n        'transforms': 'unwrap',\n        'transforms.unwrap.type': 'io.debezium.transforms.ExtractNewRecordState',\n        'key.converter': 'org.apache.kafka.connect.json.JsonConverter',\n        'value.converter': 'org.apache.kafka.connect.json.JsonConverter'\n    }\n}\n\n# Register connector via Kafka Connect REST API\nimport requests\nresp = requests.post(\n    'http://kafka-connect:8083/connectors',\n    json=debezium_config,\n    headers={'Content-Type': 'application/json'}\n)\nprint(f'Connector created: {resp.status_code}')"},
{title:"Webhook Event Processor",desc:"Receive, validate, deduplicate, and process webhook events.",code:"import hashlib\nimport json\nfrom datetime import datetime\nfrom collections import OrderedDict\n\nclass WebhookProcessor:\n    def __init__(self, secret, max_dedup_cache=10000):\n        self.secret = secret\n        self.processed_ids = OrderedDict()  # LRU dedup cache\n        self.max_cache = max_dedup_cache\n        self.stats = {'received': 0, 'processed': 0, 'duplicates': 0, 'errors': 0}\n    \n    def verify(self, payload_bytes, signature):\n        import hmac\n        expected = hmac.new(self.secret.encode(), payload_bytes, hashlib.sha256).hexdigest()\n        return hmac.compare_digest(expected, signature)\n    \n    def process(self, event):\n        self.stats['received'] += 1\n        event_id = event.get('id') or hashlib.md5(json.dumps(event).encode()).hexdigest()\n        \n        # Dedup check\n        if event_id in self.processed_ids:\n            self.stats['duplicates'] += 1\n            return {'status': 'duplicate', 'id': event_id}\n        \n        # Process based on event type\n        try:\n            handler = getattr(self, f\"handle_{event['type']}\", self.handle_unknown)\n            result = handler(event)\n            self.mark_processed(event_id)\n            self.stats['processed'] += 1\n            return result\n        except Exception as e:\n            self.stats['errors'] += 1\n            return {'status': 'error', 'message': str(e)}\n    \n    def mark_processed(self, event_id):\n        self.processed_ids[event_id] = datetime.now()\n        if len(self.processed_ids) > self.max_cache:\n            self.processed_ids.popitem(last=False)"}

{id:14,title:"Testing & CI/CD",color:"#facc15",chips:["Unit tests","Integration","Data contracts","dbt tests"],
subtopics:[
{name:"Unit Testing Pipelines",theory:["Unit tests verify individual functions/components in isolation: transformations, parsers, validators.","Mock external dependencies (databases, APIs) to test logic without infrastructure.","Test edge cases: empty data, nulls, type mismatches, boundary values."],code:"import pytest\nimport pandas as pd\nfrom unittest.mock import patch, MagicMock\n\n# Function to test\ndef transform_users(df):\n    df = df.copy()\n    df['email'] = df['email'].str.lower().str.strip()\n    df = df.dropna(subset=['email'])\n    df['full_name'] = df['first_name'] + ' ' + df['last_name']\n    return df\n\n# Unit tests\nclass TestTransformUsers:\n    def test_email_lowercase(self):\n        df = pd.DataFrame({'email': ['  ALICE@Mail.Com  '], 'first_name': ['Alice'], 'last_name': ['Smith']})\n        result = transform_users(df)\n        assert result['email'].iloc[0] == 'alice@mail.com'\n    \n    def test_drops_null_emails(self):\n        df = pd.DataFrame({'email': ['a@b.com', None], 'first_name': ['A', 'B'], 'last_name': ['X', 'Y']})\n        result = transform_users(df)\n        assert len(result) == 1\n    \n    def test_full_name_concatenation(self):\n        df = pd.DataFrame({'email': ['a@b.com'], 'first_name': ['Alice'], 'last_name': ['Smith']})\n        result = transform_users(df)\n        assert result['full_name'].iloc[0] == 'Alice Smith'\n    \n    def test_empty_dataframe(self):\n        df = pd.DataFrame({'email': [], 'first_name': [], 'last_name': []})\n        result = transform_users(df)\n        assert len(result) == 0"},
{name:"Integration Testing",theory:["Integration tests verify that pipeline components work together: extract -> transform -> load end-to-end.","Use test databases, docker containers, or test fixtures for realistic but isolated testing.","Test the full data flow including: connection handling, SQL execution, and data integrity."],code:"import pytest\nimport sqlite3\nimport pandas as pd\n\n@pytest.fixture\ndef test_db():\n    \"\"\"Create a test database with sample data\"\"\"\n    conn = sqlite3.connect(':memory:')\n    conn.execute('CREATE TABLE source_users (id INT, name TEXT, email TEXT)')\n    conn.execute(\"INSERT INTO source_users VALUES (1, 'Alice', 'alice@mail.com')\")\n    conn.execute(\"INSERT INTO source_users VALUES (2, 'Bob', 'bob@mail.com')\")\n    conn.execute('CREATE TABLE target_users (id INT, name TEXT, email TEXT, loaded_at TEXT)')\n    conn.commit()\n    yield conn\n    conn.close()\n\ndef test_full_pipeline(test_db):\n    \"\"\"Integration test: extract -> transform -> load\"\"\"\n    # Extract\n    df = pd.read_sql('SELECT * FROM source_users', test_db)\n    assert len(df) == 2\n    \n    # Transform\n    df['email'] = df['email'].str.lower()\n    df['loaded_at'] = '2024-01-15'\n    \n    # Load\n    df.to_sql('target_users', test_db, if_exists='replace', index=False)\n    \n    # Verify\n    result = pd.read_sql('SELECT COUNT(*) as cnt FROM target_users', test_db)\n    assert result['cnt'].iloc[0] == 2"},
{name:"dbt Tests & Data Contracts",theory:["dbt tests validate data in the warehouse: not_null, unique, accepted_values, relationships.","Custom dbt tests (macros) can check business rules: row counts, freshness, cross-table consistency.","Data contracts define the expected schema and quality of data between producer and consumer teams."],code:"# dbt schema.yml - data tests definition\n# models/staging/schema.yml\nmodels_schema = \"\"\"\nversion: 2\nmodels:\n  - name: stg_users\n    columns:\n      - name: user_id\n        tests:\n          - not_null\n          - unique\n      - name: email\n        tests:\n          - not_null\n          - unique\n      - name: status\n        tests:\n          - accepted_values:\n              values: ['active', 'inactive', 'suspended']\n      - name: created_at\n        tests:\n          - not_null\n\nsources:\n  - name: raw\n    freshness:\n      warn_after: {count: 12, period: hour}\n      error_after: {count: 24, period: hour}\n    tables:\n      - name: users\n        loaded_at_field: _loaded_at\n\"\"\"\n\n# Custom dbt test (tests/assert_row_count_increase.sql)\ncustom_test = \"\"\"\n-- This test fails if today's row count is less than yesterday's\nSELECT 1\nWHERE (\n    SELECT COUNT(*) FROM {{ ref('stg_users') }}\n) < (\n    SELECT COUNT(*) FROM {{ ref('stg_users') }}\n    WHERE created_at < CURRENT_DATE\n)\n\"\"\""},
{name:"CI/CD for Data Pipelines",theory:["CI: automatically test pipeline code on every commit - run unit tests, linting, and schema validation.","CD: deploy pipeline changes through environments (dev -> staging -> prod) with proper gates.","Infrastructure as Code (IaC): define pipeline infrastructure (Airflow DAGs, Glue jobs) in version control."],code:"# .github/workflows/data-pipeline-ci.yml\nci_config = \"\"\"\nname: Data Pipeline CI/CD\non:\n  push:\n    branches: [main, develop]\n  pull_request:\n    branches: [main]\n\njobs:\n  test:\n    runs-on: ubuntu-latest\n    steps:\n      - uses: actions/checkout@v3\n      - uses: actions/setup-python@v4\n        with:\n          python-version: '3.10'\n      - run: pip install -r requirements.txt\n      - run: pytest tests/ -v --cov=src --cov-report=xml\n      - run: flake8 src/ --max-line-length=120\n      - run: mypy src/ --ignore-missing-imports\n\n  dbt-test:\n    runs-on: ubuntu-latest\n    needs: test\n    steps:\n      - uses: actions/checkout@v3\n      - run: pip install dbt-postgres\n      - run: dbt deps\n      - run: dbt compile\n      - run: dbt test --target ci\n\n  deploy:\n    runs-on: ubuntu-latest\n    needs: [test, dbt-test]\n    if: github.ref == 'refs/heads/main'\n    steps:\n      - run: echo 'Deploying to production...'\n\"\"\"\n\n# Python test runner configuration (pyproject.toml)\ntest_config = \"\"\"\n[tool.pytest.ini_options]\ntestpaths = [\"tests\"]\npython_files = [\"test_*.py\"]\nmarkers = [\"unit\", \"integration\", \"e2e\"]\n\"\"\""},
{name:"Data Validation Frameworks",theory:["Great Expectations: declare expectations about data, validate at pipeline checkpoints, generate docs.","Pandera: pandas DataFrame validation with type checking, statistical checks, and schema enforcement.","Custom validators: build domain-specific validation rules as reusable Python classes."],code:"# Pandera schema validation\nimport pandera as pa\nfrom pandera import Column, Check, DataFrameSchema\n\nuser_schema = DataFrameSchema({\n    'user_id': Column(int, Check.greater_than(0), nullable=False),\n    'email': Column(str, Check.str_matches(r'^[\\w.]+@[\\w.]+$'), nullable=False),\n    'age': Column(int, Check.in_range(0, 150), nullable=True),\n    'status': Column(str, Check.isin(['active', 'inactive']), nullable=False),\n    'created_at': Column('datetime64[ns]', nullable=False)\n})\n\n# Validate in pipeline\ndef validated_transform(df):\n    try:\n        validated_df = user_schema.validate(df)\n        print(f'Validation passed: {len(validated_df)} rows')\n        return validated_df\n    except pa.errors.SchemaError as e:\n        print(f'Validation failed: {e}')\n        # Log failures, send to DLQ\n        raise\n\n# Great Expectations style\nimport great_expectations as ge\ndf_ge = ge.from_pandas(df)\nresult = df_ge.expect_column_values_to_not_be_null('email')\nresult = df_ge.expect_column_values_to_be_unique('user_id')"}

{title:"Comprehensive Test Suite",desc:"Full test suite for a data pipeline with unit, integration, and data quality tests.",code:"import pytest\nimport pandas as pd\nfrom unittest.mock import patch, MagicMock\n\n# ---- Unit Tests ----\nclass TestTransformations:\n    def test_clean_email(self):\n        assert clean_email('  USER@MAIL.COM  ') == 'user@mail.com'\n    \n    def test_parse_date_valid(self):\n        assert parse_date('2024-01-15') == pd.Timestamp('2024-01-15')\n    \n    def test_parse_date_invalid(self):\n        with pytest.raises(ValueError):\n            parse_date('not-a-date')\n\n# ---- Integration Tests ----\nclass TestPipelineIntegration:\n    @pytest.fixture\n    def mock_api(self):\n        with patch('pipeline.requests.get') as mock:\n            mock.return_value.json.return_value = {'data': [{'id': 1, 'name': 'Alice'}]}\n            mock.return_value.status_code = 200\n            yield mock\n    \n    def test_extract_and_transform(self, mock_api, test_db):\n        data = extract_from_api('/users')\n        assert len(data) > 0\n        transformed = transform(data)\n        load(transformed, test_db, 'users')\n        result = pd.read_sql('SELECT COUNT(*) as c FROM users', test_db)\n        assert result['c'].iloc[0] > 0\n\n# ---- Data Quality Tests ----\nclass TestDataQuality:\n    def test_no_null_keys(self, production_sample):\n        assert production_sample['user_id'].notna().all()\n    \n    def test_referential_integrity(self, orders_df, users_df):\n        orphan_orders = set(orders_df['user_id']) - set(users_df['user_id'])\n        assert len(orphan_orders) == 0, f'Orphan orders: {orphan_orders}'"},
{title:"dbt Project Structure",desc:"Complete dbt project setup with models, tests, and documentation.",code:"# dbt project structure\n# dbt_project.yml\ndbt_project = \"\"\"\nname: analytics\nversion: '1.0.0'\nprofile: 'warehouse'\nmodel-paths: ['models']\ntest-paths: ['tests']\nanalysis-paths: ['analyses']\n\nmodels:\n  analytics:\n    staging:\n      +materialized: view\n      +schema: staging\n    intermediate:\n      +materialized: table\n      +schema: intermediate\n    marts:\n      +materialized: table\n      +schema: marts\n\"\"\"\n\n# models/staging/stg_orders.sql\nstg_orders = \"\"\"\nWITH source AS (\n    SELECT * FROM {{ source('raw', 'orders') }}\n),\nrenamed AS (\n    SELECT\n        order_id,\n        customer_id,\n        CAST(order_date AS DATE) as order_date,\n        CAST(total_amount AS DECIMAL(10,2)) as total_amount,\n        status,\n        _loaded_at\n    FROM source\n    WHERE order_id IS NOT NULL\n)\nSELECT * FROM renamed\n\"\"\"\n\n# Run: dbt run && dbt test && dbt docs generate"},
{title:"Data Contract Definition",desc:"Define and validate data contracts between producer and consumer teams.",code:"import json\nfrom datetime import datetime\n\nclass DataContract:\n    def __init__(self, contract_def):\n        self.name = contract_def['name']\n        self.version = contract_def['version']\n        self.schema = contract_def['schema']\n        self.sla = contract_def.get('sla', {})\n    \n    def validate_schema(self, df):\n        errors = []\n        for col_def in self.schema['columns']:\n            col_name = col_def['name']\n            if col_name not in df.columns:\n                if col_def.get('required', False):\n                    errors.append(f'Missing required column: {col_name}')\n                continue\n            if col_def.get('not_null') and df[col_name].isnull().any():\n                errors.append(f'{col_name}: contains nulls')\n        return errors\n    \n    def validate_sla(self, metadata):\n        if 'max_delay_hours' in self.sla:\n            hours_old = (datetime.now() - metadata['last_updated']).total_seconds() / 3600\n            if hours_old > self.sla['max_delay_hours']:\n                return f\"SLA breach: data is {hours_old:.1f}h old (max: {self.sla['max_delay_hours']}h)\"\n        return None\n\n# Contract definition\ncontract = DataContract({\n    'name': 'user_events',\n    'version': '2.0',\n    'schema': {\n        'columns': [\n            {'name': 'event_id', 'type': 'string', 'required': True, 'not_null': True},\n            {'name': 'user_id', 'type': 'integer', 'required': True, 'not_null': True},\n            {'name': 'event_type', 'type': 'string', 'required': True}\n        ]\n    },\n    'sla': {'max_delay_hours': 2, 'min_rows_per_day': 1000}\n})"}

{name:"Partitioning Strategies",theory:["Horizontal partitioning splits rows across files/nodes; vertical partitioning splits columns.","Range partitioning (by date) is great for time-series; hash partitioning (by ID) ensures even distribution.","Partition pruning skips irrelevant partitions at query time - choose partition keys matching common filters."],code:"# Partition sizing analysis\nimport os\nimport pandas as pd\n\ndef analyze_partitions(base_path):\n    \"\"\"Analyze partition sizes to detect imbalances\"\"\"\n    stats = []\n    for partition in os.listdir(base_path):\n        partition_path = os.path.join(base_path, partition)\n        if os.path.isdir(partition_path):\n            files = os.listdir(partition_path)\n            total_size = sum(os.path.getsize(os.path.join(partition_path, f)) for f in files)\n            stats.append({\n                'partition': partition,\n                'num_files': len(files),\n                'total_size_mb': total_size / (1024*1024),\n                'avg_file_mb': total_size / (1024*1024*max(len(files),1))\n            })\n    \n    df = pd.DataFrame(stats)\n    print(f\"Partitions: {len(df)}\")\n    print(f\"Size range: {df['total_size_mb'].min():.1f} - {df['total_size_mb'].max():.1f} MB\")\n    print(f\"Skew ratio: {df['total_size_mb'].max() / df['total_size_mb'].median():.1f}x\")\n    return df\n\n# Optimal partition count formula\ndef optimal_partitions(total_data_gb, target_partition_mb=256):\n    return int(total_data_gb * 1024 / target_partition_mb)"},
{name:"Bucketing & Clustering",theory:["Bucketing hashes data by a column into fixed number of files; co-located data for efficient joins.","Clustering (BigQuery/Delta) sorts data within partitions by specified columns for range pruning.","Bucketing eliminates shuffle in joins when both tables are bucketed on the same key and bucket count."],code:"# PySpark bucketing for optimized joins\n# Write bucketed table\ndf_orders.write \\\n    .bucketBy(64, 'customer_id') \\\n    .sortBy('order_date') \\\n    .saveAsTable('orders_bucketed')\n\ndf_customers.write \\\n    .bucketBy(64, 'customer_id') \\\n    .saveAsTable('customers_bucketed')\n\n# Join without shuffle (same bucket count + key)\nresult = spark.sql(\"\"\"\n    SELECT c.name, o.order_date, o.amount\n    FROM orders_bucketed o\n    JOIN customers_bucketed c ON o.customer_id = c.customer_id\n\"\"\")\n\n# BigQuery clustering\n# CREATE TABLE dataset.events\n# PARTITION BY DATE(event_time)\n# CLUSTER BY user_id, event_type\n# AS SELECT * FROM raw_events;\n\n# Delta Lake Z-ordering (multi-dimensional clustering)\n# OPTIMIZE delta_table ZORDER BY (user_id, product_id)"},
{name:"Caching Strategies",theory:["Result caching stores computed query results to avoid re-computation on identical requests.","Materialized views pre-compute aggregations; refresh on schedule or incrementally on data changes.","Application-level caching (Redis) stores frequently accessed lookup data to avoid database round-trips."],code:"import time\nfrom functools import lru_cache\nimport redis\n\n# In-memory LRU cache for repeated computations\n@lru_cache(maxsize=1000)\ndef expensive_lookup(key):\n    # Simulates a costly database query\n    return query_database(key)\n\n# Redis-based distributed cache\nclass DataCache:\n    def __init__(self, redis_url='redis://localhost:6379'):\n        self.redis = redis.from_url(redis_url)\n        self.default_ttl = 3600  # 1 hour\n    \n    def get_or_compute(self, key, compute_fn, ttl=None):\n        \"\"\"Get from cache or compute and cache\"\"\"\n        cached = self.redis.get(key)\n        if cached:\n            return json.loads(cached)\n        \n        result = compute_fn()\n        self.redis.setex(key, ttl or self.default_ttl, json.dumps(result))\n        return result\n    \n    def invalidate(self, pattern):\n        \"\"\"Invalidate cache keys matching pattern\"\"\"\n        keys = self.redis.keys(pattern)\n        if keys:\n            self.redis.delete(*keys)\n\n# Materialized view pattern\n# CREATE MATERIALIZED VIEW mv_daily_sales AS\n# SELECT date, product_id, SUM(amount) as total_sales\n# FROM fact_sales GROUP BY date, product_id;\n# REFRESH MATERIALIZED VIEW mv_daily_sales;"},
{name:"Parallel Processing",theory:["Parallelism splits work across multiple workers/threads/processes for faster execution.","Data parallelism: each worker processes a subset of records; task parallelism: each worker does different step.","Manage shared state carefully: use queues, locks, or immutable data to avoid race conditions."],code:"from concurrent.futures import ProcessPoolExecutor, ThreadPoolExecutor\nimport pandas as pd\nimport multiprocessing as mp\n\ndef parallel_transform(df, transform_fn, num_workers=None):\n    \"\"\"Split DataFrame and process chunks in parallel\"\"\"\n    if num_workers is None:\n        num_workers = mp.cpu_count()\n    \n    chunks = [df.iloc[i::num_workers] for i in range(num_workers)]\n    \n    with ProcessPoolExecutor(max_workers=num_workers) as executor:\n        results = list(executor.map(transform_fn, chunks))\n    \n    return pd.concat(results, ignore_index=True)\n\ndef parallel_extract(sources, extract_fn, max_workers=8):\n    \"\"\"Extract from multiple sources in parallel\"\"\"\n    with ThreadPoolExecutor(max_workers=max_workers) as executor:\n        futures = {executor.submit(extract_fn, src): src for src in sources}\n        results = {}\n        for future in futures:\n            src = futures[future]\n            try:\n                results[src] = future.result()\n            except Exception as e:\n                results[src] = {'error': str(e)}\n    return results\n\n# Usage\nsources = ['users_api', 'orders_db', 'events_kafka', 'logs_s3']\ndata = parallel_extract(sources, extract_source)"},
{name:"Data Skew & Optimization",theory:["Data skew occurs when data is unevenly distributed: one partition/key has far more data than others.","Skew causes: hot partitions, slow joins (one reducer processes most data), and OOM errors.","Solutions: salting (add random prefix to keys), broadcast joins for small tables, adaptive query execution."],code:"# Detecting data skew\nimport pandas as pd\n\ndef detect_skew(df, partition_col, threshold=3.0):\n    \"\"\"Detect skewed partitions (>threshold * median)\"\"\"\n    counts = df.groupby(partition_col).size().reset_index(name='count')\n    median_count = counts['count'].median()\n    mean_count = counts['count'].mean()\n    max_count = counts['count'].max()\n    \n    skew_ratio = max_count / median_count\n    print(f'Skew analysis for {partition_col}:')\n    print(f'  Median: {median_count}, Mean: {mean_count:.0f}, Max: {max_count}')\n    print(f'  Skew ratio: {skew_ratio:.1f}x')\n    \n    skewed = counts[counts['count'] > median_count * threshold]\n    if len(skewed) > 0:\n        print(f'  Skewed keys: {skewed[partition_col].tolist()}')\n    return skewed\n\n# Salting technique to handle skewed joins\ndef salt_key(df, key_col, num_salts=10):\n    \"\"\"Add salt to skewed key for better distribution\"\"\"\n    import numpy as np\n    df = df.copy()\n    df['_salt'] = np.random.randint(0, num_salts, size=len(df))\n    df['_salted_key'] = df[key_col].astype(str) + '_' + df['_salt'].astype(str)\n    return df\n\n# PySpark: broadcast join for small table\n# from pyspark.sql.functions import broadcast\n# result = large_df.join(broadcast(small_df), 'key')"}
