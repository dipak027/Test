{q:"A query scans a 1TB table but only needs rows from the last 7 days (50GB). The table is partitioned by date. What technique reduces data scanned to 50GB?",options:["A) Adding more indexes","B) Partition pruning - query only accesses relevant date partitions","C) Caching the entire table","D) Using a smaller instance"],answer:"B",d:"E"},
{q:"Your Spark job has 100 tasks. 99 finish in 1 minute but 1 takes 30 minutes. The overall job takes 31 minutes. What is this performance problem?",options:["A) Insufficient memory","B) Data skew - one partition has far more data than others causing a straggler","C) Network latency","D) Disk failure"],answer:"B",d:"E"},
{q:"A dashboard query takes 10 seconds. Adding a result cache returns the same query in 50ms. What trade-off does caching introduce?",options:["A) No trade-offs","B) Data freshness - cached results may be stale if underlying data changed since caching","C) Higher storage costs always","D) Reduced query accuracy"],answer:"B",d:"E"},
{q:"Your pipeline writes 1B rows to a table. A downstream query does GROUP BY on column 'category' (100 unique values). Which optimization speeds up this query most?",options:["A) Index on every column","B) Pre-aggregating by category (materialized view or summary table)","C) More disk space","D) Changing the file format to CSV"],answer:"B",d:"E"},
{q:"A pipeline reads 500GB from S3. The bottleneck is network transfer, not CPU. Which approach improves throughput?",options:["A) Faster CPUs","B) Parallel reads across multiple partitions/files to saturate network bandwidth","C) Compress data larger","D) Use single-threaded reads"],answer:"B",d:"E"},
{q:"Your database has 10 indexes on a table. INSERT performance is 5x slower than a table with no indexes. Why?",options:["A) Indexes speed up all operations","B) Each INSERT must update all 10 indexes, adding write overhead per row","C) Indexes consume all RAM","D) The table is too small for indexes"],answer:"B",d:"E"},
{q:"A 50GB table is queried with SELECT * FROM table WHERE id = 12345. With a B-tree index on id, how many disk pages are typically read?",options:["A) All pages (full table scan)","B) 3-4 pages (tree depth traversal to leaf + data page) - logarithmic access","C) Exactly 1 page","D) 50GB worth of pages"],answer:"B",d:"E"},
{q:"Your Spark job joins table A (500M rows) with table B (10K rows). The shuffle for this join takes 80% of execution time. Which optimization eliminates the shuffle?",options:["A) Sort-merge join","B) Broadcast join - send small table B to all executors, eliminating need for shuffle","C) Nested loop join","D) Reduce partitions"],answer:"B",d:"M"},
{q:"A data warehouse query aggregates 5 years of data. Adding a WHERE clause for last quarter reduces query time from 45 minutes to 30 seconds. What optimization technique was applied?",options:["A) Index usage","B) Partition pruning - limiting scan to only the relevant time partition","C) Query caching","D) Parallel execution"],answer:"B",d:"M"},
{q:"Your pipeline processes 10TB daily. Storage costs grow linearly. Which strategy reduces long-term storage costs without losing data access?",options:["A) Delete old data","B) Tiered storage - move cold data to cheaper storage (S3 Glacier) with lifecycle policies while keeping hot data on fast storage","C) Compress to single file","D) Store less data per day"],answer:"B",d:"M"},
{q:"A query with ORDER BY on a non-indexed column sorts 100M rows. This operation spills to disk and takes 20 minutes. Which optimization helps?",options:["A) Remove ORDER BY","B) Add an index on the sort column, or pre-sort the data in a materialized view","C) Increase network bandwidth","D) Use a smaller result set via LIMIT first, then sort"],answer:"D",d:"M"},

// State
let currentTopic = null;
const STORAGE_KEY = 'de_roadmap_progress';

function getProgress() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
    catch { return {}; }
}
function saveProgress(data) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}
function getTotalPractice() {
    return topics.reduce((sum, t) => sum + t.practice.length, 0);
}
function getCompletedCount() {
    const prog = getProgress();
    return Object.values(prog).filter(v => v).length;
}
function updateProgressBar() {
    const total = getTotalPractice();
    const done = getCompletedCount();
    const pct = total > 0 ? (done / total * 100) : 0;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressText').textContent = done + ' / ' + total;
}
function getTopicProgress(topicId) {
    const prog = getProgress();
    const topic = topics.find(t => t.id === topicId);
    if (!topic) return {done: 0, total: 0};
    let done = 0;
    topic.practice.forEach((_, i) => {
        if (prog[topicId + '_' + i]) done++;
    });
    return {done, total: topic.practice.length};
}

// Syntax highlighting
function highlightCode(code) {
    let html = code
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    // SQL comments
    html = html.replace(/(--.*)/g, '<span class="cm">$1</span>');
    // Python comments
    html = html.replace(/(#.*)/g, '<span class="cm">$1</span>');
    // Multi-line strings
    html = html.replace(/("""[\s\S]*?"""|'''[\s\S]*?''')/g, '<span class="str">$1</span>');
    // Strings
    html = html.replace(/(f?"[^"\\]*(?:\\.[^"\\]*)*")/g, '<span class="str">$1</span>');
    html = html.replace(/(f?'[^'\\]*(?:\\.[^'\\]*)*')/g, '<span class="str">$1</span>');
    // Numbers
    html = html.replace(/\b(\d+\.?\d*)\b/g, '<span class="num">$1</span>');
    // Python keywords
    const pyKeywords = ['def','class','import','from','return','yield','if','elif','else','for','while','break','continue','pass','try','except','finally','raise','with','as','lambda','and','or','not','in','is','True','False','None','async','await','del','assert','global'];
    pyKeywords.forEach(kw => {
        html = html.replace(new RegExp('\\b(' + kw + ')\\b', 'g'), '<span class="kw">$1</span>');
    });
    // SQL keywords
    const sqlKeywords = ['SELECT','FROM','WHERE','JOIN','LEFT','RIGHT','INNER','OUTER','ON','GROUP','BY','ORDER','HAVING','INSERT','INTO','VALUES','UPDATE','SET','DELETE','CREATE','TABLE','ALTER','DROP','INDEX','VIEW','AS','AND','OR','NOT','NULL','PRIMARY','KEY','FOREIGN','REFERENCES','DEFAULT','SERIAL','INT','BIGINT','VARCHAR','TEXT','DECIMAL','BOOLEAN','DATE','TIMESTAMP','PARTITION','CLUSTER','WITH','CASE','WHEN','THEN','ELSE','END','DISTINCT','COUNT','SUM','AVG','MAX','MIN','LIKE','BETWEEN','EXISTS','UNION','ALL','LIMIT','OFFSET','CASCADE','SCHEMA','USING','MERGE','CONFLICT','EXCLUDED','COPY','FORMAT','VACUUM','OPTIMIZE'];
    sqlKeywords.forEach(kw => {
        html = html.replace(new RegExp('\\b(' + kw + ')\\b', 'gi'), '<span class="kw">$1</span>');
    });
    // Built-in functions
    const builtins = ['print','len','range','type','int','float','str','bool','list','dict','set','tuple','input','open','sum','max','min','abs','enumerate','zip','map','filter','sorted','isinstance','super','hasattr','getattr','setattr'];
    builtins.forEach(fn => {
        html = html.replace(new RegExp('\\b(' + fn + ')\\b(?=\\()', 'g'), '<span class="fn">$1</span>');
    });
    return html;
}

// Render roadmap
function renderRoadmap() {
    const container = document.getElementById('roadmapContainer');
    container.innerHTML = '';
    topics.forEach(topic => {
        const prog = getTopicProgress(topic.id);
        const node = document.createElement('div');
        node.className = 'node';
        node.onclick = () => showDetail(topic.id);
        node.innerHTML = `
            <div class="node-number" style="border-color:${topic.color};color:${topic.color}">${topic.id}</div>
            <div class="node-card">
                <div class="node-title" style="color:${topic.color}">${topic.title}</div>
                <div class="node-chips">${topic.chips.map(c => '<span class="chip">' + c + '</span>').join('')}</div>
                <div class="node-progress">${prog.done} / ${prog.total} practice completed</div>
            </div>
        `;
        container.appendChild(node);
    });
}

function showDetail(topicId) {
    currentTopic = topics.find(t => t.id === topicId);
    if (!currentTopic) return;
    document.getElementById('roadmapPage').classList.remove('active');
    document.getElementById('detailPage').classList.add('active');
    document.getElementById('detailTitle').textContent = currentTopic.title;
    document.getElementById('detailTitle').style.color = currentTopic.color;
    document.getElementById('detailSubtitle').textContent = currentTopic.subtopics.map(s => s.name).join(' \u2022 ');
    renderTheory();
    renderExamples();
    renderPractice();
    switchTab('theory');
    window.scrollTo(0, 0);
}

function showRoadmap() {
    document.getElementById('detailPage').classList.remove('active');
    document.getElementById('roadmapPage').classList.add('active');
    renderRoadmap();
    updateProgressBar();
}

function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t, i) => {
        t.classList.toggle('active', ['theory','examples','practice','solutions'][i] === tab);
    });
    document.querySelectorAll('.tab-content').forEach((tc, i) => {
        tc.classList.toggle('active', ['theory','examples','practice','solutions'][i] === tab);
    });
    if (tab === 'solutions') renderSolutions();
}

function renderTheory() {
    const container = document.getElementById('theoryContent');
    container.innerHTML = currentTopic.subtopics.map(sub => `
        <div class="theory-section">
            <div class="theory-title">${sub.name}</div>
            ${sub.theory.map(t => '<p class="theory-point">' + t + '</p>').join('')}
            <pre class="code-block">${highlightCode(sub.code)}</pre>
        </div>
    `).join('');
}

function renderExamples() {
    const container = document.getElementById('examplesContent');
    container.innerHTML = currentTopic.examples.map(ex => `
        <div class="example-card">
            <div class="example-title">${ex.title}</div>
            <p class="example-desc">${ex.desc}</p>
            <pre class="code-block">${highlightCode(ex.code)}</pre>
        </div>
    `).join('');
}

function renderPractice() {
    const container = document.getElementById('practiceContent');
    const prog = getProgress();
    var html = '';
    currentTopic.practice.forEach(function(p, i) {
        var key = currentTopic.id + '_' + i;
        var checked = prog[key] ? 'checked' : '';
        var doneClass = prog[key] ? 'done' : '';
        var diffClass = p.d === 'E' ? 'easy' : p.d === 'M' ? 'medium' : 'hard';
        var diffLabel = p.d === 'E' ? 'Easy' : p.d === 'M' ? 'Medium' : 'Hard';
        html += '<div class="practice-item ' + doneClass + '">' +
            '<input type="checkbox" ' + checked + ' onchange="togglePractice(\'' + key + '\', this)">' +
            '<div class="practice-text">' +
            '<div>' + (i+1) + '. ' + p.q + '</div>' +
            '<ul class="mcq-options">' +
            p.options.map(function(opt) { return '<li class="mcq-option">' + opt + '</li>'; }).join('') +
            '</ul></div>' +
            '<span class="difficulty ' + diffClass + '">' + diffLabel + '</span></div>';
    });
    container.innerHTML = html;
}

function togglePractice(key, el) {
    const prog = getProgress();
    prog[key] = el.checked;
    saveProgress(prog);
    updateProgressBar();
    el.parentElement.classList.toggle('done', el.checked);
}

`Airflow marks downstream tasks as 'upstream_failed' when their parent fails. B and C depend on A, so they cannot execute and are not attempted. This prevents running tasks on potentially missing/invalid data.`,
`The cron expression '0 6 * * *' means minute 0, hour 6, every day. This schedules the DAG to run at exactly 6:00 AM UTC daily. The fields are: minute, hour, day-of-month, month, day-of-week.`,

`BranchPythonOperator evaluates conditions at runtime and selects which downstream path to follow. Combining day-of-week logic in the branch function with standard task dependencies achieves both conditions.`,

`Dynamic task generation creates parallel tasks at DAG parse time using loops. Each region gets its own task instance running independently, maximizing throughput through parallelism.`,
`trigger_rule='one_success' means the task executes if at least one upstream task succeeded. This implements OR logic, unlike the default 'all_success' which requires ALL upstreams to succeed (AND logic).`,

`Pools limit concurrent task execution across DAGs. By assigning database-heavy tasks to a pool with limited slots, you prevent overwhelming the database regardless of how many DAGs are running.`,

`At-least-once delivery means messages may be delivered more than once (after crash recovery). The consumer re-reads unacknowledged messages ensuring no data loss, but potentially causing duplicate processing.`,
`Tumbling windows divide time into fixed, non-overlapping intervals. A 5-minute tumbling window groups all readings in each 5-minute period, computes the average, and emits a result per window.`,
`Kafka distributes partitions among consumer group members roughly evenly. With 10 partitions and 3 consumers, the assignment is 4+3+3 (or similar even split) ensuring balanced workload.`,
`Late-arriving events have event_time before the current watermark. If the window for 10:00-10:05 has already closed and emitted results, the 10:01 event arrives too late to be included in that window.`,
`Kafka uses the message key's hash to determine partition assignment. All messages with the same user_id (key) hash to the same partition, ensuring ordered processing per user.`,
`Caching lookup data locally (or using a KTable/changelog stream) avoids per-event database queries. The lookup data is kept in memory and updated via a separate stream, eliminating the 100ms latency per event.`,
`With 7-day retention, messages older than 7 days are deleted. After 10 days offline, the first 3 days of messages are gone. The consumer starts from the earliest available offset, losing those 3 days of data.`,
`Watermarks with allowed lateness keep windows open beyond their nominal close time. A 15-minute lateness allowance means the 10:00-10:05 window stays open until the watermark passes 10:20, accepting late events.`,
`Flink checkpointing periodically snapshots processing state and Kafka consumer offsets atomically. On recovery, Flink restores the last checkpoint and replays from the saved offset, ensuring no data loss.`,
`Stream-table joins enrich an event stream with the latest value from a slowly-changing lookup table. The profile table is maintained as a compacted changelog; each click event is enriched with current profile data.`,
`Kafka assigns at most one partition per consumer in a group. With 5 partitions and 6 consumers, one consumer gets no partitions and sits idle. You need at least as many partitions as consumers.`,
`A state store (keyed by event ID) tracks recently seen events. When a duplicate arrives, the deduplication check finds the ID in state and skips processing. State TTL removes old entries to bound memory usage.`,
`Session windows are activity-based: they close after a gap of inactivity. 10:00 to 10:15 has a 15-minute gap (within 30 min), but 10:15 to 10:50 has a 35-minute gap (exceeds 30 min), creating a new session.`,
`Kafka transactions + idempotent consumers ensure exactly-once from source to sink. Offsets are committed within the same transaction as the database write, making the operation atomic end-to-end.`,
`Scaling consumers (adding more instances to the consumer group) increases parallel processing capacity. If partitions are insufficient, add more partitions too. This horizontally scales consumption throughput.`,
`Kafka Streams with state stores provides exactly-once processing with local state that is backed by changelog topics. Recovery rebuilds state from changelogs. EOS configuration coordinates transactions across read-process-write.`,
`Early speculative results provide low-latency approximate answers. When late data arrives, the system retracts the old result and emits an updated corrected result. This trades some complexity for both low latency and eventual accuracy.`,
`Backpressure with Kafka buffering absorbs spikes - messages queue in Kafka (which handles high throughput) while micro-batched writes respect the sink's rate limit. Flow control prevents overwhelming the database.`,
`Partitioned state with RocksDB stores state on local disk (not all in memory), keyed by user_id across partitions. Incremental checkpointing avoids full state snapshots. TTL automatically cleans up inactive user state.`,
`Running both systems in parallel and comparing outputs validates correctness of the new streaming system against the proven batch system. Only after reconciliation confirms matching results do you cut over to streaming.`

`A data lake stores raw diverse file formats (JSON, CSV, Parquet) with schema-on-read. No schema enforcement at write time, data is structured only at query time. This provides maximum flexibility for diverse data.`,

`Lakehouses combine lake benefits (cheap object storage, open formats, schema flexibility) with warehouse benefits (ACID transactions, schema enforcement, SQL support, performance optimization).`,

`Delta Lake (and Iceberg/Hudi) add a metadata/transaction layer over Parquet files. This layer provides ACID guarantees, enabling concurrent reads/writes without data corruption on object storage.`,

`OPTIMIZE compacts many small files into fewer large files (typically 1GB each). This reduces metadata overhead and file-open operations during queries, dramatically improving scan performance.`,

`Schema evolution in Iceberg modifies metadata only. Existing Parquet files aren't rewritten; they simply return NULL for the new column. Only new writes include the new field, enabling zero-downtime schema changes.`,
`Fine-grained access control with column masking allows different users to see different columns. Unity Catalog or Lake Formation enforce policies at the query engine level, masking PII for unauthorized users.`,
`Partition evolution in Iceberg changes future partition layout without rewriting historical data. Old data keeps its original partitioning; new data uses the new scheme. Queries span both seamlessly via metadata.`,
`Time travel identifies when bad data was introduced. Reprocessing from bronze (which preserves raw data) through corrected silver logic fixes historical data. Delta Lake's versioning enables targeted repairs.`,
`Materialized views/caching serve BI dashboards with pre-computed aggregations for low latency. ML training accesses full tables directly. Both use the same underlying Delta/Iceberg tables without data duplication.`,
`Federated lakehouse routes queries to the appropriate regional storage based on data residency metadata. A unified catalog provides a single view while respecting geographic constraints for compliance.`,
`Delta's transaction log automatically creates checkpoints (every 10 commits by default) that consolidate log entries. Setting appropriate log retention limits historical metadata size while preserving needed history.`,
`Unified governance layers provide automated lineage, quality metrics, audit trails, and cost attribution in a single platform. Tag-based allocation assigns costs to teams based on their table ownership and compute usage.`,
`Partitioning MERGE targets limits the scan scope to relevant partitions only. Bloom filters provide fast key existence checks. Source-level dedup before merge reduces the number of records that need matching.`

`B-tree indexes create a balanced tree structure enabling O(log n) lookups instead of O(n) full scans. For 10M rows, an index traverses ~23 levels instead of scanning all 10M rows, reducing time from seconds to milliseconds.`,
`Non-repeatable read occurs when a value read within a transaction changes due to another committed transaction. The same SELECT returns different results on re-read because the row was updated between reads.`,
`A composite primary key enforces uniqueness on the combination of columns. The same order_id can appear with different product_ids, and the same product_id can appear in different orders, but each pair is unique.`,
`With 95% of rows matching 'shipped', an index lookup would still access 95% of the table's data pages. A sequential scan is more efficient because it reads pages in order without the overhead of index indirection.`,
`Transaction atomicity means all statements succeed or all fail together. When the second INSERT fails, the entire transaction rolls back, undoing the first INSERT. The third INSERT is never attempted.`,
`VACUUM reclaims space from dead tuples (rows that were deleted or updated but not yet cleaned up). In MVCC databases like PostgreSQL, dead tuples accumulate until VACUUM removes them and frees disk space.`,
`Foreign key constraints enforce referential integrity. Inserting a child record (order) with a non-existent parent (customer_id) violates the constraint, and the database rejects the INSERT with an error.`,
`The query planner uses statistics to estimate cost. When a query returns a large percentage of rows, the cumulative random I/O cost of index lookups exceeds the sequential I/O cost of a full table scan.`,
`Table partitioning splits one logical table into physical partitions (e.g., by date range). The query planner eliminates irrelevant partitions entirely, and VACUUM/reindex can target individual partitions.`,
`Lost update: both transactions read the same initial value (100), each computes independently (100+50=150), and the second write overwrites the first. Neither sees the other's change, losing one update.`,
`B-tree indexes support both equality (WHERE id=X) and range predicates (WHERE date BETWEEN). They maintain sorted order enabling efficient range scans, unlike hash indexes which only support equality.`,
`Hash join builds an in-memory hash table from the smaller table (customers 100K rows) and probes it with each row from the larger table (orders 10M rows). This is O(n+m) vs nested loop's O(n*m).`,
`Connection pooling queues excess requests when all connections are in use. The 30 extra requests wait until connections are returned to the pool. If wait exceeds timeout, they receive a connection timeout error.`,
`Materialized views store pre-computed query results physically. Instead of re-aggregating 5 years of data each time, the view is queried directly (fast read) and refreshed periodically (e.g., nightly).`,
`PostgreSQL's JSONB type stores binary JSON with indexing support (GIN indexes). You get flexible document storage with full SQL query capability, ACID transactions, and can join JSON data with relational tables.`,
`Sharding distributes data across multiple nodes using a shard key (e.g., customer_id hash). Each node handles writes for its shard independently, multiplying total write throughput horizontally.`,
`Configuring strong consistency for critical operations (quorum reads requiring majority of replicas to agree) ensures financial data is always accurate. Non-critical data can use eventual consistency for better performance.`,
`Dropping indexes before bulk loading eliminates per-row index maintenance overhead. COPY is optimized for bulk insertion (bypassing row-level triggers/checks). Rebuilding indexes after is a single efficient operation.`,
`Per-tenant resource quotas limit CPU/memory per tenant. Query timeouts kill expensive queries. Resource groups or separate pools ensure one tenant's workload cannot consume all shared resources.`,
`Redis provides sub-millisecond in-memory reads. AOF persistence writes every operation to disk for crash recovery. Async replication to a persistent store provides additional durability guarantees.`

`Layered testing (unit per pipeline, contracts between pipelines, e2e for critical paths) balances coverage with execution time. Each layer tests at an appropriate scope without requiring 50-pipeline integration for every change.`,
`Immutable deployment artifacts link each release to its specific commit, test results, approvals, and deployment timestamp. This creates an auditable chain of custody satisfying regulatory traceability requirements.`,
`Continuous data validation detects drift between training and production data. When detected, it triggers automated retraining and A/B validation before promoting the new model, keeping ML performance consistent.`

`LIMIT first, then sort is a query optimization trick. By reducing the result set before sorting (using a subquery or top-N algorithm), the database sorts far fewer rows, avoiding the expensive full-sort spill to disk.`,
`Spark's disk spilling allows processing data larger than memory by writing intermediate results to local disk. Partitions are processed in chunks that fit available RAM, trading speed for the ability to complete the job.`,
`Linear scan growth is inherent to COUNT(*) without indexes or pre-computed counters. As the table grows 10x, scan time grows 10x. Solutions include approximate counts (HyperLogLog) or maintained counter tables.`,
`Distributing partition processing across multiple workers enables parallel execution. If 12 partitions each take 1 hour sequentially (12 hours total), processing all 12 in parallel takes only 1 hour.`,
`Pre-aggregated materialized views or OLAP engines (Druid, ClickHouse) serve sub-second queries by pre-computing common aggregations. The 10TB raw table is summarized into smaller structures optimized for dashboard patterns.`,
`Amdahl's Law states that speedup is limited by the serial (non-parallelizable) portion of work. Even with infinite parallelism, serial sections (shuffles, coordination, sequential I/O) cap maximum speedup.`,
`Workload management classifies queries (simple lookup vs complex join) and routes them to appropriate resource pools. Priority queues ensure critical queries get resources first. Timeouts prevent expensive queries from monopolizing resources.`,
`Serialization/deserialization consumes 70% of time. Columnar in-memory formats (Arrow) eliminate repeated ser/deser between stages. Binary formats (Protobuf) are faster to serialize than JSON/XML. Eliminating unnecessary conversions removes the bottleneck.`,
`Sustainable petabyte-scale performance requires multiple techniques working together: partitioning reduces scan scope, materialized aggregates serve common queries, caching avoids redundant computation, and archival limits active dataset size.`,
`Parallel/async processing of independent steps (encryption, validation, enrichment can run simultaneously), pre-warmed caches, hardware-accelerated encryption, and micro-batching amortize per-record overhead across many records.`
]
};


function renderSolutions() {
    var container = document.getElementById('solutionsContent');
    if (!currentTopic) return;
    var sols = solutionData[currentTopic.id] || [];
    var html = '';
    currentTopic.practice.forEach(function(p, i) {
        var sol = sols[i] || 'Explanation coming soon...';
        html += '<div class="solution-item">' +
            '<div class="solution-header" onclick="toggleSolution(' + i + ')">' +
            '<span class="solution-num">#' + (i+1) + '</span>' +
            '<span class="solution-q">' + p.q + '</span>' +
            '<button class="solution-toggle" id="btn_' + i + '">Show Answer</button>' +
            '</div>' +
            '<div class="solution-body" id="sol_' + i + '">' +
            '<div style="margin-bottom:8px"><strong style="color:var(--green)">Correct Answer: ' + p.answer + '</strong></div>' +
            '<ul class="mcq-options">' +
            p.options.map(function(opt) {
                var isCorrect = opt.startsWith(p.answer + ')');
                return '<li class="mcq-option' + (isCorrect ? ' correct' : '') + '">' + opt + '</li>';
            }).join('') +
            '</ul>' +
            '<div class="solution-explanation">' + sol + '</div>' +
            '</div></div>';
    });
    container.innerHTML = html;
}

function toggleSolution(i) {
    const body = document.getElementById('sol_' + i);
    const btn = document.getElementById('btn_' + i);
    body.classList.toggle('open');
    btn.textContent = body.classList.contains('open') ? 'Hide Solution' : 'Show Solution';
}

// Initialize
renderRoadmap();
updateProgressBar();
