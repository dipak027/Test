<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Engineering Roadmap</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#080c14;--card:#141d2e;--border:#1e2d45;--text:#dde4f0;--text-dim:#8892a4;--green:#4ade80;--cyan:#22d3ee;--purple:#a78bfa;--gradient:linear-gradient(135deg,#4ade80,#22d3ee,#a78bfa)}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
code,pre,.code{font-family:'JetBrains Mono',monospace}
.header{position:sticky;top:0;z-index:1000;background:rgba(8,12,20,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:12px 24px}
.header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:1.4rem;font-weight:700;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.progress-container{flex:1;max-width:300px;margin-left:24px}
.progress-label{font-size:0.7rem;color:var(--text-dim);margin-bottom:4px;text-align:right}
.progress-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:var(--gradient);border-radius:3px;transition:width 0.5s ease}
</style>
</head>
<body>
<header class="header">
<div class="header-inner">
<div class="logo">Data Engineering Roadmap</div>
<div class="progress-container">
<div class="progress-label"><span id="progressText">0 / 300</span> completed</div>
<div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
</div>
</div>
</header>
<div class="page active" id="roadmapPage">
<div class="roadmap" id="roadmapContainer"></div>
</div>
<div class="page" id="detailPage">
<button class="back-btn" onclick="showRoadmap()">&#8592; Back to Roadmap</button>
<div class="detail-header">
<h1 class="detail-title" id="detailTitle"></h1>
<p class="detail-subtitle" id="detailSubtitle"></p>
</div>
<div class="tabs">
<div class="tab active" onclick="switchTab('theory')">Theory</div>
<div class="tab" onclick="switchTab('examples')">Examples</div>
<div class="tab" onclick="switchTab('practice')">Practice</div>
<div class="tab" onclick="switchTab('solutions')">Solutions</div>
</div>
<div class="tab-content active" id="theoryContent"></div>
<div class="tab-content" id="examplesContent"></div>
<div class="tab-content" id="practiceContent"></div>
<div class="tab-content" id="solutionsContent"></div>
</div>

<style>
.page{display:none;padding:40px 24px 80px;max-width:900px;margin:0 auto;animation:fadeIn 0.3s ease}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.roadmap{position:relative;padding-left:60px}
.roadmap::before{content:'';position:absolute;left:28px;top:0;bottom:0;width:2px;background:linear-gradient(to bottom,var(--green),var(--cyan),var(--purple));opacity:0.4}
.node{position:relative;margin-bottom:24px;cursor:pointer;transition:transform 0.2s ease}
.node:hover{transform:translateX(4px)}
.node-number{position:absolute;left:-48px;top:16px;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.8rem;border:2px solid;background:var(--bg)}
.node-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px 24px;transition:border-color 0.2s,box-shadow 0.2s}
.node:hover .node-card{border-color:var(--cyan);box-shadow:0 4px 20px rgba(34,211,238,0.1)}
.node-title{font-size:1.1rem;font-weight:600;margin-bottom:8px}
.node-chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{font-size:0.65rem;padding:3px 8px;border-radius:4px;background:rgba(255,255,255,0.05);border:1px solid var(--border);color:var(--text-dim)}
.node-progress{font-size:0.7rem;color:var(--text-dim);margin-top:8px}
.back-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);cursor:pointer;font-family:'Sora',sans-serif;font-size:0.85rem;margin-bottom:24px;transition:border-color 0.2s}
.back-btn:hover{border-color:var(--cyan)}
.detail-header{margin-bottom:24px}
.detail-title{font-size:1.8rem;font-weight:700;margin-bottom:8px}
.detail-subtitle{font-size:0.85rem;color:var(--text-dim)}
.tabs{display:flex;gap:4px;margin-bottom:24px;background:var(--card);border-radius:10px;padding:4px;border:1px solid var(--border)}
.tab{flex:1;padding:10px 16px;text-align:center;border-radius:8px;cursor:pointer;font-size:0.85rem;font-weight:500;color:var(--text-dim);transition:all 0.2s}
.tab.active{background:var(--border);color:var(--text)}
.tab:hover:not(.active){color:var(--text)}
.tab-content{display:none;animation:fadeIn 0.3s ease}
.tab-content.active{display:block}
.theory-section{margin-bottom:24px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px}
.theory-title{font-size:1rem;font-weight:600;margin-bottom:12px;color:var(--cyan)}
.theory-point{font-size:0.85rem;color:var(--text-dim);margin-bottom:8px;padding-left:16px;position:relative;line-height:1.6}
.theory-point::before{content:'>';position:absolute;left:0;color:var(--green)}
pre.code-block{background:rgba(0,0,0,0.4);border:1px solid var(--border);border-radius:8px;padding:16px;margin-top:12px;overflow-x:auto;font-size:0.8rem;line-height:1.6}
.example-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:16px}
.example-title{font-size:0.9rem;font-weight:600;margin-bottom:8px;color:var(--purple)}
.example-desc{font-size:0.82rem;color:var(--text-dim);margin-bottom:12px}
.practice-item{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;transition:border-color 0.2s}
.practice-item:hover{border-color:var(--cyan)}
.practice-item input[type="checkbox"]{width:18px;height:18px;margin-top:2px;accent-color:var(--green);cursor:pointer}
.practice-item.done{opacity:0.6;border-color:var(--green)}
.practice-text{flex:1;font-size:0.82rem;line-height:1.5}
.difficulty{font-size:0.65rem;padding:2px 8px;border-radius:4px;font-weight:600;white-space:nowrap}
.difficulty.easy{background:rgba(74,222,128,0.15);color:#4ade80}
.difficulty.medium{background:rgba(251,191,36,0.15);color:#fbbf24}
.difficulty.hard{background:rgba(244,114,182,0.15);color:#f472b6}
.problem-type{font-size:0.6rem;padding:2px 6px;border-radius:3px;font-weight:500;margin-right:4px;background:rgba(34,211,238,0.1);color:var(--cyan)}
@media(max-width:640px){.roadmap{padding-left:40px}.roadmap::before{left:16px}.node-number{left:-32px;width:26px;height:26px;font-size:0.7rem}.header-inner{flex-wrap:wrap;gap:8px}.progress-container{max-width:100%;margin-left:0}}
.solution-item{background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:12px;overflow:hidden}
.solution-header{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.solution-header:hover{background:rgba(34,211,238,0.05)}
.solution-num{font-size:0.75rem;color:var(--text-dim);font-family:'JetBrains Mono',monospace;margin-right:10px}
.solution-q{font-size:0.82rem;flex:1}
.solution-toggle{padding:4px 12px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--cyan);font-size:0.72rem;cursor:pointer;font-family:'Sora',sans-serif;transition:all 0.2s}
.solution-toggle:hover{background:rgba(34,211,238,0.1);border-color:var(--cyan)}
.solution-body{display:none;padding:0 16px 16px;border-top:1px solid var(--border)}
.solution-body.open{display:block}
.cm{color:#6b7280}.str{color:#a5d6ff}.kw{color:#ff7b72}.fn{color:#d2a8ff}.num{color:#79c0ff}.dec{color:#ffa657}

.mcq-options{list-style:none;margin:8px 0;padding:0}
.mcq-option{padding:8px 12px;margin:4px 0;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:6px;font-size:0.82rem;cursor:default;transition:border-color 0.2s}
.mcq-option:hover{border-color:var(--cyan)}
.mcq-option.correct{border-color:var(--green);background:rgba(74,222,128,0.08)}
.solution-explanation{font-size:0.82rem;color:var(--text-dim);padding:12px;background:rgba(34,211,238,0.05);border-left:3px solid var(--cyan);border-radius:0 6px 6px 0;margin-top:8px;line-height:1.6}
</style>

<script>
const topics = [
{id:1,title:"ETL Fundamentals",color:"#38bdf8",chips:["Extract","Transform","Load","ETL vs ELT","Batch vs Stream"],
subtopics:[
{name:"Extract, Transform, Load",theory:["ETL is the process of extracting data from source systems, transforming it into a usable format, and loading it into a target system.","Extract pulls raw data from databases, APIs, flat files, or streaming sources into a staging area.","Transform applies business rules, cleaning, deduplication, and restructuring before loading."],code:"# Basic ETL pipeline structure in Python\nimport pandas as pd\n\n# EXTRACT\ndef extract(source_path):\n    return pd.read_csv(source_path)\n\n# TRANSFORM\ndef transform(df):\n    df['full_name'] = df['first_name'] + ' ' + df['last_name']\n    df['email'] = df['email'].str.lower().str.strip()\n    df = df.dropna(subset=['email'])\n    return df\n\n# LOAD\ndef load(df, target_path):\n    df.to_parquet(target_path, index=False)\n\n# Run pipeline\nraw = extract('users.csv')\ncleaned = transform(raw)\nload(cleaned, 'users_clean.parquet')"},
{name:"ETL vs ELT",theory:["ETL transforms data before loading; ELT loads raw data first, then transforms in the target system.","ELT leverages the power of modern cloud data warehouses (BigQuery, Snowflake) for transformation.","ETL is preferred when data must be cleaned before storage; ELT is preferred for large-scale analytics."],code:"# ETL approach - transform before load\ndef etl_pipeline():\n    raw = extract_from_api('/users')\n    cleaned = apply_transformations(raw)  # Transform first\n    load_to_warehouse(cleaned)            # Then load\n\n# ELT approach - load then transform\ndef elt_pipeline():\n    raw = extract_from_api('/users')\n    load_to_staging(raw)                  # Load raw first\n    # Transform in warehouse using SQL/dbt\n    # dbt run --models staging.users\n\n# dbt model example (ELT transform in warehouse)\n# models/staging/stg_users.sql\n# SELECT\n#   id,\n#   LOWER(TRIM(email)) as email,\n#   CONCAT(first_name, ' ', last_name) as full_name\n# FROM raw.users\n# WHERE email IS NOT NULL"},
{name:"Batch vs Stream Processing",theory:["Batch processing handles large volumes of data at scheduled intervals (hourly, daily).","Stream processing handles data in real-time as events occur with minimal latency.","Hybrid (Lambda/Kappa architecture) combines batch for completeness and stream for speed."],code:"# Batch processing example\nfrom datetime import datetime, timedelta\n\ndef batch_process(execution_date):\n    \"\"\"Process one day of data\"\"\"\n    start = execution_date\n    end = execution_date + timedelta(days=1)\n    data = query_source(start, end)\n    transformed = transform(data)\n    load_to_warehouse(transformed)\n\n# Stream processing concept (Kafka consumer)\nfrom kafka import KafkaConsumer\n\nconsumer = KafkaConsumer(\n    'user_events',\n    bootstrap_servers='localhost:9092',\n    auto_offset_reset='earliest'\n)\n\nfor message in consumer:\n    event = json.loads(message.value)\n    process_event(event)  # Real-time processing"},
{name:"Data Pipeline Components",theory:["A pipeline consists of: sources, ingestion, staging, transformation, serving, and monitoring layers.","Orchestration tools (Airflow, Prefect) manage dependencies and scheduling between pipeline steps.","Metadata and lineage tracking help debug issues and ensure data governance."],code:"# Pipeline configuration example (YAML)\n# pipeline_config.yaml\npipeline:\n  name: user_analytics\n  schedule: '0 2 * * *'  # Daily at 2 AM\n  sources:\n    - type: postgres\n      table: users\n      incremental_key: updated_at\n    - type: api\n      endpoint: /events\n      method: GET\n  transformations:\n    - deduplicate\n    - validate_schema\n    - enrich_geo_data\n  target:\n    type: bigquery\n    dataset: analytics\n    table: dim_users\n  alerts:\n    - type: slack\n      on: failure"},
{name:"Data Staging & Landing Zones",theory:["Staging areas hold raw data temporarily before transformation, preserving the original format.","Landing zones separate raw (bronze), cleaned (silver), and aggregated (gold) data layers.","Staging enables reprocessing and debugging without re-extracting from source systems."],code:"# Staging zone structure\nimport os\n\nSTAGING_ZONES = {\n    'raw': '/data/landing/raw/',       # Bronze - as-is from source\n    'cleaned': '/data/staging/clean/',  # Silver - validated & cleaned\n    'curated': '/data/warehouse/gold/'  # Gold - business-ready\n}\n\ndef stage_data(data, zone, table_name, date):\n    \"\"\"Write data to appropriate staging zone\"\"\"\n    path = os.path.join(\n        STAGING_ZONES[zone],\n        table_name,\n        f'dt={date}',\n        'data.parquet'\n    )\n    os.makedirs(os.path.dirname(path), exist_ok=True)\n    data.to_parquet(path, index=False)\n    return path"}
],
examples:[
{title:"CSV to Database ETL",desc:"Complete ETL pipeline extracting CSV, transforming data, loading to SQLite.",code:"import pandas as pd\nimport sqlite3\n\n# EXTRACT\ndf = pd.read_csv('sales_data.csv')\nprint(f'Extracted {len(df)} rows')\n\n# TRANSFORM\ndf['sale_date'] = pd.to_datetime(df['sale_date'])\ndf['revenue'] = df['quantity'] * df['unit_price']\ndf = df[df['revenue'] > 0]  # Remove invalid\ndf['region'] = df['region'].str.upper().str.strip()\n\n# LOAD\nconn = sqlite3.connect('warehouse.db')\ndf.to_sql('fact_sales', conn, if_exists='replace', index=False)\nconn.close()\nprint(f'Loaded {len(df)} rows to warehouse')"},
{title:"API Extraction with Pagination",desc:"Extract data from a REST API handling pagination and rate limits.",code:"import requests\nimport time\n\ndef extract_api_data(base_url, headers, max_pages=100):\n    all_data = []\n    page = 1\n    while page <= max_pages:\n        response = requests.get(\n            f'{base_url}?page={page}&per_page=100',\n            headers=headers\n        )\n        if response.status_code == 429:  # Rate limited\n            time.sleep(60)\n            continue\n        data = response.json()\n        if not data['results']:\n            break\n        all_data.extend(data['results'])\n        page += 1\n        time.sleep(0.5)  # Be nice to the API\n    return all_data\n\nusers = extract_api_data('https://api.example.com/users', {'Authorization': 'Bearer token'})"},
{title:"Incremental Load Pattern",desc:"Load only new/changed records since last run using watermark.",code:"import pandas as pd\nfrom datetime import datetime\n\ndef get_last_watermark(table_name):\n    \"\"\"Get the last processed timestamp\"\"\"\n    # Read from metadata store\n    return pd.read_sql(\n        f\"SELECT max_watermark FROM etl_metadata WHERE table_name='{table_name}'\",\n        conn\n    ).iloc[0]['max_watermark']\n\ndef incremental_extract(table, watermark_col):\n    last_wm = get_last_watermark(table)\n    query = f\"\"\"\n        SELECT * FROM {table}\n        WHERE {watermark_col} > '{last_wm}'\n        ORDER BY {watermark_col}\n    \"\"\"\n    new_data = pd.read_sql(query, source_conn)\n    # Update watermark\n    if len(new_data) > 0:\n        new_wm = new_data[watermark_col].max()\n        update_watermark(table, new_wm)\n    return new_data"}
],
practice:[
{q:"Your team receives hourly CSV dumps from a vendor that must be cleaned before analysts query them. Which approach best fits?",options:["A) ELT - load raw CSVs into the warehouse then transform with dbt","B) ETL - extract CSVs, transform in Python, then load clean data to warehouse","C) Stream processing with Kafka consumers","D) Direct file sharing to analysts with no transformation"],answer:"B",d:"E"},
{q:"A data engineer notices that the staging table is empty but the source API returned 5000 records. Which pipeline component most likely failed?",options:["A) The orchestrator scheduling","B) The load step","C) The extract step stored data but the transform step filtered everything","D) The monitoring layer"],answer:"C",d:"E"},
{q:"An e-commerce company needs sales data refreshed every 24 hours for BI dashboards. Which processing model is most appropriate?",options:["A) Stream processing with sub-second latency","B) Batch processing on a daily schedule","C) Micro-batch processing every 5 seconds","D) Manual data uploads by analysts"],answer:"B",d:"E"},
{q:"A pipeline loads data into Snowflake first and then runs dbt models for transformation. What pattern is this?",options:["A) ETL","B) ELT","C) Reverse ETL","D) CDC"],answer:"B",d:"E"},
{q:"Your extract job fails intermittently due to API rate limits. Which staging area benefit helps recover without re-extracting?",options:["A) Raw data preserved in landing zone enables re-transformation","B) Staging provides faster query performance","C) Staging reduces storage costs","D) Staging automatically retries failed API calls"],answer:"A",d:"E"},
{q:"A company's bronze layer contains raw JSON files, silver has cleaned parquet, and gold has aggregated business tables. What architecture is this?",options:["A) Lambda Architecture","B) Kappa Architecture","C) Medallion Architecture (multi-hop)","D) Hub-and-spoke Architecture"],answer:"C",d:"E"},
{q:"During a pipeline run, the transform step must handle records where the email field is NULL. What should it do?",options:["A) Stop the entire pipeline immediately","B) Apply a business rule such as filtering NULLs or filling defaults","C) Load NULLs as-is since transform should not modify data","D) Delete the source records"],answer:"B",d:"E"},
{q:"A pipeline must process 500GB of log files daily. The current sequential ETL takes 18 hours. Which optimization would most reduce runtime?",options:["A) Switch from batch to stream processing","B) Parallelize the extract and transform across partitions","C) Increase the scheduling frequency to hourly","D) Add more monitoring dashboards"],answer:"B",d:"M"},
{q:"Your CDC pipeline detects that a source record was updated but the target warehouse already has the latest value. What should happen?",options:["A) Insert a duplicate row","B) Skip the record since no change is needed","C) Delete the target record and re-insert","D) Mark the pipeline as failed"],answer:"B",d:"M"},
{q:"An Airflow DAG has tasks: extract_a, extract_b, transform, load. Extracts are independent but transform needs both. How should dependencies be set?",options:["A) extract_a >> extract_b >> transform >> load","B) [extract_a, extract_b] >> transform >> load","C) transform >> [extract_a, extract_b] >> load","D) All tasks run in parallel with no dependencies"],answer:"B",d:"M"},
{q:"A pipeline's transform step occasionally produces corrupt records that crash the load step. Which pattern best handles this?",options:["A) Dead letter queue for corrupt records, continue loading valid ones","B) Retry the entire pipeline from extract","C) Remove all validation from the transform step","D) Load corrupt records and fix them later manually"],answer:"A",d:"M"},
{q:"Your incremental extract uses updated_at as a watermark. After a source schema migration, historical records got new timestamps. What problem occurs?",options:["A) Records will be skipped permanently","B) Records will be re-extracted causing duplicates in the target","C) The pipeline will fail with a schema error","D) No impact since watermarks are independent of timestamps"],answer:"B",d:"M"},
{q:"A team wants to track data lineage across 50 pipelines. Which component of the pipeline architecture supports this?",options:["A) The extract layer","B) The metadata and lineage tracking layer","C) The transform layer","D) The load layer"],answer:"B",d:"M"},
{q:"Your pipeline needs exactly-once delivery semantics. Source is a Kafka topic, target is PostgreSQL. Which approach achieves this?",options:["A) At-least-once delivery with no deduplication","B) Transactional writes with consumer offset commits in the same transaction","C) Fire-and-forget publishing to the target","D) Read from Kafka without committing offsets"],answer:"B",d:"M"},
{q:"A pipeline failed midway through processing 1M records. Only 400K were loaded. What pattern allows resuming from the failure point?",options:["A) Full reload from scratch","B) Checkpointing with last processed record tracking","C) Switching to stream processing","D) Increasing memory allocation"],answer:"B",d:"M"},
{q:"A financial institution needs both real-time fraud alerts and accurate end-of-day reports from the same event stream. Which architecture is best?",options:["A) Pure batch processing only","B) Lambda Architecture with batch and speed layers","C) Single OLTP database for everything","D) Manual report generation"],answer:"B",d:"H"},
{q:"Your pipeline framework must support adding new data sources without code changes. Which design pattern achieves this?",options:["A) Hardcoded source-specific functions","B) Metadata-driven pipeline reading config from YAML/JSON","C) Separate codebase per data source","D) Manual pipeline creation for each source"],answer:"B",d:"H"},
{q:"A multi-tenant SaaS platform needs isolated ETL pipelines per customer with shared infrastructure. How would you architect this?",options:["A) One monolithic pipeline processing all tenants sequentially","B) Parameterized pipeline templates with tenant-specific configs and resource isolation","C) Manual pipeline deployment per tenant","D) Shared staging tables with no tenant separation"],answer:"B",d:"H"},
{q:"Your distributed ETL processes 10TB daily across 100 nodes. A single node failure causes full pipeline restart. What fault-tolerance improvement is needed?",options:["A) Add more nodes to reduce per-node load","B) Implement partition-level checkpointing so only failed partitions retry","C) Switch to a single powerful machine","D) Remove the failed node and continue with 99"],answer:"B",d:"H"},
{q:"A data mesh architecture requires each domain team to own their pipelines while maintaining company-wide data quality standards. Which approach balances autonomy and governance?",options:["A) Centralized team owns all pipelines","B) Each domain publishes data products with shared quality contracts and a federated governance layer","C) No standards - each team does whatever they want","D) Only one domain team handles all data"],answer:"B",d:"H"}
]},

{id:2,title:"Data Warehousing",color:"#34d399",chips:["Star Schema","Snowflake","Fact/Dimension","SCD","OLAP/OLTP"],
subtopics:[
{name:"Star Schema",theory:["Star schema has a central fact table surrounded by dimension tables in a star pattern.","Fact tables store measurable events (sales, clicks); dimensions provide context (who, what, where, when).","Optimized for read-heavy analytical queries with denormalized dimensions for faster joins."],code:"-- Star Schema Example\nCREATE TABLE fact_sales (\n    sale_id BIGINT PRIMARY KEY,\n    date_key INT REFERENCES dim_date(date_key),\n    product_key INT REFERENCES dim_product(product_key),\n    customer_key INT REFERENCES dim_customer(customer_key),\n    store_key INT REFERENCES dim_store(store_key),\n    quantity INT,\n    unit_price DECIMAL(10,2),\n    total_amount DECIMAL(10,2),\n    discount_amount DECIMAL(10,2)\n);\n\nCREATE TABLE dim_product (\n    product_key INT PRIMARY KEY,\n    product_id VARCHAR(50),\n    product_name VARCHAR(200),\n    category VARCHAR(100),\n    subcategory VARCHAR(100),\n    brand VARCHAR(100)\n);"},
{name:"Snowflake Schema",theory:["Snowflake schema normalizes dimension tables into sub-dimensions, reducing redundancy.","More storage-efficient but requires more joins for queries compared to star schema.","Used when dimension data is very large or when storage optimization is critical."],code:"-- Snowflake Schema: normalized dimensions\nCREATE TABLE dim_product (\n    product_key INT PRIMARY KEY,\n    product_name VARCHAR(200),\n    brand_key INT REFERENCES dim_brand(brand_key),\n    category_key INT REFERENCES dim_category(category_key)\n);\n\nCREATE TABLE dim_brand (\n    brand_key INT PRIMARY KEY,\n    brand_name VARCHAR(100),\n    manufacturer VARCHAR(200)\n);\n\nCREATE TABLE dim_category (\n    category_key INT PRIMARY KEY,\n    category_name VARCHAR(100),\n    department VARCHAR(100)\n);\n\n-- Query requires more joins\nSELECT p.product_name, b.brand_name, c.category_name\nFROM dim_product p\nJOIN dim_brand b ON p.brand_key = b.brand_key\nJOIN dim_category c ON p.category_key = c.category_key;"},
{name:"Slowly Changing Dimensions (SCD)",theory:["SCD Type 1: Overwrite old value - no history preserved (used for corrections).","SCD Type 2: Add new row with version tracking (start_date, end_date, is_current) - full history.","SCD Type 3: Add column for previous value - limited history (only last change tracked)."],code:"-- SCD Type 2 Example\nCREATE TABLE dim_customer_scd2 (\n    customer_key SERIAL PRIMARY KEY,\n    customer_id VARCHAR(50),  -- Natural/business key\n    customer_name VARCHAR(200),\n    email VARCHAR(200),\n    city VARCHAR(100),\n    effective_date DATE,\n    expiry_date DATE DEFAULT '9999-12-31',\n    is_current BOOLEAN DEFAULT TRUE\n);\n\n-- When customer moves cities:\n-- 1. Expire current record\nUPDATE dim_customer_scd2\nSET expiry_date = CURRENT_DATE - 1, is_current = FALSE\nWHERE customer_id = 'C001' AND is_current = TRUE;\n\n-- 2. Insert new current record\nINSERT INTO dim_customer_scd2 (customer_id, customer_name, email, city, effective_date)\nVALUES ('C001', 'Alice Smith', 'alice@mail.com', 'New York', CURRENT_DATE);"},
{name:"OLAP vs OLTP",theory:["OLTP (Online Transaction Processing): handles real-time transactions, row-oriented, normalized (3NF).","OLAP (Online Analytical Processing): handles complex queries over large datasets, column-oriented, denormalized.","Data flows from OLTP systems into OLAP warehouses via ETL for reporting and analytics."],code:"-- OLTP: Optimized for transactions (row-based)\n-- Fast inserts, updates for single records\nINSERT INTO orders (customer_id, product_id, quantity, order_date)\nVALUES (1001, 'SKU-123', 2, NOW());\n\n-- OLAP: Optimized for analytics (columnar)\n-- Fast aggregations across millions of rows\nSELECT\n    d.year,\n    d.quarter,\n    p.category,\n    SUM(f.total_amount) as revenue,\n    COUNT(DISTINCT f.customer_key) as unique_customers\nFROM fact_sales f\nJOIN dim_date d ON f.date_key = d.date_key\nJOIN dim_product p ON f.product_key = p.product_key\nGROUP BY d.year, d.quarter, p.category\nORDER BY revenue DESC;"},
{name:"Fact Table Types",theory:["Transaction facts: one row per event (each sale, each click) - most common type.","Periodic snapshot facts: one row per time period per entity (daily balance, monthly inventory).","Accumulating snapshot facts: one row per process instance tracking milestones (order lifecycle)."],code:"-- Transaction Fact\nCREATE TABLE fact_order_line (\n    order_line_id BIGINT,\n    order_date_key INT,\n    product_key INT,\n    quantity INT,\n    amount DECIMAL(10,2)\n);\n\n-- Periodic Snapshot Fact\nCREATE TABLE fact_daily_inventory (\n    date_key INT,\n    product_key INT,\n    warehouse_key INT,\n    quantity_on_hand INT,\n    quantity_reserved INT\n);\n\n-- Accumulating Snapshot Fact\nCREATE TABLE fact_order_fulfillment (\n    order_key INT,\n    order_date_key INT,\n    ship_date_key INT,\n    delivery_date_key INT,\n    return_date_key INT,\n    days_to_ship INT,\n    days_to_deliver INT\n);"}
],
examples:[
{title:"Building a Date Dimension",desc:"Create a comprehensive date dimension table for a data warehouse.",code:"import pandas as pd\nfrom datetime import date, timedelta\n\ndef generate_date_dimension(start_date, end_date):\n    dates = pd.date_range(start=start_date, end=end_date)\n    dim_date = pd.DataFrame({\n        'date_key': dates.strftime('%Y%m%d').astype(int),\n        'full_date': dates,\n        'year': dates.year,\n        'quarter': dates.quarter,\n        'month': dates.month,\n        'month_name': dates.strftime('%B'),\n        'week': dates.isocalendar().week,\n        'day_of_week': dates.dayofweek,\n        'day_name': dates.strftime('%A'),\n        'is_weekend': dates.dayofweek >= 5,\n        'fiscal_year': dates.year + (dates.month >= 7).astype(int)\n    })\n    return dim_date\n\ndim = generate_date_dimension('2020-01-01', '2030-12-31')\nprint(dim.head())"},
{title:"SCD Type 2 Implementation",desc:"Python implementation of Slowly Changing Dimension Type 2 logic.",code:"import pandas as pd\nfrom datetime import date\n\ndef apply_scd2(existing_df, incoming_df, key_col, tracked_cols):\n    \"\"\"Apply SCD Type 2 changes\"\"\"\n    today = date.today()\n    changes = []\n    new_records = []\n    \n    for _, inc_row in incoming_df.iterrows():\n        current = existing_df[\n            (existing_df[key_col] == inc_row[key_col]) &\n            (existing_df['is_current'] == True)\n        ]\n        if current.empty:\n            # New record\n            new_rec = inc_row.to_dict()\n            new_rec['effective_date'] = today\n            new_rec['is_current'] = True\n            new_records.append(new_rec)\n        else:\n            # Check for changes\n            curr_row = current.iloc[0]\n            if any(curr_row[c] != inc_row[c] for c in tracked_cols):\n                changes.append(curr_row.name)  # Mark for expiry\n                new_rec = inc_row.to_dict()\n                new_rec['effective_date'] = today\n                new_rec['is_current'] = True\n                new_records.append(new_rec)\n    return changes, new_records"},
{title:"Star Schema Query Patterns",desc:"Common analytical queries on a star schema data warehouse.",code:"-- Revenue by category and quarter\nSELECT\n    d.year, d.quarter,\n    p.category,\n    SUM(f.total_amount) as revenue,\n    COUNT(*) as num_transactions,\n    AVG(f.total_amount) as avg_order_value\nFROM fact_sales f\nJOIN dim_date d ON f.date_key = d.date_key\nJOIN dim_product p ON f.product_key = p.product_key\nWHERE d.year = 2024\nGROUP BY d.year, d.quarter, p.category\nORDER BY d.quarter, revenue DESC;\n\n-- Customer segmentation with RFM\nSELECT\n    c.customer_name,\n    MAX(d.full_date) as last_purchase,\n    COUNT(*) as frequency,\n    SUM(f.total_amount) as monetary\nFROM fact_sales f\nJOIN dim_customer c ON f.customer_key = c.customer_key\nJOIN dim_date d ON f.date_key = d.date_key\nGROUP BY c.customer_name;"}
],

{id:3,title:"Data Modeling",color:"#a78bfa",chips:["Normalization","1NF/2NF/3NF","ER Diagrams","Kimball/Inmon"],
subtopics:[
{name:"Normalization (1NF, 2NF, 3NF)",theory:["1NF: Each column has atomic values, no repeating groups; every row is unique.","2NF: Meets 1NF + every non-key column depends on the entire primary key (no partial dependencies).","3NF: Meets 2NF + no transitive dependencies (non-key columns don't depend on other non-key columns)."],code:"-- UNNORMALIZED (violates 1NF - repeating groups)\n-- OrderID | Customer | Items\n-- 1       | Alice    | Laptop, Mouse, Keyboard\n\n-- 1NF: Atomic values\nCREATE TABLE order_items_1nf (\n    order_id INT,\n    customer_name VARCHAR(100),\n    customer_city VARCHAR(100),\n    item_name VARCHAR(100),\n    item_price DECIMAL(10,2),\n    PRIMARY KEY (order_id, item_name)\n);\n\n-- 3NF: No transitive dependencies\nCREATE TABLE customers (customer_id INT PRIMARY KEY, name VARCHAR(100), city VARCHAR(100));\nCREATE TABLE orders (order_id INT PRIMARY KEY, customer_id INT REFERENCES customers);\nCREATE TABLE items (item_id INT PRIMARY KEY, name VARCHAR(100), price DECIMAL(10,2));\nCREATE TABLE order_items (order_id INT, item_id INT, quantity INT, PRIMARY KEY(order_id, item_id));"},
{name:"Entity-Relationship (ER) Diagrams",theory:["ER diagrams model entities (tables), attributes (columns), and relationships between entities.","Cardinality defines relationship types: one-to-one (1:1), one-to-many (1:N), many-to-many (M:N).","M:N relationships require a junction/bridge table to implement in a relational database."],code:"-- ER Diagram translated to tables\n-- Entity: Student (1) ---< (M) Enrollment (M) >--- (1) Course\n\nCREATE TABLE students (\n    student_id SERIAL PRIMARY KEY,\n    name VARCHAR(200),\n    email VARCHAR(200) UNIQUE,\n    enrollment_date DATE\n);\n\nCREATE TABLE courses (\n    course_id SERIAL PRIMARY KEY,\n    course_name VARCHAR(200),\n    credits INT,\n    department VARCHAR(100)\n);\n\n-- Junction table for M:N relationship\nCREATE TABLE enrollments (\n    student_id INT REFERENCES students(student_id),\n    course_id INT REFERENCES courses(course_id),\n    grade VARCHAR(2),\n    semester VARCHAR(20),\n    PRIMARY KEY (student_id, course_id, semester)\n);"},
{name:"Kimball Methodology",theory:["Kimball (bottom-up): Build individual data marts first, then integrate into enterprise warehouse.","Focus on dimensional modeling (facts + dimensions) optimized for business user queries.","Bus architecture ensures consistency through conformed dimensions shared across data marts."],code:"-- Kimball approach: Business-process oriented data marts\n-- Sales Data Mart\nCREATE TABLE sales_mart.fact_sales (\n    sale_key BIGSERIAL PRIMARY KEY,\n    date_key INT,      -- Conformed dimension\n    product_key INT,   -- Conformed dimension\n    store_key INT,\n    customer_key INT,  -- Conformed dimension\n    quantity INT,\n    revenue DECIMAL(12,2)\n);\n\n-- Marketing Data Mart (shares conformed dimensions)\nCREATE TABLE marketing_mart.fact_campaigns (\n    campaign_key BIGSERIAL PRIMARY KEY,\n    date_key INT,      -- Same conformed dim_date\n    customer_key INT,  -- Same conformed dim_customer\n    channel VARCHAR(50),\n    impressions INT,\n    clicks INT,\n    conversions INT\n);"},
{name:"Inmon Methodology",theory:["Inmon (top-down): Build enterprise data warehouse first in 3NF, then derive data marts.","Central warehouse is the single source of truth; normalized for data integrity and flexibility.","Data marts are created from the EDW for specific business departments or use cases."],code:"-- Inmon approach: Enterprise 3NF warehouse\nCREATE SCHEMA edw;  -- Enterprise Data Warehouse\n\nCREATE TABLE edw.customers (\n    customer_id INT PRIMARY KEY,\n    first_name VARCHAR(100),\n    last_name VARCHAR(100),\n    email VARCHAR(200)\n);\n\nCREATE TABLE edw.addresses (\n    address_id INT PRIMARY KEY,\n    customer_id INT REFERENCES edw.customers,\n    street VARCHAR(200),\n    city VARCHAR(100),\n    state VARCHAR(50),\n    zip VARCHAR(20),\n    address_type VARCHAR(20)\n);\n\n-- Data mart derived from EDW\nCREATE VIEW sales_mart.dim_customer AS\nSELECT c.customer_id, c.first_name || ' ' || c.last_name as full_name,\n       a.city, a.state\nFROM edw.customers c\nLEFT JOIN edw.addresses a ON c.customer_id = a.customer_id\nWHERE a.address_type = 'PRIMARY';"},
{name:"Denormalization for Performance",theory:["Denormalization intentionally adds redundancy to reduce joins and improve query performance.","Common in OLAP/warehouse environments where read performance matters more than write consistency.","Pre-computing aggregates and materializing views are forms of controlled denormalization."],code:"-- Normalized (many joins needed)\nSELECT o.order_id, c.name, p.product_name, cat.category_name\nFROM orders o\nJOIN customers c ON o.customer_id = c.customer_id\nJOIN order_items oi ON o.order_id = oi.order_id\nJOIN products p ON oi.product_id = p.product_id\nJOIN categories cat ON p.category_id = cat.category_id;\n\n-- Denormalized (single table scan)\nCREATE TABLE fact_orders_wide AS\nSELECT\n    o.order_id,\n    o.order_date,\n    c.name as customer_name,\n    c.city as customer_city,\n    p.product_name,\n    cat.category_name,\n    oi.quantity,\n    oi.amount\nFROM orders o\nJOIN customers c ON o.customer_id = c.customer_id\nJOIN order_items oi ON o.order_id = oi.order_id\nJOIN products p ON oi.product_id = p.product_id\nJOIN categories cat ON p.category_id = cat.category_id;"}
],
examples:[
{title:"Normalize a Flat Table to 3NF",desc:"Step-by-step normalization from unnormalized to third normal form.",code:"-- Original flat table (unnormalized)\n-- StudentName | CourseID | CourseName | Instructor | InstructorDept\n-- Alice       | CS101    | Databases  | Dr. Smith  | Computer Science\n-- Alice       | CS102    | Algorithms | Dr. Jones  | Computer Science\n\n-- Step 1: 1NF (already atomic, add PK)\n-- Step 2: 2NF (remove partial dependencies)\nCREATE TABLE students (student_id SERIAL PRIMARY KEY, name VARCHAR(100));\nCREATE TABLE courses (course_id VARCHAR(10) PRIMARY KEY, course_name VARCHAR(100), instructor_id INT);\n\n-- Step 3: 3NF (remove transitive dependency: instructor -> dept)\nCREATE TABLE instructors (\n    instructor_id SERIAL PRIMARY KEY,\n    name VARCHAR(100),\n    department_id INT REFERENCES departments(dept_id)\n);\nCREATE TABLE departments (dept_id SERIAL PRIMARY KEY, dept_name VARCHAR(100));"},
{title:"Data Vault Modeling",desc:"Hub, Link, and Satellite tables for Data Vault 2.0 pattern.",code:"-- HUB: Business keys\nCREATE TABLE hub_customer (\n    hub_customer_hk CHAR(32) PRIMARY KEY,  -- Hash key\n    customer_bk VARCHAR(50),                -- Business key\n    load_date TIMESTAMP,\n    record_source VARCHAR(100)\n);\n\n-- SATELLITE: Descriptive attributes (history)\nCREATE TABLE sat_customer_details (\n    hub_customer_hk CHAR(32),\n    load_date TIMESTAMP,\n    name VARCHAR(200),\n    email VARCHAR(200),\n    city VARCHAR(100),\n    hash_diff CHAR(32),  -- Detect changes\n    PRIMARY KEY (hub_customer_hk, load_date)\n);\n\n-- LINK: Relationships\nCREATE TABLE link_order (\n    link_order_hk CHAR(32) PRIMARY KEY,\n    hub_customer_hk CHAR(32),\n    hub_product_hk CHAR(32),\n    load_date TIMESTAMP\n);"},
{title:"ER to Physical Model",desc:"Convert an ER diagram concept into physical database tables.",code:"# Python script to generate DDL from ER model definition\ner_model = {\n    'entities': {\n        'author': {'cols': ['name', 'email', 'country'], 'pk': 'author_id'},\n        'book': {'cols': ['title', 'isbn', 'price', 'pub_date'], 'pk': 'book_id'},\n        'publisher': {'cols': ['name', 'city'], 'pk': 'publisher_id'}\n    },\n    'relationships': [\n        {'from': 'book', 'to': 'publisher', 'type': 'M:1', 'fk': 'publisher_id'},\n        {'from': 'author', 'to': 'book', 'type': 'M:N', 'junction': 'book_authors'}\n    ]\n}\n\ndef generate_ddl(model):\n    ddl = []\n    for entity, config in model['entities'].items():\n        cols = [f\"{config['pk']} SERIAL PRIMARY KEY\"]\n        cols += [f\"{c} VARCHAR(200)\" for c in config['cols']]\n        ddl.append(f\"CREATE TABLE {entity} ({', '.join(cols)});\")\n    return '\\n'.join(ddl)\n\nprint(generate_ddl(er_model))"}
],

{q:"A table stores orders with a column 'items' containing comma-separated product names. Which normal form does it violate?",options:["A) 2NF","B) 3NF","C) 1NF - values are not atomic","D) BCNF"],answer:"C",d:"E"},
{q:"In a student-course enrollment system, a student can enroll in many courses and a course has many students. What table resolves this?",options:["A) A foreign key in the student table","B) A junction/bridge table (enrollments) with student_id and course_id","C) Storing course list as JSON in student table","D) Duplicating student records per course"],answer:"B",d:"E"},
{q:"A table has columns: order_id, product_id, product_name, product_category. product_name depends on product_id not the full PK. Which normal form is violated?",options:["A) 1NF","B) 2NF - partial dependency on composite key","C) 3NF","D) No violation"],answer:"B",d:"E"},
{q:"Your team uses Kimball methodology. The first deliverable should be what?",options:["A) Enterprise-wide normalized data warehouse","B) A single business-process focused data mart with star schema","C) A complete data lake","D) All dimension tables across the company"],answer:"B",d:"E"},
{q:"A table has employee_id, department_id, department_name. department_name depends on department_id (a non-key column). Which form is violated?",options:["A) 1NF","B) 2NF","C) 3NF - transitive dependency","D) BCNF"],answer:"C",d:"E"},
{q:"Inmon methodology requires building what first before creating data marts?",options:["A) Individual star schemas","B) An enterprise-wide 3NF normalized data warehouse","C) A data lake","D) OLTP transaction databases"],answer:"B",d:"E"},
{q:"A warehouse denormalizes customer city into the fact table to avoid joining dim_customer for location-based queries. What is the trade-off?",options:["A) No trade-off, this is always beneficial","B) Faster reads but data redundancy and potential inconsistency on updates","C) Slower reads and less storage","D) Impossible to implement"],answer:"B",d:"E"},
{q:"Your ER diagram shows a 1:1 relationship between Employee and ParkingSpot. How is this implemented in SQL?",options:["A) Junction table between them","B) Foreign key with UNIQUE constraint in either table","C) Storing both in a single table always","D) No foreign key needed"],answer:"B",d:"M"},
{q:"A Data Vault hub_customer table stores customer_bk and load_date but NO descriptive attributes. Where are name and email stored?",options:["A) In the hub table","B) In a satellite table (sat_customer_details)","C) In a link table","D) In a separate OLTP system only"],answer:"B",d:"M"},
{q:"Your normalized schema requires 6 JOINs for a common report. Analysts complain about complexity. Which modeling approach addresses this without losing integrity?",options:["A) Remove all normalization","B) Create materialized views or summary tables that pre-join common patterns","C) Let analysts write raw SQL against OLTP","D) Delete dimension tables"],answer:"B",d:"M"},
{q:"A bus matrix shows which dimensions are shared across business processes. This supports which methodology concept?",options:["A) Inmon normalized warehouse","B) Kimball conformed dimensions via bus architecture","C) Data Vault link tables","D) Graph database modeling"],answer:"B",d:"M"},
{q:"Your data model has a 'customer_status' field that changes rarely. Storing full SCD2 history creates massive row growth. What compromise works?",options:["A) Never track history","B) Use SCD Type 3 (previous_status column) for limited history with minimal storage","C) Store status in a separate database","D) Use SCD Type 1 only for all attributes"],answer:"B",d:"M"},
{q:"An inventory system has: product_id, warehouse_id, quantity, last_restock_date. The grain is one row per product per warehouse. What modeling pattern is this?",options:["A) Transaction fact","B) Periodic snapshot at the product-warehouse level","C) Accumulating snapshot","D) Normalized dimension"],answer:"B",d:"M"},
{q:"A medical records system needs to store multiple diagnoses per patient visit. Each diagnosis has a code and description. How do you model this?",options:["A) Comma-separated diagnosis codes in the visit table","B) A separate diagnosis table with visit_id FK allowing multiple rows per visit","C) One column per possible diagnosis","D) Store only the primary diagnosis"],answer:"B",d:"M"},
{q:"Your model needs to support both 'current state' queries and 'as of date X' historical queries on customer attributes. Which approach supports both efficiently?",options:["A) SCD Type 1 only","B) SCD Type 2 with is_current flag for current state and effective_date for point-in-time queries","C) Storing only current state with no history","D) Creating separate tables for each query type"],answer:"B",d:"M"},
{q:"A financial services company must comply with audit requirements showing data provenance. Their model must track which source system provided each attribute and when. Which modeling approach fits best?",options:["A) Simple star schema","B) Data Vault 2.0 with hash keys, load timestamps, and record source tracking in satellites","C) Flat denormalized table","D) Single normalized 3NF schema with no metadata"],answer:"B",d:"H"},
{q:"Your enterprise model has 200+ dimension tables. Business users struggle to find relevant tables. How do you organize this for discoverability?",options:["A) Put all tables in one schema","B) Implement a data catalog with business glossary, grouped by domain, with documented relationships","C) Remove unused dimensions","D) Let users search through SQL metadata only"],answer:"B",d:"H"},
{q:"A real-time analytics system needs sub-second query response on denormalized data, but source updates happen across multiple normalized tables. How do you maintain the denormalized view?",options:["A) Rebuild the entire denormalized table on each update","B) Use CDC-triggered materialized views that incrementally update only affected denormalized rows","C) Accept stale data for all queries","D) Query normalized tables directly in real-time"],answer:"B",d:"H"},
{q:"Your data model must support multi-tenancy where each tenant sees only their data but the physical model is shared. Which modeling strategy handles this securely at scale?",options:["A) Separate databases per tenant","B) Row-level security with tenant_id partitioning and policy-based access control","C) Application-level filtering only with no database enforcement","D) Shared tables with no access control"],answer:"B",d:"H"},
{q:"A graph-like relationship (social network connections) must be queried in a relational warehouse. Users want to find friends-of-friends efficiently. Which modeling approach works?",options:["A) Adjacency list with recursive CTE support and pre-computed path tables for common depths","B) Storing all connections in a single comma-separated column","C) Creating a separate table per user","D) Only supporting direct connections, never transitive queries"],answer:"A",d:"H"}

{id:4,title:"File Formats",color:"#fbbf24",chips:["CSV","JSON","Parquet","Avro","ORC","Delta","Compression"],
subtopics:[
{name:"CSV & JSON",theory:["CSV is a plain-text row-based format; simple but lacks schema, no type info, poor for nested data.","JSON supports nested/hierarchical data structures but is verbose and slow for large-scale analytics.","Both are human-readable but inefficient for big data compared to binary columnar formats."],code:"import pandas as pd\nimport json\n\n# CSV operations\ndf = pd.read_csv('data.csv', dtype={'id': int, 'amount': float})\ndf.to_csv('output.csv', index=False, quoting=1)  # Quote all\n\n# JSON operations\nwith open('data.json', 'r') as f:\n    data = json.load(f)\n\n# Newline-delimited JSON (NDJSON) - better for streaming\nwith open('events.jsonl', 'w') as f:\n    for event in events:\n        f.write(json.dumps(event) + '\\n')\n\n# Read NDJSON with pandas\ndf = pd.read_json('events.jsonl', lines=True)"},
{name:"Parquet",theory:["Parquet is a columnar binary format optimized for analytics with excellent compression.","Supports schema evolution, predicate pushdown, and column pruning for efficient queries.","Standard format for data lakes; works with Spark, Hive, Presto, pandas, and all major tools."],code:"import pandas as pd\nimport pyarrow as pa\nimport pyarrow.parquet as pq\n\n# Write Parquet with compression\ndf = pd.DataFrame({'id': range(1000), 'value': range(1000)})\ndf.to_parquet('data.parquet', compression='snappy', index=False)\n\n# Read specific columns (column pruning)\ndf = pd.read_parquet('data.parquet', columns=['id', 'value'])\n\n# Partitioned Parquet (for data lake patterns)\ndf.to_parquet(\n    'data_lake/events/',\n    partition_cols=['year', 'month'],\n    engine='pyarrow'\n)\n\n# Read with row group filtering\nparquet_file = pq.read_table(\n    'data.parquet',\n    filters=[('year', '=', 2024)]  # Predicate pushdown\n)"},
{name:"Avro & ORC",theory:["Avro is a row-based binary format with built-in schema; ideal for write-heavy and Kafka use cases.","ORC (Optimized Row Columnar) is a Hive-optimized columnar format with built-in indexing and ACID support.","Avro stores schema in the file header; ORC has stripe-level statistics for predicate pushdown."],code:"# Avro - schema definition and writing\nimport fastavro\n\navro_schema = {\n    'type': 'record',\n    'name': 'User',\n    'fields': [\n        {'name': 'id', 'type': 'int'},\n        {'name': 'name', 'type': 'string'},\n        {'name': 'email', 'type': ['null', 'string'], 'default': None}\n    ]\n}\n\nrecords = [\n    {'id': 1, 'name': 'Alice', 'email': 'alice@mail.com'},\n    {'id': 2, 'name': 'Bob', 'email': None}\n]\n\nwith open('users.avro', 'wb') as f:\n    fastavro.writer(f, avro_schema, records)\n\n# Read Avro\nwith open('users.avro', 'rb') as f:\n    reader = fastavro.reader(f)\n    for record in reader:\n        print(record)"},
{name:"Delta Lake & Iceberg",theory:["Delta Lake adds ACID transactions, schema enforcement, and time travel to Parquet-based data lakes.","Apache Iceberg provides table-level abstractions with hidden partitioning and schema evolution.","Both solve the 'small files problem' and enable updates/deletes on data lake storage."],code:"# Delta Lake operations (PySpark)\nfrom delta import DeltaTable\nfrom pyspark.sql import SparkSession\n\nspark = SparkSession.builder.config(\n    'spark.jars.packages', 'io.delta:delta-core_2.12:2.4.0'\n).getOrCreate()\n\n# Write Delta table\ndf.write.format('delta').mode('overwrite').save('/data/delta/users')\n\n# Time travel - read previous version\ndf_v1 = spark.read.format('delta').option('versionAsOf', 1).load('/data/delta/users')\n\n# MERGE (upsert) operation\ndelta_table = DeltaTable.forPath(spark, '/data/delta/users')\ndelta_table.alias('target').merge(\n    new_data.alias('source'),\n    'target.id = source.id'\n).whenMatchedUpdateAll().whenNotMatchedInsertAll().execute()"},
{name:"Compression Algorithms",theory:["Snappy: fast compression/decompression, moderate ratio; default for Parquet in many systems.","Gzip/Zstd: higher compression ratio but slower; good for cold storage and archival.","Choose compression based on trade-off: storage cost vs CPU cost vs query latency."],code:"import pandas as pd\nimport gzip\nimport os\n\n# Compare compression formats\ndf = pd.DataFrame({'data': range(100000)})\n\n# Uncompressed\ndf.to_parquet('data_none.parquet', compression=None)\n\n# Snappy (fast, moderate compression)\ndf.to_parquet('data_snappy.parquet', compression='snappy')\n\n# Gzip (slow, high compression)\ndf.to_parquet('data_gzip.parquet', compression='gzip')\n\n# Zstd (balanced)\ndf.to_parquet('data_zstd.parquet', compression='zstd')\n\n# Compare file sizes\nfor f in ['data_none.parquet', 'data_snappy.parquet', 'data_gzip.parquet', 'data_zstd.parquet']:\n    size = os.path.getsize(f)\n    print(f'{f}: {size/1024:.1f} KB')"}
],
examples:[
{title:"Format Conversion Pipeline",desc:"Convert between different file formats with schema preservation.",code:"import pandas as pd\nimport pyarrow as pa\nimport pyarrow.parquet as pq\n\ndef convert_format(input_path, output_path, input_fmt, output_fmt):\n    # Read\n    if input_fmt == 'csv':\n        df = pd.read_csv(input_path)\n    elif input_fmt == 'json':\n        df = pd.read_json(input_path, lines=True)\n    elif input_fmt == 'parquet':\n        df = pd.read_parquet(input_path)\n    \n    # Write\n    if output_fmt == 'parquet':\n        df.to_parquet(output_path, compression='snappy')\n    elif output_fmt == 'csv':\n        df.to_csv(output_path, index=False)\n    elif output_fmt == 'json':\n        df.to_json(output_path, orient='records', lines=True)\n    \n    print(f'Converted {len(df)} rows: {input_fmt} -> {output_fmt}')\n\nconvert_format('raw_data.csv', 'optimized.parquet', 'csv', 'parquet')"},
{title:"Partitioned Data Lake Writer",desc:"Write data to a partitioned directory structure optimized for queries.",code:"import pandas as pd\nimport os\n\ndef write_partitioned(df, base_path, partition_cols, file_format='parquet'):\n    \"\"\"Write DataFrame as partitioned dataset\"\"\"\n    groups = df.groupby(partition_cols)\n    files_written = 0\n    \n    for keys, group_df in groups:\n        if isinstance(keys, tuple):\n            parts = [f'{col}={val}' for col, val in zip(partition_cols, keys)]\n        else:\n            parts = [f'{partition_cols[0]}={keys}']\n        \n        partition_path = os.path.join(base_path, *parts)\n        os.makedirs(partition_path, exist_ok=True)\n        \n        file_path = os.path.join(partition_path, f'part-0000.{file_format}')\n        group_df.drop(columns=partition_cols).to_parquet(file_path, index=False)\n        files_written += 1\n    \n    print(f'Written {files_written} partition files')\n\n# Usage\ndf = pd.DataFrame({'year': [2023]*5 + [2024]*5, 'month': [1,2,3,4,5]*2, 'value': range(10)})\nwrite_partitioned(df, '/data/lake/events', ['year', 'month'])"},
{title:"Schema Evolution Handler",desc:"Handle schema changes when reading Parquet files with different schemas.",code:"import pyarrow.parquet as pq\nimport pyarrow as pa\nimport pandas as pd\n\ndef read_with_schema_evolution(file_paths, target_schema=None):\n    \"\"\"Read multiple parquet files handling schema differences\"\"\"\n    tables = []\n    for path in file_paths:\n        table = pq.read_table(path)\n        if target_schema:\n            # Add missing columns with nulls\n            for field in target_schema:\n                if field.name not in table.column_names:\n                    null_col = pa.array([None] * len(table), type=field.type)\n                    table = table.append_column(field.name, null_col)\n            # Select only target columns in order\n            table = table.select([f.name for f in target_schema])\n        tables.append(table)\n    \n    return pa.concat_tables(tables).to_pandas()\n\n# Define expected schema\nschema = pa.schema([\n    pa.field('id', pa.int64()),\n    pa.field('name', pa.string()),\n    pa.field('email', pa.string()),  # New column added later\n])"}
],

{id:5,title:"Data Quality",color:"#f472b6",chips:["Profiling","Null checks","Schema validation","Dedup","Drift"],
subtopics:[
{name:"Data Profiling",theory:["Data profiling analyzes datasets to understand structure, content, and quality metrics.","Key metrics: completeness, uniqueness, value distribution, min/max, patterns, and outliers.","Profiling should run on every new data source before building pipelines to uncover issues early."],code:"import pandas as pd\n\ndef profile_dataframe(df):\n    \"\"\"Generate data profile report\"\"\"\n    profile = {}\n    for col in df.columns:\n        stats = {\n            'dtype': str(df[col].dtype),\n            'null_count': int(df[col].isnull().sum()),\n            'null_pct': round(df[col].isnull().mean() * 100, 2),\n            'unique_count': int(df[col].nunique()),\n            'unique_pct': round(df[col].nunique() / len(df) * 100, 2)\n        }\n        if df[col].dtype in ['int64', 'float64']:\n            stats['min'] = df[col].min()\n            stats['max'] = df[col].max()\n            stats['mean'] = round(df[col].mean(), 2)\n        profile[col] = stats\n    return profile\n\ndf = pd.read_csv('users.csv')\nfor col, stats in profile_dataframe(df).items():\n    print(f'{col}: {stats}')"},
{name:"Null Checks & Completeness",theory:["Null checks verify that required fields contain data; critical for downstream joins and aggregations.","Completeness rules define which columns must be non-null and acceptable null thresholds.","Handle nulls with: reject record, fill default, forward-fill, or flag for manual review."],code:"import pandas as pd\n\ndef validate_nulls(df, rules):\n    \"\"\"Validate null constraints\n    rules: dict of {column: {'required': bool, 'max_null_pct': float}}\n    \"\"\"\n    issues = []\n    for col, rule in rules.items():\n        null_pct = df[col].isnull().mean() * 100\n        if rule.get('required') and null_pct > 0:\n            issues.append(f\"FAIL: {col} has {null_pct:.1f}% nulls (required field)\")\n        elif null_pct > rule.get('max_null_pct', 100):\n            issues.append(f\"WARN: {col} has {null_pct:.1f}% nulls (max: {rule['max_null_pct']}%)\")\n    return issues\n\nrules = {\n    'user_id': {'required': True},\n    'email': {'required': True},\n    'phone': {'max_null_pct': 30},\n    'address': {'max_null_pct': 50}\n}\nissues = validate_nulls(df, rules)\nfor issue in issues:\n    print(issue)"},
{name:"Schema Validation",theory:["Schema validation ensures data matches expected types, formats, and constraints before processing.","Catches issues like: wrong data types, unexpected columns, format violations (dates, emails).","Tools like Great Expectations, Pydantic, or Cerberus provide declarative schema validation."],code:"from typing import Dict, List\nimport re\n\ndef validate_schema(record: Dict, schema: Dict) -> List[str]:\n    \"\"\"Validate a record against a schema definition\"\"\"\n    errors = []\n    for field, rules in schema.items():\n        value = record.get(field)\n        # Required check\n        if rules.get('required') and value is None:\n            errors.append(f\"{field}: required field is missing\")\n            continue\n        if value is None:\n            continue\n        # Type check\n        if 'type' in rules and not isinstance(value, rules['type']):\n            errors.append(f\"{field}: expected {rules['type'].__name__}, got {type(value).__name__}\")\n        # Pattern check\n        if 'pattern' in rules and isinstance(value, str):\n            if not re.match(rules['pattern'], value):\n                errors.append(f\"{field}: does not match pattern {rules['pattern']}\")\n        # Range check\n        if 'min' in rules and value < rules['min']:\n            errors.append(f\"{field}: value {value} below minimum {rules['min']}\")\n    return errors\n\nschema = {\n    'email': {'required': True, 'type': str, 'pattern': r'^[\\w.]+@[\\w.]+$'},\n    'age': {'required': True, 'type': int, 'min': 0, 'max': 150}\n}"},
{name:"Deduplication Strategies",theory:["Exact dedup removes rows with identical values across all or specified key columns.","Fuzzy dedup uses similarity measures (Levenshtein, Jaro-Winkler) for near-duplicate detection.","Dedup strategies: keep first, keep last, keep most complete, or merge records."],code:"import pandas as pd\nfrom collections import defaultdict\n\ndef deduplicate(df, key_cols, strategy='keep_last', sort_col=None):\n    \"\"\"Deduplicate DataFrame with different strategies\"\"\"\n    if strategy == 'keep_first':\n        return df.drop_duplicates(subset=key_cols, keep='first')\n    elif strategy == 'keep_last':\n        if sort_col:\n            df = df.sort_values(sort_col)\n        return df.drop_duplicates(subset=key_cols, keep='last')\n    elif strategy == 'keep_most_complete':\n        # Keep record with fewest nulls\n        df['_null_count'] = df.isnull().sum(axis=1)\n        df = df.sort_values('_null_count')\n        result = df.drop_duplicates(subset=key_cols, keep='first')\n        return result.drop(columns=['_null_count'])\n    return df\n\n# Usage\ndf_clean = deduplicate(df, key_cols=['email'], strategy='keep_last', sort_col='updated_at')\nprint(f'Before: {len(df)}, After: {len(df_clean)}, Removed: {len(df)-len(df_clean)}')"},
{name:"Data Drift Detection",theory:["Data drift occurs when data characteristics change over time (distribution shifts, new values).","Monitor: column statistics, value distributions, schema changes, and volume anomalies.","Set up automated alerts when drift exceeds thresholds to catch issues before they propagate."],code:"import pandas as pd\nimport numpy as np\n\ndef detect_drift(baseline_df, current_df, columns, threshold=0.1):\n    \"\"\"Detect statistical drift between baseline and current data\"\"\"\n    drift_report = {}\n    for col in columns:\n        if baseline_df[col].dtype in ['int64', 'float64']:\n            # Numerical: compare mean and std\n            base_mean = baseline_df[col].mean()\n            curr_mean = current_df[col].mean()\n            pct_change = abs(curr_mean - base_mean) / (abs(base_mean) + 1e-10)\n            drift_report[col] = {\n                'type': 'numerical',\n                'baseline_mean': round(base_mean, 2),\n                'current_mean': round(curr_mean, 2),\n                'pct_change': round(pct_change * 100, 2),\n                'drifted': pct_change > threshold\n            }\n        else:\n            # Categorical: compare value distributions\n            base_dist = baseline_df[col].value_counts(normalize=True)\n            curr_dist = current_df[col].value_counts(normalize=True)\n            new_values = set(curr_dist.index) - set(base_dist.index)\n            drift_report[col] = {\n                'type': 'categorical',\n                'new_values': list(new_values),\n                'drifted': len(new_values) > 0\n            }\n    return drift_report"}
],
examples:[
{title:"Great Expectations Style Checks",desc:"Implement expectation-based data quality checks similar to Great Expectations.",code:"class DataQualityChecker:\n    def __init__(self, df):\n        self.df = df\n        self.results = []\n    \n    def expect_column_not_null(self, column, threshold=0.0):\n        null_pct = self.df[column].isnull().mean()\n        passed = null_pct <= threshold\n        self.results.append({'check': f'{column} not null', 'passed': passed, 'value': f'{null_pct:.1%}'})\n        return self\n    \n    def expect_column_unique(self, column):\n        is_unique = self.df[column].nunique() == len(self.df)\n        self.results.append({'check': f'{column} unique', 'passed': is_unique})\n        return self\n    \n    def expect_values_in_set(self, column, valid_set):\n        invalid = set(self.df[column].dropna().unique()) - set(valid_set)\n        self.results.append({'check': f'{column} in set', 'passed': len(invalid)==0, 'invalid': invalid})\n        return self\n    \n    def report(self):\n        for r in self.results:\n            status = 'PASS' if r['passed'] else 'FAIL'\n            print(f\"[{status}] {r['check']}\")\n\n# Usage\nchecker = DataQualityChecker(df)\nchecker.expect_column_not_null('email').expect_column_unique('user_id').expect_values_in_set('status', ['active','inactive']).report()"},
{title:"Automated Data Quality Pipeline",desc:"Run quality checks as part of an ETL pipeline with pass/fail gates.",code:"import pandas as pd\nfrom datetime import datetime\n\ndef run_quality_gate(df, table_name, checks):\n    \"\"\"Run quality checks and decide pass/fail\"\"\"\n    results = {'table': table_name, 'timestamp': datetime.now(), 'checks': []}\n    all_passed = True\n    \n    for check in checks:\n        if check['type'] == 'row_count':\n            passed = len(df) >= check['min']\n            result = {'name': 'row_count', 'passed': passed, 'actual': len(df)}\n        elif check['type'] == 'null_check':\n            null_pct = df[check['column']].isnull().mean()\n            passed = null_pct <= check.get('max_pct', 0)\n            result = {'name': f\"null_{check['column']}\", 'passed': passed, 'actual': f'{null_pct:.1%}'}\n        elif check['type'] == 'freshness':\n            max_date = pd.to_datetime(df[check['column']]).max()\n            hours_old = (datetime.now() - max_date).total_seconds() / 3600\n            passed = hours_old <= check['max_hours']\n            result = {'name': 'freshness', 'passed': passed, 'actual': f'{hours_old:.1f}h'}\n        \n        results['checks'].append(result)\n        if not passed: all_passed = False\n    \n    results['overall'] = 'PASS' if all_passed else 'FAIL'\n    return results\n\nchecks = [\n    {'type': 'row_count', 'min': 100},\n    {'type': 'null_check', 'column': 'email', 'max_pct': 0.01},\n    {'type': 'freshness', 'column': 'created_at', 'max_hours': 24}\n]"},
{title:"Deduplication with Fuzzy Matching",desc:"Find and merge near-duplicate records using string similarity.",code:"from difflib import SequenceMatcher\nimport pandas as pd\n\ndef fuzzy_dedup(df, key_col, threshold=0.85):\n    \"\"\"Find fuzzy duplicates based on string similarity\"\"\"\n    values = df[key_col].tolist()\n    duplicates = []\n    seen = set()\n    \n    for i in range(len(values)):\n        if i in seen:\n            continue\n        group = [i]\n        for j in range(i+1, len(values)):\n            if j in seen:\n                continue\n            similarity = SequenceMatcher(None, str(values[i]).lower(), str(values[j]).lower()).ratio()\n            if similarity >= threshold:\n                group.append(j)\n                seen.add(j)\n        if len(group) > 1:\n            duplicates.append(group)\n    \n    print(f'Found {len(duplicates)} duplicate groups')\n    # Keep first of each group\n    drop_indices = [idx for group in duplicates for idx in group[1:]]\n    return df.drop(index=drop_indices).reset_index(drop=True)\n\ndf_clean = fuzzy_dedup(df, 'company_name', threshold=0.9)"}

{q:"Two systems store the same customer: CRM says 'New York' but warehouse says 'NY'. Which quality dimension is this?",options:["A) Completeness","B) Accuracy","C) Consistency - same entity has conflicting values across systems","D) Uniqueness"],answer:"C",d:"E"},

{q:"Your pipeline loaded yesterday's data but dashboards still show data from 3 days ago. Which quality dimension is affected?",options:["A) Accuracy","B) Completeness","C) Timeliness - data is not current enough","D) Consistency"],answer:"C",d:"E"},
{q:"A customer_id that should be unique appears 47 times in the dimension table. Which quality dimension is violated?",options:["A) Completeness","B) Accuracy","C) Consistency","D) Uniqueness - duplicate records exist"],answer:"D",d:"E"},
{q:"Your data validation finds that order amounts are stored as strings ('$1,234.56') instead of numeric types. Which approach fixes this at the source?",options:["A) Ignore it and let analysts handle conversion","B) Add a schema validation contract requiring numeric type at ingestion","C) Delete all non-numeric records","D) Store everything as strings intentionally"],answer:"B",d:"E"},
{q:"A Great Expectations suite runs after each pipeline load. A test checks that row count is within 20% of yesterday's count. What type of test is this?",options:["A) Schema validation","B) Anomaly detection / volume check","C) Referential integrity check","D) Format validation"],answer:"B",d:"E"},
{q:"Your pipeline detects 500 records with invalid phone numbers out of 1M total. Should the pipeline fail or continue?",options:["A) Always fail the entire pipeline","B) Route invalid records to a quarantine table, continue loading valid records, and alert the team","C) Silently drop the invalid records with no logging","D) Load invalid records as-is with no flagging"],answer:"B",d:"M"},
{q:"A dbt test checks that all product_ids in fact_sales exist in dim_product. This is testing what?",options:["A) Completeness","B) Referential integrity - foreign key relationships are valid","C) Timeliness","D) Uniqueness"],answer:"B",d:"M"},
{q:"Your data quality score dropped from 98% to 72% after a source system upgrade. What is the best immediate action?",options:["A) Wait and hope it fixes itself","B) Halt downstream loading, investigate root cause in source, and implement data quality gates","C) Lower the quality threshold to 70%","D) Delete all data loaded after the upgrade"],answer:"B",d:"M"},
{q:"Two tables join on customer_id but one uses integer IDs and another uses UUIDs. Joins return zero matches. What quality dimension?",options:["A) Accuracy","B) Consistency - identifier formats dont match across systems","C) Completeness","D) Timeliness"],answer:"B",d:"M"},
{q:"Your validation checks that dates are within the last 2 years, amounts are positive, and emails contain '@'. These are examples of what?",options:["A) Schema evolution checks","B) Business rule validations / constraint checks","C) Performance benchmarks","D) Security audits"],answer:"B",d:"M"},
{q:"A fuzzy matching algorithm finds 'John Smith' and 'Jon Smith' at the same address. What quality process should be applied?",options:["A) Delete both records","B) Deduplication with merge rules (keep most recent, combine attributes)","C) Ignore since names are different","D) Add both as separate customers"],answer:"B",d:"M"},
{q:"After implementing data quality monitoring, you notice data freshness SLA violations occur every Monday morning. What is the likely cause?",options:["A) Random failures","B) Weekend batch jobs running longer or failing due to accumulated data volume","C) Dashboard caching issues only","D) Users querying at wrong times"],answer:"B",d:"M"},
{q:"Your data contract specifies: not_null(email), unique(customer_id), and range(age, 0, 150). A source system change adds NULL emails. What happens?",options:["A) Data loads normally with no issues","B) The contract violation triggers an alert/failure at the ingestion boundary","C) The contract auto-fixes the NULLs","D) Contracts only apply to output data"],answer:"B",d:"M"},
{q:"An organization with 200 data pipelines needs to implement data quality at scale without blocking every pipeline on failures. Which architecture balances quality and velocity?",options:["A) No quality checks at all","B) Tiered quality gates: critical checks block loading, warnings are logged and monitored, with automated quarantine for failures","C) All checks are blocking regardless of severity","D) Manual review of every record"],answer:"B",d:"H"},
{q:"Your ML model's accuracy dropped because training data had subtle drift in feature distributions over 6 months. Standard null/range checks passed. What quality monitoring was missing?",options:["A) Schema validation","B) Statistical distribution monitoring detecting drift (mean, variance, percentile shifts over time)","C) Row count checks","D) Format validation"],answer:"B",d:"H"},
{q:"A data mesh has 15 domain teams each producing data products. How do you ensure consistent quality standards without a central bottleneck?",options:["A) Central team reviews all data manually","B) Federated quality framework with shared contract templates, automated validation libraries, and self-serve quality dashboards per domain","C) No quality standards - each team decides","D) Only one team produces data"],answer:"B",d:"H"},
{q:"Your pipeline processes PII data. A quality check accidentally logs full SSNs to monitoring dashboard. How should the quality framework handle sensitive fields?",options:["A) Stop all quality checks on PII fields","B) Implement masked/hashed quality checks that validate format and completeness without exposing raw PII values","C) Log PII openly for debugging purposes","D) Remove PII fields before any processing"],answer:"B",d:"H"},
{q:"A financial reconciliation process finds a 0.01% discrepancy between source and warehouse totals across 10M transactions. The absolute difference is $50K. How should this be handled?",options:["A) Ignore since percentage is small","B) Investigate root cause (rounding, timezone issues, missing records), document acceptable tolerance, and implement automated reconciliation alerts","C) Accept any discrepancy under 1%","D) Reprocess all 10M transactions"],answer:"B",d:"H"}
]},

{id:6,title:"Batch Processing",color:"#22d3ee",chips:["Scheduling","Idempotency","Full/Incremental","Checkpointing"],
subtopics:[
{name:"Scheduling & Cron",theory:["Batch jobs run on schedules: cron expressions define minute, hour, day, month, weekday patterns.","Schedule design considers: data availability, dependency chains, and SLA requirements.","Common patterns: daily at 2 AM (after source systems close), hourly for near-real-time."],code:"# Cron expression format: minute hour day month weekday\n# Examples:\n# '0 2 * * *'   = Daily at 2:00 AM\n# '0 */6 * * *' = Every 6 hours\n# '0 0 * * 0'   = Weekly on Sunday midnight\n# '0 0 1 * *'   = Monthly on 1st at midnight\n\n# Python scheduling with schedule library\nimport schedule\nimport time\n\ndef daily_etl_job():\n    print('Running daily ETL...')\n    extract_data()\n    transform_data()\n    load_data()\n\nschedule.every().day.at('02:00').do(daily_etl_job)\nschedule.every(6).hours.do(hourly_check)\n\nwhile True:\n    schedule.run_pending()\n    time.sleep(60)"},
{name:"Idempotency",theory:["Idempotent operations produce the same result regardless of how many times they run.","Critical for retries: if a job fails halfway and reruns, it should not create duplicates.","Implement with: DELETE-INSERT pattern, MERGE/UPSERT, or partition overwrite strategies."],code:"import pandas as pd\nimport sqlite3\n\ndef idempotent_load(df, table, conn, partition_col, partition_value):\n    \"\"\"Idempotent load: delete existing partition, then insert\"\"\"\n    # Delete existing data for this partition\n    conn.execute(f\"\"\"\n        DELETE FROM {table}\n        WHERE {partition_col} = '{partition_value}'\n    \"\"\")\n    # Insert fresh data\n    df.to_sql(table, conn, if_exists='append', index=False)\n    conn.commit()\n    print(f'Loaded {len(df)} rows for {partition_col}={partition_value}')\n\n# MERGE/UPSERT pattern (SQL)\nupsert_sql = \"\"\"\n    INSERT INTO target_table (id, name, value, updated_at)\n    VALUES (%(id)s, %(name)s, %(value)s, NOW())\n    ON CONFLICT (id) DO UPDATE SET\n        name = EXCLUDED.name,\n        value = EXCLUDED.value,\n        updated_at = NOW();\n\"\"\""},
{name:"Full vs Incremental Loads",theory:["Full load replaces all data each run - simple but expensive for large tables.","Incremental load only processes new/changed records since last run using a watermark (timestamp/ID).","Choose based on: source table size, change volume, and availability of change tracking."],code:"from datetime import datetime, timedelta\nimport pandas as pd\n\nclass IncrementalLoader:\n    def __init__(self, source_conn, target_conn, watermark_table):\n        self.source = source_conn\n        self.target = target_conn\n        self.wm_table = watermark_table\n    \n    def get_watermark(self, table_name):\n        result = pd.read_sql(\n            f\"SELECT last_value FROM {self.wm_table} WHERE table_name='{table_name}'\",\n            self.target\n        )\n        return result.iloc[0]['last_value'] if len(result) > 0 else '1900-01-01'\n    \n    def extract_incremental(self, table, watermark_col):\n        wm = self.get_watermark(table)\n        query = f\"SELECT * FROM {table} WHERE {watermark_col} > '{wm}' ORDER BY {watermark_col}\"\n        df = pd.read_sql(query, self.source)\n        return df\n    \n    def update_watermark(self, table, new_value):\n        self.target.execute(\n            f\"INSERT INTO {self.wm_table} VALUES ('{table}', '{new_value}') \"\n            f\"ON CONFLICT (table_name) DO UPDATE SET last_value = '{new_value}'\"\n        )"},
{name:"Checkpointing & Recovery",theory:["Checkpoints save pipeline state so processing can resume from the last successful point after failure.","Store checkpoint metadata: last processed record ID, file offset, or partition processed.","Design for at-least-once processing, then use idempotency to achieve exactly-once semantics."],code:"import json\nimport os\n\nclass CheckpointManager:\n    def __init__(self, checkpoint_path):\n        self.path = checkpoint_path\n        self.state = self._load()\n    \n    def _load(self):\n        if os.path.exists(self.path):\n            with open(self.path, 'r') as f:\n                return json.load(f)\n        return {}\n    \n    def save(self, key, value):\n        self.state[key] = value\n        with open(self.path, 'w') as f:\n            json.dump(self.state, f)\n    \n    def get(self, key, default=None):\n        return self.state.get(key, default)\n\n# Usage in batch processing\ncheckpoint = CheckpointManager('/tmp/pipeline_checkpoint.json')\n\nfiles = get_files_to_process()\nlast_processed = checkpoint.get('last_file', '')\n\nfor file in files:\n    if file <= last_processed:\n        continue  # Skip already processed\n    process_file(file)\n    checkpoint.save('last_file', file)  # Save progress"},
{name:"Backfill Strategies",theory:["Backfill reprocesses historical data when logic changes or new data sources are added.","Design pipelines with date parameters so any historical period can be reprocessed on demand.","Backfills should be idempotent and respect rate limits to avoid overwhelming source systems."],code:"from datetime import date, timedelta\nfrom concurrent.futures import ThreadPoolExecutor\n\ndef backfill_pipeline(start_date, end_date, pipeline_fn, max_workers=4):\n    \"\"\"Backfill a date-partitioned pipeline\"\"\"\n    dates = []\n    current = start_date\n    while current <= end_date:\n        dates.append(current)\n        current += timedelta(days=1)\n    \n    print(f'Backfilling {len(dates)} days: {start_date} to {end_date}')\n    \n    results = {'success': 0, 'failed': 0, 'errors': []}\n    \n    for d in dates:\n        try:\n            pipeline_fn(execution_date=d)\n            results['success'] += 1\n            print(f'  OK: {d}')\n        except Exception as e:\n            results['failed'] += 1\n            results['errors'].append({'date': str(d), 'error': str(e)})\n            print(f'  FAIL: {d} - {e}')\n    \n    print(f\"Backfill complete: {results['success']} success, {results['failed']} failed\")\n    return results\n\n# Usage\nbackfill_pipeline(date(2024, 1, 1), date(2024, 3, 31), daily_etl_job)"}
],
