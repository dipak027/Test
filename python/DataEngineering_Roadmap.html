er_id\n# When match found within window, emit joined record\n# Expire unmatched events after window passes`,`Design: Lambda Architecture for recommendations\n- Batch path: nightly Spark job computes collaborative filtering model from all history\n- Speed path: Kafka Streams tracks real-time user behavior, computes session-based features\n- Serving: merge batch model scores + real-time features at query time\n- Recomputation: weekly full model retrain, daily incremental update`,`# Complete stream processing framework (conceptual)\n# Components: EventSource, Window, StateStore, Watermark, Checkpoint\n# See examples in Theory section for individual implementations\n# Key: combine TumblingWindow + SessionWindow + IdempotentConsumer + Checkpoint`],
9:[`Data Lake: stores raw data in any format on cheap storage (S3). Schema-on-read. Flexible.\nData Warehouse: stores processed, structured data optimized for queries. Schema-on-write. Fast analytics.\nLake = raw storage flexibility. Warehouse = query performance. Lakehouse = both.`,`Medallion Architecture:\n- Bronze: Raw data exactly as received from source. No transformations. Append-only.\n- Silver: Cleaned, validated, deduplicated. Schema enforced. Business entities formed.\n- Gold: Aggregated, business-ready. KPIs, dashboards. Optimized for consumption.`,`import os\nfrom datetime import date\ndef organize_bronze(data, source, table):\n    today = date.today()\n    path = f"/lake/bronze/{source}/{table}/year={today.year}/month={today.month:02d}/day={today.day:02d}"\n    os.makedirs(path, exist_ok=True)\n    output = f"{path}/data.parquet"\n    data.to_parquet(output, index=False)\n    return output`,`Problems solved by Delta/Iceberg over plain Parquet:\n1. ACID transactions (no partial/corrupt writes)\n2. Schema enforcement and evolution\n3. Time travel (query previous versions)\n4. MERGE/UPDATE/DELETE operations\n5. Small file compaction (OPTIMIZE)\n6. Concurrent read/write safety`,`Small files problem: thousands of tiny files in a partition.\nHurts performance because:\n- Each file requires separate I/O operation (overhead per file)\n- Metadata overhead (listing files, opening connections)\n- Underutilizes columnar compression\n- Query planning time increases with file count`,`import os\ndef list_partitions(base_path):\n    report = []\n    for root, dirs, files in os.walk(base_path):\n        parquet_files = [f for f in files if f.endswith('.parquet')]\n        if parquet_files:\n            total_size = sum(os.path.getsize(os.path.join(root, f)) for f in parquet_files)\n            report.append({'path': root, 'files': len(parquet_files), 'size_mb': total_size/1024/1024})\n    return report`,`Delta Lake: Best for existing Spark/Databricks users. MERGE, time travel, OPTIMIZE. Most mature.\nIceberg: Best for multi-engine (Spark+Trino+Flink). Hidden partitioning, schema evolution.\nHudi: Best for CDC/upsert workloads. Copy-on-Write vs Merge-on-Read options. Incremental queries.`,`def bronze_ingest(df, source):\n    from datetime import datetime\n    df = df.copy()\n    df['_ingested_at'] = datetime.now().isoformat()\n    df['_source'] = source\n    df['_batch_id'] = f"{source}_{datetime.now().strftime('%Y%m%d%H%M%S')}"\n    return df`,`import pandas as pd\ndef silver_transform(df, key_cols, required_cols):\n    # Deduplicate\n    df = df.drop_duplicates(subset=key_cols, keep='last')\n    # Validate required fields\n    df = df.dropna(subset=required_cols)\n    # Conform types\n    if 'email' in df.columns:\n        df['email'] = df['email'].str.lower().str.strip()\n    if 'created_at' in df.columns:\n        df['created_at'] = pd.to_datetime(df['created_at'], errors='coerce')\n    return df`,`Design: Data lakehouse for 10 sources, 50 consumers\n- Storage: S3/ADLS with Delta Lake format\n- Zones: Bronze (raw per source), Silver (cleaned/conformed), Gold (domain aggregates)\n- Catalog: Unity Catalog / Glue Catalog for discovery\n- Access: role-based per zone (engineers: all, analysts: silver+gold, dashboards: gold)\n- Processing: Spark for heavy transforms, dbt for SQL transforms\n- Governance: data lineage, quality scores, PII tagging`,`import os, pandas as pd\ndef compact_partition(path, target_mb=256):\n    files = [f for f in os.listdir(path) if f.endswith('.parquet')]\n    small = [f for f in files if os.path.getsize(os.path.join(path,f)) < target_mb*512*1024]\n    if len(small) < 2: return\n    dfs = [pd.read_parquet(os.path.join(path,f)) for f in small]\n    pd.concat(dfs).to_parquet(os.path.join(path,'compacted.parquet'), index=False)\n    for f in small: os.remove(os.path.join(path,f))`,`def partition_prune(base_path, filters):\n    import os\n    matching_paths = []\n    for root, dirs, files in os.walk(base_path):\n        match = True\n        for key, value in filters.items():\n            if f"{key}={value}" not in root:\n                match = False\n                break\n        if match and any(f.endswith('.parquet') for f in files):\n            matching_paths.append(root)\n    return matching_paths`,`Design: Data Lake Governance\n- Data Catalog: register all tables with metadata, owner, description\n- Access Control: row/column level security, PII masking\n- Lineage: track data flow from source to consumption\n- Quality: automated DQ checks at zone boundaries\n- Discovery: searchable catalog with business glossary\n- Lifecycle: retention policies, archival rules per dataset`,`-- Delta Lake SCD Type 2 MERGE\nMERGE INTO silver.customers AS target\nUSING staged_updates AS source\nON target.customer_id = source.customer_id AND target.is_current = true\nWHEN MATCHED AND target.hash != source.hash THEN\n  UPDATE SET is_current = false, end_date = current_date()\nWHEN NOT MATCHED THEN\n  INSERT (customer_id, name, email, start_date, is_current)\n  VALUES (source.customer_id, source.name, source.email, current_date(), true);`,`class LakeCatalog:\n    def __init__(self):\n        self.tables = {}\n    def register(self, name, path, schema, partition_cols=None, owner=None):\n        self.tables[name] = {'path': path, 'schema': schema, 'partitions': partition_cols, 'owner': owner, 'stats': {}}\n    def update_stats(self, name, row_count, size_bytes, last_updated):\n        self.tables[name]['stats'] = {'rows': row_count, 'size': size_bytes, 'updated': last_updated}\n    def search(self, keyword):\n        return [n for n in self.tables if keyword.lower() in n.lower()]`,`Design: Multi-tenant data lake\n- Separate S3 prefixes per tenant: s3://lake/{tenant_id}/\n- Shared compute (Spark) with resource quotas per tenant\n- Tenant-specific IAM roles limiting access to their prefix\n- Shared dimensions (dim_date, dim_geography) in common prefix\n- Cross-tenant analytics only via anonymized/aggregated gold tables`,`# Lakehouse query optimizer (simplified)\ndef choose_scan_strategy(table_stats, filter_columns, partition_columns):\n    if set(filter_columns).issubset(set(partition_columns)):\n        selectivity = estimate_partition_selectivity(table_stats, filter_columns)\n        if selectivity < 0.1:  # Less than 10% of partitions\n            return 'partition_scan'\n    return 'full_scan'`,`def handle_schema_evolution(bronze_path, silver_schema, new_bronze_schema):\n    # Detect changes\n    new_cols = set(new_bronze_schema) - set(silver_schema)\n    removed_cols = set(silver_schema) - set(new_bronze_schema)\n    # For new columns: add to silver with NULL default\n    # For removed columns: keep in silver, fill with NULL going forward\n    # Log schema change event for audit\n    return {'added': list(new_cols), 'removed': list(removed_cols)}`,`Design: DR for petabyte-scale lake (RPO < 1hr)\n- Cross-region replication: S3 CRR or ADLS geo-redundant\n- Delta log replication: sync transaction logs every 15 min\n- Metadata backup: catalog snapshots every hour\n- Failover: DNS-based routing to secondary region\n- Testing: monthly DR drills with measured RTO/RPO`,`# Data lake quality monitor\ndef monitor_lake_health(catalog):\n    alerts = []\n    for table_name, meta in catalog.tables.items():\n        # Check freshness\n        hours_old = (now() - meta['stats']['updated']).hours\n        if hours_old > meta.get('sla_hours', 24):\n            alerts.append(f"STALE: {table_name} ({hours_old}h old)")\n        # Check completeness (row count vs expected)\n        # Check drift (schema changes)\n    return alerts`],

10:[`AWS S3: Object storage, virtually unlimited, 11 nines durability. Best for: data lakes, backups.\nAzure ADLS Gen2: Hierarchical namespace (directory ops), integrated with Azure ecosystem.\nGCP GCS: Similar to S3, strong BigQuery integration, simpler pricing.`,`import boto3\nfrom io import BytesIO\nimport pandas as pd\n\ns3 = boto3.client('s3')\n# Upload\nbuf = BytesIO()\ndf.to_parquet(buf, index=False)\ns3.put_object(Bucket='my-bucket', Key='data/file.parquet', Body=buf.getvalue())\n# Download\nobj = s3.get_object(Bucket='my-bucket', Key='data/file.parquet')\ndf = pd.read_parquet(BytesIO(obj['Body'].read()))`,`AWS Glue components:\n- Crawlers: auto-discover data schemas and register in catalog\n- Data Catalog: centralized metadata store (tables, schemas, partitions)\n- ETL Jobs: serverless Spark jobs for data transformation\n- Job Bookmarks: track incremental processing state`,`-- BigQuery partitioned + clustered table\nCREATE TABLE dataset.events\nPARTITION BY DATE(event_time)\nCLUSTER BY user_id, event_type\nAS SELECT * FROM raw_dataset.events;`,`Redshift distribution styles:\n- KEY: rows with same key value on same node. Best for: join columns (customer_id).\n- EVEN: round-robin across nodes. Best for: no clear join key, balanced load.\n- ALL: full copy on every node. Best for: small dimension tables joined frequently.`,`from google.cloud import bigquery\nclient = bigquery.Client()\njob_config = bigquery.LoadJobConfig(write_disposition='WRITE_TRUNCATE')\njob = client.load_table_from_dataframe(df, 'project.dataset.table', job_config=job_config)\njob.result()\nprint(f"Loaded {job.output_rows} rows")`,`Serverless: no servers to manage, auto-scales, pay-per-use.\nIn data engineering:\n- AWS Lambda: trigger ETL on S3 events, small transformations\n- Cloud Functions: same for GCP\n- AWS Glue: serverless Spark ETL jobs\n- BigQuery: serverless warehouse (no cluster management)\n- Athena: serverless SQL on S3 data`,`# AWS Glue ETL script\nimport sys\nfrom awsglue.context import GlueContext\nfrom pyspark.context import SparkContext\nfrom awsglue.transforms import ApplyMapping\n\nsc = SparkContext()\nglue = GlueContext(sc)\nsource = glue.create_dynamic_frame.from_catalog(database='raw', table_name='events')\nmapped = ApplyMapping.apply(frame=source, mappings=[('user_id','long','user_id','long'),('event','string','event_type','string')])\nglue.write_dynamic_frame.from_options(frame=mapped, connection_type='s3', connection_options={'path':'s3://lake/silver/'}, format='parquet')`,`# Lambda triggered by S3 upload\nimport json, boto3\ndef lambda_handler(event, context):\n    s3_event = event['Records'][0]['s3']\n    bucket = s3_event['bucket']['name']\n    key = s3_event['object']['key']\n    # Start Glue job for this file\n    glue = boto3.client('glue')\n    glue.start_job_run(JobName='transform_job', Arguments={'--input': f's3://{bucket}/{key}'})\n    return {'statusCode': 200}`,`Design: AWS Cloud Data Platform\n- Ingestion: Glue Crawlers + Lambda + Kinesis\n- Storage: S3 (data lake) + Redshift (warehouse)\n- Transform: Glue ETL + dbt on Redshift\n- Query: Athena (ad-hoc), Redshift (BI), Redshift Spectrum (lake queries)\n- Orchestration: Step Functions or Airflow on MWAA\n- Catalog: Glue Data Catalog\n- Security: IAM, Lake Formation, encryption`,`from google.cloud import bigquery\ndef estimate_bq_cost(query, cost_per_tb=5.0):\n    client = bigquery.Client()\n    job_config = bigquery.QueryJobConfig(dry_run=True)\n    job = client.query(query, job_config=job_config)\n    gb = job.total_bytes_processed / 1e9\n    cost = (gb / 1000) * cost_per_tb\n    print(f"Query will scan {gb:.2f} GB, estimated cost: ${cost:.4f}")\n    return cost`,`from abc import ABC, abstractmethod\nclass CloudStorage(ABC):\n    @abstractmethod\n    def upload(self, data, path): pass\n    @abstractmethod\n    def download(self, path): pass\n\nclass S3Storage(CloudStorage):\n    def __init__(self, bucket):\n        import boto3\n        self.s3 = boto3.client('s3')\n        self.bucket = bucket\n    def upload(self, data, path):\n        self.s3.put_object(Bucket=self.bucket, Key=path, Body=data)\n    def download(self, path):\n        return self.s3.get_object(Bucket=self.bucket, Key=path)['Body'].read()`,`Design: On-prem to Cloud Migration\n1. Assessment: inventory datasets, dependencies, SLAs\n2. Pilot: migrate one low-risk pipeline end-to-end\n3. Dual-write: new data goes to both on-prem and cloud\n4. Migrate: move historical data in batches\n5. Validate: compare outputs between systems\n6. Cutover: redirect consumers to cloud, decommission on-prem`,`# Azure Data Factory pipeline definition\nadf_pipeline = {\n    "name": "CopyAndTransform",\n    "activities": [\n        {"name": "CopyToLake", "type": "Copy", "source": {"type": "SqlSource"}, "sink": {"type": "ParquetSink"}},\n        {"name": "Transform", "type": "DatabricksNotebook", "dependsOn": ["CopyToLake"]}\n    ]\n}`,`import boto3\ndef setup_lifecycle(bucket):\n    s3 = boto3.client('s3')\n    s3.put_bucket_lifecycle_configuration(Bucket=bucket, LifecycleConfiguration={\n        'Rules': [\n            {'ID': 'MoveToIA', 'Filter': {'Prefix': 'bronze/'}, 'Status': 'Enabled',\n             'Transitions': [{'Days': 30, 'StorageClass': 'STANDARD_IA'}]},\n            {'ID': 'MoveToGlacier', 'Filter': {'Prefix': 'archive/'}, 'Status': 'Enabled',\n             'Transitions': [{'Days': 90, 'StorageClass': 'GLACIER'}]}\n        ]\n    })`,`Design: BigQuery cost optimization\n- Partition all large tables by date/timestamp\n- Cluster by frequently filtered columns\n- Materialized views for repeated expensive queries\n- Slot reservations for predictable workloads\n- BI Engine for sub-second dashboard queries\n- Query policies: require partition filters, max bytes billed`,`# Cross-cloud replication\ndef sync_s3_to_gcs(s3_bucket, gcs_bucket, prefix):\n    import boto3\n    from google.cloud import storage\n    s3 = boto3.client('s3')\n    gcs = storage.Client()\n    bucket = gcs.bucket(gcs_bucket)\n    # List S3 objects and copy to GCS\n    paginator = s3.get_paginator('list_objects_v2')\n    for page in paginator.paginate(Bucket=s3_bucket, Prefix=prefix):\n        for obj in page.get('Contents', []):\n            data = s3.get_object(Bucket=s3_bucket, Key=obj['Key'])['Body'].read()\n            bucket.blob(obj['Key']).upload_from_string(data)`,`Design: Multi-region DR\n- Active-passive: primary region handles all writes, async replication to secondary\n- RPO: depends on replication lag (typically < 15 min)\n- RTO: DNS failover + warm standby in secondary (< 30 min)\n- Data: S3 cross-region replication, Redshift snapshots copied to DR region\n- Metadata: catalog and config replicated\n- Testing: quarterly failover drills`,`# Redshift COPY with error handling\nCOPY analytics.fact_sales\nFROM 's3://bucket/data/sales/'\nIAM_ROLE 'arn:aws:iam::123:role/RedshiftRole'\nFORMAT AS PARQUET\nMAXERROR 100\nMANIFEST 's3://bucket/manifests/sales_manifest.json';`,`Design: FinOps Strategy\n- Budget alerts: per-team/per-pipeline cost alerts at 80%/100% thresholds\n- Rightsizing: weekly review of over/under-provisioned resources\n- Reserved capacity: commit to 1-year plans for predictable workloads (30-50% savings)\n- Spot/preemptible: use for fault-tolerant batch jobs (60-90% savings)\n- Tagging: tag all resources by team/pipeline/environment for cost attribution\n- Optimization: auto-pause idle clusters, archive cold data, optimize queries`],
11:[`Key components: Source connectors, orchestration/scheduling, error handling & retry, monitoring & alerting, data quality gates, logging, metadata/lineage tracking, and notification on success/failure.`,`import time\nfrom functools import wraps\ndef retry(max_retries=3, delay=1):\n    def decorator(fn):\n        @wraps(fn)\n        def wrapper(*args, **kwargs):\n            for i in range(max_retries):\n                try: return fn(*args, **kwargs)\n                except Exception as e:\n                    if i == max_retries - 1: raise\n                    time.sleep(delay * (2**i))\n        return wrapper\n    return decorator`,`Dead Letter Queue: captures records/messages that failed processing.\nUse when: you want the pipeline to continue processing good records without being blocked by bad ones.\nDLQ records include: original data, error message, timestamp, retry count. Can be reprocessed later.`,`import time\nclass Monitor:\n    def __init__(self): self.metrics = {}\n    def start(self, task): self.metrics[task] = {'start': time.time()}\n    def end(self, task, rows=0):\n        self.metrics[task]['duration'] = time.time() - self.metrics[task]['start']\n        self.metrics[task]['rows'] = rows\n        print(f"{task}: {self.metrics[task]['duration']:.1f}s, {rows} rows")`,`Circuit breaker: stops calling a failing service after N consecutive failures.\nUseful because: prevents cascade failures, reduces unnecessary load on failing service, allows recovery time. States: CLOSED (normal) -> OPEN (stopped) -> HALF_OPEN (testing recovery).`,`def classify_error(error):\n    transient = ['timeout', 'connection', '429', '503', '502']\n    if any(t in str(error).lower() for t in transient):\n        return 'TRANSIENT'  # Retry\n    return 'PERMANENT'  # Don't retry, send to DLQ`,`Monitor: pipeline duration, rows processed/second, error rate, data freshness (staleness), resource usage (CPU/memory), cost per run, SLA compliance, queue depth/backlog.`,`import time, random\ndef retry_with_backoff(fn, max_retries=5, base_delay=1):\n    for i in range(max_retries):\n        try: return fn()\n        except Exception as e:\n            if i == max_retries - 1: raise\n            delay = base_delay * (2**i) * (0.5 + random.random())\n            time.sleep(delay)`,`class DLQ:\n    def __init__(self): self.queue = []\n    def send(self, record, error, task):\n        self.queue.append({'record': record, 'error': str(error), 'task': task, 'ts': time.time()})\n    def process_batch(self, records, handler, task):\n        success = 0\n        for r in records:\n            try: handler(r); success += 1\n            except Exception as e: self.send(r, e, task)\n        return success`,`Design: Monitoring Dashboard for 20 Pipelines\n- Overview: table of all pipelines with status (green/yellow/red), last run time, duration\n- SLA tracking: percentage of runs completing within SLA window\n- Trend charts: success rate, duration, row counts over past 30 days\n- Alerts panel: active alerts with severity and acknowledgment\n- Drill-down: click pipeline to see per-task metrics and logs`,`class CircuitBreaker:\n    def __init__(self, threshold=5, timeout=60):\n        self.threshold = threshold\n        self.timeout = timeout\n        self.failures = 0\n        self.state = 'CLOSED'\n        self.last_fail = 0\n    def call(self, fn):\n        if self.state == 'OPEN':\n            if time.time() - self.last_fail > self.timeout:\n                self.state = 'HALF_OPEN'\n            else: raise Exception("Circuit OPEN")\n        try:\n            result = fn()\n            self.failures = 0\n            self.state = 'CLOSED'\n            return result\n        except:\n            self.failures += 1\n            self.last_fail = time.time()\n            if self.failures >= self.threshold: self.state = 'OPEN'\n            raise`,`class PipelineFramework:\n    def __init__(self): self.steps = []; self.results = {}\n    def add_step(self, name, fn, deps=None):\n        self.steps.append({'name': name, 'fn': fn, 'deps': deps or []})\n    def run(self):\n        for step in self.steps:\n            deps_ok = all(self.results.get(d) == 'ok' for d in step['deps'])\n            if not deps_ok:\n                self.results[step['name']] = 'skipped'; continue\n            try: step['fn'](); self.results[step['name']] = 'ok'\n            except: self.results[step['name']] = 'failed'`,`Design: Alerting Strategy\n- P1 (Critical): pipeline failure affecting revenue/customers -> page on-call within 5 min\n- P2 (High): SLA breach or quality degradation -> Slack alert + email within 15 min\n- P3 (Medium): performance degradation or warnings -> Slack channel within 1 hour\n- P4 (Low): informational (pipeline completed, stats) -> email digest daily\n- Escalation: P1 unacknowledged after 15 min -> escalate to manager`,`import uuid, logging\ndef create_correlation_id(): return str(uuid.uuid4())[:8]\n\ndef log_with_context(msg, correlation_id, task, **kwargs):\n    extra = ' '.join(f'{k}={v}' for k,v in kwargs.items())\n    logging.info(f"[{correlation_id}] [{task}] {msg} {extra}")`,`from concurrent.futures import ThreadPoolExecutor, as_completed\nclass DAGRunner:\n    def __init__(self): self.tasks = {}; self.deps = {}\n    def add(self, name, fn, deps=None):\n        self.tasks[name] = fn; self.deps[name] = set(deps or [])\n    def run(self):\n        done = set()\n        with ThreadPoolExecutor(4) as ex:\n            while len(done) < len(self.tasks):\n                ready = [n for n,d in self.deps.items() if n not in done and d.issubset(done)]\n                futures = {ex.submit(self.tasks[n]): n for n in ready}\n                for f in as_completed(futures):\n                    done.add(futures[f])`,`# Self-healing pipeline:\n# 1. Retry transient failures with backoff\n# 2. On persistent failure: serve stale/cached data to downstream\n# 3. Alert team but don't block consumers\n# 4. Track failure count; after recovery, auto-backfill missed data`,`Design: Pipeline Versioning\n- Store pipeline code in git with semantic versioning\n- Each deployment tagged with version + commit hash\n- Metadata table tracks: version, deploy_time, deployer, config_hash\n- Rollback: revert to previous tagged version via CI/CD\n- A/B testing: run new version on subset of data, compare outputs`,`# Distributed pipeline with Redis state\nimport redis\nclass DistributedPipeline:\n    def __init__(self): self.r = redis.Redis()\n    def acquire_lock(self, pipeline_name, ttl=3600):\n        return self.r.set(f"lock:{pipeline_name}", "1", nx=True, ex=ttl)\n    def release_lock(self, pipeline_name):\n        self.r.delete(f"lock:{pipeline_name}")\n    def set_state(self, pipeline_name, state):\n        self.r.hset(f"state:{pipeline_name}", mapping=state)`,`Design: Chaos Engineering for Pipelines\n- Inject: random source failures, network latency, corrupt records, OOM conditions\n- Measure: recovery time, data loss, alert accuracy, downstream impact\n- Scenarios: source DB down for 1h, API returns 500s, file arrives late/corrupted\n- Frequency: weekly automated chaos tests in staging, monthly in prod (controlled)\n- Improvement loop: fix discovered weaknesses, add to runbook`,`# Pipeline cost tracker\nclass CostTracker:\n    def __init__(self): self.costs = {}\n    def record(self, pipeline, compute_cost, storage_cost, duration_s):\n        self.costs[pipeline] = {'compute': compute_cost, 'storage': storage_cost, 'duration': duration_s, 'total': compute_cost + storage_cost}\n    def suggest_optimizations(self):\n        suggestions = []\n        for p, c in self.costs.items():\n            if c['duration'] > 3600: suggestions.append(f"{p}: consider parallel processing")\n            if c['storage'] > 100: suggestions.append(f"{p}: consider compression/archival")\n        return suggestions`],
12:[`Connection pooling: maintains a pool of pre-established DB connections that are reused.\nImportant because: creating connections is expensive (TCP handshake, auth, memory). Pooling reduces latency, manages resource limits, and handles connection lifecycle.`,`from contextlib import contextmanager\n@contextmanager\ndef get_conn(pool):\n    conn = pool.getconn()\n    try:\n        yield conn\n        conn.commit()\n    except:\n        conn.rollback()\n        raise\n    finally:\n        pool.putconn(conn)`,`ACID:\n- Atomicity: Bank transfer either moves money from A to B completely, or not at all.\n- Consistency: Database constraints (foreign keys, checks) are always valid after transaction.\n- Isolation: Two concurrent transfers don't interfere or see partial states.\n- Durability: Once committed, data survives crashes (written to disk/WAL).`,`-- Composite index for queries filtering on user_id AND date\nCREATE INDEX idx_events_user_date ON events(user_id, event_date);\n-- This helps: WHERE user_id = X AND event_date > Y\n-- Also helps: WHERE user_id = X (leftmost prefix)`,`B-tree index: balanced tree structure. O(log n) lookups. Supports: equality, range, sorting, LIKE 'prefix%'.\nHash index: hash table. O(1) for equality only. Cannot do: ranges, sorting, partial matches.\nUse B-tree (default) unless you only ever do exact equality lookups.`,`def batch_insert(conn, records, table, batch_size=1000):\n    cursor = conn.cursor()\n    for i in range(0, len(records), batch_size):\n        batch = records[i:i+batch_size]\n        cursor.executemany(f"INSERT INTO {table} VALUES ({','.join(['%s']*len(batch[0]))})", batch)\n        conn.commit()\n        print(f"Inserted batch {i//batch_size + 1}")`,`EXPLAIN ANALYZE output shows:\n- Node types: Seq Scan (bad for large tables), Index Scan (good), Hash Join\n- Costs: estimated startup and total cost\n- Actual time: real execution time in ms\n- Rows: estimated vs actual row counts\nLook for: Seq Scans on large tables (need index), high cost nodes, row estimate mismatches.`,`class ConnectionPool:\n    def __init__(self, create_fn, max_size=10):\n        self.create = create_fn\n        self.max_size = max_size\n        self.pool = []\n        self.in_use = 0\n    def get(self):\n        if self.pool: return self.pool.pop()\n        if self.in_use < self.max_size:\n            self.in_use += 1\n            return self.create()\n        raise Exception("Pool exhausted")\n    def put(self, conn): self.pool.append(conn)\n    def health_check(self):\n        try:\n            c = self.get()\n            c.execute("SELECT 1")\n            self.put(c)\n            return True\n        except: return False`,`def transactional_batch_load(conn, records, batch_size=5000):\n    cursor = conn.cursor()\n    loaded = 0\n    for i in range(0, len(records), batch_size):\n        batch = records[i:i+batch_size]\n        try:\n            cursor.executemany("INSERT INTO target VALUES (%s,%s,%s)", batch)\n            conn.commit()\n            loaded += len(batch)\n        except Exception as e:\n            conn.rollback()\n            print(f"Batch {i//batch_size} failed: {e}")\n    return loaded`,`-- Optimize slow query\n-- Before (slow - correlated subquery):\nSELECT * FROM users WHERE (SELECT COUNT(*) FROM orders WHERE user_id = users.id) > 5;\n-- After (fast - JOIN with aggregate):\nSELECT u.* FROM users u\nJOIN (SELECT user_id, COUNT(*) c FROM orders GROUP BY user_id HAVING COUNT(*) > 5) o\nON u.id = o.user_id;\n-- Add index: CREATE INDEX idx_orders_user ON orders(user_id);`,`from io import StringIO\ndef copy_load(conn, df, table):\n    buf = StringIO()\n    df.to_csv(buf, index=False, header=False)\n    buf.seek(0)\n    cursor = conn.cursor()\n    cursor.copy_from(buf, table, sep=',')\n    conn.commit()\n    print(f"COPY loaded {len(df)} rows")`,`def analyze_query(conn, query):\n    cursor = conn.cursor()\n    cursor.execute(f"EXPLAIN (ANALYZE, FORMAT JSON) {query}")\n    plan = cursor.fetchone()[0][0]\n    time_ms = plan['Execution Time']\n    # Find sequential scans\n    def find_scans(node, results=[]):\n        if node.get('Node Type') == 'Seq Scan': results.append(node['Relation Name'])\n        for child in node.get('Plans', []): find_scans(child, results)\n        return results\n    scans = find_scans(plan['Plan'])\n    return {'time_ms': time_ms, 'seq_scans': scans, 'suggestion': f"Add indexes on {scans}" if scans else "OK"}`,`Design: Multi-source connection strategy\n- Read sources: 5 connection pools (one per source DB, sized for extraction parallelism)\n- Write targets: 2 connection pools (warehouse + operational DB)\n- Timeouts: read connections 30s, write connections 60s\n- Health checks: ping connections every 30s, recreate stale ones\n- Failover: secondary read replicas as fallback sources`,`def upsert_via_staging(conn, df, target, key_cols):\n    # Create temp staging table\n    conn.execute(f"CREATE TEMP TABLE stg AS SELECT * FROM {target} LIMIT 0")\n    # Bulk load to staging\n    copy_load(conn, df, 'stg')\n    # Merge from staging to target\n    key_join = ' AND '.join(f"t.{k}=s.{k}" for k in key_cols)\n    conn.execute(f"DELETE FROM {target} t USING stg s WHERE {key_join}")\n    conn.execute(f"INSERT INTO {target} SELECT * FROM stg")\n    conn.execute("DROP TABLE stg")\n    conn.commit()`,`import time\ndef compare_queries(conn, query_a, query_b, iterations=5):\n    times = {'a': [], 'b': []}\n    for _ in range(iterations):\n        start = time.time()\n        conn.execute(query_a).fetchall()\n        times['a'].append(time.time() - start)\n        start = time.time()\n        conn.execute(query_b).fetchall()\n        times['b'].append(time.time() - start)\n    avg_a = sum(times['a'])/len(times['a'])\n    avg_b = sum(times['b'])/len(times['b'])\n    print(f"Query A: {avg_a:.3f}s, Query B: {avg_b:.3f}s, Winner: {'A' if avg_a<avg_b else 'B'}")`,`class MigrationTool:\n    def __init__(self, conn, migrations_dir):\n        self.conn = conn\n        self.dir = migrations_dir\n        conn.execute("CREATE TABLE IF NOT EXISTS migrations (version INT, applied_at TIMESTAMP)")\n    def get_current_version(self):\n        result = self.conn.execute("SELECT MAX(version) FROM migrations").fetchone()\n        return result[0] or 0\n    def apply(self):\n        current = self.get_current_version()\n        # Find and apply pending migrations in order\n        # Each migration file: V001__create_users.sql\n        # On failure: rollback and stop`,`Design: Read-replica routing\n- Write operations (INSERT/UPDATE/DELETE) always go to primary\n- Read operations routed based on type:\n  - Real-time reads (user-facing): primary (consistency needed)\n  - Analytics queries: round-robin across read replicas\n  - Heavy reports: dedicated replica with higher resources\n- Connection wrapper auto-routes based on SQL type detection`,`import time, json\nclass QueryCache:\n    def __init__(self, default_ttl=300):\n        self.cache = {}\n        self.ttl = default_ttl\n    def get(self, query):\n        key = hash(query)\n        if key in self.cache:\n            entry = self.cache[key]\n            if time.time() - entry['ts'] < self.ttl:\n                return entry['data']\n        return None\n    def set(self, query, data):\n        self.cache[hash(query)] = {'data': data, 'ts': time.time()}\n    def invalidate_all(self): self.cache = {}`,`class DatabaseAdapter:\n    def __init__(self, db_type, **conn_params):\n        if db_type == 'postgres':\n            import psycopg2; self.conn = psycopg2.connect(**conn_params)\n        elif db_type == 'sqlite':\n            import sqlite3; self.conn = sqlite3.connect(conn_params['database'])\n    def execute(self, query, params=None):\n        cur = self.conn.cursor()\n        cur.execute(query, params)\n        return cur\n    def fetch_df(self, query):\n        import pandas as pd\n        return pd.read_sql(query, self.conn)`,`Design: Sharding strategy for 1B+ events table\n- Shard key: user_id (hash-based, 64 shards)\n- Routing: hash(user_id) % num_shards -> shard assignment\n- Cross-shard queries: scatter-gather pattern\n- Resharding: consistent hashing to minimize data movement\n- Time-based archival: old shards moved to cold storage`],

13:[`Common API auth methods:\n- API Key: simple header/query param. Easy but less secure.\n- OAuth 2.0: token-based, supports refresh. Standard for SaaS APIs.\n- Basic Auth: username:password base64 encoded. Legacy, avoid if possible.\n- JWT: self-contained tokens with claims. Stateless verification.`,`import requests\ndef call_api(url, params=None, timeout=30):\n    try:\n        resp = requests.get(url, params=params, timeout=timeout)\n        resp.raise_for_status()\n        return resp.json()\n    except requests.Timeout:\n        print("Request timed out")\n    except requests.HTTPError as e:\n        print(f"HTTP error: {e.response.status_code}")\n    except requests.RequestException as e:\n        print(f"Request failed: {e}")\n    return None`,`Offset pagination: Simple (?page=2&limit=100). Pro: easy to implement. Con: slow for deep pages (DB skips rows), inconsistent if data changes between pages.\nCursor pagination: Uses last item as bookmark (?after=id_123). Pro: consistent, fast at any depth. Con: can't jump to arbitrary page.`,`def paginate_all(session, url, per_page=100):\n    all_data = []\n    page = 1\n    while True:\n        resp = session.get(url, params={'page': page, 'per_page': per_page})\n        data = resp.json()\n        if not data: break\n        all_data.extend(data)\n        page += 1\n    return all_data`,`Rate limiting protects APIs from overload (too many requests per time window).\nHandle 429 responses by:\n1. Reading Retry-After header for wait time\n2. Implementing exponential backoff\n3. Tracking remaining quota from X-RateLimit-Remaining header\n4. Pre-emptively throttling to stay under limits`,`import time, threading\nclass RateLimiter:\n    def __init__(self, max_per_second):\n        self.rate = max_per_second\n        self.tokens = max_per_second\n        self.last = time.time()\n        self.lock = threading.Lock()\n    def acquire(self):\n        with self.lock:\n            now = time.time()\n            self.tokens = min(self.rate, self.tokens + (now-self.last)*self.rate)\n            self.last = now\n            if self.tokens >= 1: self.tokens -= 1\n            else: time.sleep(1/self.rate)`,`CDC (Change Data Capture) tracks row-level changes from source databases.\nApproaches:\n1. Log-based: reads DB transaction log (WAL). Non-invasive, real-time. (Debezium)\n2. Trigger-based: DB triggers write changes to audit table. Adds overhead to source.\n3. Timestamp-based: polls WHERE updated_at > last_sync. Simple but misses deletes.`,`def paginate_cursor(session, url, per_page=100):\n    all_data = []\n    cursor = None\n    while True:\n        params = {'limit': per_page}\n        if cursor: params['cursor'] = cursor\n        resp = session.get(url, params=params)\n        data = resp.json()\n        all_data.extend(data.get('results', []))\n        cursor = data.get('next_cursor')\n        if not cursor: break\n    return all_data`,`def rate_aware_extract(session, url, max_requests=100):\n    import time\n    all_data = []\n    for i in range(max_requests):\n        resp = session.get(url, params={'page': i+1})\n        if resp.status_code == 429:\n            wait = int(resp.headers.get('Retry-After', 60))\n            time.sleep(wait)\n            continue\n        remaining = int(resp.headers.get('X-RateLimit-Remaining', 999))\n        if remaining < 5: time.sleep(10)\n        data = resp.json()\n        if not data: break\n        all_data.extend(data)\n    return all_data`,`Design: API Ingestion Pipeline\n- Auth: OAuth token manager with auto-refresh before expiry\n- Pagination: cursor-based extraction with configurable page size\n- Rate limits: token bucket limiter respecting API headers\n- Retries: exponential backoff for 5xx/timeout, skip 4xx (permanent)\n- Failures: DLQ for failed pages, resume from last cursor on restart\n- Monitoring: track pages extracted, error rate, latency per page`,`def timestamp_cdc(conn, table, ts_col, last_sync):\n    import pandas as pd\n    query = f"SELECT * FROM {table} WHERE {ts_col} > '{last_sync}' ORDER BY {ts_col}"\n    changes = pd.read_sql(query, conn)\n    new_watermark = str(changes[ts_col].max()) if len(changes) > 0 else last_sync\n    return changes, new_watermark`,`from flask import Flask, request, jsonify\napp = Flask(__name__)\n@app.route('/webhook', methods=['POST'])\ndef receive():\n    event = request.json\n    event_id = event.get('id')\n    # Validate, dedup, queue for processing\n    return jsonify({'status': 'accepted'}), 202`,`class APIFramework:\n    def __init__(self, base_url):\n        self.base_url = base_url\n        self.session = requests.Session()\n    def set_auth(self, auth_type, **kwargs):\n        if auth_type == 'api_key': self.session.headers['X-API-Key'] = kwargs['key']\n        elif auth_type == 'bearer': self.session.headers['Authorization'] = f"Bearer {kwargs['token']}"\n        elif auth_type == 'basic':\n            from requests.auth import HTTPBasicAuth\n            self.session.auth = HTTPBasicAuth(kwargs['user'], kwargs['password'])`,`Design: Debezium CDC Pipeline\n1. Debezium connector reads PostgreSQL WAL (logical replication)\n2. Publishes change events to Kafka topics (one per table)\n3. Kafka Connect or Flink consumer reads change events\n4. Applies changes to target: INSERT/UPDATE/DELETE\n5. Maintains consumer offsets for exactly-once\n6. Schema registry ensures producer/consumer schema compatibility`,`class WebhookProcessor:\n    def __init__(self): self.processed_ids = set()\n    def process(self, event):\n        eid = event.get('id')\n        if eid in self.processed_ids: return 'duplicate'\n        try:\n            self.handle(event)\n            self.processed_ids.add(eid)\n            return 'processed'\n        except Exception as e:\n            return f'error: {e}'\n    def handle(self, event): pass  # Override with business logic`,`# Resilient API extractor (combines auth, rate limits, pagination, retries)\n# Key pattern: wrap each request in retry decorator\n# Track state: cursor position for resume on failure\n# Auth refresh: detect 401, refresh token, retry request\n# Rate limiting: pre-flight check remaining quota`,`Design: CDC Platform for 50+ tables\n- Debezium for log-based CDC (non-invasive)\n- Schema registry for tracking table schemas\n- Kafka topics per table with compaction\n- Schema evolution: new columns auto-detected, backward compatible\n- Monitoring: lag per table, throughput, error rates\n- Self-service: teams onboard tables via config file`,`class OAuthTokenManager:\n    def __init__(self, token_url, client_id, client_secret):\n        self.token_url = token_url\n        self.client_id = client_id\n        self.secret = client_secret\n        self.token = None\n        self.expires_at = 0\n    def get_token(self):\n        import time, requests\n        if time.time() < self.expires_at - 60: return self.token\n        resp = requests.post(self.token_url, data={'grant_type':'client_credentials','client_id':self.client_id,'client_secret':self.secret})\n        data = resp.json()\n        self.token = data['access_token']\n        self.expires_at = time.time() + data['expires_in']\n        return self.token`,`Design: Webhook platform (10K events/sec)\n- Ingestion: load balancer -> multiple webhook receivers\n- Queue: events immediately pushed to Kafka (decouple receive from process)\n- Processing: consumer group processes events with idempotency\n- Dedup: Redis set of processed event_ids with 24h TTL\n- Scale: auto-scale receivers based on request rate\n- Reliability: acknowledge (202) immediately, process async`,`# Generic ingestion framework from config\nclass IngestionFramework:\n    connectors = {'rest': RESTConnector, 'database': DBConnector, 'sftp': SFTPConnector}\n    def run_from_config(self, config):\n        connector = self.connectors[config['type']](config)\n        data = connector.extract()\n        return data`],
14:[`Without tests, data pipelines can silently produce wrong results for days/weeks before anyone notices.\nRisks: incorrect business decisions from bad data, broken downstream systems, compliance violations, lost customer trust. Tests catch issues before they reach production.`,`def test_clean_email():\n    assert clean_email('  USER@Mail.COM  ') == 'user@mail.com'\n    assert clean_email('valid@email.org') == 'valid@email.org'\n    # Edge cases\n    assert clean_email('') == ''\n    assert clean_email(None) is None`,`Unit tests: test individual functions in isolation (does transform_date() work correctly?).\nIntegration tests: test components working together (does extract->transform->load produce correct output in test DB?).\nUnit = fast, focused on logic. Integration = slower, catches wiring issues.`,`import pytest, sqlite3, pandas as pd\n@pytest.fixture\ndef test_db():\n    conn = sqlite3.connect(':memory:')\n    conn.execute("CREATE TABLE users (id INT, name TEXT, email TEXT)")\n    conn.execute("INSERT INTO users VALUES (1, 'Alice', 'alice@mail.com')")\n    conn.commit()\n    yield conn\n    conn.close()`,`dbt built-in tests:\n- not_null: column has no NULL values\n- unique: column values are all distinct\n- accepted_values: column only contains specified values\n- relationships: foreign key references exist in parent table`,`# dbt schema.yml\nversion: 2\nmodels:\n  - name: stg_users\n    columns:\n      - name: user_id\n        tests: [not_null, unique]\n      - name: status\n        tests:\n          - accepted_values:\n              values: ['active', 'inactive', 'suspended']`,`Data contracts: formal agreements between data producers and consumers about data schema, quality, and SLA.\nHelp by: preventing breaking changes, setting clear expectations, enabling independent team development, catching issues at boundaries rather than downstream.`,`def test_pipeline_e2e(test_db):\n    import pandas as pd\n    # Seed source data\n    test_db.execute("INSERT INTO source VALUES (1,'alice@mail.com')")\n    # Run pipeline\n    df = pd.read_sql("SELECT * FROM source", test_db)\n    df['email'] = df['email'].str.lower()\n    df.to_sql('target', test_db, if_exists='replace', index=False)\n    # Assert\n    result = pd.read_sql("SELECT * FROM target", test_db)\n    assert len(result) == 1\n    assert result['email'].iloc[0] == 'alice@mail.com'`,`-- Custom dbt test: check referential integrity\n-- tests/check_order_customer_fk.sql\nSELECT o.order_id\nFROM {{ ref('stg_orders') }} o\nLEFT JOIN {{ ref('stg_customers') }} c ON o.customer_id = c.customer_id\nWHERE c.customer_id IS NULL\n-- Test passes if query returns 0 rows`,`# GitHub Actions CI for data pipeline\nname: Pipeline CI\non: [push, pull_request]\njobs:\n  test:\n    runs-on: ubuntu-latest\n    steps:\n      - uses: actions/checkout@v3\n      - run: pip install -r requirements.txt\n      - run: pytest tests/ -v --cov=src\n      - run: flake8 src/\n  dbt:\n    runs-on: ubuntu-latest\n    steps:\n      - run: dbt compile && dbt test --target ci`,`class DataContract:\n    def __init__(self, schema_def):\n        self.schema = schema_def\n    def validate(self, df):\n        errors = []\n        for col_def in self.schema['columns']:\n            col = col_def['name']\n            if col not in df.columns:\n                if col_def.get('required'): errors.append(f"Missing: {col}")\n            elif col_def.get('not_null') and df[col].isnull().any():\n                errors.append(f"Nulls in: {col}")\n        return errors`,`from unittest.mock import patch, MagicMock\ndef test_api_extractor():\n    with patch('requests.get') as mock_get:\n        mock_get.return_value.json.return_value = [{'id': 1}]\n        mock_get.return_value.status_code = 200\n        result = extract_from_api('/users')\n        assert len(result) == 1\n        mock_get.assert_called_once()`,`Design: Testing strategy for complex pipeline\n- Unit tests: each transform function individually (fast, run on every commit)\n- Integration tests: pipeline stages connected with test DB (on PR merge)\n- Data quality tests: dbt tests on staging environment (post-deploy)\n- End-to-end: full pipeline with sample data, compare output to golden dataset\n- Performance tests: track execution time regression over releases`,`import pandera as pa\nuser_schema = pa.DataFrameSchema({\n    'user_id': pa.Column(int, pa.Check.gt(0), nullable=False),\n    'email': pa.Column(str, pa.Check.str_matches(r'.+@.+\\..+'), nullable=False),\n    'age': pa.Column(int, pa.Check.in_range(0, 150), nullable=True)\n})`,`import pandas as pd\nimport numpy as np\ndef generate_test_data(schema, n=100):\n    data = {}\n    for col, dtype in schema.items():\n        if dtype == 'int': data[col] = np.random.randint(1, 1000, n)\n        elif dtype == 'str': data[col] = [f'value_{i}' for i in range(n)]\n        elif dtype == 'float': data[col] = np.random.uniform(0, 100, n)\n        elif dtype == 'date': data[col] = pd.date_range('2024-01-01', periods=n)\n    return pd.DataFrame(data)`,`# Regression testing: compare current output to known-good baseline\ndef regression_test(pipeline_fn, input_data, baseline_path):\n    result = pipeline_fn(input_data)\n    baseline = pd.read_parquet(baseline_path)\n    differences = result.compare(baseline)\n    if len(differences) > 0:\n        print(f"REGRESSION: {len(differences)} differences found")\n        return False\n    return True`,`Design: CI/CD for dbt\n1. PR opened: dbt compile (check syntax)\n2. PR approved: dbt run --target staging + dbt test --target staging\n3. Merge to main: dbt run --target prod + dbt test --target prod\n4. Post-deploy: run freshness checks, compare row counts to previous\n5. Rollback: revert git commit, re-run dbt to restore previous models`,`# Property-based testing with hypothesis\nfrom hypothesis import given, strategies as st\n@given(st.lists(st.emails(), min_size=1, max_size=100))\ndef test_email_transform_properties(emails):\n    import pandas as pd\n    df = pd.DataFrame({'email': emails})\n    result = transform_emails(df)\n    # Properties:\n    assert result['email'].str.islower().all()  # All lowercase\n    assert len(result) <= len(df)  # Never adds rows\n    assert result['email'].notna().all()  # No nulls introduced`,`Design: Production DQ monitoring\n- Scheduled tests: run dbt test + custom checks hourly\n- Anomaly detection: flag unusual row counts, null spikes, distribution shifts\n- Dashboard: real-time quality scores per table\n- Alerting: PagerDuty for critical, Slack for warnings\n- Trend tracking: quality score history for SLA reporting`,`# Contract testing framework\nclass ContractTester:\n    def __init__(self): self.contracts = {}\n    def register_contract(self, name, schema, sla):\n        self.contracts[name] = {'schema': schema, 'sla': sla}\n    def validate_at_boundary(self, name, df):\n        contract = self.contracts[name]\n        schema_errors = validate_schema(df, contract['schema'])\n        freshness_ok = check_freshness(df, contract['sla'])\n        return {'schema_valid': len(schema_errors)==0, 'sla_met': freshness_ok}`],
15:[`Data partitioning divides a large dataset into smaller subsets (partitions) based on a column value.\nImproves performance by: enabling partition pruning (skip irrelevant data), reducing scan size, enabling parallel processing of partitions, and improving data locality.`,`def optimal_partitions(total_gb, target_mb=256):\n    num = int(total_gb * 1024 / target_mb)\n    print(f"For {total_gb}GB data with {target_mb}MB target: {num} partitions")\n    return num`,`Partitioning: divides data into separate directories/files by column value (year=2024/month=01/).\nBucketing: hashes data into fixed number of files by column value (bucket_0000, bucket_0001...).\nPartitioning = coarse-grained, directory-level. Bucketing = fine-grained, file-level, enables shuffle-free joins.`,`from concurrent.futures import ProcessPoolExecutor\nimport pandas as pd\ndef parallel_process(df, fn, num_workers=4):\n    chunks = [df.iloc[i::num_workers] for i in range(num_workers)]\n    with ProcessPoolExecutor(num_workers) as ex:\n        results = list(ex.map(fn, chunks))\n    return pd.concat(results, ignore_index=True)`,`Data skew: uneven distribution of data across partitions or keys.\nProblems: one worker processes most of the data (bottleneck), OOM on skewed partition, join performance degrades, pipeline SLA breaches.`,`import time\ndef cached(ttl=300):\n    cache = {}\n    def decorator(fn):\n        def wrapper(*args):\n            key = str(args)\n            if key in cache and time.time() - cache[key]['ts'] < ttl:\n                return cache[key]['data']\n            result = fn(*args)\n            cache[key] = {'data': result, 'ts': time.time()}\n            return result\n        return wrapper\n    return decorator`,`Materialized views: pre-computed query results stored as a table.\nUse when: same expensive aggregation query runs frequently, data changes infrequently relative to query frequency, acceptable staleness for pre-computed results. Refresh on schedule or triggers.`,`def detect_skew(df, col, threshold=3.0):\n    counts = df.groupby(col).size()\n    median = counts.median()\n    skewed = counts[counts > median * threshold]\n    print(f"Skew analysis: median={median:.0f}, max={counts.max()}")\n    print(f"Skewed keys ({len(skewed)}): {skewed.index.tolist()[:5]}")\n    return skewed`,`class AdaptiveBatcher:\n    def __init__(self, initial=1000, min_b=100, max_b=50000):\n        self.size = initial; self.min = min_b; self.max = max_b\n    def process(self, data, fn):\n        offset = 0\n        while offset < len(data):\n            start = time.time()\n            fn(data[offset:offset+self.size])\n            duration = time.time() - start\n            if duration < 0.5: self.size = min(self.max, int(self.size*1.5))\n            elif duration > 5: self.size = max(self.min, self.size//2)\n            offset += self.size`,`Design: Partitioning for 10TB events table\n- Primary partition: DATE(event_time) - matches most query filters\n- Clustering: user_id, event_type - for point lookups and type filtering\n- Partition size target: 256MB-1GB per partition\n- Retain hot partitions (30 days) on fast storage\n- Archive older partitions with higher compression`,`import time\nclass Profiler:\n    def __init__(self): self.steps = {}\n    def profile(self, name):\n        def decorator(fn):\n            def wrapper(*a, **kw):\n                start = time.time()\n                result = fn(*a, **kw)\n                self.steps[name] = {'time': time.time()-start, 'rows': len(result) if hasattr(result,'__len__') else 0}\n                return result\n            return wrapper\n        return decorator\n    def report(self):\n        for name, s in self.steps.items():\n            print(f"{name}: {s['time']:.2f}s ({s['rows']} rows)")`,`def salt_skewed_join(df_large, df_small, key, num_salts=10):\n    import numpy as np\n    # Salt the large table\n    df_large = df_large.copy()\n    df_large['_salt'] = np.random.randint(0, num_salts, len(df_large))\n    df_large['_salted_key'] = df_large[key].astype(str) + '_' + df_large['_salt'].astype(str)\n    # Explode the small table\n    small_exploded = pd.concat([df_small.assign(_salt=i) for i in range(num_salts)])\n    small_exploded['_salted_key'] = small_exploded[key].astype(str) + '_' + small_exploded['_salt'].astype(str)\n    # Join on salted key (evenly distributed)\n    return df_large.merge(small_exploded, on='_salted_key')`,`Design: Caching for dimension joins\n- Cache slowly-changing dimension tables in memory (Redis or local)\n- TTL: match to dimension update frequency (e.g., 1 hour for daily-updated dims)\n- Invalidation: trigger cache refresh when dimension ETL completes\n- Fallback: if cache miss, query DB and populate cache\n- Benefit: avoid repeated DB lookups for same dimension data across batch records`,`from concurrent.futures import ProcessPoolExecutor\nimport pandas as pd, math\ndef distributed_process(file_path, fn, chunk_size=100000, workers=4):\n    chunks = pd.read_csv(file_path, chunksize=chunk_size)\n    results = []\n    with ProcessPoolExecutor(workers) as ex:\n        for chunk_result in ex.map(fn, chunks):\n            results.append(chunk_result)\n    return pd.concat(results, ignore_index=True)`,`-- BigQuery CLUSTER BY example\nCREATE TABLE dataset.events_clustered\nPARTITION BY DATE(event_time)\nCLUSTER BY user_id, event_type\nAS SELECT * FROM dataset.events;\n-- Queries filtering on user_id or event_type scan less data = faster + cheaper`,`class PipelineOptimizer:\n    def __init__(self): self.profiles = {}\n    def analyze(self):\n        bottleneck = max(self.profiles.items(), key=lambda x: x[1]['time'])\n        suggestions = []\n        if bottleneck[1]['time'] > 60: suggestions.append(f"Optimize {bottleneck[0]} (takes {bottleneck[1]['time']:.0f}s)")\n        for name, p in self.profiles.items():\n            if p.get('rows', 0) > 1000000: suggestions.append(f"{name}: consider partitioning")\n        return suggestions`,`Design: 1M events/second with sub-second queries\n- Ingestion: Kafka (partitioned by key) -> Flink for stream processing\n- Hot storage: Redis/Druid for real-time queries (last 24h)\n- Warm storage: ClickHouse/Pinot for recent analytics (last 30 days)\n- Cold storage: Parquet in S3 for historical (partitioned by day)\n- Query routing: based on time range, route to appropriate store`,`# Custom shuffle for skewed keys\ndef balanced_shuffle(df, key_col, num_buckets):\n    # Detect hot keys (>2x average)\n    counts = df[key_col].value_counts()\n    avg = len(df) / num_buckets\n    hot_keys = counts[counts > avg * 2].index.tolist()\n    # Split hot keys across multiple buckets (salt)\n    # Non-hot keys use normal hash partitioning\n    df['_bucket'] = df[key_col].apply(lambda k: hash(k) % num_buckets if k not in hot_keys else hash(f"{k}_{np.random.randint(num_buckets)}") % num_buckets)\n    return df`,`Design: Auto-scaling pipeline\n- Monitor: input data volume, processing time, queue depth\n- Scale-up triggers: queue depth > threshold, processing time > SLA * 0.8\n- Scale-down triggers: idle workers > 50% for 10+ minutes\n- Min/max bounds: minimum 1 worker, maximum based on budget\n- Predictive: use historical patterns (e.g., Monday peaks) for pre-scaling`,`class PartitionBenchmark:\n    def benchmark(self, df, strategies):\n        results = []\n        for strategy in strategies:\n            # Write with strategy\n            start = time.time()\n            write_fn(df, strategy)\n            write_time = time.time() - start\n            # Read with filter\n            start = time.time()\n            read_fn(strategy, filter_col='date', filter_val='2024-01-15')\n            read_time = time.time() - start\n            results.append({'strategy': strategy['name'], 'write_s': write_time, 'read_s': read_time})\n        return pd.DataFrame(results)`]

function renderSolutions() {
    const container = document.getElementById('solutionsContent');
    if (!currentTopic) return;
    const sols = solutionData[currentTopic.id] || [];
    var html = '';
    currentTopic.practice.forEach(function(p, i) {
        var sol = sols[i] || 'Solution coming soon...';
        var highlighted = highlightCode(sol);
        html += '<div class="solution-item">' +
            '<div class="solution-header" onclick="toggleSolution(' + i + ')">' +
            '<span class="solution-num">#' + (i+1) + '</span>' +
            '<span class="solution-q">' + p.q + '</span>' +
            '<button class="solution-toggle" id="btn_' + i + '">Show Solution</button>' +
            '</div>' +
            '<div class="solution-body" id="sol_' + i + '">' +
            '<pre class="code-block"><code>' + highlighted + '</code></pre>' +
            '</div></div>';
    });
    container.innerHTML = html;
}

function toggleSolution(i) {
    const body = document.getElementById('sol_' + i);
    const btn = document.getElementById('btn_' + i);
    body.classList.toggle('open');
    btn.textContent = body.classList.contains('open') ? 'Hide Solution' : 'Show Solution';
}
