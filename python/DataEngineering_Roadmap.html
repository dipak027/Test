{title:"Partition-Based Idempotent Pipeline",desc:"Complete batch pipeline with partition-based idempotent load pattern.",code:"import pandas as pd\nfrom datetime import date\n\ndef run_daily_pipeline(execution_date):\n    partition = execution_date.strftime('%Y-%m-%d')\n    \n    # EXTRACT: Get data for this partition\n    raw = pd.read_sql(f\"\"\"\n        SELECT * FROM source_events\n        WHERE event_date = '{partition}'\n    \"\"\", source_conn)\n    \n    if raw.empty:\n        print(f'No data for {partition}')\n        return\n    \n    # TRANSFORM\n    transformed = raw.copy()\n    transformed['revenue'] = transformed['quantity'] * transformed['price']\n    transformed['partition_date'] = partition\n    \n    # LOAD (idempotent: delete then insert)\n    target_conn.execute(f\"DELETE FROM analytics.daily_sales WHERE partition_date = '{partition}'\")\n    transformed.to_sql('daily_sales', target_conn, schema='analytics', if_exists='append', index=False)\n    target_conn.commit()\n    \n    print(f'Loaded {len(transformed)} rows for {partition}')"},
{title:"Multi-Step Batch with Dependencies",desc:"Orchestrate dependent batch steps with proper ordering.",code:"from datetime import datetime\nimport logging\n\nlogging.basicConfig(level=logging.INFO)\nlogger = logging.getLogger(__name__)\n\nclass BatchPipeline:\n    def __init__(self, name):\n        self.name = name\n        self.steps = []\n        self.results = {}\n    \n    def add_step(self, name, fn, depends_on=None):\n        self.steps.append({'name': name, 'fn': fn, 'depends_on': depends_on or []})\n    \n    def run(self):\n        logger.info(f'Starting pipeline: {self.name}')\n        for step in self.steps:\n            # Check dependencies\n            for dep in step['depends_on']:\n                if self.results.get(dep) != 'success':\n                    logger.error(f\"Skipping {step['name']}: dependency {dep} failed\")\n                    self.results[step['name']] = 'skipped'\n                    continue\n            try:\n                step['fn']()\n                self.results[step['name']] = 'success'\n                logger.info(f\"Step {step['name']}: SUCCESS\")\n            except Exception as e:\n                self.results[step['name']] = 'failed'\n                logger.error(f\"Step {step['name']}: FAILED - {e}\")\n        return self.results\n\npipeline = BatchPipeline('daily_analytics')\npipeline.add_step('extract', extract_fn)\npipeline.add_step('transform', transform_fn, depends_on=['extract'])\npipeline.add_step('load', load_fn, depends_on=['transform'])\npipeline.run()"},
{title:"Incremental CDC Processing",desc:"Process change data capture events incrementally with watermarking.",code:"import pandas as pd\nfrom datetime import datetime\n\ndef process_cdc_batch(source_table, target_table, watermark_col='_cdc_timestamp'):\n    # Get last processed watermark\n    last_wm = get_watermark(target_table)\n    \n    # Extract changes since last watermark\n    changes = pd.read_sql(f\"\"\"\n        SELECT *, _cdc_operation FROM {source_table}_cdc\n        WHERE {watermark_col} > '{last_wm}'\n        ORDER BY {watermark_col}\n    \"\"\", source_conn)\n    \n    if changes.empty:\n        return 'No new changes'\n    \n    # Apply changes by operation type\n    inserts = changes[changes['_cdc_operation'] == 'INSERT']\n    updates = changes[changes['_cdc_operation'] == 'UPDATE']\n    deletes = changes[changes['_cdc_operation'] == 'DELETE']\n    \n    # Apply to target\n    if not inserts.empty:\n        inserts.drop(columns=['_cdc_operation']).to_sql(target_table, target_conn, if_exists='append')\n    for _, row in updates.iterrows():\n        target_conn.execute(f\"UPDATE {target_table} SET ... WHERE id = {row['id']}\")\n    for _, row in deletes.iterrows():\n        target_conn.execute(f\"DELETE FROM {target_table} WHERE id = {row['id']}\")\n    \n    # Update watermark\n    new_wm = changes[watermark_col].max()\n    save_watermark(target_table, new_wm)\n    return f'Processed {len(changes)} changes'"}

{q:"A Spark job processes 1TB of data. The cluster has 100GB memory total. Which Spark feature allows this without running out of memory?",options:["A) Spark loads everything into memory at once","B) Disk spilling - Spark writes intermediate data to disk when memory is full","C) Spark compresses data to fit in memory","D) Spark skips data that doesnt fit"],answer:"B",d:"E"},
{q:"Your MapReduce job has a map phase that filters records and a reduce phase that aggregates counts. If the input is 10GB across 100 files, how many map tasks run?",options:["A) 1 map task total","B) 100 map tasks - one per input split/file","C) 10 map tasks - one per GB","D) Depends on reduce count only"],answer:"B",d:"E"},
{q:"A batch job scheduled at 2 AM processes yesterday's data. The job takes 4 hours. Business users need data by 7 AM. Is this meeting the SLA?",options:["A) No, 4 hours is too long","B) Yes, job completes at 6 AM which is before the 7 AM SLA","C) Cannot determine without more info","D) SLA is irrelevant for batch jobs"],answer:"B",d:"E"},
{q:"Your Spark DataFrame has 200 partitions but your cluster has only 10 executors. What happens?",options:["A) Spark fails because partitions exceed executors","B) Each executor processes multiple partitions sequentially (20 partitions per executor)","C) Extra partitions are dropped","D) Spark automatically reduces partitions to 10"],answer:"B",d:"E"},
{q:"A batch pipeline reads from PostgreSQL, applies transformations, and writes to S3 as Parquet. Which framework is most commonly used for this at scale?",options:["A) cron script with pandas","B) Apache Spark - distributed processing engine for large-scale batch ETL","C) Apache Kafka","D) Redis"],answer:"B",d:"E"},
{q:"Your daily batch job suddenly takes 3x longer than usual. The data volume is the same. What should you investigate first?",options:["A) Delete the output and rerun","B) Check for data skew - one partition may have disproportionate data causing a bottleneck","C) Add more schedule runs","D) Ignore it since data volume is same"],answer:"B",d:"E"},
{q:"A Spark job with 1000 tasks shows that 999 tasks finish in 2 minutes but 1 task takes 45 minutes. What is this called?",options:["A) Normal behavior","B) Data skew - one partition has significantly more data causing a straggler","C) Network latency","D) Disk failure"],answer:"B",d:"E"},
{q:"Your Spark job joins a 500GB table with a 50MB lookup table. Which join optimization should you use?",options:["A) Shuffle hash join distributing both tables","B) Broadcast join - send the small table to all executors to avoid shuffle","C) Sort-merge join with full shuffle","D) Nested loop join"],answer:"B",d:"M"},
{q:"A batch job needs to update 5M existing records and insert 2M new records in a data lake. Which operation pattern handles this?",options:["A) Append-only write","B) MERGE (upsert) operation using Delta Lake or Iceberg","C) Delete entire table and rewrite","D) Update in-place on raw Parquet files"],answer:"B",d:"M"},
{q:"Your Spark job creates 10,000 small output files (1MB each). Downstream queries are slow due to file overhead. What Spark configuration helps?",options:["A) Increase parallelism to create more files","B) Use coalesce() or repartition() to reduce output files to a reasonable number","C) Convert output to CSV","D) Disable compression"],answer:"B",d:"M"},
{q:"A batch window shrinks from 8 hours to 4 hours due to business requirements, but the job takes 6 hours. Which optimization approach is most effective?",options:["A) Run the job less frequently","B) Optimize with incremental processing, partitioning, and caching frequently used datasets","C) Ask business to extend the window","D) Remove transformation steps"],answer:"B",d:"M"},
{q:"Your Spark job shuffles 200GB of data for a GROUP BY operation. The shuffle is the bottleneck. Which technique reduces shuffle volume?",options:["A) Add more GROUP BY columns","B) Pre-aggregate with combiner/partial aggregation before the shuffle (map-side aggregation)","C) Increase executor memory only","D) Remove the GROUP BY"],answer:"B",d:"M"},
{q:"A daily batch job depends on 3 upstream datasets arriving by midnight. Dataset C frequently arrives late at 2 AM. How should the pipeline handle this?",options:["A) Start at midnight and fail if C is missing","B) Implement a sensor/wait mechanism that polls for data readiness before starting processing","C) Process without dataset C and produce incorrect results","D) Cancel the job permanently"],answer:"B",d:"M"},
{q:"Your Spark cluster has 50 executors with 4 cores each. A job has 1000 tasks. What is the maximum task parallelism?",options:["A) 50 tasks at a time","B) 200 tasks at a time (50 executors x 4 cores)","C) 1000 tasks at a time","D) 4 tasks at a time"],answer:"B",d:"M"},
{q:"A batch pipeline must guarantee exactly-once processing even if the job is restarted midway. Which pattern provides this guarantee?",options:["A) At-most-once delivery","B) Idempotent writes with transaction IDs - reprocessing produces the same result","C) Fire-and-forget approach","D) Process each record twice for safety"],answer:"B",d:"M"},
{q:"Your Spark job processes 5TB with a join that causes 2TB shuffle. The job takes 8 hours. You need to reduce this to 2 hours without adding hardware. Which combination of techniques is most effective?",options:["A) Just increase partition count","B) Bucket the join tables by join key, enable AQE for dynamic partition coalescing, and use salting for skewed keys","C) Convert to single-node processing","D) Remove the join entirely"],answer:"B",d:"H"},
{q:"A batch job must process data from 50 source systems with different SLAs, schemas, and volumes. Some finish in minutes, others take hours. How do you maximize throughput?",options:["A) Process all sources sequentially","B) Implement a DAG with parallel source processing, dynamic resource allocation, and priority-based scheduling","C) Wait for the slowest source before starting any processing","D) Process only the fastest sources"],answer:"B",d:"H"},
{q:"Your batch cluster costs $10K/day. Data volume grows 30% monthly. In 6 months, costs will be unsustainable. Which architecture change provides long-term cost efficiency?",options:["A) Add more machines monthly","B) Move to serverless/auto-scaling (Spark on K8s or Serverless Spark) with spot instances and incremental processing to reduce data scanned","C) Reduce data retention to 1 day","D) Process data less frequently"],answer:"B",d:"H"},
{q:"A regulatory requirement mandates that batch job outputs are reproducible - running the same job on the same input must produce bit-identical output regardless of cluster size or parallelism. Which factors must be controlled?",options:["A) Only control input data","B) Fix partition ordering, use deterministic algorithms, control floating-point aggregation order, and version the processing logic","C) Use the same cluster size always","D) Reproducibility is impossible in distributed systems"],answer:"B",d:"H"},
{q:"Your batch pipeline has 500 DAGs with complex interdependencies. A single upstream failure cascades to 200 downstream jobs. How do you improve resilience?",options:["A) Remove all dependencies","B) Implement circuit breakers, isolation boundaries between critical/non-critical paths, selective retry with exponential backoff, and dependency-aware alerting","C) Run all jobs independently with no coordination","D) Reduce to 10 DAGs total"],answer:"B",d:"H"}
]},

{id:7,title:"Apache Airflow",color:"#fb923c",chips:["DAGs","Operators","Sensors","XComs","Scheduling"],
subtopics:[
{name:"DAGs (Directed Acyclic Graphs)",theory:["A DAG defines the workflow: tasks as nodes, dependencies as edges, with no circular dependencies.","DAG properties: schedule_interval, start_date, catchup, default_args control execution behavior.","DAGs are Python files in the dags/ folder; Airflow parses them to build the execution graph."],code:"from airflow import DAG\nfrom airflow.operators.python import PythonOperator\nfrom datetime import datetime, timedelta\n\ndefault_args = {\n    'owner': 'data_team',\n    'retries': 3,\n    'retry_delay': timedelta(minutes=5),\n    'email_on_failure': True,\n    'email': ['alerts@company.com']\n}\n\ndag = DAG(\n    'daily_etl_pipeline',\n    default_args=default_args,\n    description='Daily ETL for user analytics',\n    schedule_interval='0 2 * * *',  # Daily at 2 AM\n    start_date=datetime(2024, 1, 1),\n    catchup=False,\n    tags=['etl', 'production']\n)"},
{name:"Operators",theory:["Operators define a single unit of work: PythonOperator, BashOperator, SQLOperator, etc.","Transfer operators move data between systems (S3, GCS, databases, APIs).","Custom operators extend BaseOperator for reusable domain-specific logic."],code:"from airflow.operators.python import PythonOperator\nfrom airflow.operators.bash import BashOperator\nfrom airflow.providers.postgres.operators.postgres import PostgresOperator\n\n# Python Operator\ndef extract_data(**context):\n    execution_date = context['ds']\n    data = fetch_from_api(execution_date)\n    return data\n\nextract_task = PythonOperator(\n    task_id='extract_data',\n    python_callable=extract_data,\n    dag=dag\n)\n\n# Bash Operator\ndbt_run = BashOperator(\n    task_id='run_dbt_models',\n    bash_command='cd /opt/dbt && dbt run --models staging',\n    dag=dag\n)\n\n# SQL Operator\ncreate_table = PostgresOperator(\n    task_id='create_staging_table',\n    postgres_conn_id='warehouse',\n    sql='sql/create_staging.sql',\n    dag=dag\n)"},
{name:"Sensors",theory:["Sensors wait for a condition to be met before proceeding: file exists, partition available, time reached.","Modes: poke (keeps worker slot) vs reschedule (frees slot between checks) for resource efficiency.","Common sensors: FileSensor, ExternalTaskSensor, S3KeySensor, HttpSensor."],code:"from airflow.sensors.filesystem import FileSensor\nfrom airflow.sensors.external_task import ExternalTaskSensor\nfrom airflow.providers.http.sensors.http import HttpSensor\n\n# Wait for file to appear\nwait_for_file = FileSensor(\n    task_id='wait_for_source_file',\n    filepath='/data/incoming/users_{{ ds }}.csv',\n    poke_interval=300,  # Check every 5 minutes\n    timeout=3600,       # Fail after 1 hour\n    mode='reschedule',  # Free worker between checks\n    dag=dag\n)\n\n# Wait for upstream DAG to complete\nwait_for_upstream = ExternalTaskSensor(\n    task_id='wait_for_ingestion',\n    external_dag_id='raw_data_ingestion',\n    external_task_id='load_complete',\n    timeout=7200,\n    dag=dag\n)\n\n# Wait for API to be healthy\napi_check = HttpSensor(\n    task_id='check_api_health',\n    http_conn_id='source_api',\n    endpoint='/health',\n    response_check=lambda r: r.json()['status'] == 'ok',\n    dag=dag\n)"},
{name:"XComs (Cross-Communication)",theory:["XComs allow tasks to exchange small data (metadata, counts, file paths) between each other.","push with xcom_push() or return value from PythonOperator; pull with xcom_pull().","Avoid passing large data through XComs - use external storage (S3, database) for big datasets."],code:"from airflow.operators.python import PythonOperator\n\ndef extract_task(**context):\n    \"\"\"Extract and push metadata via XCom\"\"\"\n    data = fetch_data(context['ds'])\n    file_path = save_to_staging(data)\n    # Push to XCom (return value auto-pushed)\n    context['ti'].xcom_push(key='row_count', value=len(data))\n    return file_path  # Auto-pushed as return_value\n\ndef transform_task(**context):\n    \"\"\"Pull data location from upstream task\"\"\"\n    ti = context['ti']\n    file_path = ti.xcom_pull(task_ids='extract', key='return_value')\n    row_count = ti.xcom_pull(task_ids='extract', key='row_count')\n    print(f'Processing {row_count} rows from {file_path}')\n    transformed = process_file(file_path)\n    return transformed\n\nextract = PythonOperator(task_id='extract', python_callable=extract_task, dag=dag)\ntransform = PythonOperator(task_id='transform', python_callable=transform_task, dag=dag)\nextract >> transform"},
{name:"Task Dependencies & Scheduling",theory:["Set dependencies with >> (downstream) and << (upstream): task_a >> task_b means a runs before b.","Branching allows conditional paths: BranchPythonOperator selects which downstream task to run.","TaskGroups organize related tasks visually; trigger_rule controls when a task runs (all_success, one_success, etc.)."],code:"from airflow.operators.python import BranchPythonOperator\nfrom airflow.utils.task_group import TaskGroup\n\n# Linear dependency\nextract >> transform >> load\n\n# Parallel tasks\nextract >> [validate_schema, validate_quality] >> transform\n\n# Branching\ndef choose_branch(**context):\n    row_count = context['ti'].xcom_pull(task_ids='extract', key='row_count')\n    if row_count > 10000:\n        return 'process_large'\n    return 'process_small'\n\nbranch = BranchPythonOperator(\n    task_id='branch_on_size',\n    python_callable=choose_branch,\n    dag=dag\n)\n\n# Task Groups\nwith TaskGroup('quality_checks', dag=dag) as qc_group:\n    null_check = PythonOperator(task_id='null_check', python_callable=check_nulls)\n    schema_check = PythonOperator(task_id='schema_check', python_callable=check_schema)\n    freshness_check = PythonOperator(task_id='freshness_check', python_callable=check_freshness)\n\nextract >> qc_group >> transform"}
],

{title:"Complete ETL DAG",desc:"Full production ETL DAG with extraction, validation, transformation, and loading.",code:"from airflow import DAG\nfrom airflow.operators.python import PythonOperator\nfrom airflow.operators.bash import BashOperator\nfrom airflow.sensors.filesystem import FileSensor\nfrom datetime import datetime, timedelta\n\ndefault_args = {'owner': 'data_eng', 'retries': 2, 'retry_delay': timedelta(minutes=5)}\n\nwith DAG('user_analytics_etl', default_args=default_args,\n         schedule_interval='0 3 * * *', start_date=datetime(2024,1,1),\n         catchup=False) as dag:\n    \n    wait_file = FileSensor(task_id='wait_for_data', filepath='/data/users_{{ ds }}.csv', timeout=3600)\n    \n    def extract_fn(**ctx):\n        import pandas as pd\n        df = pd.read_csv(f\"/data/users_{ctx['ds']}.csv\")\n        df.to_parquet(f\"/staging/users_{ctx['ds']}.parquet\")\n        return len(df)\n    \n    extract = PythonOperator(task_id='extract', python_callable=extract_fn)\n    validate = BashOperator(task_id='validate', bash_command='python /scripts/validate.py {{ ds }}')\n    dbt_run = BashOperator(task_id='dbt_transform', bash_command='cd /dbt && dbt run --models users')\n    notify = BashOperator(task_id='notify', bash_command='echo \"Pipeline complete for {{ ds }}\"')\n    \n    wait_file >> extract >> validate >> dbt_run >> notify"},
{title:"Dynamic DAG Generation",desc:"Generate DAGs dynamically from configuration for multiple data sources.",code:"import yaml\nfrom airflow import DAG\nfrom airflow.operators.python import PythonOperator\nfrom datetime import datetime\n\n# config/sources.yaml defines pipeline configs\nsources = [\n    {'name': 'users', 'schedule': '0 2 * * *', 'source_type': 'postgres'},\n    {'name': 'orders', 'schedule': '0 3 * * *', 'source_type': 'mysql'},\n    {'name': 'events', 'schedule': '*/30 * * * *', 'source_type': 'api'}\n]\n\ndef create_etl_dag(config):\n    dag = DAG(\n        f\"etl_{config['name']}\",\n        schedule_interval=config['schedule'],\n        start_date=datetime(2024, 1, 1),\n        catchup=False\n    )\n    \n    def run_extract(**ctx):\n        print(f\"Extracting {config['name']} from {config['source_type']}\")\n    \n    def run_load(**ctx):\n        print(f\"Loading {config['name']} to warehouse\")\n    \n    with dag:\n        extract = PythonOperator(task_id='extract', python_callable=run_extract)\n        load = PythonOperator(task_id='load', python_callable=run_load)\n        extract >> load\n    return dag\n\nfor source in sources:\n    globals()[f\"etl_{source['name']}\"] = create_etl_dag(source)"},
{title:"DAG with Error Handling",desc:"Production DAG with retry, alerting, and SLA monitoring.",code:"from airflow import DAG\nfrom airflow.operators.python import PythonOperator\nfrom airflow.operators.email import EmailOperator\nfrom datetime import datetime, timedelta\n\ndef on_failure_callback(context):\n    task = context['task_instance']\n    print(f\"ALERT: Task {task.task_id} failed in DAG {task.dag_id}\")\n    # Send Slack/PagerDuty alert\n\ndefault_args = {\n    'owner': 'data_eng',\n    'retries': 3,\n    'retry_delay': timedelta(minutes=10),\n    'retry_exponential_backoff': True,\n    'on_failure_callback': on_failure_callback,\n    'sla': timedelta(hours=2)\n}\n\nwith DAG('critical_pipeline', default_args=default_args,\n         schedule_interval='0 4 * * *', start_date=datetime(2024,1,1)) as dag:\n    \n    def safe_extract(**ctx):\n        try:\n            data = extract_from_source(ctx['ds'])\n            if len(data) == 0:\n                raise ValueError('No data extracted - source may be down')\n            return data\n        except Exception as e:\n            raise  # Let Airflow handle retry\n    \n    extract = PythonOperator(task_id='extract', python_callable=safe_extract)\n    alert = EmailOperator(task_id='success_alert', to='team@co.com',\n                          subject='Pipeline {{ ds }} complete', html_content='All good!')\n    extract >> alert"}
],

{name:"Apache Kafka Fundamentals",theory:["Kafka is a distributed event streaming platform: producers publish messages to topics, consumers read them.","Topics are partitioned for parallelism; each partition is an ordered, immutable log of messages.","Consumer groups enable parallel consumption; each partition is read by exactly one consumer in the group."],code:"from kafka import KafkaProducer, KafkaConsumer\nimport json\n\n# Producer - publish events\nproducer = KafkaProducer(\n    bootstrap_servers='localhost:9092',\n    value_serializer=lambda v: json.dumps(v).encode('utf-8'),\n    acks='all'  # Wait for all replicas\n)\n\nevent = {'user_id': 123, 'action': 'purchase', 'amount': 59.99}\nproducer.send('user_events', value=event, key=b'user_123')\nproducer.flush()\n\n# Consumer - read events\nconsumer = KafkaConsumer(\n    'user_events',\n    bootstrap_servers='localhost:9092',\n    group_id='analytics_consumer',\n    auto_offset_reset='earliest',\n    value_deserializer=lambda m: json.loads(m.decode('utf-8'))\n)\n\nfor message in consumer:\n    event = message.value\n    print(f'Partition: {message.partition}, Offset: {message.offset}, Event: {event}')"},
{name:"Windowing Strategies",theory:["Tumbling windows: fixed-size, non-overlapping time intervals (e.g., every 5 minutes).","Sliding windows: fixed-size but overlapping; a new window starts at every slide interval.","Session windows: dynamic size based on activity gaps; closes after inactivity timeout."],code:"# Conceptual windowing implementations\nfrom datetime import datetime, timedelta\nfrom collections import defaultdict\n\nclass TumblingWindow:\n    \"\"\"Fixed non-overlapping windows\"\"\"\n    def __init__(self, window_size_seconds):\n        self.window_size = window_size_seconds\n        self.windows = defaultdict(list)\n    \n    def add_event(self, event, timestamp):\n        window_start = timestamp - (timestamp % self.window_size)\n        self.windows[window_start].append(event)\n    \n    def get_window(self, timestamp):\n        window_start = timestamp - (timestamp % self.window_size)\n        return self.windows[window_start]\n\n# Usage: 5-minute tumbling windows\nwindow = TumblingWindow(300)  # 300 seconds = 5 min\n\n# Session window concept\nclass SessionWindow:\n    def __init__(self, gap_seconds=300):\n        self.gap = gap_seconds\n        self.sessions = {}  # user_id -> {events, last_activity}\n    \n    def add_event(self, user_id, event, timestamp):\n        if user_id in self.sessions:\n            if timestamp - self.sessions[user_id]['last'] > self.gap:\n                self.flush_session(user_id)  # Session expired\n        if user_id not in self.sessions:\n            self.sessions[user_id] = {'events': [], 'last': 0}\n        self.sessions[user_id]['events'].append(event)\n        self.sessions[user_id]['last'] = timestamp"},
{name:"Event-Driven Architecture",theory:["Event-driven systems react to state changes (events) rather than polling or request-response patterns.","Events are immutable facts about what happened; event sourcing stores all state changes as events.","Benefits: loose coupling, scalability, real-time processing, and natural audit trail."],code:"# Event-driven processing pattern\nimport json\nfrom datetime import datetime\n\nclass EventProcessor:\n    def __init__(self):\n        self.handlers = {}\n    \n    def register(self, event_type, handler):\n        if event_type not in self.handlers:\n            self.handlers[event_type] = []\n        self.handlers[event_type].append(handler)\n    \n    def process(self, event):\n        event_type = event.get('type')\n        handlers = self.handlers.get(event_type, [])\n        for handler in handlers:\n            handler(event)\n\n# Register handlers\nprocessor = EventProcessor()\n\ndef update_user_profile(event):\n    print(f\"Updating profile for user {event['user_id']}\")\n\ndef send_welcome_email(event):\n    print(f\"Sending welcome to {event['email']}\")\n\ndef update_metrics(event):\n    print(f\"Incrementing signup counter\")\n\nprocessor.register('user_signup', update_user_profile)\nprocessor.register('user_signup', send_welcome_email)\nprocessor.register('user_signup', update_metrics)\n\n# Process incoming event\nprocessor.process({'type': 'user_signup', 'user_id': 42, 'email': 'new@user.com'})"},
{name:"Exactly-Once Semantics",theory:["At-most-once: fire and forget; messages may be lost (fastest, least reliable).","At-least-once: retry until acknowledged; may cause duplicates (common default).","Exactly-once: each message processed exactly once; requires idempotent processing or transactional guarantees."],code:"# Implementing exactly-once with idempotent consumer\nimport hashlib\nimport json\n\nclass IdempotentConsumer:\n    \"\"\"Achieves exactly-once by tracking processed message IDs\"\"\"\n    def __init__(self, state_store):\n        self.processed_ids = state_store  # Redis/DB set of processed IDs\n    \n    def process_message(self, message):\n        # Generate unique message ID\n        msg_id = self.get_message_id(message)\n        \n        # Check if already processed\n        if self.processed_ids.contains(msg_id):\n            print(f'Skipping duplicate: {msg_id}')\n            return None\n        \n        # Process the message\n        result = self.handle(message)\n        \n        # Mark as processed (atomically with processing if possible)\n        self.processed_ids.add(msg_id)\n        return result\n    \n    def get_message_id(self, message):\n        # Use message content hash or topic+partition+offset\n        content = json.dumps(message, sort_keys=True)\n        return hashlib.sha256(content.encode()).hexdigest()[:16]\n    \n    def handle(self, message):\n        # Actual business logic here\n        return {'status': 'processed', 'data': message}"},
{name:"Stream Processing Patterns",theory:["Enrichment: join streaming events with reference data (lookup tables) to add context.","Aggregation: compute running counts, sums, averages over windowed event streams.","Filtering & routing: direct events to different outputs based on content or rules."],code:"# Stream processing patterns\nfrom collections import defaultdict\n\nclass StreamProcessor:\n    def __init__(self):\n        self.aggregates = defaultdict(lambda: {'count': 0, 'total': 0})\n        self.enrichment_cache = {}  # Reference data cache\n    \n    def enrich(self, event):\n        \"\"\"Enrich event with reference data\"\"\"\n        user_id = event.get('user_id')\n        if user_id in self.enrichment_cache:\n            event['user_name'] = self.enrichment_cache[user_id]['name']\n            event['user_segment'] = self.enrichment_cache[user_id]['segment']\n        return event\n    \n    def aggregate(self, event, window_key):\n        \"\"\"Running aggregation\"\"\"\n        self.aggregates[window_key]['count'] += 1\n        self.aggregates[window_key]['total'] += event.get('amount', 0)\n        return self.aggregates[window_key]\n    \n    def route(self, event):\n        \"\"\"Route to different outputs based on rules\"\"\"\n        if event.get('amount', 0) > 1000:\n            return 'high_value_topic'\n        elif event.get('type') == 'error':\n            return 'error_topic'\n        return 'default_topic'\n\nprocessor = StreamProcessor()\nprocessor.enrichment_cache = {123: {'name': 'Alice', 'segment': 'premium'}}"}
],

{title:"Real-Time Event Counter",desc:"Count events per category in real-time using tumbling windows.",code:"from collections import defaultdict\nimport time\nimport json\n\nclass RealTimeCounter:\n    def __init__(self, window_seconds=60):\n        self.window_size = window_seconds\n        self.current_window = defaultdict(int)\n        self.window_start = int(time.time())\n    \n    def process_event(self, event):\n        now = int(time.time())\n        # Check if window expired\n        if now - self.window_start >= self.window_size:\n            self.emit_window()\n            self.current_window = defaultdict(int)\n            self.window_start = now\n        \n        category = event.get('category', 'unknown')\n        self.current_window[category] += 1\n    \n    def emit_window(self):\n        print(f'Window {self.window_start}: {dict(self.current_window)}')\n\n# Simulate\ncounter = RealTimeCounter(window_seconds=10)\nevents = [{'category': 'click'}, {'category': 'purchase'}, {'category': 'click'}]\nfor e in events:\n    counter.process_event(e)"},
{title:"Kafka Producer-Consumer Pipeline",desc:"Complete Kafka pipeline with producer, processing, and dead letter queue.",code:"from kafka import KafkaProducer, KafkaConsumer\nimport json\n\nclass EventPipeline:\n    def __init__(self, bootstrap_servers):\n        self.producer = KafkaProducer(\n            bootstrap_servers=bootstrap_servers,\n            value_serializer=lambda v: json.dumps(v).encode()\n        )\n        self.consumer = KafkaConsumer(\n            'input_events',\n            bootstrap_servers=bootstrap_servers,\n            group_id='processor_group',\n            value_deserializer=lambda m: json.loads(m.decode())\n        )\n    \n    def process_events(self):\n        for message in self.consumer:\n            try:\n                result = self.transform(message.value)\n                self.producer.send('output_events', value=result)\n            except Exception as e:\n                # Send to dead letter queue\n                error_event = {'original': message.value, 'error': str(e)}\n                self.producer.send('dead_letter_queue', value=error_event)\n    \n    def transform(self, event):\n        event['processed_at'] = '2024-01-01T00:00:00'\n        event['amount_usd'] = event.get('amount', 0) * 1.0\n        return event"},
{title:"Stream Aggregation with Late Events",desc:"Handle late-arriving events in stream aggregation using watermarks.",code:"from datetime import datetime, timedelta\nfrom collections import defaultdict\n\nclass WatermarkAggregator:\n    def __init__(self, window_size_min=5, watermark_delay_min=2):\n        self.window_size = timedelta(minutes=window_size_min)\n        self.watermark_delay = timedelta(minutes=watermark_delay_min)\n        self.windows = defaultdict(lambda: {'count': 0, 'sum': 0, 'closed': False})\n        self.watermark = datetime.min\n    \n    def process(self, event_time, value):\n        # Update watermark\n        self.watermark = max(self.watermark, event_time - self.watermark_delay)\n        \n        # Find window for this event\n        window_start = event_time.replace(second=0, microsecond=0)\n        window_start -= timedelta(minutes=window_start.minute % 5)\n        \n        # Check if event is too late\n        if window_start + self.window_size < self.watermark:\n            print(f'LATE EVENT dropped: {event_time}')\n            return None\n        \n        self.windows[window_start]['count'] += 1\n        self.windows[window_start]['sum'] += value\n        \n        # Close windows past watermark\n        for ws in list(self.windows.keys()):\n            if ws + self.window_size <= self.watermark and not self.windows[ws]['closed']:\n                self.windows[ws]['closed'] = True\n                self.emit(ws, self.windows[ws])\n    \n    def emit(self, window_start, data):\n        print(f'Window [{window_start}]: count={data[\"count\"]}, sum={data[\"sum\"]}')"}

{q:"A Kafka consumer reads messages but crashes before processing them. On restart, it re-reads the same messages. What delivery semantic is this?",options:["A) Exactly-once","B) At-least-once - messages are delivered again after crash","C) At-most-once","D) Zero delivery"],answer:"B",d:"E"},

{q:"A Kafka topic has retention set to 7 days. A consumer was offline for 10 days. What happens when it reconnects?",options:["A) It reads from the beginning of the topic","B) Oldest messages are gone; consumer starts from earliest available offset (data loss for those 3 days)","C) Kafka replays all 10 days of messages","D) Consumer cannot reconnect"],answer:"B",d:"E"},
{q:"Your streaming pipeline aggregates clickstream data in 1-hour windows. Some events arrive 15 minutes late. How do you handle this without losing them?",options:["A) Ignore late events","B) Configure watermark with allowed lateness of 15+ minutes to keep windows open for late data","C) Increase window size to 2 hours","D) Process late events in batch only"],answer:"B",d:"M"},
{q:"A Flink job reads from Kafka, aggregates per user per minute, and writes to Redis. The job crashes and restarts. How does Flink ensure no data loss?",options:["A) Kafka replays everything from the beginning","B) Flink checkpointing saves processing state and Kafka offsets, enabling recovery from last checkpoint","C) Redis has the complete data","D) Data loss is acceptable in streaming"],answer:"B",d:"M"},
{q:"Your stream processor needs to join a click event stream with a user profile stream. Clicks arrive continuously, profiles update rarely. Which join type is appropriate?",options:["A) Inner join with windowing only","B) Stream-table join (enrich stream with latest profile from changelog/table)","C) Full outer join with no time bounds","D) Cross join"],answer:"B",d:"M"},
{q:"A Kafka consumer group has 5 consumers and 5 partitions. You add a 6th consumer. What happens?",options:["A) All consumers get roughly equal partitions","B) The 6th consumer sits idle since there are only 5 partitions to assign","C) Partitions are split further","D) Kafka creates a 6th partition automatically"],answer:"B",d:"M"},
{q:"Your streaming pipeline must deduplicate events where the same event might arrive multiple times due to producer retries. Which approach works?",options:["A) Process every event assuming uniqueness","B) Maintain a state store of recent event IDs and skip events already seen","C) Increase Kafka replication factor","D) Use at-most-once delivery"],answer:"B",d:"M"},
{q:"A session window groups events by user activity. If no event arrives within 30 minutes, the session closes. A user clicks at 10:00, 10:15, 10:50. How many sessions?",options:["A) 1 session (all within 50 minutes)","B) 2 sessions (10:00-10:15 closes at 10:45; 10:50 starts a new session)","C) 3 sessions (one per click)","D) 0 sessions"],answer:"B",d:"M"},
{q:"Your stream processing app needs exactly-once delivery from Kafka to PostgreSQL. Which approach provides this end-to-end guarantee?",options:["A) At-least-once with no deduplication","B) Kafka transactions + idempotent consumer writing with UPSERT/deduplication in PostgreSQL","C) At-most-once to avoid duplicates","D) Writing to PostgreSQL without committing Kafka offsets"],answer:"B",d:"M"},
{q:"A Kafka topic receives 100K messages/second. A consumer processes only 10K/second. Consumer lag grows continuously. What is the best fix?",options:["A) Increase topic retention","B) Scale out by adding more consumers to the consumer group (and more partitions if needed)","C) Slow down the producer","D) Delete old messages faster"],answer:"B",d:"M"},
{q:"Your event-driven microservices architecture needs to maintain a materialized view that joins data from 3 Kafka topics in real-time with exactly-once semantics. Which pattern achieves this?",options:["A) Poll all 3 topics in a loop with no state","B) Kafka Streams with state stores, changelog topics for recovery, and exactly-once processing enabled (EOS)","C) Batch join every hour","D) Store raw events and join at query time only"],answer:"B",d:"H"},
{q:"A streaming pipeline must handle out-of-order events with event-time processing, but events can arrive up to 2 hours late. Using a 2-hour watermark causes 2-hour latency for results. How do you reduce latency while still handling late data?",options:["A) Use processing time instead of event time","B) Emit early speculative results on short watermark, then retract and update when late data arrives (retraction-based model)","C) Drop all late events","D) Wait the full 2 hours before emitting any results"],answer:"B",d:"H"},
{q:"Your streaming system processes 1M events/second. A downstream sink (database) can only handle 50K writes/second. What architecture prevents data loss while respecting sink throughput?",options:["A) Drop events exceeding 50K/s","B) Implement backpressure with buffering in Kafka, micro-batched writes to the sink, and flow control mechanisms","C) Speed up the database with no other changes","D) Reduce input event rate at the source"],answer:"B",d:"H"},
{q:"A fraud detection system needs to correlate events across a 24-hour window per user but has 10M active users. State management becomes the bottleneck. How do you scale state?",options:["A) Keep all state in memory on one node","B) Use partitioned state with RocksDB backend, keyed by user_id, with incremental checkpointing and state TTL for cleanup","C) Remove state entirely","D) Reduce active users"],answer:"B",d:"H"},
{q:"Your organization is migrating from batch to stream-first architecture. During migration, both must produce consistent results. Which pattern ensures correctness during the transition?",options:["A) Run only streaming and hope it works","B) Run both batch and streaming in parallel (dual-write), compare outputs for reconciliation, and gradually cut over after validation","C) Switch to streaming immediately with no validation","D) Keep batch forever"],answer:"B",d:"H"}
]},

{id:9,title:"Data Lakes & Lakehouses",color:"#60a5fa",chips:["Zones","Delta Lake","Iceberg","Hudi","Partitioning"],
subtopics:[
{name:"Data Lake Architecture & Zones",theory:["Data lakes store raw data in its native format on cheap object storage (S3, ADLS, GCS).","Medallion architecture: Bronze (raw), Silver (cleaned/conformed), Gold (aggregated/business-ready).","Each zone has different quality expectations, access patterns, and retention policies."],code:"# Data Lake zone structure\nDATA_LAKE_STRUCTURE = {\n    'bronze': {\n        'path': 's3://datalake/bronze/',\n        'description': 'Raw data as-is from source',\n        'format': 'json/csv/parquet',\n        'retention': '7 years',\n        'access': 'data_engineers'\n    },\n    'silver': {\n        'path': 's3://datalake/silver/',\n        'description': 'Cleaned, validated, conformed',\n        'format': 'delta/parquet',\n        'retention': '3 years',\n        'access': 'data_engineers, analysts'\n    },\n    'gold': {\n        'path': 's3://datalake/gold/',\n        'description': 'Business aggregates, KPIs',\n        'format': 'delta',\n        'retention': '5 years',\n        'access': 'all_users'\n    }\n}\n\n# Typical path pattern\n# s3://datalake/bronze/{source}/{table}/year={YYYY}/month={MM}/day={DD}/data.parquet"},
{name:"Delta Lake",theory:["Delta Lake adds ACID transactions, schema enforcement, and time travel on top of Parquet data lakes.","Transaction log (_delta_log/) records every change; enables rollback, audit, and concurrent writes.","MERGE operation enables upserts; VACUUM removes old files; OPTIMIZE compacts small files."],code:"# Delta Lake operations with PySpark\nfrom pyspark.sql import SparkSession\nfrom delta import DeltaTable\n\nspark = SparkSession.builder \\\n    .config('spark.jars.packages', 'io.delta:delta-core_2.12:2.4.0') \\\n    .config('spark.sql.extensions', 'io.delta.sql.DeltaSparkSessionExtension') \\\n    .getOrCreate()\n\n# Write Delta table\ndf.write.format('delta').mode('overwrite').save('/lake/silver/users')\n\n# Time travel\ndf_yesterday = spark.read.format('delta') \\\n    .option('timestampAsOf', '2024-01-14') \\\n    .load('/lake/silver/users')\n\n# MERGE (upsert)\ndelta_table = DeltaTable.forPath(spark, '/lake/silver/users')\ndelta_table.alias('t').merge(\n    updates_df.alias('s'), 't.user_id = s.user_id'\n).whenMatchedUpdateAll() \\\n .whenNotMatchedInsertAll() \\\n .execute()\n\n# Maintenance\nspark.sql('OPTIMIZE delta.`/lake/silver/users`')  # Compact files\nspark.sql('VACUUM delta.`/lake/silver/users` RETAIN 168 HOURS')  # Clean old"},
{name:"Apache Iceberg",theory:["Iceberg is an open table format with hidden partitioning - users query without knowing partition scheme.","Supports schema evolution (add/rename/drop columns) without rewriting data files.","Snapshot isolation allows concurrent reads and writes; metadata tracks which files belong to each snapshot."],code:"# Apache Iceberg with PySpark\nspark.sql(\"\"\"\n    CREATE TABLE catalog.db.events (\n        event_id BIGINT,\n        event_time TIMESTAMP,\n        user_id INT,\n        action STRING,\n        amount DECIMAL(10,2)\n    )\n    USING iceberg\n    PARTITIONED BY (days(event_time), bucket(16, user_id))\n\"\"\")\n\n# Hidden partitioning - query without partition knowledge\nspark.sql(\"\"\"\n    SELECT * FROM catalog.db.events\n    WHERE event_time > '2024-01-01'\n    AND user_id = 12345\n\"\"\")  # Automatically uses partition pruning\n\n# Schema evolution\nspark.sql(\"ALTER TABLE catalog.db.events ADD COLUMN region STRING\")\nspark.sql(\"ALTER TABLE catalog.db.events RENAME COLUMN action TO event_type\")\n\n# Time travel\nspark.sql(\"SELECT * FROM catalog.db.events VERSION AS OF 12345\")\nspark.sql(\"SELECT * FROM catalog.db.events TIMESTAMP AS OF '2024-01-14 10:00:00'\")"},
{name:"Apache Hudi",theory:["Hudi (Hadoop Upserts Deletes Incrementals) specializes in record-level upserts on data lakes.","Two table types: Copy-on-Write (optimize reads) and Merge-on-Read (optimize writes).","Built-in incremental queries pull only changed records since last read - ideal for CDC pipelines."],code:"# Hudi operations with PySpark\nhudi_options = {\n    'hoodie.table.name': 'users',\n    'hoodie.datasource.write.recordkey.field': 'user_id',\n    'hoodie.datasource.write.partitionpath.field': 'country',\n    'hoodie.datasource.write.precombine.field': 'updated_at',\n    'hoodie.datasource.write.operation': 'upsert',\n    'hoodie.upsert.shuffle.parallelism': 2\n}\n\n# Write/Upsert to Hudi table\ndf.write.format('hudi') \\\n    .options(**hudi_options) \\\n    .mode('append') \\\n    .save('/lake/hudi/users')\n\n# Incremental query (only changes since last read)\nincremental_df = spark.read.format('hudi') \\\n    .option('hoodie.datasource.query.type', 'incremental') \\\n    .option('hoodie.datasource.read.begin.instanttime', '20240114100000') \\\n    .load('/lake/hudi/users')"},
{name:"Partitioning Strategies",theory:["Partitioning divides data into subdirectories for efficient query pruning (skip irrelevant data).","Common partition keys: date (year/month/day), region, category - choose based on query patterns.","Avoid over-partitioning (too many small files) and under-partitioning (full scans on large data)."],code:"# Partitioning strategies\nimport pandas as pd\n\n# Time-based partitioning (most common)\n# Path: /data/events/year=2024/month=01/day=15/part-0000.parquet\ndf.to_parquet(\n    '/data/events/',\n    partition_cols=['year', 'month', 'day'],\n    engine='pyarrow'\n)\n\n# Partition sizing guidelines\n# Target: 128MB - 1GB per partition file\n# Too many partitions = small files problem\n# Too few partitions = slow queries\n\n# Calculate optimal partitions\ntotal_size_gb = 100\ntarget_file_mb = 256\nnum_partitions = int(total_size_gb * 1024 / target_file_mb)\nprint(f'Optimal partitions: {num_partitions}')\n\n# Bucketing (hash partitioning for even distribution)\n# Useful for join keys with high cardinality\n# PySpark: df.write.bucketBy(16, 'user_id').saveAsTable('events')"}
],

{title:"Medallion Architecture Pipeline",desc:"Complete Bronze -> Silver -> Gold pipeline using Delta Lake patterns.",code:"# Bronze: Raw ingestion (as-is)\ndef bronze_ingest(source_path, bronze_path):\n    raw_df = spark.read.json(source_path)\n    raw_df.withColumn('_ingested_at', current_timestamp()) \\\n          .withColumn('_source_file', input_file_name()) \\\n          .write.format('delta') \\\n          .mode('append') \\\n          .save(bronze_path)\n\n# Silver: Clean and conform\ndef silver_transform(bronze_path, silver_path):\n    bronze_df = spark.read.format('delta').load(bronze_path)\n    silver_df = bronze_df \\\n        .filter(col('user_id').isNotNull()) \\\n        .withColumn('email', lower(trim(col('email')))) \\\n        .withColumn('event_date', to_date(col('timestamp'))) \\\n        .dropDuplicates(['user_id', 'event_date', 'event_type'])\n    \n    # MERGE into silver (upsert)\n    DeltaTable.forPath(spark, silver_path).alias('t').merge(\n        silver_df.alias('s'), 't.user_id = s.user_id AND t.event_date = s.event_date'\n    ).whenMatchedUpdateAll().whenNotMatchedInsertAll().execute()\n\n# Gold: Business aggregates\ndef gold_aggregate(silver_path, gold_path):\n    silver_df = spark.read.format('delta').load(silver_path)\n    gold_df = silver_df.groupBy('event_date', 'event_type') \\\n        .agg(count('*').alias('event_count'), countDistinct('user_id').alias('unique_users'))\n    gold_df.write.format('delta').mode('overwrite').save(gold_path)"},
{title:"Data Lake File Organization",desc:"Organize a data lake with proper naming, partitioning, and metadata.",code:"import os\nfrom datetime import datetime\n\nclass DataLakeOrganizer:\n    def __init__(self, base_path):\n        self.base = base_path\n    \n    def get_path(self, zone, source, table, date=None, version=None):\n        path = f\"{self.base}/{zone}/{source}/{table}\"\n        if date:\n            path += f\"/year={date.year}/month={date.month:02d}/day={date.day:02d}\"\n        if version:\n            path += f\"/v{version}\"\n        return path\n    \n    def catalog_entry(self, zone, source, table):\n        return {\n            'table_name': f\"{zone}.{source}.{table}\",\n            'location': self.get_path(zone, source, table),\n            'format': 'delta' if zone in ['silver', 'gold'] else 'parquet',\n            'partition_cols': ['year', 'month', 'day'] if zone == 'bronze' else ['date'],\n            'owner': 'data_engineering',\n            'created_at': datetime.now().isoformat()\n        }\n\nlake = DataLakeOrganizer('s3://company-datalake')\nprint(lake.get_path('bronze', 'salesforce', 'contacts', datetime(2024,1,15)))"},
{title:"Small Files Compaction",desc:"Detect and compact small files in a data lake partition.",code:"import os\nimport pandas as pd\n\ndef compact_small_files(partition_path, target_size_mb=256):\n    \"\"\"Merge small files in a partition into larger ones\"\"\"\n    files = [f for f in os.listdir(partition_path) if f.endswith('.parquet')]\n    \n    # Check file sizes\n    small_files = []\n    for f in files:\n        size_mb = os.path.getsize(os.path.join(partition_path, f)) / (1024*1024)\n        if size_mb < target_size_mb * 0.5:  # Less than half target\n            small_files.append(f)\n    \n    if len(small_files) < 2:\n        print('No compaction needed')\n        return\n    \n    print(f'Compacting {len(small_files)} small files')\n    \n    # Read all small files\n    dfs = [pd.read_parquet(os.path.join(partition_path, f)) for f in small_files]\n    combined = pd.concat(dfs, ignore_index=True)\n    \n    # Write as single file\n    output_path = os.path.join(partition_path, 'compacted_part.parquet')\n    combined.to_parquet(output_path, index=False, compression='snappy')\n    \n    # Remove old small files\n    for f in small_files:\n        os.remove(os.path.join(partition_path, f))\n    \n    print(f'Compacted {len(small_files)} files -> 1 file ({len(combined)} rows)')"}
],
practice:[
{q:"A company stores raw JSON, CSV, and Parquet files in S3 with no schema enforcement. Queries are ad-hoc using Athena. What is this architecture?",options:["A) Data warehouse","B) Data lake - schema-on-read with raw diverse file formats","C) Data mesh","D) Operational database"],answer:"B",d:"E"},
{q:"Your data lake has thousands of unmanaged files. Users complain they cannot find the data they need. What critical component is missing?",options:["A) More storage","B) A data catalog that indexes and describes available datasets with metadata","C) Faster network","D) More file formats"],answer:"B",d:"E"},
{q:"A lakehouse combines features of data lakes and data warehouses. Which specific features from each does it take?",options:["A) Lake scalability only","B) Lake flexibility/cost (open formats, cheap storage) + warehouse features (ACID, schema enforcement, SQL analytics)","C) Warehouse cost + lake performance","D) Neither - its a completely new concept"],answer:"B",d:"E"},
{q:"Your data lake bronze layer stores raw data exactly as received from sources. What is the primary purpose of this layer?",options:["A) Serving business reports directly","B) Preserving original data for reprocessing and auditing","C) Aggregating metrics","D) Replacing the data warehouse"],answer:"B",d:"E"},
{q:"A data lake on S3 stores Parquet files. You need ACID transactions for concurrent reads and writes. Which technology adds this?",options:["A) S3 versioning alone","B) Delta Lake (or Iceberg/Hudi) providing transactional metadata layer over Parquet","C) Using CSV instead","D) S3 lifecycle policies"],answer:"B",d:"E"},
{q:"An analyst wants to query last month's version of a dataset that was since updated with corrections. Which lakehouse feature enables this?",options:["A) File backups","B) Time travel - querying historical versions of the data using transaction log","C) Creating manual copies before each update","D) This is not possible"],answer:"B",d:"E"},
{q:"Your data lake grew to 500TB over 3 years. Much of the data is never accessed. Which lakehouse feature helps manage storage costs?",options:["A) Delete everything older than 1 year","B) Storage tiering and VACUUM commands to remove old file versions no longer needed","C) Compress the entire lake into one file","D) Move to a more expensive storage class"],answer:"B",d:"E"},
{q:"Your Delta Lake table has 10,000 small Parquet files from frequent appends. Query performance has degraded. Which maintenance operation fixes this?",options:["A) Add more partitions","B) OPTIMIZE command to compact small files into larger ones (bin-packing)","C) Convert to CSV","D) Drop and recreate the table"],answer:"B",d:"M"},
{q:"A lakehouse partitions data by date (year/month/day). Queries filtering by customer_id are slow because they scan all partitions. What feature helps without repartitioning?",options:["A) More date partitions","B) Z-ordering (data clustering) by customer_id within existing partitions for data skipping","C) Removing partitions entirely","D) Converting to single file"],answer:"B",d:"M"},
{q:"Your data lake has separate compute and storage. Data is on S3, processing is on ephemeral Spark clusters. What is the key benefit of this separation?",options:["A) Faster network","B) Independent scaling of compute and storage, and pay only for compute when processing","C) Better data quality","D) Simpler architecture"],answer:"B",d:"M"},
{q:"Two concurrent pipelines write to the same Delta Lake table simultaneously. Pipeline A inserts rows while Pipeline B updates existing rows. How does Delta handle this?",options:["A) One pipeline fails with an error","B) Optimistic concurrency control - both succeed if they dont conflict on the same files, otherwise one retries","C) Both writes are lost","D) Delta locks the table blocking all concurrent access"],answer:"B",d:"M"},
{q:"Your lakehouse uses Iceberg table format. The schema needs a new column 'phone_number' without rewriting existing data. How does Iceberg handle this?",options:["A) Rewrite all existing Parquet files","B) Schema evolution - add column in metadata only; existing files return NULL for the new column","C) Create a completely new table","D) This is not possible with Iceberg"],answer:"B",d:"M"},
{q:"A data lake has no access controls. All users can read all data including PII. Moving to a lakehouse, which feature provides column-level security?",options:["A) File-level permissions only","B) Fine-grained access control with column masking policies (e.g., Unity Catalog or Lake Formation)","C) Encrypting the entire lake","D) Removing PII columns from all tables"],answer:"B",d:"M"},
{q:"Your lakehouse table was partitioned by 'country' (200 values). Now most queries filter by 'date'. How does Iceberg handle changing the partition strategy?",options:["A) Must delete and recreate the table","B) Partition evolution - change partition spec without rewriting data; new data uses new scheme","C) Not possible, partitions are fixed forever","D) Add date as a column only"],answer:"B",d:"M"},
{q:"A medallion architecture pipeline loads data bronze->silver->gold. A bug in the silver transformation was discovered. With Delta Lake, how do you fix historical data?",options:["A) Manually edit Parquet files","B) Time travel to identify when the bug started, reprocess affected data from bronze, and overwrite silver/gold layers","C) Ignore the bad data going forward","D) Delete the entire silver layer permanently"],answer:"B",d:"M"},
{q:"Your lakehouse serves both ML training (reading TBs of data) and BI dashboards (low-latency aggregations) from the same tables. How do you optimize for both workloads without duplicating data?",options:["A) Separate copies for each workload","B) Use materialized views/caching for BI with full table access for ML, and workload-specific cluster configurations sharing the same Delta/Iceberg tables","C) Force all users to use the same query pattern","D) Only support one workload type"],answer:"B",d:"H"},
{q:"A global company has data residency requirements (EU data must stay in EU, US data in US). Their lakehouse is on a single cloud region. How do you architect multi-region compliance?",options:["A) Move all data to one region","B) Federated lakehouse with region-specific storage and a unified metadata layer (catalog) that routes queries to appropriate region based on data residency tags","C) Duplicate all data to all regions","D) Ignore data residency requirements"],answer:"B",d:"H"},
{q:"Your Delta Lake table receives 10K writes/second from streaming plus hourly batch compaction. The transaction log (DeltaLog) grows huge causing slow metadata operations. What maintenance is needed?",options:["A) Delete the transaction log","B) CHECKPOINT the transaction log periodically (Delta does this automatically) and set log retention to limit history size","C) Stop all writes","D) Increase storage only"],answer:"B",d:"H"},
{q:"An enterprise lakehouse has 5000 tables across 20 teams. Governance requires: lineage tracking, quality metrics, access audit, and cost attribution per team. Which architecture delivers this?",options:["A) Manual spreadsheet tracking","B) Unified governance layer (Unity Catalog/Lake Formation) with automated lineage, quality observability, audit logs, and tag-based cost allocation","C) Each team manages their own governance","D) No governance needed at lake scale"],answer:"B",d:"H"},
{q:"Your lakehouse incrementally ingests from 100 CDC sources. Some sources replay old events during recovery causing duplicate rows. MERGE operations on large tables are slow. How do you optimize?",options:["A) Accept duplicates","B) Partition MERGE targets by source/date to limit scan scope, use bloom filters for efficient key lookup, and implement source-level dedup before merge","C) Full table rewrite on every merge","D) Disable MERGE and use append-only"],answer:"B",d:"H"}
]},

{id:10,title:"Cloud Data Engineering",color:"#f87171",chips:["AWS S3/Glue/Redshift","Azure ADF","GCP BigQuery"],
subtopics:[
{name:"AWS S3 & Data Lake Storage",theory:["S3 is the foundation for AWS data lakes: virtually unlimited, durable (11 nines), and cheap object storage.","Storage classes: Standard (frequent), IA (infrequent), Glacier (archive) - lifecycle policies automate transitions.","Best practices: use prefixes wisely for performance, enable versioning, encrypt at rest."],code:"import boto3\nimport pandas as pd\nfrom io import BytesIO\n\n# S3 client setup\ns3 = boto3.client('s3')\n\n# Upload data to S3\ndef upload_to_s3(df, bucket, key):\n    buffer = BytesIO()\n    df.to_parquet(buffer, index=False)\n    buffer.seek(0)\n    s3.put_object(Bucket=bucket, Key=key, Body=buffer.getvalue())\n    print(f'Uploaded to s3://{bucket}/{key}')\n\n# Read from S3\ndef read_from_s3(bucket, key):\n    obj = s3.get_object(Bucket=bucket, Key=key)\n    df = pd.read_parquet(BytesIO(obj['Body'].read()))\n    return df\n\n# List objects with prefix (partition discovery)\ndef list_partitions(bucket, prefix):\n    paginator = s3.get_paginator('list_objects_v2')\n    for page in paginator.paginate(Bucket=bucket, Prefix=prefix, Delimiter='/'):\n        for p in page.get('CommonPrefixes', []):\n            print(p['Prefix'])"},
{name:"AWS Glue ETL",theory:["Glue is a serverless ETL service with built-in Spark runtime, crawlers, and data catalog.","Crawlers auto-discover schema from S3/databases and register tables in the Glue Data Catalog.","Glue jobs run PySpark or Python shell scripts for transformation; auto-scaling and job bookmarks for incremental."],code:"# AWS Glue ETL job script\nimport sys\nfrom awsglue.transforms import *\nfrom awsglue.utils import getResolvedOptions\nfrom awsglue.context import GlueContext\nfrom pyspark.context import SparkContext\nfrom awsglue.job import Job\n\nargs = getResolvedOptions(sys.argv, ['JOB_NAME'])\nsc = SparkContext()\nglueContext = GlueContext(sc)\nspark = glueContext.spark_session\njob = Job(glueContext)\njob.init(args['JOB_NAME'], args)\n\n# Read from Glue Catalog\nsource = glueContext.create_dynamic_frame.from_catalog(\n    database='raw_db',\n    table_name='user_events'\n)\n\n# Transform\ntransformed = ApplyMapping.apply(\n    frame=source,\n    mappings=[\n        ('user_id', 'long', 'user_id', 'long'),\n        ('event_type', 'string', 'event_type', 'string'),\n        ('timestamp', 'string', 'event_time', 'timestamp')\n    ]\n)\n\n# Write to S3 in Parquet\nglueContext.write_dynamic_frame.from_options(\n    frame=transformed,\n    connection_type='s3',\n    connection_options={'path': 's3://lake/silver/events/'},\n    format='parquet'\n)\njob.commit()"},
{name:"Amazon Redshift",theory:["Redshift is a columnar MPP (Massively Parallel Processing) data warehouse for petabyte-scale analytics.","Distribution styles (KEY, EVEN, ALL) determine how data is spread across nodes for join optimization.","Sort keys define physical data ordering; Redshift Spectrum queries S3 data without loading."],code:"-- Redshift table with distribution and sort keys\nCREATE TABLE analytics.fact_sales (\n    sale_id BIGINT IDENTITY(1,1),\n    sale_date DATE SORTKEY,\n    customer_id INT,\n    product_id INT,\n    quantity INT,\n    amount DECIMAL(12,2)\n)\nDISTKEY(customer_id)  -- Distribute by join key\nCOMPOUND SORTKEY(sale_date, customer_id);\n\n-- COPY command for bulk loading from S3\nCOPY analytics.fact_sales\nFROM 's3://bucket/data/sales/'\nIAM_ROLE 'arn:aws:iam::123:role/RedshiftLoadRole'\nFORMAT AS PARQUET;\n\n-- Redshift Spectrum: query S3 directly\nCREATE EXTERNAL SCHEMA spectrum_schema\nFROM DATA CATALOG\nDATABASE 'lake_db'\nIAM_ROLE 'arn:aws:iam::123:role/SpectrumRole';\n\nSELECT date, COUNT(*) FROM spectrum_schema.events\nWHERE year = 2024 GROUP BY date;"},
{name:"Azure Data Factory & Synapse",theory:["Azure Data Factory (ADF) is a cloud ETL/ELT orchestration service with visual pipeline designer.","Synapse Analytics combines big data (Spark pools) and data warehousing (dedicated SQL pools) in one service.","ADLS Gen2 is Azure's data lake storage with hierarchical namespace for better file operations."],code:"# Azure Data Factory pipeline (JSON definition)\nadf_pipeline = {\n    'name': 'DailyETLPipeline',\n    'properties': {\n        'activities': [\n            {\n                'name': 'CopyFromSQL',\n                'type': 'Copy',\n                'inputs': [{'referenceName': 'SqlServerSource'}],\n                'outputs': [{'referenceName': 'ADLSSink'}],\n                'typeProperties': {\n                    'source': {'type': 'SqlSource', 'sqlReaderQuery': 'SELECT * FROM orders WHERE date = @{pipeline().parameters.date}'},\n                    'sink': {'type': 'ParquetSink'}\n                }\n            },\n            {\n                'name': 'RunDatabricks',\n                'type': 'DatabricksNotebook',\n                'dependsOn': [{'activity': 'CopyFromSQL', 'dependencyConditions': ['Succeeded']}],\n                'typeProperties': {\n                    'notebookPath': '/Transforms/silver_orders'\n                }\n            }\n        ]\n    }\n}\n\n# Python SDK for ADLS Gen2\nfrom azure.storage.filedatalake import DataLakeServiceClient\n\nservice = DataLakeServiceClient(account_url='https://account.dfs.core.windows.net', credential=cred)\nfs = service.get_file_system_client('datalake')\nfile = fs.get_file_client('bronze/orders/2024/01/data.parquet')"},
{name:"GCP BigQuery",theory:["BigQuery is a serverless, petabyte-scale analytics warehouse with built-in ML and geospatial support.","Columnar storage with automatic optimization; no indexes needed - full column scans are efficient.","Pricing model: on-demand (per TB scanned) or flat-rate (reserved slots); partitioning reduces costs."],code:"from google.cloud import bigquery\nimport pandas as pd\n\n# BigQuery client\nclient = bigquery.Client(project='my-project')\n\n# Load data from DataFrame\njob_config = bigquery.LoadJobConfig(\n    write_disposition='WRITE_TRUNCATE',\n    schema=[\n        bigquery.SchemaField('user_id', 'INTEGER'),\n        bigquery.SchemaField('event', 'STRING'),\n        bigquery.SchemaField('timestamp', 'TIMESTAMP'),\n    ]\n)\n\njob = client.load_table_from_dataframe(df, 'project.dataset.events', job_config=job_config)\njob.result()  # Wait for completion\n\n# Query with partitioning\nquery = '''\n    SELECT DATE(timestamp) as date, COUNT(*) as events\n    FROM `project.dataset.events`\n    WHERE timestamp >= '2024-01-01'\n    GROUP BY date\n    ORDER BY date\n'''\nresult_df = client.query(query).to_dataframe()\n\n# Create partitioned table\nclient.query('''\n    CREATE TABLE dataset.events_partitioned\n    PARTITION BY DATE(timestamp)\n    CLUSTER BY user_id\n    AS SELECT * FROM dataset.events\n''').result()"}

{title:"Multi-Cloud Data Pipeline",desc:"Abstract storage operations to support AWS S3 and GCS interchangeably.",code:"from abc import ABC, abstractmethod\n\nclass CloudStorage(ABC):\n    @abstractmethod\n    def upload(self, data, path): pass\n    @abstractmethod\n    def download(self, path): pass\n    @abstractmethod\n    def list_files(self, prefix): pass\n\nclass S3Storage(CloudStorage):\n    def __init__(self, bucket):\n        import boto3\n        self.s3 = boto3.client('s3')\n        self.bucket = bucket\n    def upload(self, data, path):\n        self.s3.put_object(Bucket=self.bucket, Key=path, Body=data)\n    def download(self, path):\n        return self.s3.get_object(Bucket=self.bucket, Key=path)['Body'].read()\n    def list_files(self, prefix):\n        resp = self.s3.list_objects_v2(Bucket=self.bucket, Prefix=prefix)\n        return [obj['Key'] for obj in resp.get('Contents', [])]\n\nclass GCSStorage(CloudStorage):\n    def __init__(self, bucket):\n        from google.cloud import storage\n        self.client = storage.Client()\n        self.bucket = self.client.bucket(bucket)\n    def upload(self, data, path):\n        self.bucket.blob(path).upload_from_string(data)\n    def download(self, path):\n        return self.bucket.blob(path).download_as_bytes()\n    def list_files(self, prefix):\n        return [b.name for b in self.bucket.list_blobs(prefix=prefix)]"},
{title:"Serverless ETL with AWS Lambda + Glue",desc:"Event-driven ETL: S3 upload triggers Lambda which starts Glue job.",code:"# Lambda function triggered by S3 event\nimport json\nimport boto3\n\ndef lambda_handler(event, context):\n    glue = boto3.client('glue')\n    \n    # Get file info from S3 event\n    record = event['Records'][0]\n    bucket = record['s3']['bucket']['name']\n    key = record['s3']['object']['key']\n    \n    # Parse partition from path: bronze/orders/year=2024/month=01/\n    parts = key.split('/')\n    source = parts[1]  # 'orders'\n    \n    # Trigger appropriate Glue job\n    response = glue.start_job_run(\n        JobName=f'transform_{source}',\n        Arguments={\n            '--source_path': f's3://{bucket}/{key}',\n            '--execution_date': context.invoked_function_arn\n        }\n    )\n    \n    return {\n        'statusCode': 200,\n        'body': json.dumps(f\"Started job run: {response['JobRunId']}\")\n    }"},
{title:"BigQuery Cost Optimization",desc:"Techniques to reduce BigQuery query costs with partitioning and clustering.",code:"from google.cloud import bigquery\n\nclient = bigquery.Client()\n\n# Estimate query cost before running\ndef estimate_cost(query, cost_per_tb=5.0):\n    job_config = bigquery.QueryJobConfig(dry_run=True, use_query_cache=False)\n    job = client.query(query, job_config=job_config)\n    bytes_processed = job.total_bytes_processed\n    cost = (bytes_processed / 1e12) * cost_per_tb\n    print(f'Estimated: {bytes_processed/1e9:.2f} GB, Cost: ${cost:.4f}')\n    return cost\n\n# Optimized: partition + cluster + column selection\noptimized_query = '''\n    SELECT user_id, event_type, COUNT(*) as cnt\n    FROM `project.dataset.events`\n    WHERE DATE(event_time) BETWEEN '2024-01-01' AND '2024-01-31'\n    AND event_type IN ('purchase', 'signup')\n    GROUP BY 1, 2\n'''\n\n# Anti-pattern: SELECT * without partition filter\nbad_query = 'SELECT * FROM `project.dataset.events`'\n\nestimate_cost(optimized_query)  # Much cheaper\nestimate_cost(bad_query)        # Full table scan = expensive"}

{name:"Pipeline Orchestration Patterns",theory:["Orchestration coordinates multiple tasks with dependencies, scheduling, and state management.","Fan-out/fan-in: split work into parallel branches then merge results for final processing.","Event-driven vs time-driven: trigger on data arrival vs fixed schedules (or hybrid)."],code:"# Pipeline orchestration framework\nfrom enum import Enum\nfrom datetime import datetime\n\nclass TaskStatus(Enum):\n    PENDING = 'pending'\n    RUNNING = 'running'\n    SUCCESS = 'success'\n    FAILED = 'failed'\n    SKIPPED = 'skipped'\n\nclass Pipeline:\n    def __init__(self, name):\n        self.name = name\n        self.tasks = {}\n        self.dependencies = {}\n    \n    def add_task(self, name, fn, depends_on=None):\n        self.tasks[name] = {'fn': fn, 'status': TaskStatus.PENDING}\n        self.dependencies[name] = depends_on or []\n    \n    def get_ready_tasks(self):\n        ready = []\n        for name, task in self.tasks.items():\n            if task['status'] != TaskStatus.PENDING:\n                continue\n            deps_met = all(\n                self.tasks[d]['status'] == TaskStatus.SUCCESS\n                for d in self.dependencies[name]\n            )\n            if deps_met:\n                ready.append(name)\n        return ready\n    \n    def run(self):\n        while True:\n            ready = self.get_ready_tasks()\n            if not ready:\n                break\n            for task_name in ready:\n                self.execute_task(task_name)"},
{name:"Error Handling & Dead Letter Queues",theory:["Classify errors: transient (retry-able: timeouts, rate limits) vs permanent (bad data, schema mismatch).","Dead Letter Queues (DLQ) capture failed records for later investigation without blocking the pipeline.","Circuit breaker pattern: stop calling a failing service after N consecutive failures to prevent cascade."],code:"import time\nfrom functools import wraps\n\nclass PipelineError(Exception):\n    def __init__(self, message, record=None, retryable=True):\n        super().__init__(message)\n        self.record = record\n        self.retryable = retryable\n\nclass DeadLetterQueue:\n    def __init__(self):\n        self.failed_records = []\n    \n    def send(self, record, error, task_name):\n        self.failed_records.append({\n            'record': record,\n            'error': str(error),\n            'task': task_name,\n            'timestamp': time.time()\n        })\n    \n    def get_failures(self, task_name=None):\n        if task_name:\n            return [r for r in self.failed_records if r['task'] == task_name]\n        return self.failed_records\n\ndef process_with_dlq(records, processor, dlq, task_name):\n    \"\"\"Process records, sending failures to DLQ\"\"\"\n    success_count = 0\n    for record in records:\n        try:\n            processor(record)\n            success_count += 1\n        except Exception as e:\n            dlq.send(record, e, task_name)\n    return {'success': success_count, 'failed': len(records) - success_count}"},
{name:"Retry Strategies",theory:["Exponential backoff: wait 1s, 2s, 4s, 8s... between retries to avoid overwhelming failing services.","Jitter adds randomness to backoff to prevent thundering herd when many clients retry simultaneously.","Max retries and timeout caps prevent infinite retry loops; after max retries, send to DLQ."],code:"import time\nimport random\nfrom functools import wraps\n\ndef retry_with_backoff(max_retries=3, base_delay=1, max_delay=60, jitter=True):\n    \"\"\"Decorator for retry with exponential backoff\"\"\"\n    def decorator(func):\n        @wraps(func)\n        def wrapper(*args, **kwargs):\n            for attempt in range(max_retries + 1):\n                try:\n                    return func(*args, **kwargs)\n                except Exception as e:\n                    if attempt == max_retries:\n                        raise\n                    delay = min(base_delay * (2 ** attempt), max_delay)\n                    if jitter:\n                        delay = delay * (0.5 + random.random())\n                    print(f'Retry {attempt+1}/{max_retries} after {delay:.1f}s: {e}')\n                    time.sleep(delay)\n        return wrapper\n    return decorator\n\n@retry_with_backoff(max_retries=5, base_delay=2)\ndef call_api(endpoint):\n    response = requests.get(endpoint, timeout=30)\n    response.raise_for_status()\n    return response.json()"},
{name:"Monitoring & Alerting",theory:["Monitor: pipeline duration, row counts, error rates, data freshness, and resource utilization.","Set SLAs (Service Level Agreements) for data availability; alert when delivery time exceeds threshold.","Structured logging with correlation IDs enables tracing a single record through the entire pipeline."],code:"import logging\nimport time\nfrom datetime import datetime\n\n# Structured logging setup\nlogging.basicConfig(format='%(asctime)s [%(levelname)s] %(message)s')\nlogger = logging.getLogger('pipeline')\n\nclass PipelineMonitor:\n    def __init__(self, pipeline_name):\n        self.pipeline = pipeline_name\n        self.metrics = {}\n    \n    def start_task(self, task_name):\n        self.metrics[task_name] = {'start': time.time(), 'status': 'running'}\n        logger.info(f'[{self.pipeline}] Task {task_name} STARTED')\n    \n    def end_task(self, task_name, row_count=0, status='success'):\n        duration = time.time() - self.metrics[task_name]['start']\n        self.metrics[task_name].update({\n            'duration': duration, 'rows': row_count, 'status': status\n        })\n        logger.info(f'[{self.pipeline}] Task {task_name} {status.upper()} '\n                   f'({duration:.1f}s, {row_count} rows)')\n    \n    def check_sla(self, max_duration_minutes):\n        total = sum(m.get('duration', 0) for m in self.metrics.values())\n        if total / 60 > max_duration_minutes:\n            logger.warning(f'SLA BREACH: {total/60:.1f} min > {max_duration_minutes} min')\n            self.send_alert(f'Pipeline {self.pipeline} exceeded SLA')\n    \n    def send_alert(self, message):\n        # Send to Slack/PagerDuty/email\n        logger.critical(f'ALERT: {message}')"},
{name:"Pipeline Design Patterns",theory:["Mediator pattern: central coordinator manages task execution order and data flow between steps.","Pipeline as code: define pipelines in version-controlled code for reproducibility and CI/CD.","Separation of concerns: keep extraction, transformation, and loading logic in separate modules."],code:"# Pipeline as code - modular design\nfrom abc import ABC, abstractmethod\n\nclass PipelineStep(ABC):\n    @abstractmethod\n    def run(self, context: dict) -> dict:\n        pass\n    \n    @property\n    def name(self) -> str:\n        return self.__class__.__name__\n\nclass ExtractUsers(PipelineStep):\n    def run(self, context):\n        df = pd.read_sql('SELECT * FROM users', context['source_conn'])\n        context['users_df'] = df\n        context['extract_count'] = len(df)\n        return context\n\nclass ValidateUsers(PipelineStep):\n    def run(self, context):\n        df = context['users_df']\n        assert df['email'].notna().all(), 'Null emails found'\n        assert len(df) > 0, 'No records extracted'\n        return context\n\nclass LoadUsers(PipelineStep):\n    def run(self, context):\n        df = context['users_df']\n        df.to_sql('dim_users', context['target_conn'], if_exists='replace')\n        return context\n\n# Execute pipeline\ndef run_pipeline(steps, initial_context):\n    context = initial_context\n    for step in steps:\n        print(f'Running: {step.name}')\n        context = step.run(context)\n    return context\n\nrun_pipeline([ExtractUsers(), ValidateUsers(), LoadUsers()], {'source_conn': src, 'target_conn': tgt})"}

{title:"Production Pipeline with Full Observability",desc:"Pipeline with monitoring, alerting, retry, and dead letter queue.",code:"import time\nimport logging\n\nclass ProductionPipeline:\n    def __init__(self, name):\n        self.name = name\n        self.monitor = PipelineMonitor(name)\n        self.dlq = DeadLetterQueue()\n        self.logger = logging.getLogger(name)\n    \n    @retry_with_backoff(max_retries=3)\n    def extract(self, source):\n        self.monitor.start_task('extract')\n        data = fetch_data(source)\n        self.monitor.end_task('extract', row_count=len(data))\n        return data\n    \n    def transform(self, data):\n        self.monitor.start_task('transform')\n        results = process_with_dlq(data, transform_record, self.dlq, 'transform')\n        self.monitor.end_task('transform', row_count=results['success'])\n        if results['failed'] > len(data) * 0.1:  # >10% failure\n            raise Exception(f\"Too many failures: {results['failed']}/{len(data)}\")\n        return results\n    \n    def run(self):\n        try:\n            data = self.extract('api://source')\n            results = self.transform(data)\n            self.monitor.check_sla(max_duration_minutes=30)\n            self.logger.info(f'Pipeline {self.name} completed successfully')\n        except Exception as e:\n            self.logger.error(f'Pipeline {self.name} FAILED: {e}')\n            self.monitor.send_alert(str(e))\n            raise"},
{title:"Circuit Breaker Pattern",desc:"Stop calling a failing service after consecutive failures.",code:"import time\n\nclass CircuitBreaker:\n    def __init__(self, failure_threshold=5, reset_timeout=60):\n        self.failure_threshold = failure_threshold\n        self.reset_timeout = reset_timeout\n        self.failures = 0\n        self.last_failure_time = 0\n        self.state = 'CLOSED'  # CLOSED, OPEN, HALF_OPEN\n    \n    def call(self, func, *args, **kwargs):\n        if self.state == 'OPEN':\n            if time.time() - self.last_failure_time > self.reset_timeout:\n                self.state = 'HALF_OPEN'\n            else:\n                raise Exception('Circuit breaker is OPEN')\n        \n        try:\n            result = func(*args, **kwargs)\n            self.on_success()\n            return result\n        except Exception as e:\n            self.on_failure()\n            raise\n    \n    def on_success(self):\n        self.failures = 0\n        self.state = 'CLOSED'\n    \n    def on_failure(self):\n        self.failures += 1\n        self.last_failure_time = time.time()\n        if self.failures >= self.failure_threshold:\n            self.state = 'OPEN'\n\n# Usage\nbreaker = CircuitBreaker(failure_threshold=3, reset_timeout=30)\ntry:\n    result = breaker.call(requests.get, 'https://api.example.com/data')\nexcept Exception as e:\n    print(f'Service unavailable: {e}')"},
{title:"Data Pipeline DAG Executor",desc:"Execute a DAG of tasks respecting dependencies with parallel execution.",code:"from concurrent.futures import ThreadPoolExecutor, as_completed\n\nclass DAGExecutor:\n    def __init__(self, max_workers=4):\n        self.tasks = {}\n        self.deps = {}\n        self.results = {}\n        self.max_workers = max_workers\n    \n    def add_task(self, name, fn, depends_on=None):\n        self.tasks[name] = fn\n        self.deps[name] = set(depends_on or [])\n    \n    def run(self):\n        completed = set()\n        with ThreadPoolExecutor(max_workers=self.max_workers) as executor:\n            while len(completed) < len(self.tasks):\n                # Find ready tasks\n                ready = [\n                    name for name, deps in self.deps.items()\n                    if name not in completed and deps.issubset(completed)\n                ]\n                futures = {executor.submit(self.tasks[name]): name for name in ready}\n                for future in as_completed(futures):\n                    name = futures[future]\n                    try:\n                        self.results[name] = future.result()\n                        completed.add(name)\n                        print(f'Task {name}: SUCCESS')\n                    except Exception as e:\n                        print(f'Task {name}: FAILED - {e}')\n                        raise\n        return self.results\n\ndag = DAGExecutor()\ndag.add_task('extract_a', lambda: extract('source_a'))\ndag.add_task('extract_b', lambda: extract('source_b'))\ndag.add_task('join', lambda: join_data(), depends_on=['extract_a', 'extract_b'])\ndag.run()"}
