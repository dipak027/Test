<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSA Learning Roadmap - Python</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#080c14;--card:#141d2e;--border:#1e2d45;--text:#dde4f0;--text-dim:#8892a4;--green:#4ade80;--cyan:#22d3ee;--purple:#a78bfa;--gradient:linear-gradient(135deg,#4ade80,#22d3ee,#a78bfa)}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
code,pre,.code{font-family:'JetBrains Mono',monospace}
.header{position:sticky;top:0;z-index:1000;background:rgba(8,12,20,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:12px 24px}
.header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:1.4rem;font-weight:700;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.progress-container{flex:1;max-width:300px;margin-left:24px}
.progress-label{font-size:0.7rem;color:var(--text-dim);margin-bottom:4px;text-align:right}
.progress-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:var(--gradient);border-radius:3px;transition:width 0.5s ease}
.page{display:none;padding:40px 24px 80px;max-width:900px;margin:0 auto;animation:fadeIn 0.3s ease}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.section-label{font-size:0.75rem;text-transform:uppercase;letter-spacing:2px;color:var(--text-dim);margin:32px 0 16px;padding-left:60px}
.roadmap{position:relative;padding-left:60px}
.roadmap::before{content:'';position:absolute;left:28px;top:0;bottom:0;width:2px;background:linear-gradient(to bottom,var(--green),var(--cyan),var(--purple));opacity:0.4}
.node{position:relative;margin-bottom:24px;cursor:pointer;transition:transform 0.2s ease}
.node:hover{transform:translateX(4px)}
.node-number{position:absolute;left:-48px;top:16px;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.8rem;border:2px solid;background:var(--bg)}
.node-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px 24px;transition:border-color 0.2s,box-shadow 0.2s}
.node:hover .node-card{border-color:var(--cyan);box-shadow:0 4px 20px rgba(34,211,238,0.1)}
.node-title{font-size:1.1rem;font-weight:600;margin-bottom:8px}
.node-chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{font-size:0.65rem;padding:3px 8px;border-radius:4px;background:rgba(255,255,255,0.05);border:1px solid var(--border);color:var(--text-dim)}
.node-progress{font-size:0.7rem;color:var(--text-dim);margin-top:8px}
.back-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);cursor:pointer;font-family:'Sora',sans-serif;font-size:0.85rem;margin-bottom:24px;transition:border-color 0.2s}
.back-btn:hover{border-color:var(--cyan)}
.detail-header{margin-bottom:24px}
.detail-title{font-size:1.8rem;font-weight:700;margin-bottom:8px}
.detail-subtitle{font-size:0.85rem;color:var(--text-dim)}
.tabs{display:flex;gap:4px;margin-bottom:24px;background:var(--card);border-radius:10px;padding:4px;border:1px solid var(--border)}
.tab{flex:1;padding:10px 16px;text-align:center;border-radius:8px;cursor:pointer;font-size:0.85rem;font-weight:500;color:var(--text-dim);transition:all 0.2s}
.tab.active{background:var(--border);color:var(--text)}
.tab:hover:not(.active){color:var(--text)}
.tab-content{display:none;animation:fadeIn 0.3s ease}
.tab-content.active{display:block}
.theory-section{margin-bottom:24px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px}
.theory-title{font-size:1rem;font-weight:600;margin-bottom:12px;color:var(--cyan)}
.theory-point{font-size:0.85rem;color:var(--text-dim);margin-bottom:8px;padding-left:16px;position:relative;line-height:1.6}
.theory-point::before{content:'>';position:absolute;left:0;color:var(--green)}
.complexity-badge{display:inline-block;font-size:0.7rem;padding:2px 8px;border-radius:4px;margin-top:4px;font-family:'JetBrains Mono',monospace}
.complexity-badge.time{background:rgba(34,211,238,0.15);color:#22d3ee}
.complexity-badge.space{background:rgba(167,139,250,0.15);color:#a78bfa}
pre.code-block{background:rgba(0,0,0,0.4);border:1px solid var(--border);border-radius:8px;padding:16px;margin-top:12px;overflow-x:auto;font-size:0.78rem;line-height:1.6}
.example-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:16px}
.example-title{font-size:0.9rem;font-weight:600;margin-bottom:8px;color:var(--purple)}
.example-desc{font-size:0.82rem;color:var(--text-dim);margin-bottom:12px;line-height:1.5}
.approach-box{background:rgba(74,222,128,0.05);border:1px solid rgba(74,222,128,0.2);border-radius:6px;padding:10px 12px;margin-bottom:12px}
.approach-label{font-size:0.7rem;color:var(--green);font-weight:600;margin-bottom:4px;text-transform:uppercase}
.approach-text{font-size:0.8rem;color:var(--text-dim);line-height:1.5}
.practice-item{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;transition:border-color 0.2s}
.practice-item:hover{border-color:var(--cyan)}
.practice-item input[type="checkbox"]{width:18px;height:18px;margin-top:2px;accent-color:var(--green);cursor:pointer;flex-shrink:0}
.practice-item.done{opacity:0.6;border-color:var(--green)}
.practice-text{flex:1;font-size:0.82rem;line-height:1.5}
.practice-approach{font-size:0.72rem;color:var(--text-dim);font-style:italic;margin-top:4px}
.difficulty{font-size:0.65rem;padding:2px 8px;border-radius:4px;font-weight:600;white-space:nowrap}
.difficulty.easy{background:rgba(74,222,128,0.15);color:#4ade80}
.difficulty.medium{background:rgba(251,191,36,0.15);color:#fbbf24}
.difficulty.hard{background:rgba(244,114,182,0.15);color:#f472b6}
.kw{color:#c084fc}.fn{color:#22d3ee}.st{color:#4ade80}.cm{color:#6b7280}.nu{color:#fbbf24}.op{color:#f472b6}
.difficulty-header{font-size:0.85rem;font-weight:600;margin:16px 0 8px;padding:6px 12px;border-radius:6px}
.difficulty-header.easy-h{background:rgba(74,222,128,0.08);color:#4ade80;border-left:3px solid #4ade80}
.difficulty-header.medium-h{background:rgba(251,191,36,0.08);color:#fbbf24;border-left:3px solid #fbbf24}
.difficulty-header.hard-h{background:rgba(244,114,182,0.08);color:#f472b6;border-left:3px solid #f472b6}
@media(max-width:640px){.roadmap{padding-left:40px}.roadmap::before{left:16px}.node-number{left:-32px;width:26px;height:26px;font-size:0.7rem}.header-inner{flex-wrap:wrap;gap:8px}.progress-container{max-width:100%;margin-left:0}.section-label{padding-left:40px}}
</style>
</head>
<body>
<header class="header">
<div class="header-inner">
<div class="logo">DSA Roadmap</div>
<div class="progress-container">
<div class="progress-label"><span id="progressText">0 / 400</span> completed</div>
<div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
</div>
</div>
</header>
<div class="page active" id="roadmapPage">

</div>

</div>
<div class="tabs">

<div class="tab" onclick="switchTab('examples')">Examples</div>
<div class="tab" onclick="switchTab('practice')">Practice</div>
</div>
<div class="tab-content active" id="theoryContent"></div>
<div class="tab-content" id="examplesContent"></div>
<div class="tab-content" id="practiceContent"></div>
</div>
<script>
const STORAGE_KEY='dsa_roadmap_progress';
function loadProgress(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||{}}catch(e){return{}}}
function saveProgress(p){localStorage.setItem(STORAGE_KEY,JSON.stringify(p))}

const topics=[
{id:1,title:"Arrays & Hashing",color:"#38bdf8",section:"Data Structures",chips:["Array Ops","Hash Maps","Frequency","Two Sum"],
subtopics:[
{name:"Array Basics & Operations",theory:["Arrays store elements in contiguous memory; Python lists are dynamic arrays.","Access by index is O(1); appending is amortized O(1); inserting/deleting at arbitrary position is O(n).","Slicing creates a new list in O(k) where k is slice size."],tc:"O(1) access, O(n) search/insert",sc:"O(n)",code:"# Array operations\narr = [1, 2, 3, 4, 5]\narr.append(6)        # O(1) amortized\narr.insert(0, 0)     # O(n) - shifts elements\narr.pop()            # O(1) - remove last\narr.pop(0)           # O(n) - shifts elements\nval = arr[2]         # O(1) - direct access\nprint(3 in arr)      # O(n) - linear search"},
{name:"Hash Maps (dict)",theory:["Python dict uses hash table internally; average O(1) lookup, insert, delete.","Keys must be hashable (immutable types like str, int, tuple).","Worst case O(n) due to hash collisions, but rare with good hash functions."],tc:"O(1) avg lookup/insert/delete",sc:"O(n)",code:"# Hash Map operations\nhash_map = {}\nhash_map['apple'] = 5      # O(1) insert\nhash_map['banana'] = 3\nprint(hash_map.get('apple'))  # O(1) lookup\nprint('cherry' in hash_map)   # O(1) membership\ndel hash_map['banana']        # O(1) delete\n\n# Two Sum using hash map\ndef two_sum(nums, target):\n    seen = {}\n    for i, num in enumerate(nums):\n        comp = target - num\n        if comp in seen:\n            return [seen[comp], i]\n        seen[num] = i\n    return []"},
{name:"Frequency Counting",theory:["Count occurrences using dict or collections.Counter.","Counter is a dict subclass; most_common(k) returns k most frequent elements.","Useful for anagrams, duplicates, and majority element problems."],tc:"O(n) to build frequency map",sc:"O(k) where k = unique elements",code:"from collections import Counter\n\nnums = [1, 2, 2, 3, 3, 3]\nfreq = Counter(nums)  # Counter({3: 3, 2: 2, 1: 1})\nprint(freq.most_common(2))  # [(3, 3), (2, 2)]\n\n# Manual frequency count\ndef count_freq(arr):\n    freq = {}\n    for x in arr:\n        freq[x] = freq.get(x, 0) + 1\n    return freq"},
{name:"Prefix Sum Array",theory:["Prefix sum allows O(1) range sum queries after O(n) preprocessing.","prefix[i] = sum of arr[0..i-1]; range sum(l,r) = prefix[r+1] - prefix[l].","Useful for subarray sum problems and 2D matrix queries."],tc:"O(n) build, O(1) per query",sc:"O(n)",code:"# Prefix Sum\ndef build_prefix(arr):\n    prefix = [0] * (len(arr) + 1)\n    for i in range(len(arr)):\n        prefix[i+1] = prefix[i] + arr[i]\n    return prefix\n\ndef range_sum(prefix, l, r):\n    return prefix[r+1] - prefix[l]\n\narr = [2, 4, 1, 3, 5]\nprefix = build_prefix(arr)\nprint(range_sum(prefix, 1, 3))  # 4+1+3 = 8"},
{name:"Kadane's Algorithm (Max Subarray)",theory:["Finds maximum sum contiguous subarray in O(n) time.","Track current_max (max ending here) and global_max (overall best).","Reset current_max to current element when it becomes negative."],tc:"O(n)",sc:"O(1)",code:"def max_subarray(nums):\n    current_max = global_max = nums[0]\n    for num in nums[1:]:\n        current_max = max(num, current_max + num)\n        global_max = max(global_max, current_max)\n    return global_max\n\nprint(max_subarray([-2,1,-3,4,-1,2,1,-5,4]))  # 6"}
],
examples:[
{title:"Two Sum Problem",desc:"Given an array of integers and a target, return indices of two numbers that add up to target.",approach:"Use a hash map to store each number's index. For each element, check if (target - current) exists in the map. Single pass O(n).",tc:"O(n)",sc:"O(n)",code:"def two_sum(nums, target):\n    seen = {}\n    for i, num in enumerate(nums):\n        complement = target - num\n        if complement in seen:\n            return [seen[complement], i]\n        seen[num] = i\n    return []\n\nprint(two_sum([2, 7, 11, 15], 9))  # [0, 1]"},
{title:"Group Anagrams",desc:"Given a list of strings, group anagrams together.",approach:"Sort each word to create a canonical key. Words with same sorted key are anagrams. Use a dict with sorted string as key and list of anagrams as value.",tc:"O(n * k log k) where k = max word length",sc:"O(n * k)",code:"from collections import defaultdict\n\ndef group_anagrams(strs):\n    groups = defaultdict(list)\n    for s in strs:\n        key = ''.join(sorted(s))\n        groups[key].append(s)\n    return list(groups.values())\n\nprint(group_anagrams(['eat','tea','tan','ate','nat','bat']))"},
{title:"Maximum Subarray Sum",desc:"Find the contiguous subarray with the largest sum.",approach:"Use Kadane's algorithm: maintain running sum, reset when it drops below current element. Track the global maximum throughout the iteration.",tc:"O(n)",sc:"O(1)",code:"def max_subarray(nums):\n    curr = best = nums[0]\n    for num in nums[1:]:\n        curr = max(num, curr + num)\n        best = max(best, curr)\n    return best\n\nprint(max_subarray([-2,1,-3,4,-1,2,1,-5,4]))  # 6"}
],
practice:[
{q:"Find the duplicate number in an array of n+1 integers (range 1 to n).",d:"E",approach:"Hash Set or Floyd's cycle detection"},
{q:"Check if two strings are anagrams of each other.",d:"E",approach:"Frequency counting with Counter"},
{q:"Find the single number in an array where every other appears twice.",d:"E",approach:"XOR all elements"},
{q:"Return indices of two numbers that add up to target (Two Sum).",d:"E",approach:"Hash map one-pass"},
{q:"Remove duplicates from a sorted array in-place.",d:"E",approach:"Two pointers"},
{q:"Find the majority element (appears > n/2 times).",d:"E",approach:"Boyer-Moore Voting or hash map"},

{q:"Find top K frequent elements in an array.",d:"M",approach:"Hash map + heap or bucket sort"},
{q:"Product of Array Except Self without division.",d:"M",approach:"Prefix and suffix product arrays"},
{q:"Longest consecutive sequence in unsorted array.",d:"M",approach:"Hash set - check sequence starts"},
{q:"Subarray sum equals K (count subarrays).",d:"M",approach:"Prefix sum + hash map"},
{q:"Group anagrams from a list of strings.",d:"M",approach:"Sorted string as hash key"},
{q:"Valid Sudoku - check if board state is valid.",d:"M",approach:"Hash sets for rows, cols, boxes"},
{q:"Encode and Decode strings (design problem).",d:"M",approach:"Length prefix encoding"},
{q:"Find all pairs with given difference K.",d:"M",approach:"Hash set lookup for num+k"},
{q:"Minimum window substring containing all characters.",d:"H",approach:"Sliding window + frequency map"},
{q:"First missing positive integer in O(n) time O(1) space.",d:"H",approach:"Index as hash - place nums at correct index"},
{q:"Longest substring without repeating characters.",d:"H",approach:"Sliding window with hash set"},
{q:"4Sum - find all quadruplets summing to target.",d:"H",approach:"Sort + two pointers + two loops"},
{q:"Count of Range Sum (count subarrays with sum in [lower, upper]).",d:"H",approach:"Merge sort on prefix sums"}
]},

{id:2,title:"Linked Lists",color:"#34d399",section:"Data Structures",chips:["Singly","Doubly","Circular","Reverse","Cycle"],
subtopics:[
{name:"Singly Linked List",theory:["Each node contains data and a pointer to the next node.","Insert at head is O(1); insert at tail is O(n) without tail pointer, O(1) with.","Search requires traversal: O(n). No random access like arrays."],tc:"O(1) insert head, O(n) search",sc:"O(n)",code:"class ListNode:\n    def __init__(self, val=0, next=None):\n        self.val = val\n        self.next = next\n\nclass LinkedList:\n    def __init__(self):\n        self.head = None\n    \n    def insert_head(self, val):\n        self.head = ListNode(val, self.head)\n    \n    def search(self, val):\n        curr = self.head\n        while curr:\n            if curr.val == val:\n                return True\n            curr = curr.next\n        return False"},
{name:"Doubly Linked List",theory:["Each node has prev and next pointers, enabling bidirectional traversal.","Insertion and deletion at both ends are O(1) with head/tail pointers.","Used in LRU cache, browser history, and deque implementations."],tc:"O(1) insert/delete at ends, O(n) search",sc:"O(n)",code:"class DNode:\n    def __init__(self, val=0):\n        self.val = val\n        self.prev = None\n        self.next = None\n\nclass DoublyLinkedList:\n    def __init__(self):\n        self.head = DNode(0)  # dummy head\n        self.tail = DNode(0)  # dummy tail\n        self.head.next = self.tail\n        self.tail.prev = self.head\n    \n    def insert_end(self, val):\n        node = DNode(val)\n        node.prev = self.tail.prev\n        node.next = self.tail\n        self.tail.prev.next = node\n        self.tail.prev = node"},
{name:"Circular Linked List",theory:["Last node points back to the head, forming a circle.","Useful for round-robin scheduling and circular buffers.","Traversal must check for revisiting the start node to avoid infinite loop."],tc:"O(n) traversal",sc:"O(n)",code:"class CircularLL:\n    def __init__(self):\n        self.head = None\n    \n    def insert(self, val):\n        new_node = ListNode(val)\n        if not self.head:\n            self.head = new_node\n            new_node.next = self.head\n        else:\n            curr = self.head\n            while curr.next != self.head:\n                curr = curr.next\n            curr.next = new_node\n            new_node.next = self.head\n    \n    def display(self):\n        if not self.head:\n            return\n        curr = self.head\n        while True:\n            print(curr.val, end=' ')\n            curr = curr.next\n            if curr == self.head:\n                break"},
{name:"Reverse a Linked List",theory:["Iterative: use three pointers (prev, curr, next) to reverse links one by one.","Recursive: reverse rest of list, then fix the current node's pointer.","Both approaches are O(n) time; iterative is O(1) space, recursive O(n) stack space."],tc:"O(n)",sc:"O(1) iterative, O(n) recursive",code:"def reverse_list(head):\n    prev = None\n    curr = head\n    while curr:\n        next_node = curr.next\n        curr.next = prev\n        prev = curr\n        curr = next_node\n    return prev\n\n# Recursive approach\ndef reverse_recursive(head):\n    if not head or not head.next:\n        return head\n    new_head = reverse_recursive(head.next)\n    head.next.next = head\n    head.next = None\n    return new_head"},
{name:"Detect Cycle (Floyd's Algorithm)",theory:["Use slow (1 step) and fast (2 steps) pointers; if they meet, cycle exists.","To find cycle start: reset one pointer to head, move both at 1 step until they meet.","O(n) time and O(1) space - no extra data structures needed."],tc:"O(n)",sc:"O(1)",code:"def has_cycle(head):\n    slow = fast = head\n    while fast and fast.next:\n        slow = slow.next\n        fast = fast.next.next\n        if slow == fast:\n            return True\n    return False\n\ndef find_cycle_start(head):\n    slow = fast = head\n    while fast and fast.next:\n        slow = slow.next\n        fast = fast.next.next\n        if slow == fast:\n            slow = head\n            while slow != fast:\n                slow = slow.next\n                fast = fast.next\n            return slow\n    return None"},
{name:"Merge Two Sorted Lists",theory:["Compare heads of both lists; attach smaller node to result.","Continue until one list is exhausted, then attach remaining.","Commonly used as building block in merge sort for linked lists."],tc:"O(n + m)",sc:"O(1)",code:"def merge_two_lists(l1, l2):\n    dummy = ListNode(0)\n    curr = dummy\n    while l1 and l2:\n        if l1.val <= l2.val:\n            curr.next = l1\n            l1 = l1.next\n        else:\n            curr.next = l2\n            l2 = l2.next\n        curr = curr.next\n    curr.next = l1 or l2\n    return dummy.next"}
],
examples:[
{title:"Reverse a Linked List",desc:"Given the head of a singly linked list, reverse the list and return the new head.",approach:"Use three pointers: prev (starts null), curr (starts at head), and next_node. In each iteration, save next, point curr.next to prev, advance prev and curr.",tc:"O(n)",sc:"O(1)",code:"def reverse_list(head):\n    prev = None\n    curr = head\n    while curr:\n        next_node = curr.next\n        curr.next = prev\n        prev = curr\n        curr = next_node\n    return prev"},
{title:"Detect Cycle in Linked List",desc:"Given head, determine if the linked list has a cycle.",approach:"Floyd's tortoise and hare: slow moves 1 step, fast moves 2 steps. If they ever meet, there's a cycle. If fast reaches None, no cycle exists.",tc:"O(n)",sc:"O(1)",code:"def has_cycle(head):\n    slow = fast = head\n    while fast and fast.next:\n        slow = slow.next\n        fast = fast.next.next\n        if slow == fast:\n            return True\n    return False"},
{title:"Find Middle of Linked List",desc:"Given a non-empty linked list, return the middle node.",approach:"Use slow/fast pointers. When fast reaches the end, slow is at the middle. For even-length lists, this gives the second middle node.",tc:"O(n)",sc:"O(1)",code:"def find_middle(head):\n    slow = fast = head\n    while fast and fast.next:\n        slow = slow.next\n        fast = fast.next.next\n    return slow"}
],
practice:[
{q:"Reverse a singly linked list iteratively.",d:"E",approach:"Three pointers: prev, curr, next"},
{q:"Find the middle node of a linked list.",d:"E",approach:"Slow and fast pointers"},
{q:"Delete a node (given only access to that node, not head).",d:"E",approach:"Copy next node's value and skip it"},
{q:"Merge two sorted linked lists into one sorted list.",d:"E",approach:"Dummy head + compare and attach"},
{q:"Remove duplicates from a sorted linked list.",d:"E",approach:"Skip nodes with same value as current"},
{q:"Check if a linked list is a palindrome.",d:"E",approach:"Find middle, reverse second half, compare"},
{q:"Detect if a linked list has a cycle.",d:"E",approach:"Floyd's slow and fast pointers"},
{q:"Remove the Nth node from end of list.",d:"M",approach:"Two pointers with N gap"},
{q:"Add two numbers represented as linked lists.",d:"M",approach:"Traverse both with carry"},
{q:"Find the intersection node of two linked lists.",d:"M",approach:"Two pointers - switch heads at end"},
{q:"Swap nodes in pairs.",d:"M",approach:"Recursive or iterative pointer manipulation"},
{q:"Sort a linked list using merge sort.",d:"M",approach:"Find middle + merge sort recursively"},
{q:"Reorder list: L0→Ln→L1→Ln-1→...",d:"M",approach:"Find middle, reverse second half, merge alternately"},
{q:"Copy a linked list with random pointers.",d:"M",approach:"Hash map or interleaving nodes"},
{q:"Rotate a linked list to the right by k places.",d:"M",approach:"Find length, connect tail to head, break at new position"},
{q:"Reverse nodes in k-group.",d:"H",approach:"Reverse k nodes at a time, connect groups"},

{id:3,title:"Stacks",color:"#a78bfa",section:"Data Structures",chips:["Push/Pop","Valid Parentheses","Min Stack","Monotonic"],
subtopics:[
{name:"Stack Implementation (list/deque)",theory:["Stack follows LIFO (Last In, First Out) principle.","Python list works as stack: append() for push, pop() for pop - both O(1).","collections.deque is more efficient for large stacks (no reallocation)."],tc:"O(1) push/pop",sc:"O(n)",code:"# Stack using list\nstack = []\nstack.append(1)  # push\nstack.append(2)\nstack.append(3)\ntop = stack[-1]  # peek: 3\nstack.pop()      # pop: 3\n\n# Stack using deque\nfrom collections import deque\nstack = deque()\nstack.append(1)\nstack.append(2)\nstack.pop()  # 2"},
{name:"Valid Parentheses Problem",theory:["Use stack to match opening brackets with corresponding closing brackets.","Push opening brackets; for closing brackets, check if top matches.","If stack is empty at end, all brackets are balanced."],tc:"O(n)",sc:"O(n)",code:"def is_valid(s):\n    stack = []\n    mapping = {')': '(', '}': '{', ']': '['}\n    for char in s:\n        if char in mapping:\n            if not stack or stack[-1] != mapping[char]:\n                return False\n            stack.pop()\n        else:\n            stack.append(char)\n    return len(stack) == 0\n\nprint(is_valid('({[]})'))  # True\nprint(is_valid('([)]'))    # False"},
{name:"Min Stack (O(1) getMin)",theory:["Maintain auxiliary stack that tracks minimum at each level.","When pushing, also push min(val, current_min) to min_stack.","getMin() simply peeks at the min_stack top - O(1)."],tc:"O(1) push/pop/getMin",sc:"O(n)",code:"class MinStack:\n    def __init__(self):\n        self.stack = []\n        self.min_stack = []\n    \n    def push(self, val):\n        self.stack.append(val)\n        min_val = min(val, self.min_stack[-1] if self.min_stack else val)\n        self.min_stack.append(min_val)\n    \n    def pop(self):\n        self.stack.pop()\n        self.min_stack.pop()\n    \n    def top(self):\n        return self.stack[-1]\n    \n    def getMin(self):\n        return self.min_stack[-1]"},
{name:"Next Greater Element (Monotonic Stack)",theory:["Monotonic stack maintains elements in increasing/decreasing order.","Process from right to left; pop smaller elements; top is next greater.","Solves NGE, stock span, largest rectangle problems in O(n)."],tc:"O(n)",sc:"O(n)",code:"def next_greater_element(nums):\n    n = len(nums)\n    result = [-1] * n\n    stack = []  # stores indices\n    for i in range(n - 1, -1, -1):\n        while stack and stack[-1] <= nums[i]:\n            stack.pop()\n        if stack:\n            result[i] = stack[-1]\n        stack.append(nums[i])\n    return result\n\nprint(next_greater_element([4, 5, 2, 25]))  # [5, 25, 25, -1]"},
{name:"Evaluate Postfix Expression",theory:["In postfix (Reverse Polish), operators come after operands.","Scan left to right: push numbers; on operator, pop two operands and compute.","No parentheses needed; evaluation is unambiguous."],tc:"O(n)",sc:"O(n)",code:"def eval_postfix(tokens):\n    stack = []\n    ops = {'+': lambda a,b: a+b, '-': lambda a,b: a-b,\n           '*': lambda a,b: a*b, '/': lambda a,b: int(a/b)}\n    for token in tokens:\n        if token in ops:\n            b, a = stack.pop(), stack.pop()\n            stack.append(ops[token](a, b))\n        else:\n            stack.append(int(token))\n    return stack[0]\n\nprint(eval_postfix(['2','1','+','3','*']))  # 9"},
{name:"Stack using Queues",theory:["Implement stack using two queues (or one queue with rotation).","Push: enqueue to q2, move all from q1 to q2, swap q1 and q2.","Alternative: push to queue, then rotate n-1 elements to back."],tc:"O(n) push or O(n) pop depending on approach",sc:"O(n)",code:"from collections import deque\n\nclass StackUsingQueue:\n    def __init__(self):\n        self.q = deque()\n    \n    def push(self, x):\n        self.q.append(x)\n        # Rotate all previous elements to back\n        for _ in range(len(self.q) - 1):\n            self.q.append(self.q.popleft())\n    \n    def pop(self):\n        return self.q.popleft()\n    \n    def top(self):\n        return self.q[0]\n    \n    def empty(self):\n        return len(self.q) == 0"}
],
examples:[
{title:"Valid Parentheses",desc:"Given a string containing just '(', ')', '{', '}', '[' and ']', determine if the input string is valid.",approach:"Use a stack: push opening brackets. For each closing bracket, check if the stack top matches. At end, stack should be empty for valid input.",tc:"O(n)",sc:"O(n)",code:"def is_valid(s):\n    stack = []\n    pairs = {')':'(', '}':'{', ']':'['}\n    for c in s:\n        if c in pairs:\n            if not stack or stack[-1] != pairs[c]:\n                return False\n            stack.pop()\n        else:\n            stack.append(c)\n    return not stack\n\nprint(is_valid('{[()]}'))  # True"},
{title:"Daily Temperatures",desc:"Given daily temperatures, return how many days you must wait for a warmer temperature.",approach:"Use monotonic decreasing stack storing indices. When current temp is higher than stack top's temp, pop and calculate the difference in days.",tc:"O(n)",sc:"O(n)",code:"def daily_temperatures(temps):\n    n = len(temps)\n    result = [0] * n\n    stack = []  # stack of indices\n    for i in range(n):\n        while stack and temps[i] > temps[stack[-1]]:\n            j = stack.pop()\n            result[j] = i - j\n        stack.append(i)\n    return result\n\nprint(daily_temperatures([73,74,75,71,69,72,76,73]))"},
{title:"Implement Min Stack",desc:"Design a stack that supports push, pop, top, and getMin in O(1) time.",approach:"Use two stacks: main stack for values and auxiliary stack that keeps track of the running minimum. Both push/pop simultaneously.",tc:"O(1) all operations",sc:"O(n)",code:"class MinStack:\n    def __init__(self):\n        self.stack = []\n        self.min_stack = []\n    \n    def push(self, val):\n        self.stack.append(val)\n        v = min(val, self.min_stack[-1] if self.min_stack else val)\n        self.min_stack.append(v)\n    \n    def pop(self):\n        self.stack.pop()\n        self.min_stack.pop()\n    \n    def top(self): return self.stack[-1]\n    def getMin(self): return self.min_stack[-1]"}

{id:4,title:"Queues",color:"#fbbf24",section:"Data Structures",chips:["Queue","Deque","Priority Queue","BFS"],
subtopics:[
{name:"Queue Implementation (deque)",theory:["Queue follows FIFO (First In, First Out) principle.","collections.deque provides O(1) append (enqueue) and popleft (dequeue).","Using list for queue is inefficient: pop(0) is O(n) due to shifting."],tc:"O(1) enqueue/dequeue",sc:"O(n)",code:"from collections import deque\n\nqueue = deque()\nqueue.append(1)      # enqueue\nqueue.append(2)\nqueue.append(3)\nfront = queue[0]     # peek: 1\nqueue.popleft()      # dequeue: 1\nprint(len(queue))    # 2"},
{name:"Circular Queue",theory:["Fixed-size queue that wraps around using modulo arithmetic.","front and rear pointers track positions; (rear+1)%size moves circularly.","Efficiently reuses space without shifting elements."],tc:"O(1) enqueue/dequeue",sc:"O(n)",code:"class CircularQueue:\n    def __init__(self, k):\n        self.q = [None] * k\n        self.size = k\n        self.front = self.rear = -1\n    \n    def enqueue(self, val):\n        if (self.rear + 1) % self.size == self.front:\n            return False  # Full\n        if self.front == -1:\n            self.front = 0\n        self.rear = (self.rear + 1) % self.size\n        self.q[self.rear] = val\n        return True\n    \n    def dequeue(self):\n        if self.front == -1:\n            return None  # Empty\n        val = self.q[self.front]\n        if self.front == self.rear:\n            self.front = self.rear = -1\n        else:\n            self.front = (self.front + 1) % self.size\n        return val"},
{name:"Priority Queue (heapq)",theory:["Priority queue serves elements by priority, not insertion order.","Python heapq provides min-heap: smallest element is always at top.","heappush and heappop are O(log n); heapify is O(n)."],tc:"O(log n) push/pop, O(1) peek",sc:"O(n)",code:"import heapq\n\n# Min Heap\nheap = []\nheapq.heappush(heap, 3)\nheapq.heappush(heap, 1)\nheapq.heappush(heap, 2)\nprint(heap[0])        # peek min: 1\nprint(heapq.heappop(heap))  # pop min: 1\n\n# Max Heap (negate values)\nmax_heap = []\nheapq.heappush(max_heap, -5)\nheapq.heappush(max_heap, -3)\nprint(-heapq.heappop(max_heap))  # 5\n\n# Heapify a list\narr = [5, 3, 8, 1, 2]\nheapq.heapify(arr)  # O(n)"},
{name:"Deque Operations",theory:["Deque (double-ended queue) allows O(1) operations at both ends.","appendleft/popleft for front; append/pop for back.","Used in sliding window maximum, BFS, and palindrome checking."],tc:"O(1) operations at both ends",sc:"O(n)",code:"from collections import deque\n\ndq = deque()\ndq.append(1)       # add right\ndq.append(2)\ndq.appendleft(0)   # add left\nprint(dq)          # deque([0, 1, 2])\ndq.pop()           # remove right: 2\ndq.popleft()       # remove left: 0\ndq.rotate(1)       # rotate right by 1"},
{name:"BFS using Queue",theory:["BFS explores graph level by level using a queue.","Enqueue start node, then repeatedly dequeue and enqueue unvisited neighbors.","Guarantees shortest path in unweighted graphs."],tc:"O(V + E)",sc:"O(V)",code:"from collections import deque\n\ndef bfs(graph, start):\n    visited = set([start])\n    queue = deque([start])\n    order = []\n    while queue:\n        node = queue.popleft()\n        order.append(node)\n        for neighbor in graph[node]:\n            if neighbor not in visited:\n                visited.add(neighbor)\n                queue.append(neighbor)\n    return order\n\ngraph = {0:[1,2], 1:[0,3], 2:[0,3], 3:[1,2]}\nprint(bfs(graph, 0))  # [0, 1, 2, 3]"},
{name:"Sliding Window Maximum (Monotonic Deque)",theory:["Find maximum in every window of size k using a decreasing deque.","Deque stores indices; front is always the current window max.","Remove elements out of window from front; remove smaller from back."],tc:"O(n)",sc:"O(k)",code:"from collections import deque\n\ndef max_sliding_window(nums, k):\n    dq = deque()  # stores indices\n    result = []\n    for i in range(len(nums)):\n        # Remove indices out of window\n        while dq and dq[0] < i - k + 1:\n            dq.popleft()\n        # Remove smaller elements from back\n        while dq and nums[dq[-1]] < nums[i]:\n            dq.pop()\n        dq.append(i)\n        if i >= k - 1:\n            result.append(nums[dq[0]])\n    return result\n\nprint(max_sliding_window([1,3,-1,-3,5,3,6,7], 3))"}
],
examples:[
{title:"Implement Queue using Stacks",desc:"Implement a FIFO queue using only two stacks.",approach:"Use two stacks: input stack for push, output stack for pop. When output is empty, transfer all from input to output (reversing order). Amortized O(1) per operation.",tc:"O(1) amortized",sc:"O(n)",code:"class MyQueue:\n    def __init__(self):\n        self.in_stack = []\n        self.out_stack = []\n    \n    def push(self, x):\n        self.in_stack.append(x)\n    \n    def pop(self):\n        self._transfer()\n        return self.out_stack.pop()\n    \n    def peek(self):\n        self._transfer()\n        return self.out_stack[-1]\n    \n    def _transfer(self):\n        if not self.out_stack:\n            while self.in_stack:\n                self.out_stack.append(self.in_stack.pop())"},
{title:"Sliding Window Maximum",desc:"Given array and window size k, return max element in each window position.",approach:"Use monotonic decreasing deque storing indices. Front always has the index of max in current window. Remove out-of-range indices from front, smaller elements from back.",tc:"O(n)",sc:"O(k)",code:"from collections import deque\n\ndef max_sliding_window(nums, k):\n    dq = deque()\n    result = []\n    for i in range(len(nums)):\n        while dq and dq[0] < i - k + 1:\n            dq.popleft()\n        while dq and nums[dq[-1]] < nums[i]:\n            dq.pop()\n        dq.append(i)\n        if i >= k - 1:\n            result.append(nums[dq[0]])\n    return result"},
{title:"Rotten Oranges (Multi-source BFS)",desc:"In a grid, rotten oranges spread to adjacent fresh oranges each minute. Find minimum time to rot all.",approach:"Start BFS from all initially rotten oranges simultaneously (multi-source). Each level of BFS represents one minute. Count remaining fresh oranges at end.",tc:"O(m*n)",sc:"O(m*n)",code:"from collections import deque\n\ndef oranges_rotting(grid):\n    rows, cols = len(grid), len(grid[0])\n    queue = deque()\n    fresh = 0\n    for r in range(rows):\n        for c in range(cols):\n            if grid[r][c] == 2:\n                queue.append((r, c, 0))\n            elif grid[r][c] == 1:\n                fresh += 1\n    time = 0\n    for dr, dc in [(0,1),(0,-1),(1,0),(-1,0)]:\n        pass  # defined in loop\n    while queue:\n        r, c, t = queue.popleft()\n        time = max(time, t)\n        for dr, dc in [(0,1),(0,-1),(1,0),(-1,0)]:\n            nr, nc = r+dr, c+dc\n            if 0<=nr<rows and 0<=nc<cols and grid[nr][nc]==1:\n                grid[nr][nc] = 2\n                fresh -= 1\n                queue.append((nr, nc, t+1))\n    return time if fresh == 0 else -1"}

{id:5,title:"Trees",color:"#f472b6",section:"Data Structures",chips:["Binary Tree","BST","Traversals","Height","LCA"],
subtopics:[
{name:"Binary Tree Basics",theory:["Each node has at most two children (left and right).","Full binary tree: every node has 0 or 2 children; Complete: all levels filled except possibly last.","n nodes → height ranges from log(n) (balanced) to n-1 (skewed)."],tc:"O(n) traversal",sc:"O(h) where h = height",code:"class TreeNode:\n    def __init__(self, val=0, left=None, right=None):\n        self.val = val\n        self.left = left\n        self.right = right\n\n# Build a simple tree\nroot = TreeNode(1)\nroot.left = TreeNode(2)\nroot.right = TreeNode(3)\nroot.left.left = TreeNode(4)\nroot.left.right = TreeNode(5)"},
{name:"BST Operations",theory:["BST property: left subtree values < node < right subtree values.","Search, insert, delete are O(log n) average, O(n) worst (skewed).","Inorder traversal of BST gives sorted sequence."],tc:"O(log n) avg search/insert, O(n) worst",sc:"O(h)",code:"def search_bst(root, target):\n    if not root or root.val == target:\n        return root\n    if target < root.val:\n        return search_bst(root.left, target)\n    return search_bst(root.right, target)\n\ndef insert_bst(root, val):\n    if not root:\n        return TreeNode(val)\n    if val < root.val:\n        root.left = insert_bst(root.left, val)\n    else:\n        root.right = insert_bst(root.right, val)\n    return root"},
{name:"Traversals (Inorder/Preorder/Postorder)",theory:["Inorder (Left-Root-Right): gives sorted order for BST.","Preorder (Root-Left-Right): used for serialization and copying trees.","Postorder (Left-Right-Root): used for deletion and expression evaluation."],tc:"O(n)",sc:"O(h) recursive stack",code:"def inorder(root):\n    if not root: return []\n    return inorder(root.left) + [root.val] + inorder(root.right)\n\ndef preorder(root):\n    if not root: return []\n    return [root.val] + preorder(root.left) + preorder(root.right)\n\ndef postorder(root):\n    if not root: return []\n    return postorder(root.left) + postorder(root.right) + [root.val]\n\n# Iterative Inorder using stack\ndef inorder_iterative(root):\n    result, stack = [], []\n    curr = root\n    while curr or stack:\n        while curr:\n            stack.append(curr)\n            curr = curr.left\n        curr = stack.pop()\n        result.append(curr.val)\n        curr = curr.right\n    return result"},
{name:"Level Order Traversal (BFS)",theory:["Visit nodes level by level using a queue.","Process all nodes at current level before moving to next.","Useful for finding width, rightmost view, and zigzag traversal."],tc:"O(n)",sc:"O(w) where w = max width",code:"from collections import deque\n\ndef level_order(root):\n    if not root: return []\n    result = []\n    queue = deque([root])\n    while queue:\n        level = []\n        for _ in range(len(queue)):\n            node = queue.popleft()\n            level.append(node.val)\n            if node.left: queue.append(node.left)\n            if node.right: queue.append(node.right)\n        result.append(level)\n    return result"},
{name:"Height & Depth Calculation",theory:["Height of node: longest path from node to any leaf (bottom-up).","Depth of node: number of edges from root to that node (top-down).","Height of tree = height of root node; empty tree has height -1 or 0 (convention)."],tc:"O(n)",sc:"O(h)",code:"def height(root):\n    if not root:\n        return 0\n    return 1 + max(height(root.left), height(root.right))\n\ndef max_depth(root):\n    if not root:\n        return 0\n    return 1 + max(max_depth(root.left), max_depth(root.right))\n\ndef diameter(root):\n    result = [0]\n    def dfs(node):\n        if not node: return 0\n        left = dfs(node.left)\n        right = dfs(node.right)\n        result[0] = max(result[0], left + right)\n        return 1 + max(left, right)\n    dfs(root)\n    return result[0]"},
{name:"Lowest Common Ancestor (LCA)",theory:["LCA is the deepest node that is ancestor of both given nodes.","If one node is in left subtree and other in right, current node is LCA.","For BST: if both values < node go left; both > node go right; else current is LCA."],tc:"O(n) general tree, O(h) BST",sc:"O(h)",code:"def lca(root, p, q):\n    if not root or root == p or root == q:\n        return root\n    left = lca(root.left, p, q)\n    right = lca(root.right, p, q)\n    if left and right:\n        return root\n    return left or right\n\n# LCA for BST (optimized)\ndef lca_bst(root, p, q):\n    while root:\n        if p.val < root.val and q.val < root.val:\n            root = root.left\n        elif p.val > root.val and q.val > root.val:\n            root = root.right\n        else:\n            return root"},
{name:"Balanced Binary Tree Check",theory:["A tree is balanced if height difference of left and right subtrees <= 1 for every node.","Check recursively: compute height and balance status simultaneously.","AVL trees maintain this property with rotations after insertions/deletions."],tc:"O(n)",sc:"O(h)",code:"def is_balanced(root):\n    def check(node):\n        if not node:\n            return 0\n        left = check(node.left)\n        right = check(node.right)\n        if left == -1 or right == -1 or abs(left - right) > 1:\n            return -1\n        return 1 + max(left, right)\n    return check(root) != -1"}
],
examples:[
{title:"Maximum Depth of Binary Tree",desc:"Find the maximum depth (number of nodes on longest path from root to leaf).",approach:"Recursively compute depth of left and right subtrees. The max depth is 1 + max(left_depth, right_depth). Base case: null node returns 0.",tc:"O(n)",sc:"O(h)",code:"def max_depth(root):\n    if not root:\n        return 0\n    return 1 + max(max_depth(root.left), max_depth(root.right))"},
{title:"Validate Binary Search Tree",desc:"Determine if a binary tree is a valid BST.",approach:"Pass valid range (min, max) to each node. Root starts with (-inf, inf). Left child range is (min, parent.val), right is (parent.val, max). Any violation means invalid.",tc:"O(n)",sc:"O(h)",code:"def is_valid_bst(root, lo=float('-inf'), hi=float('inf')):\n    if not root:\n        return True\n    if root.val <= lo or root.val >= hi:\n        return False\n    return (is_valid_bst(root.left, lo, root.val) and\n            is_valid_bst(root.right, root.val, hi))"},
{title:"Lowest Common Ancestor",desc:"Find LCA of two nodes p and q in a binary tree.",approach:"If current node is p or q, return it. Recurse left and right. If both return non-null, current node is LCA. Otherwise return the non-null child result.",tc:"O(n)",sc:"O(h)",code:"def lowest_common_ancestor(root, p, q):\n    if not root or root == p or root == q:\n        return root\n    left = lowest_common_ancestor(root.left, p, q)\n    right = lowest_common_ancestor(root.right, p, q)\n    if left and right:\n        return root\n    return left or right"}
],

{id:6,title:"Heaps",color:"#22d3ee",section:"Data Structures",chips:["Min/Max Heap","heapq","Kth Largest","Top K"],
subtopics:[
{name:"Min Heap & Max Heap",theory:["Min heap: parent <= children; root is minimum element.","Max heap: parent >= children; root is maximum element.","Complete binary tree stored in array: children of i at 2i+1 and 2i+2."],tc:"O(log n) insert, O(1) peek, O(log n) extract",sc:"O(n)",code:"import heapq\n\n# Min Heap (default in Python)\nmin_heap = []\nheapq.heappush(min_heap, 5)\nheapq.heappush(min_heap, 2)\nheapq.heappush(min_heap, 8)\nprint(min_heap[0])  # Peek min: 2\nheapq.heappop(min_heap)  # Extract min: 2\n\n# Max Heap (negate values)\nmax_heap = []\nheapq.heappush(max_heap, -5)\nheapq.heappush(max_heap, -2)\nheapq.heappush(max_heap, -8)\nprint(-max_heap[0])  # Peek max: 8"},
{name:"heapq Module in Python",theory:["heapq provides functions for min-heap operations on regular lists.","heapify() converts list to heap in O(n); heappush/heappop are O(log n).","nlargest(k, iterable) and nsmallest(k, iterable) for quick top-k queries."],tc:"O(n) heapify, O(log n) push/pop",sc:"O(n)",code:"import heapq\n\n# Heapify existing list\narr = [5, 3, 8, 1, 2, 7]\nheapq.heapify(arr)  # O(n) - arr is now a valid min-heap\n\n# Push and pop combined (more efficient)\nheapq.heappushpop(arr, 4)  # Push 4, then pop smallest\nheapq.heapreplace(arr, 6)  # Pop smallest, then push 6\n\n# Top K elements\nnums = [3, 1, 4, 1, 5, 9, 2, 6]\nprint(heapq.nlargest(3, nums))   # [9, 6, 5]\nprint(heapq.nsmallest(3, nums))  # [1, 1, 2]"},
{name:"Kth Largest Element",theory:["Maintain min-heap of size k; root is the kth largest.","Push elements; if heap size > k, pop (removes smallest, keeps k largest).","Final root is kth largest. Alternative: QuickSelect for O(n) average."],tc:"O(n log k)",sc:"O(k)",code:"import heapq\n\ndef find_kth_largest(nums, k):\n    # Min heap of size k\n    heap = []\n    for num in nums:\n        heapq.heappush(heap, num)\n        if len(heap) > k:\n            heapq.heappop(heap)\n    return heap[0]  # Root is kth largest\n\nprint(find_kth_largest([3,2,1,5,6,4], 2))  # 5\n\n# Alternative: using nlargest\nimport heapq\ndef kth_largest_alt(nums, k):\n    return heapq.nlargest(k, nums)[-1]"},
{name:"Top K Frequent Elements",theory:["Count frequency, then find k elements with highest frequency.","Heap approach: maintain min-heap of size k on frequency.","Bucket sort approach: O(n) using frequency as index."],tc:"O(n log k) heap, O(n) bucket sort",sc:"O(n)",code:"import heapq\nfrom collections import Counter\n\ndef top_k_frequent(nums, k):\n    count = Counter(nums)\n    # Use min-heap of size k\n    return heapq.nlargest(k, count.keys(), key=count.get)\n\n# Bucket sort approach - O(n)\ndef top_k_frequent_bucket(nums, k):\n    count = Counter(nums)\n    buckets = [[] for _ in range(len(nums) + 1)]\n    for num, freq in count.items():\n        buckets[freq].append(num)\n    result = []\n    for i in range(len(buckets)-1, -1, -1):\n        for num in buckets[i]:\n            result.append(num)\n            if len(result) == k:\n                return result\n    return result"},
{name:"Merge K Sorted Lists",theory:["Use min-heap to always pick the smallest head among k lists.","Push first element of each list; pop min, push its next element.","Heap size is always at most k, making each operation O(log k)."],tc:"O(n log k) where n = total elements",sc:"O(k)",code:"import heapq\n\ndef merge_k_lists(lists):\n    heap = []\n    for i, lst in enumerate(lists):\n        if lst:\n            heapq.heappush(heap, (lst[0], i, 0))\n    \n    result = []\n    while heap:\n        val, list_idx, elem_idx = heapq.heappop(heap)\n        result.append(val)\n        if elem_idx + 1 < len(lists[list_idx]):\n            next_val = lists[list_idx][elem_idx + 1]\n            heapq.heappush(heap, (next_val, list_idx, elem_idx + 1))\n    return result\n\nprint(merge_k_lists([[1,4,5],[1,3,4],[2,6]]))  # [1,1,2,3,4,4,5,6]"},
{name:"Heap Sort",theory:["Build max-heap, then repeatedly extract max and place at end.","In-place sorting with O(n log n) time guaranteed (no worst case like quicksort).","Not stable; cache-unfriendly compared to quicksort in practice."],tc:"O(n log n)",sc:"O(1) in-place",code:"def heap_sort(arr):\n    def heapify(arr, n, i):\n        largest = i\n        left, right = 2*i+1, 2*i+2\n        if left < n and arr[left] > arr[largest]:\n            largest = left\n        if right < n and arr[right] > arr[largest]:\n            largest = right\n        if largest != i:\n            arr[i], arr[largest] = arr[largest], arr[i]\n            heapify(arr, n, largest)\n    \n    n = len(arr)\n    # Build max heap\n    for i in range(n//2 - 1, -1, -1):\n        heapify(arr, n, i)\n    # Extract elements\n    for i in range(n-1, 0, -1):\n        arr[0], arr[i] = arr[i], arr[0]\n        heapify(arr, i, 0)\n    return arr\n\nprint(heap_sort([12, 11, 13, 5, 6, 7]))"}
],
examples:[
{title:"Kth Largest Element in Array",desc:"Find the kth largest element in an unsorted array.",approach:"Maintain a min-heap of size k. After processing all elements, the heap root is the kth largest. This avoids sorting the entire array.",tc:"O(n log k)",sc:"O(k)",code:"import heapq\n\ndef find_kth_largest(nums, k):\n    heap = nums[:k]\n    heapq.heapify(heap)\n    for num in nums[k:]:\n        if num > heap[0]:\n            heapq.heapreplace(heap, num)\n    return heap[0]\n\nprint(find_kth_largest([3,2,3,1,2,4,5,5,6], 4))  # 4"},
{title:"Top K Frequent Elements",desc:"Given integer array, return the k most frequent elements.",approach:"Count frequencies with Counter. Use a min-heap of size k keyed by frequency. Elements remaining in heap are the top k frequent ones.",tc:"O(n log k)",sc:"O(n)",code:"from collections import Counter\nimport heapq\n\ndef top_k_frequent(nums, k):\n    count = Counter(nums)\n    return heapq.nlargest(k, count.keys(), key=count.get)\n\nprint(top_k_frequent([1,1,1,2,2,3], 2))  # [1, 2]"},
{title:"Find Median from Data Stream",desc:"Design a data structure that supports addNum and findMedian operations.",approach:"Use two heaps: max-heap for lower half, min-heap for upper half. Balance sizes so they differ by at most 1. Median is from the larger heap or average of both tops.",tc:"O(log n) add, O(1) find median",sc:"O(n)",code:"import heapq\n\nclass MedianFinder:\n    def __init__(self):\n        self.lo = []  # max-heap (negated)\n        self.hi = []  # min-heap\n    \n    def addNum(self, num):\n        heapq.heappush(self.lo, -num)\n        heapq.heappush(self.hi, -heapq.heappop(self.lo))\n        if len(self.hi) > len(self.lo):\n            heapq.heappush(self.lo, -heapq.heappop(self.hi))\n    \n    def findMedian(self):\n        if len(self.lo) > len(self.hi):\n            return -self.lo[0]\n        return (-self.lo[0] + self.hi[0]) / 2"}
],

{id:7,title:"Graphs",color:"#fb923c",section:"Data Structures",chips:["BFS","DFS","Cycle Detection","Topological Sort","Dijkstra"],
subtopics:[
{name:"Graph Representation (Adjacency List/Matrix)",theory:["Adjacency list: dict mapping node → list of neighbors; space O(V+E).","Adjacency matrix: 2D array; space O(V²); O(1) edge lookup but memory heavy.","List is preferred for sparse graphs; matrix for dense or when checking edge existence."],tc:"List: O(V+E) space, Matrix: O(V²) space",sc:"Depends on representation",code:"# Adjacency List\ngraph = {\n    'A': ['B', 'C'],\n    'B': ['A', 'D'],\n    'C': ['A', 'D'],\n    'D': ['B', 'C']\n}\n\n# Using defaultdict\nfrom collections import defaultdict\ng = defaultdict(list)\nedges = [(0,1),(0,2),(1,3),(2,3)]\nfor u, v in edges:\n    g[u].append(v)\n    g[v].append(u)  # undirected\n\n# Adjacency Matrix\nn = 4\nmatrix = [[0]*n for _ in range(n)]\nmatrix[0][1] = matrix[1][0] = 1  # edge 0-1"},
{name:"BFS (Breadth-First Search)",theory:["Explores all nodes at current depth before moving to next depth.","Uses queue; guarantees shortest path in unweighted graphs.","Time O(V+E); marks nodes visited before enqueuing to avoid revisits."],tc:"O(V + E)",sc:"O(V)",code:"from collections import deque\n\ndef bfs(graph, start):\n    visited = set([start])\n    queue = deque([start])\n    order = []\n    while queue:\n        node = queue.popleft()\n        order.append(node)\n        for neighbor in graph[node]:\n            if neighbor not in visited:\n                visited.add(neighbor)\n                queue.append(neighbor)\n    return order\n\n# BFS shortest path\ndef shortest_path(graph, start, end):\n    queue = deque([(start, [start])])\n    visited = set([start])\n    while queue:\n        node, path = queue.popleft()\n        if node == end:\n            return path\n        for nb in graph[node]:\n            if nb not in visited:\n                visited.add(nb)\n                queue.append((nb, path + [nb]))\n    return None"},
{name:"DFS (Depth-First Search)",theory:["Explores as deep as possible before backtracking.","Uses recursion (call stack) or explicit stack.","Used for: connected components, cycle detection, topological sort, path finding."],tc:"O(V + E)",sc:"O(V)",code:"# Recursive DFS\ndef dfs(graph, node, visited=None):\n    if visited is None:\n        visited = set()\n    visited.add(node)\n    result = [node]\n    for neighbor in graph[node]:\n        if neighbor not in visited:\n            result.extend(dfs(graph, neighbor, visited))\n    return result\n\n# Iterative DFS\ndef dfs_iterative(graph, start):\n    visited = set()\n    stack = [start]\n    order = []\n    while stack:\n        node = stack.pop()\n        if node not in visited:\n            visited.add(node)\n            order.append(node)\n            for nb in graph[node]:\n                if nb not in visited:\n                    stack.append(nb)\n    return order"},
{name:"Connected Components",theory:["A connected component is a maximal set of nodes where every pair has a path.","Find all components: iterate nodes, run DFS/BFS from each unvisited node.","Number of components = number of times DFS/BFS is initiated."],tc:"O(V + E)",sc:"O(V)",code:"def count_components(n, edges):\n    graph = defaultdict(list)\n    for u, v in edges:\n        graph[u].append(v)\n        graph[v].append(u)\n    \n    visited = set()\n    count = 0\n    \n    def dfs(node):\n        visited.add(node)\n        for nb in graph[node]:\n            if nb not in visited:\n                dfs(nb)\n    \n    for i in range(n):\n        if i not in visited:\n            dfs(i)\n            count += 1\n    return count"},
{name:"Cycle Detection (Directed & Undirected)",theory:["Undirected: DFS detects back edge to visited node (not parent) → cycle.","Directed: use coloring (white/gray/black); back edge to gray node → cycle.","Can also use Union-Find for undirected cycle detection."],tc:"O(V + E)",sc:"O(V)",code:"# Undirected cycle detection\ndef has_cycle_undirected(graph, n):\n    visited = set()\n    def dfs(node, parent):\n        visited.add(node)\n        for nb in graph[node]:\n            if nb not in visited:\n                if dfs(nb, node):\n                    return True\n            elif nb != parent:\n                return True\n        return False\n    for i in range(n):\n        if i not in visited:\n            if dfs(i, -1):\n                return True\n    return False\n\n# Directed cycle detection\ndef has_cycle_directed(graph, n):\n    WHITE, GRAY, BLACK = 0, 1, 2\n    color = [WHITE] * n\n    def dfs(node):\n        color[node] = GRAY\n        for nb in graph[node]:\n            if color[nb] == GRAY:\n                return True\n            if color[nb] == WHITE and dfs(nb):\n                return True\n        color[node] = BLACK\n        return False\n    return any(color[i]==WHITE and dfs(i) for i in range(n))"},
{name:"Topological Sort (Kahn's Algorithm)",theory:["Linear ordering of DAG nodes where u comes before v for every edge u→v.","Kahn's: start with 0 in-degree nodes, remove them and reduce neighbors' in-degree.","Also solvable with DFS (reverse postorder). Only exists for DAGs."],tc:"O(V + E)",sc:"O(V)",code:"from collections import deque\n\ndef topological_sort(n, edges):\n    graph = defaultdict(list)\n    in_degree = [0] * n\n    for u, v in edges:\n        graph[u].append(v)\n        in_degree[v] += 1\n    \n    queue = deque([i for i in range(n) if in_degree[i] == 0])\n    order = []\n    while queue:\n        node = queue.popleft()\n        order.append(node)\n        for nb in graph[node]:\n            in_degree[nb] -= 1\n            if in_degree[nb] == 0:\n                queue.append(nb)\n    return order if len(order) == n else []  # empty if cycle"},
{name:"Shortest Path (Dijkstra)",theory:["Dijkstra finds shortest path from source to all nodes in weighted graph (non-negative weights).","Uses priority queue (min-heap); greedily picks closest unfinalized node.","Does NOT work with negative weights; use Bellman-Ford for that."],tc:"O((V + E) log V)",sc:"O(V)",code:"import heapq\n\ndef dijkstra(graph, start):\n    dist = {node: float('inf') for node in graph}\n    dist[start] = 0\n    heap = [(0, start)]\n    \n    while heap:\n        d, u = heapq.heappop(heap)\n        if d > dist[u]:\n            continue\n        for v, weight in graph[u]:\n            if dist[u] + weight < dist[v]:\n                dist[v] = dist[u] + weight\n                heapq.heappush(heap, (dist[v], v))\n    return dist\n\n# Example\ngraph = {\n    'A': [('B',1),('C',4)],\n    'B': [('C',2),('D',5)],\n    'C': [('D',1)],\n    'D': []\n}\nprint(dijkstra(graph, 'A'))"}
],
examples:[
{title:"Number of Islands",desc:"Given a 2D grid of '1's (land) and '0's (water), count the number of islands.",approach:"Iterate through grid. For each unvisited '1', run DFS/BFS to mark all connected land cells as visited. Each initiation of DFS counts as one island.",tc:"O(m * n)",sc:"O(m * n)",code:"def num_islands(grid):\n    if not grid: return 0\n    rows, cols = len(grid), len(grid[0])\n    count = 0\n    \n    def dfs(r, c):\n        if r<0 or r>=rows or c<0 or c>=cols or grid[r][c]!='1':\n            return\n        grid[r][c] = '0'  # mark visited\n        dfs(r+1,c); dfs(r-1,c); dfs(r,c+1); dfs(r,c-1)\n    \n    for r in range(rows):\n        for c in range(cols):\n            if grid[r][c] == '1':\n                dfs(r, c)\n                count += 1\n    return count"},
{title:"Course Schedule (Cycle Detection)",desc:"Given n courses and prerequisites, determine if you can finish all courses (detect cycle in directed graph).",approach:"Build directed graph. Use topological sort (Kahn's algorithm). If the sorted order includes all nodes, no cycle exists (can finish). Otherwise, there's a circular dependency.",tc:"O(V + E)",sc:"O(V + E)",code:"from collections import deque, defaultdict\n\ndef can_finish(n, prerequisites):\n    graph = defaultdict(list)\n    in_degree = [0] * n\n    for course, prereq in prerequisites:\n        graph[prereq].append(course)\n        in_degree[course] += 1\n    \n    queue = deque([i for i in range(n) if in_degree[i]==0])\n    count = 0\n    while queue:\n        node = queue.popleft()\n        count += 1\n        for nb in graph[node]:\n            in_degree[nb] -= 1\n            if in_degree[nb] == 0:\n                queue.append(nb)\n    return count == n"},
{title:"Dijkstra's Shortest Path",desc:"Find shortest distances from source to all nodes in a weighted graph.",approach:"Use min-heap priority queue. Start from source with distance 0. Greedily explore nearest unfinalized node, relaxing edges to update distances of neighbors.",tc:"O((V + E) log V)",sc:"O(V)",code:"import heapq\n\ndef dijkstra(graph, src, n):\n    dist = [float('inf')] * n\n    dist[src] = 0\n    heap = [(0, src)]\n    while heap:\n        d, u = heapq.heappop(heap)\n        if d > dist[u]: continue\n        for v, w in graph[u]:\n            if dist[u] + w < dist[v]:\n                dist[v] = dist[u] + w\n                heapq.heappush(heap, (dist[v], v))\n    return dist"}
],

{id:8,title:"Tries & Advanced DS",color:"#4ade80",section:"Data Structures",chips:["Trie","Union-Find","Segment Tree"],
subtopics:[
{name:"Trie (Prefix Tree)",theory:["Tree where each node represents a character; paths from root form words.","Each node has up to 26 children (for lowercase letters) and an is_end flag.","Enables O(m) insert and search where m is word length."],tc:"O(m) insert/search where m = word length",sc:"O(n * m) for n words",code:"class TrieNode:\n    def __init__(self):\n        self.children = {}\n        self.is_end = False\n\nclass Trie:\n    def __init__(self):\n        self.root = TrieNode()\n    \n    def insert(self, word):\n        node = self.root\n        for ch in word:\n            if ch not in node.children:\n                node.children[ch] = TrieNode()\n            node = node.children[ch]\n        node.is_end = True\n    \n    def search(self, word):\n        node = self.root\n        for ch in word:\n            if ch not in node.children:\n                return False\n            node = node.children[ch]\n        return node.is_end\n    \n    def starts_with(self, prefix):\n        node = self.root\n        for ch in prefix:\n            if ch not in node.children:\n                return False\n            node = node.children[ch]\n        return True"},
{name:"Insert/Search/StartsWith",theory:["Insert traverses/creates nodes for each character, marks last as end.","Search traverses nodes; returns True only if path exists AND is_end is True.","StartsWith (prefix search) just checks if path exists (no is_end check)."],tc:"O(m) per operation",sc:"O(1) per operation (nodes already exist)",code:"# Using the Trie class above\ntrie = Trie()\ntrie.insert('apple')\ntrie.insert('app')\ntrie.insert('application')\n\nprint(trie.search('app'))       # True\nprint(trie.search('ap'))        # False (not a complete word)\nprint(trie.starts_with('ap'))   # True (prefix exists)\nprint(trie.starts_with('b'))    # False\n\n# Count words with prefix\ndef count_prefix(trie, prefix):\n    node = trie.root\n    for ch in prefix:\n        if ch not in node.children:\n            return 0\n        node = node.children[ch]\n    # DFS to count all words under this node\n    count = [0]\n    def dfs(n):\n        if n.is_end: count[0] += 1\n        for child in n.children.values():\n            dfs(child)\n    dfs(node)\n    return count[0]"},
{name:"Disjoint Set (Union-Find)",theory:["Tracks elements partitioned into non-overlapping sets.","Union: merge two sets; Find: determine which set an element belongs to.","With path compression + union by rank: nearly O(1) per operation (O(alpha(n)))."],tc:"O(alpha(n)) ≈ O(1) amortized per operation",sc:"O(n)",code:"class UnionFind:\n    def __init__(self, n):\n        self.parent = list(range(n))\n        self.rank = [0] * n\n        self.components = n\n    \n    def find(self, x):\n        if self.parent[x] != x:\n            self.parent[x] = self.find(self.parent[x])  # path compression\n        return self.parent[x]\n    \n    def union(self, x, y):\n        px, py = self.find(x), self.find(y)\n        if px == py:\n            return False\n        # Union by rank\n        if self.rank[px] < self.rank[py]:\n            px, py = py, px\n        self.parent[py] = px\n        if self.rank[px] == self.rank[py]:\n            self.rank[px] += 1\n        self.components -= 1\n        return True\n    \n    def connected(self, x, y):\n        return self.find(x) == self.find(y)"},
{name:"Path Compression & Union by Rank",theory:["Path compression: during find, point every node directly to root.","Union by rank: attach smaller tree under root of larger tree.","Together they achieve inverse Ackermann time complexity, practically O(1)."],tc:"O(alpha(n)) per operation",sc:"O(n)",code:"# Path compression flattens the tree\n# Before: 1 -> 2 -> 3 -> 4 (root)\n# After find(1): 1 -> 4, 2 -> 4, 3 -> 4\n\n# Example: Count connected components\ndef count_components_uf(n, edges):\n    uf = UnionFind(n)\n    for u, v in edges:\n        uf.union(u, v)\n    return uf.components\n\n# Example: Detect cycle in undirected graph\ndef has_cycle_uf(n, edges):\n    uf = UnionFind(n)\n    for u, v in edges:\n        if uf.connected(u, v):\n            return True  # Already connected = back edge = cycle\n        uf.union(u, v)\n    return False"},
{name:"Segment Tree Basics",theory:["Binary tree for range queries (sum, min, max) with point/range updates.","Build in O(n); query and update in O(log n).","Each node represents a segment (range) of the array; leaves are individual elements."],tc:"O(log n) query/update, O(n) build",sc:"O(n)",code:"class SegmentTree:\n    def __init__(self, nums):\n        self.n = len(nums)\n        self.tree = [0] * (4 * self.n)\n        self._build(nums, 1, 0, self.n - 1)\n    \n    def _build(self, nums, node, start, end):\n        if start == end:\n            self.tree[node] = nums[start]\n            return\n        mid = (start + end) // 2\n        self._build(nums, 2*node, start, mid)\n        self._build(nums, 2*node+1, mid+1, end)\n        self.tree[node] = self.tree[2*node] + self.tree[2*node+1]\n    \n    def update(self, idx, val, node=1, start=0, end=None):\n        if end is None: end = self.n - 1\n        if start == end:\n            self.tree[node] = val\n            return\n        mid = (start + end) // 2\n        if idx <= mid:\n            self.update(idx, val, 2*node, start, mid)\n        else:\n            self.update(idx, val, 2*node+1, mid+1, end)\n        self.tree[node] = self.tree[2*node] + self.tree[2*node+1]\n    \n    def query(self, l, r, node=1, start=0, end=None):\n        if end is None: end = self.n - 1\n        if r < start or end < l:\n            return 0\n        if l <= start and end <= r:\n            return self.tree[node]\n        mid = (start + end) // 2\n        return (self.query(l, r, 2*node, start, mid) +\n                self.query(l, r, 2*node+1, mid+1, end))"}
],
examples:[
{title:"Implement Trie (Prefix Tree)",desc:"Implement a trie with insert, search, and startsWith methods.",approach:"Use a TrieNode class with children dict and is_end flag. Insert creates nodes along the path. Search follows path and checks is_end. StartsWith just checks path existence.",tc:"O(m) per operation",sc:"O(total characters inserted)",code:"class TrieNode:\n    def __init__(self):\n        self.children = {}\n        self.is_end = False\n\nclass Trie:\n    def __init__(self):\n        self.root = TrieNode()\n    \n    def insert(self, word):\n        node = self.root\n        for c in word:\n            if c not in node.children:\n                node.children[c] = TrieNode()\n            node = node.children[c]\n        node.is_end = True\n    \n    def search(self, word):\n        node = self._find(word)\n        return node is not None and node.is_end\n    \n    def startsWith(self, prefix):\n        return self._find(prefix) is not None\n    \n    def _find(self, s):\n        node = self.root\n        for c in s:\n            if c not in node.children: return None\n            node = node.children[c]\n        return node"},
{title:"Number of Connected Components (Union-Find)",desc:"Given n nodes and list of edges, find number of connected components.",approach:"Initialize Union-Find with n components. For each edge, union the two nodes. If they're already connected, skip. Final component count is the answer.",tc:"O(E * alpha(n)) ≈ O(E)",sc:"O(n)",code:"class UnionFind:\n    def __init__(self, n):\n        self.parent = list(range(n))\n        self.rank = [0] * n\n        self.count = n\n    def find(self, x):\n        if self.parent[x] != x:\n            self.parent[x] = self.find(self.parent[x])\n        return self.parent[x]\n    def union(self, x, y):\n        px, py = self.find(x), self.find(y)\n        if px == py: return\n        if self.rank[px]<self.rank[py]: px,py=py,px\n        self.parent[py] = px\n        if self.rank[px]==self.rank[py]: self.rank[px]+=1\n        self.count -= 1\n\ndef count_components(n, edges):\n    uf = UnionFind(n)\n    for u, v in edges:\n        uf.union(u, v)\n    return uf.count"},
{title:"Range Sum Query with Updates (Segment Tree)",desc:"Design a structure supporting update(index, val) and sumRange(left, right).",approach:"Build segment tree where each node stores sum of its range. Update propagates from leaf to root in O(log n). Query combines relevant segments in O(log n).",tc:"O(log n) per operation",sc:"O(n)",code:"class NumArray:\n    def __init__(self, nums):\n        self.n = len(nums)\n        self.tree = [0] * (2 * self.n)\n        # Build - put values in leaves\n        for i in range(self.n):\n            self.tree[self.n + i] = nums[i]\n        for i in range(self.n - 1, 0, -1):\n            self.tree[i] = self.tree[2*i] + self.tree[2*i+1]\n    \n    def update(self, i, val):\n        i += self.n\n        self.tree[i] = val\n        while i > 1:\n            i //= 2\n            self.tree[i] = self.tree[2*i] + self.tree[2*i+1]\n    \n    def sum_range(self, l, r):\n        res = 0\n        l += self.n; r += self.n + 1\n        while l < r:\n            if l & 1: res += self.tree[l]; l += 1\n            if r & 1: r -= 1; res += self.tree[r]\n            l >>= 1; r >>= 1\n        return res"}
],

{id:9,title:"Sorting Algorithms",color:"#60a5fa",section:"Algorithms",chips:["Bubble","Selection","Merge","Quick","Counting"],
subtopics:[
{name:"Bubble Sort",theory:["Repeatedly swap adjacent elements if they're in wrong order.","After each pass, the largest unsorted element bubbles to its correct position.","Best case O(n) when array is already sorted (with optimization flag)."],tc:"O(n²) avg/worst, O(n) best",sc:"O(1)",code:"def bubble_sort(arr):\n    n = len(arr)\n    for i in range(n):\n        swapped = False\n        for j in range(n - 1 - i):\n            if arr[j] > arr[j+1]:\n                arr[j], arr[j+1] = arr[j+1], arr[j]\n                swapped = True\n        if not swapped:\n            break  # Already sorted\n    return arr\n\nprint(bubble_sort([64, 34, 25, 12, 22, 11, 90]))"},
{name:"Selection Sort",theory:["Find minimum element in unsorted portion, swap it to front of unsorted section.","Makes at most n-1 swaps; useful when write operations are expensive.","Always O(n²) regardless of input order (no best case optimization)."],tc:"O(n²)",sc:"O(1)",code:"def selection_sort(arr):\n    n = len(arr)\n    for i in range(n):\n        min_idx = i\n        for j in range(i+1, n):\n            if arr[j] < arr[min_idx]:\n                min_idx = j\n        arr[i], arr[min_idx] = arr[min_idx], arr[i]\n    return arr\n\nprint(selection_sort([64, 25, 12, 22, 11]))"},
{name:"Insertion Sort",theory:["Build sorted array one element at a time, inserting each into correct position.","Efficient for small arrays and nearly sorted data (O(n) best case).","Stable sort; used as base case in hybrid sorts like Timsort."],tc:"O(n²) avg/worst, O(n) best",sc:"O(1)",code:"def insertion_sort(arr):\n    for i in range(1, len(arr)):\n        key = arr[i]\n        j = i - 1\n        while j >= 0 and arr[j] > key:\n            arr[j+1] = arr[j]\n            j -= 1\n        arr[j+1] = key\n    return arr\n\nprint(insertion_sort([12, 11, 13, 5, 6]))"},
{name:"Merge Sort",theory:["Divide array in half recursively, then merge sorted halves.","Guaranteed O(n log n) in all cases; stable sort.","Requires O(n) extra space for merging; good for linked lists (no extra space needed)."],tc:"O(n log n)",sc:"O(n)",code:"def merge_sort(arr):\n    if len(arr) <= 1:\n        return arr\n    mid = len(arr) // 2\n    left = merge_sort(arr[:mid])\n    right = merge_sort(arr[mid:])\n    return merge(left, right)\n\ndef merge(left, right):\n    result = []\n    i = j = 0\n    while i < len(left) and j < len(right):\n        if left[i] <= right[j]:\n            result.append(left[i])\n            i += 1\n        else:\n            result.append(right[j])\n            j += 1\n    result.extend(left[i:])\n    result.extend(right[j:])\n    return result\n\nprint(merge_sort([38, 27, 43, 3, 9, 82, 10]))"},
{name:"Quick Sort",theory:["Choose pivot, partition array so left < pivot < right, recurse on both halves.","Average O(n log n); worst O(n²) with poor pivot selection (already sorted + first pivot).","In-place (O(log n) stack space); fastest in practice for random data."],tc:"O(n log n) avg, O(n²) worst",sc:"O(log n) stack space",code:"def quick_sort(arr):\n    if len(arr) <= 1:\n        return arr\n    pivot = arr[len(arr)//2]\n    left = [x for x in arr if x < pivot]\n    middle = [x for x in arr if x == pivot]\n    right = [x for x in arr if x > pivot]\n    return quick_sort(left) + middle + quick_sort(right)\n\n# In-place partition (Lomuto scheme)\ndef partition(arr, low, high):\n    pivot = arr[high]\n    i = low - 1\n    for j in range(low, high):\n        if arr[j] < pivot:\n            i += 1\n            arr[i], arr[j] = arr[j], arr[i]\n    arr[i+1], arr[high] = arr[high], arr[i+1]\n    return i + 1"},
{name:"Counting Sort",theory:["Non-comparison sort; counts occurrences and places elements by count.","Only works for integers in a known range [0, k]; O(n+k) time.","Stable when implemented correctly; used as subroutine in Radix Sort."],tc:"O(n + k) where k = range",sc:"O(k)",code:"def counting_sort(arr):\n    if not arr:\n        return arr\n    max_val = max(arr)\n    count = [0] * (max_val + 1)\n    for num in arr:\n        count[num] += 1\n    \n    result = []\n    for i in range(len(count)):\n        result.extend([i] * count[i])\n    return result\n\nprint(counting_sort([4, 2, 2, 8, 3, 3, 1]))"},
{name:"Comparison & When to Use Each",theory:["Small arrays (n<20): Insertion sort (low overhead, good cache behavior).","General purpose: Merge sort (stable, guaranteed O(n log n)) or Quick sort (fast in practice).","Known integer range: Counting/Radix sort for O(n) linear time."],tc:"Varies by algorithm",sc:"Varies by algorithm",code:"# Python's built-in sort uses Timsort\n# Timsort: hybrid of merge sort + insertion sort\n# Time: O(n log n) worst, O(n) best\n# Space: O(n)\n# Stable: Yes\n\narr = [5, 2, 8, 1, 9, 3]\narr.sort()              # In-place, returns None\nsorted_arr = sorted(arr) # Returns new list\n\n# Custom sort\nstudents = [('Alice', 85), ('Bob', 92), ('Charlie', 85)]\nstudents.sort(key=lambda x: (-x[1], x[0]))  # By grade desc, name asc"}
],
examples:[
{title:"Sort an Array (Merge Sort Implementation)",desc:"Sort an integer array in ascending order using merge sort.",approach:"Recursively divide array into halves until single elements. Merge sorted halves by comparing elements from both and building a sorted result array.",tc:"O(n log n)",sc:"O(n)",code:"def sort_array(nums):\n    if len(nums) <= 1:\n        return nums\n    mid = len(nums) // 2\n    left = sort_array(nums[:mid])\n    right = sort_array(nums[mid:])\n    return merge(left, right)\n\ndef merge(a, b):\n    result = []\n    i = j = 0\n    while i < len(a) and j < len(b):\n        if a[i] <= b[j]:\n            result.append(a[i]); i += 1\n        else:\n            result.append(b[j]); j += 1\n    return result + a[i:] + b[j:]"},
{title:"Sort Colors (Dutch National Flag)",desc:"Sort array containing only 0, 1, 2 in one pass without sort function.",approach:"Three-pointer approach: low (boundary for 0s), mid (current), high (boundary for 2s). Swap 0s to low, 2s to high, skip 1s. Single pass O(n).",tc:"O(n)",sc:"O(1)",code:"def sort_colors(nums):\n    low, mid, high = 0, 0, len(nums) - 1\n    while mid <= high:\n        if nums[mid] == 0:\n            nums[low], nums[mid] = nums[mid], nums[low]\n            low += 1\n            mid += 1\n        elif nums[mid] == 1:\n            mid += 1\n        else:\n            nums[mid], nums[high] = nums[high], nums[mid]\n            high -= 1\n    return nums"},
{title:"Kth Largest Element (QuickSelect)",desc:"Find kth largest element without fully sorting the array.",approach:"Use QuickSelect (partition-based). Partition around a pivot; if pivot is at index n-k, found it. Otherwise recurse on the appropriate half. Average O(n).",tc:"O(n) avg, O(n²) worst",sc:"O(1)",code:"import random\n\ndef find_kth_largest(nums, k):\n    k = len(nums) - k  # Convert to kth smallest\n    \n    def quickselect(l, r):\n        pivot_idx = random.randint(l, r)\n        nums[pivot_idx], nums[r] = nums[r], nums[pivot_idx]\n        pivot = nums[r]\n        p = l\n        for i in range(l, r):\n            if nums[i] <= pivot:\n                nums[p], nums[i] = nums[i], nums[p]\n                p += 1\n        nums[p], nums[r] = nums[r], nums[p]\n        if p == k: return nums[p]\n        elif p < k: return quickselect(p+1, r)\n        else: return quickselect(l, p-1)\n    \n    return quickselect(0, len(nums)-1)"}
],
