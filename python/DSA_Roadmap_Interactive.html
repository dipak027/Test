// Section labels
const sections = {
    'Data Structures': [1,8],
    'Algorithms': [9,13],
    'Problem-Solving Patterns': [14,20]
};

function getProgress(){return loadProgress();}

function getTotalChecked(){
    const p=getProgress();
    let count=0;
    for(let k in p){count+=Object.keys(p[k]).filter(x=>p[k][x]).length;}
    return count;
}

function getTotalPractice(){
    return topics.reduce((s,t)=>s+t.practice.length,0);
}

function updateProgressBar(){
    const done=getTotalChecked();
    const total=getTotalPractice();
    document.getElementById('progressText').textContent=done+' / '+total;
    document.getElementById('progressFill').style.width=(total?((done/total)*100):0)+'%';
}

function getTopicProgress(topicId){
    const p=getProgress();
    const key='topic_'+topicId;
    if(!p[key])return 0;
    return Object.keys(p[key]).filter(x=>p[key][x]).length;
}

function renderRoadmap(){
    const container=document.getElementById('roadmapContainer');
    let html='';
    let lastSection='';
    topics.forEach(t=>{
        if(t.section!==lastSection){
            lastSection=t.section;
            html+=`<div class="section-label">${t.section}</div>`;
        }
        const done=getTopicProgress(t.id);
        const total=t.practice.length;
        html+=`<div class="node" onclick="showDetail(${t.id})">
            <div class="node-number" style="border-color:${t.color};color:${t.color}">${t.id}</div>
            <div class="node-card">
                <div class="node-title" style="color:${t.color}">${t.title}</div>
                <div class="node-chips">${t.chips.map(c=>`<span class="chip">${c}</span>`).join('')}</div>
                <div class="node-progress">${done}/${total} practice completed</div>
            </div>
        </div>`;
    });
    container.innerHTML=html;
}

function showRoadmap(){
    document.getElementById('roadmapPage').classList.add('active');
    document.getElementById('detailPage').classList.remove('active');
    renderRoadmap();
    updateProgressBar();
}

function showDetail(id){
    const topic=topics.find(t=>t.id===id);
    if(!topic)return;
    document.getElementById('roadmapPage').classList.remove('active');
    document.getElementById('detailPage').classList.add('active');
    document.getElementById('detailTitle').textContent=topic.title;
    document.getElementById('detailTitle').style.color=topic.color;
    document.getElementById('detailSubtitle').textContent=topic.chips.join(' • ');
    renderTheory(topic);
    renderExamples(topic);
    renderPractice(topic);
    switchTab('theory');
}

function switchTab(name){
    document.querySelectorAll('.tab').forEach((t,i)=>{
        t.classList.toggle('active',['theory','examples','practice'][i]===name);
    });
    document.querySelectorAll('.tab-content').forEach((c,i)=>{
        c.classList.toggle('active',['theory','examples','practice'][i]===name);
    });
}

function highlightPython(code){
    const keywords=['def','class','return','if','else','elif','for','while','in','not','and','or','is','None','True','False','import','from','as','with','try','except','finally','raise','yield','lambda','pass','break','continue','global','nonlocal','assert','del'];
    const builtins=['print','len','range','enumerate','zip','map','filter','sorted','reversed','sum','min','max','abs','int','str','float','list','dict','set','tuple','type','isinstance','hasattr','getattr','setattr','super','property','staticmethod','classmethod','any','all','next','iter','open','input','format','round','divmod','pow','hash','id','hex','bin','oct','ord','chr'];
    let h=code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    h=h.replace(/(#.*)/g,'<span class="cm">$1</span>');
    h=h.replace(/(&quot;.*?&quot;|&#39;.*?&#39;|".*?"|'.*?'|"""[\s\S]*?"""|'''[\s\S]*?''')/g,'<span class="st">$1</span>');
    h=h.replace(/(f".*?"|f'.*?')/g,'<span class="st">$1</span>');
    const kwRe=new RegExp('\\b('+keywords.join('|')+')\\b','g');
    h=h.replace(kwRe,'<span class="kw">$1</span>');
    const fnRe=new RegExp('\\b('+builtins.join('|')+')\\b','g');
    h=h.replace(fnRe,'<span class="fn">$1</span>');
    h=h.replace(/\b(\d+\.?\d*)\b/g,'<span class="nu">$1</span>');
    return h;
}

function renderTheory(topic){
    let html='';
    topic.subtopics.forEach(st=>{
        html+=`<div class="theory-section">
            <div class="theory-title">${st.name}</div>`;
        st.theory.forEach(p=>{
            html+=`<div class="theory-point">${p}</div>`;
        });
        if(st.tc)html+=`<span class="complexity-badge time">Time: ${st.tc}</span> `;
        if(st.sc)html+=`<span class="complexity-badge space">Space: ${st.sc}</span>`;
        html+=`<pre class="code-block"><code>${highlightPython(st.code)}</code></pre></div>`;
    });
    document.getElementById('theoryContent').innerHTML=html;
}

function renderExamples(topic){
    let html='';
    topic.examples.forEach(ex=>{
        html+=`<div class="example-card">
            <div class="example-title">${ex.title}</div>
            <div class="example-desc">${ex.desc}</div>
            <div class="approach-box">
                <div class="approach-label">Approach</div>
                <div class="approach-text">${ex.approach}</div>
            </div>`;
        if(ex.tc)html+=`<span class="complexity-badge time">Time: ${ex.tc}</span> `;
        if(ex.sc)html+=`<span class="complexity-badge space">Space: ${ex.sc}</span>`;
        html+=`<pre class="code-block"><code>${highlightPython(ex.code)}</code></pre></div>`;
    });
    document.getElementById('examplesContent').innerHTML=html;
}

function renderPractice(topic){
    const p=getProgress();
    const key='topic_'+topic.id;
    if(!p[key])p[key]={};
    const easy=topic.practice.filter(x=>x.d==='E');
    const medium=topic.practice.filter(x=>x.d==='M');
    const hard=topic.practice.filter(x=>x.d==='H');
    let html='';
    html+=`<div class="difficulty-header easy-h">Easy (${easy.length})</div>`;
    easy.forEach((pr,i)=>{html+=practiceItem(pr,key,'E',i,p);});
    html+=`<div class="difficulty-header medium-h">Medium (${medium.length})</div>`;
    medium.forEach((pr,i)=>{html+=practiceItem(pr,key,'M',i,p);});
    html+=`<div class="difficulty-header hard-h">Hard (${hard.length})</div>`;
    hard.forEach((pr,i)=>{html+=practiceItem(pr,key,'H',i,p);});
    document.getElementById('practiceContent').innerHTML=html;
}

function practiceItem(pr,key,diff,i,p){
    const id=diff+'_'+i;
    const checked=p[key]&&p[key][id];
    const diffClass=diff==='E'?'easy':diff==='M'?'medium':'hard';
    const diffLabel=diff==='E'?'Easy':diff==='M'?'Medium':'Hard';
    return `<div class="practice-item ${checked?'done':''}">
        <input type="checkbox" ${checked?'checked':''} onchange="togglePractice('${key}','${id}',this.checked)">
        <div class="practice-text">${pr.q}
            <div class="practice-approach">Pattern: ${pr.approach}</div>
        </div>
        <span class="difficulty ${diffClass}">${diffLabel}</span>
    </div>`;
}

function togglePractice(key,id,checked){
    const p=getProgress();
    if(!p[key])p[key]={};
    p[key][id]=checked;
    if(!checked)delete p[key][id];
    saveProgress(p);
    updateProgressBar();
    const item=event.target.closest('.practice-item');
    if(item)item.classList.toggle('done',checked);
}

// Initialize
renderRoadmap();
updateProgressBar();
</script>
