<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PySpark Learning Roadmap</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#080c14;--card:#141d2e;--border:#1e2d45;--text:#dde4f0;--text-dim:#8892a4;--green:#4ade80;--cyan:#22d3ee;--purple:#a78bfa;--gradient:linear-gradient(135deg,#4ade80,#22d3ee,#a78bfa)}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
code,pre,.code{font-family:'JetBrains Mono',monospace}
.header{position:sticky;top:0;z-index:1000;background:rgba(8,12,20,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:12px 24px}
.header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:1.4rem;font-weight:700;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.progress-container{flex:1;max-width:300px;margin-left:24px}
.progress-label{font-size:0.7rem;color:var(--text-dim);margin-bottom:4px;text-align:right}
.progress-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:var(--gradient);border-radius:3px;transition:width 0.5s ease}
.page{display:none;padding:40px 24px 80px;max-width:900px;margin:0 auto;animation:fadeIn 0.3s ease}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.roadmap{position:relative;padding-left:60px}
.roadmap::before{content:'';position:absolute;left:28px;top:0;bottom:0;width:2px;background:linear-gradient(to bottom,var(--green),var(--cyan),var(--purple));opacity:0.4}
.node{position:relative;margin-bottom:24px;cursor:pointer;transition:transform 0.2s ease}
.node:hover{transform:translateX(4px)}
.node-number{position:absolute;left:-48px;top:16px;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.8rem;border:2px solid;background:var(--bg)}
.node-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px 24px;transition:border-color 0.2s,box-shadow 0.2s}
.node:hover .node-card{border-color:var(--cyan);box-shadow:0 4px 20px rgba(34,211,238,0.1)}
.node-title{font-size:1.1rem;font-weight:600;margin-bottom:8px}
.node-chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{font-size:0.65rem;padding:3px 8px;border-radius:4px;background:rgba(255,255,255,0.05);border:1px solid var(--border);color:var(--text-dim)}
.node-progress{font-size:0.7rem;color:var(--text-dim);margin-top:8px}
.back-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);cursor:pointer;font-family:'Sora',sans-serif;font-size:0.85rem;margin-bottom:24px;transition:border-color 0.2s}
.back-btn:hover{border-color:var(--cyan)}
.detail-header{margin-bottom:24px}
.detail-title{font-size:1.8rem;font-weight:700;margin-bottom:8px}
.detail-subtitle{font-size:0.85rem;color:var(--text-dim)}
.tabs{display:flex;gap:4px;margin-bottom:24px;background:var(--card);border-radius:10px;padding:4px;border:1px solid var(--border)}
.tab{flex:1;padding:10px 16px;text-align:center;border-radius:8px;cursor:pointer;font-size:0.85rem;font-weight:500;color:var(--text-dim);transition:all 0.2s}
.tab.active{background:var(--border);color:var(--text)}
.tab:hover:not(.active){color:var(--text)}
.tab-content{display:none;animation:fadeIn 0.3s ease}
.tab-content.active{display:block}
.theory-section{margin-bottom:24px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px}
.theory-title{font-size:1rem;font-weight:600;margin-bottom:12px;color:var(--cyan)}
.theory-point{font-size:0.85rem;color:var(--text-dim);margin-bottom:8px;padding-left:16px;position:relative;line-height:1.6}
.theory-point::before{content:'>'; position:absolute;left:0;color:var(--green)}
pre.code-block{background:rgba(0,0,0,0.4);border:1px solid var(--border);border-radius:8px;padding:16px;margin-top:12px;overflow-x:auto;font-size:0.8rem;line-height:1.6}
.example-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:16px}
.example-title{font-size:0.9rem;font-weight:600;margin-bottom:8px;color:var(--purple)}
.example-desc{font-size:0.82rem;color:var(--text-dim);margin-bottom:12px}
.practice-item{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;transition:border-color 0.2s}
.practice-item:hover{border-color:var(--cyan)}
.practice-item input[type="checkbox"]{width:18px;height:18px;margin-top:2px;accent-color:var(--green);cursor:pointer}
.practice-item.done{opacity:0.6;border-color:var(--green)}
.practice-text{flex:1;font-size:0.82rem;line-height:1.5}
.difficulty{font-size:0.65rem;padding:2px 8px;border-radius:4px;font-weight:600;white-space:nowrap}
.difficulty.easy{background:rgba(74,222,128,0.15);color:#4ade80}
.difficulty.medium{background:rgba(251,191,36,0.15);color:#fbbf24}
.difficulty.hard{background:rgba(244,114,182,0.15);color:#f472b6}
.solution-item{background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:12px;overflow:hidden}
.solution-header{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.solution-header:hover{background:rgba(34,211,238,0.05)}
.solution-num{font-size:0.75rem;color:var(--text-dim);font-family:'JetBrains Mono',monospace;margin-right:10px}
.solution-q{font-size:0.82rem;flex:1}
.solution-toggle{padding:4px 12px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--cyan);font-size:0.72rem;cursor:pointer;font-family:'Sora',sans-serif;transition:all 0.2s}
.solution-toggle:hover{background:rgba(34,211,238,0.1);border-color:var(--cyan)}
.solution-body{display:none;padding:0 16px 16px;border-top:1px solid var(--border)}
.solution-body.open{display:block}
@media(max-width:640px){.roadmap{padding-left:40px}.roadmap::before{left:16px}.node-number{left:-32px;width:26px;height:26px;font-size:0.7rem}.header-inner{flex-wrap:wrap;gap:8px}.progress-container{max-width:100%;margin-left:0}}
</style>
</head>
<body>
<header class="header">
<div class="header-inner">
<div class="logo">PySpark Roadmap</div>
<div class="progress-container">
<div class="progress-label"><span id="progressText">0 / 300</span> completed</div>
<div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
</div>
</div>
</header>
<div class="page active" id="roadmapPage">
<div class="roadmap" id="roadmapContainer"></div>
</div>
<div class="page" id="detailPage">
<button class="back-btn" onclick="showRoadmap()">&#8592; Back to Roadmap</button>
<div class="detail-header">
<h1 class="detail-title" id="detailTitle"></h1>
<p class="detail-subtitle" id="detailSubtitle"></p>
</div>
<div class="tabs">
<div class="tab active" onclick="switchTab(\'theory\')">Theory</div>
<div class="tab" onclick="switchTab(\'examples\')">Examples</div>
<div class="tab" onclick="switchTab(\'practice\')">Practice</div>
<div class="tab" onclick="switchTab(\'solutions\')">Solutions</div>
</div>
<div class="tab-content active" id="theoryContent"></div>
<div class="tab-content" id="examplesContent"></div>
<div class="tab-content" id="practiceContent"></div>
<div class="tab-content" id="solutionsContent"></div>
</div>
<script>
const topics = [
{id:1,title:"PySpark Basics",color:"#38bdf8",chips:["SparkSession","RDD vs DataFrame","lazy eval","actions"],
subtopics:[
{name:"SparkSession & SparkContext",theory:["SparkSession is the unified entry point for PySpark since Spark 2.0, replacing SparkContext and SQLContext.","It provides access to Spark functionality: DataFrames, SQL, streaming, and configuration.","Use SparkSession.builder pattern with appName() and getOrCreate() to initialize."],code:"from pyspark.sql import SparkSession\n\n# Create SparkSession\nspark = SparkSession.builder \\\n    .appName('MyApp') \\\n    .master('local[*]') \\\n    .config('spark.sql.shuffle.partitions', '200') \\\n    .getOrCreate()\n\nprint(spark.version)\nprint(spark.sparkContext.appName)\n\n# Access SparkContext\nsc = spark.sparkContext\nprint(sc.defaultParallelism)\n\n# Stop session\n# spark.stop()"},
{name:"RDD vs DataFrame vs Dataset",theory:["RDD is the low-level distributed collection; unstructured, no schema, no optimization.","DataFrame is a distributed table with named columns and schema; uses Catalyst optimizer.","DataFrames provide 10-100x better performance than RDDs due to query optimization and code generation."],code:"from pyspark.sql import SparkSession\nspark = SparkSession.builder.appName('Compare').master('local[*]').getOrCreate()\n\n# RDD approach (low-level)\nrdd = spark.sparkContext.parallelize([(1,'Alice',30),(2,'Bob',25)])\nrdd_filtered = rdd.filter(lambda x: x[2] > 25)\nprint(rdd_filtered.collect())\n\n# DataFrame approach (optimized)\ndf = spark.createDataFrame([(1,'Alice',30),(2,'Bob',25)], ['id','name','age'])\ndf.filter(df.age > 25).show()\n\n# DataFrame is preferred for structured data"},
{name:"Lazy Evaluation",theory:["Transformations (select, filter, groupBy) are lazy - they build an execution plan but don't compute immediately.","Only actions (show, collect, count, write) trigger actual computation.","This allows Spark to optimize the entire pipeline before execution using Catalyst."],code:"from pyspark.sql import SparkSession\nspark = SparkSession.builder.appName('Lazy').master('local[*]').getOrCreate()\n\ndf = spark.createDataFrame([(1,'A',10),(2,'B',20),(3,'C',30)], ['id','name','val'])\n\n# These are lazy - no computation yet\nfiltered = df.filter(df.val > 10)\nselected = filtered.select('name','val')\ngrouped = selected.groupBy('name').count()\n\n# This triggers execution\ngrouped.show()\n\n# Explain shows the execution plan\ngrouped.explain(True)"},
{name:"Actions vs Transformations",theory:["Transformations return new DataFrames: select, filter, groupBy, join, withColumn, orderBy.","Actions return results to driver or write to storage: show, collect, count, first, take, write.","Each action triggers a job; multiple actions on same DataFrame recompute unless cached."],code:"from pyspark.sql import SparkSession\nspark = SparkSession.builder.appName('Actions').master('local[*]').getOrCreate()\n\ndf = spark.createDataFrame([(1,10),(2,20),(3,30),(4,40)], ['id','val'])\n\n# Transformations (lazy)\nt1 = df.filter(df.val > 15)\nt2 = t1.select('val')\n\n# Actions (trigger computation)\nprint(t2.count())        # 3\nprint(t2.collect())      # [Row(val=20), Row(val=30), Row(val=40)]\nprint(t2.first())        # Row(val=20)\nt2.show()                # prints table\nprint(t2.take(2))        # first 2 rows"}
],
examples:[
{title:"Setting Up SparkSession",desc:"Create a SparkSession with common configurations for local development.",code:"from pyspark.sql import SparkSession\n\nspark = SparkSession.builder \\\n    .appName('LocalDev') \\\n    .master('local[*]') \\\n    .config('spark.driver.memory', '2g') \\\n    .config('spark.sql.shuffle.partitions', '8') \\\n    .getOrCreate()\n\nprint(f'App: {spark.sparkContext.appName}')\nprint(f'Version: {spark.version}')\nprint(f'Parallelism: {spark.sparkContext.defaultParallelism}')\n\ndf = spark.range(10)\ndf.show(5)"},
{title:"Comparing RDD and DataFrame Performance",desc:"Demonstrate why DataFrames are preferred over RDDs for structured data.",code:"from pyspark.sql import SparkSession\nspark = SparkSession.builder.appName('Perf').master('local[*]').getOrCreate()\n\n# DataFrame way - optimized\ndf = spark.range(1000000).toDF('num')\nresult_df = df.filter(df.num % 2 == 0).count()\nprint(f'Even count (DF): {result_df}')\n\n# RDD way - no optimization\nrdd = spark.sparkContext.parallelize(range(1000000))\nresult_rdd = rdd.filter(lambda x: x % 2 == 0).count()\nprint(f'Even count (RDD): {result_rdd}')"},
{title:"Understanding Execution Plans",desc:"Use explain() to inspect how Spark optimizes queries.",code:"from pyspark.sql import SparkSession\nfrom pyspark.sql.functions import col\nspark = SparkSession.builder.appName('Plan').master('local[*]').getOrCreate()\n\ndf = spark.createDataFrame([(i, f'name_{i}', i*10) for i in range(100)], ['id','name','score'])\n\n# Complex query\nresult = df.filter(col('score') > 500) \\\n    .select('name','score') \\\n    .orderBy(col('score').desc())\n\n# Show physical plan\nresult.explain()\n# Show all plan phases\nresult.explain(True)"}
],

{q:"Create a SparkSession with appName 'TestApp' and master 'local[2]'. Print the Spark version.",d:"E"},

{id:2,title:"DataFrame Creation",color:"#34d399",chips:["createDataFrame","read","schema","StructType"],
subtopics:[
{name:"createDataFrame from Lists",theory:["spark.createDataFrame() creates a DataFrame from Python lists, tuples, or list of Rows.","You can specify column names as a list or use a full StructType schema.","Data types are inferred automatically but explicit schema gives better control and performance."],code:"from pyspark.sql import SparkSession, Row\nspark = SparkSession.builder.appName('Create').master('local[*]').getOrCreate()\n\n# From list of tuples\ndata = [(1,'Alice',30),(2,'Bob',25),(3,'Charlie',35)]\ndf = spark.createDataFrame(data, ['id','name','age'])\ndf.show()\n\n# From list of Rows\nrows = [Row(id=1,name='Alice'),Row(id=2,name='Bob')]\ndf2 = spark.createDataFrame(rows)\ndf2.show()\n\n# From list of dicts\ndicts = [{'id':1,'name':'Alice'},{'id':2,'name':'Bob'}]\ndf3 = spark.createDataFrame(dicts)\ndf3.show()"},
{name:"Schema Definition with StructType",theory:["StructType defines the schema with a list of StructField(name, type, nullable).","Common types: StringType, IntegerType, FloatType, DoubleType, BooleanType, DateType.","Explicit schemas prevent type inference overhead and ensure data integrity."],code:"from pyspark.sql import SparkSession\nfrom pyspark.sql.types import StructType, StructField, StringType, IntegerType, DoubleType\nspark = SparkSession.builder.appName('Schema').master('local[*]').getOrCreate()\n\nschema = StructType([\n    StructField('id', IntegerType(), False),\n    StructField('name', StringType(), True),\n    StructField('salary', DoubleType(), True)\n])\n\ndata = [(1,'Alice',75000.0),(2,'Bob',82000.0)]\ndf = spark.createDataFrame(data, schema)\ndf.printSchema()\ndf.show()"},
{name:"Reading CSV/JSON/Parquet Files",theory:["spark.read provides readers for CSV, JSON, Parquet, ORC, JDBC, and more.","CSV: use header=True, inferSchema=True or provide explicit schema for performance.","Parquet is the preferred format: columnar, compressed, schema-embedded, and fastest to read."],code:"from pyspark.sql import SparkSession\nspark = SparkSession.builder.appName('Read').master('local[*]').getOrCreate()\n\n# Read CSV\ndf_csv = spark.read.csv('data.csv', header=True, inferSchema=True)\n\n# Read JSON\ndf_json = spark.read.json('data.json')\n\n# Read Parquet (fastest)\ndf_parquet = spark.read.parquet('data.parquet')\n\n# Read with explicit schema\nfrom pyspark.sql.types import StructType, StructField, StringType, IntegerType\nschema = StructType([StructField('id',IntegerType()),StructField('name',StringType())])\ndf = spark.read.schema(schema).csv('data.csv', header=True)"},
{name:"Creating from Pandas & range",theory:["spark.createDataFrame(pandas_df) converts a Pandas DataFrame to Spark DataFrame.","spark.range(n) creates a DataFrame with a single column 'id' from 0 to n-1.","Converting from Pandas is useful for small datasets; avoid for large data (uses driver memory)."],code:"from pyspark.sql import SparkSession\nimport pandas as pd\nspark = SparkSession.builder.appName('Pandas').master('local[*]').getOrCreate()\n\n# From Pandas\npdf = pd.DataFrame({'name':['Alice','Bob'],'age':[30,25]})\ndf = spark.createDataFrame(pdf)\ndf.show()\n\n# Using range\ndf_range = spark.range(0, 100, 2)  # 0,2,4,...,98\ndf_range.show(5)\n\n# Convert back to Pandas\npdf_back = df.toPandas()\nprint(type(pdf_back))"}
],
examples:[
{title:"Creating DataFrame with Complex Schema",desc:"Define a schema with nested types and arrays.",code:"from pyspark.sql import SparkSession\nfrom pyspark.sql.types import *\nspark = SparkSession.builder.appName('Complex').master('local[*]').getOrCreate()\n\nschema = StructType([\n    StructField('id', IntegerType(), False),\n    StructField('name', StringType(), True),\n    StructField('scores', ArrayType(IntegerType()), True),\n    StructField('address', StructType([\n        StructField('city', StringType()),\n        StructField('state', StringType())\n    ]))\n])\n\ndata = [(1,'Alice',[90,85,92],('NYC','NY')),(2,'Bob',[78,88,95],('LA','CA'))]\ndf = spark.createDataFrame(data, schema)\ndf.printSchema()\ndf.show(truncate=False)"},
{title:"Reading Multiple File Formats",desc:"Read CSV with options and compare with Parquet reading.",code:"from pyspark.sql import SparkSession\nspark = SparkSession.builder.appName('Formats').master('local[*]').getOrCreate()\n\n# CSV with full options\ndf = spark.read \\\n    .option('header','true') \\\n    .option('inferSchema','true') \\\n    .option('delimiter',',') \\\n    .option('nullValue','NA') \\\n    .option('dateFormat','yyyy-MM-dd') \\\n    .csv('sales.csv')\n\ndf.printSchema()\ndf.show(5)\nprint(f'Rows: {df.count()}, Cols: {len(df.columns)}')"},
{title:"Schema Inspection Methods",desc:"Various ways to inspect DataFrame schema and structure.",code:"from pyspark.sql import SparkSession\nspark = SparkSession.builder.appName('Inspect').master('local[*]').getOrCreate()\n\ndf = spark.createDataFrame([(1,'Alice',30,75000.0),(2,'Bob',25,82000.0)],\n    ['id','name','age','salary'])\n\n# Schema inspection\ndf.printSchema()\nprint(df.schema)\nprint(df.dtypes)\nprint(df.columns)\nprint(f'Rows: {df.count()}')\ndf.describe().show()"}
],
practice:[
{q:"Create a DataFrame from a list of 5 tuples with columns: id, name, department, salary.",d:"E"},
{q:"Define a StructType schema with 4 fields and create a DataFrame using it.",d:"E"},
{q:"Create a DataFrame using spark.range(1, 101) and show the first 10 rows.",d:"E"},

{q:"Implement schema evolution: read two CSV files with different schemas into one DataFrame.",d:"H"},

]},
{id:3,title:"Column Operations",color:"#a78bfa",chips:["select","withColumn","drop","col","lit","cast"],
subtopics:[
{name:"select & selectExpr",theory:["select() picks specific columns from a DataFrame, returning a new DataFrame.","Can use column names as strings or col() objects for expressions.","selectExpr() allows SQL-like expressions: df.selectExpr('col1', 'col2 * 2 as doubled')."],code:"from pyspark.sql import SparkSession\nfrom pyspark.sql.functions import col, upper\nspark = SparkSession.builder.appName('Select').master('local[*]').getOrCreate()\n\ndf = spark.createDataFrame([(1,'Alice',30,75000),(2,'Bob',25,82000)],\n    ['id','name','age','salary'])\n\n# Select columns\ndf.select('name','age').show()\ndf.select(col('name'), col('salary') * 1.1).show()\n\n# selectExpr with SQL expressions\ndf.selectExpr('name', 'salary * 1.1 as new_salary', 'age + 5 as age_plus5').show()"},
{name:"withColumn & withColumnRenamed",theory:["withColumn(name, expr) adds a new column or replaces an existing one with same name.","withColumnRenamed(old, new) renames a column without modifying data.","Both return a new DataFrame (immutable); original is unchanged."],code:"from pyspark.sql import SparkSession\nfrom pyspark.sql.functions import col, lit, when\nspark = SparkSession.builder.appName('WithCol').master('local[*]').getOrCreate()\n\ndf = spark.createDataFrame([(1,'Alice',30),(2,'Bob',25)], ['id','name','age'])\n\n# Add new column\ndf2 = df.withColumn('age_group', when(col('age')>28,'Senior').otherwise('Junior'))\ndf2.show()\n\n# Replace existing column\ndf3 = df.withColumn('age', col('age') + 1)\ndf3.show()\n\n# Rename column\ndf4 = df.withColumnRenamed('name','full_name')\ndf4.show()"},
{name:"drop & alias",theory:["drop() removes one or more columns from a DataFrame.","alias() gives an expression or column a new name (used in select).","Multiple columns can be dropped in one call: df.drop('col1','col2')."],code:"from pyspark.sql import SparkSession\nfrom pyspark.sql.functions import col\nspark = SparkSession.builder.appName('Drop').master('local[*]').getOrCreate()\n\ndf = spark.createDataFrame([(1,'Alice',30,75000),(2,'Bob',25,82000)],\n    ['id','name','age','salary'])\n\n# Drop columns\ndf.drop('salary').show()\ndf.drop('age','salary').show()\n\n# Alias in select\ndf.select(col('name').alias('employee_name'), (col('salary')/12).alias('monthly_pay')).show()"},
{name:"col, lit, and cast",theory:["col('name') creates a Column reference for use in expressions and transformations.","lit(value) creates a Column with a constant/literal value for every row.","cast() converts column type: col('age').cast('string') or cast(IntegerType())."],code:"from pyspark.sql import SparkSession\nfrom pyspark.sql.functions import col, lit\nfrom pyspark.sql.types import IntegerType, DoubleType\nspark = SparkSession.builder.appName('ColLit').master('local[*]').getOrCreate()\n\ndf = spark.createDataFrame([('1','100.5'),('2','200.7')], ['id','amount'])\n\n# Cast string to int/double\ndf2 = df.withColumn('id_int', col('id').cast(IntegerType())) \\\n    .withColumn('amount_dbl', col('amount').cast(DoubleType()))\ndf2.printSchema()\ndf2.show()\n\n# lit for constant values\ndf3 = df.withColumn('country', lit('USA')).withColumn('multiplier', lit(1.5))\ndf3.show()"},
{name:"Column Expressions & Arithmetic",theory:["Columns support arithmetic: +, -, *, /, % and comparison: ==, !=, <, >, <=, >=.","Use & for AND, | for OR, ~ for NOT in boolean column expressions (with parentheses).","Column methods: isNull(), isNotNull(), between(), isin(), startswith(), endswith()."],code:"from pyspark.sql import SparkSession\nfrom pyspark.sql.functions import col\nspark = SparkSession.builder.appName('Expr').master('local[*]').getOrCreate()\n\ndf = spark.createDataFrame([(1,'Alice',30,75000),(2,'Bob',25,82000),(3,'Charlie',35,60000)],\n    ['id','name','age','salary'])\n\n# Arithmetic\ndf.select('name', (col('salary') * 12).alias('annual'), (col('salary') * 0.2).alias('tax')).show()\n\n# Boolean expressions\ndf.filter((col('age') > 25) & (col('salary') > 70000)).show()\ndf.filter(col('name').startswith('A') | col('name').startswith('B')).show()\ndf.filter(col('age').between(25,35)).show()"}
],
examples:[
{title:"Transforming Multiple Columns",desc:"Add computed columns and transform existing ones in a pipeline.",code:"from pyspark.sql import SparkSession\nfrom pyspark.sql.functions import col, lit, when, round\nspark = SparkSession.builder.appName('Transform').master('local[*]').getOrCreate()\n\ndf = spark.createDataFrame([\n    (1,'Alice','Engineering',95000),\n    (2,'Bob','Marketing',72000),\n    (3,'Charlie','Engineering',88000)\n], ['id','name','dept','salary'])\n\nresult = df \\\n    .withColumn('bonus', round(col('salary') * 0.1, 2)) \\\n    .withColumn('total_comp', col('salary') + col('salary') * 0.1) \\\n    .withColumn('level', when(col('salary') > 90000, 'Senior').otherwise('Mid'))\nresult.show()"},
{title:"Renaming Multiple Columns",desc:"Rename columns using a loop or toDF().",code:"from pyspark.sql import SparkSession\nspark = SparkSession.builder.appName('Rename').master('local[*]').getOrCreate()\n\ndf = spark.createDataFrame([(1,'Alice',30)], ['ID','Name','Age'])\n\n# Method 1: Loop\nfor old_col in df.columns:\n    df = df.withColumnRenamed(old_col, old_col.lower())\ndf.show()\n\n# Method 2: toDF\ndf2 = spark.createDataFrame([(1,'Bob',25)], ['ID','Name','Age'])\ndf2 = df2.toDF(*[c.lower() for c in df2.columns])\ndf2.show()"},
{title:"Type Casting Pipeline",desc:"Cast multiple columns from string to proper types.",code:"from pyspark.sql import SparkSession\nfrom pyspark.sql.functions import col\nfrom pyspark.sql.types import IntegerType, DoubleType, DateType\nspark = SparkSession.builder.appName('Cast').master('local[*]').getOrCreate()\n\n# All string data (like from CSV)\ndf = spark.createDataFrame([('1','30','75000.50','2023-01-15'),('2','25','82000.75','2023-03-20')],\n    ['id','age','salary','hire_date'])\n\ndf2 = df.withColumn('id', col('id').cast(IntegerType())) \\\n    .withColumn('age', col('age').cast(IntegerType())) \\\n    .withColumn('salary', col('salary').cast(DoubleType())) \\\n    .withColumn('hire_date', col('hire_date').cast(DateType()))\ndf2.printSchema()\ndf2.show()"}
],

{id:4,title:"Filtering & Sorting",color:"#fbbf24",chips:["filter","where","between","isin","orderBy"],
subtopics:[
{name:"filter & where",theory:["filter() and where() are aliases - both filter rows based on a boolean condition.","Conditions use Column expressions: col('age') > 25, df.age > 25, or SQL strings.","Chain multiple filters or combine conditions with & (AND), | (OR), ~ (NOT)."],code:"from pyspark.sql import SparkSession\nfrom pyspark.sql.functions import col\nspark = SparkSession.builder.appName('Filter').master('local[*]').getOrCreate()\n\ndf = spark.createDataFrame([\n    (1,'Alice',30,'Eng',95000),(2,'Bob',25,'Mkt',72000),\n    (3,'Charlie',35,'Eng',88000),(4,'Diana',28,'HR',65000)\n], ['id','name','age','dept','salary'])\n\n# filter and where are identical\ndf.filter(col('age') > 28).show()\ndf.where(col('salary') >= 80000).show()\n\n# Multiple conditions\ndf.filter((col('age') > 25) & (col('dept') == 'Eng')).show()\n\n# SQL string style\ndf.filter('age > 28 AND dept = \"Eng\"').show()"},
{name:"between & isin",theory:["between(lower, upper) checks if column value falls within inclusive range.","isin(values) checks if column value matches any value in the provided list.","Both return boolean columns that can be used with filter() or when()."],code:"from pyspark.sql import SparkSession\nfrom pyspark.sql.functions import col\nspark = SparkSession.builder.appName('BetweenIsin').master('local[*]').getOrCreate()\n\ndf = spark.createDataFrame([\n    (1,'Alice',30,'Eng',95000),(2,'Bob',25,'Mkt',72000),\n    (3,'Charlie',35,'Eng',88000),(4,'Diana',28,'HR',65000)\n], ['id','name','age','dept','salary'])\n\n# between - inclusive range\ndf.filter(col('age').between(25,30)).show()\ndf.filter(col('salary').between(70000,90000)).show()\n\n# isin - match list of values\ndf.filter(col('dept').isin('Eng','HR')).show()\ndf.filter(col('name').isin(['Alice','Bob'])).show()"},
{name:"Null Filtering",theory:["isNull() and isNotNull() filter rows with or without null values in a column.","Use na.drop() to remove rows with any null; na.drop(subset=['col']) for specific columns.","Comparisons with null always return null; use isNull() instead of == None."],code:"from pyspark.sql import SparkSession\nfrom pyspark.sql.functions import col\nspark = SparkSession.builder.appName('Nulls').master('local[*]').getOrCreate()\n\ndf = spark.createDataFrame([\n    (1,'Alice',30),(2,None,25),(3,'Charlie',None),(4,'Diana',28)\n], ['id','name','age'])\n\n# Filter nulls\ndf.filter(col('name').isNotNull()).show()\ndf.filter(col('age').isNull()).show()\n\n# Drop rows with any null\ndf.na.drop().show()\n# Drop rows where specific columns are null\ndf.na.drop(subset=['name']).show()"},
{name:"orderBy & sort",theory:["orderBy() and sort() are aliases; both sort the DataFrame by one or more columns.","Use col('x').asc() or col('x').desc() for sort direction; default is ascending.","Sorting a large DataFrame triggers a shuffle; use within partitions with sortWithinPartitions()."],code:"from pyspark.sql import SparkSession\nfrom pyspark.sql.functions import col\nspark = SparkSession.builder.appName('Sort').master('local[*]').getOrCreate()\n\ndf = spark.createDataFrame([\n    (1,'Alice',30,95000),(2,'Bob',25,72000),(3,'Charlie',35,88000),(4,'Diana',28,65000)\n], ['id','name','age','salary'])\n\n# Single column sort\ndf.orderBy('age').show()\ndf.orderBy(col('salary').desc()).show()\n\n# Multi-column sort\ndf.orderBy(col('age').asc(), col('salary').desc()).show()\n\n# Sort within partitions (no full shuffle)\ndf.sortWithinPartitions('age').show()"},
{name:"distinct & dropDuplicates",theory:["distinct() returns unique rows considering all columns.","dropDuplicates(subset) removes duplicates based on specific columns only.","Both trigger a shuffle operation; use with caution on large datasets."],code:"from pyspark.sql import SparkSession\nspark = SparkSession.builder.appName('Distinct').master('local[*]').getOrCreate()\n\ndf = spark.createDataFrame([\n    (1,'Eng','NYC'),(2,'Eng','NYC'),(3,'Mkt','LA'),(4,'Eng','LA'),(5,'HR','NYC')\n], ['id','dept','city'])\n\n# All distinct rows\ndf.select('dept','city').distinct().show()\n\n# Drop duplicates on specific columns\ndf.dropDuplicates(['dept']).show()\ndf.dropDuplicates(['city']).show()\n\nprint(f'Original count: {df.count()}')\nprint(f'Distinct dept-city: {df.select("dept","city").distinct().count()}')"}
],
examples:[
{title:"Complex Filtering Pipeline",desc:"Chain multiple filter conditions for a real-world scenario.",code:"from pyspark.sql import SparkSession\nfrom pyspark.sql.functions import col, year, current_date\nspark = SparkSession.builder.appName('ComplexFilter').master('local[*]').getOrCreate()\n\ndf = spark.createDataFrame([\n    (1,'Alice','Eng',95000,'2020-01-15'),(2,'Bob','Mkt',72000,'2019-06-20'),\n    (3,'Charlie','Eng',88000,'2021-03-10'),(4,'Diana','HR',65000,'2022-11-05'),\n    (5,'Eve','Eng',110000,'2018-08-22')\n], ['id','name','dept','salary','hire_date'])\n\n# Senior engineers with high salary\nresult = df.filter(\n    (col('dept') == 'Eng') &\n    (col('salary') > 85000) &\n    (col('hire_date') < '2021-01-01')\n).orderBy(col('salary').desc())\nresult.show()"},
{title:"Top-N per Category",desc:"Get top records per group using window or filter logic.",code:"from pyspark.sql import SparkSession\nfrom pyspark.sql.functions import col\nspark = SparkSession.builder.appName('TopN').master('local[*]').getOrCreate()\n\ndf = spark.createDataFrame([\n    ('Eng','Alice',95000),('Eng','Bob',88000),('Eng','Charlie',110000),\n    ('Mkt','Diana',72000),('Mkt','Eve',68000),('HR','Frank',65000)\n], ['dept','name','salary'])\n\n# Top earner per department using sort + dropDuplicates\ntop_per_dept = df.orderBy(col('salary').desc()).dropDuplicates(['dept'])\ntop_per_dept.show()"},
{title:"Deduplication Strategy",desc:"Remove duplicates keeping the most recent record.",code:"from pyspark.sql import SparkSession\nfrom pyspark.sql.functions import col\nspark = SparkSession.builder.appName('Dedup').master('local[*]').getOrCreate()\n\ndf = spark.createDataFrame([\n    (1,'Alice','2023-01-01',100),(1,'Alice','2023-02-01',150),\n    (2,'Bob','2023-01-15',200),(2,'Bob','2023-03-01',250)\n], ['id','name','date','value'])\n\n# Keep latest record per id\ndeduped = df.orderBy(col('date').desc()).dropDuplicates(['id'])\ndeduped.orderBy('id').show()"}

{id:5,title:"Aggregation & GroupBy",color:"#f472b6",chips:["groupBy","agg","count","sum","pivot","cube"],
subtopics:[
{name:"groupBy & Basic Aggregations",theory:["groupBy() groups rows by one or more columns; follow with agg functions like count, sum, avg.","Common functions: count(), sum(), avg()/mean(), min(), max(), first(), last().","groupBy returns a GroupedData object; must call an aggregate function to get a DataFrame."],code:"from pyspark.sql import SparkSession\nfrom pyspark.sql.functions import count, sum, avg, min, max\nspark = SparkSession.builder.appName('GroupBy').master('local[*]').getOrCreate()\n\ndf = spark.createDataFrame([\n    ('Eng','Alice',95000),('Eng','Bob',88000),('Mkt','Charlie',72000),\n    ('Mkt','Diana',68000),('HR','Eve',65000),('Eng','Frank',110000)\n], ['dept','name','salary'])\n\n# Basic groupBy\ndf.groupBy('dept').count().show()\ndf.groupBy('dept').sum('salary').show()\ndf.groupBy('dept').avg('salary').show()\ndf.groupBy('dept').agg(count('*').alias('emp_count'), avg('salary').alias('avg_sal')).show()"},
{name:"agg with Multiple Functions",theory:["agg() allows applying multiple aggregate functions simultaneously on different columns.","Use alias() to name the output columns for clarity.","Can combine count, sum, avg, min, max, collect_list, collect_set in one agg()."],code:"from pyspark.sql import SparkSession\nfrom pyspark.sql.functions import count, sum, avg, min, max, round\nspark = SparkSession.builder.appName('Agg').master('local[*]').getOrCreate()\n\ndf = spark.createDataFrame([\n    ('Eng','Alice',95000,5),('Eng','Bob',88000,3),('Mkt','Charlie',72000,7),\n    ('Mkt','Diana',68000,2),('HR','Eve',65000,4),('Eng','Frank',110000,8)\n], ['dept','name','salary','years'])\n\nresult = df.groupBy('dept').agg(\n    count('*').alias('emp_count'),\n    round(avg('salary'),2).alias('avg_salary'),\n    max('salary').alias('max_salary'),\n    min('salary').alias('min_salary'),\n    sum('years').alias('total_years')\n)\nresult.show()"},
{name:"pivot Tables",theory:["pivot() rotates rows into columns; used after groupBy to create cross-tabulation.","Syntax: df.groupBy('row_col').pivot('pivot_col').agg(func) creates wide-format table.","Specify values in pivot() for better performance: pivot('col', ['val1','val2'])."],code:"from pyspark.sql import SparkSession\nfrom pyspark.sql.functions import sum, count\nspark = SparkSession.builder.appName('Pivot').master('local[*]').getOrCreate()\n\ndf = spark.createDataFrame([\n    ('Alice','Q1',1000),('Alice','Q2',1500),('Alice','Q3',1200),\n    ('Bob','Q1',800),('Bob','Q2',900),('Bob','Q3',1100),\n    ('Charlie','Q1',1300),('Charlie','Q2',1400),('Charlie','Q3',1600)\n], ['name','quarter','sales'])\n\n# Pivot quarter values into columns\npivoted = df.groupBy('name').pivot('quarter', ['Q1','Q2','Q3']).sum('sales')\npivoted.show()"},
{name:"cube & rollup",theory:["cube() computes aggregations for all combinations of grouping columns (all subsets).","rollup() computes hierarchical aggregations (like subtotals at each level).","Both produce null in grouping columns to indicate subtotal/grand total rows."],code:"from pyspark.sql import SparkSession\nfrom pyspark.sql.functions import sum, count\nspark = SparkSession.builder.appName('Cube').master('local[*]').getOrCreate()\n\ndf = spark.createDataFrame([\n    ('Eng','NYC',95000),('Eng','LA',88000),('Mkt','NYC',72000),\n    ('Mkt','LA',68000),('HR','NYC',65000),('HR','LA',70000)\n], ['dept','city','salary'])\n\n# Cube - all combinations\ndf.cube('dept','city').sum('salary').orderBy('dept','city').show()\n\n# Rollup - hierarchical\ndf.rollup('dept','city').sum('salary').orderBy('dept','city').show()"},
{name:"collect_list & collect_set",theory:["collect_list() aggregates column values into an array (preserves duplicates).","collect_set() aggregates into an array of unique values (no duplicates).","Useful for creating array columns from grouped data; beware of memory for large groups."],code:"from pyspark.sql import SparkSession\nfrom pyspark.sql.functions import collect_list, collect_set, count\nspark = SparkSession.builder.appName('Collect').master('local[*]').getOrCreate()\n\ndf = spark.createDataFrame([\n    ('Eng','Python'),('Eng','Java'),('Eng','Python'),\n    ('Mkt','Excel'),('Mkt','SQL'),('HR','Excel')\n], ['dept','skill'])\n\ndf.groupBy('dept').agg(\n    collect_list('skill').alias('all_skills'),\n    collect_set('skill').alias('unique_skills'),\n    count('skill').alias('skill_count')\n).show(truncate=False)"}
],
examples:[
{title:"Sales Summary Report",desc:"Create a comprehensive sales summary with multiple aggregations.",code:"from pyspark.sql import SparkSession\nfrom pyspark.sql.functions import sum, avg, count, round, max, min\nspark = SparkSession.builder.appName('Sales').master('local[*]').getOrCreate()\n\ndf = spark.createDataFrame([\n    ('Electronics','TV',500,3),('Electronics','Phone',800,5),\n    ('Clothing','Shirt',50,20),('Clothing','Pants',80,15),\n    ('Food','Apple',2,100),('Food','Bread',3,80),('Electronics','Laptop',1200,2)\n], ['category','product','price','quantity'])\n\nresult = df.withColumn('revenue', df.price * df.quantity) \\\n    .groupBy('category').agg(\n        count('product').alias('num_products'),\n        round(sum('revenue'),2).alias('total_revenue'),\n        round(avg('price'),2).alias('avg_price'),\n        max('quantity').alias('max_qty')\n    ).orderBy('total_revenue', ascending=False)\nresult.show()"},
{title:"Pivot Table for Quarterly Report",desc:"Create a quarterly sales pivot table with row totals.",code:"from pyspark.sql import SparkSession\nfrom pyspark.sql.functions import sum, col, lit\nspark = SparkSession.builder.appName('QPivot').master('local[*]').getOrCreate()\n\ndf = spark.createDataFrame([\n    ('Alice','Q1',5000),('Alice','Q2',6000),('Alice','Q3',5500),('Alice','Q4',7000),\n    ('Bob','Q1',4000),('Bob','Q2',4500),('Bob','Q3',5000),('Bob','Q4',5500)\n], ['rep','quarter','revenue'])\n\npivoted = df.groupBy('rep').pivot('quarter').sum('revenue')\n# Add total column\npivoted = pivoted.withColumn('total', col('Q1')+col('Q2')+col('Q3')+col('Q4'))\npivoted.show()"},
{title:"Hierarchical Aggregation with Rollup",desc:"Generate subtotals and grand total using rollup.",code:"from pyspark.sql import SparkSession\nfrom pyspark.sql.functions import sum, count, coalesce, lit\nspark = SparkSession.builder.appName('Rollup').master('local[*]').getOrCreate()\n\ndf = spark.createDataFrame([\n    ('US','NYC','Eng',95000),('US','NYC','Mkt',72000),\n    ('US','LA','Eng',88000),('UK','London','Eng',85000),\n    ('UK','London','HR',65000)\n], ['country','city','dept','salary'])\n\nresult = df.rollup('country','city','dept').agg(\n    sum('salary').alias('total_salary'),\n    count('*').alias('emp_count')\n).orderBy('country','city','dept')\nresult.show(20)"}
],

{id:6,title:"Joins",color:"#22d3ee",chips:["inner","left","right","full","cross","semi","anti","broadcast"],
subtopics:[
{name:"Inner Join",theory:["Inner join returns only rows with matching keys in both DataFrames.","Syntax: df1.join(df2, on='key') or df1.join(df2, df1.id == df2.id, 'inner').","Default join type is inner; unmatched rows from either side are excluded."],code:"from pyspark.sql import SparkSession\nspark = SparkSession.builder.appName('InnerJoin').master('local[*]').getOrCreate()\n\nemp = spark.createDataFrame([(1,'Alice',101),(2,'Bob',102),(3,'Charlie',103)],['id','name','dept_id'])\ndept = spark.createDataFrame([(101,'Engineering'),(102,'Marketing'),(104,'Finance')],['dept_id','dept_name'])\n\n# Inner join\nresult = emp.join(dept, emp.dept_id == dept.dept_id, 'inner')\nresult.show()\n\n# Shorthand when column names match\nresult2 = emp.join(dept, 'dept_id', 'inner')\nresult2.show()"},
{name:"Left, Right & Full Outer Join",theory:["Left join keeps all rows from left DataFrame; unmatched right side gets null.","Right join keeps all rows from right DataFrame; unmatched left side gets null.","Full outer join keeps all rows from both sides; nulls where no match exists."],code:"from pyspark.sql import SparkSession\nspark = SparkSession.builder.appName('Outer').master('local[*]').getOrCreate()\n\nemp = spark.createDataFrame([(1,'Alice',101),(2,'Bob',102),(3,'Charlie',103)],['id','name','dept_id'])\ndept = spark.createDataFrame([(101,'Engineering'),(102,'Marketing'),(104,'Finance')],['dept_id','dept_name'])\n\n# Left join - keep all employees\nemp.join(dept, 'dept_id', 'left').show()\n\n# Right join - keep all departments\nemp.join(dept, 'dept_id', 'right').show()\n\n# Full outer - keep everything\nemp.join(dept, 'dept_id', 'full').show()"},
{name:"Cross Join",theory:["Cross join produces cartesian product: every row from left paired with every row from right.","Result size = rows_left * rows_right; be careful with large DataFrames.","Useful for generating combinations; requires crossJoin() or 'cross' join type."],code:"from pyspark.sql import SparkSession\nspark = SparkSession.builder.appName('Cross').master('local[*]').getOrCreate()\n\ncolors = spark.createDataFrame([('Red',),('Blue',),('Green',)], ['color'])\nsizes = spark.createDataFrame([('S',),('M',),('L',)], ['size'])\n\n# Cross join - all combinations\ncombinations = colors.crossJoin(sizes)\ncombinations.show()\nprint(f'Result rows: {combinations.count()}')  # 3 * 3 = 9"},
{name:"Semi & Anti Join",theory:["Left semi join returns rows from left that have a match in right (like EXISTS in SQL).","Left anti join returns rows from left that do NOT have a match in right (like NOT EXISTS).","Neither semi nor anti join includes columns from the right DataFrame."],code:"from pyspark.sql import SparkSession\nspark = SparkSession.builder.appName('SemiAnti').master('local[*]').getOrCreate()\n\nemp = spark.createDataFrame([(1,'Alice',101),(2,'Bob',102),(3,'Charlie',103),(4,'Diana',105)],\n    ['id','name','dept_id'])\ndept = spark.createDataFrame([(101,'Engineering'),(102,'Marketing'),(104,'Finance')],['dept_id','dept_name'])\n\n# Semi join - employees with valid department\nemp.join(dept, 'dept_id', 'left_semi').show()\n\n# Anti join - employees with no valid department\nemp.join(dept, 'dept_id', 'left_anti').show()"},
{name:"Broadcast Join",theory:["Broadcast join sends the smaller DataFrame to all executors, avoiding shuffle of the larger one.","Use broadcast() hint for small DataFrames (<10MB by default, configurable).","Dramatically faster for star-schema joins where dimension tables are small."],code:"from pyspark.sql import SparkSession\nfrom pyspark.sql.functions import broadcast\nspark = SparkSession.builder.appName('Broadcast').master('local[*]').getOrCreate()\n\n# Large fact table\nsales = spark.createDataFrame([(i, i%5, i*100) for i in range(1000)], ['id','prod_id','amount'])\n\n# Small dimension table\nproducts = spark.createDataFrame([(0,'Widget'),(1,'Gadget'),(2,'Doohickey'),(3,'Thingamajig'),(4,'Whatsit')],\n    ['prod_id','prod_name'])\n\n# Broadcast the small table\nresult = sales.join(broadcast(products), 'prod_id', 'inner')\nresult.show(5)\n\n# Check the execution plan\nresult.explain()"},
{name:"Multi-Column & Self Join",theory:["Join on multiple columns by passing a list or combining conditions with & operator.","Self join: join a DataFrame with itself using aliases to distinguish columns.","Handle duplicate column names with aliases or by dropping after join."],code:"from pyspark.sql import SparkSession\nfrom pyspark.sql.functions import col\nspark = SparkSession.builder.appName('MultiSelf').master('local[*]').getOrCreate()\n\n# Multi-column join\ndf1 = spark.createDataFrame([('A','X',1),('A','Y',2),('B','X',3)],['k1','k2','v1'])\ndf2 = spark.createDataFrame([('A','X',10),('A','Y',20),('C','X',30)],['k1','k2','v2'])\ndf1.join(df2, ['k1','k2'], 'inner').show()\n\n# Self join - find employee-manager pairs\nemp = spark.createDataFrame([\n    (1,'Alice',None),(2,'Bob',1),(3,'Charlie',1),(4,'Diana',2)\n], ['id','name','mgr_id'])\n\nresult = emp.alias('e').join(emp.alias('m'), col('e.mgr_id')==col('m.id'), 'left')\nresult.select(col('e.name').alias('employee'), col('m.name').alias('manager')).show()"}
],
examples:[
{title:"Star Schema Join Pattern",desc:"Join a fact table with multiple dimension tables using broadcast.",code:"from pyspark.sql import SparkSession\nfrom pyspark.sql.functions import broadcast, col\nspark = SparkSession.builder.appName('Star').master('local[*]').getOrCreate()\n\nfact_sales = spark.createDataFrame([\n    (1,101,201,5000),(2,102,202,3000),(3,101,201,7000)\n], ['sale_id','cust_id','prod_id','amount'])\n\ndim_customer = spark.createDataFrame([(101,'Alice'),(102,'Bob')],['cust_id','cust_name'])\ndim_product = spark.createDataFrame([(201,'Laptop'),(202,'Phone')],['prod_id','prod_name'])\n\nresult = fact_sales \\\n    .join(broadcast(dim_customer), 'cust_id') \\\n    .join(broadcast(dim_product), 'prod_id') \\\n    .select('sale_id','cust_name','prod_name','amount')\nresult.show()"},
{title:"Finding Unmatched Records",desc:"Use anti join to find orphan records between tables.",code:"from pyspark.sql import SparkSession\nspark = SparkSession.builder.appName('Orphans').master('local[*]').getOrCreate()\n\norders = spark.createDataFrame([\n    (1,101),(2,102),(3,103),(4,999),(5,888)\n], ['order_id','customer_id'])\ncustomers = spark.createDataFrame([(101,'Alice'),(102,'Bob'),(103,'Charlie')],['id','name'])\n\n# Orders with no valid customer\norphans = orders.join(customers, orders.customer_id == customers.id, 'left_anti')\norphans.show()\nprint(f'Orphan orders: {orphans.count()}')"},
{title:"Self Join for Hierarchy",desc:"Build an organizational hierarchy using self join.",code:"from pyspark.sql import SparkSession\nfrom pyspark.sql.functions import col, coalesce, lit\nspark = SparkSession.builder.appName('Hierarchy').master('local[*]').getOrCreate()\n\nemp = spark.createDataFrame([\n    (1,'CEO',None),(2,'VP_Eng',1),(3,'VP_Sales',1),\n    (4,'Dev_Lead',2),(5,'Designer',2),(6,'Sales_Rep',3)\n], ['id','title','mgr_id'])\n\nresult = emp.alias('e').join(\n    emp.alias('m'), col('e.mgr_id')==col('m.id'), 'left'\n).select(\n    col('e.title').alias('employee'),\n    coalesce(col('m.title'), lit('None')).alias('reports_to')\n)\nresult.show()"}
],

{id:7,title:"Window Functions",color:"#fb923c",chips:["Window","partitionBy","row_number","rank","lag","lead"],
subtopics:[
{name:"Window Specification",theory:["Window functions operate on a group of rows (window) relative to the current row.","Define windows with Window.partitionBy().orderBy() to set grouping and ordering.","Window frame can be rows-based or range-based using rowsBetween/rangeBetween."],code:"from pyspark.sql import SparkSession\nfrom pyspark.sql.window import Window\nfrom pyspark.sql.functions import row_number, col\nspark = SparkSession.builder.appName('Window').master('local[*]').getOrCreate()\n\ndf = spark.createDataFrame([\n    ('Eng','Alice',95000),('Eng','Bob',88000),('Eng','Charlie',110000),\n    ('Mkt','Diana',72000),('Mkt','Eve',68000),('HR','Frank',65000)\n], ['dept','name','salary'])\n\n# Define window\nw = Window.partitionBy('dept').orderBy(col('salary').desc())\n\n# Apply window function\nresult = df.withColumn('rank', row_number().over(w))\nresult.show()"},
{name:"row_number, rank, dense_rank",theory:["row_number() assigns unique sequential numbers 1,2,3... within each partition.","rank() assigns same rank for ties but skips numbers (1,2,2,4).","dense_rank() assigns same rank for ties without gaps (1,2,2,3)."],code:"from pyspark.sql import SparkSession\nfrom pyspark.sql.window import Window\nfrom pyspark.sql.functions import row_number, rank, dense_rank, col\nspark = SparkSession.builder.appName('Rank').master('local[*]').getOrCreate()\n\ndf = spark.createDataFrame([\n    ('Eng','Alice',95000),('Eng','Bob',95000),('Eng','Charlie',88000),\n    ('Mkt','Diana',72000),('Mkt','Eve',72000),('Mkt','Frank',68000)\n], ['dept','name','salary'])\n\nw = Window.partitionBy('dept').orderBy(col('salary').desc())\n\nresult = df.withColumn('row_num', row_number().over(w)) \\\n    .withColumn('rank', rank().over(w)) \\\n    .withColumn('dense_rank', dense_rank().over(w))\nresult.show()"},
{name:"lag & lead",theory:["lag(col, n) accesses the value n rows BEFORE the current row in the window.","lead(col, n) accesses the value n rows AFTER the current row in the window.","Useful for calculating differences between consecutive rows (day-over-day, month-over-month)."],code:"from pyspark.sql import SparkSession\nfrom pyspark.sql.window import Window\nfrom pyspark.sql.functions import lag, lead, col\nspark = SparkSession.builder.appName('LagLead').master('local[*]').getOrCreate()\n\ndf = spark.createDataFrame([\n    ('2023-01',1000),('2023-02',1200),('2023-03',1100),\n    ('2023-04',1400),('2023-05',1300)\n], ['month','revenue'])\n\nw = Window.orderBy('month')\n\nresult = df.withColumn('prev_rev', lag('revenue',1).over(w)) \\\n    .withColumn('next_rev', lead('revenue',1).over(w)) \\\n    .withColumn('mom_change', col('revenue') - lag('revenue',1).over(w))\nresult.show()"},
{name:"Running Totals & Aggregates",theory:["Use sum/avg/count over window with rowsBetween for running calculations.","Window.unboundedPreceding to current row gives cumulative/running totals.","rangeBetween is value-based; rowsBetween is position-based frame specification."],code:"from pyspark.sql import SparkSession\nfrom pyspark.sql.window import Window\nfrom pyspark.sql.functions import sum, avg, col\nspark = SparkSession.builder.appName('Running').master('local[*]').getOrCreate()\n\ndf = spark.createDataFrame([\n    ('2023-01',1000),('2023-02',1200),('2023-03',1100),\n    ('2023-04',1400),('2023-05',1300)\n], ['month','revenue'])\n\nw = Window.orderBy('month').rowsBetween(Window.unboundedPreceding, Window.currentRow)\nw3 = Window.orderBy('month').rowsBetween(-2, Window.currentRow)\n\nresult = df.withColumn('running_total', sum('revenue').over(w)) \\\n    .withColumn('running_avg', avg('revenue').over(w)) \\\n    .withColumn('moving_avg_3', avg('revenue').over(w3))\nresult.show()"},
{name:"ntile & percent_rank",theory:["ntile(n) divides ordered rows into n approximately equal buckets (1 to n).","percent_rank() returns relative rank as percentage: (rank-1)/(total_rows-1).","cume_dist() returns cumulative distribution: fraction of rows <= current row."],code:"from pyspark.sql import SparkSession\nfrom pyspark.sql.window import Window\nfrom pyspark.sql.functions import ntile, percent_rank, cume_dist, col, round\nspark = SparkSession.builder.appName('Ntile').master('local[*]').getOrCreate()\n\ndf = spark.createDataFrame([\n    ('Alice',95000),('Bob',88000),('Charlie',110000),('Diana',72000),\n    ('Eve',68000),('Frank',65000),('Grace',99000),('Henry',82000)\n], ['name','salary'])\n\nw = Window.orderBy(col('salary').desc())\n\nresult = df.withColumn('quartile', ntile(4).over(w)) \\\n    .withColumn('pct_rank', round(percent_rank().over(w),2)) \\\n    .withColumn('cume_dist', round(cume_dist().over(w),2))\nresult.show()"}
],
examples:[
{title:"Top-N Per Group",desc:"Get top 2 earners per department using window functions.",code:"from pyspark.sql import SparkSession\nfrom pyspark.sql.window import Window\nfrom pyspark.sql.functions import row_number, col\nspark = SparkSession.builder.appName('TopN').master('local[*]').getOrCreate()\n\ndf = spark.createDataFrame([\n    ('Eng','Alice',95000),('Eng','Bob',88000),('Eng','Charlie',110000),\n    ('Mkt','Diana',72000),('Mkt','Eve',68000),('HR','Frank',65000),('HR','Grace',70000)\n], ['dept','name','salary'])\n\nw = Window.partitionBy('dept').orderBy(col('salary').desc())\ntop2 = df.withColumn('rn', row_number().over(w)).filter(col('rn') <= 2).drop('rn')\ntop2.show()"},
{title:"Month-over-Month Growth",desc:"Calculate growth percentage using lag window function.",code:"from pyspark.sql import SparkSession\nfrom pyspark.sql.window import Window\nfrom pyspark.sql.functions import lag, col, round\nspark = SparkSession.builder.appName('MoM').master('local[*]').getOrCreate()\n\ndf = spark.createDataFrame([\n    ('2023-01',10000),('2023-02',12000),('2023-03',11000),\n    ('2023-04',14000),('2023-05',13000),('2023-06',16000)\n], ['month','revenue'])\n\nw = Window.orderBy('month')\nresult = df.withColumn('prev_rev', lag('revenue').over(w)) \\\n    .withColumn('growth_pct', round((col('revenue')-lag('revenue').over(w))/lag('revenue').over(w)*100, 1))\nresult.show()"},
{title:"Cumulative Distribution Analysis",desc:"Analyze salary percentiles using window functions.",code:"from pyspark.sql import SparkSession\nfrom pyspark.sql.window import Window\nfrom pyspark.sql.functions import percent_rank, ntile, col, round, sum\nspark = SparkSession.builder.appName('Dist').master('local[*]').getOrCreate()\n\ndf = spark.createDataFrame([(f'Emp_{i}', 50000 + i*5000) for i in range(20)], ['name','salary'])\n\nw = Window.orderBy('salary')\nresult = df.withColumn('percentile', round(percent_rank().over(w)*100,0)) \\\n    .withColumn('quartile', ntile(4).over(w)) \\\n    .withColumn('running_total', sum('salary').over(w.rowsBetween(Window.unboundedPreceding, Window.currentRow)))\nresult.show(20)"}
],

{id:8,title:"String Functions",color:"#4ade80",chips:["concat","substring","trim","regexp_extract","split"],
subtopics:[
{name:"concat & concat_ws",theory:["concat() joins multiple columns/strings without separator.","concat_ws(sep, cols) joins with a separator string between values.","Both handle null: concat returns null if any input is null; concat_ws skips nulls."],code:"from pyspark.sql import SparkSession\nfrom pyspark.sql.functions import concat, concat_ws, col, lit\nspark = SparkSession.builder.appName('Concat').master('local[*]').getOrCreate()\n\ndf = spark.createDataFrame([('Alice','Smith','NYC'),('Bob','Jones','LA')],['first','last','city'])\n\n# concat - no separator\ndf.withColumn('full', concat(col('first'), lit(' '), col('last'))).show()\n\n# concat_ws - with separator\ndf.withColumn('info', concat_ws(' | ', col('first'), col('last'), col('city'))).show()"},
{name:"substring & substr",theory:["substring(col, pos, len) extracts a portion starting at pos (1-indexed) for len characters.","substr() is a Column method: col('name').substr(1, 3) extracts first 3 characters.","Both are 1-indexed (not 0-indexed like Python strings)."],code:"from pyspark.sql import SparkSession\nfrom pyspark.sql.functions import substring, col\nspark = SparkSession.builder.appName('Substr').master('local[*]').getOrCreate()\n\ndf = spark.createDataFrame([('2023-01-15','ABC123'),('2023-06-20','XYZ789')],['date_str','code'])\n\n# Extract year, month, day\ndf.withColumn('year', substring('date_str',1,4)) \\\n    .withColumn('month', substring('date_str',6,2)) \\\n    .withColumn('prefix', col('code').substr(1,3)) \\\n    .show()"},
{name:"trim, ltrim, rtrim, lower, upper",theory:["trim() removes leading and trailing whitespace; ltrim/rtrim for one side only.","lower() converts to lowercase; upper() to uppercase; initcap() capitalizes each word.","These are essential for data cleaning and standardization."],code:"from pyspark.sql import SparkSession\nfrom pyspark.sql.functions import trim, ltrim, rtrim, lower, upper, initcap\nspark = SparkSession.builder.appName('Trim').master('local[*]').getOrCreate()\n\ndf = spark.createDataFrame([('  Alice  ',),('  BOB  ',),(' charlie ',)], ['name'])\n\ndf.select(\n    trim('name').alias('trimmed'),\n    lower(trim('name')).alias('lower'),\n    upper(trim('name')).alias('upper'),\n    initcap(trim('name')).alias('initcap')\n).show()"},
{name:"regexp_extract & regexp_replace",theory:["regexp_extract(col, pattern, idx) extracts the idx-th capture group from a regex match.","regexp_replace(col, pattern, replacement) replaces all matches of pattern.","Uses Java regex syntax; backslashes need escaping in Python strings."],code:"from pyspark.sql import SparkSession\nfrom pyspark.sql.functions import regexp_extract, regexp_replace\nspark = SparkSession.builder.appName('Regex').master('local[*]').getOrCreate()\n\ndf = spark.createDataFrame([('Call 555-1234',),('Fax 800-5678',),('No phone',)], ['text'])\n\n# Extract phone number\ndf.withColumn('phone', regexp_extract('text', r'(\\d{3}-\\d{4})', 1)).show()\n\n# Replace digits with X\ndf.withColumn('masked', regexp_replace('text', r'\\d', 'X')).show()\n\n# Extract area code\ndf2 = spark.createDataFrame([('user@email.com',),('admin@test.org',)], ['email'])\ndf2.withColumn('domain', regexp_extract('email', r'@(.+)', 1)).show()"},
{name:"split & array functions",theory:["split(col, pattern) splits a string into an array by delimiter pattern.","Use element_at() or getItem() to access specific elements from the resulting array.","size() returns array length; array_contains() checks if array has a value."],code:"from pyspark.sql import SparkSession\nfrom pyspark.sql.functions import split, col, size, array_contains, element_at\nspark = SparkSession.builder.appName('Split').master('local[*]').getOrCreate()\n\ndf = spark.createDataFrame([('Python,Java,Scala',),('SQL,R',),('Spark,Hadoop,Hive,Presto',)], ['skills'])\n\ndf2 = df.withColumn('skill_arr', split('skills', ','))\ndf2.withColumn('first_skill', element_at('skill_arr', 1)) \\\n    .withColumn('num_skills', size('skill_arr')) \\\n    .withColumn('knows_python', array_contains('skill_arr', 'Python')) \\\n    .show(truncate=False)"}
],
examples:[
{title:"Data Cleaning Pipeline",desc:"Clean messy string data using multiple string functions.",code:"from pyspark.sql import SparkSession\nfrom pyspark.sql.functions import trim, lower, regexp_replace, initcap\nspark = SparkSession.builder.appName('Clean').master('local[*]').getOrCreate()\n\ndf = spark.createDataFrame([\n    ('  ALICE smith  ','  New York  '),('  BOB   JONES','los angeles'),(' Charlie Brown','  CHICAGO  ')\n], ['name','city'])\n\ncleaned = df.withColumn('name', initcap(trim(regexp_replace('name', r'\\s+', ' ')))) \\\n    .withColumn('city', initcap(trim(lower('city'))))\ncleaned.show()"},
{title:"Parsing Structured Strings",desc:"Extract components from formatted strings using regex.",code:"from pyspark.sql import SparkSession\nfrom pyspark.sql.functions import regexp_extract, split, element_at\nspark = SparkSession.builder.appName('Parse').master('local[*]').getOrCreate()\n\ndf = spark.createDataFrame([\n    ('2023-01-15 10:30:00 ERROR: Connection failed',),\n    ('2023-01-15 11:45:00 INFO: Service started',),\n    ('2023-01-16 09:00:00 WARN: High memory usage',)\n], ['log_line'])\n\nresult = df.withColumn('date', regexp_extract('log_line', r'(\\d{4}-\\d{2}-\\d{2})', 1)) \\\n    .withColumn('time', regexp_extract('log_line', r'(\\d{2}:\\d{2}:\\d{2})', 1)) \\\n    .withColumn('level', regexp_extract('log_line', r'(ERROR|INFO|WARN)', 1)) \\\n    .withColumn('message', regexp_extract('log_line', r':\\s(.+)$', 1))\nresult.show(truncate=False)"},
{title:"Building Full Names & Emails",desc:"Construct formatted strings from component columns.",code:"from pyspark.sql import SparkSession\nfrom pyspark.sql.functions import concat, concat_ws, lower, col, lit, regexp_replace\nspark = SparkSession.builder.appName('Build').master('local[*]').getOrCreate()\n\ndf = spark.createDataFrame([\n    ('Alice','Smith','Engineering'),('Bob','Jones','Marketing'),('Charlie','Brown','HR')\n], ['first','last','dept'])\n\nresult = df.withColumn('full_name', concat_ws(' ', 'first', 'last')) \\\n    .withColumn('email', concat(lower('first'), lit('.'), lower('last'), lit('@company.com'))) \\\n    .withColumn('username', lower(concat(col('first').substr(1,1), col('last'))))\nresult.show(truncate=False)"}
],

{id:9,title:"Date & Time Functions",color:"#60a5fa",chips:["current_date","date_add","datediff","date_format"],
subtopics:[
{name:"current_date & current_timestamp",theory:["current_date() returns today's date as DateType column for all rows.","current_timestamp() returns current timestamp with timezone as TimestampType.","These are evaluated once per query, not per row."],code:"from pyspark.sql import SparkSession\nfrom pyspark.sql.functions import current_date, current_timestamp\nspark = SparkSession.builder.appName('Current').master('local[*]').getOrCreate()\n\ndf = spark.createDataFrame([('Alice',),('Bob',)], ['name'])\n\ndf.withColumn('today', current_date()) \\\n    .withColumn('now', current_timestamp()) \\\n    .show(truncate=False)"},
{name:"date_add, date_sub, datediff",theory:["date_add(col, days) adds days to a date; date_sub(col, days) subtracts days.","datediff(end, start) returns the number of days between two dates.","months_between(end, start) returns months as a float between two dates."],code:"from pyspark.sql import SparkSession\nfrom pyspark.sql.functions import date_add, date_sub, datediff, months_between, col, current_date\nspark = SparkSession.builder.appName('DateMath').master('local[*]').getOrCreate()\n\ndf = spark.createDataFrame([('Alice','2023-01-15'),('Bob','2023-06-20')], ['name','hire_date'])\n\ndf.withColumn('plus_30', date_add(col('hire_date'), 30)) \\\n    .withColumn('minus_7', date_sub(col('hire_date'), 7)) \\\n    .withColumn('days_ago', datediff(current_date(), col('hire_date'))) \\\n    .withColumn('months_ago', months_between(current_date(), col('hire_date'))) \\\n    .show()"},
{name:"date_format & to_date",theory:["date_format(col, format) converts a date/timestamp to formatted string.","to_date(col, format) parses a string to DateType using the given format pattern.","to_timestamp(col, format) parses string to TimestampType."],code:"from pyspark.sql import SparkSession\nfrom pyspark.sql.functions import date_format, to_date, to_timestamp, col\nspark = SparkSession.builder.appName('Format').master('local[*]').getOrCreate()\n\ndf = spark.createDataFrame([('15/01/2023','2023-01-15 10:30:00'),('20/06/2023','2023-06-20 14:45:00')],\n    ['date_str','ts_str'])\n\ndf.withColumn('parsed_date', to_date(col('date_str'), 'dd/MM/yyyy')) \\\n    .withColumn('parsed_ts', to_timestamp(col('ts_str'), 'yyyy-MM-dd HH:mm:ss')) \\\n    .withColumn('formatted', date_format(to_date(col('date_str'),'dd/MM/yyyy'), 'MMMM dd, yyyy')) \\\n    .show(truncate=False)"},
{name:"Extracting Date Parts",theory:["year(), month(), dayofmonth() extract respective components from a date.","hour(), minute(), second() extract time components from a timestamp.","dayofweek() returns 1=Sunday to 7=Saturday; weekofyear() returns ISO week number."],code:"from pyspark.sql import SparkSession\nfrom pyspark.sql.functions import year, month, dayofmonth, dayofweek, quarter, weekofyear, col\nspark = SparkSession.builder.appName('Extract').master('local[*]').getOrCreate()\n\ndf = spark.createDataFrame([('2023-03-15',),('2023-07-22',),('2023-12-01',)], ['date'])\n\ndf.select(\n    'date',\n    year('date').alias('year'),\n    month('date').alias('month'),\n    dayofmonth('date').alias('day'),\n    dayofweek('date').alias('dow'),\n    quarter('date').alias('quarter'),\n    weekofyear('date').alias('week')\n).show()"},
{name:"last_day & next_day & trunc",theory:["last_day(col) returns the last day of the month for the given date.","next_day(col, dayOfWeek) returns the next occurrence of specified day.","trunc(col, format) truncates to year ('year') or month ('month') level."],code:"from pyspark.sql import SparkSession\nfrom pyspark.sql.functions import last_day, next_day, trunc, date_trunc, col\nspark = SparkSession.builder.appName('Trunc').master('local[*]').getOrCreate()\n\ndf = spark.createDataFrame([('2023-03-15',),('2023-07-22',)], ['date'])\n\ndf.select(\n    'date',\n    last_day('date').alias('month_end'),\n    next_day('date','Monday').alias('next_monday'),\n    trunc('date','month').alias('month_start'),\n    trunc('date','year').alias('year_start'),\n    date_trunc('week', col('date')).alias('week_start')\n).show()"}
],

{title:"Date Range Generation",desc:"Generate a date range DataFrame for reporting.",code:"from pyspark.sql import SparkSession\nfrom pyspark.sql.functions import explode, sequence, to_date, lit, col\nspark = SparkSession.builder.appName('DateRange').master('local[*]').getOrCreate()\n\n# Generate date range\ndf = spark.createDataFrame([('2023-01-01','2023-01-10')], ['start','end'])\ndate_range = df.select(\n    explode(sequence(to_date('start'), to_date('end'))).alias('date')\n)\ndate_range.show()"},
{title:"Age Calculation",desc:"Calculate age from birth date using datediff and months_between.",code:"from pyspark.sql import SparkSession\nfrom pyspark.sql.functions import current_date, datediff, floor, months_between, col\nspark = SparkSession.builder.appName('Age').master('local[*]').getOrCreate()\n\ndf = spark.createDataFrame([('Alice','1990-05-15'),('Bob','1985-11-20'),('Charlie','2000-03-01')],\n    ['name','birth_date'])\n\ndf.withColumn('age_years', floor(datediff(current_date(), col('birth_date')) / 365.25)) \\\n    .withColumn('age_months', floor(months_between(current_date(), col('birth_date')))) \\\n    .show()"},
{title:"Time-Based Aggregation",desc:"Aggregate data by month and quarter using date extraction.",code:"from pyspark.sql import SparkSession\nfrom pyspark.sql.functions import year, month, quarter, sum, count, col, date_format\nspark = SparkSession.builder.appName('TimeAgg').master('local[*]').getOrCreate()\n\ndf = spark.createDataFrame([\n    ('2023-01-05',100),('2023-01-20',200),('2023-02-10',150),\n    ('2023-02-25',300),('2023-03-15',250),('2023-04-01',180)\n], ['date','amount'])\n\ndf.withColumn('ym', date_format('date','yyyy-MM')) \\\n    .groupBy('ym').agg(sum('amount').alias('total'), count('*').alias('txns')) \\\n    .orderBy('ym').show()"}

{id:10,title:"Null Handling",color:"#f87171",chips:["isNull","fillna","dropna","coalesce","when/otherwise"],
subtopics:[
{name:"isNull & isNotNull",theory:["isNull() returns True for rows where column value is null; isNotNull() for non-null.","Use these in filter() to select or exclude rows with missing values.","Column == None does NOT work in PySpark; always use isNull()."],code:"from pyspark.sql import SparkSession\nfrom pyspark.sql.functions import col\nspark = SparkSession.builder.appName('IsNull').master('local[*]').getOrCreate()\n\ndf = spark.createDataFrame([\n    (1,'Alice',30),(2,None,25),(3,'Charlie',None),(4,'Diana',28),(5,None,None)\n], ['id','name','age'])\n\n# Filter nulls\ndf.filter(col('name').isNull()).show()\ndf.filter(col('name').isNotNull()).show()\ndf.filter(col('age').isNull()).show()"},
{name:"fillna & na.fill",theory:["fillna(value) or na.fill(value) replaces null values with a specified default.","Can pass a dict to fill different columns with different values.","Only fills nulls of matching type: fillna(0) won't fill string columns."],code:"from pyspark.sql import SparkSession\nspark = SparkSession.builder.appName('FillNa').master('local[*]').getOrCreate()\n\ndf = spark.createDataFrame([\n    (1,'Alice',30,75000.0),(2,None,25,None),(3,'Charlie',None,88000.0),(4,None,None,None)\n], ['id','name','age','salary'])\n\n# Fill all nulls with same value\ndf.fillna(0).show()\ndf.fillna('Unknown').show()\n\n# Fill with dict (column-specific)\ndf.fillna({'name':'Unknown','age':0,'salary':0.0}).show()\n\n# na.fill is alias\ndf.na.fill({'name':'N/A','age':99}).show()"},
{name:"dropna & na.drop",theory:["dropna() removes rows containing any null value; alias for na.drop().","subset parameter specifies which columns to check for nulls.","how='all' only drops if ALL specified columns are null; default 'any' drops if any is null."],code:"from pyspark.sql import SparkSession\nspark = SparkSession.builder.appName('DropNa').master('local[*]').getOrCreate()\n\ndf = spark.createDataFrame([\n    (1,'Alice',30),(2,None,25),(3,'Charlie',None),(4,None,None),(5,'Eve',35)\n], ['id','name','age'])\n\n# Drop any row with any null\ndf.dropna().show()\n\n# Drop only if specific columns are null\ndf.dropna(subset=['name']).show()\n\n# Drop only if ALL columns are null\ndf.dropna(how='all', subset=['name','age']).show()\n\n# Threshold: keep rows with at least 2 non-null values\ndf.dropna(thresh=2).show()"},
{name:"coalesce Function",theory:["coalesce(col1, col2, ...) returns the first non-null value from the columns.","Useful for providing fallback values across multiple columns.","Different from coalesce() for repartitioning - this is the SQL coalesce function."],code:"from pyspark.sql import SparkSession\nfrom pyspark.sql.functions import coalesce, col, lit\nspark = SparkSession.builder.appName('Coalesce').master('local[*]').getOrCreate()\n\ndf = spark.createDataFrame([\n    (1,None,'backup@email.com'),(2,'primary@email.com',None),\n    (3,None,None),(4,'main@test.com','alt@test.com')\n], ['id','primary_email','secondary_email'])\n\n# Use first non-null email\ndf.withColumn('email', coalesce(col('primary_email'), col('secondary_email'), lit('no-email'))).show()"},
{name:"when/otherwise for Null Logic",theory:["when(condition, value).otherwise(value) creates conditional expressions.","Combine with isNull() for complex null-handling logic.","Can chain multiple when() conditions for multi-case logic."],code:"from pyspark.sql import SparkSession\nfrom pyspark.sql.functions import when, col, lit\nspark = SparkSession.builder.appName('When').master('local[*]').getOrCreate()\n\ndf = spark.createDataFrame([\n    (1,'Alice',30,95000),(2,'Bob',None,72000),(3,None,35,None),(4,'Diana',28,65000)\n], ['id','name','age','salary'])\n\nresult = df.withColumn('age_status',\n    when(col('age').isNull(), 'Unknown')\n    .when(col('age') < 30, 'Young')\n    .otherwise('Senior')\n).withColumn('salary_band',\n    when(col('salary').isNull(), 'Not Available')\n    .when(col('salary') > 80000, 'High')\n    .when(col('salary') > 60000, 'Medium')\n    .otherwise('Low')\n)\nresult.show()"}
],
examples:[
{title:"Complete Null Handling Strategy",desc:"Build a pipeline that handles nulls in multiple ways.",code:"from pyspark.sql import SparkSession\nfrom pyspark.sql.functions import col, when, coalesce, lit, count\nspark = SparkSession.builder.appName('NullStrat').master('local[*]').getOrCreate()\n\ndf = spark.createDataFrame([\n    (1,'Alice',30,95000),(2,None,25,None),(3,'Charlie',None,88000),\n    (4,'Diana',28,None),(5,None,None,65000)\n], ['id','name','age','salary'])\n\n# Step 1: Report null counts\nnull_counts = df.select([count(when(col(c).isNull(),1)).alias(c) for c in df.columns])\nnull_counts.show()\n\n# Step 2: Fill with strategy\ncleaned = df.fillna({'name':'Unknown','age':0,'salary':0.0})\ncleaned.show()"},
{title:"Null-Safe Operations",desc:"Handle nulls in joins and comparisons safely.",code:"from pyspark.sql import SparkSession\nfrom pyspark.sql.functions import col, coalesce, lit\nspark = SparkSession.builder.appName('NullSafe').master('local[*]').getOrCreate()\n\ndf1 = spark.createDataFrame([(1,'A'),(2,None),(3,'C')],['id','val'])\ndf2 = spark.createDataFrame([(1,'X'),(2,None),(4,'Z')],['id','val'])\n\n# Null-safe equality (eqNullSafe)\nresult = df1.join(df2, df1.val.eqNullSafe(df2.val))\nresult.show()\n\n# Fill before comparison\ndf1_clean = df1.withColumn('val', coalesce(col('val'), lit('EMPTY')))\ndf1_clean.show()"},
{title:"Null Percentage Report",desc:"Generate a report showing null percentages per column.",code:"from pyspark.sql import SparkSession\nfrom pyspark.sql.functions import col, count, when, round, lit\nspark = SparkSession.builder.appName('NullReport').master('local[*]').getOrCreate()\n\ndf = spark.createDataFrame([\n    (1,'Alice',30,95000),(2,None,25,None),(3,'Charlie',None,88000),\n    (4,None,None,None),(5,'Eve',35,65000)\n], ['id','name','age','salary'])\n\ntotal = df.count()\nfor c in df.columns:\n    null_count = df.filter(col(c).isNull()).count()\n    pct = round(null_count/total*100, 1)\n    print(f'{c}: {null_count}/{total} nulls ({pct}%)')"}
],

{id:11,title:"UDFs & Higher-Order",color:"#c084fc",chips:["udf","pandas_udf","transform","filter","aggregate"],
subtopics:[
{name:"Python UDFs",theory:["UDF (User Defined Function) wraps a Python function for use in DataFrame operations.","Register with udf(func, returnType) or @udf decorator syntax.","UDFs serialize data to Python and back to JVM; slower than built-in functions."],code:"from pyspark.sql import SparkSession\nfrom pyspark.sql.functions import udf, col\nfrom pyspark.sql.types import StringType, IntegerType\nspark = SparkSession.builder.appName('UDF').master('local[*]').getOrCreate()\n\n# Define and register UDF\n@udf(returnType=StringType())\ndef categorize_age(age):\n    if age is None: return 'Unknown'\n    if age < 30: return 'Young'\n    if age < 50: return 'Middle'\n    return 'Senior'\n\ndf = spark.createDataFrame([(1,'Alice',25),(2,'Bob',35),(3,'Charlie',55)],['id','name','age'])\ndf.withColumn('category', categorize_age(col('age'))).show()"},
{name:"Pandas UDFs (Vectorized)",theory:["Pandas UDFs use Apache Arrow for efficient data transfer between JVM and Python.","10-100x faster than row-at-a-time UDFs due to vectorized (batch) processing.","Types: Series to Series, Iterator of Series, Series to Scalar (grouped agg)."],code:"from pyspark.sql import SparkSession\nfrom pyspark.sql.functions import pandas_udf, col\nfrom pyspark.sql.types import DoubleType\nimport pandas as pd\nspark = SparkSession.builder.appName('PandasUDF').master('local[*]').getOrCreate()\n\n# Series to Series (element-wise)\n@pandas_udf(DoubleType())\ndef normalize(series: pd.Series) -> pd.Series:\n    return (series - series.mean()) / series.std()\n\ndf = spark.createDataFrame([(1,100.0),(2,200.0),(3,150.0),(4,300.0)],['id','value'])\ndf.withColumn('normalized', normalize(col('value'))).show()"},
{name:"transform (Higher-Order)",theory:["transform(col, func) applies a function to each element of an array column.","Available in Spark 3.1+; works on ArrayType columns without explode/collect.","Lambda syntax in SQL: transform(array, x -> x * 2); in Python use lambda or function."],code:"from pyspark.sql import SparkSession\nfrom pyspark.sql.functions import transform, col, array, lit\nspark = SparkSession.builder.appName('Transform').master('local[*]').getOrCreate()\n\ndf = spark.createDataFrame([([1,2,3],),([4,5,6],),([7,8,9],)], ['numbers'])\n\n# Double each element\ndf.withColumn('doubled', transform('numbers', lambda x: x * 2)).show()\n\n# Add 10 to each\ndf.withColumn('plus_10', transform('numbers', lambda x: x + 10)).show(truncate=False)"},
{name:"filter & exists (Higher-Order)",theory:["filter(col, func) keeps only array elements that satisfy the predicate function.","exists(col, func) returns True if any element satisfies the predicate.","Both work on ArrayType columns for element-wise filtering/checking."],code:"from pyspark.sql import SparkSession\nfrom pyspark.sql.functions import filter, exists, col\nspark = SparkSession.builder.appName('FilterHO').master('local[*]').getOrCreate()\n\ndf = spark.createDataFrame([([1,2,3,4,5],),([10,20,30],),([7,8,9,2],)], ['nums'])\n\n# Keep only even numbers\ndf.withColumn('evens', filter('nums', lambda x: x % 2 == 0)).show(truncate=False)\n\n# Check if any element > 15\ndf.withColumn('has_large', exists('nums', lambda x: x > 15)).show()"},
{name:"aggregate (Higher-Order)",theory:["aggregate(col, zero, merge, finish) reduces array to single value (like fold/reduce).","zero: initial accumulator value; merge: function(acc, x) -> new_acc.","finish (optional): final transform on the accumulated result."],code:"from pyspark.sql import SparkSession\nfrom pyspark.sql.functions import aggregate, col\nspark = SparkSession.builder.appName('Aggregate').master('local[*]').getOrCreate()\n\ndf = spark.createDataFrame([([1,2,3,4,5],),([10,20,30],)], ['nums'])\n\n# Sum of array elements\ndf.withColumn('total', aggregate('nums', lit(0), lambda acc, x: acc + x)).show()\n\n# Product of elements\nfrom pyspark.sql.functions import lit\ndf.withColumn('product', aggregate('nums', lit(1), lambda acc, x: acc * x)).show()"}
],
examples:[
{title:"Custom String Processing UDF",desc:"Create a UDF for complex string logic not available in built-in functions.",code:"from pyspark.sql import SparkSession\nfrom pyspark.sql.functions import udf, col\nfrom pyspark.sql.types import StringType\nspark = SparkSession.builder.appName('StrUDF').master('local[*]').getOrCreate()\n\n@udf(returnType=StringType())\ndef clean_phone(phone):\n    if phone is None: return None\n    digits = ''.join(c for c in phone if c.isdigit())\n    if len(digits) == 10:\n        return f'({digits[:3]}) {digits[3:6]}-{digits[6:]}'\n    return phone\n\ndf = spark.createDataFrame([('555-123-4567',),('(800) 555 1234',),('1234567890',)],['phone'])\ndf.withColumn('formatted', clean_phone(col('phone'))).show(truncate=False)"},
{title:"Pandas UDF for Statistical Calculation",desc:"Use vectorized Pandas UDF for complex math operations.",code:"from pyspark.sql import SparkSession\nfrom pyspark.sql.functions import pandas_udf, col\nfrom pyspark.sql.types import DoubleType\nimport pandas as pd\nimport numpy as np\nspark = SparkSession.builder.appName('Stats').master('local[*]').getOrCreate()\n\n@pandas_udf(DoubleType())\ndef zscore(series: pd.Series) -> pd.Series:\n    return (series - series.mean()) / series.std()\n\ndf = spark.createDataFrame([(i, float(np.random.randint(50,100))) for i in range(10)],['id','score'])\ndf.withColumn('zscore', zscore(col('score'))).show()"},
{title:"Array Processing Pipeline",desc:"Combine higher-order functions for array manipulation.",code:"from pyspark.sql import SparkSession\nfrom pyspark.sql.functions import transform, filter, aggregate, col, size, lit\nspark = SparkSession.builder.appName('ArrayPipe').master('local[*]').getOrCreate()\n\ndf = spark.createDataFrame([\n    ([85,92,78,95,88],),([72,65,90,55,80],),([95,98,92,97,99],)\n], ['scores'])\n\nresult = df.withColumn('high_scores', filter('scores', lambda x: x >= 80)) \\\n    .withColumn('curved', transform('scores', lambda x: x + 5)) \\\n    .withColumn('total', aggregate('scores', lit(0), lambda acc, x: acc + x)) \\\n    .withColumn('num_high', size(filter('scores', lambda x: x >= 80)))\nresult.show(truncate=False)"}
],
