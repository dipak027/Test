{id:12,title:"Data I/O",color:"#2dd4bf",chips:["read/write csv","parquet","json","jdbc","partitionBy"],
subtopics:[
{name:"Reading CSV with Options",theory:["spark.read.csv() supports many options: header, inferSchema, delimiter, nullValue, dateFormat.","Use .option() chain or pass options as dict for cleaner configuration.","Always prefer explicit schema over inferSchema for production (avoids extra pass over data)."],code:"from pyspark.sql import SparkSession\nspark = SparkSession.builder.appName('ReadCSV').master('local[*]').getOrCreate()\n\n# Full option chain\ndf = spark.read \\\n    .option('header', 'true') \\\n    .option('inferSchema', 'true') \\\n    .option('delimiter', ',') \\\n    .option('nullValue', 'NA') \\\n    .option('dateFormat', 'yyyy-MM-dd') \\\n    .option('mode', 'DROPMALFORMED') \\\n    .csv('data/sales.csv')\n\ndf.printSchema()\ndf.show(5)"},
{name:"Reading & Writing Parquet",theory:["Parquet is columnar, compressed, and self-describing (schema embedded in file).","Best performance for analytics: predicate pushdown, column pruning, compression.","Write with df.write.parquet(path) and partition for parallel access."],code:"from pyspark.sql import SparkSession\nspark = SparkSession.builder.appName('Parquet').master('local[*]').getOrCreate()\n\ndf = spark.createDataFrame([(i, f'name_{i}', i*1000) for i in range(100)],['id','name','salary'])\n\n# Write parquet\ndf.write.mode('overwrite').parquet('output/employees.parquet')\n\n# Read parquet\ndf_read = spark.read.parquet('output/employees.parquet')\ndf_read.show(5)\nprint(f'Rows: {df_read.count()}')"},
{name:"Reading & Writing JSON",theory:["spark.read.json() reads JSON files; supports single-line and multi-line formats.","JSON is human-readable but slower and larger than Parquet; use for small data/APIs.","Use multiLine=True for pretty-printed JSON; default expects one JSON object per line."],code:"from pyspark.sql import SparkSession\nspark = SparkSession.builder.appName('JSON').master('local[*]').getOrCreate()\n\ndf = spark.createDataFrame([\n    (1,'Alice',{'city':'NYC','zip':'10001'}),\n    (2,'Bob',{'city':'LA','zip':'90001'})\n], ['id','name','address'])\n\n# Write JSON\ndf.write.mode('overwrite').json('output/people.json')\n\n# Read JSON\ndf_read = spark.read.json('output/people.json')\ndf_read.show(truncate=False)\ndf_read.printSchema()"},
{name:"JDBC Database Connection",theory:["spark.read.jdbc() reads from relational databases using JDBC drivers.","Requires: url, table, connection properties (user, password, driver).","Use partitionColumn, numPartitions for parallel reads from large tables."],code:"from pyspark.sql import SparkSession\nspark = SparkSession.builder.appName('JDBC').master('local[*]').getOrCreate()\n\n# Read from database\ndf = spark.read.jdbc(\n    url='jdbc:postgresql://host:5432/db',\n    table='employees',\n    properties={'user':'admin','password':'pass','driver':'org.postgresql.Driver'}\n)\n\n# Parallel read with partitioning\ndf = spark.read.jdbc(\n    url='jdbc:postgresql://host:5432/db',\n    table='orders',\n    column='id',\n    lowerBound=1, upperBound=1000000, numPartitions=10,\n    properties={'user':'admin','password':'pass'}\n)"},
{name:"partitionBy for Write",theory:["write.partitionBy(col) creates directory structure: col=value/ for each unique value.","Enables partition pruning on read: queries filtering on partition column skip irrelevant files.","Choose low-cardinality columns for partitioning (date, region, category)."],code:"from pyspark.sql import SparkSession\nspark = SparkSession.builder.appName('Partition').master('local[*]').getOrCreate()\n\ndf = spark.createDataFrame([\n    (1,'Alice','Eng','2023-01',95000),(2,'Bob','Mkt','2023-01',72000),\n    (3,'Charlie','Eng','2023-02',88000),(4,'Diana','HR','2023-02',65000)\n], ['id','name','dept','month','salary'])\n\n# Write partitioned by department\ndf.write.mode('overwrite').partitionBy('dept').parquet('output/by_dept')\n\n# Write partitioned by month and dept\ndf.write.mode('overwrite').partitionBy('month','dept').parquet('output/by_month_dept')\n\n# Read with partition pruning\ndf_eng = spark.read.parquet('output/by_dept').filter('dept = \"Eng\"')\ndf_eng.show()"}
],
examples:[
{title:"ETL Pipeline: CSV to Parquet",desc:"Read CSV, transform, and write as partitioned Parquet.",code:"from pyspark.sql import SparkSession\nfrom pyspark.sql.functions import col, year, month, to_date\nspark = SparkSession.builder.appName('ETL').master('local[*]').getOrCreate()\n\n# Simulate reading CSV\ndf = spark.createDataFrame([\n    ('2023-01-15','Alice',1000),('2023-02-20','Bob',2000),\n    ('2023-01-25','Charlie',1500),('2023-03-10','Diana',3000)\n], ['date','name','amount'])\n\n# Transform\ndf2 = df.withColumn('date', to_date('date')) \\\n    .withColumn('year', year('date')) \\\n    .withColumn('month', month('date'))\n\n# Write partitioned parquet\ndf2.write.mode('overwrite').partitionBy('year','month').parquet('output/sales')\nprint('ETL complete')\nspark.read.parquet('output/sales').show()"},
{title:"Multiple Format Pipeline",desc:"Read from one format, write to multiple formats.",code:"from pyspark.sql import SparkSession\nspark = SparkSession.builder.appName('MultiFormat').master('local[*]').getOrCreate()\n\ndf = spark.createDataFrame([(i, f'product_{i}', i*10.5) for i in range(50)],['id','name','price'])\n\n# Write to multiple formats\ndf.write.mode('overwrite').parquet('output/data.parquet')\ndf.write.mode('overwrite').json('output/data.json')\ndf.write.mode('overwrite').option('header','true').csv('output/data.csv')\nprint('Written to 3 formats')\n\n# Verify counts\nfor fmt in ['parquet','json']:\n    count = spark.read.format(fmt).load(f'output/data.{fmt}').count()\n    print(f'{fmt}: {count} rows')"},
{title:"Write Modes Demonstration",desc:"Show different write modes: overwrite, append, ignore, error.",code:"from pyspark.sql import SparkSession\nspark = SparkSession.builder.appName('Modes').master('local[*]').getOrCreate()\n\ndf1 = spark.createDataFrame([(1,'Alice'),(2,'Bob')],['id','name'])\ndf2 = spark.createDataFrame([(3,'Charlie'),(4,'Diana')],['id','name'])\n\n# Overwrite - replaces existing\ndf1.write.mode('overwrite').parquet('output/test')\nprint(f'After overwrite: {spark.read.parquet("output/test").count()}')\n\n# Append - adds to existing\ndf2.write.mode('append').parquet('output/test')\nprint(f'After append: {spark.read.parquet("output/test").count()}')"}
],

{id:13,title:"Performance",color:"#e879f9",chips:["cache","broadcast","repartition","explain","partitioning"],
subtopics:[
{name:"cache & persist",theory:["cache() stores DataFrame in memory for reuse; alias for persist(StorageLevel.MEMORY_AND_DISK).","Use when a DataFrame is accessed multiple times (multiple actions on same data).","unpersist() removes from cache; persist() allows custom storage levels."],code:"from pyspark.sql import SparkSession\nfrom pyspark.sql import functions as F\nspark = SparkSession.builder.appName('Cache').master('local[*]').getOrCreate()\n\ndf = spark.range(1000000).withColumn('val', F.rand())\n\n# Without cache - recomputes each time\nprint(df.filter(F.col('val') > 0.5).count())\nprint(df.filter(F.col('val') > 0.9).count())\n\n# With cache - computed once, reused\ndf.cache()\ndf.count()  # Trigger caching\nprint(df.filter(F.col('val') > 0.5).count())\nprint(df.filter(F.col('val') > 0.9).count())\ndf.unpersist()"},
{name:"broadcast Optimization",theory:["broadcast() hint tells Spark to send small DataFrame to all executors.","Avoids expensive shuffle join; small table is replicated on each node.","Default broadcast threshold is 10MB (spark.sql.autoBroadcastJoinThreshold)."],code:"from pyspark.sql import SparkSession\nfrom pyspark.sql.functions import broadcast\nspark = SparkSession.builder.appName('Broadcast').master('local[*]').getOrCreate()\n\n# Large fact table\nfact = spark.range(1000000).withColumn('cat_id', (F.col('id') % 10).cast('int'))\n\n# Small dimension table\nfrom pyspark.sql import functions as F\ndim = spark.createDataFrame([(i, f'Category_{i}') for i in range(10)], ['cat_id','cat_name'])\n\n# Without broadcast - shuffle join\nresult1 = fact.join(dim, 'cat_id')\nresult1.explain()\n\n# With broadcast - no shuffle\nresult2 = fact.join(broadcast(dim), 'cat_id')\nresult2.explain()"},
{name:"repartition & coalesce",theory:["repartition(n) increases or changes partition count with full shuffle.","coalesce(n) reduces partitions WITHOUT shuffle (more efficient for reducing).","Number of partitions affects parallelism and output file count."],code:"from pyspark.sql import SparkSession\nspark = SparkSession.builder.appName('Repart').master('local[*]').getOrCreate()\n\ndf = spark.range(1000)\nprint(f'Default partitions: {df.rdd.getNumPartitions()}')\n\n# Repartition - full shuffle\ndf2 = df.repartition(10)\nprint(f'After repartition(10): {df2.rdd.getNumPartitions()}')\n\n# Coalesce - no shuffle (reduce only)\ndf3 = df2.coalesce(2)\nprint(f'After coalesce(2): {df3.rdd.getNumPartitions()}')\n\n# Repartition by column (for join optimization)\ndf4 = df.repartition(5, 'id')\nprint(f'By column: {df4.rdd.getNumPartitions()}')"},
{name:"explain & Execution Plans",theory:["explain() shows how Spark will execute a query; reveals optimizations and shuffles.","explain(True) shows all plan phases: Parsed, Analyzed, Optimized, Physical.","Look for BroadcastHashJoin (good), SortMergeJoin (shuffle), Exchange (shuffle stage)."],code:"from pyspark.sql import SparkSession\nfrom pyspark.sql.functions import col, broadcast\nspark = SparkSession.builder.appName('Explain').master('local[*]').getOrCreate()\n\ndf1 = spark.range(1000).withColumn('val', (col('id') * 2))\ndf2 = spark.range(100).withColumn('label', col('id').cast('string'))\n\n# Simple plan\ndf1.filter(col('val') > 500).explain()\n\n# Join plan\ndf1.join(df2, 'id').explain()\n\n# Broadcast join plan\ndf1.join(broadcast(df2), 'id').explain()\n\n# Full plan with all phases\ndf1.filter(col('val') > 500).explain(True)"},
{name:"Partitioning Strategy",theory:["Partition count should be 2-4x the number of CPU cores for optimal parallelism.","Too few partitions: underutilize cluster. Too many: scheduling overhead and small files.","Use spark.sql.shuffle.partitions (default 200) for post-shuffle partition count."],code:"from pyspark.sql import SparkSession\nspark = SparkSession.builder.appName('Strategy').master('local[*]') \\\n    .config('spark.sql.shuffle.partitions', '8') \\\n    .getOrCreate()\n\ndf = spark.range(10000)\nprint(f'Initial partitions: {df.rdd.getNumPartitions()}')\n\n# After groupBy (shuffle)\ngrouped = df.groupBy((df.id % 5).alias('group')).count()\nprint(f'After groupBy: {grouped.rdd.getNumPartitions()}')\n\n# Optimal: set based on data size\n# Rule: target ~128MB per partition for large data\n# spark.conf.set('spark.sql.shuffle.partitions', '50')"}
],
examples:[
{title:"Performance Comparison: Cache vs No Cache",desc:"Demonstrate caching benefit with multiple actions.",code:"from pyspark.sql import SparkSession\nfrom pyspark.sql import functions as F\nimport time\nspark = SparkSession.builder.appName('CacheDemo').master('local[*]').getOrCreate()\n\ndf = spark.range(5000000).withColumn('val', F.rand()).withColumn('cat', (F.col('id') % 100))\n\n# Without cache\nstart = time.time()\ndf.groupBy('cat').count().count()\ndf.filter(F.col('val') > 0.5).count()\nprint(f'No cache: {time.time()-start:.2f}s')\n\n# With cache\ndf.cache()\ndf.count()  # materialize\nstart = time.time()\ndf.groupBy('cat').count().count()\ndf.filter(F.col('val') > 0.5).count()\nprint(f'With cache: {time.time()-start:.2f}s')\ndf.unpersist()"},
{title:"Partition Optimization",desc:"Optimize partition count for write performance.",code:"from pyspark.sql import SparkSession\nfrom pyspark.sql import functions as F\nspark = SparkSession.builder.appName('PartOpt').master('local[*]').getOrCreate()\n\ndf = spark.range(100000).withColumn('dept', (F.col('id') % 5).cast('string'))\n\n# Bad: too many small files\ndf.write.mode('overwrite').parquet('output/many_files')\n\n# Better: coalesce before write\ndf.coalesce(4).write.mode('overwrite').parquet('output/few_files')\n\n# Best: repartition by partition column\ndf.repartition('dept').write.mode('overwrite').partitionBy('dept').parquet('output/optimal')"},
{title:"Reading Execution Plans",desc:"Interpret explain() output to identify bottlenecks.",code:"from pyspark.sql import SparkSession\nfrom pyspark.sql.functions import col, broadcast\nspark = SparkSession.builder.appName('Plans').master('local[*]').getOrCreate()\n\nfact = spark.range(100000).withColumn('key', (col('id') % 100).cast('int'))\ndim = spark.createDataFrame([(i, f'val_{i}') for i in range(100)], ['key','value'])\n\nprint('=== Sort Merge Join (shuffle both) ===')\nfact.join(dim, 'key').explain()\n\nprint('\\n=== Broadcast Hash Join (no shuffle for large table) ===')\nfact.join(broadcast(dim), 'key').explain()"}
],

{id:14,title:"SQL in PySpark",color:"#facc15",chips:["createTempView","spark.sql","register UDF","catalog"],
subtopics:[
{name:"createTempView & createGlobalTempView",theory:["createOrReplaceTempView(name) registers a DataFrame as a SQL table for the session.","Global temp views (createGlobalTempView) are accessible across sessions via global_temp.db.","Temp views are lazily evaluated just like DataFrame operations."],code:"from pyspark.sql import SparkSession\nspark = SparkSession.builder.appName('TempView').master('local[*]').getOrCreate()\n\ndf = spark.createDataFrame([\n    (1,'Alice','Eng',95000),(2,'Bob','Mkt',72000),(3,'Charlie','Eng',88000)\n], ['id','name','dept','salary'])\n\n# Register as temp view\ndf.createOrReplaceTempView('employees')\n\n# Now use SQL\nresult = spark.sql('SELECT * FROM employees WHERE salary > 80000')\nresult.show()\n\n# Global temp view\ndf.createGlobalTempView('global_emp')\nspark.sql('SELECT * FROM global_temp.global_emp').show()"},
{name:"spark.sql() Queries",theory:["spark.sql(query) executes SQL query string and returns a DataFrame.","Supports full SQL: SELECT, WHERE, GROUP BY, HAVING, JOIN, subqueries, CTEs.","Same optimization as DataFrame API; Catalyst optimizer handles both identically."],code:"from pyspark.sql import SparkSession\nspark = SparkSession.builder.appName('SQL').master('local[*]').getOrCreate()\n\ndf = spark.createDataFrame([\n    (1,'Alice','Eng',95000),(2,'Bob','Mkt',72000),\n    (3,'Charlie','Eng',88000),(4,'Diana','HR',65000)\n], ['id','name','dept','salary'])\ndf.createOrReplaceTempView('emp')\n\n# Complex SQL\nresult = spark.sql('''\n    SELECT dept, COUNT(*) as cnt, AVG(salary) as avg_sal\n    FROM emp\n    GROUP BY dept\n    HAVING COUNT(*) > 1\n    ORDER BY avg_sal DESC\n''')\nresult.show()\n\n# CTE\nresult2 = spark.sql('''\n    WITH high_earners AS (SELECT * FROM emp WHERE salary > 80000)\n    SELECT dept, COUNT(*) FROM high_earners GROUP BY dept\n''')\nresult2.show()"},
{name:"Registering UDFs for SQL",theory:["spark.udf.register(name, func, returnType) makes a UDF available in SQL queries.","Registered UDFs can be called by name in spark.sql() queries.","Same performance considerations as DataFrame UDFs (Python serialization overhead)."],code:"from pyspark.sql import SparkSession\nfrom pyspark.sql.types import StringType\nspark = SparkSession.builder.appName('SQLudf').master('local[*]').getOrCreate()\n\n# Register UDF for SQL use\ndef salary_band(salary):\n    if salary is None: return 'Unknown'\n    if salary > 90000: return 'Senior'\n    if salary > 70000: return 'Mid'\n    return 'Junior'\n\nspark.udf.register('salary_band', salary_band, StringType())\n\ndf = spark.createDataFrame([(1,'Alice',95000),(2,'Bob',72000),(3,'Charlie',60000)],['id','name','salary'])\ndf.createOrReplaceTempView('emp')\n\nspark.sql('SELECT name, salary, salary_band(salary) as band FROM emp').show()"},
{name:"Catalog API",theory:["spark.catalog provides access to database metadata: tables, views, columns, functions.","listTables() shows registered tables/views; listColumns(table) shows columns.","tableExists(name) checks if a table/view is registered in current session."],code:"from pyspark.sql import SparkSession\nspark = SparkSession.builder.appName('Catalog').master('local[*]').getOrCreate()\n\ndf = spark.createDataFrame([(1,'Alice',30)],['id','name','age'])\ndf.createOrReplaceTempView('people')\n\n# Catalog operations\nprint(spark.catalog.listTables())\nprint(spark.catalog.listColumns('people'))\nprint(spark.catalog.tableExists('people'))\n\n# List databases\nprint(spark.catalog.listDatabases())\n\n# Drop view\nspark.catalog.dropTempView('people')\nprint(spark.catalog.tableExists('people'))"}
],
examples:[
{title:"Complex SQL with Window Functions",desc:"Use SQL syntax for window function queries.",code:"from pyspark.sql import SparkSession\nspark = SparkSession.builder.appName('SQLWin').master('local[*]').getOrCreate()\n\ndf = spark.createDataFrame([\n    ('Eng','Alice',95000),('Eng','Bob',88000),('Eng','Charlie',110000),\n    ('Mkt','Diana',72000),('Mkt','Eve',68000),('HR','Frank',65000)\n], ['dept','name','salary'])\ndf.createOrReplaceTempView('emp')\n\nresult = spark.sql('''\n    SELECT dept, name, salary,\n        RANK() OVER (PARTITION BY dept ORDER BY salary DESC) as rank,\n        salary - AVG(salary) OVER (PARTITION BY dept) as diff_from_avg\n    FROM emp\n''')\nresult.show()"},
{title:"SQL Joins and Subqueries",desc:"Complex join patterns using SQL syntax.",code:"from pyspark.sql import SparkSession\nspark = SparkSession.builder.appName('SQLJoin').master('local[*]').getOrCreate()\n\nspark.createDataFrame([(1,'Alice',101),(2,'Bob',102),(3,'Charlie',103)],\n    ['id','name','dept_id']).createOrReplaceTempView('emp')\nspark.createDataFrame([(101,'Engineering'),(102,'Marketing'),(104,'Finance')],\n    ['id','dept_name']).createOrReplaceTempView('dept')\n\nresult = spark.sql('''\n    SELECT e.name, d.dept_name\n    FROM emp e\n    LEFT JOIN dept d ON e.dept_id = d.id\n    WHERE e.name IN (SELECT name FROM emp WHERE dept_id = 101)\n''')\nresult.show()"},
{title:"Dynamic SQL Generation",desc:"Build SQL queries dynamically from Python variables.",code:"from pyspark.sql import SparkSession\nspark = SparkSession.builder.appName('DynSQL').master('local[*]').getOrCreate()\n\ndf = spark.createDataFrame([(i,f'emp_{i}',50000+i*5000) for i in range(20)],['id','name','salary'])\ndf.createOrReplaceTempView('emp')\n\n# Dynamic query building\nmin_salary = 70000\ndept_filter = 'Engineering'\ncols = ['name', 'salary']\n\nquery = f\"SELECT {', '.join(cols)} FROM emp WHERE salary > {min_salary} ORDER BY salary DESC LIMIT 5\"\nprint(f'Query: {query}')\nspark.sql(query).show()"}
],

{id:15,title:"Advanced PySpark",color:"#ff6b6b",chips:["Streaming","Delta Lake","RDD ops","accumulators"],
subtopics:[
{name:"Structured Streaming Basics",theory:["Structured Streaming treats live data as an unbounded table appended continuously.","Use spark.readStream instead of spark.read; same DataFrame API for transformations.","Output modes: append (new rows only), complete (all results), update (changed rows)."],code:"from pyspark.sql import SparkSession\nfrom pyspark.sql.functions import split, explode, window, current_timestamp\nspark = SparkSession.builder.appName('Stream').master('local[*]').getOrCreate()\n\n# Read from socket (demo)\n# lines = spark.readStream.format('socket').option('host','localhost').option('port',9999).load()\n\n# Read from directory (file source)\n# stream_df = spark.readStream.schema(schema).csv('input/streaming/')\n\n# Simulated stream processing pattern\ndf = spark.createDataFrame([('hello world',),('hello spark',)],['line'])\nwords = df.select(explode(split('line',' ')).alias('word'))\ncounts = words.groupBy('word').count()\ncounts.show()"},
{name:"Delta Lake Concepts",theory:["Delta Lake adds ACID transactions, schema enforcement, and time travel to Parquet.","Supports MERGE (upsert), DELETE, UPDATE operations on data lake storage.","Time travel allows querying historical versions: spark.read.option('versionAsOf', 0)."],code:"from pyspark.sql import SparkSession\n# Delta Lake requires delta-spark package\n# spark = SparkSession.builder.config('spark.jars.packages','io.delta:delta-spark_2.12:3.0.0').getOrCreate()\nspark = SparkSession.builder.appName('Delta').master('local[*]').getOrCreate()\n\ndf = spark.createDataFrame([(1,'Alice',95000),(2,'Bob',72000)],['id','name','salary'])\n\n# Write as Delta (requires delta-spark)\n# df.write.format('delta').mode('overwrite').save('output/delta_table')\n\n# Read Delta\n# df_delta = spark.read.format('delta').load('output/delta_table')\n\n# Time travel\n# df_v0 = spark.read.format('delta').option('versionAsOf', 0).load('output/delta_table')\nprint('Delta Lake pattern demonstrated')"},

let currentTopic = null;
const STORAGE_KEY = 'pyspark_roadmap_progress';

function getProgress() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
    catch { return {}; }
}
function saveProgress(data) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}
function getTotalPractice() {
    return topics.reduce((sum, t) => sum + t.practice.length, 0);
}
function getCompletedCount() {
    const prog = getProgress();
    return Object.values(prog).filter(v => v).length;
}
function updateProgressBar() {
    const total = getTotalPractice();
    const done = getCompletedCount();
    const pct = total > 0 ? (done / total * 100) : 0;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressText').textContent = done + ' / ' + total;
}
function getTopicProgress(topicId) {
    const prog = getProgress();
    const topic = topics.find(t => t.id === topicId);
    if (!topic) return {done: 0, total: 0};
    let done = 0;
    topic.practice.forEach((_, i) => {
        if (prog[topicId + '_' + i]) done++;
    });
    return {done, total: topic.practice.length};
}

function highlightPython(code) {
    let html = code
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    html = html.replace(/(#.*)/g, '<span style="color:#6b7280">$1</span>');
    html = html.replace(/("""[\\s\\S]*?"""|'''[\\s\\S]*?''')/g, '<span style="color:#a5d6ff">$1</span>');
    html = html.replace(/(f?"[^"\\\\]*(?:\\\\.[^"\\\\]*)*")/g, '<span style="color:#a5d6ff">$1</span>');
    html = html.replace(/(f?'[^'\\\\]*(?:\\\\.[^'\\\\]*)*')/g, '<span style="color:#a5d6ff">$1</span>');
    html = html.replace(/\\b(\\d+\\.?\\d*)\\b/g, '<span style="color:#f9a825">$1</span>');
    var keywords = ['from','import','def','class','return','yield','if','elif','else','for','while','break','continue','pass','try','except','finally','raise','with','as','lambda','and','or','not','in','is','True','False','None','async','await','global','nonlocal','del','assert'];
    keywords.forEach(function(kw) {
        html = html.replace(new RegExp('\\\\b(' + kw + ')\\\\b', 'g'), '<span style="color:#ff7b72">$1</span>');
    });
    var builtins = ['print','len','range','type','int','float','str','bool','list','dict','set','tuple','input','open','sum','max','min','abs','enumerate','zip','map','filter','sorted','reversed','any','all','isinstance','super','next','iter','hasattr','getattr','setattr','round','format'];
    builtins.forEach(function(fn) {
        html = html.replace(new RegExp('\\\\b(' + fn + ')\\\\b(?=\\\\()', 'g'), '<span style="color:#d2a8ff">$1</span>');
    });
    return html;
}

function renderRoadmap() {
    const container = document.getElementById('roadmapContainer');
    container.innerHTML = '';
    topics.forEach(topic => {
        const prog = getTopicProgress(topic.id);
        const node = document.createElement('div');
        node.className = 'node';
        node.onclick = () => showDetail(topic.id);
        node.innerHTML = '<div class="node-number" style="border-color:'+topic.color+';color:'+topic.color+'">'+topic.id+'</div><div class="node-card"><div class="node-title" style="color:'+topic.color+'">'+topic.title+'</div><div class="node-chips">'+topic.chips.map(c => '<span class="chip">'+c+'</span>').join('')+'</div><div class="node-progress">'+prog.done+' / '+prog.total+' practice completed</div></div>';
        container.appendChild(node);
    });
}

function showDetail(topicId) {
    currentTopic = topics.find(t => t.id === topicId);
    if (!currentTopic) return;
    document.getElementById('roadmapPage').classList.remove('active');
    document.getElementById('detailPage').classList.add('active');
    document.getElementById('detailTitle').textContent = currentTopic.title;
    document.getElementById('detailTitle').style.color = currentTopic.color;
    document.getElementById('detailSubtitle').textContent = currentTopic.subtopics.map(s => s.name).join(' \u2022 ');
    renderTheory();
    renderExamples();
    renderPractice();
    switchTab('theory');
    window.scrollTo(0, 0);
}

function showRoadmap() {
    document.getElementById('detailPage').classList.remove('active');
    document.getElementById('roadmapPage').classList.add('active');
    renderRoadmap();
    updateProgressBar();
}

function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t, i) => {
        t.classList.toggle('active', ['theory','examples','practice','solutions'][i] === tab);
    });
    document.querySelectorAll('.tab-content').forEach((tc, i) => {
        tc.classList.toggle('active', ['theory','examples','practice','solutions'][i] === tab);
    });
    if (tab === 'solutions') renderSolutions();
}

function renderTheory() {
    const container = document.getElementById('theoryContent');
    var html = '';
    currentTopic.subtopics.forEach(function(sub) {
        html += '<div class="theory-section"><div class="theory-title">' + sub.name + '</div>';
        sub.theory.forEach(function(t) { html += '<p class="theory-point">' + t + '</p>'; });
        html += '<pre class="code-block">' + highlightPython(sub.code) + '</pre></div>';
    });
    container.innerHTML = html;
}

function renderExamples() {
    const container = document.getElementById('examplesContent');
    var html = '';
    currentTopic.examples.forEach(function(ex) {
        html += '<div class="example-card"><div class="example-title">' + ex.title + '</div><p class="example-desc">' + ex.desc + '</p><pre class="code-block">' + highlightPython(ex.code) + '</pre></div>';
    });
    container.innerHTML = html;
}

function renderPractice() {
    const container = document.getElementById('practiceContent');
    const prog = getProgress();
    var html = '';
    currentTopic.practice.forEach(function(p, i) {
        var key = currentTopic.id + '_' + i;
        var checked = prog[key] ? 'checked' : '';
        var doneClass = prog[key] ? 'done' : '';
        var diffClass = p.d === 'E' ? 'easy' : p.d === 'M' ? 'medium' : 'hard';
        var diffLabel = p.d === 'E' ? 'Easy' : p.d === 'M' ? 'Medium' : 'Hard';
        html += '<div class="practice-item ' + doneClass + '"><input type="checkbox" ' + checked + ' onchange="togglePractice(\'' + key + '\', this)"><span class="practice-text">' + (i+1) + '. ' + p.q + '</span><span class="difficulty ' + diffClass + '">' + diffLabel + '</span></div>';
    });
    container.innerHTML = html;
}

function togglePractice(key, el) {
    const prog = getProgress();
    prog[key] = el.checked;
    saveProgress(prog);
    updateProgressBar();
    el.parentElement.classList.toggle('done', el.checked);
}

function renderSolutions() {
    var container = document.getElementById('solutionsContent');
    if (!currentTopic) return;
    var sols = solutionData[currentTopic.id] || [];
    var html = '';
    currentTopic.practice.forEach(function(p, i) {
        var sol = sols[i] || 'Solution coming soon...';
        var highlighted = highlightPython(sol);
        html += '<div class="solution-item">' +
            '<div class="solution-header" onclick="toggleSolution(' + i + ')">' +
            '<span class="solution-num">#' + (i+1) + '</span>' +
            '<span class="solution-q">' + p.q + '</span>' +
            '<button class="solution-toggle" id="btn_' + i + '">Show Solution</button>' +
            '</div>' +
            '<div class="solution-body" id="sol_' + i + '">' +
            '<pre class="code-block"><code>' + highlighted + '</code></pre>' +
            '</div></div>';
    });
    container.innerHTML = html;
}

function toggleSolution(i) {
    var body = document.getElementById('sol_' + i);
    var btn = document.getElementById('btn_' + i);
    body.classList.toggle('open');
    btn.textContent = body.classList.contains('open') ? 'Hide Solution' : 'Show Solution';
}

renderRoadmap();
updateProgressBar();
