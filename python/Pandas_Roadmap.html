{id:11,title:"Date & Time",color:"#c084fc",chips:["to_datetime","dt","resample","date_range","timedelta"],
subtopics:[
{name:"to_datetime() Conversion",theory:["pd.to_datetime() converts strings, integers, or timestamps to datetime64 dtype.","Handles many formats automatically; use format= for explicit parsing of unusual formats.","errors='coerce' converts unparseable values to NaT (Not a Time) instead of raising."],code:"import pandas as pd\n\n# Auto-parse various formats\ndates = pd.to_datetime(['2024-01-15', '01/15/2024', 'January 15, 2024'])\n\n# With explicit format (faster for large datasets)\ndf = pd.DataFrame({'date_str': ['15-01-2024', '20-02-2024', '10-03-2024']})\ndf['date'] = pd.to_datetime(df['date_str'], format='%d-%m-%Y')\n\n# Handle errors\nmixed = pd.to_datetime(['2024-01-01', 'invalid', '2024-03-01'], errors='coerce')\nprint(mixed)  # NaT for 'invalid'\n\n# From Unix timestamp\ndf['ts'] = pd.to_datetime([1704067200, 1704153600], unit='s')"},
{name:"dt Accessor Properties",theory:["The .dt accessor exposes datetime properties on Series with datetime64 dtype.","Extract: year, month, day, hour, minute, second, dayofweek, quarter, etc.","Get string names: day_name(), month_name(); check: is_leap_year, is_month_end."],code:"import pandas as pd\n\ndf = pd.DataFrame({\n    'timestamp': pd.date_range('2024-01-01', periods=10, freq='D')\n})\n\n# Extract components\ndf['year'] = df['timestamp'].dt.year\ndf['month'] = df['timestamp'].dt.month\ndf['day'] = df['timestamp'].dt.day\ndf['weekday'] = df['timestamp'].dt.day_name()\ndf['quarter'] = df['timestamp'].dt.quarter\ndf['is_weekend'] = df['timestamp'].dt.dayofweek >= 5\n\nprint(df)"},
{name:"resample() - Time-based GroupBy",theory:["resample() groups time-series data by a time frequency: 'D' (day), 'W', 'M', 'Q', 'Y'.","Requires a DatetimeIndex; works like groupby but for time periods.","Must call an aggregation after resample: .sum(), .mean(), .first(), .last(), .ohlc()."],code:"import pandas as pd\nimport numpy as np\n\n# Daily data\ndf = pd.DataFrame({\n    'date': pd.date_range('2024-01-01', periods=90, freq='D'),\n    'sales': np.random.randint(50, 200, 90)\n})\ndf = df.set_index('date')\n\n# Resample to weekly\nweekly = df.resample('W').sum()\nprint(weekly.head())\n\n# Monthly average\nmonthly = df.resample('ME').agg({'sales': ['sum', 'mean', 'count']})\nprint(monthly)"},
{name:"date_range() and period_range()",theory:["pd.date_range(start, end/periods, freq) generates fixed-frequency DatetimeIndex.","Common frequencies: 'D'(day), 'H'(hour), 'T'(minute), 'B'(business day), 'MS'(month start).","pd.period_range creates PeriodIndex for fiscal periods, quarters, etc."],code:"import pandas as pd\n\n# Basic date ranges\ndaily = pd.date_range('2024-01-01', periods=7, freq='D')\nweekly = pd.date_range('2024-01-01', '2024-03-31', freq='W-MON')\nbusiness = pd.date_range('2024-01-01', periods=10, freq='B')\nhourly = pd.date_range('2024-01-01', periods=24, freq='H')\n\nprint(f'Daily: {daily}')\nprint(f'Business days: {business}')\n\n# Period range\nquarters = pd.period_range('2024Q1', periods=4, freq='Q')\nprint(f'Quarters: {quarters}')"},
{name:"Timedelta Operations",theory:["pd.Timedelta represents a duration/difference between two datetime values.","Arithmetic on datetime columns produces Timedelta: date2 - date1 = timedelta.","Access components: .dt.days, .dt.seconds, .dt.total_seconds()."],code:"import pandas as pd\n\ndf = pd.DataFrame({\n    'start': pd.to_datetime(['2024-01-01', '2024-02-15', '2024-03-20']),\n    'end': pd.to_datetime(['2024-01-10', '2024-03-01', '2024-04-05'])\n})\n\n# Compute duration\ndf['duration'] = df['end'] - df['start']\ndf['days'] = df['duration'].dt.days\n\n# Add timedelta\ndf['due_date'] = df['start'] + pd.Timedelta(days=30)\n\n# Create timedelta from string\ndf['buffer'] = pd.to_timedelta('7 days')\n\nprint(df)"},
{name:"Timezone Handling",theory:["tz_localize() assigns timezone to naive datetime; tz_convert() converts between zones.","Common timezones: 'UTC', 'US/Eastern', 'Europe/London', 'Asia/Tokyo'.","Always store in UTC and convert for display - avoids ambiguity issues."],code:"import pandas as pd\n\n# Create timezone-aware datetime\ndf = pd.DataFrame({\n    'timestamp': pd.date_range('2024-01-01', periods=5, freq='H', tz='UTC')\n})\n\n# Convert timezone\ndf['eastern'] = df['timestamp'].dt.tz_convert('US/Eastern')\ndf['tokyo'] = df['timestamp'].dt.tz_convert('Asia/Tokyo')\n\nprint(df)\n\n# Localize naive datetime\nnaive = pd.date_range('2024-01-01', periods=3, freq='D')\naware = naive.tz_localize('US/Eastern')\nutc = aware.tz_convert('UTC')"}
],
examples:[
{title:"Time Series Aggregation",desc:"Aggregate daily data to multiple frequencies.",code:"import pandas as pd\nimport numpy as np\n\nnp.random.seed(42)\ndf = pd.DataFrame({\n    'date': pd.date_range('2024-01-01', periods=365, freq='D'),\n    'revenue': np.random.randint(1000, 5000, 365),\n    'orders': np.random.randint(10, 100, 365)\n}).set_index('date')\n\n# Multiple aggregation levels\nmonthly = df.resample('ME').agg({'revenue': 'sum', 'orders': 'sum'})\nquarterly = df.resample('QE').agg({'revenue': 'sum', 'orders': 'mean'})\n\nprint('Monthly:')\nprint(monthly.head())\nprint('\\nQuarterly:')\nprint(quarterly)"},
{title:"Date Feature Engineering",desc:"Create time-based features for ML models.",code:"import pandas as pd\nimport numpy as np\n\ndf = pd.DataFrame({\n    'timestamp': pd.date_range('2024-01-01', periods=100, freq='D')\n})\n\n# Extract features\ndf['year'] = df['timestamp'].dt.year\ndf['month'] = df['timestamp'].dt.month\ndf['day_of_week'] = df['timestamp'].dt.dayofweek\ndf['is_weekend'] = df['timestamp'].dt.dayofweek >= 5\ndf['day_of_year'] = df['timestamp'].dt.dayofyear\ndf['week_of_year'] = df['timestamp'].dt.isocalendar().week.astype(int)\ndf['is_month_start'] = df['timestamp'].dt.is_month_start\ndf['quarter'] = df['timestamp'].dt.quarter\n\nprint(df.head(10))"},
{title:"Duration Analysis",desc:"Analyze time durations and intervals.",code:"import pandas as pd\n\ndf = pd.DataFrame({\n    'order_placed': pd.to_datetime(['2024-01-01 10:00', '2024-01-01 14:30',\n                                     '2024-01-02 09:00', '2024-01-02 16:45']),\n    'order_delivered': pd.to_datetime(['2024-01-03 14:00', '2024-01-02 18:00',\n                                       '2024-01-05 11:00', '2024-01-04 10:30'])\n})\n\ndf['delivery_time'] = df['order_delivered'] - df['order_placed']\ndf['hours'] = df['delivery_time'].dt.total_seconds() / 3600\ndf['business_class'] = pd.cut(df['hours'], bins=[0,24,48,72,999],\n                              labels=['Express','Standard','Extended','Late'])\n\nprint(df)"}
],

{id:12,title:"Apply & Vectorization",color:"#2dd4bf",chips:["apply","map","np.where","cut/qcut","pipe"],
subtopics:[
{name:"apply() on Series and DataFrames",theory:["Series.apply(func) applies a function element-wise to each value in the Series.","DataFrame.apply(func, axis=0) applies along columns; axis=1 applies along rows.","apply is flexible but slower than vectorized operations - use as last resort."],code:"import pandas as pd\nimport numpy as np\n\ndf = pd.DataFrame({\n    'name': ['Alice','Bob','Charlie'],\n    'score': [85, 92, 78],\n    'bonus': [1000, 1500, 800]\n})\n\n# Series apply\ndf['grade'] = df['score'].apply(lambda x: 'A' if x>=90 else 'B' if x>=80 else 'C')\n\n# DataFrame apply (row-wise)\ndf['total_comp'] = df.apply(lambda row: row['score'] * 100 + row['bonus'], axis=1)\n\n# Column-wise apply\ncol_stats = df[['score','bonus']].apply(lambda col: col.max() - col.min())\nprint(df)\nprint(col_stats)"},
{name:"map() for Mapping Values",theory:["Series.map(dict_or_func) maps values using a dictionary, Series, or function.","Unmapped values become NaN when using a dictionary (unlike apply which raises no error).","Faster than apply for simple 1:1 lookups; ideal for categorical recoding."],code:"import pandas as pd\n\ndf = pd.DataFrame({\n    'grade': ['A', 'B', 'C', 'A', 'B'],\n    'dept_code': [1, 2, 3, 1, 2]\n})\n\n# Map with dictionary\ngrade_points = {'A': 4.0, 'B': 3.0, 'C': 2.0}\ndf['gpa'] = df['grade'].map(grade_points)\n\n# Map with function\ndf['grade_lower'] = df['grade'].map(str.lower)\n\n# Map dept codes to names\ndept_names = {1: 'Engineering', 2: 'Sales', 3: 'HR'}\ndf['dept'] = df['dept_code'].map(dept_names)\n\nprint(df)"},
{name:"np.where() and np.select()",theory:["np.where(condition, true_val, false_val) is a vectorized if/else - very fast.","np.select(conditions_list, choices_list, default) handles multiple conditions efficiently.","Both are much faster than apply with lambda for conditional column creation."],code:"import pandas as pd\nimport numpy as np\n\ndf = pd.DataFrame({\n    'score': [45, 65, 75, 85, 95],\n    'attendance': [60, 80, 90, 95, 70]\n})\n\n# Binary condition (np.where)\ndf['pass_fail'] = np.where(df['score'] >= 60, 'Pass', 'Fail')\n\n# Multiple conditions (np.select)\nconditions = [\n    df['score'] >= 90,\n    df['score'] >= 80,\n    df['score'] >= 70,\n    df['score'] >= 60\n]\nchoices = ['A', 'B', 'C', 'D']\ndf['grade'] = np.select(conditions, choices, default='F')\n\nprint(df)"},
{name:"cut() and qcut() - Binning",theory:["pd.cut(x, bins) divides continuous values into discrete intervals (equal-width bins).","pd.qcut(x, q) divides data into quantiles (equal-frequency bins).","labels parameter assigns custom names to bins instead of interval notation."],code:"import pandas as pd\nimport numpy as np\n\ndf = pd.DataFrame({'age': np.random.randint(18, 80, 20)})\n\n# Equal-width bins\ndf['age_group'] = pd.cut(df['age'],\n    bins=[0, 25, 35, 50, 65, 100],\n    labels=['18-25', '26-35', '36-50', '51-65', '65+']\n)\n\n# Quantile-based bins (equal frequency)\ndf['age_quartile'] = pd.qcut(df['age'], q=4, labels=['Q1','Q2','Q3','Q4'])\n\nprint(df.head(10))\nprint(df['age_group'].value_counts().sort_index())"},
{name:"pipe() for Method Chaining",theory:["pipe() passes the DataFrame to a function, enabling clean method chaining.","Function receives DataFrame as first argument; additional args/kwargs passed through.","Enables building readable, composable data transformation pipelines."],code:"import pandas as pd\nimport numpy as np\n\ndef remove_outliers(df, column, n_std=2):\n    mean = df[column].mean()\n    std = df[column].std()\n    return df[df[column].between(mean - n_std*std, mean + n_std*std)]\n\ndef add_features(df):\n    df = df.copy()\n    df['log_value'] = np.log1p(df['value'])\n    df['is_high'] = df['value'] > df['value'].median()\n    return df\n\ndef normalize(df, columns):\n    df = df.copy()\n    for col in columns:\n        df[col] = (df[col] - df[col].min()) / (df[col].max() - df[col].min())\n    return df\n\n# Chainable pipeline\nresult = (pd.DataFrame({'value': np.random.randn(100) * 10 + 50})\n    .pipe(remove_outliers, 'value')\n    .pipe(add_features)\n    .pipe(normalize, ['value', 'log_value'])\n)\nprint(result.head())"},
{name:"Vectorization vs Apply Performance",theory:["Vectorized operations (NumPy/Pandas built-ins) are 10-100x faster than apply.","Use vectorized first: arithmetic, np.where, str accessor, dt accessor.","apply is needed only for complex row-wise logic that can't be vectorized."],code:"import pandas as pd\nimport numpy as np\n\ndf = pd.DataFrame({'A': np.random.randn(100000), 'B': np.random.randn(100000)})\n\n# SLOW: apply (row by row)\n# result = df.apply(lambda row: row['A'] + row['B'], axis=1)\n\n# FAST: vectorized\nresult = df['A'] + df['B']\n\n# SLOW: apply for conditional\n# df['label'] = df['A'].apply(lambda x: 'pos' if x > 0 else 'neg')\n\n# FAST: np.where\ndf['label'] = np.where(df['A'] > 0, 'pos', 'neg')\n\n# FAST: vectorized string operations\nnames = pd.Series(['Alice Smith', 'Bob Jones'] * 50000)\nfirst_names = names.str.split().str[0]  # vectorized, not apply"}
],
examples:[
{title:"Feature Engineering Pipeline",desc:"Create derived features using vectorized operations.",code:"import pandas as pd\nimport numpy as np\n\ndf = pd.DataFrame({\n    'income': [50000, 75000, 100000, 30000, 120000],\n    'debt': [10000, 25000, 5000, 15000, 30000],\n    'age': [25, 35, 45, 22, 55]\n})\n\n# Vectorized features\ndf['debt_to_income'] = df['debt'] / df['income']\ndf['income_log'] = np.log1p(df['income'])\n\n# Binning\ndf['age_group'] = pd.cut(df['age'], bins=[0,30,45,100], labels=['Young','Mid','Senior'])\n\n# Multiple conditions\ndf['risk'] = np.select(\n    [df['debt_to_income'] > 0.3, df['debt_to_income'] > 0.15],\n    ['High', 'Medium'], default='Low'\n)\n\nprint(df)"},
{title:"Data Transformation Pipeline",desc:"Build a reusable transformation pipeline with pipe.",code:"import pandas as pd\nimport numpy as np\n\ndef clean_data(df):\n    return df.dropna().drop_duplicates()\n\ndef add_computed_cols(df):\n    df = df.copy()\n    df['revenue'] = df['quantity'] * df['price']\n    df['margin'] = (df['price'] - df['cost']) / df['price'] * 100\n    return df\n\ndef categorize(df, col, bins, labels):\n    df = df.copy()\n    df[f'{col}_cat'] = pd.cut(df[col], bins=bins, labels=labels)\n    return df\n\n# Use pipeline\ndf = pd.DataFrame({\n    'quantity': [10, 5, 20, 8, 15],\n    'price': [25.0, 50.0, 15.0, 35.0, 20.0],\n    'cost': [15.0, 30.0, 8.0, 20.0, 12.0]\n})\n\nresult = (df\n    .pipe(clean_data)\n    .pipe(add_computed_cols)\n    .pipe(categorize, 'revenue', [0,100,300,1000], ['Low','Med','High'])\n)\nprint(result)"},
{title:"Efficient Conditional Logic",desc:"Compare apply vs vectorized approaches.",code:"import pandas as pd\nimport numpy as np\n\ndf = pd.DataFrame({\n    'temperature': np.random.uniform(-10, 40, 1000),\n    'humidity': np.random.uniform(20, 100, 1000)\n})\n\n# Vectorized approach (FAST)\nconditions = [\n    (df['temperature'] > 30) & (df['humidity'] > 70),\n    (df['temperature'] > 30),\n    (df['temperature'] < 0)\n]\nchoices = ['Hot & Humid', 'Hot', 'Cold']\ndf['weather'] = np.select(conditions, choices, default='Moderate')\n\nprint(df['weather'].value_counts())\nprint(df.head())"}
],

{id:13,title:"MultiIndex & Advanced",color:"#e879f9",chips:["set_index","MultiIndex","xs","swaplevel"],
subtopics:[
{name:"Creating MultiIndex",theory:["MultiIndex enables hierarchical row/column indexing for complex grouped data.","Create with: from_tuples(), from_arrays(), from_product(), or set_index() with multiple columns.","Each level has a name; use .names to access or set level names."],code:"import pandas as pd\n\n# From arrays\narrays = [['A','A','B','B'], ['one','two','one','two']]\nmi = pd.MultiIndex.from_arrays(arrays, names=['letter','number'])\ndf = pd.DataFrame({'val': [10,20,30,40]}, index=mi)\n\n# From product (cartesian product)\nmi2 = pd.MultiIndex.from_product(\n    [['Store1','Store2'], ['Q1','Q2','Q3','Q4']],\n    names=['store','quarter']\n)\n\n# From DataFrame columns\ndf2 = pd.DataFrame({\n    'dept': ['IT','IT','Sales','Sales'],\n    'level': ['Jr','Sr','Jr','Sr'],\n    'salary': [60000,90000,50000,80000]\n}).set_index(['dept','level'])\n\nprint(df2)"},
{name:"Selecting with MultiIndex",theory:["loc with tuples accesses specific MultiIndex combinations: df.loc[('A','one')].","Partial indexing: df.loc['A'] gets all entries at first level without specifying second.","xs() (cross-section) selects a slice at a specific level regardless of position."],code:"import pandas as pd\n\ndf = pd.DataFrame({\n    'revenue': [100,150,200,250,120,180],\n    'cost': [60,90,120,150,70,110]\n}, index=pd.MultiIndex.from_product(\n    [['East','West'], ['Q1','Q2','Q3']],\n    names=['region','quarter']\n))\n\n# Full tuple selection\nprint(df.loc[('East','Q1')])\n\n# Partial indexing (first level)\nprint(df.loc['East'])\n\n# Cross-section at level\nprint(df.xs('Q2', level='quarter'))  # Q2 for all regions\n\n# Slice within level\nprint(df.loc[('East','Q1'):('East','Q3')])"},
{name:"swaplevel() and reorder_levels()",theory:["swaplevel() exchanges two levels of a MultiIndex (changes hierarchy order).","reorder_levels() rearranges all levels in specified order.","sort_index() after swapping ensures data is properly ordered for efficient access."],code:"import pandas as pd\n\ndf = pd.DataFrame({'val': range(8)}, index=pd.MultiIndex.from_product(\n    [['2023','2024'], ['Q1','Q2'], ['East','West']],\n    names=['year','quarter','region']\n))\n\n# Swap levels\nswapped = df.swaplevel('year', 'region')\nprint(swapped)\n\n# Reorder all levels\nreordered = df.reorder_levels(['region','year','quarter']).sort_index()\nprint(reordered)\n\n# Access after reorder\nprint(reordered.loc['East'])"},
{name:"MultiIndex Operations (groupby level)",theory:["Many operations accept level= parameter to work on specific MultiIndex levels.","sum(level=), mean(level=) aggregate across a specific level (deprecated, use groupby).","Use df.groupby(level='name') for level-based aggregation in modern pandas."],code:"import pandas as pd\nimport numpy as np\n\ndf = pd.DataFrame(\n    np.random.randint(10, 100, (8, 2)),\n    columns=['sales','returns'],\n    index=pd.MultiIndex.from_product(\n        [['ProductA','ProductB'], ['2023Q1','2023Q2','2023Q3','2023Q4']],\n        names=['product','quarter']\n    )\n)\n\n# Aggregate by level\nby_product = df.groupby(level='product').sum()\nprint(by_product)\n\n# Statistics per level\nby_quarter = df.groupby(level='quarter').mean()\nprint(by_quarter)"},
{name:"reset_index() and set_index()",theory:["reset_index() converts MultiIndex levels back to regular columns.","reset_index(level='name') only resets a specific level, keeping others as index.","set_index() with a list of columns creates MultiIndex from those columns."],code:"import pandas as pd\n\ndf = pd.DataFrame({\n    'region': ['East','East','West','West'],\n    'product': ['A','B','A','B'],\n    'sales': [100, 150, 200, 250]\n})\n\n# Create MultiIndex\nmi_df = df.set_index(['region','product'])\nprint(mi_df)\n\n# Reset all levels\nflat = mi_df.reset_index()\nprint(flat)\n\n# Reset only one level\npartial = mi_df.reset_index(level='product')\nprint(partial)"},
{name:"MultiIndex Columns",theory:["Columns can also be MultiIndex - common after pivot_table or multi-level aggregation.","Access with tuples: df[('sales','sum')] or df['sales']['sum'].","Use droplevel() to remove a level from MultiIndex columns."],code:"import pandas as pd\nimport numpy as np\n\ndf = pd.DataFrame({\n    'product': ['A','A','B','B'],\n    'region': ['E','W','E','W'],\n    'sales': [100,150,200,250],\n    'profit': [20,30,50,60]\n})\n\n# Creates MultiIndex columns\npivot = df.pivot_table(\n    index='product',\n    columns='region',\n    values=['sales','profit'],\n    aggfunc='sum'\n)\nprint(pivot)\nprint(pivot.columns)  # MultiIndex columns\n\n# Access specific column\nprint(pivot[('sales','E')])\n\n# Flatten MultiIndex columns\npivot.columns = ['_'.join(col) for col in pivot.columns]\nprint(pivot)"}
],
examples:[
{title:"Hierarchical Data Analysis",desc:"Analyze sales data with multi-level hierarchy.",code:"import pandas as pd\nimport numpy as np\n\nnp.random.seed(42)\ndf = pd.DataFrame({\n    'region': np.repeat(['North','South','East','West'], 4),\n    'quarter': ['Q1','Q2','Q3','Q4'] * 4,\n    'revenue': np.random.randint(100, 500, 16),\n    'cost': np.random.randint(50, 300, 16)\n}).set_index(['region','quarter'])\n\ndf['profit'] = df['revenue'] - df['cost']\n\n# Analysis at different levels\nprint('By Region:')\nprint(df.groupby(level='region')['profit'].sum())\n\nprint('\\nQ1 across all regions:')\nprint(df.xs('Q1', level='quarter'))"},
{title:"MultiIndex Column Handling",desc:"Work with multi-level column headers from aggregation.",code:"import pandas as pd\nimport numpy as np\n\ndf = pd.DataFrame({\n    'category': ['A','A','B','B','A','B'],\n    'year': [2023,2024,2023,2024,2023,2024],\n    'sales': [100,120,200,250,110,220],\n    'units': [10,12,20,25,11,22]\n})\n\n# Multi-level aggregation\nresult = df.groupby(['category','year']).agg(\n    total_sales=('sales','sum'),\n    avg_units=('units','mean')\n)\n\nprint(result)\nprint('\\nUnstacked:')\nprint(result.unstack(level='year'))"},
{title:"IndexSlice for Complex Selection",desc:"Use IndexSlice for readable MultiIndex slicing.",code:"import pandas as pd\nimport numpy as np\n\nidx = pd.IndexSlice\ndf = pd.DataFrame(\n    np.random.randint(10, 100, (12, 2)),\n    columns=['revenue', 'cost'],\n    index=pd.MultiIndex.from_product(\n        [['A','B','C'], ['2023','2024'], ['H1','H2']],\n        names=['product','year','half']\n    )\n)\n\n# Select using IndexSlice\nprint(df.loc[idx['A',:,:], :])          # All of product A\nprint(df.loc[idx[:,'2024',:], :])       # All of 2024\nprint(df.loc[idx['A':'B','2024','H1'], :])  # A,B in 2024 H1"}

{id:14,title:"Data Visualization",color:"#facc15",chips:["plot()","bar","line","hist","scatter","box"],
subtopics:[
{name:"Basic plot() Method",theory:["DataFrame.plot() and Series.plot() provide quick visualization built on matplotlib.","Default plot type is line; change with kind= parameter or shortcut methods.","Returns a matplotlib Axes object for further customization."],code:"import pandas as pd\nimport numpy as np\n\ndf = pd.DataFrame({\n    'month': range(1, 13),\n    'sales': [100,120,115,140,160,155,180,175,190,200,210,250],\n    'costs': [80,90,85,100,110,105,120,115,125,130,135,160]\n})\n\n# Basic line plot\ndf.plot(x='month', y=['sales','costs'], title='Monthly Performance')\n\n# Series plot\ndf['sales'].plot(kind='line', title='Sales Trend')\n\n# Plot settings\ndf.plot(x='month', y='sales', figsize=(10,6), grid=True, style='o-')"},
{name:"Bar and Barh Charts",theory:["kind='bar' creates vertical bar chart; kind='barh' creates horizontal bars.","Grouped bars: plot multiple columns; stacked=True stacks them.","Useful for comparing categories and showing composition."],code:"import pandas as pd\nimport numpy as np\n\ndf = pd.DataFrame({\n    'product': ['Widget','Gadget','Gizmo','Tool'],\n    'Q1': [100, 150, 80, 120],\n    'Q2': [120, 140, 95, 130]\n})\n\n# Vertical bar\ndf.plot(x='product', kind='bar', title='Sales by Product')\n\n# Stacked bar\ndf.plot(x='product', kind='bar', stacked=True, title='Stacked Sales')\n\n# Horizontal bar\ndf.plot(x='product', kind='barh', title='Horizontal View')\n\n# Value counts as bar chart\ndata = pd.Series(['A','B','A','C','B','A','B','C','A'])\ndata.value_counts().plot(kind='bar')"},
{name:"Histogram and Distribution",theory:["kind='hist' shows distribution of values; bins= controls number of bars.","kind='kde' shows kernel density estimate (smooth distribution curve).","Combine hist and kde with df.plot(kind='hist', density=True) + .plot(kind='kde')."],code:"import pandas as pd\nimport numpy as np\n\ndf = pd.DataFrame({\n    'scores': np.random.normal(75, 10, 1000),\n    'ages': np.random.normal(35, 8, 1000)\n})\n\n# Basic histogram\ndf['scores'].plot(kind='hist', bins=30, title='Score Distribution')\n\n# With KDE overlay\ndf['scores'].plot(kind='hist', bins=30, density=True, alpha=0.7)\ndf['scores'].plot(kind='kde', title='Score Distribution with KDE')\n\n# Multiple histograms\ndf.plot(kind='hist', bins=20, alpha=0.5, title='Distributions')"},
{name:"Scatter Plots",theory:["kind='scatter' shows relationship between two numeric variables.","c= parameter colors points by a third variable; s= sizes points by another.","Useful for identifying correlations, clusters, and outliers."],code:"import pandas as pd\nimport numpy as np\n\nnp.random.seed(42)\ndf = pd.DataFrame({\n    'height': np.random.normal(170, 10, 100),\n    'weight': np.random.normal(70, 15, 100),\n    'age': np.random.randint(20, 60, 100)\n})\n\n# Basic scatter\ndf.plot(kind='scatter', x='height', y='weight', title='Height vs Weight')\n\n# Colored by third variable\ndf.plot(kind='scatter', x='height', y='weight', c='age',\n        colormap='viridis', title='Colored by Age')\n\n# Sized by variable\ndf.plot(kind='scatter', x='height', y='weight', s=df['age']*3)"},
{name:"Box and Violin Plots",theory:["kind='box' shows distribution summary: median, quartiles, whiskers, outliers.","Box plots per group: df.boxplot(by='group_col') compares distributions.","Great for identifying outliers and comparing spread across categories."],code:"import pandas as pd\nimport numpy as np\n\ndf = pd.DataFrame({\n    'dept': np.repeat(['Sales','IT','HR'], 50),\n    'salary': np.concatenate([\n        np.random.normal(65000, 10000, 50),\n        np.random.normal(85000, 15000, 50),\n        np.random.normal(55000, 8000, 50)\n    ])\n})\n\n# Basic boxplot\ndf['salary'].plot(kind='box', title='Salary Distribution')\n\n# Boxplot by group\ndf.boxplot(column='salary', by='dept', figsize=(8,5))\n\n# Multiple columns\ndf2 = pd.DataFrame(np.random.randn(100, 4), columns=['A','B','C','D'])\ndf2.plot(kind='box', title='Column Distributions')"},
{name:"Customization and Subplots",theory:["subplots=True creates separate plot for each column in its own axes.","layout=(rows, cols) controls subplot arrangement; sharex/sharey for shared axes.","Use matplotlib directly for fine-grained control over pandas plots."],code:"import pandas as pd\nimport numpy as np\n\ndf = pd.DataFrame(np.random.randn(100, 4),\n    columns=['Revenue','Profit','Growth','Risk'])\n\n# Subplots for each column\ndf.plot(subplots=True, layout=(2,2), figsize=(12,8), title='Metrics')\n\n# Customized plot\nax = df['Revenue'].plot(\n    kind='line',\n    figsize=(10,5),\n    color='blue',\n    linewidth=2,\n    title='Revenue Trend'\n)\nax.set_xlabel('Day')\nax.set_ylabel('Revenue ($)')\nax.axhline(y=0, color='red', linestyle='--')"}

subtopics:[
{name:"Memory Optimization",theory:["Downcast numeric types: int64->int8/16/32, float64->float32 where possible.","Use category dtype for columns with low cardinality (few unique values).","memory_usage(deep=True) shows actual memory including object column content."],code:"import pandas as pd\nimport numpy as np\n\ndf = pd.DataFrame({\n    'id': range(100000),\n    'category': np.random.choice(['A','B','C','D'], 100000),\n    'value': np.random.randint(0, 100, 100000).astype('int64'),\n    'price': np.random.uniform(0, 50, 100000)\n})\n\nprint(f'Before: {df.memory_usage(deep=True).sum() / 1e6:.2f} MB')\n\n# Optimize\ndf['value'] = df['value'].astype('int8')         # int64->int8\ndf['price'] = df['price'].astype('float32')      # float64->float32\ndf['category'] = df['category'].astype('category')  # object->category\n\nprint(f'After: {df.memory_usage(deep=True).sum() / 1e6:.2f} MB')"},
{name:"eval() for Fast Expression Evaluation",theory:["pd.eval() evaluates string expressions using optimized backends (numexpr).","Avoids creating intermediate arrays - less memory usage for complex expressions.","df.eval('new_col = A + B * C') creates new columns efficiently in-place."],code:"import pandas as pd\nimport numpy as np\n\ndf = pd.DataFrame({\n    'A': np.random.randn(1000000),\n    'B': np.random.randn(1000000),\n    'C': np.random.randn(1000000)\n})\n\n# Standard (creates temp arrays)\n# result = df['A'] + df['B'] * df['C']\n\n# eval (memory efficient)\nresult = df.eval('A + B * C')\n\n# Create new column with eval\ndf.eval('D = A + B * C', inplace=True)\ndf.eval('E = (A > 0) & (B < 0)', inplace=True)\n\nprint(df.head())"},
{name:"query() for Fast Filtering",theory:["df.query() uses numexpr for fast boolean filtering on large DataFrames.","More readable than boolean indexing for complex conditions.","References external variables with @; supports in, not in, ==, and/or/not."],code:"import pandas as pd\nimport numpy as np\n\ndf = pd.DataFrame({\n    'A': np.random.randn(1000000),\n    'B': np.random.randn(1000000),\n    'cat': np.random.choice(['x','y','z'], 1000000)\n})\n\n# Standard boolean indexing\n# result = df[(df['A'] > 0) & (df['B'] < 1) & (df['cat'] == 'x')]\n\n# query (faster for large DataFrames)\nresult = df.query('A > 0 and B < 1 and cat == \"x\"')\n\n# With external variable\nthreshold = 0.5\nresult = df.query('A > @threshold')\n\nprint(f'Filtered: {len(result)} rows')"},
{name:"Categorical Dtype",theory:["Category dtype stores data as integer codes + mapping; huge memory savings for repeated strings.","ordered=True creates ordered categories for comparison operations (>,<).","Speeds up groupby, merge, and value_counts on categorical columns."],code:"import pandas as pd\nimport numpy as np\n\n# Create categorical\ndf = pd.DataFrame({\n    'size': pd.Categorical(['S','M','L','XL','M','S','L','S'],\n                           categories=['S','M','L','XL'], ordered=True),\n    'color': pd.Categorical(np.random.choice(['Red','Blue','Green'], 8))\n})\n\n# Ordered comparison works\nprint(df[df['size'] > 'M'])  # L, XL only\n\n# Memory savings demonstration\ns_object = pd.Series(['cat_' + str(i%100) for i in range(1000000)])\ns_category = s_object.astype('category')\n\nprint(f'Object: {s_object.memory_usage(deep=True)/1e6:.1f} MB')\nprint(f'Category: {s_category.memory_usage(deep=True)/1e6:.1f} MB')"},
{name:"Chunked Processing",theory:["Process large files in chunks when data doesn't fit in memory all at once.","read_csv(chunksize=N) returns iterator of DataFrames with N rows each.","Aggregate results from chunks manually (running totals, append filtered rows, etc.)."],code:"import pandas as pd\nimport numpy as np\n\n# Simulate chunked processing\ndef process_large_file(filepath, chunksize=50000):\n    total_sum = 0\n    row_count = 0\n    filtered_chunks = []\n    \n    for chunk in pd.read_csv(filepath, chunksize=chunksize):\n        # Aggregate stats\n        total_sum += chunk['value'].sum()\n        row_count += len(chunk)\n        \n        # Filter and collect\n        filtered = chunk[chunk['value'] > 100]\n        filtered_chunks.append(filtered)\n    \n    # Combine filtered results\n    result = pd.concat(filtered_chunks, ignore_index=True)\n    avg = total_sum / row_count\n    return result, avg\n\n# result, avg = process_large_file('huge_file.csv')"},
{name:"Vectorization Best Practices",theory:["Always prefer built-in vectorized operations over apply/iterrows/itertuples.","Use NumPy functions directly on pandas objects for maximum speed.","Profile with %timeit to compare approaches; avoid premature optimization."],code:"import pandas as pd\nimport numpy as np\n\ndf = pd.DataFrame({'A': np.random.randn(1000000), 'B': np.random.randn(1000000)})\n\n# SLOW approaches (avoid):\n# 1. iterrows() - extremely slow\n# 2. apply(axis=1) - slow\n# 3. list comprehension on rows - slow\n\n# FAST approaches:\n# 1. Vectorized arithmetic\ndf['C'] = df['A'] + df['B']\n\n# 2. NumPy where (faster than apply for conditionals)\ndf['D'] = np.where(df['A'] > 0, df['B'], -df['B'])\n\n# 3. Built-in string/datetime methods\n# df['col'].str.lower() instead of df['col'].apply(str.lower)\n\n# 4. NumPy functions\ndf['E'] = np.sqrt(df['A']**2 + df['B']**2)"}
],
examples:[
{title:"Memory Optimization Pipeline",desc:"Systematically reduce DataFrame memory usage.",code:"import pandas as pd\nimport numpy as np\n\ndef optimize_memory(df):\n    start_mem = df.memory_usage(deep=True).sum() / 1e6\n    \n    for col in df.columns:\n        col_type = df[col].dtype\n        \n        if col_type == 'object':\n            if df[col].nunique() / len(df) < 0.5:\n                df[col] = df[col].astype('category')\n        elif col_type in ['int64', 'int32']:\n            if df[col].min() >= 0 and df[col].max() < 256:\n                df[col] = df[col].astype('uint8')\n            elif df[col].min() >= -128 and df[col].max() < 128:\n                df[col] = df[col].astype('int8')\n            elif df[col].max() < 32768:\n                df[col] = df[col].astype('int16')\n        elif col_type == 'float64':\n            df[col] = df[col].astype('float32')\n    \n    end_mem = df.memory_usage(deep=True).sum() / 1e6\n    print(f'Memory: {start_mem:.1f}MB -> {end_mem:.1f}MB ({(1-end_mem/start_mem)*100:.0f}% reduction)')\n    return df\n\ndf = pd.DataFrame({'id': range(100000), 'cat': np.random.choice(['a','b','c'], 100000), 'val': np.random.randn(100000)})\ndf = optimize_memory(df)"},
{title:"Performance Comparison",desc:"Compare vectorized vs non-vectorized approaches.",code:"import pandas as pd\nimport numpy as np\nimport time\n\ndf = pd.DataFrame({\n    'A': np.random.randn(500000),\n    'B': np.random.randn(500000)\n})\n\n# Method 1: apply (slow)\nstart = time.time()\nresult1 = df.apply(lambda row: row['A'] + row['B'] if row['A'] > 0 else row['B'], axis=1)\nt1 = time.time() - start\n\n# Method 2: np.where (fast)\nstart = time.time()\nresult2 = np.where(df['A'] > 0, df['A'] + df['B'], df['B'])\nt2 = time.time() - start\n\nprint(f'apply: {t1:.3f}s')\nprint(f'np.where: {t2:.3f}s')\nprint(f'Speedup: {t1/t2:.0f}x')"},
{title:"Efficient GroupBy on Large Data",desc:"Optimize groupby operations for performance.",code:"import pandas as pd\nimport numpy as np\n\n# Large dataset with categorical optimization\nn = 1000000\ndf = pd.DataFrame({\n    'category': pd.Categorical(np.random.choice(['A','B','C','D','E'], n)),\n    'region': pd.Categorical(np.random.choice(['East','West','North','South'], n)),\n    'value': np.random.randn(n).astype('float32')\n})\n\nprint(f'Memory: {df.memory_usage(deep=True).sum()/1e6:.1f} MB')\n\n# Fast groupby on categorical columns\nresult = df.groupby(['category','region'])['value'].agg(['mean','std','count'])\nprint(result)"}
],

import numpy as np
def working_hours(start, end):
    total = pd.Timedelta(0)
    current = start
    while current < end:
        if current.weekday() < 5:  # Mon-Fri
            day_start = current.replace(hour=9, minute=0)
            day_end = current.replace(hour=17, minute=0)
            work_start = max(current, day_start)
            work_end = min(end, day_end)
            if work_start < work_end:
                total += work_end - work_start
        current += pd.Timedelta(days=1)
        current = current.replace(hour=0, minute=0)
    return total

function highlightPython(code) {
    code = code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    code = code.replace(/(#.*)/g,'<span style="color:#6a9955">$1</span>');
    code = code.replace(/("""[\s\S]*?"""|'''[\s\S]*?''')/g,'<span style="color:#ce9178">$1</span>');
    code = code.replace(/(&quot;.*?&quot;|&#39;.*?&#39;|"[^"]*"|'[^']*')/g,'<span style="color:#ce9178">$1</span>');
    code = code.replace(/\b(import|from|as|def|class|return|if|elif|else|for|while|in|not|and|or|is|try|except|finally|raise|with|yield|lambda|pass|break|continue|True|False|None|self|async|await|print|len|range|type|int|float|str|list|dict|set|tuple|bool)\b/g,'<span style="color:#569cd6">$1</span>');
    code = code.replace(/\b(\d+\.?\d*)\b/g,'<span style="color:#b5cea8">$1</span>');
    return code;
}

function renderRoadmap() {
    const container = document.getElementById('roadmapContainer');
    var html = '';
    topics.forEach(function(topic) {
        var done = 0;
        topic.practice.forEach(function(p, i) {
            if (progress[topic.id + '_' + i]) done++;
        });
        html += '<div class="node" onclick="showDetail(' + topic.id + ')">' +
            '<div class="node-number" style="border-color:' + topic.color + ';color:' + topic.color + '">' + topic.id + '</div>' +
            '<div class="node-card">' +
            '<div class="node-title" style="color:' + topic.color + '">' + topic.title + '</div>' +
            '<div class="node-chips">' + topic.chips.map(function(c){ return '<span class="chip">' + c + '</span>'; }).join('') + '</div>' +
            '<div class="node-progress">' + done + ' / ' + topic.practice.length + ' completed</div>' +
            '</div></div>';
    });
    container.innerHTML = html;
}

function showDetail(id) {
    currentTopic = topics.find(function(t){ return t.id === id; });
    if (!currentTopic) return;
    document.getElementById('roadmapPage').classList.remove('active');
    document.getElementById('detailPage').classList.add('active');
    document.getElementById('detailTitle').textContent = currentTopic.title;
    document.getElementById('detailSubtitle').textContent = currentTopic.chips.join(' • ');
    renderTheory();
    renderExamples();
    renderPractice();
    renderSolutions();
    switchTab('theory');
}

function showRoadmap() {
    document.getElementById('detailPage').classList.remove('active');
    document.getElementById('roadmapPage').classList.add('active');
    renderRoadmap();
    updateProgressBar();
}

function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(function(t,i){
        t.classList.toggle('active', ['theory','examples','practice','solutions'][i] === tab);
    });
    document.querySelectorAll('.tab-content').forEach(function(tc){
        tc.classList.remove('active');
    });
    document.getElementById(tab + 'Content').classList.add('active');
}

function renderTheory() {
    var html = '';
    currentTopic.subtopics.forEach(function(st) {
        html += '<div class="theory-section"><div class="theory-title">' + st.name + '</div>';
        st.theory.forEach(function(point) {
            html += '<div class="theory-point">' + point + '</div>';
        });
        html += '<pre class="code-block"><code>' + highlightPython(st.code) + '</code></pre></div>';
    });
    document.getElementById('theoryContent').innerHTML = html;
}

function renderExamples() {
    var html = '';
    currentTopic.examples.forEach(function(ex) {
        html += '<div class="example-card"><div class="example-title">' + ex.title + '</div>' +
            '<div class="example-desc">' + ex.desc + '</div>' +
            '<pre class="code-block"><code>' + highlightPython(ex.code) + '</code></pre></div>';
    });
    document.getElementById('examplesContent').innerHTML = html;
}

function renderPractice() {
    var html = '';
    currentTopic.practice.forEach(function(p, i) {
        var key = currentTopic.id + '_' + i;
        var done = progress[key] ? ' done' : '';
        var checked = progress[key] ? ' checked' : '';
        var diffClass = p.d === 'E' ? 'easy' : p.d === 'M' ? 'medium' : 'hard';
        var diffLabel = p.d === 'E' ? 'Easy' : p.d === 'M' ? 'Medium' : 'Hard';
        html += '<div class="practice-item' + done + '">' +
            '<input type="checkbox"' + checked + ' onchange="togglePractice(' + currentTopic.id + ',' + i + ')">' +
            '<span class="practice-text">' + p.q + '</span>' +
            '<span class="difficulty ' + diffClass + '">' + diffLabel + '</span></div>';
    });
    document.getElementById('practiceContent').innerHTML = html;
}

function renderSolutions() {
    var container = document.getElementById('solutionsContent');
    if (!currentTopic) return;
    var sols = solutionData[currentTopic.id] || [];
    var html = '';
    currentTopic.practice.forEach(function(p, i) {
        var sol = sols[i] || 'Solution coming soon...';
        var highlighted = highlightPython(sol);
        html += '<div class="solution-item">' +
            '<div class="solution-header" onclick="toggleSolution(' + i + ')">' +
            '<span class="solution-num">#' + (i+1) + '</span>' +
            '<span class="solution-q">' + p.q + '</span>' +
            '<button class="solution-toggle" id="btn_' + i + '">Show Solution</button>' +
            '</div>' +
            '<div class="solution-body" id="sol_' + i + '">' +
            '<pre class="code-block"><code>' + highlighted + '</code></pre>' +
            '</div></div>';
    });
    container.innerHTML = html;
}

function toggleSolution(i) {
    var body = document.getElementById('sol_' + i);
    var btn = document.getElementById('btn_' + i);
    body.classList.toggle('open');
    btn.textContent = body.classList.contains('open') ? 'Hide Solution' : 'Show Solution';
}

function togglePractice(topicId, index) {
    var key = topicId + '_' + index;
    progress[key] = !progress[key];
    if (!progress[key]) delete progress[key];
    localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
    updateProgressBar();
    renderPractice();
}

function updateProgressBar() {
    var total = 0;
    var done = 0;
    topics.forEach(function(t) {
        t.practice.forEach(function(p, i) {
            total++;
            if (progress[t.id + '_' + i]) done++;
        });
    });
    document.getElementById('progressText').textContent = done + ' / ' + total;
    document.getElementById('progressFill').style.width = (done / total * 100) + '%';
}

// Initialize
renderRoadmap();
updateProgressBar();
