<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pandas Learning Roadmap</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#080c14;--card:#141d2e;--border:#1e2d45;--text:#dde4f0;--text-dim:#8892a4;--green:#4ade80;--cyan:#22d3ee;--purple:#a78bfa;--gradient:linear-gradient(135deg,#4ade80,#22d3ee,#a78bfa)}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
code,pre,.code{font-family:'JetBrains Mono',monospace}
.header{position:sticky;top:0;z-index:1000;background:rgba(8,12,20,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:12px 24px}
.header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:1.4rem;font-weight:700;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.progress-container{flex:1;max-width:300px;margin-left:24px}
.progress-label{font-size:0.7rem;color:var(--text-dim);margin-bottom:4px;text-align:right}
.progress-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:var(--gradient);border-radius:3px;transition:width 0.5s ease}
</style>
</head>
<body>
<header class="header">
<div class="header-inner">
<div class="logo">Pandas Roadmap</div>
<div class="progress-container">
<div class="progress-label"><span id="progressText">0 / 300</span> completed</div>
<div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
</div>
</div>
</header>
<div class="page active" id="roadmapPage">
<div class="roadmap" id="roadmapContainer"></div>
</div>
<div class="page" id="detailPage">
<button class="back-btn" onclick="showRoadmap()">&#8592; Back to Roadmap</button>
<div class="detail-header">
<h1 class="detail-title" id="detailTitle"></h1>
<p class="detail-subtitle" id="detailSubtitle"></p>
</div>
<div class="tabs">
<div class="tab active" onclick="switchTab('theory')">Theory</div>
<div class="tab" onclick="switchTab('examples')">Examples</div>
<div class="tab" onclick="switchTab('practice')">Practice</div>
<div class="tab" onclick="switchTab('solutions')">Solutions</div>
</div>
<div class="tab-content active" id="theoryContent"></div>
<div class="tab-content" id="examplesContent"></div>
<div class="tab-content" id="practiceContent"></div>
<div class="tab-content" id="solutionsContent"></div>
</div>

<style>
.page{display:none;padding:40px 24px 80px;max-width:900px;margin:0 auto;animation:fadeIn 0.3s ease}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.roadmap{position:relative;padding-left:60px}
.roadmap::before{content:'';position:absolute;left:28px;top:0;bottom:0;width:2px;background:linear-gradient(to bottom,var(--green),var(--cyan),var(--purple));opacity:0.4}
.node{position:relative;margin-bottom:24px;cursor:pointer;transition:transform 0.2s ease}
.node:hover{transform:translateX(4px)}
.node-number{position:absolute;left:-48px;top:16px;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.8rem;border:2px solid;background:var(--bg)}
.node-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px 24px;transition:border-color 0.2s,box-shadow 0.2s}
.node:hover .node-card{border-color:var(--cyan);box-shadow:0 4px 20px rgba(34,211,238,0.1)}
.node-title{font-size:1.1rem;font-weight:600;margin-bottom:8px}
.node-chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{font-size:0.65rem;padding:3px 8px;border-radius:4px;background:rgba(255,255,255,0.05);border:1px solid var(--border);color:var(--text-dim)}
.node-progress{font-size:0.7rem;color:var(--text-dim);margin-top:8px}
.back-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);cursor:pointer;font-family:'Sora',sans-serif;font-size:0.85rem;margin-bottom:24px;transition:border-color 0.2s}
.back-btn:hover{border-color:var(--cyan)}
.detail-header{margin-bottom:24px}
.detail-title{font-size:1.8rem;font-weight:700;margin-bottom:8px}
.detail-subtitle{font-size:0.85rem;color:var(--text-dim)}
.tabs{display:flex;gap:4px;margin-bottom:24px;background:var(--card);border-radius:10px;padding:4px;border:1px solid var(--border)}
.tab{flex:1;padding:10px 16px;text-align:center;border-radius:8px;cursor:pointer;font-size:0.85rem;font-weight:500;color:var(--text-dim);transition:all 0.2s}
.tab.active{background:var(--border);color:var(--text)}
.tab:hover:not(.active){color:var(--text)}
.tab-content{display:none;animation:fadeIn 0.3s ease}
.tab-content.active{display:block}
.theory-section{margin-bottom:24px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px}
.theory-title{font-size:1rem;font-weight:600;margin-bottom:12px;color:var(--cyan)}
.theory-point{font-size:0.85rem;color:var(--text-dim);margin-bottom:8px;padding-left:16px;position:relative;line-height:1.6}
.theory-point::before{content:'>';position:absolute;left:0;color:var(--green)}
pre.code-block{background:rgba(0,0,0,0.4);border:1px solid var(--border);border-radius:8px;padding:16px;margin-top:12px;overflow-x:auto;font-size:0.8rem;line-height:1.6}
.example-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:16px}
.example-title{font-size:0.9rem;font-weight:600;margin-bottom:8px;color:var(--purple)}
.example-desc{font-size:0.82rem;color:var(--text-dim);margin-bottom:12px}
.practice-item{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;transition:border-color 0.2s}
.practice-item:hover{border-color:var(--cyan)}
.practice-item input[type="checkbox"]{width:18px;height:18px;margin-top:2px;accent-color:var(--green);cursor:pointer}
.practice-item.done{opacity:0.6;border-color:var(--green)}
.practice-text{flex:1;font-size:0.82rem;line-height:1.5}
.difficulty{font-size:0.65rem;padding:2px 8px;border-radius:4px;font-weight:600;white-space:nowrap}
.difficulty.easy{background:rgba(74,222,128,0.15);color:#4ade80}
.difficulty.medium{background:rgba(251,191,36,0.15);color:#fbbf24}
.difficulty.hard{background:rgba(244,114,182,0.15);color:#f472b6}
.solution-item{background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:12px;overflow:hidden}
.solution-header{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.solution-header:hover{background:rgba(34,211,238,0.05)}
.solution-num{font-size:0.75rem;color:var(--text-dim);font-family:'JetBrains Mono',monospace;margin-right:10px}
.solution-q{font-size:0.82rem;flex:1}
.solution-toggle{padding:4px 12px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--cyan);font-size:0.72rem;cursor:pointer;font-family:'Sora',sans-serif;transition:all 0.2s}
.solution-toggle:hover{background:rgba(34,211,238,0.1);border-color:var(--cyan)}
.solution-body{display:none;padding:0 16px 16px;border-top:1px solid var(--border)}
.solution-body.open{display:block}
@media(max-width:640px){.roadmap{padding-left:40px}.roadmap::before{left:16px}.node-number{left:-32px;width:26px;height:26px;font-size:0.7rem}.header-inner{flex-wrap:wrap;gap:8px}.progress-container{max-width:100%;margin-left:0}}
</style>

<script>
const STORAGE_KEY = 'pandas_roadmap_progress';
let progress = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
let currentTopic = null;

const topics = [
{id:1,title:"Pandas Basics",color:"#38bdf8",chips:["Series","DataFrame","Index","dtypes","info","describe"],
subtopics:[
{name:"Series Creation & Operations",theory:["A Series is a one-dimensional labeled array capable of holding any data type (int, str, float, etc.).","Series has both a data array and an index array; default index is 0, 1, 2, ... n-1.","Series supports vectorized operations - arithmetic is applied element-wise automatically."],code:"import pandas as pd\nimport numpy as np\n\n# Creating Series\ns1 = pd.Series([10, 20, 30, 40])\ns2 = pd.Series([1, 2, 3], index=['a', 'b', 'c'])\ns3 = pd.Series({'x': 100, 'y': 200, 'z': 300})\n\nprint(s1)\nprint(s2['b'])        # 2\nprint(s3.values)      # array([100, 200, 300])\nprint(s1 * 2)         # Vectorized: [20, 40, 60, 80]"},
{name:"DataFrame Creation",theory:["A DataFrame is a 2D labeled data structure with columns of potentially different types.","DataFrames can be created from dicts, lists of dicts, NumPy arrays, or other DataFrames.","Each column in a DataFrame is a Series; columns can have different dtypes."],code:"import pandas as pd\n\n# From dictionary\ndf = pd.DataFrame({\n    'Name': ['Alice', 'Bob', 'Charlie'],\n    'Age': [25, 30, 35],\n    'City': ['NYC', 'London', 'Paris']\n})\n\n# From list of dicts\ndata = [{'a': 1, 'b': 2}, {'a': 3, 'b': 4, 'c': 5}]\ndf2 = pd.DataFrame(data)\n\nprint(df)\nprint(df.shape)       # (3, 3)\nprint(df.columns)     # Index(['Name', 'Age', 'City'])"},
{name:"Index Objects",theory:["Index objects are immutable arrays that hold axis labels and metadata for DataFrames/Series.","Common types: RangeIndex (default), Int64Index, DatetimeIndex, MultiIndex.","You can set any column as index using set_index() and reset with reset_index()."],code:"import pandas as pd\n\ndf = pd.DataFrame({'A': [1,2,3], 'B': [4,5,6]}, index=['x','y','z'])\nprint(df.index)       # Index(['x', 'y', 'z'])\n\n# Set column as index\ndf2 = pd.DataFrame({'id': [101,102,103], 'val': [10,20,30]})\ndf2 = df2.set_index('id')\nprint(df2.loc[101])   # val    10\n\n# Reset index\ndf3 = df2.reset_index()\nprint(df3.columns)    # Index(['id', 'val'])"},
{name:"Data Types (dtypes)",theory:["Common pandas dtypes: int64, float64, object (strings), bool, datetime64, category.","Use df.dtypes to check column types; astype() to convert between types.","Category dtype saves memory for columns with few unique values (like status, gender)."],code:"import pandas as pd\n\ndf = pd.DataFrame({\n    'name': ['Alice', 'Bob'],\n    'age': [25, 30],\n    'score': [95.5, 88.0],\n    'active': [True, False]\n})\n\nprint(df.dtypes)\n# name       object\n# age         int64\n# score     float64\n# active       bool\n\n# Convert types\ndf['age'] = df['age'].astype(float)\ndf['name'] = df['name'].astype('category')"},
{name:"info() and describe()",theory:["df.info() shows column names, non-null counts, dtypes, and memory usage.","df.describe() provides statistical summary: count, mean, std, min, 25%, 50%, 75%, max.","Use describe(include='all') to include non-numeric columns in the summary."],code:"import pandas as pd\nimport numpy as np\n\ndf = pd.DataFrame({\n    'name': ['Alice','Bob','Charlie','Diana'],\n    'age': [25, 30, np.nan, 28],\n    'salary': [50000, 60000, 70000, 55000]\n})\n\ndf.info()\n# Shows: 4 entries, dtypes, non-null counts\n\nprint(df.describe())\n# count, mean, std, min, 25%, 50%, 75%, max\n\nprint(df.describe(include='all'))\n# Includes 'name' column stats: count, unique, top, freq"},
{name:"Basic DataFrame Operations",theory:["head(n)/tail(n) show first/last n rows; sample(n) returns random rows.","shape gives (rows, cols); len(df) gives row count; df.columns lists column names.","memory_usage() shows memory consumption per column in bytes."],code:"import pandas as pd\n\ndf = pd.DataFrame({'A': range(100), 'B': range(100,200)})\n\nprint(df.head())          # First 5 rows\nprint(df.tail(3))         # Last 3 rows\nprint(df.sample(5))       # 5 random rows\nprint(df.shape)           # (100, 2)\nprint(len(df))            # 100\nprint(df.columns.tolist()) # ['A', 'B']\nprint(df.memory_usage(deep=True))"}
],
examples:[
{title:"Explore a Dataset",desc:"Load and explore basic properties of a DataFrame.",code:"import pandas as pd\nimport numpy as np\n\n# Create sample dataset\ndf = pd.DataFrame({\n    'product': ['Widget','Gadget','Widget','Gizmo','Gadget'],\n    'price': [9.99, 24.99, 9.99, 49.99, 24.99],\n    'quantity': [100, 50, 75, 30, 60],\n    'in_stock': [True, True, True, False, True]\n})\n\nprint('Shape:', df.shape)\nprint('\\nDtypes:')\nprint(df.dtypes)\nprint('\\nDescribe:')\nprint(df.describe())\nprint('\\nInfo:')\ndf.info()"},
{title:"Series Arithmetic",desc:"Perform vectorized operations on Series objects.",code:"import pandas as pd\n\nprices = pd.Series([10.0, 20.0, 30.0, 40.0], index=['A','B','C','D'])\nquantities = pd.Series([5, 3, 8, 2], index=['A','B','C','D'])\n\n# Vectorized operations\nrevenue = prices * quantities\nprint('Revenue:')\nprint(revenue)\n\n# Aggregations\nprint(f'Total revenue: ${revenue.sum():.2f}')\nprint(f'Average price: ${prices.mean():.2f}')\nprint(f'Max quantity: {quantities.max()}')"},
{title:"DataFrame from Multiple Sources",desc:"Create DataFrames from different data structures.",code:"import pandas as pd\nimport numpy as np\n\n# From NumPy array\narr = np.random.randint(1, 100, size=(5, 3))\ndf1 = pd.DataFrame(arr, columns=['X', 'Y', 'Z'])\n\n# From list of tuples\ndata = [('Alice', 85), ('Bob', 92), ('Charlie', 78)]\ndf2 = pd.DataFrame(data, columns=['Name', 'Score'])\n\n# From dict with Series\ndf3 = pd.DataFrame({\n    'A': pd.Series([1, 2, 3]),\n    'B': pd.Series([4, 5, 6, 7])  # NaN for missing\n})\n\nprint(df1)\nprint(df2)\nprint(df3)"}
],
practice:[
{q:"Create a Series from a list of 5 numbers and print its values and index.",d:"E"},
{q:"Create a Series with custom string index labels and access elements by label.",d:"E"},
{q:"Create a DataFrame from a dictionary with 3 columns and 4 rows. Print shape and dtypes.",d:"E"},
{q:"Use head(), tail(), and sample() on a DataFrame with 50 rows.",d:"E"},
{q:"Call info() and describe() on a DataFrame and interpret the output.",d:"E"},
{q:"Create a Series and perform element-wise addition, subtraction, and multiplication.",d:"E"},
{q:"Convert a column from int to float using astype() and verify with dtypes.",d:"E"},
{q:"Create a DataFrame from a list of dictionaries where some keys are missing. Observe NaN values.",d:"M"},
{q:"Set a column as the DataFrame index using set_index() and access rows by the new index.",d:"M"},
{q:"Create a DataFrame with 1 million rows and compare memory usage of object vs category dtype.",d:"M"},
{q:"Use reset_index() to convert the index back to a regular column.",d:"M"},
{q:"Create two Series with partially overlapping indexes and add them. Explain NaN results.",d:"M"},
{q:"Build a DataFrame from a NumPy 2D array with custom column names and a DatetimeIndex.",d:"M"},
{q:"Use describe(include='all') and describe(percentiles=[.1,.9]) for custom statistics.",d:"M"},
{q:"Compare performance of creating a DataFrame from dict vs from records (list of tuples).",d:"M"},
{q:"Create a DataFrame with mixed dtypes (int, float, str, bool, datetime) and inspect memory_usage(deep=True).",d:"H"},
{q:"Implement a function that detects and reports dtype inconsistencies (e.g., numeric stored as object).",d:"H"},
{q:"Create a MultiIndex DataFrame from scratch using pd.MultiIndex.from_tuples().",d:"H"},
{q:"Build a function that generates a summary report: shape, dtypes, nulls, memory, unique counts per column.",d:"H"},
{q:"Create a custom Index subclass or use pd.CategoricalIndex for a large repeated-label dataset.",d:"H"}
]},

{id:2,title:"Data Loading",color:"#34d399",chips:["read_csv","read_excel","read_json","to_csv"],
subtopics:[
{name:"read_csv() Basics",theory:["pd.read_csv() reads comma-separated files into DataFrames; most common data loading method.","Key parameters: filepath, sep/delimiter, header, names, index_col, usecols.","dtype parameter lets you specify column types upfront for efficiency and correctness."],code:"import pandas as pd\n\n# Basic read\ndf = pd.read_csv('data.csv')\n\n# With parameters\ndf = pd.read_csv('data.csv',\n    sep=',',              # delimiter\n    header=0,             # row number for header\n    index_col='id',       # set index column\n    usecols=['id','name','value'],  # read only these\n    dtype={'id': int, 'value': float},\n    na_values=['N/A','missing']  # treat as NaN\n)\n\nprint(df.head())"},
{name:"read_csv() Advanced Options",theory:["nrows limits rows read; skiprows skips specified rows; chunksize enables chunked reading.","parse_dates converts columns to datetime; encoding handles different file encodings.","compression parameter handles gzip, bz2, zip files transparently."],code:"import pandas as pd\n\n# Read first 1000 rows\ndf = pd.read_csv('large_file.csv', nrows=1000)\n\n# Skip rows and parse dates\ndf = pd.read_csv('data.csv',\n    skiprows=[1, 3],          # skip specific rows\n    parse_dates=['date_col'],  # auto-parse dates\n    encoding='utf-8'\n)\n\n# Chunked reading for large files\nchunks = pd.read_csv('huge.csv', chunksize=10000)\nfor chunk in chunks:\n    process(chunk)  # process each chunk\n\n# Read compressed file\ndf = pd.read_csv('data.csv.gz', compression='gzip')"},
{name:"read_excel() and read_json()",theory:["read_excel() reads .xlsx/.xls files; requires openpyxl or xlrd engine installed.","sheet_name parameter selects which sheet(s) to read; None reads all sheets as dict.","read_json() parses JSON; orient parameter specifies the JSON structure format."],code:"import pandas as pd\n\n# Read Excel\ndf = pd.read_excel('report.xlsx',\n    sheet_name='Sheet1',\n    header=0,\n    usecols='A:D'  # Excel column range\n)\n\n# Read all sheets\nall_sheets = pd.read_excel('report.xlsx', sheet_name=None)\nfor name, sheet_df in all_sheets.items():\n    print(f'{name}: {sheet_df.shape}')\n\n# Read JSON\ndf = pd.read_json('data.json')\ndf = pd.read_json('data.json', orient='records')\n# orient: 'split','records','index','columns','values'"},
{name:"Exporting Data (to_csv, to_excel, to_json)",theory:["to_csv() writes DataFrame to CSV; index=False prevents writing the index column.","to_excel() requires openpyxl; can write multiple DataFrames to different sheets.","to_json() exports as JSON with configurable orient for different consumers."],code:"import pandas as pd\n\ndf = pd.DataFrame({'A': [1,2,3], 'B': ['x','y','z']})\n\n# Export to CSV\ndf.to_csv('output.csv', index=False)\ndf.to_csv('output.tsv', sep='\\t', index=False)\n\n# Export to Excel\nwith pd.ExcelWriter('output.xlsx') as writer:\n    df.to_excel(writer, sheet_name='Data', index=False)\n\n# Export to JSON\ndf.to_json('output.json', orient='records', indent=2)\ndf.to_json('output.json', orient='split')"},
{name:"Reading from URLs and Databases",theory:["read_csv() accepts URLs directly - can read from HTTP, FTP, or S3 paths.","read_sql() reads from SQL databases using SQLAlchemy connection or sqlite3 connection.","read_html() scrapes HTML tables from web pages into a list of DataFrames."],code:"import pandas as pd\n\n# Read from URL\nurl = 'https://example.com/data.csv'\ndf = pd.read_csv(url)\n\n# Read from SQL database\nimport sqlite3\nconn = sqlite3.connect('database.db')\ndf = pd.read_sql('SELECT * FROM users', conn)\ndf = pd.read_sql_table('users', conn)\nconn.close()\n\n# Read HTML tables\ntables = pd.read_html('https://example.com/page.html')\ndf = tables[0]  # First table found"},
{name:"Handling Large Files",theory:["Use chunksize to read large CSVs in manageable pieces for memory efficiency.","dtype specification and usecols reduce memory footprint during loading.","Consider using pyarrow or fastparquet engines for Parquet format (fast + compressed)."],code:"import pandas as pd\n\n# Chunked processing\nresult = []\nfor chunk in pd.read_csv('big.csv', chunksize=50000):\n    filtered = chunk[chunk['value'] > 100]\n    result.append(filtered)\ndf = pd.concat(result)\n\n# Parquet format (fast, compressed)\ndf.to_parquet('data.parquet', engine='pyarrow')\ndf = pd.read_parquet('data.parquet')\n\n# Feather format (fast read/write)\ndf.to_feather('data.feather')\ndf = pd.read_feather('data.feather')"}
],
examples:[
{title:"Load and Clean CSV",desc:"Read a CSV file with common issues and clean it.",code:"import pandas as pd\nimport numpy as np\n\n# Simulate reading with issues\ndf = pd.read_csv('sales.csv',\n    na_values=['N/A', 'n/a', ''],\n    parse_dates=['date'],\n    dtype={'product_id': str, 'quantity': 'Int64'}\n)\n\nprint(f'Loaded {len(df)} rows')\nprint(f'Null counts:\\n{df.isnull().sum()}')\nprint(f'Dtypes:\\n{df.dtypes}')"},
{title:"Multi-format Pipeline",desc:"Read from multiple formats and combine.",code:"import pandas as pd\n\n# Read from different sources\ncsv_df = pd.read_csv('users.csv')\njson_df = pd.read_json('orders.json', orient='records')\n\n# Merge and export\nmerged = csv_df.merge(json_df, on='user_id')\nmerged.to_csv('combined.csv', index=False)\nmerged.to_parquet('combined.parquet')\n\nprint(f'CSV rows: {len(csv_df)}')\nprint(f'JSON rows: {len(json_df)}')\nprint(f'Merged rows: {len(merged)}')"},
{title:"Chunked Large File Processing",desc:"Process a large file in chunks to compute aggregates.",code:"import pandas as pd\n\ntotal_rows = 0\nrevenue_sum = 0\n\nfor chunk in pd.read_csv('transactions.csv', chunksize=100000):\n    total_rows += len(chunk)\n    revenue_sum += chunk['amount'].sum()\n\nprint(f'Total rows: {total_rows:,}')\nprint(f'Total revenue: ${revenue_sum:,.2f}')\nprint(f'Average per transaction: ${revenue_sum/total_rows:.2f}')"}
],
practice:[
{q:"Read a CSV file into a DataFrame and print the first 5 rows.",d:"E"},
{q:"Read a CSV with a custom delimiter (tab-separated) using sep parameter.",d:"E"},
{q:"Use usecols to read only specific columns from a CSV file.",d:"E"},
{q:"Export a DataFrame to CSV without the index column.",d:"E"},
{q:"Read a JSON file with orient='records' into a DataFrame.",d:"E"},
{q:"Use nrows parameter to read only the first 100 rows of a large CSV.",d:"E"},
{q:"Use na_values parameter to specify custom missing value indicators when reading CSV.",d:"E"},
{q:"Read a CSV with parse_dates to automatically convert date columns to datetime.",d:"M"},
{q:"Read an Excel file with multiple sheets and combine them into one DataFrame.",d:"M"},
{q:"Write a DataFrame to Excel with multiple sheets using ExcelWriter.",d:"M"},
{q:"Read a CSV in chunks of 10000 rows and compute the mean of a numeric column.",d:"M"},
{q:"Read a compressed CSV file (gzip) and compare loading time vs uncompressed.",d:"M"},
{q:"Use dtype parameter to optimize memory when reading a CSV with known column types.",d:"M"},
{q:"Read data from a URL (public CSV) directly into a DataFrame.",d:"M"},

{id:3,title:"Indexing & Selection",color:"#a78bfa",chips:["loc","iloc","Boolean","query","MultiIndex"],
subtopics:[
{name:"loc[] - Label-based Selection",theory:["loc[] selects data by label (row/column names); both endpoints are INCLUSIVE.","Syntax: df.loc[row_labels, col_labels] - can use single label, list, or slice.","loc raises KeyError if a label doesn't exist in the index."],code:"import pandas as pd\n\ndf = pd.DataFrame({\n    'name': ['Alice','Bob','Charlie','Diana'],\n    'age': [25, 30, 35, 28],\n    'city': ['NYC','LA','NYC','SF']\n}, index=['a','b','c','d'])\n\n# Single row\nprint(df.loc['a'])           # Series for row 'a'\n\n# Multiple rows and columns\nprint(df.loc['a':'c', 'name':'age'])  # inclusive slice\n\n# List of specific labels\nprint(df.loc[['a','c'], ['name','city']])"},
{name:"iloc[] - Position-based Selection",theory:["iloc[] selects data by integer position (0-indexed); end position is EXCLUSIVE.","Works like standard Python slicing - df.iloc[0:3] gives rows 0, 1, 2.","Use iloc when you need positional access regardless of index labels."],code:"import pandas as pd\n\ndf = pd.DataFrame({\n    'A': [10, 20, 30, 40, 50],\n    'B': [1, 2, 3, 4, 5],\n    'C': ['a','b','c','d','e']\n})\n\n# Single element\nprint(df.iloc[0, 1])        # 1 (row 0, col 1)\n\n# Slicing (exclusive end)\nprint(df.iloc[1:4])         # rows 1, 2, 3\nprint(df.iloc[:, 0:2])      # all rows, cols 0, 1\n\n# Fancy indexing\nprint(df.iloc[[0, 2, 4], [0, 2]])  # rows 0,2,4 cols 0,2"},
{name:"Boolean Indexing (Filtering)",theory:["Boolean indexing uses a condition that returns True/False for each row to filter.","Multiple conditions use & (and), | (or), ~ (not) with parentheses around each.","Conditions are vectorized - applied to entire column at once, very efficient."],code:"import pandas as pd\n\ndf = pd.DataFrame({\n    'name': ['Alice','Bob','Charlie','Diana','Eve'],\n    'age': [25, 30, 35, 28, 22],\n    'salary': [50000, 60000, 70000, 55000, 45000]\n})\n\n# Single condition\nyoung = df[df['age'] < 30]\nprint(young)\n\n# Multiple conditions (use & | ~)\nresult = df[(df['age'] > 25) & (df['salary'] >= 55000)]\nprint(result)\n\n# Using isin()\ncities_df = df[df['name'].isin(['Alice','Charlie'])]"},
{name:"query() Method",theory:["query() filters rows using a string expression - cleaner syntax for complex filters.","Variables from the environment can be referenced with @ prefix.","Supports comparison operators, in/not in, and boolean operators (and/or/not)."],code:"import pandas as pd\n\ndf = pd.DataFrame({\n    'name': ['Alice','Bob','Charlie','Diana'],\n    'age': [25, 30, 35, 28],\n    'dept': ['Sales','IT','IT','Sales']\n})\n\n# Basic query\nresult = df.query('age > 28')\nprint(result)\n\n# Multiple conditions\nresult = df.query('age > 25 and dept == \"IT\"')\n\n# Using external variables with @\nmin_age = 27\nresult = df.query('age >= @min_age')\n\n# in operator\nresult = df.query('dept in [\"IT\", \"HR\"]')"},
{name:"Setting and Modifying Values",theory:["Use loc/iloc to set values: df.loc[condition, 'col'] = new_value for conditional assignment.","Avoid chained indexing (df[col][row]) as it may not modify the original DataFrame.","where() keeps values where condition is True, replaces others; mask() does the opposite."],code:"import pandas as pd\nimport numpy as np\n\ndf = pd.DataFrame({'A': [1,2,3,4,5], 'B': [10,20,30,40,50]})\n\n# Set single value\ndf.loc[0, 'A'] = 100\n\n# Conditional assignment\ndf.loc[df['A'] > 3, 'B'] = 999\n\n# Using where (keep where True, else NaN)\ndf['C'] = df['A'].where(df['A'] > 2, other=0)\n\n# Using np.where for if/else\ndf['label'] = np.where(df['A'] > 3, 'high', 'low')\nprint(df)"},
{name:"MultiIndex Selection",theory:["MultiIndex (hierarchical index) allows multiple levels of row/column labels.","Use xs() for cross-section selection at a particular level.","loc with tuples selects specific MultiIndex combinations."],code:"import pandas as pd\n\n# Create MultiIndex DataFrame\narrays = [['A','A','B','B'], ['one','two','one','two']]\nindex = pd.MultiIndex.from_arrays(arrays, names=['letter','number'])\ndf = pd.DataFrame({'val': [10,20,30,40]}, index=index)\n\nprint(df)\n# Select level\nprint(df.loc['A'])           # All rows where letter='A'\nprint(df.loc[('A','one')])   # Specific combination\n\n# Cross-section\nprint(df.xs('one', level='number'))  # All 'one' across letters"}
],
examples:[
{title:"Complex Filtering",desc:"Apply multiple filter criteria to a sales dataset.",code:"import pandas as pd\nimport numpy as np\n\ndf = pd.DataFrame({\n    'product': ['A','B','A','C','B','A','C','B'],\n    'region': ['East','West','East','East','East','West','West','East'],\n    'sales': [100, 200, 150, 300, 250, 175, 350, 225],\n    'quarter': ['Q1','Q1','Q2','Q2','Q3','Q3','Q4','Q4']\n})\n\n# Complex filter\nhigh_east = df.query('sales > 150 and region == \"East\"')\nprint('High sales in East:')\nprint(high_east)\n\n# Conditional column creation\ndf['tier'] = np.where(df['sales'] >= 250, 'Premium', 'Standard')\nprint(df)"},
{title:"Dynamic Column Selection",desc:"Select columns based on patterns and conditions.",code:"import pandas as pd\nimport numpy as np\n\ndf = pd.DataFrame(np.random.randn(5, 8),\n    columns=['sales_q1','sales_q2','cost_q1','cost_q2',\n             'profit_q1','profit_q2','tax_q1','tax_q2'])\n\n# Select columns by pattern\nsales_cols = df.filter(like='sales')\nq1_cols = df.filter(regex='_q1$')\n\nprint('Sales columns:', sales_cols.columns.tolist())\nprint('Q1 columns:', q1_cols.columns.tolist())\n\n# Select numeric columns only\nnumeric = df.select_dtypes(include=[np.number])\nprint(f'Numeric columns: {len(numeric.columns)}')"},
{title:"MultiIndex Operations",desc:"Work with hierarchical indexing for grouped data.",code:"import pandas as pd\n\n# Create MultiIndex from product\ndf = pd.DataFrame({\n    'sales': [100,200,150,250,175,300],\n    'cost': [60,120,90,150,100,180]\n}, index=pd.MultiIndex.from_product(\n    [['Store1','Store2','Store3'], ['Online','Retail']],\n    names=['store','channel']\n))\n\nprint(df)\nprint('\\nStore1 only:')\nprint(df.loc['Store1'])\nprint('\\nOnline channel across stores:')\nprint(df.xs('Online', level='channel'))"}
],

{id:4,title:"Data Cleaning",color:"#fbbf24",chips:["dropna","fillna","duplicated","astype","rename"],
subtopics:[
{name:"Handling Missing Values (isnull/notnull)",theory:["isnull()/isna() returns True where values are NaN/None; notnull()/notna() is the inverse.","df.isnull().sum() counts nulls per column; df.isnull().sum().sum() gives total nulls.","Missing values affect calculations - most aggregations skip NaN by default."],code:"import pandas as pd\nimport numpy as np\n\ndf = pd.DataFrame({\n    'A': [1, np.nan, 3, np.nan, 5],\n    'B': [np.nan, 2, 3, 4, np.nan],\n    'C': ['x', 'y', np.nan, 'w', 'v']\n})\n\n# Check missing values\nprint(df.isnull())\nprint(df.isnull().sum())         # per column\nprint(df.isnull().sum().sum())   # total\n\n# Filter rows with any null\nrows_with_null = df[df.isnull().any(axis=1)]\nprint(rows_with_null)"},
{name:"dropna() - Removing Missing Data",theory:["dropna() removes rows (axis=0) or columns (axis=1) containing NaN values.","how='any' drops if ANY value is null; how='all' drops only if ALL values are null.","thresh=n keeps rows with at least n non-null values; subset limits check to specific columns."],code:"import pandas as pd\nimport numpy as np\n\ndf = pd.DataFrame({\n    'A': [1, np.nan, 3, 4],\n    'B': [np.nan, np.nan, 3, 4],\n    'C': [1, 2, 3, 4]\n})\n\n# Drop rows with any NaN\nprint(df.dropna())             # Only row index 2, 3\n\n# Drop only if ALL values null\nprint(df.dropna(how='all'))    # Drops nothing here\n\n# Threshold: keep if at least 2 non-null\nprint(df.dropna(thresh=2))\n\n# Only check specific columns\nprint(df.dropna(subset=['A']))  # Drop where A is NaN"},
{name:"fillna() - Imputing Missing Data",theory:["fillna(value) replaces NaN with a specified value (scalar, dict, Series, or DataFrame).","method='ffill' propagates last valid value forward; 'bfill' propagates backward.","Can fill differently per column using a dictionary of column:value pairs."],code:"import pandas as pd\nimport numpy as np\n\ndf = pd.DataFrame({\n    'sales': [100, np.nan, 150, np.nan, 200],\n    'region': ['East', np.nan, 'West', 'East', np.nan]\n})\n\n# Fill with scalar\ndf['sales'].fillna(0)\n\n# Fill with mean\ndf['sales'].fillna(df['sales'].mean())\n\n# Forward fill\ndf.fillna(method='ffill')\n\n# Different fill per column\ndf.fillna({'sales': df['sales'].median(), 'region': 'Unknown'})\n\n# Interpolate numeric\ndf['sales'].interpolate(method='linear')"},
{name:"Handling Duplicates",theory:["duplicated() returns boolean Series marking duplicate rows (first occurrence is False).","drop_duplicates() removes duplicate rows; keep='first'/'last'/False controls which to keep.","Use subset parameter to check duplicates based on specific columns only."],code:"import pandas as pd\n\ndf = pd.DataFrame({\n    'name': ['Alice','Bob','Alice','Charlie','Bob'],\n    'age': [25, 30, 25, 35, 30],\n    'city': ['NYC','LA','NYC','SF','LA']\n})\n\n# Check duplicates\nprint(df.duplicated())                    # Boolean mask\nprint(f'Duplicates: {df.duplicated().sum()}')\n\n# Drop duplicates\ndf_unique = df.drop_duplicates()\ndf_by_name = df.drop_duplicates(subset=['name'], keep='last')\n\nprint(f'Original: {len(df)}, Unique: {len(df_unique)}')\nprint(df_by_name)"},
{name:"Type Conversion (astype)",theory:["astype() converts column dtype: df['col'].astype(int), df['col'].astype('category').","errors='coerce' in pd.to_numeric() converts invalid values to NaN instead of raising.","Category dtype reduces memory for columns with few unique values."],code:"import pandas as pd\n\ndf = pd.DataFrame({\n    'price': ['10.5', '20.3', 'N/A', '15.0'],\n    'quantity': ['5', '3', '8', '2'],\n    'date': ['2024-01-01','2024-02-01','2024-03-01','2024-04-01']\n})\n\n# Convert numeric (coerce errors to NaN)\ndf['price'] = pd.to_numeric(df['price'], errors='coerce')\ndf['quantity'] = df['quantity'].astype(int)\n\n# Convert to datetime\ndf['date'] = pd.to_datetime(df['date'])\n\n# Category for efficiency\ndf['status'] = pd.Categorical(['A','B','A','B'])\n\nprint(df.dtypes)"},
{name:"Renaming Columns and Index",theory:["rename() changes column or index labels using a dictionary mapping or function.","columns parameter renames columns; index parameter renames row labels.","Can also directly assign df.columns = [...] for bulk rename of all columns."],code:"import pandas as pd\n\ndf = pd.DataFrame({'First Name': [1,2], 'Last Name': [3,4], 'AGE': [25,30]})\n\n# Rename specific columns\ndf = df.rename(columns={\n    'First Name': 'first_name',\n    'Last Name': 'last_name',\n    'AGE': 'age'\n})\n\n# Rename with function\ndf = df.rename(columns=str.lower)\ndf = df.rename(columns=lambda x: x.replace(' ', '_'))\n\n# Bulk rename\ndf.columns = ['fname', 'lname', 'age']\nprint(df)"}
],
examples:[
{title:"Complete Data Cleaning Pipeline",desc:"Clean a messy dataset step by step.",code:"import pandas as pd\nimport numpy as np\n\ndf = pd.DataFrame({\n    'Name': ['Alice', 'bob', ' Charlie ', 'DIANA', 'Alice'],\n    'Age': [25, -1, 30, 150, 25],\n    'Salary': ['50000', 'N/A', '70000', '55000', '50000'],\n    'Email': ['a@b.com', None, 'c@d.com', 'invalid', 'a@b.com']\n})\n\n# Step 1: Clean strings\ndf['Name'] = df['Name'].str.strip().str.title()\n\n# Step 2: Convert types\ndf['Salary'] = pd.to_numeric(df['Salary'], errors='coerce')\n\n# Step 3: Handle invalid values\ndf.loc[~df['Age'].between(0, 120), 'Age'] = np.nan\n\n# Step 4: Remove duplicates\ndf = df.drop_duplicates(subset=['Name'])\n\n# Step 5: Fill NaN\ndf['Age'] = df['Age'].fillna(df['Age'].median())\ndf['Salary'] = df['Salary'].fillna(df['Salary'].mean())\n\nprint(df)"},
{title:"Missing Value Analysis",desc:"Analyze and visualize patterns in missing data.",code:"import pandas as pd\nimport numpy as np\n\nnp.random.seed(42)\ndf = pd.DataFrame(np.random.randn(100, 5), columns=list('ABCDE'))\n# Introduce missing values\nfor col in df.columns:\n    mask = np.random.random(100) < 0.2\n    df.loc[mask, col] = np.nan\n\n# Analysis\nprint('Missing value counts:')\nprint(df.isnull().sum())\nprint(f'\\nTotal missing: {df.isnull().sum().sum()}')\nprint(f'Rows with any null: {df.isnull().any(axis=1).sum()}')\nprint(f'Complete rows: {df.dropna().shape[0]}')\n\n# Missing percentage\nmissing_pct = (df.isnull().sum() / len(df) * 100).round(1)\nprint(f'\\nMissing %:\\n{missing_pct}')"},
{title:"Smart Imputation",desc:"Apply different imputation strategies per column.",code:"import pandas as pd\nimport numpy as np\n\ndf = pd.DataFrame({\n    'age': [25, np.nan, 35, 28, np.nan, 45],\n    'income': [50000, 60000, np.nan, np.nan, 70000, 80000],\n    'category': ['A', np.nan, 'B', 'A', 'B', np.nan]\n})\n\n# Numeric: fill with median\ndf['age'] = df['age'].fillna(df['age'].median())\n\n# Numeric: interpolate\ndf['income'] = df['income'].interpolate()\n\n# Categorical: fill with mode\ndf['category'] = df['category'].fillna(df['category'].mode()[0])\n\nprint(df)\nprint(f'\\nRemaining nulls: {df.isnull().sum().sum()}')"}
],

{id:5,title:"String Operations",color:"#f472b6",chips:[".str","contains","split","replace","extract"],
subtopics:[
{name:".str Accessor Basics",theory:["The .str accessor exposes string methods on Series with object/string dtype.","Operations are vectorized - applied to each element without explicit loops.","NaN values are propagated through string operations (result is NaN where input is NaN)."],code:"import pandas as pd\n\ns = pd.Series(['Hello World', 'Python Pandas', 'Data Science', None])\n\nprint(s.str.lower())        # lowercase\nprint(s.str.upper())        # UPPERCASE\nprint(s.str.title())        # Title Case\nprint(s.str.len())          # character count\nprint(s.str.strip())        # remove whitespace\nprint(s.str[0:5])           # slicing each string"},
{name:"contains() and match()",theory:["str.contains(pattern) returns Boolean Series; True where pattern is found in string.","Supports regex patterns by default; use regex=False for literal matching.","case=False makes the search case-insensitive; na parameter handles NaN results."],code:"import pandas as pd\n\ndf = pd.DataFrame({\n    'email': ['alice@gmail.com', 'bob@yahoo.com', 'charlie@gmail.com', None],\n    'name': ['Alice Smith', 'Bob Jones Jr.', 'Charlie Brown', 'Diana']\n})\n\n# Contains substring\ngmail_users = df[df['email'].str.contains('gmail', na=False)]\nprint(gmail_users)\n\n# Case-insensitive search\nhas_jr = df['name'].str.contains('jr', case=False, na=False)\n\n# Regex pattern\nhas_dot = df['name'].str.contains(r'\\w+\\.', regex=True, na=False)"},
{name:"split() and join()",theory:["str.split(separator) splits each string into a list; expand=True creates separate columns.","str.join(separator) joins list elements in each cell back into a string.","n parameter limits splits; get(i) extracts the i-th element after splitting."],code:"import pandas as pd\n\ndf = pd.DataFrame({\n    'full_name': ['Alice Smith', 'Bob Jones Jr', 'Charlie Brown'],\n    'tags': ['python,data,ml', 'sql,etl', 'python,viz']\n})\n\n# Split into columns\ndf[['first','last']] = df['full_name'].str.split(' ', n=1, expand=True)\n\n# Split tags into list\ndf['tag_list'] = df['tags'].str.split(',')\n\n# Get first tag\ndf['first_tag'] = df['tags'].str.split(',').str[0]\n\nprint(df)"},
{name:"replace() and Regex Substitution",theory:["str.replace(old, new) replaces occurrences; supports regex patterns for complex replacements.","regex=True (default) treats pattern as regex; use regex=False for literal replacements.","Can use capture groups in replacement string with regex for advanced transformations."],code:"import pandas as pd\n\ndf = pd.DataFrame({\n    'phone': ['(123) 456-7890', '987-654-3210', '(555) 123-4567'],\n    'text': ['Price: $99.99', 'Cost $45.50', 'Value: $120.00']\n})\n\n# Remove non-digits from phone\ndf['phone_clean'] = df['phone'].str.replace(r'[^\\d]', '', regex=True)\n\n# Extract numbers from text\ndf['amount'] = df['text'].str.replace(r'[^\\d.]', '', regex=True).astype(float)\n\n# Literal replacement\ndf['text_clean'] = df['text'].str.replace('$', 'USD ', regex=False)\n\nprint(df)"},
{name:"extract() and extractall()",theory:["str.extract(pattern) extracts capture groups from regex into DataFrame columns.","Use named groups (?P<name>...) to name the resulting columns automatically.","extractall() extracts all matches (not just first) with a MultiIndex result."],code:"import pandas as pd\n\ndf = pd.DataFrame({\n    'data': ['John-25-NYC', 'Alice-30-LA', 'Bob-28-SF'],\n    'log': ['ERROR[2024-01-15]: timeout', 'WARN[2024-01-16]: slow']\n})\n\n# Extract with named groups\nresult = df['data'].str.extract(r'(?P<name>\\w+)-(?P<age>\\d+)-(?P<city>\\w+)')\nprint(result)\n\n# Extract date and level from log\nlog_parts = df['log'].str.extract(r'(?P<level>\\w+)\\[(?P<date>[\\d-]+)\\]: (?P<msg>.*)')\nprint(log_parts)"},
{name:"Padding, Counting, and Other Methods",theory:["str.pad()/zfill()/center() add padding characters for formatting and alignment.","str.count(pattern) counts occurrences of pattern in each string.","str.startswith()/endswith() check prefix/suffix; str.find() returns position of first match."],code:"import pandas as pd\n\ns = pd.Series(['apple', 'banana', 'cherry', 'apple pie'])\n\n# Counting\nprint(s.str.count('a'))       # count 'a' in each\n\n# Start/end checks\nprint(s.str.startswith('a'))  # [True, False, False, True]\nprint(s.str.endswith('e'))    # [True, False, False, True]\n\n# Padding\nnums = pd.Series(['1', '23', '456'])\nprint(nums.str.zfill(5))      # ['00001','00023','00456']\nprint(nums.str.pad(5, fillchar='0'))  # left pad\n\n# Finding position\nprint(s.str.find('an'))       # [-1, 1, -1, -1]"}
],
examples:[
{title:"Clean Messy String Data",desc:"Standardize inconsistent text entries.",code:"import pandas as pd\n\ndf = pd.DataFrame({\n    'company': ['  Apple Inc.  ', 'GOOGLE LLC', 'microsoft Corp', 'amazon.com INC'],\n    'revenue': ['$274.5B', '$282.8B', '$198.3B', '$513.9B']\n})\n\n# Standardize company names\ndf['company_clean'] = (df['company']\n    .str.strip()\n    .str.title()\n    .str.replace(r'\\s+(Inc|Llc|Corp|Com).*$', '', regex=True)\n    .str.strip())\n\n# Extract numeric revenue\ndf['revenue_num'] = (df['revenue']\n    .str.replace('$', '', regex=False)\n    .str.replace('B', '', regex=False)\n    .astype(float))\n\nprint(df[['company_clean', 'revenue_num']])"},
{title:"Parse Log Files",desc:"Extract structured data from log strings using regex.",code:"import pandas as pd\n\nlogs = pd.Series([\n    '2024-01-15 10:30:45 ERROR [auth] Login failed for user=admin ip=192.168.1.1',\n    '2024-01-15 10:31:02 INFO [api] Request processed in 45ms',\n    '2024-01-15 10:31:15 WARN [db] Connection pool at 80% capacity'\n])\n\n# Extract structured fields\npattern = r'(?P<date>[\\d-]+) (?P<time>[\\d:]+) (?P<level>\\w+) \\[(?P<module>\\w+)\\] (?P<message>.*)'\nparsed = logs.str.extract(pattern)\nprint(parsed)\nprint(f'\\nError count: {(parsed[\"level\"]==\"ERROR\").sum()}')"},
{title:"Text Feature Engineering",desc:"Create features from text data for analysis.",code:"import pandas as pd\n\ndf = pd.DataFrame({\n    'review': [\n        'Great product! Loved it. Highly recommend.',\n        'Terrible. Broke after one day.',\n        'Okay for the price. Nothing special.',\n        'AMAZING!! Best purchase ever!!!!'\n    ]\n})\n\n# Text features\ndf['word_count'] = df['review'].str.split().str.len()\ndf['char_count'] = df['review'].str.len()\ndf['exclamation_count'] = df['review'].str.count('!')\ndf['caps_ratio'] = df['review'].str.findall(r'[A-Z]').str.len() / df['char_count']\ndf['avg_word_len'] = df['review'].str.split().apply(lambda x: sum(len(w) for w in x)/len(x))\n\nprint(df[['review','word_count','exclamation_count','caps_ratio']].to_string())"}
],

{id:6,title:"Filtering & Sorting",color:"#22d3ee",chips:["where","isin","between","sort_values","nlargest"],
subtopics:[
{name:"Filtering with where() and mask()",theory:["where(cond) keeps values where condition is True, replaces False with NaN or specified value.","mask(cond) is the opposite: keeps values where condition is False, replaces True.","Both return same-shape DataFrame; useful for conditional replacement without dropping rows."],code:"import pandas as pd\nimport numpy as np\n\ndf = pd.DataFrame({'A': [1, -2, 3, -4, 5], 'B': [10, 20, 30, 40, 50]})\n\n# where: keep positive, else NaN\nprint(df['A'].where(df['A'] > 0))\n# Output: [1, NaN, 3, NaN, 5]\n\n# where with replacement value\nprint(df['A'].where(df['A'] > 0, other=0))\n# Output: [1, 0, 3, 0, 5]\n\n# mask: replace where True\nprint(df['A'].mask(df['A'] < 0, 0))\n# Output: [1, 0, 3, 0, 5]"},
{name:"isin() for Membership Testing",theory:["isin(values) checks if each element is in the provided list/set/Series.","Very efficient for filtering by multiple values - faster than chaining | conditions.","Works on both Series and DataFrame; ~df.isin() gives 'not in' behavior."],code:"import pandas as pd\n\ndf = pd.DataFrame({\n    'city': ['NYC','LA','Chicago','NYC','SF','LA'],\n    'dept': ['Sales','IT','HR','IT','Sales','HR'],\n    'salary': [70000, 80000, 65000, 90000, 75000, 60000]\n})\n\n# Filter by multiple values\ntarget_cities = ['NYC', 'SF']\nresult = df[df['city'].isin(target_cities)]\nprint(result)\n\n# NOT in\nresult = df[~df['dept'].isin(['HR'])]\nprint(result)\n\n# isin with Series\nvalid_ids = pd.Series([1, 3, 5, 7])"},
{name:"between() for Range Filtering",theory:["between(left, right) returns boolean Series; True for values within the range.","Both endpoints are inclusive by default; use inclusive='left'/'right'/'neither' to change.","Works with numbers, strings, and datetime values."],code:"import pandas as pd\n\ndf = pd.DataFrame({\n    'name': ['Alice','Bob','Charlie','Diana','Eve'],\n    'age': [22, 35, 28, 45, 31],\n    'score': [85, 92, 78, 95, 88]\n})\n\n# Basic between\nmid_age = df[df['age'].between(25, 40)]\nprint(mid_age)\n\n# Exclusive endpoints\nresult = df[df['score'].between(80, 90, inclusive='left')]\n\n# Combining with other filters\nresult = df[df['age'].between(20, 35) & (df['score'] > 80)]\nprint(result)"},
{name:"sort_values() and sort_index()",theory:["sort_values(by) sorts by column values; ascending=False for descending order.","Can sort by multiple columns with different ascending orders using lists.","sort_index() sorts by the row/column index; na_position controls where NaN goes."],code:"import pandas as pd\n\ndf = pd.DataFrame({\n    'name': ['Alice','Bob','Charlie','Diana','Eve'],\n    'dept': ['Sales','IT','IT','Sales','IT'],\n    'salary': [70000, 80000, 75000, 90000, 65000]\n})\n\n# Sort by single column\nprint(df.sort_values('salary', ascending=False))\n\n# Sort by multiple columns\nprint(df.sort_values(['dept', 'salary'], ascending=[True, False]))\n\n# Sort index\ndf2 = df.set_index('name')\nprint(df2.sort_index())  # Alphabetical by name\n\n# Handle NaN in sorting\n# na_position='first' or 'last' (default)"},
{name:"nlargest() and nsmallest()",theory:["nlargest(n, columns) returns top n rows by column value - faster than sort + head.","nsmallest(n, columns) returns bottom n rows by column value.","keep='first'/'last'/'all' controls handling of tied values."],code:"import pandas as pd\n\ndf = pd.DataFrame({\n    'product': ['A','B','C','D','E','F','G','H'],\n    'revenue': [100, 250, 180, 320, 95, 275, 150, 400],\n    'profit': [20, 50, 35, 80, 15, 55, 30, 90]\n})\n\n# Top 3 by revenue\ntop3 = df.nlargest(3, 'revenue')\nprint('Top 3 by revenue:')\nprint(top3)\n\n# Bottom 3 by profit\nbottom3 = df.nsmallest(3, 'profit')\nprint('\\nBottom 3 by profit:')\nprint(bottom3)\n\n# nlargest by multiple columns\ntop = df.nlargest(3, ['revenue', 'profit'])"},
{name:"Advanced Filtering Patterns",theory:["Combine multiple filtering methods for complex data selection scenarios.","Use query() for readable complex filters; pipe() for chainable filter functions.","idxmax()/idxmin() return the index of max/min values - useful for lookups."],code:"import pandas as pd\nimport numpy as np\n\ndf = pd.DataFrame({\n    'date': pd.date_range('2024-01-01', periods=10),\n    'category': ['A','B','A','B','A','B','A','B','A','B'],\n    'value': [10, 25, 15, 30, 20, 35, 12, 28, 18, 40]\n})\n\n# idxmax/idxmin\nmax_idx = df['value'].idxmax()\nprint(f'Max value row: {df.loc[max_idx]}')\n\n# Rank-based filtering\ndf['rank'] = df['value'].rank(ascending=False)\ntop_half = df[df['rank'] <= len(df)/2]\n\n# Percentile filtering\nthreshold = df['value'].quantile(0.75)\nhigh_values = df[df['value'] >= threshold]"}
],
examples:[
{title:"Top-N Analysis",desc:"Find top performers across multiple dimensions.",code:"import pandas as pd\n\ndf = pd.DataFrame({\n    'employee': ['Alice','Bob','Charlie','Diana','Eve','Frank','Grace','Henry'],\n    'dept': ['Sales','IT','Sales','IT','Sales','IT','Sales','IT'],\n    'sales': [120, 95, 180, 110, 200, 85, 150, 130],\n    'satisfaction': [4.5, 4.2, 4.8, 3.9, 4.7, 4.0, 4.3, 4.6]\n})\n\n# Top 3 overall\nprint('Top 3 by sales:')\nprint(df.nlargest(3, 'sales')[['employee','sales']])\n\n# Top 2 per department\ntop_per_dept = df.groupby('dept').apply(lambda x: x.nlargest(2, 'sales')).reset_index(drop=True)\nprint('\\nTop 2 per dept:')\nprint(top_per_dept[['employee','dept','sales']])"},
{title:"Complex Multi-condition Filter",desc:"Apply business rules as filters.",code:"import pandas as pd\n\ndf = pd.DataFrame({\n    'order_id': range(1, 11),\n    'amount': [50, 250, 75, 500, 125, 300, 80, 450, 95, 600],\n    'status': ['completed','pending','completed','completed','cancelled',\n              'pending','completed','completed','pending','completed'],\n    'priority': ['low','high','low','high','low','medium','low','high','medium','high']\n})\n\n# Business rule: high-value completed orders\nhigh_value = df.query('amount >= 200 and status == \"completed\" and priority == \"high\"')\nprint('High-value completed priority orders:')\nprint(high_value)\n\n# Orders needing attention\nattention = df[\n    (df['status'] == 'pending') & \n    (df['amount'] > 100) & \n    (df['priority'].isin(['high', 'medium']))\n]\nprint('\\nNeeds attention:')\nprint(attention)"},
{title:"Sorted Report Generation",desc:"Create a sorted summary report from data.",code:"import pandas as pd\nimport numpy as np\n\nnp.random.seed(42)\ndf = pd.DataFrame({\n    'product': np.random.choice(['Widget','Gadget','Gizmo','Tool'], 20),\n    'month': np.random.choice(['Jan','Feb','Mar'], 20),\n    'revenue': np.random.randint(100, 1000, 20),\n    'units': np.random.randint(1, 50, 20)\n})\n\n# Summary sorted by revenue\nsummary = df.groupby('product').agg(\n    total_revenue=('revenue','sum'),\n    avg_units=('units','mean'),\n    order_count=('product','count')\n).sort_values('total_revenue', ascending=False)\n\nprint(summary)\nprint(f'\\nTop product: {summary.index[0]}')"}
],

{id:7,title:"GroupBy & Aggregation",color:"#fb923c",chips:["groupby","agg","transform","pivot_table"],
subtopics:[
{name:"GroupBy Basics",theory:["groupby() splits data into groups based on column values, then applies operations per group.","Returns a GroupBy object (lazy) - computation happens when you call an aggregation method.","Split-Apply-Combine: split data into groups, apply function, combine results."],code:"import pandas as pd\n\ndf = pd.DataFrame({\n    'dept': ['Sales','IT','Sales','IT','Sales','IT'],\n    'name': ['Alice','Bob','Charlie','Diana','Eve','Frank'],\n    'salary': [70000, 80000, 65000, 90000, 75000, 85000]\n})\n\n# Basic groupby\ngrouped = df.groupby('dept')\nprint(grouped.mean(numeric_only=True))\nprint(grouped.size())        # count per group\nprint(grouped.groups)        # dict of group -> indices\n\n# Iterate over groups\nfor name, group in grouped:\n    print(f'{name}: {len(group)} employees')"},
{name:"Aggregation Functions (agg)",theory:["agg() applies one or more aggregation functions to grouped data simultaneously.","Pass a dict to apply different functions to different columns.","Named aggregation with tuples: .agg(new_name=('col', 'func')) for clean output."],code:"import pandas as pd\nimport numpy as np\n\ndf = pd.DataFrame({\n    'product': ['A','B','A','B','A','B'],\n    'sales': [100, 200, 150, 250, 175, 300],\n    'cost': [60, 120, 90, 150, 100, 180]\n})\n\n# Multiple aggregations\nresult = df.groupby('product').agg(\n    total_sales=('sales', 'sum'),\n    avg_sales=('sales', 'mean'),\n    max_cost=('cost', 'max'),\n    count=('sales', 'count')\n)\nprint(result)\n\n# Custom function\nresult2 = df.groupby('product')['sales'].agg(['sum','mean','std',lambda x: x.max()-x.min()])"},
{name:"transform() - Group-wise Operations",theory:["transform() returns a Series same size as input - broadcasts group result back to original rows.","Useful for group-specific normalization, filling NaN with group mean, ranking within groups.","The function passed to transform must return a scalar or same-sized result per group."],code:"import pandas as pd\n\ndf = pd.DataFrame({\n    'dept': ['Sales','IT','Sales','IT','Sales'],\n    'salary': [70000, 80000, 65000, 90000, 75000]\n})\n\n# Add group mean as new column\ndf['dept_avg'] = df.groupby('dept')['salary'].transform('mean')\n\n# Normalize within group\ndf['salary_normalized'] = df.groupby('dept')['salary'].transform(\n    lambda x: (x - x.mean()) / x.std()\n)\n\n# Rank within group\ndf['rank_in_dept'] = df.groupby('dept')['salary'].transform('rank', ascending=False)\n\nprint(df)"},
{name:"pivot_table()",theory:["pivot_table creates a spreadsheet-style pivot with rows, columns, and values.","aggfunc parameter specifies how to aggregate (default: mean); can pass multiple.","margins=True adds row/column totals; fill_value replaces NaN in result."],code:"import pandas as pd\nimport numpy as np\n\ndf = pd.DataFrame({\n    'date': ['2024-Q1','2024-Q1','2024-Q2','2024-Q2','2024-Q1','2024-Q2'],\n    'region': ['East','West','East','West','East','West'],\n    'product': ['A','A','A','B','B','B'],\n    'revenue': [100, 150, 120, 200, 80, 180]\n})\n\n# Basic pivot table\npivot = pd.pivot_table(df,\n    values='revenue',\n    index='region',\n    columns='date',\n    aggfunc='sum',\n    margins=True,\n    fill_value=0\n)\nprint(pivot)"},
{name:"Multiple Group Keys & Hierarchical",theory:["Pass a list of columns to groupby for multi-level grouping (hierarchical result).","as_index=False returns flat DataFrame instead of grouped index for easier manipulation.","level parameter lets you aggregate at a specific level of a MultiIndex."],code:"import pandas as pd\n\ndf = pd.DataFrame({\n    'year': [2023,2023,2023,2024,2024,2024],\n    'quarter': ['Q1','Q2','Q3','Q1','Q2','Q3'],\n    'region': ['East','East','West','East','West','West'],\n    'sales': [100, 150, 200, 120, 180, 250]\n})\n\n# Multi-key groupby\nresult = df.groupby(['year', 'quarter']).agg(\n    total=('sales', 'sum'),\n    avg=('sales', 'mean')\n)\nprint(result)\n\n# Flat result\nflat = df.groupby(['year', 'region'], as_index=False)['sales'].sum()\nprint(flat)"},
{name:"GroupBy Advanced (filter/apply)",theory:["filter() keeps entire groups that satisfy a condition - unlike boolean filtering on rows.","apply() runs any function per group - most flexible but potentially slower.","pipe() enables method chaining on GroupBy objects for readable pipelines."],code:"import pandas as pd\n\ndf = pd.DataFrame({\n    'team': ['A','A','A','B','B','B','C','C'],\n    'score': [85, 90, 78, 60, 55, 70, 95, 92]\n})\n\n# Filter: keep teams where mean score > 75\nhigh_teams = df.groupby('team').filter(lambda x: x['score'].mean() > 75)\nprint(high_teams)\n\n# Apply custom function per group\ndef top_n(group, n=2):\n    return group.nlargest(n, 'score')\n\ntop_per_team = df.groupby('team').apply(top_n, n=2).reset_index(drop=True)\nprint(top_per_team)"}
],
examples:[
{title:"Sales Analysis Report",desc:"Generate comprehensive sales analytics using GroupBy.",code:"import pandas as pd\nimport numpy as np\n\nnp.random.seed(42)\ndf = pd.DataFrame({\n    'date': pd.date_range('2024-01-01', periods=100),\n    'product': np.random.choice(['Widget','Gadget','Gizmo'], 100),\n    'region': np.random.choice(['North','South','East','West'], 100),\n    'units': np.random.randint(1, 50, 100),\n    'price': np.random.uniform(10, 100, 100).round(2)\n})\ndf['revenue'] = df['units'] * df['price']\n\n# Summary by product\nsummary = df.groupby('product').agg(\n    total_revenue=('revenue', 'sum'),\n    avg_order=('revenue', 'mean'),\n    total_units=('units', 'sum'),\n    orders=('product', 'count')\n).sort_values('total_revenue', ascending=False)\n\nprint(summary.round(2))"},
{title:"Pivot Table Report",desc:"Create a multi-dimensional summary using pivot_table.",code:"import pandas as pd\nimport numpy as np\n\ndf = pd.DataFrame({\n    'quarter': ['Q1','Q1','Q2','Q2','Q3','Q3','Q4','Q4']*2,\n    'region': ['East','West']*8,\n    'product': ['A']*8 + ['B']*8,\n    'revenue': np.random.randint(50, 500, 16)\n})\n\npivot = pd.pivot_table(df,\n    values='revenue',\n    index='product',\n    columns=['quarter'],\n    aggfunc=['sum', 'mean'],\n    margins=True\n)\nprint(pivot.round(0))"},
{title:"Rank Within Groups",desc:"Rank items within their category group.",code:"import pandas as pd\n\ndf = pd.DataFrame({\n    'student': ['Alice','Bob','Charlie','Diana','Eve','Frank'],\n    'subject': ['Math','Math','Math','Science','Science','Science'],\n    'score': [92, 85, 95, 88, 90, 82]\n})\n\n# Rank within subject\ndf['subject_rank'] = df.groupby('subject')['score'].rank(ascending=False).astype(int)\n\n# Percent rank within group\ndf['percentile'] = df.groupby('subject')['score'].transform(\n    lambda x: x.rank(pct=True)\n).round(2)\n\nprint(df.sort_values(['subject', 'subject_rank']))"}
],

{id:8,title:"Merging & Joining",color:"#4ade80",chips:["merge","join","concat","merge_asof"],
subtopics:[
{name:"merge() Basics (SQL-style Joins)",theory:["merge() combines DataFrames on common columns or indices - like SQL JOIN operations.","on= specifies join column(s); left_on/right_on for different column names.","how= specifies join type: 'inner' (default), 'left', 'right', 'outer'."],code:"import pandas as pd\n\norders = pd.DataFrame({\n    'order_id': [1, 2, 3, 4],\n    'customer_id': [101, 102, 103, 104],\n    'amount': [250, 150, 300, 200]\n})\n\ncustomers = pd.DataFrame({\n    'customer_id': [101, 102, 103, 105],\n    'name': ['Alice', 'Bob', 'Charlie', 'Eve']\n})\n\n# Inner join (default)\nresult = pd.merge(orders, customers, on='customer_id')\n\n# Left join\nresult = pd.merge(orders, customers, on='customer_id', how='left')\n\n# Different column names\n# pd.merge(df1, df2, left_on='id', right_on='emp_id')"},
{name:"Join Types (inner/left/right/outer)",theory:["inner: only matching rows from both DataFrames (intersection).","left: all rows from left + matching from right (NaN where no match).","outer: all rows from both DataFrames (union); NaN where no match on either side."],code:"import pandas as pd\n\ndf1 = pd.DataFrame({'key': ['A','B','C','D'], 'val1': [1,2,3,4]})\ndf2 = pd.DataFrame({'key': ['B','C','D','E'], 'val2': [5,6,7,8]})\n\ninner = pd.merge(df1, df2, on='key', how='inner')  # B,C,D\nleft  = pd.merge(df1, df2, on='key', how='left')   # A,B,C,D\nright = pd.merge(df1, df2, on='key', how='right')  # B,C,D,E\nouter = pd.merge(df1, df2, on='key', how='outer')  # A,B,C,D,E\n\nprint(f'Inner: {len(inner)} rows')\nprint(f'Left: {len(left)} rows')\nprint(f'Right: {len(right)} rows')\nprint(f'Outer: {len(outer)} rows')"},
{name:"concat() - Stacking DataFrames",theory:["concat() stacks DataFrames vertically (axis=0) or horizontally (axis=1).","ignore_index=True resets the index; keys parameter adds hierarchical index.","join='inner' keeps only common columns; join='outer' (default) keeps all columns."],code:"import pandas as pd\n\ndf1 = pd.DataFrame({'A': [1,2], 'B': [3,4]})\ndf2 = pd.DataFrame({'A': [5,6], 'B': [7,8]})\ndf3 = pd.DataFrame({'A': [9], 'C': [10]})\n\n# Vertical stack\nstacked = pd.concat([df1, df2], ignore_index=True)\nprint(stacked)\n\n# With keys for source tracking\ntracked = pd.concat([df1, df2], keys=['first','second'])\nprint(tracked)\n\n# Horizontal concat\nside_by_side = pd.concat([df1, df2], axis=1)\nprint(side_by_side)"},
{name:"join() - Index-based Joining",theory:["join() merges on index by default - convenient for index-aligned DataFrames.","Equivalent to merge with left_index=True, right_index=True.","lsuffix/rsuffix resolve column name conflicts between DataFrames."],code:"import pandas as pd\n\ndf1 = pd.DataFrame({'A': [1,2,3]}, index=['x','y','z'])\ndf2 = pd.DataFrame({'B': [4,5,6]}, index=['x','y','w'])\n\n# Join on index (left join by default)\nresult = df1.join(df2, how='inner')\nprint(result)\n\n# With suffix for overlapping columns\ndf3 = pd.DataFrame({'A': [7,8,9]}, index=['x','y','z'])\nresult = df1.join(df3, lsuffix='_left', rsuffix='_right')\nprint(result)"},
{name:"merge_asof() - Nearest Match Join",theory:["merge_asof performs a merge on sorted keys, matching to nearest value rather than exact.","Perfect for time-series data: join on nearest timestamp, price at time of order, etc.","direction='backward'/'forward'/'nearest' controls which nearest value to pick."],code:"import pandas as pd\n\n# Stock prices at specific times\nprices = pd.DataFrame({\n    'time': pd.to_datetime(['10:00','10:05','10:10','10:15']),\n    'price': [100, 102, 101, 103]\n})\n\n# Trades at various times\ntrades = pd.DataFrame({\n    'time': pd.to_datetime(['10:01','10:07','10:12']),\n    'quantity': [50, 30, 20]\n})\n\n# Match each trade to most recent price\nresult = pd.merge_asof(trades, prices, on='time', direction='backward')\nprint(result)\n# Each trade gets the last known price before/at trade time"},
{name:"Merge Indicators and Validation",theory:["indicator=True adds _merge column showing where each row came from (left/right/both).","validate= checks merge relationship: '1:1', '1:m', 'm:1', 'm:m' - raises on violation.","suffixes parameter customizes column name suffixes for overlapping columns."],code:"import pandas as pd\n\ndf1 = pd.DataFrame({'key': ['A','B','C'], 'val': [1,2,3]})\ndf2 = pd.DataFrame({'key': ['B','C','D'], 'val': [4,5,6]})\n\n# With merge indicator\nresult = pd.merge(df1, df2, on='key', how='outer',\n                  indicator=True, suffixes=('_left','_right'))\nprint(result)\n# _merge: left_only, right_only, both\n\n# Validate relationship\ntry:\n    pd.merge(df1, df2, on='key', validate='1:1')\nexcept Exception as e:\n    print(f'Validation error: {e}')"}
],
examples:[
{title:"Multi-table Join",desc:"Join three related tables like a database query.",code:"import pandas as pd\n\norders = pd.DataFrame({\n    'order_id': [1,2,3,4,5],\n    'customer_id': [101,102,101,103,102],\n    'product_id': ['P1','P2','P3','P1','P2'],\n    'quantity': [2,1,3,1,2]\n})\ncustomers = pd.DataFrame({\n    'customer_id': [101,102,103],\n    'name': ['Alice','Bob','Charlie']\n})\nproducts = pd.DataFrame({\n    'product_id': ['P1','P2','P3'],\n    'product_name': ['Widget','Gadget','Gizmo'],\n    'price': [25.0, 50.0, 15.0]\n})\n\n# Chain merges\nresult = (orders\n    .merge(customers, on='customer_id')\n    .merge(products, on='product_id'))\nresult['total'] = result['quantity'] * result['price']\nprint(result[['name','product_name','quantity','total']])"},
{title:"Concat Monthly Files",desc:"Combine multiple monthly datasets into one.",code:"import pandas as pd\nimport numpy as np\n\n# Simulate monthly files\nmonths = []\nfor month in ['Jan','Feb','Mar']:\n    df = pd.DataFrame({\n        'date': pd.date_range(f'2024-{[\"Jan\",\"Feb\",\"Mar\"].index(month)+1:02d}-01', periods=5),\n        'sales': np.random.randint(100, 500, 5),\n        'source': month\n    })\n    months.append(df)\n\n# Concatenate with source tracking\ncombined = pd.concat(months, ignore_index=True)\nprint(f'Total rows: {len(combined)}')\nprint(combined.groupby('source')['sales'].sum())"},
{title:"Merge with Diagnostics",desc:"Perform a merge and analyze match quality.",code:"import pandas as pd\n\nleft = pd.DataFrame({'id': [1,2,3,4,5], 'name': ['A','B','C','D','E']})\nright = pd.DataFrame({'id': [2,3,4,6,7], 'score': [85,90,78,92,88]})\n\n# Merge with indicator\nresult = pd.merge(left, right, on='id', how='outer', indicator=True)\n\n# Analyze match quality\nprint('Match summary:')\nprint(result['_merge'].value_counts())\nprint(f'\\nUnmatched left: {(result[\"_merge\"]==\"left_only\").sum()}')\nprint(f'Unmatched right: {(result[\"_merge\"]==\"right_only\").sum()}')\nprint(f'Matched: {(result[\"_merge\"]==\"both\").sum()}')"}
],

{id:9,title:"Reshaping Data",color:"#60a5fa",chips:["melt","pivot","stack/unstack","explode","crosstab"],
subtopics:[
{name:"melt() - Wide to Long",theory:["melt() unpivots a DataFrame from wide format to long format (normalizes data).","id_vars stay as identifier columns; value_vars become rows in new 'variable'/'value' columns.","Useful for preparing data for visualization libraries that prefer long format."],code:"import pandas as pd\n\ndf = pd.DataFrame({\n    'student': ['Alice', 'Bob', 'Charlie'],\n    'math': [90, 85, 92],\n    'science': [88, 92, 78],\n    'english': [95, 80, 85]\n})\n\n# Melt: wide to long\nlong = pd.melt(df,\n    id_vars=['student'],\n    value_vars=['math', 'science', 'english'],\n    var_name='subject',\n    value_name='score'\n)\nprint(long)"},
{name:"pivot() - Long to Wide",theory:["pivot() reshapes long format to wide format - opposite of melt.","index= becomes row index, columns= becomes column headers, values= fills cells.","pivot() fails if there are duplicate entries; use pivot_table() for aggregation."],code:"import pandas as pd\n\nlong_df = pd.DataFrame({\n    'student': ['Alice','Alice','Bob','Bob'],\n    'subject': ['Math','Science','Math','Science'],\n    'score': [90, 85, 88, 92]\n})\n\n# Pivot: long to wide\nwide = long_df.pivot(\n    index='student',\n    columns='subject',\n    values='score'\n)\nprint(wide)\n#          Math  Science\n# Alice     90       85\n# Bob       88       92"},
{name:"stack() and unstack()",theory:["stack() moves column level to innermost row index level (wide -> taller).","unstack() moves row index level to column level (tall -> wider).","Useful for reshaping MultiIndex DataFrames between different orientations."],code:"import pandas as pd\n\ndf = pd.DataFrame({\n    'A': [1, 2, 3],\n    'B': [4, 5, 6]\n}, index=['x', 'y', 'z'])\n\n# Stack: columns become inner row index\nstacked = df.stack()\nprint(stacked)\n# x  A    1\n#    B    4\n# y  A    2\n# ...\n\n# Unstack: inner index becomes columns\nunstacked = stacked.unstack()\nprint(unstacked)  # Back to original shape"},
{name:"explode() - Lists to Rows",theory:["explode() transforms list-like elements in a column into separate rows.","Each list element gets its own row; other column values are duplicated.","Useful for normalizing columns containing arrays, JSON lists, or delimited values."],code:"import pandas as pd\n\ndf = pd.DataFrame({\n    'name': ['Alice', 'Bob', 'Charlie'],\n    'skills': [['Python','SQL'], ['Java','C++','Go'], ['Python']],\n    'dept': ['Data', 'Backend', 'Data']\n})\n\n# Explode the skills list\nexploded = df.explode('skills').reset_index(drop=True)\nprint(exploded)\n# Each skill gets its own row\n\n# Common pattern: split string then explode\ndf2 = pd.DataFrame({'tags': ['a,b,c', 'd,e', 'f']})\ndf2['tags'] = df2['tags'].str.split(',')\ndf2 = df2.explode('tags')"},
{name:"crosstab() - Frequency Tables",theory:["crosstab() computes a cross-tabulation of two or more factors (frequency table).","Similar to pivot_table but specifically designed for counting/frequency analysis.","normalize parameter computes proportions instead of counts (by row, column, or total)."],code:"import pandas as pd\n\ndf = pd.DataFrame({\n    'gender': ['M','F','M','F','M','F','M','F'],\n    'dept': ['IT','IT','Sales','Sales','IT','Sales','Sales','IT'],\n    'level': ['Jr','Sr','Sr','Jr','Sr','Sr','Jr','Jr']\n})\n\n# Basic crosstab (counts)\nct = pd.crosstab(df['gender'], df['dept'])\nprint(ct)\n\n# Normalized (proportions)\nct_norm = pd.crosstab(df['gender'], df['dept'], normalize='all')\nprint(ct_norm)\n\n# With margins (totals)\nct_margins = pd.crosstab(df['gender'], df['dept'], margins=True)"},
{name:"get_dummies() - One-Hot Encoding",theory:["get_dummies() converts categorical columns into binary (0/1) indicator columns.","prefix parameter adds a prefix to new column names for clarity.","drop_first=True avoids multicollinearity by dropping one category per feature."],code:"import pandas as pd\n\ndf = pd.DataFrame({\n    'color': ['red', 'blue', 'green', 'red', 'blue'],\n    'size': ['S', 'M', 'L', 'M', 'S'],\n    'price': [10, 20, 30, 15, 25]\n})\n\n# One-hot encode\nencoded = pd.get_dummies(df, columns=['color', 'size'])\nprint(encoded)\n\n# With drop_first to avoid multicollinearity\nencoded2 = pd.get_dummies(df, columns=['color'], drop_first=True, prefix='c')\nprint(encoded2)"}
],
examples:[
{title:"Wide to Long Transformation",desc:"Reshape quarterly sales data from wide to long format.",code:"import pandas as pd\n\n# Wide format (one column per quarter)\nwide_df = pd.DataFrame({\n    'product': ['Widget', 'Gadget', 'Gizmo'],\n    'Q1_sales': [100, 200, 150],\n    'Q2_sales': [120, 180, 160],\n    'Q3_sales': [130, 220, 170],\n    'Q4_sales': [140, 250, 180]\n})\n\n# Melt to long format\nlong_df = pd.melt(wide_df,\n    id_vars=['product'],\n    var_name='quarter',\n    value_name='sales'\n)\n# Clean quarter column\nlong_df['quarter'] = long_df['quarter'].str.replace('_sales', '')\nprint(long_df)"},
{title:"Explode and Aggregate",desc:"Normalize a tags column and compute tag frequencies.",code:"import pandas as pd\n\ndf = pd.DataFrame({\n    'title': ['Post A', 'Post B', 'Post C', 'Post D'],\n    'tags': ['python,data', 'sql,data,etl', 'python,ml', 'data,viz'],\n    'views': [100, 200, 150, 80]\n})\n\n# Split and explode\ndf['tags'] = df['tags'].str.split(',')\nexploded = df.explode('tags')\n\n# Tag frequency\ntag_counts = exploded['tags'].value_counts()\nprint('Tag frequency:')\nprint(tag_counts)\n\n# Average views per tag\nprint('\\nAvg views per tag:')\nprint(exploded.groupby('tags')['views'].mean().sort_values(ascending=False))"},
{title:"Pivot Report",desc:"Create a summary report using pivot operations.",code:"import pandas as pd\nimport numpy as np\n\ndf = pd.DataFrame({\n    'month': ['Jan','Jan','Feb','Feb','Mar','Mar']*2,\n    'category': ['Electronics','Clothing']*6,\n    'region': ['East','East','East','East','East','East',\n              'West','West','West','West','West','West'],\n    'sales': np.random.randint(100, 1000, 12)\n})\n\n# Pivot: months as columns, categories as rows\npivot = df.pivot_table(\n    values='sales',\n    index='category',\n    columns='month',\n    aggfunc='sum'\n)\nprint(pivot)\n\n# Add total column\npivot['Total'] = pivot.sum(axis=1)\nprint(pivot)"}
],

{id:10,title:"Window Functions",color:"#f87171",chips:["rolling","expanding","shift","diff","pct_change","rank"],
subtopics:[
{name:"rolling() - Moving Window",theory:["rolling(window) creates a moving window object for computing rolling statistics.","window=n means the calculation uses n consecutive rows at a time.","min_periods controls minimum observations needed; center=True centers the window."],code:"import pandas as pd\nimport numpy as np\n\ndf = pd.DataFrame({\n    'date': pd.date_range('2024-01-01', periods=10),\n    'price': [100, 102, 98, 103, 107, 105, 110, 108, 112, 115]\n})\n\n# Rolling mean (3-day moving average)\ndf['MA_3'] = df['price'].rolling(window=3).mean()\n\n# Rolling std (volatility)\ndf['volatility'] = df['price'].rolling(window=3).std()\n\n# Rolling min/max\ndf['rolling_max'] = df['price'].rolling(window=5).max()\n\nprint(df)"},
{name:"expanding() - Cumulative Window",theory:["expanding() computes statistics from the start up to each row (growing window).","Useful for running totals, cumulative averages, and all-time highs/lows.","min_periods=1 starts computing from the very first value."],code:"import pandas as pd\n\ndf = pd.DataFrame({\n    'sales': [100, 150, 120, 200, 180, 250, 300]\n})\n\n# Expanding (cumulative) operations\ndf['cumulative_sum'] = df['sales'].expanding().sum()\ndf['cumulative_mean'] = df['sales'].expanding().mean()\ndf['cumulative_max'] = df['sales'].expanding().max()\ndf['running_count'] = df['sales'].expanding().count()\n\nprint(df)\n\n# Same as cumsum/cummax\nassert (df['cumulative_sum'] == df['sales'].cumsum()).all()"},
{name:"shift() and diff()",theory:["shift(n) moves data by n periods: positive shifts down (lag), negative shifts up (lead).","diff(n) computes difference between current and n-periods-ago value.","Both are essential for time-series analysis: computing returns, changes, lag features."],code:"import pandas as pd\n\ndf = pd.DataFrame({\n    'date': pd.date_range('2024-01-01', periods=5),\n    'value': [100, 105, 103, 110, 108]\n})\n\n# Shift (lag/lead)\ndf['prev_value'] = df['value'].shift(1)    # lag by 1\ndf['next_value'] = df['value'].shift(-1)   # lead by 1\n\n# Diff (change from previous)\ndf['change'] = df['value'].diff(1)          # change from prev\ndf['change_2'] = df['value'].diff(2)        # change from 2 ago\n\nprint(df)"},
{name:"pct_change() - Percentage Change",theory:["pct_change() computes percentage change from previous row (or n periods ago).","Returns fractional change: 0.05 means 5% increase; -0.10 means 10% decrease.","Essential for financial analysis: daily returns, growth rates, etc."],code:"import pandas as pd\n\ndf = pd.DataFrame({\n    'stock_price': [100, 105, 103, 110, 108, 115],\n    'revenue': [1000, 1100, 1050, 1200, 1150, 1300]\n})\n\n# Daily returns\ndf['daily_return'] = df['stock_price'].pct_change()\n\n# Weekly change (5 periods)\ndf['weekly_return'] = df['stock_price'].pct_change(5)\n\n# Revenue growth rate\ndf['rev_growth'] = df['revenue'].pct_change() * 100  # as percentage\n\nprint(df.round(4))"},
{name:"rank() - Ranking Data",theory:["rank() assigns ranks to values; method controls tie-breaking: 'average','min','max','first','dense'.","ascending=True gives rank 1 to smallest; ascending=False gives rank 1 to largest.","pct=True returns percentile ranks (0 to 1) instead of integer ranks."],code:"import pandas as pd\n\ndf = pd.DataFrame({\n    'name': ['Alice','Bob','Charlie','Diana','Eve'],\n    'score': [85, 92, 85, 95, 88]\n})\n\n# Different ranking methods\ndf['rank_avg'] = df['score'].rank(method='average')    # tied=avg rank\ndf['rank_min'] = df['score'].rank(method='min')        # tied=min rank\ndf['rank_dense'] = df['score'].rank(method='dense')    # no gaps\ndf['rank_desc'] = df['score'].rank(ascending=False)    # highest=1\ndf['percentile'] = df['score'].rank(pct=True)\n\nprint(df)"},
{name:"Custom Rolling Functions",theory:["rolling().apply(func) applies any custom function to each window.","Use raw=True for NumPy array input (faster) or raw=False for Series input.","Can combine rolling with groupby for per-group rolling calculations."],code:"import pandas as pd\nimport numpy as np\n\ndf = pd.DataFrame({\n    'group': ['A','A','A','B','B','B','A','A','B','B'],\n    'value': [10, 15, 12, 20, 25, 22, 18, 14, 30, 28]\n})\n\n# Custom rolling function\ndef range_func(x):\n    return x.max() - x.min()\n\ndf['rolling_range'] = df['value'].rolling(3).apply(range_func)\n\n# Rolling per group\ndf['group_rolling_mean'] = df.groupby('group')['value'].transform(\n    lambda x: x.rolling(2, min_periods=1).mean()\n)\n\nprint(df)"}
],
examples:[
{title:"Stock Technical Analysis",desc:"Compute common technical indicators for stock data.",code:"import pandas as pd\nimport numpy as np\n\n# Simulated stock data\nnp.random.seed(42)\nprices = 100 + np.cumsum(np.random.randn(30) * 2)\ndf = pd.DataFrame({\n    'date': pd.date_range('2024-01-01', periods=30),\n    'close': prices.round(2)\n})\n\n# Technical indicators\ndf['SMA_5'] = df['close'].rolling(5).mean()\ndf['SMA_10'] = df['close'].rolling(10).mean()\ndf['daily_return'] = df['close'].pct_change()\ndf['volatility_5d'] = df['daily_return'].rolling(5).std() * np.sqrt(252)\ndf['high_5d'] = df['close'].rolling(5).max()\ndf['drawdown'] = df['close'] / df['close'].expanding().max() - 1\n\nprint(df.tail(10).round(3))"},
{title:"Growth Rate Analysis",desc:"Analyze period-over-period growth rates.",code:"import pandas as pd\nimport numpy as np\n\ndf = pd.DataFrame({\n    'month': pd.date_range('2023-01-01', periods=12, freq='MS'),\n    'revenue': [100,110,105,120,130,125,140,150,145,160,170,180]\n})\n\ndf['mom_growth'] = df['revenue'].pct_change() * 100  # month-over-month\ndf['yoy_proxy'] = df['revenue'].pct_change(3) * 100  # quarter proxy\ndf['cum_growth'] = (df['revenue'] / df['revenue'].iloc[0] - 1) * 100\ndf['trend'] = df['revenue'].rolling(3).mean()\n\nprint(df.round(1))"},
{title:"Ranking and Percentiles",desc:"Rank employees within departments.",code:"import pandas as pd\n\ndf = pd.DataFrame({\n    'name': ['Alice','Bob','Charlie','Diana','Eve','Frank'],\n    'dept': ['Sales','IT','Sales','IT','Sales','IT'],\n    'performance': [92, 88, 85, 95, 90, 82]\n})\n\n# Rank within department\ndf['dept_rank'] = df.groupby('dept')['performance'].rank(ascending=False).astype(int)\n\n# Overall percentile\ndf['percentile'] = df['performance'].rank(pct=True).round(2)\n\n# Top performer flag\ndf['is_top'] = df['dept_rank'] == 1\n\nprint(df.sort_values(['dept', 'dept_rank']))"}
],
