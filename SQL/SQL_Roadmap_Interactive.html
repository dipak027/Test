{name:"CTE vs Subquery vs Temp Table",theory:["CTEs are best for readability and single-query use; they exist only for one statement and cannot be indexed.","Temp tables persist for the session, can be indexed, and are better when intermediate results are reused multiple times.","Subqueries are inline and can be harder to read; CTEs are often equivalent in performance but superior in clarity."],code:"-- CTE approach (readable, single use)\nWITH monthly_sales AS (\n    SELECT DATE_TRUNC('month', order_date) AS month,\n           SUM(total) AS revenue\n    FROM orders GROUP BY 1\n)\nSELECT * FROM monthly_sales WHERE revenue > 100000;\n\n-- Temp table approach (reusable, indexable)\nCREATE TEMP TABLE monthly_sales AS\nSELECT DATE_TRUNC('month', order_date) AS month,\n       SUM(total) AS revenue\nFROM orders GROUP BY 1;\nCREATE INDEX ON monthly_sales(month);\nSELECT * FROM monthly_sales WHERE revenue > 100000;"}
],
examples:[
{title:"Department Budget Analysis with CTEs",desc:"Chain multiple CTEs to build a department budget comparison report.",code:"WITH dept_costs AS (\n    SELECT department_id,\n           SUM(salary) AS total_salary,\n           COUNT(*) AS headcount\n    FROM employees GROUP BY department_id\n),\ndept_budget AS (\n    SELECT department_id, annual_budget\n    FROM budgets WHERE fiscal_year = 2024\n)\nSELECT\n    d.department_name,\n    dc.total_salary,\n    db.annual_budget,\n    db.annual_budget - dc.total_salary AS remaining\nFROM dept_costs dc\nJOIN dept_budget db ON dc.department_id = db.department_id\nJOIN departments d ON dc.department_id = d.id\nORDER BY remaining ASC;"},
{title:"Recursive Category Breadcrumb",desc:"Build full category paths for an e-commerce category tree.",code:"WITH RECURSIVE cat_tree AS (\n    SELECT id, name, parent_id, 1 AS depth,\n           CAST(name AS VARCHAR(500)) AS breadcrumb\n    FROM categories WHERE parent_id IS NULL\n    UNION ALL\n    SELECT c.id, c.name, c.parent_id,\n           ct.depth + 1,\n           ct.breadcrumb || ' > ' || c.name\n    FROM categories c\n    JOIN cat_tree ct ON c.parent_id = ct.id\n)\nSELECT id, name, depth, breadcrumb\nFROM cat_tree ORDER BY breadcrumb;"},
{title:"Bill of Materials Explosion",desc:"Use recursive CTE to expand a product into all its components and sub-components.",code:"WITH RECURSIVE bom AS (\n    SELECT component_id, component_name,\n           quantity, 1 AS level\n    FROM product_components\n    WHERE product_id = 1001\n    UNION ALL\n    SELECT pc.component_id, pc.component_name,\n           pc.quantity * bom.quantity,\n           bom.level + 1\n    FROM product_components pc\n    JOIN bom ON pc.product_id = bom.component_id\n)\nSELECT level, component_name,\n       quantity AS total_needed\nFROM bom ORDER BY level, component_name;"}
],
practice:[
{q:"A developer writes a CTE: WITH sales AS (SELECT ... FROM orders). They try to use 'sales' in two separate SELECT statements after. It fails on the second. Why?",options:["A) CTEs can only return one row","B) A CTE's scope is limited to the single statement immediately following it; it cannot be referenced in subsequent statements","C) The CTE name conflicts with a table name","D) CTEs cannot be used with SELECT"],answer:"B",d:"E"},
{q:"A query has: WITH a AS (...), b AS (SELECT * FROM a WHERE ...). Is it valid for CTE 'b' to reference CTE 'a'?",options:["A) No, CTEs cannot reference each other","B) Yes, a later CTE can reference any previously defined CTE in the same WITH clause","C) Only if they have the same columns","D) Only with RECURSIVE keyword"],answer:"B",d:"E"},
{q:"A recursive CTE has no WHERE condition in the recursive member to stop iteration. What happens?",options:["A) It returns all rows in the table","B) It runs infinitely until the database hits the maximum recursion limit and throws an error","C) It returns empty results","D) The optimizer automatically detects and stops it"],answer:"B",d:"E"},
{q:"An org chart CTE starts with: SELECT * FROM employees WHERE manager_id IS NULL. This is the anchor. What does it represent?",options:["A) All employees without direct reports","B) The root/top-level nodes (e.g., CEO) that have no manager above them - the starting point of the hierarchy","C) Employees who were fired","D) The lowest-level employees"],answer:"B",d:"E"},
{q:"A CTE and a subquery produce identical results. When should you prefer the CTE?",options:["A) CTEs are always faster","B) When the query is complex and naming the intermediate result improves readability and maintainability","C) Only when using recursion","D) Subqueries are always preferred"],answer:"B",d:"E"},
{q:"A recursive CTE generates dates from Jan 1 to Jan 31. The anchor is SELECT DATE '2024-01-01'. The recursive member adds 1 day. How many rows does it produce?",options:["A) 30 rows","B) 31 rows - from Jan 1 through Jan 31 inclusive (anchor gives day 1, recursion adds days 2-31)","C) 32 rows","D) 1 row"],answer:"B",d:"E"},
{q:"WITH RECURSIVE cte AS (SELECT 1 AS n UNION ALL SELECT n+1 FROM cte WHERE n < 5). What values does n take?",options:["A) 1,2,3,4","B) 1,2,3,4,5 - anchor starts at 1, recursion adds until n reaches 5 (WHERE n < 5 stops AFTER n=5 is produced)","C) 0,1,2,3,4,5","D) 2,3,4,5"],answer:"B",d:"E"},
{q:"A CTE is used in a query that runs 10 times per second. A colleague suggests a materialized view instead. What is the key benefit?",options:["A) Materialized views have nicer syntax","B) A materialized view stores precomputed results physically, avoiding re-execution of the query logic on every call","C) CTEs are always slower than any alternative","D) Materialized views use less disk space"],answer:"B",d:"M"},
{q:"A recursive CTE traversing an org chart takes 30 seconds. The employee table has 100K rows and the hierarchy is 12 levels deep. What is the likely bottleneck?",options:["A) 12 levels is too deep for SQL","B) Without an index on manager_id, each recursive iteration does a full table scan to find children; adding an index on manager_id dramatically improves performance","C) Recursive CTEs always take 30 seconds","D) The anchor query is too slow"],answer:"B",d:"M"},
{q:"A developer uses a CTE referenced three times in the main SELECT (joined to different tables). Performance is poor. Why might a temp table be better here?",options:["A) Temp tables have better syntax","B) Some databases re-execute the CTE each time it's referenced; a temp table materializes the result once and can be indexed for the three joins","C) CTEs cannot be joined multiple times","D) Temp tables are always faster"],answer:"B",d:"M"},
{q:"A recursive CTE for an org tree uses UNION ALL. If an employee accidentally has themselves as their own manager (circular reference), what happens?",options:["A) The query skips that employee","B) The recursion enters an infinite loop until the maximum recursion depth is reached, then errors out","C) Only one row is returned for that employee","D) The database automatically detects cycles"],answer:"B",d:"M"},
{q:"A CTE uses: WITH ranked AS (SELECT *, ROW_NUMBER() OVER(...) AS rn FROM big_table). The main query filters WHERE rn = 1. Does the database compute ROW_NUMBER for all rows?",options:["A) No, it only computes for row 1","B) It depends on the optimizer - some databases push the filter into the CTE (top-1 optimization), others compute all row numbers first then filter","C) ROW_NUMBER always scans all rows regardless","D) CTEs never allow window functions"],answer:"B",d:"M"},
{q:"WITH RECURSIVE path AS (...) builds file system paths. To prevent cycles in symlinks, you add: WHERE target_id != ALL(path_array). What data structure tracks visited nodes?",options:["A) A separate tracking table","B) An array column accumulated in the recursive CTE that stores all visited node IDs for cycle detection","C) The database's internal stack","D) A global variable"],answer:"B",d:"M"},
{q:"A recursive CTE sums an account's compound interest over 360 months. Each iteration uses the previous balance. What concern exists for floating-point accuracy?",options:["A) SQL cannot handle decimals","B) Floating-point rounding errors accumulate over 360 iterations; using NUMERIC/DECIMAL type with fixed precision prevents drift","C) Recursion always produces exact results","D) Interest cannot be computed in SQL"],answer:"B",d:"M"},
{q:"Two developers debate: one says CTEs are 'just syntactic sugar for subqueries' and the other says they can change execution plans. Who is correct?",options:["A) First developer - CTEs are always identical to subqueries","B) It depends on the database - PostgreSQL (pre-12) materialized CTEs by default creating different plans; modern optimizers may inline them like subqueries","C) Second developer - CTEs are always materialized","D) Neither - CTEs create stored procedures"],answer:"B",d:"M"},
{q:"A recursive CTE builds a graph traversal but the same node can be reached via multiple paths. The result contains duplicates. How do you get each node only once while still traversing all paths?",options:["A) Use UNION instead of UNION ALL in the recursive CTE","B) Use UNION (not UNION ALL) in the recursive CTE - UNION deduplicates at each iteration, preventing re-visiting nodes","C) Add DISTINCT to the final SELECT only","D) Duplicates cannot be avoided in recursive CTEs"],answer:"B",d:"H"},
{q:"A recursive CTE computes Fibonacci numbers. The anchor has: SELECT 1,1,1 (position, fib_n, fib_n_minus_1). Why does the recursive member need both the current and previous values?",options:["A) It doesn't - one value is enough","B) Each Fibonacci number requires the sum of the two preceding values; the CTE must carry both forward since it can only reference the immediately previous iteration","C) For debugging purposes only","D) SQL requires at least 3 columns in CTEs"],answer:"B",d:"H"},
{q:"A graph database query takes 2ms but the equivalent recursive CTE takes 500ms for shortest-path computation. What fundamental limitation of recursive CTEs causes this?",options:["A) CTEs use more memory","B) Recursive CTEs process level-by-level (BFS) without native support for pruning visited paths or early termination, unlike graph databases optimized for traversal","C) SQL is inherently slower than NoSQL","D) The CTE syntax adds overhead"],answer:"B",d:"H"},
{q:"A recursive CTE with UNION ALL explores a tree but visits the same subtree multiple times (diamond pattern in DAG). With 20 nodes it produces 1 million rows. What is happening?",options:["A) The data is corrupted","B) In a DAG (not a tree), shared subtrees are expanded exponentially with UNION ALL; cycle detection or deduplication (UNION) is needed to prevent combinatorial explosion","C) UNION ALL always produces millions of rows","D) The anchor is wrong"],answer:"B",d:"H"},
{q:"A data pipeline uses CTEs to transform data in 8 sequential steps. Some CTEs are referenced multiple times. In PostgreSQL, wrapping the CTE with 'AS MATERIALIZED' vs 'AS NOT MATERIALIZED' shows 10x performance difference. Why?",options:["A) MATERIALIZED makes CTEs persistent across sessions","B) AS MATERIALIZED forces the CTE result to be computed once and stored in memory/temp space; NOT MATERIALIZED lets the optimizer inline and re-execute it, which may be better or worse depending on reuse count and CTE cost","C) These keywords don't exist in PostgreSQL","D) MATERIALIZED only affects recursive CTEs"],answer:"B",d:"H"}
]},


{id:7,title:"Set Operations",color:"#60a5fa",chips:["UNION","UNION ALL","INTERSECT","EXCEPT","Combining"],
subtopics:[
{name:"UNION and UNION ALL",theory:["UNION combines results from two queries and removes duplicate rows; UNION ALL keeps all rows including duplicates.","UNION performs an implicit DISTINCT which requires sorting/hashing, making it slower than UNION ALL on large datasets.","Both queries must produce the same number of columns with compatible data types for UNION to work."],code:"-- UNION: combine and deduplicate\nSELECT first_name, last_name, 'employee' AS source\nFROM employees\nUNION\nSELECT first_name, last_name, 'contractor' AS source\nFROM contractors;\n\n-- UNION ALL: keep all rows (faster)\nSELECT product_name, sale_date, amount\nFROM online_sales\nUNION ALL\nSELECT product_name, sale_date, amount\nFROM store_sales;\n-- Keeps duplicates if same sale recorded in both"},
{name:"INTERSECT",theory:["INTERSECT returns only rows that appear in both query results - the common set between two result sets.","Like UNION, INTERSECT eliminates duplicates from the final result by default.","INTERSECT ALL (supported in some databases) preserves duplicate counts: returns each row min(countA, countB) times."],code:"-- Customers who bought both online AND in-store\nSELECT customer_id FROM online_orders\nINTERSECT\nSELECT customer_id FROM store_orders;\n\n-- Products available in BOTH warehouses\nSELECT product_id, product_name\nFROM warehouse_a_inventory\nINTERSECT\nSELECT product_id, product_name\nFROM warehouse_b_inventory;\n\n-- Equivalent using JOIN\nSELECT DISTINCT a.customer_id\nFROM online_orders a\nJOIN store_orders b ON a.customer_id = b.customer_id;"},
{name:"EXCEPT (MINUS)",theory:["EXCEPT returns rows from the first query that do not appear in the second query result (set difference).","Oracle uses MINUS instead of EXCEPT; they are functionally identical - returning rows in A but not in B.","EXCEPT removes duplicates from the result; EXCEPT ALL preserves counts: returns max(0, countA - countB) for each row."],code:"-- Customers who bought online but NOT in-store\nSELECT customer_id FROM online_orders\nEXCEPT\nSELECT customer_id FROM store_orders;\n\n-- Products in catalog but never sold\nSELECT product_id FROM products\nEXCEPT\nSELECT product_id FROM order_items;\n\n-- Equivalent using LEFT JOIN\nSELECT p.product_id FROM products p\nLEFT JOIN order_items oi ON p.product_id = oi.product_id\nWHERE oi.product_id IS NULL;"},
{name:"Column Matching Rules",theory:["All queries in a set operation must have the same number of columns in the same positional order.","Data types must be compatible (implicitly convertible); the result uses the higher-precedence type.","Column names in the result come from the FIRST query; aliases in subsequent queries are ignored."],code:"-- Column count must match\nSELECT id, name, email FROM customers\nUNION\nSELECT id, name, email FROM suppliers;\n-- Both have 3 columns - valid\n\n-- Type compatibility\nSELECT id, name, created_at FROM users  -- INT, VARCHAR, TIMESTAMP\nUNION\nSELECT id, name, signup_date FROM leads; -- INT, VARCHAR, DATE (compatible)\n\n-- Column names come from first query\nSELECT first_name AS name, salary AS pay FROM employees\nUNION\nSELECT company_name, revenue FROM vendors;\n-- Result columns are: name, pay (from first query)"},
{name:"Practical Patterns",theory:["UNION ALL with source tags combines data from multiple tables into a unified view for reporting.","EXCEPT is powerful for data validation: comparing expected vs actual results or finding missing records.","Set operations can be combined and ordered: use parentheses and apply ORDER BY only to the final result."],code:"-- Combined audit log from multiple tables\nSELECT 'order' AS event_type, order_id AS ref_id,\n       created_at, customer_id\nFROM orders\nUNION ALL\nSELECT 'return', return_id, created_at, customer_id\nFROM returns\nUNION ALL\nSELECT 'refund', refund_id, created_at, customer_id\nFROM refunds\nORDER BY created_at DESC;\n\n-- Data validation: find IDs in staging missing from production\nSELECT id FROM staging_customers\nEXCEPT\nSELECT id FROM production_customers;"}
],
examples:[
{title:"Unified Contact List",desc:"Combine employees, contractors, and vendors into one contact directory.",code:"SELECT\n    first_name, last_name, email, phone,\n    'Employee' AS contact_type\nFROM employees WHERE status = 'active'\nUNION ALL\nSELECT\n    first_name, last_name, email, phone,\n    'Contractor' AS contact_type\nFROM contractors WHERE contract_end > CURRENT_DATE\nUNION ALL\nSELECT\n    contact_name, '', vendor_email, vendor_phone,\n    'Vendor' AS contact_type\nFROM vendors WHERE active = true\nORDER BY last_name, first_name;"},
{title:"Finding Data Gaps with EXCEPT",desc:"Compare two datasets to find discrepancies during migration.",code:"-- Records in source missing from target\nSELECT order_id, customer_id, total\nFROM source_orders\nEXCEPT\nSELECT order_id, customer_id, total\nFROM target_orders;\n\n-- Records in target not in source (extra records)\nSELECT order_id, customer_id, total\nFROM target_orders\nEXCEPT\nSELECT order_id, customer_id, total\nFROM source_orders;"},
{title:"Multi-Channel Customer Analysis",desc:"Use INTERSECT and EXCEPT to segment customers by channel activity.",code:"-- Customers active on ALL channels\nSELECT customer_id FROM web_purchases\nINTERSECT\nSELECT customer_id FROM mobile_purchases\nINTERSECT\nSELECT customer_id FROM store_purchases;\n\n-- Web-only customers (not on mobile or store)\nSELECT customer_id FROM web_purchases\nEXCEPT\nSELECT customer_id FROM mobile_purchases\nEXCEPT\nSELECT customer_id FROM store_purchases;"}
],
practice:[
{q:"A query uses UNION between two tables to combine employee names and contractor names. The result has fewer rows than the sum of both tables. Why?",options:["A) Some rows were deleted","B) UNION removes duplicate rows that appear in both result sets; use UNION ALL to keep all rows","C) The tables have different column counts","D) UNION limits output to 1000 rows"],answer:"B",d:"E"},
{q:"Two queries are combined with UNION: the first has 3 columns and the second has 4 columns. What happens?",options:["A) Extra column is filled with NULL","B) The query fails with an error because all queries in a UNION must have the same number of columns","C) The 4th column is silently dropped","D) It works fine"],answer:"B",d:"E"},
{q:"SELECT dept FROM employees UNION ALL SELECT dept FROM contractors returns 500 rows. If UNION ALL is changed to UNION, the result is 45 rows. What does this mean?",options:["A) 455 rows were randomly removed","B) There are only 45 unique department values across both tables combined; UNION deduplicates the results","C) UNION is broken","D) The second query returned 0 rows"],answer:"B",d:"E"},
{q:"A developer wants customers who appear in BOTH the online_orders and store_orders tables. Which set operation is most appropriate?",options:["A) UNION","B) INTERSECT - it returns only rows common to both result sets","C) EXCEPT","D) CROSS JOIN"],answer:"B",d:"E"},
{q:"Query A EXCEPT Query B returns 30 rows. Query B EXCEPT Query A returns 15 rows. What can you determine?",options:["A) The queries are broken","B) 30 rows are unique to A (not in B) and 15 rows are unique to B (not in A); EXCEPT is not symmetric","C) There are 45 rows total","D) Both queries return the same data"],answer:"B",d:"E"},
{q:"In a UNION of two queries, the first query has column alias 'full_name' and the second has 'company_name'. What is the result column named?",options:["A) company_name","B) full_name - column names always come from the first query in a UNION","C) Both names appear","D) It causes an error"],answer:"B",d:"E"},
{q:"A report combines sales from 12 monthly tables using UNION ALL. Adding ORDER BY to each individual SELECT fails. Where should ORDER BY go?",options:["A) In each SELECT statement","B) Only at the very end after all UNION ALL operations; ORDER BY applies to the final combined result set","C) Before the first UNION ALL","D) ORDER BY cannot be used with UNION"],answer:"B",d:"E"},
{q:"A data migration uses EXCEPT to validate completeness. Source has 1M rows, target has 1M rows, but source EXCEPT target returns 500 rows. What does this indicate?",options:["A) The migration failed completely","B) 500 rows in the source do not have matching rows in the target - they were either not migrated or were modified during migration","C) The source has 500 extra rows","D) EXCEPT doesn't work on large tables"],answer:"B",d:"M"},
{q:"UNION vs UNION ALL on 10M rows per query: UNION takes 45 seconds but UNION ALL takes 3 seconds. Why the difference?",options:["A) UNION ALL reads fewer rows","B) UNION must sort or hash all 20M combined rows to remove duplicates, which is expensive; UNION ALL simply concatenates without deduplication","C) UNION ALL skips the second query","D) The network is slow for UNION"],answer:"B",d:"M"},
{q:"A developer writes: (SELECT ... EXCEPT SELECT ...) UNION (SELECT ... EXCEPT SELECT ...). Is this valid and what does it produce?",options:["A) Invalid syntax - cannot combine set operations","B) Valid - it computes two separate differences and then combines their results with UNION (removing duplicates between the two differences)","C) Only UNION can be used with EXCEPT","D) Parentheses are not allowed in SQL"],answer:"B",d:"M"},
{q:"A table has columns: id INT, name VARCHAR, score DECIMAL. Another table has: id INT, name TEXT, score INT. Will UNION work?",options:["A) No - data types must be identical","B) Yes - VARCHAR/TEXT and DECIMAL/INT are compatible types that can be implicitly converted; the result uses the wider type","C) Only if CAST is used on every column","D) It depends on the column names"],answer:"B",d:"M"},
{q:"INTERSECT on two large tables (5M rows each) is slow. The optimizer shows a hash join plan. A developer suggests using INNER JOIN with DISTINCT instead. Would this help?",options:["A) INNER JOIN is always slower","B) They are logically equivalent; the optimizer often creates the same plan, but INNER JOIN allows adding indexes and join hints that may improve performance","C) INTERSECT cannot be rewritten as JOIN","D) DISTINCT makes queries slower"],answer:"B",d:"M"},
{q:"A query uses EXCEPT ALL (supported in PostgreSQL). Table A has row X appearing 5 times, Table B has it 3 times. How many times does X appear in the result?",options:["A) 5 times","B) 2 times - EXCEPT ALL subtracts the count: max(0, countA - countB) = max(0, 5-3) = 2","C) 0 times","D) 3 times"],answer:"B",d:"M"},
{q:"A report needs data from: current_year_sales UNION ALL last_year_sales UNION ALL two_years_ago_sales, then filtered WHERE region = 'West'. Is it better to filter before or after the UNION ALL?",options:["A) Filtering after is always better","B) Filter in each individual SELECT before UNION ALL - this reduces rows entering the UNION and allows each table to use its own indexes on region","C) It makes no difference","D) Filtering before UNION ALL is invalid syntax"],answer:"B",d:"M"},
{q:"A developer accidentally uses UNION instead of UNION ALL when combining daily transaction logs. Each day's log has no overlap with other days. What is the impact?",options:["A) No impact since there are no duplicates to remove","B) The query still works correctly but wastes resources on unnecessary deduplication sorting/hashing, degrading performance without changing results","C) Data is lost","D) The query fails"],answer:"B",d:"M"},
{q:"Three set operations are chained: A UNION B INTERSECT C. What is the order of evaluation? (Standard SQL)",options:["A) Left to right: (A UNION B) INTERSECT C","B) INTERSECT has higher precedence than UNION in standard SQL, so it evaluates as: A UNION (B INTERSECT C)","C) All execute simultaneously","D) Right to left always"],answer:"B",d:"H"},
{q:"A recursive CTE uses UNION (not UNION ALL) in its definition. How does this differ from the typical UNION ALL recursive CTE?",options:["A) No difference in behavior","B) UNION deduplicates at each recursion level, effectively preventing the CTE from visiting already-seen rows - useful for cycle detection in graph traversal","C) UNION is not allowed in recursive CTEs","D) It makes recursion faster"],answer:"B",d:"H"},
{q:"A data warehouse ETL process uses EXCEPT to find new/changed rows between staging and production (CDC pattern). With 100M rows in each table, EXCEPT takes 20 minutes. What is a more scalable approach?",options:["A) Use UNION instead","B) Hash-based comparison: compute a checksum/hash of each row's values and compare hashes, or use timestamp-based incremental loads instead of full-set comparison","C) EXCEPT is the only way to compare tables","D) Run the query more often to reduce row counts"],answer:"B",d:"H"},
{q:"A federated query uses UNION ALL across tables in different databases/servers. The final ORDER BY causes all data to be pulled to one node for sorting. How do you optimize this?",options:["A) Remove the ORDER BY","B) Push ORDER BY and LIMIT into each individual SELECT to reduce data transfer, then do a final merge-sort on the pre-sorted partial results","C) Use UNION instead of UNION ALL","D) Sorting is always fast in federated queries"],answer:"B",d:"H"},
{q:"A query: SELECT id FROM big_table_a EXCEPT SELECT id FROM big_table_b takes 5 minutes. Both tables have 50M rows and id is indexed. An alternative using NOT EXISTS with a correlated subquery takes 30 seconds. Why might NOT EXISTS be faster?",options:["A) NOT EXISTS is always faster than EXCEPT","B) EXCEPT must sort/hash both complete result sets for comparison, while NOT EXISTS can use the index on big_table_b to probe each row from A individually, and can leverage index-only scans","C) EXCEPT doesn't use indexes","D) The tables are too large for EXCEPT"],answer:"B",d:"H"}
]},


{id:8,title:"Data Types & Functions",color:"#fb923c",chips:["String","Date","CAST","CASE","COALESCE"],
subtopics:[
{name:"String Functions",theory:["CONCAT (or ||) joins strings; SUBSTRING extracts parts; TRIM removes leading/trailing whitespace or specified characters.","REPLACE substitutes all occurrences of a substring; LENGTH/LEN returns character count; UPPER/LOWER change case.","String functions are essential for data cleaning, formatting output, and building dynamic values in queries."],code:"-- String manipulation\nSELECT\n    CONCAT(first_name, ' ', last_name) AS full_name,\n    UPPER(email) AS email_upper,\n    LENGTH(phone) AS phone_length,\n    SUBSTRING(ssn, 8, 4) AS last_four,\n    REPLACE(address, '\\n', ', ') AS one_line_addr,\n    TRIM(BOTH ' ' FROM user_input) AS cleaned\nFROM customers;\n\n-- Pattern extraction\nSELECT\n    email,\n    SUBSTRING(email FROM 1 FOR POSITION('@' IN email)-1) AS username,\n    SUBSTRING(email FROM POSITION('@' IN email)+1) AS domain\nFROM users;"},
{name:"Date/Time Functions",theory:["CURRENT_DATE returns today's date; CURRENT_TIMESTAMP returns date+time; NOW() is a common alias in many databases.","DATEADD/DATE_ADD adds intervals to dates; DATEDIFF computes the difference between dates in specified units.","EXTRACT pulls parts from dates (year, month, day); DATE_TRUNC truncates to a specified precision (month, quarter, year)."],code:"-- Date operations\nSELECT\n    order_date,\n    CURRENT_DATE AS today,\n    order_date + INTERVAL '30 days' AS due_date,\n    EXTRACT(YEAR FROM order_date) AS order_year,\n    EXTRACT(MONTH FROM order_date) AS order_month,\n    DATE_TRUNC('month', order_date) AS month_start,\n    AGE(CURRENT_DATE, order_date) AS order_age\nFROM orders;\n\n-- DATEDIFF examples\nSELECT\n    hire_date,\n    CURRENT_DATE - hire_date AS days_employed,\n    EXTRACT(YEAR FROM AGE(CURRENT_DATE, hire_date)) AS years_tenure\nFROM employees;"},
{name:"Type Conversion",theory:["CAST(expr AS type) explicitly converts between data types; CONVERT is the SQL Server/MySQL alternative syntax.","Implicit conversion happens automatically (e.g., INT to BIGINT) but can cause issues like silent precision loss.","Failed casts throw errors by default; TRY_CAST (SQL Server) or safe_cast (BigQuery) return NULL on failure instead."],code:"-- Explicit CAST\nSELECT\n    CAST(price AS INTEGER) AS rounded_price,\n    CAST(quantity AS DECIMAL(10,2)) AS qty_decimal,\n    CAST(order_date AS VARCHAR) AS date_string,\n    CAST('2024-06-15' AS DATE) AS parsed_date\nFROM order_items;\n\n-- Avoiding implicit conversion issues\nSELECT *\nFROM orders\nWHERE order_date >= CAST('2024-01-01' AS DATE);\n-- Don't: WHERE CAST(order_date AS VARCHAR) LIKE '2024%' (slow!);\n\n-- Type-safe division\nSELECT\n    total_sales,\n    num_transactions,\n    CAST(total_sales AS DECIMAL(12,2)) / NULLIF(num_transactions, 0) AS avg_transaction\nFROM daily_summary;"},
{name:"Conditional Expressions",theory:["CASE WHEN evaluates conditions in order and returns the value for the first TRUE condition; ELSE handles no-match.","COALESCE returns the first non-NULL argument; useful for providing default values when data might be missing.","NULLIF(a, b) returns NULL if a equals b, otherwise returns a; useful to prevent division by zero errors."],code:"-- CASE WHEN for categorization\nSELECT\n    product_name,\n    price,\n    CASE\n        WHEN price < 10 THEN 'Budget'\n        WHEN price < 50 THEN 'Mid-Range'\n        WHEN price < 200 THEN 'Premium'\n        ELSE 'Luxury'\n    END AS price_tier\nFROM products;\n\n-- COALESCE for defaults\nSELECT\n    COALESCE(nickname, first_name, 'Unknown') AS display_name,\n    COALESCE(phone, email, 'No contact') AS primary_contact\nFROM users;\n\n-- NULLIF to prevent division by zero\nSELECT total / NULLIF(count, 0) AS average\nFROM metrics;"},
{name:"Numeric Functions",theory:["ROUND rounds to specified decimal places; CEIL/CEILING rounds up; FLOOR rounds down to nearest integer.","ABS returns absolute value; MOD (or %) returns the remainder of division; POWER raises to an exponent.","GREATEST/LEAST return the largest/smallest value from a list of expressions; useful for clamping values."],code:"-- Numeric operations\nSELECT\n    price,\n    ROUND(price, 2) AS rounded,\n    CEIL(price) AS ceiling,\n    FLOOR(price) AS floored,\n    ABS(balance) AS abs_balance,\n    MOD(employee_id, 10) AS bucket,\n    POWER(1.05, years) AS compound_factor\nFROM products;\n\n-- Clamping values with GREATEST/LEAST\nSELECT\n    score,\n    GREATEST(0, LEAST(100, score)) AS clamped_score,\n    -- Ensures score is between 0 and 100\n    GREATEST(price * 0.8, min_price) AS final_price\nFROM assessments;"}
],
examples:[
{title:"Data Cleaning Pipeline",desc:"Use string and type functions to clean and standardize messy input data.",code:"SELECT\n    TRIM(UPPER(SUBSTRING(raw_name, 1, 1))) ||\n        LOWER(SUBSTRING(TRIM(raw_name), 2)) AS proper_name,\n    LOWER(TRIM(raw_email)) AS clean_email,\n    REPLACE(REPLACE(raw_phone, '-', ''), ' ', '') AS digits_only,\n    CASE\n        WHEN LENGTH(REPLACE(raw_phone, '-', '')) = 10 THEN 'valid'\n        ELSE 'invalid'\n    END AS phone_status,\n    COALESCE(NULLIF(TRIM(city), ''), 'Unknown') AS city\nFROM raw_imports;"},
{title:"Date-Based Reporting",desc:"Generate time-period summaries using date functions and CASE expressions.",code:"SELECT\n    DATE_TRUNC('month', order_date) AS month,\n    COUNT(*) AS order_count,\n    SUM(total) AS revenue,\n    ROUND(AVG(total), 2) AS avg_order_value,\n    SUM(CASE WHEN status = 'returned' THEN 1 ELSE 0 END) AS returns,\n    ROUND(100.0 * SUM(CASE WHEN status = 'returned' THEN 1 ELSE 0 END)\n        / NULLIF(COUNT(*), 0), 1) AS return_pct\nFROM orders\nWHERE order_date >= DATE_TRUNC('year', CURRENT_DATE)\nGROUP BY DATE_TRUNC('month', order_date)\nORDER BY month;"},
{title:"Dynamic Categorization with CASE",desc:"Build multi-dimensional categorization using nested CASE and functions.",code:"SELECT\n    customer_id,\n    total_purchases,\n    days_since_last_order,\n    CASE\n        WHEN total_purchases > 10000 AND days_since_last_order < 30 THEN 'VIP Active'\n        WHEN total_purchases > 10000 THEN 'VIP At Risk'\n        WHEN total_purchases > 1000 AND days_since_last_order < 60 THEN 'Regular Active'\n        WHEN days_since_last_order > 180 THEN 'Churned'\n        ELSE 'Occasional'\n    END AS segment,\n    GREATEST(0, 90 - days_since_last_order) AS urgency_score\nFROM customer_summary;"}
],
practice:[
{q:"CONCAT('Hello', NULL, 'World') returns what in most databases?",options:["A) 'HelloWorld'","B) NULL - because concatenating anything with NULL produces NULL in standard SQL (use COALESCE to handle NULLs)","C) 'Hello World'","D) An error"],answer:"B",d:"E"},
{q:"A column stores dates as VARCHAR in format 'MM/DD/YYYY'. To filter dates after Jan 1 2024, a developer writes WHERE date_col > '01/01/2024'. This returns wrong results for December dates. Why?",options:["A) The query is correct","B) String comparison is lexicographic: '12/15/2023' > '01/01/2024' is TRUE because '1' > '0', giving incorrect date logic. Must CAST to DATE first.","C) VARCHAR cannot store dates","D) The > operator doesn't work with strings"],answer:"B",d:"E"},
{q:"COALESCE(NULL, NULL, 'default', 'other') returns what?",options:["A) NULL","B) 'default' - COALESCE returns the first non-NULL argument scanning left to right","C) 'other'","D) An error because of multiple NULLs"],answer:"B",d:"E"},
{q:"A query uses: SELECT ROUND(15.5) and SELECT ROUND(16.5). In banker's rounding (round-half-even), what does ROUND(16.5) return?",options:["A) 17","B) 16 - banker's rounding rounds .5 to the nearest even number (16 is even); though standard SQL ROUND typically rounds .5 up, some databases use banker's rounding","C) 16.5","D) An error"],answer:"B",d:"E"},
{q:"DATE_TRUNC('month', '2024-03-15') returns what?",options:["A) '2024-03-31'","B) '2024-03-01' - DATE_TRUNC truncates to the start of the specified period (first day of March)","C) '2024-03-15'","D) '2024-01-01'"],answer:"B",d:"E"},
{q:"A query: SELECT total / count FROM metrics returns an error when count is 0. How do you make it return NULL instead?",options:["A) Add a TRY/CATCH block","B) Use NULLIF: SELECT total / NULLIF(count, 0) - NULLIF returns NULL when count equals 0, and division by NULL yields NULL","C) Use COALESCE on the result","D) Division by zero always returns 0 in SQL"],answer:"B",d:"E"},
{q:"EXTRACT(DOW FROM DATE '2024-01-01') returns 1 in PostgreSQL. What does DOW represent?",options:["A) Day of Week as a name","B) Day of Week as a number (0=Sunday, 1=Monday in PostgreSQL) - it returns the integer day number","C) Day of Work","D) Date of Week calculation"],answer:"B",d:"E"},
{q:"A report concatenates address fields: street || ', ' || city || ', ' || state. Some customers have NULL city. The entire result becomes NULL for those rows. How do you fix this?",options:["A) Remove the city column","B) Wrap nullable fields in COALESCE: street || ', ' || COALESCE(city, '') || ', ' || state to substitute empty string for NULL","C) Use TRIM on the result","D) NULL concatenation is a feature"],answer:"B",d:"M"},
{q:"CAST('abc' AS INTEGER) throws an error. A pipeline needs to handle dirty data gracefully, returning NULL for non-numeric values. What function helps?",options:["A) Use COALESCE('abc', 0)","B) Use TRY_CAST('abc' AS INTEGER) which returns NULL on conversion failure instead of erroring (SQL Server/BigQuery), or a CASE with regex check","C) All strings can be cast to integers","D) Use NULLIF"],answer:"B",d:"M"},
{q:"A query computes age: EXTRACT(YEAR FROM CURRENT_DATE) - EXTRACT(YEAR FROM birth_date). For someone born Dec 15, 2000, on March 1, 2024, it returns 24. But their actual age is 23. Why?",options:["A) EXTRACT is broken","B) Year subtraction doesn't account for whether the birthday has occurred yet this year; proper age calculation needs AGE() function or month/day comparison","C) The birth_date is wrong","D) CURRENT_DATE is inaccurate"],answer:"B",d:"M"},
{q:"A CASE expression has no ELSE clause: CASE WHEN status='A' THEN 'Active' WHEN status='I' THEN 'Inactive' END. If status is 'P', what is returned?",options:["A) An error","B) NULL - when no WHEN condition matches and there is no ELSE clause, CASE returns NULL by default","C) Empty string","D) The original status value 'P'"],answer:"B",d:"M"},
{q:"A developer uses: WHERE UPPER(email) = 'USER@EXAMPLE.COM' on a table with 10M rows. This is slow despite an index on email. Why?",options:["A) UPPER doesn't work in WHERE","B) Applying a function (UPPER) to the indexed column prevents the optimizer from using the index; it must scan all rows. A functional index on UPPER(email) or case-insensitive collation fixes this.","C) The index is too small","D) 10M rows is too few for an index to help"],answer:"B",d:"M"},
{q:"A column stores monetary values as FLOAT. After many additions, $100.00 shows as $99.99999999997. What is the fix?",options:["A) Use ROUND in every query","B) Change the column type to DECIMAL/NUMERIC with fixed precision (e.g., DECIMAL(12,2)) which stores exact values without floating-point representation errors","C) Floating point is accurate enough for money","D) Store values as strings instead"],answer:"B",d:"M"},
{q:"DATE_TRUNC('quarter', '2024-08-15') returns '2024-07-01'. A report needs fiscal quarters starting in April. How do you get fiscal quarter start dates?",options:["A) DATE_TRUNC always works for fiscal quarters","B) Shift the date back by 3 months before truncating, then shift forward: DATE_TRUNC('quarter', date - INTERVAL '3 months') + INTERVAL '3 months'","C) Use EXTRACT(QUARTER ...) instead","D) Fiscal quarters cannot be computed in SQL"],answer:"B",d:"M"},
{q:"GREATEST(10, NULL, 20) returns NULL in standard SQL. A developer expects 20. Why does NULL win?",options:["A) GREATEST always returns the first argument","B) In standard SQL, any comparison with NULL yields NULL; GREATEST returns NULL if any argument is NULL. Use COALESCE on inputs to handle NULLs.","C) 20 is returned correctly","D) GREATEST doesn't accept numbers"],answer:"B",d:"M"},
{q:"A column stores duration as VARCHAR '2h 30m'. You need to sort by actual duration. What approach converts this for sorting?",options:["A) Sort alphabetically - it will work","B) Parse the string using regex/pattern matching to extract hours and minutes, then compute total minutes: CAST(hours_part AS INT)*60 + CAST(minutes_part AS INT)","C) Use LENGTH for sorting","D) VARCHAR columns cannot be sorted"],answer:"B",d:"H"},
{q:"An application stores JSON in a TEXT column. Querying with LIKE '%\"status\":\"active\"%' works but is slow on 50M rows. What is the architectural improvement?",options:["A) Add more LIKE patterns","B) Use the database's native JSON type with JSON-path indexing (GIN index in PostgreSQL, JSON indexes in MySQL 8+) for efficient querying without text scanning","C) Parse JSON in application code only","D) Convert all JSON to CSV"],answer:"B",d:"H"},
{q:"A CASE expression is used inside an aggregate: SUM(CASE WHEN region='East' THEN revenue END). This is a pivot pattern. With 50 regions, writing 50 CASE expressions is tedious. What is a better approach?",options:["A) Write all 50 CASE expressions manually","B) Use a PIVOT/CROSSTAB function (available in SQL Server, PostgreSQL tablefunc) or generate the query dynamically to automatically create columns per region","C) Use 50 separate queries","D) GROUP BY handles pivoting natively"],answer:"B",d:"H"},
{q:"A calculation: CAST(large_count AS DECIMAL) / CAST(total AS DECIMAL) sometimes returns 0.000000000000 for very small ratios. The application needs ratios as small as 1 in 1 billion. What precision should be used?",options:["A) DECIMAL(10,2) is sufficient","B) DECIMAL(19,18) or similar high-scale precision to capture ratios like 0.000000001; alternatively multiply numerator by a large factor (e.g., 1e9) and work with integers","C) FLOAT is better for very small numbers","D) SQL cannot represent such small numbers"],answer:"B",d:"H"},
{q:"A multi-timezone application stores all timestamps in UTC. A report needs results grouped by the user's local date. Users are in 24 different timezones. What SQL approach handles this correctly?",options:["A) Store dates as strings in local time","B) Convert UTC timestamps to the user's timezone using AT TIME ZONE (or CONVERT_TZ), then DATE_TRUNC to local date before grouping. Ensure the timezone offset accounts for DST.","C) Group by UTC date - it's close enough","D) Timezones cannot be handled in SQL"],answer:"B",d:"H"}
]},


{id:9,title:"DDL & Table Design",color:"#f87171",chips:["CREATE","ALTER","DROP","Constraints","Keys"],
subtopics:[
{name:"CREATE TABLE",theory:["CREATE TABLE defines a new table with column names, data types, and optional inline constraints.","Choose appropriate data types: INT/BIGINT for IDs, VARCHAR(n) for variable text, DECIMAL for money, TIMESTAMP for dates+times.","IF NOT EXISTS prevents errors when the table already exists; it silently skips creation instead of failing."],code:"-- Basic CREATE TABLE\nCREATE TABLE employees (\n    employee_id    SERIAL PRIMARY KEY,\n    first_name     VARCHAR(50) NOT NULL,\n    last_name      VARCHAR(50) NOT NULL,\n    email          VARCHAR(100) UNIQUE NOT NULL,\n    hire_date      DATE NOT NULL DEFAULT CURRENT_DATE,\n    salary         DECIMAL(10,2) CHECK (salary > 0),\n    department_id  INT REFERENCES departments(id),\n    status         VARCHAR(20) DEFAULT 'active',\n    created_at     TIMESTAMP DEFAULT CURRENT_TIMESTAMP\n);\n\n-- CREATE TABLE IF NOT EXISTS\nCREATE TABLE IF NOT EXISTS audit_log (\n    id BIGSERIAL PRIMARY KEY,\n    action VARCHAR(50),\n    performed_at TIMESTAMP DEFAULT NOW()\n);"},
{name:"Constraints",theory:["PRIMARY KEY uniquely identifies each row (combines UNIQUE + NOT NULL); only one per table, can be composite.","FOREIGN KEY enforces referential integrity by ensuring values in a column match values in another table's primary/unique key.","CHECK constraints enforce domain rules (e.g., age > 0); DEFAULT provides a value when INSERT doesn't specify one."],code:"-- All constraint types\nCREATE TABLE orders (\n    order_id       INT PRIMARY KEY,\n    customer_id    INT NOT NULL,\n    order_date     DATE NOT NULL,\n    status         VARCHAR(20) DEFAULT 'pending',\n    total          DECIMAL(12,2),\n    -- Named constraints\n    CONSTRAINT fk_customer\n        FOREIGN KEY (customer_id) REFERENCES customers(id)\n        ON DELETE RESTRICT ON UPDATE CASCADE,\n    CONSTRAINT chk_status\n        CHECK (status IN ('pending','shipped','delivered','cancelled')),\n    CONSTRAINT chk_total\n        CHECK (total >= 0)\n);\n\n-- Composite primary key\nCREATE TABLE order_items (\n    order_id INT, product_id INT, quantity INT,\n    PRIMARY KEY (order_id, product_id)\n);"},
{name:"ALTER TABLE",theory:["ALTER TABLE modifies an existing table structure: add/drop columns, add/drop constraints, rename columns or tables.","Adding a NOT NULL column to a table with existing data requires a DEFAULT value or the column must allow NULLs initially.","Schema migrations in production should be backward-compatible; add new columns as nullable, backfill, then add constraints."],code:"-- Add a column\nALTER TABLE employees ADD COLUMN phone VARCHAR(20);\n\n-- Add column with default (safe for existing rows)\nALTER TABLE employees ADD COLUMN is_remote BOOLEAN DEFAULT FALSE;\n\n-- Drop a column\nALTER TABLE employees DROP COLUMN fax_number;\n\n-- Add a constraint after table creation\nALTER TABLE orders ADD CONSTRAINT fk_product\n    FOREIGN KEY (product_id) REFERENCES products(id);\n\n-- Modify column type\nALTER TABLE products ALTER COLUMN price TYPE DECIMAL(12,2);\n\n-- Rename\nALTER TABLE employees RENAME COLUMN dept TO department_id;\nALTER TABLE old_table RENAME TO new_table;"},
{name:"DROP & TRUNCATE",theory:["DROP TABLE removes the table structure and all data permanently; CASCADE also drops dependent objects (views, FKs).","TRUNCATE removes all rows instantly without logging individual deletes; it resets identity counters and is non-rollbackable in some databases.","DELETE removes rows one-by-one (can have WHERE clause, fires triggers, can be rolled back); TRUNCATE is a bulk operation."],code:"-- DROP TABLE\nDROP TABLE IF EXISTS temp_reports;\nDROP TABLE orders CASCADE;  -- also drops dependent FKs, views\n\n-- TRUNCATE: fast delete all rows\nTRUNCATE TABLE session_logs;\nTRUNCATE TABLE daily_metrics RESTART IDENTITY; -- reset auto-increment\n\n-- Key differences:\n-- DELETE: row-by-row, WHERE clause, triggers fire, rollback-able\nDELETE FROM logs WHERE created_at < '2023-01-01';\n\n-- TRUNCATE: instant, no WHERE, no triggers, resets sequences\nTRUNCATE TABLE logs;\n\n-- DROP: removes table entirely (structure + data)\nDROP TABLE logs;"},
{name:"Table Design Best Practices",theory:["Normalize to 3NF to eliminate redundancy: every non-key column depends on the key, the whole key, and nothing but the key.","Choose surrogate keys (auto-increment IDs) for stability; use natural keys only when they are truly immutable and unique.","Name tables as plural nouns (employees, orders); columns as snake_case; include created_at/updated_at for audit trail."],code:"-- Well-designed table with best practices\nCREATE TABLE products (\n    id             BIGSERIAL PRIMARY KEY,          -- surrogate key\n    sku            VARCHAR(50) UNIQUE NOT NULL,    -- natural key\n    name           VARCHAR(200) NOT NULL,\n    description    TEXT,\n    category_id    INT NOT NULL REFERENCES categories(id),\n    price          DECIMAL(10,2) NOT NULL CHECK (price >= 0),\n    cost           DECIMAL(10,2) CHECK (cost >= 0),\n    weight_kg      DECIMAL(8,3),\n    is_active      BOOLEAN NOT NULL DEFAULT TRUE,\n    created_at     TIMESTAMP NOT NULL DEFAULT NOW(),\n    updated_at     TIMESTAMP NOT NULL DEFAULT NOW()\n);\n\n-- Indexes for common query patterns\nCREATE INDEX idx_products_category ON products(category_id);\nCREATE INDEX idx_products_active ON products(is_active) WHERE is_active;"}
],
examples:[
{title:"E-Commerce Schema Design",desc:"Create a normalized schema for an online store with proper constraints and relationships.",code:"CREATE TABLE categories (\n    id SERIAL PRIMARY KEY,\n    name VARCHAR(100) NOT NULL UNIQUE,\n    parent_id INT REFERENCES categories(id)\n);\n\nCREATE TABLE products (\n    id BIGSERIAL PRIMARY KEY,\n    sku VARCHAR(50) UNIQUE NOT NULL,\n    name VARCHAR(200) NOT NULL,\n    category_id INT NOT NULL REFERENCES categories(id),\n    price DECIMAL(10,2) NOT NULL CHECK (price > 0),\n    stock INT NOT NULL DEFAULT 0 CHECK (stock >= 0),\n    created_at TIMESTAMP DEFAULT NOW()\n);\n\nCREATE TABLE orders (\n    id BIGSERIAL PRIMARY KEY,\n    customer_id INT NOT NULL REFERENCES customers(id),\n    status VARCHAR(20) DEFAULT 'pending'\n        CHECK (status IN ('pending','paid','shipped','delivered')),\n    total DECIMAL(12,2) NOT NULL,\n    ordered_at TIMESTAMP DEFAULT NOW()\n);"},
{title:"Schema Migration Script",desc:"Safe migration that adds new features without breaking existing functionality.",code:"-- Migration: Add loyalty program support\n-- Step 1: Add nullable columns (backward compatible)\nALTER TABLE customers ADD COLUMN loyalty_tier VARCHAR(20);\nALTER TABLE customers ADD COLUMN loyalty_points INT DEFAULT 0;\n\n-- Step 2: Backfill data\nUPDATE customers SET loyalty_tier = 'bronze', loyalty_points = 0\nWHERE loyalty_tier IS NULL;\n\n-- Step 3: Add constraints after backfill\nALTER TABLE customers ALTER COLUMN loyalty_tier SET NOT NULL;\nALTER TABLE customers ALTER COLUMN loyalty_tier SET DEFAULT 'bronze';\nALTER TABLE customers ADD CONSTRAINT chk_tier\n    CHECK (loyalty_tier IN ('bronze','silver','gold','platinum'));\n\n-- Step 4: Add index for new query patterns\nCREATE INDEX idx_loyalty ON customers(loyalty_tier, loyalty_points DESC);"},
{title:"Audit Trail Design",desc:"Design tables with built-in audit capabilities for compliance tracking.",code:"-- Audit-ready table design\nCREATE TABLE transactions (\n    id BIGSERIAL PRIMARY KEY,\n    account_id INT NOT NULL REFERENCES accounts(id),\n    amount DECIMAL(15,2) NOT NULL,\n    type VARCHAR(20) NOT NULL CHECK (type IN ('credit','debit')),\n    description TEXT,\n    created_by INT NOT NULL REFERENCES users(id),\n    created_at TIMESTAMP NOT NULL DEFAULT NOW(),\n    -- Soft delete instead of hard delete\n    is_deleted BOOLEAN NOT NULL DEFAULT FALSE,\n    deleted_at TIMESTAMP,\n    deleted_by INT REFERENCES users(id)\n);\n\n-- Separate audit log table\nCREATE TABLE audit_log (\n    id BIGSERIAL PRIMARY KEY,\n    table_name VARCHAR(50) NOT NULL,\n    record_id BIGINT NOT NULL,\n    action VARCHAR(10) NOT NULL CHECK (action IN ('INSERT','UPDATE','DELETE')),\n    old_values JSONB,\n    new_values JSONB,\n    performed_by INT REFERENCES users(id),\n    performed_at TIMESTAMP DEFAULT NOW()\n);"}
],
practice:[
{q:"A developer creates a table without specifying PRIMARY KEY. What is the consequence?",options:["A) The table cannot be created","B) The table is created but has no guaranteed unique row identifier, making updates and deletes on specific rows difficult and preventing foreign key references","C) SQL automatically adds a primary key","D) Every column becomes a key"],answer:"B",d:"E"},
{q:"A FOREIGN KEY references a column in another table. The referenced row is deleted. What happens if ON DELETE is not specified?",options:["A) The referencing rows are automatically deleted","B) The delete fails with an error (RESTRICT is the default behavior) because dependent rows still reference that value","C) The foreign key column becomes NULL","D) Nothing happens - the reference is ignored"],answer:"B",d:"E"},
{q:"A developer tries: ALTER TABLE employees ADD COLUMN manager_id INT NOT NULL; on a table with 1000 existing rows. What happens?",options:["A) All 1000 rows get manager_id = 0","B) The statement fails because existing rows cannot satisfy NOT NULL without a DEFAULT value specified","C) The column is added as nullable anyway","D) Existing rows are deleted"],answer:"B",d:"E"},
{q:"DROP TABLE vs TRUNCATE TABLE vs DELETE FROM table: which one removes the table structure itself?",options:["A) TRUNCATE","B) DROP TABLE - it removes the entire table structure plus all data; TRUNCATE and DELETE only remove data","C) DELETE","D) All three remove structure"],answer:"B",d:"E"},
{q:"A CHECK constraint is defined as: CHECK (age >= 18). An INSERT tries age = 15. What happens?",options:["A) The value is automatically changed to 18","B) The INSERT fails with a constraint violation error because the CHECK condition is not satisfied","C) The row is inserted with NULL age","D) CHECK constraints are advisory only"],answer:"B",d:"E"},
{q:"A column is defined as VARCHAR(50). An INSERT provides a 60-character string. What happens?",options:["A) The string is silently stored fully","B) In strict SQL mode, the INSERT fails with an error; in some databases, the string is silently truncated to 50 characters (data loss)","C) The column automatically expands to 60","D) Only the first character is stored"],answer:"B",d:"E"},
{q:"SERIAL/AUTO_INCREMENT is used for a primary key. After deleting row ID 5 and inserting a new row, what ID does the new row get?",options:["A) 5 (reuses deleted IDs)","B) The next value in the sequence (e.g., 6 or higher) - auto-increment never reuses deleted values","C) 0","D) NULL"],answer:"B",d:"E"},
{q:"A table has a composite primary key (order_id, product_id). Can the same order_id appear in multiple rows?",options:["A) No - order_id must be unique","B) Yes - the uniqueness constraint is on the COMBINATION; the same order_id can appear multiple times as long as product_id differs","C) Composite keys don't enforce uniqueness","D) Only if product_id is NULL"],answer:"B",d:"M"},
{q:"ALTER TABLE adds a new column with DEFAULT 'active'. In PostgreSQL 11+, are all existing rows immediately updated on disk?",options:["A) Yes, all rows are rewritten immediately","B) No - PostgreSQL 11+ stores the default in metadata and returns it virtually for existing rows without rewriting them, making the ALTER instant","C) Defaults don't apply to existing rows","D) Only the first 1000 rows are updated"],answer:"B",d:"M"},
{q:"A table uses ON DELETE CASCADE on a foreign key. Deleting one customer row unexpectedly deletes 50,000 order rows. How should this be prevented?",options:["A) CASCADE is always safe","B) Use ON DELETE RESTRICT or SET NULL instead of CASCADE for high-cardinality relationships; RESTRICT prevents deletion while dependent rows exist","C) Remove the foreign key","D) CASCADE only deletes one level"],answer:"B",d:"M"},
{q:"A developer adds an index: CREATE INDEX idx ON orders(status) but queries filtering on status are still slow. The status column has only 3 distinct values across 10M rows. Why?",options:["A) The index is corrupted","B) Low cardinality (few distinct values) makes the index ineffective - the optimizer prefers a full table scan when an index would return too many rows (>10-30% of table)","C) Indexes don't work on VARCHAR columns","D) 10M rows is too many for any index"],answer:"B",d:"M"},
{q:"A migration adds a NOT NULL constraint to an existing column that has 500 NULL values. What must happen first?",options:["A) The constraint is added and NULLs become empty strings","B) The 500 NULL values must be updated to non-NULL values (backfilled) before the NOT NULL constraint can be applied; otherwise the ALTER fails","C) NOT NULL constraints ignore existing data","D) NULLs are automatically deleted"],answer:"B",d:"M"},
{q:"DECIMAL(10,2) vs FLOAT for storing prices. A calculation: 0.1 + 0.2. Which type returns exactly 0.3?",options:["A) FLOAT returns 0.3 exactly","B) DECIMAL(10,2) returns 0.30 exactly; FLOAT may return 0.30000000000000004 due to binary floating-point representation","C) Both return 0.3 exactly","D) Neither can represent 0.3"],answer:"B",d:"M"},
{q:"A table with 500M rows needs a new index. CREATE INDEX runs for 2 hours and locks the table, blocking all writes. What PostgreSQL feature helps?",options:["A) Drop and recreate the table","B) CREATE INDEX CONCURRENTLY builds the index without locking writes (at the cost of taking longer and more resources); it allows normal operations during index creation","C) Indexes on large tables are impossible","D) Use TRUNCATE before creating the index"],answer:"B",d:"M"},
{q:"A table stores user preferences as 15 boolean columns (notify_email, notify_sms, dark_mode, etc.). A colleague suggests using a single JSONB column instead. What are the tradeoffs?",options:["A) JSONB is always better","B) JSONB is flexible for evolving schema but loses type checking, constraints, and direct indexing on individual preferences; boolean columns provide type safety and can be individually indexed","C) Boolean columns are always better","D) JSONB cannot store booleans"],answer:"B",d:"M"},
{q:"A multi-tenant SaaS database has one large table per entity (all tenants share tables). A migration adds a column, affecting all tenants simultaneously. What is the safer architectural alternative?",options:["A) Separate database per tenant","B) For DDL changes, use schema-per-tenant or add columns as nullable with feature flags; for true isolation at scale, consider tenant-specific schemas that can be migrated independently","C) Lock the entire application during migration","D) Multi-tenant cannot support schema changes"],answer:"B",d:"H"},
{q:"A table has 2 billion rows and uses INT (max ~2.1B) for its primary key. The sequence is approaching the maximum. What is the proper fix?",options:["A) Delete old rows to free up IDs","B) ALTER the column to BIGINT (max ~9.2 quintillion); plan this carefully as the ALTER on 2B rows requires significant time, disk space, and should use a migration strategy (new column, backfill, swap)","C) Reset the sequence to 1","D) Use UUID strings instead"],answer:"B",d:"H"},
{q:"A database has grown to 10TB. Queries on recent data are fast but historical queries are slow. Partitioning by date is suggested. What is the key benefit of partitioning here?",options:["A) Partitioning speeds up all queries equally","B) Partition pruning allows queries filtering on date to scan only relevant partitions instead of the full 10TB, and old partitions can be archived independently","C) Partitioning reduces storage size","D) Partitions cannot be larger than 1TB"],answer:"B",d:"H"},
{q:"A hot table receives 50,000 INSERTs/second. Adding a unique constraint on a VARCHAR column causes insert throughput to drop by 60%. Why and what is the solution?",options:["A) Unique constraints always halve performance","B) Each INSERT requires a B-tree index lookup to verify uniqueness, which becomes a bottleneck at high concurrency; solutions include hash-based unique indexes, batching with deferred constraints, or application-level deduplication","C) VARCHAR cannot have unique constraints","D) The table is too large for constraints"],answer:"B",d:"H"},
{q:"An online schema migration tool (like pt-online-schema-change or gh-ost) is used instead of ALTER TABLE. How does it achieve zero-downtime schema changes on a 500M row table?",options:["A) It modifies rows in-place faster than ALTER","B) It creates a new table with the desired schema, copies rows in batches using triggers/binlog to capture concurrent changes, then atomically swaps the tables when synchronization is complete","C) It pauses writes for 1 second","D) It only works on tables under 1M rows"],answer:"B",d:"H"}
]},


{id:10,title:"DML & Transactions",color:"#c084fc",chips:["INSERT","UPDATE","DELETE","MERGE","Transactions"],
subtopics:[
{name:"INSERT",theory:["INSERT INTO adds new rows: specify columns and values, or use INSERT INTO ... SELECT to copy from another query.","Multi-row INSERT provides multiple value tuples in one statement, which is much faster than individual inserts.","RETURNING clause (PostgreSQL) or OUTPUT (SQL Server) returns the inserted data including auto-generated IDs."],code:"-- Single row insert\nINSERT INTO employees (first_name, last_name, email, salary)\nVALUES ('John', 'Smith', 'john@company.com', 75000);\n\n-- Multi-row insert\nINSERT INTO products (name, price, category_id) VALUES\n    ('Widget A', 29.99, 1),\n    ('Widget B', 49.99, 1),\n    ('Gadget C', 99.99, 2);\n\n-- INSERT from SELECT\nINSERT INTO archived_orders (id, customer_id, total, order_date)\nSELECT id, customer_id, total, order_date\nFROM orders\nWHERE order_date < '2023-01-01';\n\n-- RETURNING to get generated ID\nINSERT INTO users (name, email)\nVALUES ('Alice', 'alice@test.com')\nRETURNING id, created_at;"},
{name:"UPDATE",theory:["UPDATE modifies existing rows; always use WHERE to target specific rows or you will update the entire table.","UPDATE with JOIN allows updating rows based on values in related tables; syntax varies by database.","SET clause can reference the current row's values: SET price = price * 1.10 increases all matched prices by 10%."],code:"-- Basic UPDATE\nUPDATE employees\nSET salary = 80000, updated_at = NOW()\nWHERE employee_id = 42;\n\n-- UPDATE with calculation\nUPDATE products\nSET price = price * 1.10  -- 10% price increase\nWHERE category_id = 5 AND is_active = TRUE;\n\n-- UPDATE with JOIN (PostgreSQL)\nUPDATE orders o\nSET status = 'vip_priority'\nFROM customers c\nWHERE o.customer_id = c.id AND c.tier = 'platinum';\n\n-- UPDATE with subquery\nUPDATE employees\nSET salary = (\n    SELECT AVG(salary) FROM employees WHERE department_id = 3\n)\nWHERE employee_id = 100;"},
{name:"DELETE",theory:["DELETE removes rows matching the WHERE condition; without WHERE, all rows are deleted (dangerous!).","Cascading deletes via FOREIGN KEY constraints can delete rows in related tables automatically when a parent row is removed.","Soft deletes (SET is_deleted = TRUE) preserve data for audit trails instead of physically removing rows."],code:"-- Basic DELETE\nDELETE FROM sessions\nWHERE last_activity < NOW() - INTERVAL '30 days';\n\n-- DELETE with subquery\nDELETE FROM order_items\nWHERE order_id IN (\n    SELECT id FROM orders WHERE status = 'cancelled'\n);\n\n-- DELETE with JOIN (PostgreSQL)\nDELETE FROM notifications n\nUSING users u\nWHERE n.user_id = u.id AND u.account_status = 'closed';\n\n-- Soft delete pattern (preferred for audit)\nUPDATE orders\nSET is_deleted = TRUE,\n    deleted_at = NOW(),\n    deleted_by = current_user_id\nWHERE id = 5001;"},
{name:"MERGE/UPSERT",theory:["MERGE (SQL standard) or UPSERT performs INSERT or UPDATE conditionally based on whether a matching row exists.","PostgreSQL uses INSERT ... ON CONFLICT DO UPDATE; MySQL uses INSERT ... ON DUPLICATE KEY UPDATE syntax.","MERGE is ideal for synchronizing data between tables or handling idempotent loads in ETL pipelines."],code:"-- PostgreSQL UPSERT\nINSERT INTO products (sku, name, price, stock)\nVALUES ('SKU-001', 'Widget', 29.99, 100)\nON CONFLICT (sku) DO UPDATE SET\n    price = EXCLUDED.price,\n    stock = EXCLUDED.stock,\n    updated_at = NOW();\n\n-- SQL Standard MERGE\nMERGE INTO target_table t\nUSING source_table s ON t.id = s.id\nWHEN MATCHED THEN\n    UPDATE SET t.name = s.name, t.value = s.value\nWHEN NOT MATCHED THEN\n    INSERT (id, name, value) VALUES (s.id, s.name, s.value);\n\n-- Bulk upsert from staging\nINSERT INTO inventory (product_id, warehouse_id, quantity)\nSELECT product_id, warehouse_id, quantity FROM staging_inventory\nON CONFLICT (product_id, warehouse_id) DO UPDATE\nSET quantity = EXCLUDED.quantity;"},

// State
let currentTopic = null;
const STORAGE_KEY = 'sql_roadmap_progress';

function getProgress() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
    catch { return {}; }
}
function saveProgress(data) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}
function getTotalPractice() {
    return topics.reduce((sum, t) => sum + t.practice.length, 0);
}
function getCompletedCount() {
    const prog = getProgress();
    return Object.values(prog).filter(v => v).length;
}
function updateProgressBar() {
    const total = getTotalPractice();
    const done = getCompletedCount();
    const pct = total > 0 ? (done / total * 100) : 0;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressText').textContent = done + ' / ' + total;
}
function getTopicProgress(topicId) {
    const prog = getProgress();
    const topic = topics.find(t => t.id === topicId);
    if (!topic) return {done: 0, total: 0};
    let done = 0;
    topic.practice.forEach((_, i) => {
        if (prog[topicId + '_' + i]) done++;
    });
    return {done, total: topic.practice.length};
}


// Syntax highlighting
function highlightCode(code) {
    let html = code
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    // SQL comments
    html = html.replace(/(--.*)/g, '<span class="cm">$1</span>');
    // Strings
    html = html.replace(/('[^'\\]*(?:\\.[^'\\]*)*')/g, '<span class="str">$1</span>');
    // Numbers
    html = html.replace(/\b(\d+\.?\d*)\b/g, '<span class="num">$1</span>');
    // SQL keywords
    const sqlKeywords = ['SELECT','FROM','WHERE','JOIN','LEFT','RIGHT','INNER','OUTER','FULL','CROSS','ON','GROUP','BY','ORDER','HAVING','INSERT','INTO','VALUES','UPDATE','SET','DELETE','CREATE','TABLE','ALTER','DROP','INDEX','VIEW','AS','AND','OR','NOT','NULL','IS','PRIMARY','KEY','FOREIGN','REFERENCES','DEFAULT','SERIAL','BIGSERIAL','INT','BIGINT','VARCHAR','TEXT','DECIMAL','BOOLEAN','DATE','TIMESTAMP','INTERVAL','PARTITION','CLUSTER','WITH','RECURSIVE','CASE','WHEN','THEN','ELSE','END','DISTINCT','COUNT','SUM','AVG','MAX','MIN','LIKE','BETWEEN','EXISTS','IN','UNION','ALL','LIMIT','OFFSET','CASCADE','SCHEMA','USING','MERGE','OVER','ROW_NUMBER','RANK','DENSE_RANK','LAG','LEAD','NTILE','ROWS','RANGE','UNBOUNDED','PRECEDING','FOLLOWING','CURRENT','ROW','COALESCE','NULLIF','EXTRACT','YEAR','MONTH','DAY','ASC','DESC','HAVING','LATERAL','FETCH','NEXT','ONLY','GENERATED','ALWAYS','IDENTITY','GRANT','REVOKE','TRIGGER','FUNCTION','PROCEDURE','RETURN','RETURNS','DECLARE','BEGIN','COMMIT','ROLLBACK','SAVEPOINT','EXCEPT','INTERSECT','ANY','SOME','COPY','FORMAT','VACUUM','OPTIMIZE','EXPLAIN','ANALYZE','MATERIALIZED','REFRESH','CONFLICT','EXCLUDED','GROUPING','ROLLUP','CUBE','FILTER','WITHIN','WINDOW','PERCENT_RANK','CUME_DIST','FIRST_VALUE','LAST_VALUE','NTH_VALUE','DATE_TRUNC','GENERATE_SERIES','UPPER','LOWER','TRIM','ROUND','CEIL','FLOOR','GREATEST','LEAST','ARRAY','JSONB','JSON','CAST','CONCAT'];
    sqlKeywords.forEach(kw => {
        html = html.replace(new RegExp('\\b(' + kw + ')\\b', 'gi'), '<span class="kw">$1</span>');
    });
    return html;
}


// Render roadmap
function renderRoadmap() {
    const container = document.getElementById('roadmapContainer');
    container.innerHTML = '';
    topics.forEach(topic => {
        const prog = getTopicProgress(topic.id);
        const node = document.createElement('div');
        node.className = 'node';
        node.onclick = () => showDetail(topic.id);
        node.innerHTML = `
            <div class="node-number" style="border-color:${topic.color};color:${topic.color}">${topic.id}</div>
            <div class="node-card">
                <div class="node-title" style="color:${topic.color}">${topic.title}</div>
                <div class="node-chips">${topic.chips.map(c => '<span class="chip">' + c + '</span>').join('')}</div>
                <div class="node-progress">${prog.done} / ${prog.total} practice completed</div>
            </div>
        `;
        container.appendChild(node);
    });
}

function showDetail(topicId) {
    currentTopic = topics.find(t => t.id === topicId);
    if (!currentTopic) return;
    document.getElementById('roadmapPage').classList.remove('active');
    document.getElementById('detailPage').classList.add('active');
    document.getElementById('detailTitle').textContent = currentTopic.title;
    document.getElementById('detailTitle').style.color = currentTopic.color;
    document.getElementById('detailSubtitle').textContent = currentTopic.subtopics.map(s => s.name).join(' \u2022 ');
    renderTheory();
    renderExamples();
    renderPractice();
    switchTab('theory');
    window.scrollTo(0, 0);
}

function showRoadmap() {
    document.getElementById('detailPage').classList.remove('active');
    document.getElementById('roadmapPage').classList.add('active');
    renderRoadmap();
    updateProgressBar();
}

function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t, i) => {
        t.classList.toggle('active', ['theory','examples','practice','solutions'][i] === tab);
    });
    document.querySelectorAll('.tab-content').forEach((tc, i) => {
        tc.classList.toggle('active', ['theory','examples','practice','solutions'][i] === tab);
    });
    if (tab === 'solutions') renderSolutions();
}


function renderTheory() {
    const container = document.getElementById('theoryContent');
    container.innerHTML = currentTopic.subtopics.map(sub => `
        <div class="theory-section">
            <div class="theory-title">${sub.name}</div>
            ${sub.theory.map(t => '<p class="theory-point">' + t + '</p>').join('')}
            <pre class="code-block">${highlightCode(sub.code)}</pre>
        </div>
    `).join('');
}

function renderExamples() {
    const container = document.getElementById('examplesContent');
    container.innerHTML = currentTopic.examples.map(ex => `
        <div class="example-card">
            <div class="example-title">${ex.title}</div>
            <p class="example-desc">${ex.desc}</p>
            <pre class="code-block">${highlightCode(ex.code)}</pre>
        </div>
    `).join('');
}

function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderPractice() {
    const container = document.getElementById('practiceContent');
    const prog = getProgress();
    var html = '';
    currentTopic.practice.forEach(function(p, i) {
        var key = currentTopic.id + '_' + i;
        var checked = prog[key] ? 'checked' : '';
        var doneClass = prog[key] ? 'done' : '';
        var diffClass = p.d === 'E' ? 'easy' : p.d === 'M' ? 'medium' : 'hard';
        var diffLabel = p.d === 'E' ? 'Easy' : p.d === 'M' ? 'Medium' : 'Hard';
        html += '<div class="practice-item ' + doneClass + '">' +
            '<input type="checkbox" ' + checked + ' onchange="togglePractice(\'' + key + '\', this)">' +
            '<div class="practice-text">' +
            '<div>' + (i+1) + '. ' + escHtml(p.q) + '</div>' +
            '<ul class="mcq-options">' +
            p.options.map(function(opt) { return '<li class="mcq-option">' + escHtml(opt) + '</li>'; }).join('') +
            '</ul></div>' +
            '<span class="difficulty ' + diffClass + '">' + diffLabel + '</span></div>';
    });
    container.innerHTML = html;
}

function togglePractice(key, el) {
    const prog = getProgress();
    prog[key] = el.checked;
    saveProgress(prog);
    updateProgressBar();
    el.parentElement.classList.toggle('done', el.checked);
}

`The correct SQL clause order is SELECT ... FROM ... WHERE ... ORDER BY. Option B puts WHERE after ORDER BY which is invalid syntax. Option A follows the proper sequence.`,
`DISTINCT eliminates duplicate values from the result set. The customers table has 50,000 rows but only 200 unique cities. DISTINCT collapses all duplicate city values into one occurrence each.`,
`AND has higher precedence than OR in SQL. The query is interpreted as (total>100 AND status='shipped') OR (status='delivered'). Any delivered order matches regardless of total. Parentheses fix this.`,
`NULL represents unknown/missing data and cannot be compared using =. The expression email = NULL evaluates to UNKNOWN (not TRUE), so no rows match. The correct syntax is WHERE email IS NULL.`,
`Page 5 with 25 items per page: OFFSET = (page-1) * items_per_page = (5-1) * 25 = 100. LIMIT 25 OFFSET 100 skips the first 100 rows and returns the next 25.`,
`DISTINCT applies to the entire SELECT list, not just one column. If SELECT DISTINCT full_name, employee_id is used, rows with same name but different IDs are considered distinct (different) rows.`,
`BETWEEN is inclusive on both ends. WHERE price BETWEEN 10 AND 50 includes prices equal to 10 and equal to 50. It is equivalent to price >= 10 AND price <= 50.`,
`WHERE cannot use aggregate functions because WHERE filters individual rows before grouping occurs. HAVING filters after GROUP BY aggregation, so HAVING COUNT(*) > 5 correctly filters groups by their aggregate values.`,
`Without a tiebreaker column in ORDER BY, when two products share the same price at the boundary position, the database picks arbitrarily. Results are non-deterministic. Add a secondary sort column for consistency.`,
`The underscore _ in LIKE matches exactly one character. _a% means: any single character, then 'a', then anything. So names with 'a' as the second character match (like 'Martin', 'Barnes', 'Jackson').`,
`DISTINCT applies to the combination of all columns in SELECT. SELECT DISTINCT department, city returns all unique (department, city) pairs. More columns means more potential unique combinations.`,
`When order_date is a TIMESTAMP, '2024-01-31' is interpreted as '2024-01-31 00:00:00'. Times after midnight on Jan 31 (like 14:30:00) are greater than the end boundary and excluded. Use '2024-02-01' or cast properly.`,
`Selecting only needed columns reduces I/O, especially in columnar storage where the engine reads just those 3 columns from disk. SELECT * reads all 50 columns' data even though 47 are discarded after reading.`,
`Most databases reject negative OFFSET values as invalid. OFFSET must be 0 or a positive integer. A negative offset doesn't have a logical meaning for result pagination.`,
`B-tree indexes store data in sorted order. A leading wildcard (%) means the search pattern could start anywhere, making the index useless since it cannot narrow the search range. Full table scan results.`,

`The ORDER BY on 5M rows forces a complete sort which is expensive. Adding a covering index on the sort columns lets the database read pre-sorted data. Alternatively, reducing results with stricter WHERE reduces the sort volume.`

`INNER JOIN only returns rows with matching values in both tables. 5 employees with NULL department_id cannot match any department, so at most 95 employees appear (100 minus the 5 unmatched).`,
`LEFT JOIN preserves all rows from the left table (customers) regardless of whether they have matching rows in the right table (orders). Customers without orders appear with NULL order columns.`,
`When LEFT JOIN produces the same count as INNER JOIN, it means no unmatched rows exist on the left side. Every row in the left table found at least one match in the right table.`,
`CROSS JOIN produces the Cartesian product: every combination of rows from both tables. 1000 products x 365 days = 365,000 rows total.`,
`When the hierarchy is stored in one table (employee_id and manager_id referencing the same table), you must SELF JOIN - join employees to itself with different aliases to link each employee to their manager's row.`,
`FROM orders o RIGHT JOIN customers c is equivalent to FROM customers c LEFT JOIN orders o. Both preserve all customer rows; the difference is just which table is the 'preserved' side.`,
`LEFT JOIN preserves all left rows but if a left row matches multiple right rows, it appears multiple times. 100 left rows producing 150 result rows means 50 rows had multiple matches in the right table.`,
`INNER JOIN excludes rows without matches. If an employee's department_id is NULL or doesn't match any valid department id, INNER JOIN drops that employee regardless of other filter conditions.`,
`WHERE filters happen after the JOIN. A LEFT JOIN produces NULL for unmatched right-side columns, then WHERE c.country = 'USA' eliminates rows where country is NULL (the unmatched ones). Move the condition to ON to preserve LEFT JOIN behavior.`,
`FULL OUTER JOIN returns all matched rows plus unmatched rows from both sides. 510 rows from a 500+20 row join means the 500 products produced 500 matched/unmatched rows, plus 10 categories had no products.`,
`The condition e1.employee_id < e2.employee_id eliminates self-pairs (Alice, Alice) and prevents counting each pair twice. Without it, you'd get (Alice, Bob) AND (Bob, Alice) as separate results.`,
`The optimizer can choose which table to process first. Joining a small filtered result first means subsequent joins operate on fewer rows. Join order optimization is crucial for multi-table query performance.`,
`A CROSS JOIN followed by WHERE with an equality condition is logically identical to an INNER JOIN with the same condition in ON. The optimizer typically produces the same execution plan for both.`,
`LEFT JOIN cascades: orders are preserved, items with no category get NULLs for category columns but the order row (and its item data) persists. LEFT JOIN never removes rows from the left side.`,
`NOT EXISTS can stop scanning as soon as it finds one match (short-circuit), while LEFT JOIN WHERE IS NULL must process all matches then check for NULLs. Performance varies by optimizer but both produce correct results.`,
`With a many-to-many via junction table, each enrollment row creates one result row for that student. A student with 5 enrollments produces 5 rows in the join result - one per course enrolled.`,
`Nested loop with an index on the dimension table is often optimal for small dimension lookups (1000 rows). Hash join excels when both sides are large and no index exists, requiring full table scans regardless.`,

`Without a PRIMARY KEY, the table has no guaranteed way to uniquely identify rows. This makes targeted UPDATE/DELETE operations ambiguous, prevents foreign key references from other tables, and complicates data integrity enforcement.`,

`EXCLUDED is a special reference in ON CONFLICT DO UPDATE that represents the row that would have been inserted if no conflict occurred. It contains the new proposed values from the VALUES clause, letting you use those values in the UPDATE SET expressions.`,
`Under READ COMMITTED, Transaction B's UPDATE will be blocked by A's lock on the row (if A holds a lock). Once A commits, B re-reads the current committed version of the row and applies its update on top. The final state includes both A's and B's changes (B's applied last).`,
`Large single-transaction DELETEs generate enormous transaction logs because every deleted row must be logged for potential rollback. Breaking into smaller batches (DELETE...LIMIT 50000 in a loop, committing each batch) keeps log size bounded and allows checkpoint processing between batches.`,
`SAVEPOINT creates a named checkpoint within a transaction. ROLLBACK TO SAVEPOINT undoes only the work after that savepoint. Work before the savepoint remains intact. When COMMIT executes, the pre-savepoint work (the order) is committed permanently.`,
`MERGE matches each source row against the target using the ON condition. Without an index on the target's match column, each of the 1M source rows triggers a full scan of the 10M target rows. An index enables O(log n) lookups instead of O(n) scans per row.`,
`The UPDATE changes employees' department_id from 3 to 5. This succeeds as long as department 5 exists in the departments table (satisfying the FK from employees TO departments). The projects table references might be on a different relationship that isn't affected by this change.`,
`REPEATABLE READ provides a consistent snapshot for the duration of the transaction. Even if other transactions modify and commit changes to the same row, this transaction sees the row as it was when the transaction started. It prevents non-repeatable reads.`,
`The database's UNIQUE constraint is the ultimate guarantee at the storage level. Even if two transactions simultaneously pass application-level checks, the UNIQUE index serializes the actual row insertions. One succeeds, the other receives a unique violation error that must be handled.`,
`Non-repeatable reads (reading different values for the same row within one transaction) are prevented by REPEATABLE READ and SERIALIZABLE. Both maintain a snapshot from transaction start, ensuring consistent reads regardless of concurrent modifications.`,
`Table partitioning by date allows instant removal of entire partitions: DROP PARTITION is a metadata-only operation (like dropping a table), taking milliseconds regardless of row count. Recent data remains in its own partition completely unaffected.`,
`Auto-commit means each INSERT is a separate transaction with its own fsync to disk. Batching 100 orders in one transaction shares a single fsync across all 400 statements (100 orders × 4 inserts each), dramatically reducing disk I/O overhead.`,
`Deadlocks occur from circular lock dependencies. If all transactions always lock rows in the same order (e.g., by ascending primary key), no circular wait can form. Transaction A locks row 1 then row 2; Transaction B also locks row 1 first, then row 2, preventing the cycle.`

function renderSolutions() {
    var container = document.getElementById('solutionsContent');
    if (!currentTopic) return;
    var sols = solutionData[currentTopic.id] || [];
    var html = '';
    currentTopic.practice.forEach(function(p, i) {
        var sol = sols[i] || 'Explanation coming soon...';
        html += '<div class="solution-item">' +
            '<div class="solution-header" onclick="toggleSolution(' + i + ')">' +
            '<span class="solution-num">#' + (i+1) + '</span>' +
            '<span class="solution-q">' + escHtml(p.q) + '</span>' +
            '<button class="solution-toggle" id="btn_' + i + '">Show Answer</button>' +
            '</div>' +
            '<div class="solution-body" id="sol_' + i + '">' +
            '<div style="margin-bottom:8px"><strong style="color:var(--green)">Correct Answer: ' + p.answer + '</strong></div>' +
            '<ul class="mcq-options">' +
            p.options.map(function(opt) {
                var isCorrect = opt.startsWith(p.answer + ')');
                return '<li class="mcq-option' + (isCorrect ? ' correct' : '') + '">' + escHtml(opt) + '</li>';
            }).join('') +
            '</ul>' +
            '<div class="solution-explanation">' + escHtml(sol) + '</div>' +
            '</div></div>';
    });
    container.innerHTML = html;
}

function toggleSolution(i) {
    const body = document.getElementById('sol_' + i);
    const btn = document.getElementById('btn_' + i);
    body.classList.toggle('open');
    btn.textContent = body.classList.contains('open') ? 'Hide Solution' : 'Show Solution';
}
