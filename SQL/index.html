<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL Learning Roadmap - Complete Guide</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 SQL Mastery Roadmap</h1>
            <p>Your complete guide to mastering SQL from basics to advanced</p>
            <div class="progress-bar">
                <div class="progress-fill" id="progressBar">0%</div>
            </div>
        </div>
        
        <div class="roadmap">
            <div class="stats-container">
                <div class="stat-card">
                    <h3 id="totalProblems">0</h3>
                    <p>Total Problems</p>
                </div>
                <div class="stat-card">
                    <h3 id="solvedProblems">0</h3>
                    <p>Solved</p>
                </div>
                <div class="stat-card">
                    <h3 id="pendingProblems">0</h3>
                    <p>Pending</p>
                </div>
                <div class="stat-card">
                    <h3 id="topicsCompleted">0 / 12</h3>
                    <p>Topics Completed</p>
                </div>
            </div>
            
            <div id="topicsContainer"></div>
        </div>
    </div>
    
    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
