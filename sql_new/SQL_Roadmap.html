{q:"A query on a 50M-row orders table uses WHERE customer_id = 42 and takes 3 seconds. After adding CREATE INDEX idx ON orders(customer_id), it takes 5ms. What data structure made this improvement possible?",options:["A) Hash table that stores all rows in memory","B) B-tree that enables O(log n) lookup by maintaining sorted keys in a balanced tree, reducing disk reads from millions to a handful of pages","C) Linear linked list of matching rows","D) The database cached the entire table in RAM"],answer:"B",d:"E"},
{q:"An index exists on orders(customer_id). A query uses WHERE customer_id = 5 AND status = 'shipped'. The index helps with customer_id but still scans many rows for status. What improvement covers both filters?",options:["A) Create a separate index on status only","B) Create a composite index on (customer_id, status) so both conditions are satisfied by a single index lookup","C) Remove the customer_id index first","D) Use OR instead of AND"],answer:"B",d:"E"},
{q:"A developer runs EXPLAIN on a query and sees 'Seq Scan' on a table with 20M rows. What does this indicate?",options:["A) The query is optimally using an index","B) The database is reading every row in the table sequentially because no suitable index exists or the optimizer chose not to use one","C) The table has sequential data that is already sorted","D) Seq Scan is always the fastest access method"],answer:"B",d:"E"},
{q:"A table has indexes on columns A, B, C, D, and E individually. Each INSERT now takes 5x longer than on the same table without indexes. Why?",options:["A) Indexes always speed up inserts","B) Each INSERT must update all 5 index B-trees in addition to the table data, multiplying the write I/O per row","C) The table is corrupted by too many indexes","D) Only one index can exist per table"],answer:"B",d:"E"},
{q:"A composite index exists on orders(customer_id, order_date). Which query can use this index efficiently?",options:["A) WHERE order_date > '2024-01-01' without customer_id filter","B) WHERE customer_id = 5 AND order_date > '2024-01-01' because it matches the leftmost prefix of the composite index","C) WHERE status = 'shipped' only","D) WHERE order_date > '2024-01-01' AND status = 'pending'"],answer:"B",d:"E"},
{q:"A partial index is created: CREATE INDEX idx ON orders(created_at) WHERE status = 'pending'. A query filtering WHERE status = 'shipped' AND created_at > '2024-01-01' does a Seq Scan. Why?",options:["A) Partial indexes are broken in all databases","B) The partial index only contains rows where status = 'pending'; rows with status = 'shipped' are not in the index so it cannot be used","C) created_at columns cannot be indexed","D) Two WHERE conditions always prevent index use"],answer:"B",d:"E"},
{q:"EXPLAIN ANALYZE shows 'estimated rows: 100' but 'actual rows: 500,000' for a nested loop join. What is the consequence?",options:["A) No impact on performance whatsoever","B) The optimizer chose a nested loop (efficient for few rows) instead of a hash join (better for many rows), causing severe performance degradation due to the misestimate","C) The query returns incorrect results","D) Estimated rows are always inaccurate and harmless"],answer:"B",d:"M"},
{q:"A query uses WHERE LOWER(email) = 'user@test.com' on a table with an index on email. EXPLAIN shows Seq Scan. How do you fix this?",options:["A) The email column has no data in it","B) Create a functional index: CREATE INDEX idx ON users(LOWER(email)) which indexes the computed expression directly","C) String indexes never work in WHERE clauses","D) Replace LOWER with UPPER to fix it"],answer:"B",d:"M"},
{q:"A covering index on orders(customer_id) INCLUDE (total, status) is created. EXPLAIN now shows 'Index Only Scan' instead of 'Index Scan'. What changed?",options:["A) The query is running on a different table now","B) All columns needed by the query exist in the index itself, so the database skips the table heap entirely, eliminating expensive random I/O lookups","C) Index Only Scan is always slower than Index Scan","D) The INCLUDE keyword has no effect on plans"],answer:"B",d:"M"},
{q:"After adding an index, SELECT queries are faster but nightly batch INSERTs of 1M rows went from 30 seconds to 5 minutes. What tradeoff occurred?",options:["A) The index corrupted the table data","B) Each of the 1M inserts must now maintain the index B-tree (page splits, sort maintenance), trading write performance for improved read performance","C) Batch inserts are incompatible with indexes","D) The table simply grew too large"],answer:"B",d:"M"},
{q:"A composite index on (country, city, zip_code) exists. A query uses WHERE city = 'London'. EXPLAIN shows Seq Scan. Why?",options:["A) City values are too long for indexing","B) The leftmost prefix rule requires filtering on 'country' first; skipping the leading column means the B-tree cannot be efficiently navigated for city alone","C) Composite indexes only work for exact match on all columns simultaneously","D) The index is on a different table"],answer:"B",d:"M"},
{q:"Two queries on same table: Query A filters WHERE status = 'active' (matches 90% of rows), Query B filters WHERE status = 'archived' (matches 1%). An index on status helps which?",options:["A) Both queries benefit equally from the index","B) Only Query B benefits because when an index returns most of the table the optimizer prefers Seq Scan; indexes help only highly selective filters","C) Only Query A because it matches more rows","D) Neither query can use an index on status"],answer:"B",d:"M"},
{q:"EXPLAIN ANALYZE shows Sort node with 'Sort Method: external merge Disk' on 5M rows. What does this indicate?",options:["A) The sort completed optimally fast","B) Work memory is insufficient to sort in-memory, causing slow disk-based sorting; increase work_mem or add an index on the ORDER BY columns to avoid sorting","C) External merge is always faster than in-memory","D) The disk is full causing errors"],answer:"B",d:"M"},
{q:"A GIN index on a JSONB column speeds up @> queries but INSERT performance drops 10x vs B-tree. Why are GIN indexes expensive to maintain?",options:["A) GIN indexes are stored on slower disks by default","B) GIN decomposes each value into multiple index entries (one per key/element), so a single JSONB row with 20 keys creates ~20 index entries versus one for B-tree","C) GIN is an outdated deprecated index type","D) JSONB columns simply cannot be efficiently indexed"],answer:"B",d:"H"},
{q:"A 500M-row table needs a new index. CREATE INDEX locks the table for writes during the 2-hour build. Production cannot afford downtime. What PostgreSQL feature solves this?",options:["A) Build the index on a read replica only","B) CREATE INDEX CONCURRENTLY builds the index without holding an exclusive lock, allowing reads and writes during the entire build process","C) Indexes on tables over 100M rows are impossible","D) Drop and recreate the table with the index predefined"],answer:"B",d:"H"},
{q:"A query plan shows Nested Loop Join between 10M and 5M row tables taking 45 minutes. Switching to Hash Join takes 30 seconds. Why did the optimizer choose poorly?",options:["A) The optimizer is always wrong for large tables","B) Stale table statistics caused the optimizer to underestimate row counts; running ANALYZE updates statistics enabling correct Hash Join selection","C) Nested Loop is inherently always slower than Hash Join","D) The tables are simply too large for any join"],answer:"B",d:"H"},
{q:"An application has 15 indexes on a table with 100M rows. Write throughput degraded to 500 rows/sec. 8 indexes show zero scans in 6 months. What is the recovery plan?",options:["A) Add more indexes to balance the workload","B) Drop the 8 unused indexes to eliminate unnecessary write amplification; each removed index saves one B-tree maintenance per write, potentially 3-5x throughput improvement","C) Unused indexes consume zero resources anyway","D) Rebuild all 15 indexes to fix fragmentation"],answer:"B",d:"H"},
{q:"A query uses WHERE DATE(created_at) = '2024-03-15' with an index on created_at. EXPLAIN shows Seq Scan. Rewriting as WHERE created_at >= '2024-03-15' AND created_at < '2024-03-16' uses the index. Why?",options:["A) The DATE() version returns different results","B) Wrapping a column in a function creates a computed value the B-tree cannot navigate; the range condition uses the raw indexed column directly","C) Range conditions are inherently always faster","D) Both should use the index identically"],answer:"B",d:"H"},
{q:"A heavily-updated table shows index bloat: the index is 3x larger than expected for the data volume. VACUUM runs regularly but index size doesn't shrink. Why?",options:["A) VACUUM always shrinks indexes","B) VACUUM reclaims heap space but does not compact B-tree indexes; index pages with dead entries are marked reusable but not returned to the OS. REINDEX or pg_repack is needed to physically shrink the index","C) Index bloat is impossible with regular VACUUM","D) Indexes automatically compact themselves"],answer:"B",d:"H"},
{q:"A query with ORDER BY id LIMIT 10 uses an index scan on the primary key and returns instantly. Adding WHERE status = 'active' (no index on status) makes it scan millions of rows before finding 10 matches. Why?",options:["A) LIMIT always returns instantly","B) The optimizer walks the PK index in order but must check the status filter for each row; if 'active' rows are rare it scans many rows to find 10 matches. An index on (status, id) would be optimal","C) WHERE clauses prevent LIMIT optimization","D) Primary key indexes cannot be used with WHERE"],answer:"B",d:"M"}
]},

{id:12,title:"Views & Materialized Views",color:"#e879f9",chips:["CREATE VIEW","Updatable","Materialized","Refresh","Security"],
subtopics:[
{name:"CREATE VIEW",theory:["A view is a saved SELECT query that acts as a virtual table; it stores no data itself but runs the query each time it is accessed.","Views simplify complex queries by encapsulating joins, aggregations, and logic behind a simple table-like interface.","CREATE OR REPLACE VIEW updates the view definition without dropping dependent objects; useful for iterative development."],code:"-- Create a basic view\nCREATE VIEW active_employees AS\nSELECT\n    e.id, e.first_name, e.last_name,\n    d.department_name, e.salary\nFROM employees e\nJOIN departments d ON e.department_id = d.id\nWHERE e.status = 'active';\n\n-- Use it like a table\nSELECT * FROM active_employees\nWHERE department_name = 'Engineering';\n\n-- Replace without dropping\nCREATE OR REPLACE VIEW active_employees AS\nSELECT e.id, e.first_name, e.last_name,\n    d.department_name, e.salary, e.hire_date\nFROM employees e\nJOIN departments d ON e.department_id = d.id\nWHERE e.status = 'active';"},
{name:"Updatable Views",theory:["A view is updatable if it maps directly to one base table without aggregates, DISTINCT, GROUP BY, UNION, or joins in some databases.","INSERT, UPDATE, DELETE on an updatable view modify the underlying base table rows directly.","WITH CHECK OPTION ensures that any INSERT/UPDATE through the view still satisfies the view's WHERE condition."],code:"-- Simple updatable view\nCREATE VIEW pending_orders AS\nSELECT id, customer_id, total, status\nFROM orders\nWHERE status = 'pending'\nWITH CHECK OPTION;\n\n-- This works: updates the base orders table\nUPDATE pending_orders SET total = 150.00 WHERE id = 42;\n\n-- This fails WITH CHECK OPTION:\nUPDATE pending_orders SET status = 'shipped' WHERE id = 42;\n-- Error: new row violates check option\n\n-- INSERT through view\nINSERT INTO pending_orders (customer_id, total, status)\nVALUES (5, 99.99, 'pending');  -- OK\n-- VALUES (5, 99.99, 'shipped'); -- FAILS check"},
{name:"Materialized Views",theory:["A materialized view stores the query result physically on disk, providing fast reads at the cost of potentially stale data.","Unlike regular views, materialized views do not re-execute the query on access; they serve pre-computed results.","Ideal for expensive aggregations, dashboards, and reports where real-time accuracy is not required."],code:"-- Create materialized view\nCREATE MATERIALIZED VIEW monthly_revenue AS\nSELECT\n    DATE_TRUNC('month', order_date) AS month,\n    SUM(total) AS revenue,\n    COUNT(*) AS order_count,\n    COUNT(DISTINCT customer_id) AS unique_customers\nFROM orders\nWHERE status = 'completed'\nGROUP BY DATE_TRUNC('month', order_date)\nORDER BY month;\n\n-- Query it (instant, reads stored data)\nSELECT * FROM monthly_revenue\nWHERE month >= '2024-01-01';\n\n-- Create index on materialized view\nCREATE INDEX idx_mv_month\nON monthly_revenue(month);"},
{name:"Refresh Strategies",theory:["REFRESH MATERIALIZED VIEW re-executes the query and replaces all stored data; during refresh the view may be locked.","CONCURRENTLY refresh (PostgreSQL) updates the materialized view without locking reads, but requires a unique index.","Schedule refreshes based on data freshness needs: real-time (triggers), near-real-time (every few minutes), or periodic (hourly/daily)."],code:"-- Full refresh (locks view during refresh)\nREFRESH MATERIALIZED VIEW monthly_revenue;\n\n-- Concurrent refresh (no read lock, needs unique idx)\nCREATE UNIQUE INDEX idx_mv_month_uniq\nON monthly_revenue(month);\nREFRESH MATERIALIZED VIEW CONCURRENTLY monthly_revenue;\n\n-- Schedule with pg_cron (PostgreSQL extension)\n-- SELECT cron.schedule(\n--     'refresh_revenue',\n--     '0 * * * *',  -- every hour\n--     'REFRESH MATERIALIZED VIEW CONCURRENTLY monthly_revenue'\n-- );\n\n-- Check last refresh time\nSELECT relname, last_refresh\nFROM pg_matviews WHERE matviewname = 'monthly_revenue';"},
{name:"Views for Security",theory:["Views can restrict column access: expose only safe columns to specific roles while hiding sensitive data like salaries or SSNs.","Row-level filtering in views limits which rows users can see based on their department, region, or role.","Grant SELECT on the view without granting access to underlying tables; users query the view but cannot bypass its filters."],code:"-- Column-restricted view (hide salary)\nCREATE VIEW public_employee_directory AS\nSELECT id, first_name, last_name, department_id, email\nFROM employees;\n-- salary, ssn, personal_phone are hidden\n\n-- Row-level security view\nCREATE VIEW my_team_orders AS\nSELECT * FROM orders\nWHERE region = current_setting('app.user_region');\n\n-- Grant view access, not table access\nGRANT SELECT ON public_employee_directory TO readonly_role;\nREVOKE SELECT ON employees FROM readonly_role;\n\n-- Users can only see what the view exposes\n-- SELECT * FROM employees;  -- DENIED\n-- SELECT * FROM public_employee_directory;  -- OK"}
],
examples:[
{title:"Dashboard Summary View",desc:"Create a materialized view for a real-time sales dashboard with periodic refresh.",code:"CREATE MATERIALIZED VIEW dashboard_summary AS\nSELECT\n    DATE_TRUNC('day', o.order_date) AS day,\n    COUNT(*) AS total_orders,\n    SUM(o.total) AS revenue,\n    AVG(o.total) AS avg_order_value,\n    COUNT(DISTINCT o.customer_id) AS unique_buyers\nFROM orders o\nWHERE o.status IN ('completed', 'shipped')\n  AND o.order_date >= CURRENT_DATE - INTERVAL '90 days'\nGROUP BY DATE_TRUNC('day', o.order_date);\n\nCREATE UNIQUE INDEX idx_dashboard_day ON dashboard_summary(day);\n\n-- Refresh every 15 minutes concurrently\nREFRESH MATERIALIZED VIEW CONCURRENTLY dashboard_summary;"},
{title:"Multi-Tenant Security View",desc:"Use views to enforce tenant isolation without application code changes.",code:"-- Base table has all tenants\nCREATE TABLE invoices (\n    id SERIAL PRIMARY KEY,\n    tenant_id INT NOT NULL,\n    customer_name TEXT,\n    amount DECIMAL(12,2),\n    created_at TIMESTAMP DEFAULT NOW()\n);\n\n-- Tenant-scoped view\nCREATE VIEW my_invoices AS\nSELECT id, customer_name, amount, created_at\nFROM invoices\nWHERE tenant_id = current_setting('app.tenant_id')::INT\nWITH CHECK OPTION;\n\n-- Application sets tenant context per request:\n-- SET app.tenant_id = '42';\n-- Then all queries through my_invoices are scoped"},
{title:"Layered Views for Complex Reporting",desc:"Build complex reports using stacked views for maintainability.",code:"-- Layer 1: Clean base data\nCREATE VIEW v_clean_orders AS\nSELECT id, customer_id, total, order_date\nFROM orders\nWHERE status != 'cancelled' AND total > 0;\n\n-- Layer 2: Enriched with customer data\nCREATE VIEW v_enriched_orders AS\nSELECT o.*, c.name, c.tier, c.region\nFROM v_clean_orders o\nJOIN customers c ON o.customer_id = c.id;\n\n-- Layer 3: Final aggregation for reports\nCREATE VIEW v_regional_report AS\nSELECT region, tier,\n    COUNT(*) AS orders,\n    SUM(total) AS revenue\nFROM v_enriched_orders\nGROUP BY region, tier;\n\n-- Simple query for end users\nSELECT * FROM v_regional_report WHERE region = 'EMEA';"}
],
practice:[
{q:"A complex 10-table JOIN query is used in 5 different reports. Each report repeats the same FROM/JOIN/WHERE logic. What database object eliminates this repetition?",options:["A) A stored procedure that returns void","B) A VIEW that encapsulates the complex query, allowing each report to simply SELECT from it with additional filters","C) A temporary table created each time","D) A CHECK constraint on the tables"],answer:"B",d:"E"},
{q:"A developer queries a view and expects instant results but it takes 8 seconds because the underlying query joins 6 tables with 50M rows. Why is the view slow?",options:["A) Views are always slow by design","B) A regular view stores no data; it re-executes the full underlying query each time it is accessed, so complex queries remain expensive","C) The view was created incorrectly","D) Views cannot join more than 3 tables"],answer:"B",d:"E"},
{q:"A materialized view was refreshed yesterday. New orders placed today do not appear in query results. Why?",options:["A) The orders table is broken","B) A materialized view stores a snapshot of data at refresh time; new rows only appear after the next REFRESH MATERIALIZED VIEW command","C) Materialized views auto-refresh on every insert","D) New orders need 24 hours to propagate"],answer:"B",d:"E"},
{q:"A view is defined as: CREATE VIEW active_users AS SELECT * FROM users WHERE is_active = TRUE. What happens when you run DELETE FROM active_users WHERE id = 5?",options:["A) An error because views are read-only always","B) If the view is updatable (simple single-table, no aggregates), the DELETE executes on the base users table, removing the row with id=5","C) Only the view data is deleted, not the table","D) All active users are deleted"],answer:"B",d:"E"},
{q:"A manager should see only their department's data. Instead of filtering in every application query, what database-level solution provides automatic row filtering?",options:["A) Add WHERE clauses to every application query","B) Create a view filtered by department and grant the manager SELECT only on that view, not on the underlying table","C) Create a separate database per department","D) Use DISTINCT to separate department data"],answer:"B",d:"E"},
{q:"REFRESH MATERIALIZED VIEW takes 10 minutes and locks reads during that time. Users see errors. What PostgreSQL feature prevents read blocking?",options:["A) Drop and recreate the materialized view","B) REFRESH MATERIALIZED VIEW CONCURRENTLY updates the data without blocking concurrent reads, requiring a unique index on the view","C) Concurrent refresh is not possible in any database","D) Schedule refresh only at midnight"],answer:"B",d:"E"},
{q:"A view defined with WITH CHECK OPTION has WHERE status = 'pending'. An UPDATE through the view sets status = 'shipped'. What happens?",options:["A) The update succeeds normally","B) The update fails because WITH CHECK OPTION ensures all modifications through the view still satisfy the view's WHERE condition","C) WITH CHECK OPTION only applies to INSERTs","D) The row becomes invisible but the update succeeds"],answer:"B",d:"E"},
{q:"A materialized view stores pre-aggregated monthly revenue. The dashboard queries it in 5ms instead of the 30-second base query. But the data is 1 hour stale. An executive needs real-time numbers for today. What approach provides both fast historical and real-time current data?",options:["A) Refresh the materialized view every second","B) Query the materialized view for historical months and UNION with a live query on the base table for the current day/hour only","C) Always query the base table directly","D) Materialized views cannot coexist with live queries"],answer:"B",d:"M"},
{q:"A view joins 4 tables. A developer adds an ORDER BY inside the view definition. When querying SELECT * FROM the_view ORDER BY a different column, which ORDER BY wins?",options:["A) The view's ORDER BY always takes priority","B) The outer query's ORDER BY overrides the view's; ORDER BY inside a view definition is not guaranteed to be preserved when the view is queried","C) Both ORDER BYs are applied sequentially","D) An error is thrown for conflicting sorts"],answer:"B",d:"M"},
{q:"CREATE OR REPLACE VIEW updates a view definition. A dependent view (view B references view A) exists. After replacing view A, view B breaks with a column-not-found error. What went wrong?",options:["A) OR REPLACE always breaks dependent objects","B) The replacement removed or renamed a column that view B depends on; CREATE OR REPLACE succeeds but dependent views referencing removed columns become invalid","C) Dependent views are impossible in SQL","D) View B should auto-update its definition"],answer:"B",d:"M"},
{q:"A materialized view has a unique index and uses REFRESH CONCURRENTLY. During refresh, the underlying data changed 1000 rows. How does concurrent refresh handle this compared to full refresh?",options:["A) Both methods are identical","B) Concurrent refresh computes a diff between old and new results, applying only INSERT/DELETE/UPDATE for changed rows; full refresh replaces everything with a lock","C) Concurrent refresh skips changed rows","D) Concurrent refresh is always slower and provides no benefit"],answer:"B",d:"M"},
{q:"A view exposes columns (id, name, email) from a users table that also has (ssn, salary, internal_notes). A developer tries SELECT ssn FROM the_view. What happens?",options:["A) The SSN is returned from the underlying table","B) An error because the view only exposes id, name, email; columns not in the view's SELECT list are invisible regardless of table permissions","C) NULL is returned for hidden columns","D) The view automatically expands to show all columns"],answer:"B",d:"M"},
{q:"Three stacked views exist: v1 -> v2 -> v3. A query on v3 is slow. EXPLAIN shows the optimizer merged all three view definitions into one execution plan. A developer adds an index for v1's filter but v3's query doesn't improve. Why?",options:["A) Indexes cannot help views at all","B) After view merging, the optimizer may choose a different access path for the combined query that doesn't use that specific index; analyze the merged plan not the individual view","C) Stacked views prevent all optimization","D) Only the innermost view can use indexes"],answer:"B",d:"M"},
{q:"A materialized view on a 500M row table takes 45 minutes to refresh. The business needs data fresh within 5 minutes. Full refresh is too slow. What architectural pattern solves this?",options:["A) Refresh more frequently with the same approach","B) Use incremental refresh patterns: maintain a change log or timestamp, and refresh only rows changed since last refresh using a filtered INSERT/DELETE against the materialized view","C) Materialized views cannot be refreshed faster","D) Use a regular view instead for all queries"],answer:"B",d:"H"},
{q:"A multi-layer view architecture (5 stacked views) makes debugging difficult. A query returns unexpected NULLs. The team cannot determine which layer introduced the NULLs. What design principle prevents this?",options:["A) Never use views at all","B) Limit view nesting to 2-3 layers maximum, document each layer's contract, and test each view independently; deep nesting obscures data lineage","C) Add NULL checks in every layer","D) Use materialized views instead of regular views"],answer:"B",d:"H"},
{q:"An application uses a security view with current_setting('app.tenant_id') for multi-tenancy. A connection pooler reuses connections between tenants. If SET app.tenant_id is not reset, what vulnerability exists?",options:["A) No vulnerability since views are always secure","B) A tenant could see another tenant's data if the previous connection's setting persists; each request must SET the tenant context and ideally use transaction-level settings or RLS policies","C) Connection poolers automatically reset all settings","D) current_setting cannot be exploited across connections"],answer:"B",d:"H"},
{q:"A materialized view with 100M rows needs a unique index for CONCURRENTLY refresh. The natural key has no unique column. What approach creates a valid unique index for concurrent refresh?",options:["A) Concurrent refresh works without a unique index","B) Add a deterministic row identifier: use ROW_NUMBER() OVER (ORDER BY ...) in the view definition or combine columns into a unique composite expression that guarantees uniqueness","C) Hash all columns into one unique value automatically","D) Materialized views always have implicit unique indexes"],answer:"B",d:"H"},
{q:"A reporting view joining 8 tables performs well for filters on indexed columns but terribly for ad-hoc filters on non-indexed columns. The optimizer always merges the view and chooses nested loops. How do you force a better plan for specific use cases?",options:["A) Add indexes on every possible column combination","B) Use materialized views for known slow patterns, or use CTEs with MATERIALIZED hint to create optimization fences that prevent poor plan choices for complex scenarios","C) Views always have unpredictable performance","D) Disable the query optimizer entirely"],answer:"B",d:"H"},
{q:"A view is created with SELECT *, and later a new column (ssn) is added to the underlying table. The view now exposes SSN to all users with view access. How should views be defined to prevent this?",options:["A) SELECT * is always safe in view definitions","B) Always list explicit columns in view definitions instead of SELECT *; this prevents new sensitive columns from being automatically exposed when the underlying table schema changes","C) New columns are never visible through existing views","D) Use GRANT to hide specific columns after creation"],answer:"B",d:"M"},
{q:"A materialized view refreshes every hour. Between refreshes, users see stale counts that are off by thousands. The team adds a banner showing 'Last refreshed: X minutes ago'. A better UX solution combines live and cached data. How?",options:["A) Refresh every second instead","B) Show the materialized view data with a live delta: query only rows modified since last refresh and add/subtract the difference, giving near-real-time accuracy without full recomputation","C) Replace materialized view with a regular view","D) Cache staleness cannot be improved without full refresh"],answer:"B",d:"M"}
]},

{id:13,title:"Stored Procedures & Functions",color:"#facc15",chips:["Functions","Procedures","Variables","Control Flow","Triggers"],
subtopics:[
{name:"User-Defined Functions",theory:["A function accepts parameters and returns a value (scalar) or a table (set-returning); it can be used inside SELECT, WHERE, and expressions.","Functions should be deterministic when possible (same input = same output) for caching and index compatibility.","IMMUTABLE functions can be used in index definitions; VOLATILE functions are re-evaluated on every row."],code:"-- Scalar function: calculate tax\nCREATE OR REPLACE FUNCTION calc_tax(amount DECIMAL, rate DECIMAL DEFAULT 0.08)\nRETURNS DECIMAL AS $$\nBEGIN\n    RETURN ROUND(amount * rate, 2);\nEND;\n$$ LANGUAGE plpgsql IMMUTABLE;\n\n-- Use in query\nSELECT order_id, total, calc_tax(total) AS tax\nFROM orders;\n\n-- Table-returning function\nCREATE OR REPLACE FUNCTION get_top_customers(n INT)\nRETURNS TABLE(customer_id INT, name TEXT, total_spent DECIMAL) AS $$\nBEGIN\n    RETURN QUERY\n    SELECT c.id, c.name, SUM(o.total)\n    FROM customers c JOIN orders o ON c.id = o.customer_id\n    GROUP BY c.id, c.name\n    ORDER BY SUM(o.total) DESC LIMIT n;\nEND;\n$$ LANGUAGE plpgsql;"},
{name:"Stored Procedures",theory:["A stored procedure is a named program stored in the database that performs actions; unlike functions, it does not return a value in expressions.","Procedures can manage transactions (COMMIT/ROLLBACK within the body), while functions cannot in most databases.","Use procedures for multi-step operations: data migrations, batch processing, and complex business logic that modifies data."],code:"-- Stored procedure: transfer funds\nCREATE OR REPLACE PROCEDURE transfer_funds(\n    sender_id INT, receiver_id INT, amount DECIMAL\n)\nLANGUAGE plpgsql AS $$\nBEGIN\n    IF amount <= 0 THEN\n        RAISE EXCEPTION 'Amount must be positive';\n    END IF;\n\n    UPDATE accounts SET balance = balance - amount\n    WHERE id = sender_id;\n\n    UPDATE accounts SET balance = balance + amount\n    WHERE id = receiver_id;\n\n    INSERT INTO transfers(from_id, to_id, amount)\n    VALUES (sender_id, receiver_id, amount);\n\n    COMMIT;\nEND;\n$$;\n\n-- Call the procedure\nCALL transfer_funds(101, 202, 500.00);"},
{name:"Variables & Control Flow",theory:["DECLARE section defines local variables with types; variables are assigned with := or SELECT INTO.","IF/ELSIF/ELSE provides conditional logic; CASE provides multi-branch switching within procedural code.","LOOP, WHILE, FOR provide iteration; FOR can iterate over query results (FOR rec IN SELECT ...) for row-by-row processing."],code:"-- Variables and control flow\nCREATE OR REPLACE FUNCTION categorize_customer(cust_id INT)\nRETURNS TEXT AS $$\nDECLARE\n    total_spent DECIMAL;\n    order_count INT;\n    category TEXT;\nBEGIN\n    SELECT SUM(total), COUNT(*)\n    INTO total_spent, order_count\n    FROM orders WHERE customer_id = cust_id;\n\n    IF total_spent > 10000 THEN\n        category := 'platinum';\n    ELSIF total_spent > 5000 THEN\n        category := 'gold';\n    ELSIF total_spent > 1000 THEN\n        category := 'silver';\n    ELSE\n        category := 'bronze';\n    END IF;\n\n    RETURN category;\nEND;\n$$ LANGUAGE plpgsql;\n\n-- Loop example\nCREATE OR REPLACE PROCEDURE batch_update_prices(pct DECIMAL)\nLANGUAGE plpgsql AS $$\nDECLARE\n    rec RECORD;\nBEGIN\n    FOR rec IN SELECT id FROM products WHERE is_active LOOP\n        UPDATE products SET price = price * (1 + pct)\n        WHERE id = rec.id;\n    END LOOP;\nEND;\n$$;"},
{name:"Error Handling",theory:["EXCEPTION block catches runtime errors using WHEN clauses; without it, errors abort the entire function/procedure.","RAISE EXCEPTION throws custom errors with SQLSTATE codes; RAISE NOTICE/WARNING sends informational messages to the client.","FOUND is a boolean set after SELECT INTO, indicating whether a row was returned; check it to handle no-data scenarios."],code:"-- Error handling with EXCEPTION\nCREATE OR REPLACE FUNCTION safe_divide(a DECIMAL, b DECIMAL)\nRETURNS DECIMAL AS $$\nBEGIN\n    IF b = 0 THEN\n        RAISE EXCEPTION 'Division by zero: % / %', a, b\n            USING ERRCODE = '22012';\n    END IF;\n    RETURN a / b;\nEXCEPTION\n    WHEN division_by_zero THEN\n        RAISE NOTICE 'Caught division by zero';\n        RETURN NULL;\n    WHEN OTHERS THEN\n        RAISE NOTICE 'Unexpected error: %', SQLERRM;\n        RETURN NULL;\nEND;\n$$ LANGUAGE plpgsql;\n\n-- Using FOUND\nCREATE OR REPLACE FUNCTION get_user_email(uid INT)\nRETURNS TEXT AS $$\nDECLARE\n    result TEXT;\nBEGIN\n    SELECT email INTO result FROM users WHERE id = uid;\n    IF NOT FOUND THEN\n        RAISE EXCEPTION 'User % not found', uid;\n    END IF;\n    RETURN result;\nEND;\n$$ LANGUAGE plpgsql;"},
{name:"Triggers",theory:["A trigger automatically executes a function BEFORE or AFTER an INSERT, UPDATE, or DELETE event on a table.","Trigger functions receive OLD (previous row) and NEW (new row) records; BEFORE triggers can modify NEW to change what gets written.","Use triggers for audit logging, enforcing complex constraints, maintaining denormalized data, and cascading updates."],code:"-- Audit trigger\nCREATE OR REPLACE FUNCTION audit_trigger_fn()\nRETURNS TRIGGER AS $$\nBEGIN\n    INSERT INTO audit_log(table_name, action, record_id, changed_at)\n    VALUES (TG_TABLE_NAME, TG_OP, COALESCE(NEW.id, OLD.id), NOW());\n    RETURN NEW;\nEND;\n$$ LANGUAGE plpgsql;\n\nCREATE TRIGGER trg_orders_audit\nAFTER INSERT OR UPDATE OR DELETE ON orders\nFOR EACH ROW EXECUTE FUNCTION audit_trigger_fn();\n\n-- Auto-update updated_at column\nCREATE OR REPLACE FUNCTION set_updated_at()\nRETURNS TRIGGER AS $$\nBEGIN\n    NEW.updated_at = NOW();\n    RETURN NEW;\nEND;\n$$ LANGUAGE plpgsql;\n\nCREATE TRIGGER trg_set_updated\nBEFORE UPDATE ON products\nFOR EACH ROW EXECUTE FUNCTION set_updated_at();"}
],
examples:[
{title:"Inventory Management Procedure",desc:"A procedure that handles stock adjustment with validation and audit logging.",code:"CREATE OR REPLACE PROCEDURE adjust_stock(\n    p_product_id INT, p_qty_change INT, p_reason TEXT\n)\nLANGUAGE plpgsql AS $$\nDECLARE\n    current_stock INT;\nBEGIN\n    SELECT stock INTO current_stock\n    FROM products WHERE id = p_product_id FOR UPDATE;\n\n    IF NOT FOUND THEN\n        RAISE EXCEPTION 'Product % not found', p_product_id;\n    END IF;\n\n    IF current_stock + p_qty_change < 0 THEN\n        RAISE EXCEPTION 'Insufficient stock: have %, need %',\n            current_stock, ABS(p_qty_change);\n    END IF;\n\n    UPDATE products SET stock = stock + p_qty_change\n    WHERE id = p_product_id;\n\n    INSERT INTO stock_movements(product_id, qty, reason, moved_at)\n    VALUES (p_product_id, p_qty_change, p_reason, NOW());\nEND;\n$$;"},
{title:"Data Validation Function",desc:"A function that validates and normalizes input data before insertion.",code:"CREATE OR REPLACE FUNCTION validate_email(raw_email TEXT)\nRETURNS TEXT AS $$\nDECLARE\n    clean_email TEXT;\nBEGIN\n    clean_email := LOWER(TRIM(raw_email));\n\n    IF clean_email IS NULL OR clean_email = '' THEN\n        RAISE EXCEPTION 'Email cannot be empty';\n    END IF;\n\n    IF clean_email !~ '^[a-z0-9._%+-]+@[a-z0-9.-]+\\.[a-z]{2,}$' THEN\n        RAISE EXCEPTION 'Invalid email format: %', raw_email;\n    END IF;\n\n    RETURN clean_email;\nEND;\n$$ LANGUAGE plpgsql IMMUTABLE;\n\n-- Use in constraint or trigger\nALTER TABLE users ADD CONSTRAINT chk_email\n    CHECK (email = validate_email(email));"},
{title:"Change History Trigger",desc:"Automatically record all column changes with old and new values.",code:"CREATE OR REPLACE FUNCTION track_changes()\nRETURNS TRIGGER AS $$\nBEGIN\n    IF TG_OP = 'UPDATE' THEN\n        INSERT INTO change_history(\n            table_name, record_id, operation,\n            old_data, new_data, changed_by, changed_at\n        ) VALUES (\n            TG_TABLE_NAME, OLD.id, 'UPDATE',\n            to_jsonb(OLD), to_jsonb(NEW),\n            current_setting('app.user_id', true),\n            NOW()\n        );\n    ELSIF TG_OP = 'DELETE' THEN\n        INSERT INTO change_history(\n            table_name, record_id, operation,\n            old_data, changed_by, changed_at\n        ) VALUES (\n            TG_TABLE_NAME, OLD.id, 'DELETE',\n            to_jsonb(OLD),\n            current_setting('app.user_id', true),\n            NOW()\n        );\n    END IF;\n    RETURN COALESCE(NEW, OLD);\nEND;\n$$ LANGUAGE plpgsql;"}
],
practice:[
{q:"A calculation (price * quantity * discount_rate) is repeated in 20+ queries across the application. Changes to the formula require updating all 20 queries. What database object centralizes this logic?",options:["A) A CHECK constraint","B) A user-defined function that encapsulates the calculation, so all queries call the function and formula changes happen in one place","C) A view that stores the result","D) An index on the computed value"],answer:"B",d:"E"},
{q:"A developer creates a function that INSERTs rows and tries to use it in a SELECT statement. It fails. Why?",options:["A) Functions cannot contain SQL statements","B) In PostgreSQL, functions used in SELECT must be marked as appropriate volatility; also functions modifying data are typically better as procedures called with CALL","C) SELECT only works with numbers","D) INSERT is not a valid SQL command inside functions"],answer:"B",d:"E"},
{q:"A BEFORE UPDATE trigger modifies NEW.updated_at = NOW(). What does this accomplish?",options:["A) It prevents the update from occurring","B) It automatically sets the updated_at column to the current timestamp on every UPDATE, without the application needing to include it in the SET clause","C) It creates a new row instead of updating","D) NOW() is not available in triggers"],answer:"B",d:"E"},
{q:"A procedure uses RAISE EXCEPTION 'Insufficient funds'. What happens to any data modifications made earlier in the procedure?",options:["A) The modifications are committed before the exception","B) All modifications in the current transaction are rolled back because an unhandled exception causes the transaction to abort","C) Only the last modification is rolled back","D) RAISE EXCEPTION only prints a message"],answer:"B",d:"E"},
{q:"A function is defined with RETURNS TABLE(...). How is it used differently from a scalar function?",options:["A) It cannot be used in queries at all","B) It returns multiple rows and is called in the FROM clause like a table: SELECT * FROM my_function(params)","C) It returns exactly one row always","D) TABLE functions cannot accept parameters"],answer:"B",d:"E"},
{q:"A trigger is defined as AFTER DELETE FOR EACH ROW. The trigger function references NEW.id. What happens?",options:["A) NEW contains the deleted row data","B) NEW is NULL for DELETE operations because there is no new row; the trigger should reference OLD.id for the deleted row's data","C) The trigger fires before the delete","D) NEW and OLD are identical for deletes"],answer:"B",d:"E"},
{q:"A SELECT INTO statement inside a function assigns no rows (the query returns empty). The variable retains its previous NULL value. How does the developer detect this no-data condition?",options:["A) Check if the variable equals zero","B) Check the FOUND boolean variable which is FALSE when SELECT INTO returns no rows","C) An exception is automatically raised","D) NULL always means no data was found"],answer:"B",d:"E"},
{q:"A function marked IMMUTABLE is used in an index: CREATE INDEX idx ON users(normalize_email(email)). The function is later modified to trim whitespace differently. What problem arises?",options:["A) The index automatically rebuilds","B) The index becomes corrupt/stale because indexed values were computed with the old function; changing an IMMUTABLE function requires dropping and recreating dependent indexes","C) IMMUTABLE functions cannot be modified","D) Indexes ignore function changes automatically"],answer:"B",d:"M"},
{q:"A stored procedure calls COMMIT midway through its logic, then a subsequent statement fails. What happens to the changes before the COMMIT?",options:["A) Everything is rolled back including the committed part","B) Changes before COMMIT are permanently saved; only changes after COMMIT are rolled back because COMMIT ended that transaction","C) COMMIT inside procedures is ignored","D) The entire procedure must succeed or fail atomically"],answer:"B",d:"M"},
{q:"A FOR loop iterates over 1 million rows doing individual UPDATEs. It takes 45 minutes. A single SET-based UPDATE achieves the same in 3 seconds. Why the massive difference?",options:["A) FOR loops are broken in SQL","B) Row-by-row processing (cursor-based) incurs per-row overhead (context switching, logging); set-based operations process all rows in one optimized execution plan","C) The FOR loop version returns wrong results","D) Individual UPDATEs are always faster for large datasets"],answer:"B",d:"M"},
{q:"A BEFORE INSERT trigger validates data and sets NEW.status = 'pending'. The INSERT statement specified status = 'active'. Which value is stored in the table?",options:["A) 'active' from the original INSERT","B) 'pending' because BEFORE triggers can modify the NEW record before it is written to disk; the trigger's assignment overrides the INSERT value","C) Both values are stored","D) An error occurs from conflicting values"],answer:"B",d:"M"},
{q:"A trigger on table A inserts into table B. Table B also has a trigger that updates table A. What dangerous situation can this create?",options:["A) The triggers simply run sequentially with no issue","B) Infinite trigger recursion or mutual trigger loops where each trigger fires the other endlessly, potentially crashing the session or hitting a recursion limit","C) Only one trigger can fire per statement","D) Cross-table triggers are impossible"],answer:"B",d:"M"},
{q:"A function uses RAISE NOTICE for debugging. In production, thousands of notices slow the application. How to disable debug output without modifying the function?",options:["A) Delete the function and recreate it","B) Set client_min_messages to WARNING or higher in the session/configuration, suppressing NOTICE-level messages without code changes","C) RAISE NOTICE cannot be suppressed","D) Use RAISE EXCEPTION instead"],answer:"B",d:"M"},
{q:"A complex procedure has nested EXCEPTION blocks. The inner block catches an error and continues. But the outer transaction's savepoint was already consumed. What is the PostgreSQL behavior?",options:["A) Nested exception blocks are not allowed","B) Each EXCEPTION block in PL/pgSQL implicitly creates a subtransaction (savepoint); catching an error in the inner block rolls back to that savepoint while the outer transaction continues","C) Any caught error aborts the entire transaction","D) Exception blocks never create savepoints"],answer:"B",d:"M"},
{q:"A trigger-based audit system on 50 tables captures all changes. Write throughput drops 40%. The audit_log table grows to 2TB. What architectural improvement reduces the performance impact?",options:["A) Remove all audit triggers","B) Use asynchronous audit via logical replication or event queues; write changes to a lightweight buffer table and process audit records in batch, decoupling audit from transaction critical path","C) Audit always requires 40% overhead","D) Write fewer rows to the main tables"],answer:"B",d:"H"},
{q:"A function is called once per row in a SELECT over 10M rows: SELECT my_func(col) FROM big_table. Each call takes 1ms. Total query time is hours. What optimization reduces this to seconds?",options:["A) Make the function faster with better hardware","B) Rewrite the logic as a single set-based SQL expression inline in the query, or mark the function as IMMUTABLE/STABLE for caching, or use a lateral join with batch processing","C) 10M function calls cannot be optimized","D) Use a trigger instead of a function"],answer:"B",d:"H"},
{q:"A deployment adds a trigger that calls a function referencing a new column. The trigger is created before the ALTER TABLE adds the column. What happens on the next INSERT?",options:["A) The trigger gracefully handles the missing column","B) The trigger function raises a runtime error because the referenced column does not yet exist; DDL ordering matters and trigger functions should be deployed after schema changes","C) Triggers validate their SQL at creation time only","D) Missing columns automatically default to NULL in triggers"],answer:"B",d:"H"},
{q:"A stored procedure manages a complex workflow with 8 steps. Step 5 fails intermittently. The team wants steps 1-4 committed even when step 5 fails, then retry step 5. How?",options:["A) Wrap everything in one transaction - all or nothing","B) Use SAVEPOINT before step 5 and ROLLBACK TO SAVEPOINT on failure; or COMMIT after step 4 and begin a new transaction for steps 5-8","C) Procedures cannot partially commit","D) Use a separate procedure for each step"],answer:"B",d:"H"},
{q:"An INSTEAD OF trigger on a view intercepts INSERT and distributes data to three normalized tables. The trigger has grown to 500 lines with complex conditionals. What maintenance concern should the team address?",options:["A) 500-line triggers are normal and maintainable","B) Long trigger logic is hard to test, debug, and version-control; refactor into a well-tested stored procedure that the trigger simply calls, enabling unit testing independent of DML events","C) INSTEAD OF triggers cannot exceed 100 lines","D) Move all logic to application code only"],answer:"B",d:"H"},
{q:"A function uses a SELECT query internally that returns different results based on the current time (NOW()). The function is marked IMMUTABLE for performance. What hidden bug does this create?",options:["A) IMMUTABLE functions cannot call NOW()","B) The optimizer may cache the function result across rows or even across queries because IMMUTABLE promises constant output for same input; time-dependent functions should be VOLATILE or STABLE","C) NOW() always returns the same value anyway","D) IMMUTABLE has no effect on function behavior"],answer:"B",d:"M"}
]},

{id:14,title:"Advanced Patterns",color:"#ff6b6b",chips:["Pivot","JSON","STRING_AGG","Temp Tables","Dynamic SQL"],
subtopics:[
{name:"Pivot/Unpivot",theory:["PIVOT transforms row values into columns, converting normalized data into a cross-tab report format.","UNPIVOT reverses this: it transforms columns back into rows, useful for normalizing wide denormalized tables.","Not all databases support PIVOT natively; use CASE expressions with aggregation as a portable alternative."],code:"-- Pivot using CASE (portable)\nSELECT\n    product_id,\n    SUM(CASE WHEN month = 'Jan' THEN revenue END) AS jan,\n    SUM(CASE WHEN month = 'Feb' THEN revenue END) AS feb,\n    SUM(CASE WHEN month = 'Mar' THEN revenue END) AS mar\nFROM monthly_sales\nGROUP BY product_id;\n\n-- SQL Server PIVOT syntax\nSELECT product_id, [Jan], [Feb], [Mar]\nFROM monthly_sales\nPIVOT (\n    SUM(revenue) FOR month IN ([Jan], [Feb], [Mar])\n) AS pvt;\n\n-- UNPIVOT: columns to rows\nSELECT product_id, month, revenue\nFROM product_wide\nUNPIVOT (\n    revenue FOR month IN (jan, feb, mar)\n) AS unpvt;"},
{name:"JSON Handling",theory:["Modern databases store and query JSON natively: PostgreSQL (jsonb), MySQL (JSON type), SQL Server (OPENJSON/FOR JSON).","JSONB in PostgreSQL supports indexing with GIN, enabling fast lookups on nested keys without full-document scans.","Use JSON for semi-structured/flexible attributes; avoid it for frequently queried relational data that benefits from normalization."],code:"-- PostgreSQL JSONB\nCREATE TABLE events (\n    id SERIAL PRIMARY KEY,\n    payload JSONB NOT NULL,\n    created_at TIMESTAMP DEFAULT NOW()\n);\n\n-- Insert JSON data\nINSERT INTO events (payload) VALUES\n('{\"type\":\"click\",\"page\":\"/home\",\"user_id\":42}');\n\n-- Query nested values\nSELECT payload->>'type' AS event_type,\n       payload->>'page' AS page\nFROM events\nWHERE payload->>'user_id' = '42';\n\n-- Index for fast JSON queries\nCREATE INDEX idx_events_payload\nON events USING gin (payload);\n\n-- Containment query (uses GIN index)\nSELECT * FROM events\nWHERE payload @> '{\"type\":\"click\"}';"},
{name:"String Aggregation",theory:["STRING_AGG (PostgreSQL/SQL Server) or GROUP_CONCAT (MySQL) concatenates values from multiple rows into a single string.","Useful for creating comma-separated lists, building denormalized reports, or generating CSV output directly in SQL.","Always specify an ORDER BY within STRING_AGG for deterministic output; without it, order is unpredictable."],code:"-- STRING_AGG: comma-separated list\nSELECT\n    department_id,\n    STRING_AGG(first_name, ', ' ORDER BY first_name) AS members\nFROM employees\nGROUP BY department_id;\n\n-- ARRAY_AGG for array output\nSELECT\n    order_id,\n    ARRAY_AGG(product_name ORDER BY product_name) AS products\nFROM order_items oi\nJOIN products p ON oi.product_id = p.id\nGROUP BY order_id;\n\n-- MySQL equivalent\nSELECT department_id,\n    GROUP_CONCAT(first_name ORDER BY first_name SEPARATOR ', ')\nFROM employees\nGROUP BY department_id;\n\n-- JSON aggregation\nSELECT customer_id,\n    json_agg(json_build_object('id', id, 'total', total))\nFROM orders GROUP BY customer_id;"},
{name:"Temp Tables & Table Variables",theory:["Temporary tables exist only for the session/transaction and are automatically dropped; ideal for staging intermediate results.","CTEs (WITH) are preferred for readability, but temp tables are better when the intermediate result is referenced multiple times or needs indexes.","UNLOGGED tables (PostgreSQL) or temp tables skip WAL logging, providing faster writes for ephemeral data at the cost of crash recovery."],code:"-- Create temp table\nCREATE TEMP TABLE tmp_high_value_customers AS\nSELECT customer_id, SUM(total) AS lifetime_value\nFROM orders\nGROUP BY customer_id\nHAVING SUM(total) > 10000;\n\n-- Add index on temp table\nCREATE INDEX idx_tmp_cust ON tmp_high_value_customers(customer_id);\n\n-- Use in subsequent queries\nSELECT c.name, t.lifetime_value\nFROM customers c\nJOIN tmp_high_value_customers t ON c.id = t.customer_id;\n\n-- Session-scoped: auto-dropped at disconnect\n-- Transaction-scoped:\nCREATE TEMP TABLE tmp_batch (\n    id INT, status TEXT\n) ON COMMIT DROP;\n\n-- SQL Server table variable\n-- DECLARE @tmp TABLE (id INT, val DECIMAL);"},
{name:"Dynamic SQL",theory:["Dynamic SQL builds and executes query strings at runtime; essential when table names, column names, or structure are determined dynamically.","Use EXECUTE or EXEC with parameterized queries to prevent SQL injection; never concatenate user input directly into SQL strings.","Dynamic SQL loses compile-time checking; errors appear only at runtime, making debugging harder and requiring thorough testing."],code:"-- PostgreSQL dynamic SQL with EXECUTE\nCREATE OR REPLACE FUNCTION search_table(\n    tbl_name TEXT, col_name TEXT, search_val TEXT\n)\nRETURNS SETOF RECORD AS $$\nBEGIN\n    RETURN QUERY EXECUTE format(\n        'SELECT * FROM %I WHERE %I = $1',\n        tbl_name, col_name\n    ) USING search_val;\nEND;\n$$ LANGUAGE plpgsql;\n\n-- Safe: uses format(%I) for identifiers, $1 for values\n-- NEVER do this (SQL injection risk):\n-- EXECUTE 'SELECT * FROM ' || user_input;\n\n-- Dynamic pivot\nCREATE OR REPLACE FUNCTION dynamic_pivot()\nRETURNS TEXT AS $$\nDECLARE\n    cols TEXT;\n    query TEXT;\nBEGIN\n    SELECT STRING_AGG(DISTINCT format(\n        'SUM(CASE WHEN month=%L THEN revenue END) AS %I',\n        month, month), ', ')\n    INTO cols FROM monthly_sales;\n\n    query := 'SELECT product_id, ' || cols ||\n             ' FROM monthly_sales GROUP BY product_id';\n    RETURN query;\nEND;\n$$ LANGUAGE plpgsql;"}
],
examples:[
{title:"Dynamic Reporting with Pivot",desc:"Generate a cross-tab sales report where months are determined dynamically.",code:"-- Static pivot (known months)\nSELECT\n    p.category,\n    SUM(CASE WHEN EXTRACT(MONTH FROM o.order_date) = 1\n        THEN oi.quantity * oi.unit_price END) AS jan_revenue,\n    SUM(CASE WHEN EXTRACT(MONTH FROM o.order_date) = 2\n        THEN oi.quantity * oi.unit_price END) AS feb_revenue,\n    SUM(CASE WHEN EXTRACT(MONTH FROM o.order_date) = 3\n        THEN oi.quantity * oi.unit_price END) AS mar_revenue\nFROM order_items oi\nJOIN orders o ON oi.order_id = o.id\nJOIN products p ON oi.product_id = p.id\nWHERE o.order_date >= '2024-01-01'\nGROUP BY p.category\nORDER BY p.category;"},
{title:"JSON API Response Builder",desc:"Build nested JSON responses directly in SQL for API endpoints.",code:"-- Build nested JSON response\nSELECT json_build_object(\n    'customer', json_build_object(\n        'id', c.id,\n        'name', c.name,\n        'email', c.email\n    ),\n    'orders', (\n        SELECT json_agg(json_build_object(\n            'id', o.id,\n            'total', o.total,\n            'items', (\n                SELECT json_agg(json_build_object(\n                    'product', p.name,\n                    'qty', oi.quantity\n                ))\n                FROM order_items oi\n                JOIN products p ON oi.product_id = p.id\n                WHERE oi.order_id = o.id\n            )\n        ))\n        FROM orders o WHERE o.customer_id = c.id\n    )\n) AS response\nFROM customers c WHERE c.id = 42;"},
{title:"Batch Processing with Temp Tables",desc:"Use temp tables for efficient multi-step ETL within a single session.",code:"-- Step 1: Stage raw data into temp table\nCREATE TEMP TABLE tmp_import AS\nSELECT * FROM raw_csv_data\nWHERE import_date = CURRENT_DATE;\n\n-- Step 2: Clean and validate\nDELETE FROM tmp_import WHERE email IS NULL;\nUPDATE tmp_import SET email = LOWER(TRIM(email));\n\n-- Step 3: Index for join performance\nCREATE INDEX idx_tmp_email ON tmp_import(email);\n\n-- Step 4: Upsert into production\nINSERT INTO customers (name, email, source)\nSELECT name, email, 'import' FROM tmp_import\nON CONFLICT (email) DO UPDATE SET\n    name = EXCLUDED.name,\n    updated_at = NOW();\n\n-- Temp table auto-drops at session end"}
],
practice:[
{q:"A report needs to show months as columns (Jan, Feb, Mar...) with revenue values. The source data has one row per month per product. What SQL technique converts rows into columns?",options:["A) GROUP BY with HAVING","B) PIVOT pattern using CASE expressions inside aggregates (or native PIVOT syntax) to transform row values into column headers","C) UNION ALL to combine months","D) CROSS JOIN between months and products"],answer:"B",d:"E"},
{q:"A query needs to produce a comma-separated list of employee names per department in one row. Which function achieves this?",options:["A) CONCAT only joins two strings","B) STRING_AGG(name, ', ') with GROUP BY department aggregates multiple row values into a single delimited string per group","C) GROUP BY automatically concatenates strings","D) LISTAGG is the only way and exists in all databases"],answer:"B",d:"E"},
{q:"A developer stores user preferences as a JSONB column. They query WHERE preferences->>'theme' = 'dark'. It works but is slow on 5M rows. What improves performance?",options:["A) Convert JSON to TEXT and use LIKE","B) Create a GIN index on the JSONB column which enables fast containment and key-exists queries without scanning all rows","C) JSON columns cannot be indexed at all","D) Use a full table scan with LIMIT"],answer:"B",d:"E"},
{q:"A complex ETL process needs intermediate results referenced 5 times in subsequent steps. A CTE is recalculated each time. What alternative stores the result once?",options:["A) Use a view which stores data permanently","B) A temporary table that physically stores the intermediate result, allowing multiple subsequent queries to read it without recomputation, and can be indexed","C) Repeat the CTE 5 times","D) Use DISTINCT to cache results"],answer:"B",d:"E"},
{q:"Dynamic SQL executes: EXECUTE 'SELECT * FROM ' || user_input. A user submits: users; DROP TABLE users;--. What happens?",options:["A) The query safely fails with a syntax error","B) SQL injection: the database executes SELECT * FROM users then DROP TABLE users, destroying data. Parameterized queries or format(%I) must be used","C) Dynamic SQL automatically sanitizes input","D) DROP TABLE requires special permissions regardless"],answer:"B",d:"E"},
{q:"A temp table created in a session is queried from another concurrent session. What happens?",options:["A) Both sessions share the temp table data","B) Temp tables are session-private; the other session cannot see or access it and would get a 'table not found' error","C) Temp tables are globally visible to all sessions","D) The second session sees an empty version"],answer:"B",d:"E"},
{q:"STRING_AGG without ORDER BY produces different results on repeated runs of the same query. Why?",options:["A) STRING_AGG is nondeterministic by design","B) Without explicit ORDER BY inside STRING_AGG, the database may process rows in any order depending on execution plan, producing unpredictable concatenation order","C) STRING_AGG always uses alphabetical order","D) The data is changing between runs"],answer:"B",d:"E"},
{q:"A JSONB column stores nested objects: {\"address\":{\"city\":\"London\"}}. A query uses WHERE payload->'address'->>'city' = 'London'. A GIN index on payload exists but EXPLAIN shows Seq Scan. Why?",options:["A) GIN indexes do not work with JSONB","B) GIN indexes optimize containment (@>) and existence (?) operators; path-based extraction (->>) requires a specific expression index: CREATE INDEX ON t((payload->'address'->>'city'))","C) Nested JSON cannot be queried","D) The query syntax is wrong"],answer:"B",d:"M"},
{q:"A temp table is created inside a transaction with ON COMMIT DROP. The transaction commits. What happens to the temp table?",options:["A) The temp table persists until session end","B) The temp table is automatically dropped when the transaction commits, as specified by ON COMMIT DROP; it existed only for that transaction's duration","C) ON COMMIT DROP is not a valid option","D) The data is dropped but the table structure remains"],answer:"B",d:"M"},
{q:"A dynamic SQL function uses format('SELECT * FROM %I WHERE %I = $1', tbl, col) USING val. What does %I do vs $1?",options:["A) Both are for values; they are interchangeable","B) %I safely quotes identifiers (table/column names) preventing injection; $1 is a parameter placeholder for values. Together they prevent both identifier and value injection","C) %I is for integers only","D) $1 handles table names and %I handles values"],answer:"B",d:"M"},
{q:"A pivot query with 50 CASE WHEN expressions is hard to maintain. New categories require code changes. What approach handles unknown/dynamic categories?",options:["A) Write all 50 CASE expressions manually each time","B) Use dynamic SQL that queries distinct category values first, then generates the PIVOT/CASE expressions programmatically from the data","C) Categories must always be hardcoded","D) Use UNPIVOT instead of PIVOT"],answer:"B",d:"M"},
{q:"JSON_AGG produces NULL when the subquery returns no rows. A developer expects an empty array []. How to fix this?",options:["A) NULL and [] are the same in JSON","B) Wrap with COALESCE(json_agg(...), '[]'::json) to return an empty array when no rows exist instead of NULL","C) json_agg always returns at least []","D) Use COUNT instead of json_agg"],answer:"B",d:"M"},
{q:"A query uses STRING_AGG(DISTINCT name, ',') to get unique names per group. The result has duplicates removed but the list is very long (10,000+ names). Performance is poor. Why?",options:["A) DISTINCT is free in STRING_AGG","B) DISTINCT within STRING_AGG requires sorting/hashing all values per group to eliminate duplicates before concatenation; with 10K values per group this is expensive - consider pre-filtering or limiting","C) STRING_AGG cannot handle more than 100 values","D) Commas cause performance issues"],answer:"B",d:"M"},
{q:"A temp table with 50M rows is used in multiple joins. Queries are slow despite the temp table having the data. What optimization step is often forgotten?",options:["A) Temp tables are always slow regardless","B) Create indexes on the temp table's join/filter columns and run ANALYZE on it so the query planner has accurate statistics for optimal join strategies","C) Temp tables cannot have indexes","D) Reduce the data to 1000 rows"],answer:"B",d:"M"},
{q:"A system uses dynamic SQL to allow users to choose which columns to display. A malicious user submits column name: 'id; DROP TABLE users;--'. The code uses format('%I', col_name). Is this safe?",options:["A) format(%I) provides no protection","B) Yes - format(%I) double-quotes the identifier, making it treated as a single column name literal. The injection attempt becomes a quoted identifier that will just produce a 'column not found' error","C) Dynamic SQL is never safe regardless of formatting","D) Only prepared statements can prevent this"],answer:"B",d:"H"},
{q:"A JSONB column with GIN index handles 50K reads/second. But writes of complex JSON documents (50+ keys each) are 10x slower than a TEXT column. Why?",options:["A) JSONB parsing is slow on write","B) GIN indexes decompose each JSON document into individual key-value entries; a document with 50 keys creates ~50+ index entries per INSERT, causing massive write amplification","C) JSONB columns have a 10x storage overhead inherently","D) TEXT columns are always faster for all operations"],answer:"B",d:"H"},
{q:"A batch process creates temp tables in a long-running connection pool. After months, the system has memory issues. pg_stat_activity shows 500+ temp tables per connection. What went wrong?",options:["A) Temp tables use no memory","B) Temp tables persist until session end; with connection pooling, sessions live indefinitely so temp tables accumulate. Fix: use ON COMMIT DROP, explicit DROP, or transaction-scoped temp tables","C) Connection pools automatically clean temp tables","D) 500 temp tables use negligible resources"],answer:"B",d:"H"},
{q:"An UNPIVOT operation needs to handle columns of different data types (INT, VARCHAR, DATE) being combined into one value column. Standard UNPIVOT requires matching types. What is the solution?",options:["A) UNPIVOT automatically converts all types","B) CAST all source columns to a common type (TEXT/VARCHAR) before unpivoting, or use LATERAL JOIN with VALUES to manually unpivot with per-column type handling","C) Mixed-type unpivot is impossible in SQL","D) Create separate unpivot queries per type"],answer:"B",d:"H"},
{q:"A dynamic SQL query is built from 20 optional filter parameters. The generated WHERE clause varies per request. Query plan caching is ineffective because each unique SQL text gets a new plan. What optimization helps?",options:["A) Disable query plan caching entirely","B) Use a fixed parameterized query structure with COALESCE/NULL patterns (WHERE col = $1 OR $1 IS NULL) so the SQL text is stable and plans are reused across different parameter combinations","C) Dynamic SQL queries can never be cached","D) Generate all possible combinations upfront"],answer:"B",d:"H"},
{q:"A COPY command loads 10M rows in 30 seconds. The same data via multi-row INSERT batches of 1000 takes 5 minutes. Why is COPY significantly faster even though both are batched?",options:["A) COPY and batch INSERT are identical internally","B) COPY uses a binary streaming protocol that bypasses SQL parsing, plan creation, and per-statement overhead entirely; it writes directly to the table pages with minimal per-row processing","C) COPY skips constraint checking","D) Multi-row INSERT is always the fastest method"],answer:"B",d:"M"}
]},

{id:15,title:"Query Optimization & Best Practices",color:"#4ade80",chips:["Execution Plans","Partitioning","Statistics","Anti-patterns","Bulk"],
subtopics:[
{name:"Reading Execution Plans",theory:["Execution plans show the optimizer's chosen strategy: scan types, join algorithms, sort methods, and estimated costs.","Read plans bottom-up and inside-out: the deepest/innermost nodes execute first, feeding results to parent nodes.","Compare estimated vs actual rows to detect stale statistics; large discrepancies cause suboptimal plan choices."],code:"-- PostgreSQL EXPLAIN with all details\nEXPLAIN (ANALYZE, BUFFERS, FORMAT TEXT)\nSELECT o.id, c.name, SUM(oi.quantity * oi.price)\nFROM orders o\nJOIN customers c ON o.customer_id = c.id\nJOIN order_items oi ON o.id = oi.order_id\nWHERE o.order_date > '2024-01-01'\nGROUP BY o.id, c.name;\n\n-- Key metrics to examine:\n-- Seq Scan vs Index Scan (access method)\n-- Nested Loop vs Hash Join vs Merge Join\n-- Sort Method: quicksort vs external merge\n-- Buffers: shared hit vs read (cache efficiency)\n-- Rows: planned vs actual (estimation quality)"},
{name:"Table Partitioning",theory:["Partitioning splits a large table into smaller physical pieces (partitions) while maintaining a single logical table interface.","Partition pruning automatically skips irrelevant partitions based on WHERE conditions, dramatically reducing I/O.","Common strategies: RANGE (by date/id), LIST (by category/region), HASH (for even distribution when no natural range exists)."],code:"-- Range partitioning by date\nCREATE TABLE events (\n    id BIGSERIAL,\n    event_type TEXT,\n    payload JSONB,\n    created_at TIMESTAMP NOT NULL\n) PARTITION BY RANGE (created_at);\n\n-- Create partitions\nCREATE TABLE events_2024_q1 PARTITION OF events\n    FOR VALUES FROM ('2024-01-01') TO ('2024-04-01');\nCREATE TABLE events_2024_q2 PARTITION OF events\n    FOR VALUES FROM ('2024-04-01') TO ('2024-07-01');\n\n-- Queries automatically use partition pruning\nSELECT * FROM events\nWHERE created_at >= '2024-02-01'\n  AND created_at < '2024-03-01';\n-- Only scans events_2024_q1\n\n-- Drop old data instantly\nDROP TABLE events_2023_q1;  -- milliseconds vs hours"},
{name:"Statistics & Cardinality",theory:["The query optimizer relies on table statistics (row counts, distinct values, histograms) to choose efficient plans.","ANALYZE collects fresh statistics; stale statistics after bulk loads cause the optimizer to choose wrong join methods or scan types.","n_distinct, most_common_vals, and histogram_bounds in pg_stats reveal how the optimizer sees your data distribution."],code:"-- Update statistics for a table\nANALYZE orders;\n\n-- Update stats for specific columns\nANALYZE orders (customer_id, order_date, status);\n\n-- View statistics the planner uses\nSELECT\n    attname,\n    n_distinct,\n    most_common_vals,\n    most_common_freqs\nFROM pg_stats\nWHERE tablename = 'orders'\n  AND attname = 'status';\n\n-- Increase statistics target for better estimates\nALTER TABLE orders ALTER COLUMN customer_id\n    SET STATISTICS 1000;  -- default is 100\nANALYZE orders;\n\n-- Check if auto-analyze is keeping up\nSELECT relname, last_analyze, last_autoanalyze,\n    n_live_tup, n_dead_tup\nFROM pg_stat_user_tables\nWHERE relname = 'orders';"},
{name:"Common Anti-patterns",theory:["SELECT * wastes I/O by reading unnecessary columns; always specify only the columns you need for the query.","Functions on indexed columns (WHERE YEAR(date_col) = 2024) prevent index usage; rewrite as range conditions on the raw column.","N+1 query pattern (one query per parent row) creates thousands of round-trips; use JOINs or batch IN clauses instead."],code:"-- Anti-pattern: SELECT *\n-- BAD: reads all 50 columns from disk\nSELECT * FROM orders WHERE customer_id = 5;\n-- GOOD: only needed columns\nSELECT id, total, status FROM orders WHERE customer_id = 5;\n\n-- Anti-pattern: function on indexed column\n-- BAD: cannot use index on created_at\nSELECT * FROM orders WHERE YEAR(created_at) = 2024;\n-- GOOD: range scan uses index\nSELECT * FROM orders\nWHERE created_at >= '2024-01-01' AND created_at < '2025-01-01';\n\n-- Anti-pattern: N+1 queries\n-- BAD: 1 query + N queries in app loop\n-- for each customer: SELECT * FROM orders WHERE cust_id = ?\n-- GOOD: single batch query\nSELECT c.*, o.* FROM customers c\nJOIN orders o ON c.id = o.customer_id\nWHERE c.id IN (1, 2, 3, 4, 5);"},
{name:"Bulk Operations & Pagination",theory:["Bulk INSERT with multi-row VALUES or COPY is 10-100x faster than individual INSERTs due to reduced transaction and network overhead.","Keyset pagination (WHERE id > last_seen_id LIMIT n) is far more efficient than OFFSET pagination for deep pages.","Batch UPDATE/DELETE in chunks (LIMIT + loop) prevents long-running transactions that block other operations and bloat WAL."],code:"-- Bulk insert: multi-row VALUES\nINSERT INTO products (name, price) VALUES\n    ('A', 10), ('B', 20), ('C', 30), ... ;\n\n-- Even faster: COPY (PostgreSQL)\nCOPY products (name, price)\nFROM '/path/to/data.csv' WITH (FORMAT csv, HEADER);\n\n-- Keyset pagination (efficient for deep pages)\nSELECT id, name, created_at FROM posts\nWHERE id > 1000  -- last seen ID from previous page\nORDER BY id ASC\nLIMIT 20;\n\n-- Batch delete (avoid locking 10M rows at once)\nDELETE FROM logs\nWHERE id IN (\n    SELECT id FROM logs\n    WHERE created_at < '2023-01-01'\n    LIMIT 10000\n);\n-- Repeat in a loop until 0 rows affected"}
],
examples:[
{title:"Diagnosing a Slow Query Step by Step",desc:"Use EXPLAIN ANALYZE to identify and fix performance bottlenecks systematically.",code:"-- Step 1: Get the execution plan\nEXPLAIN (ANALYZE, BUFFERS)\nSELECT c.name, COUNT(*) as order_count\nFROM customers c\nJOIN orders o ON c.id = o.customer_id\nWHERE o.created_at > '2024-01-01'\nGROUP BY c.name\nHAVING COUNT(*) > 10\nORDER BY order_count DESC;\n\n-- Step 2: Identify bottleneck\n-- If Seq Scan on orders with actual rows >> estimated:\nANALYZE orders;  -- refresh statistics\n\n-- Step 3: Add missing index\nCREATE INDEX idx_orders_created_cust\nON orders(created_at, customer_id);\n\n-- Step 4: Verify improvement\nEXPLAIN (ANALYZE, BUFFERS) ... same query ..."},

// State
let currentTopic = null;
const STORAGE_KEY = 'sql_roadmap_progress';

function getProgress() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
    catch { return {}; }
}
function saveProgress(data) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}
function getTotalPractice() {
    return topics.reduce((sum, t) => sum + t.practice.length, 0);
}
function getCompletedCount() {
    const prog = getProgress();
    return Object.values(prog).filter(v => v).length;
}
function updateProgressBar() {
    const total = getTotalPractice();
    const done = getCompletedCount();
    const pct = total > 0 ? (done / total * 100) : 0;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressText').textContent = done + ' / ' + total;
}
function getTopicProgress(topicId) {
    const prog = getProgress();
    const topic = topics.find(t => t.id === topicId);
    if (!topic) return {done: 0, total: 0};
    let done = 0;
    topic.practice.forEach((_, i) => {
        if (prog[topicId + '_' + i]) done++;
    });
    return {done, total: topic.practice.length};
}


// Syntax highlighting
function highlightCode(code) {
    let html = code
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    // SQL comments
    html = html.replace(/(--.*)/g, '<span class="cm">$1</span>');
    // Strings
    html = html.replace(/('[^'\\]*(?:\\.[^'\\]*)*')/g, '<span class="str">$1</span>');
    // Numbers
    html = html.replace(/\b(\d+\.?\d*)\b/g, '<span class="num">$1</span>');
    // SQL keywords
    const sqlKeywords = ['SELECT','FROM','WHERE','JOIN','LEFT','RIGHT','INNER','OUTER','FULL','CROSS','ON','GROUP','BY','ORDER','HAVING','INSERT','INTO','VALUES','UPDATE','SET','DELETE','CREATE','TABLE','ALTER','DROP','INDEX','VIEW','AS','AND','OR','NOT','NULL','IS','PRIMARY','KEY','FOREIGN','REFERENCES','DEFAULT','SERIAL','BIGSERIAL','INT','BIGINT','VARCHAR','TEXT','DECIMAL','BOOLEAN','DATE','TIMESTAMP','INTERVAL','PARTITION','CLUSTER','WITH','RECURSIVE','CASE','WHEN','THEN','ELSE','END','DISTINCT','COUNT','SUM','AVG','MAX','MIN','LIKE','BETWEEN','EXISTS','IN','UNION','ALL','LIMIT','OFFSET','CASCADE','SCHEMA','USING','MERGE','OVER','ROW_NUMBER','RANK','DENSE_RANK','LAG','LEAD','NTILE','ROWS','RANGE','UNBOUNDED','PRECEDING','FOLLOWING','CURRENT','ROW','COALESCE','NULLIF','EXTRACT','YEAR','MONTH','DAY','ASC','DESC','HAVING','LATERAL','FETCH','NEXT','ONLY','GENERATED','ALWAYS','IDENTITY','GRANT','REVOKE','TRIGGER','FUNCTION','PROCEDURE','RETURN','RETURNS','DECLARE','BEGIN','COMMIT','ROLLBACK','SAVEPOINT','EXCEPT','INTERSECT','ANY','SOME','COPY','FORMAT','VACUUM','OPTIMIZE','EXPLAIN','ANALYZE','MATERIALIZED','REFRESH','CONFLICT','EXCLUDED','GROUPING','ROLLUP','CUBE','FILTER','WITHIN','WINDOW','PERCENT_RANK','CUME_DIST','FIRST_VALUE','LAST_VALUE','NTH_VALUE','DATE_TRUNC','GENERATE_SERIES','UPPER','LOWER','TRIM','ROUND','CEIL','FLOOR','GREATEST','LEAST','ARRAY','JSONB','JSON','CAST','CONCAT'];
    sqlKeywords.forEach(kw => {
        html = html.replace(new RegExp('\\b(' + kw + ')\\b', 'gi'), '<span class="kw">$1</span>');
    });
    return html;
}


// Render roadmap
function renderRoadmap() {
    const container = document.getElementById('roadmapContainer');
    container.innerHTML = '';
    topics.forEach(topic => {
        const prog = getTopicProgress(topic.id);
        const node = document.createElement('div');
        node.className = 'node';
        node.onclick = () => showDetail(topic.id);
        node.innerHTML = `
            <div class="node-number" style="border-color:${topic.color};color:${topic.color}">${topic.id}</div>
            <div class="node-card">
                <div class="node-title" style="color:${topic.color}">${topic.title}</div>
                <div class="node-chips">${topic.chips.map(c => '<span class="chip">' + c + '</span>').join('')}</div>
                <div class="node-progress">${prog.done} / ${prog.total} practice completed</div>
            </div>
        `;
        container.appendChild(node);
    });
}

function showDetail(topicId) {
    currentTopic = topics.find(t => t.id === topicId);
    if (!currentTopic) return;
    document.getElementById('roadmapPage').classList.remove('active');
    document.getElementById('detailPage').classList.add('active');
    document.getElementById('detailTitle').textContent = currentTopic.title;
    document.getElementById('detailTitle').style.color = currentTopic.color;
    document.getElementById('detailSubtitle').textContent = currentTopic.subtopics.map(s => s.name).join(' \u2022 ');
    renderTheory();
    renderExamples();
    renderPractice();
    switchTab('theory');
    window.scrollTo(0, 0);
}

function showRoadmap() {
    document.getElementById('detailPage').classList.remove('active');
    document.getElementById('roadmapPage').classList.add('active');
    renderRoadmap();
    updateProgressBar();
}

function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t, i) => {
        t.classList.toggle('active', ['theory','examples','practice','solutions'][i] === tab);
    });
    document.querySelectorAll('.tab-content').forEach((tc, i) => {
        tc.classList.toggle('active', ['theory','examples','practice','solutions'][i] === tab);
    });
    if (tab === 'solutions') renderSolutions();
}


function renderTheory() {
    const container = document.getElementById('theoryContent');
    container.innerHTML = currentTopic.subtopics.map(sub => `
        <div class="theory-section">
            <div class="theory-title">${sub.name}</div>
            ${sub.theory.map(t => '<p class="theory-point">' + t + '</p>').join('')}
            <pre class="code-block">${highlightCode(sub.code)}</pre>
        </div>
    `).join('');
}

function renderExamples() {
    const container = document.getElementById('examplesContent');
    container.innerHTML = currentTopic.examples.map(ex => `
        <div class="example-card">
            <div class="example-title">${ex.title}</div>
            <p class="example-desc">${ex.desc}</p>
            <pre class="code-block">${highlightCode(ex.code)}</pre>
        </div>
    `).join('');
}

function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderPractice() {
    const container = document.getElementById('practiceContent');
    const prog = getProgress();
    var html = '';
    currentTopic.practice.forEach(function(p, i) {
        var key = currentTopic.id + '_' + i;
        var checked = prog[key] ? 'checked' : '';
        var doneClass = prog[key] ? 'done' : '';
        var diffClass = p.d === 'E' ? 'easy' : p.d === 'M' ? 'medium' : 'hard';
        var diffLabel = p.d === 'E' ? 'Easy' : p.d === 'M' ? 'Medium' : 'Hard';
        html += '<div class="practice-item ' + doneClass + '">' +
            '<input type="checkbox" ' + checked + ' onchange="togglePractice(\'' + key + '\', this)">' +
            '<div class="practice-text">' +
            '<div>' + (i+1) + '. ' + escHtml(p.q) + '</div>' +
            '<ul class="mcq-options">' +
            p.options.map(function(opt) { return '<li class="mcq-option">' + escHtml(opt) + '</li>'; }).join('') +
            '</ul></div>' +
            '<span class="difficulty ' + diffClass + '">' + diffLabel + '</span></div>';
    });
    container.innerHTML = html;
}

function togglePractice(key, el) {
    const prog = getProgress();
    prog[key] = el.checked;
    saveProgress(prog);
    updateProgressBar();
    el.parentElement.classList.toggle('done', el.checked);
}

`DISTINCT eliminates duplicate values from the result set. The customers table has 50,000 rows but only 200 unique cities. DISTINCT collapses all duplicate city values into one occurrence each.`,

`BETWEEN is inclusive on both ends. WHERE price BETWEEN 10 AND 50 includes prices equal to 10 and equal to 50. It is equivalent to price >= 10 AND price <= 50.`,
`WHERE cannot use aggregate functions because WHERE filters individual rows before grouping occurs. HAVING filters after GROUP BY aggregation, so HAVING COUNT(*) > 5 correctly filters groups by their aggregate values.`,

`INNER JOIN only returns rows with matching values in both tables. 5 employees with NULL department_id cannot match any department, so at most 95 employees appear (100 minus the 5 unmatched).`,
`LEFT JOIN preserves all rows from the left table (customers) regardless of whether they have matching rows in the right table (orders). Customers without orders appear with NULL order columns.`,
`When LEFT JOIN produces the same count as INNER JOIN, it means no unmatched rows exist on the left side. Every row in the left table found at least one match in the right table.`,
`CROSS JOIN produces the Cartesian product: every combination of rows from both tables. 1000 products x 365 days = 365,000 rows total.`,
`When the hierarchy is stored in one table (employee_id and manager_id referencing the same table), you must SELF JOIN - join employees to itself with different aliases to link each employee to their manager's row.`,

`LEFT JOIN preserves all left rows but if a left row matches multiple right rows, it appears multiple times. 100 left rows producing 150 result rows means 50 rows had multiple matches in the right table.`,
`INNER JOIN excludes rows without matches. If an employee's department_id is NULL or doesn't match any valid department id, INNER JOIN drops that employee regardless of other filter conditions.`,

`ROW_NUMBER always assigns unique sequential integers even when values tie. For tied salaries, the assignment order is non-deterministic (implementation-dependent). Use RANK or DENSE_RANK if ties should share a number.`,

`An index on (device_id, event_time) allows the database to seek directly to each device's events in order. ROWS BETWEEN 999 PRECEDING AND CURRENT ROW limits computation to exactly 1000 events per device efficiently.`,
