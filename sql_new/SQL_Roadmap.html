<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SQL Mastery Roadmap</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#080c14;--card:#141d2e;--border:#1e2d45;--text:#dde4f0;--text-dim:#8892a4;--green:#4ade80;--cyan:#22d3ee;--purple:#a78bfa;--gradient:linear-gradient(135deg,#4ade80,#22d3ee,#a78bfa)}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
code,pre,.code{font-family:'JetBrains Mono',monospace}
.header{position:sticky;top:0;z-index:1000;background:rgba(8,12,20,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:12px 24px}
.header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:1.4rem;font-weight:700;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.progress-container{flex:1;max-width:300px;margin-left:24px}
.progress-label{font-size:0.7rem;color:var(--text-dim);margin-bottom:4px;text-align:right}
.progress-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:var(--gradient);border-radius:3px;transition:width 0.5s ease}
</style>
</head>
<body>
<header class="header">
<div class="header-inner">
<div class="logo">SQL Mastery Roadmap</div>
<div class="progress-container">
<div class="progress-label"><span id="progressText">0 / 300</span> completed</div>
<div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
</div>
</div>
</header>
<div class="page active" id="roadmapPage">
<div class="roadmap" id="roadmapContainer"></div>
</div>
<div class="page" id="detailPage">
<button class="back-btn" onclick="showRoadmap()">&#8592; Back to Roadmap</button>
<div class="detail-header">
<h1 class="detail-title" id="detailTitle"></h1>
<p class="detail-subtitle" id="detailSubtitle"></p>
</div>
<div class="tabs">
<div class="tab active" onclick="switchTab('theory')">Theory</div>
<div class="tab" onclick="switchTab('examples')">Examples</div>
<div class="tab" onclick="switchTab('practice')">Practice</div>
<div class="tab" onclick="switchTab('solutions')">Solutions</div>
</div>
<div class="tab-content active" id="theoryContent"></div>
<div class="tab-content" id="examplesContent"></div>
<div class="tab-content" id="practiceContent"></div>
<div class="tab-content" id="solutionsContent"></div>
</div>


<style>
.page{display:none;padding:40px 24px 80px;max-width:900px;margin:0 auto;animation:fadeIn 0.3s ease}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.roadmap{position:relative;padding-left:60px}
.roadmap::before{content:'';position:absolute;left:28px;top:0;bottom:0;width:2px;background:linear-gradient(to bottom,var(--green),var(--cyan),var(--purple));opacity:0.4}
.node{position:relative;margin-bottom:24px;cursor:pointer;transition:transform 0.2s ease}
.node:hover{transform:translateX(4px)}
.node-number{position:absolute;left:-48px;top:16px;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.8rem;border:2px solid;background:var(--bg)}
.node-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px 24px;transition:border-color 0.2s,box-shadow 0.2s}
.node:hover .node-card{border-color:var(--cyan);box-shadow:0 4px 20px rgba(34,211,238,0.1)}
.node-title{font-size:1.1rem;font-weight:600;margin-bottom:8px}
.node-chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{font-size:0.65rem;padding:3px 8px;border-radius:4px;background:rgba(255,255,255,0.05);border:1px solid var(--border);color:var(--text-dim)}
.node-progress{font-size:0.7rem;color:var(--text-dim);margin-top:8px}
.back-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);cursor:pointer;font-family:'Sora',sans-serif;font-size:0.85rem;margin-bottom:24px;transition:border-color 0.2s}
.back-btn:hover{border-color:var(--cyan)}
.detail-header{margin-bottom:24px}
.detail-title{font-size:1.8rem;font-weight:700;margin-bottom:8px}
.detail-subtitle{font-size:0.85rem;color:var(--text-dim)}
.tabs{display:flex;gap:4px;margin-bottom:24px;background:var(--card);border-radius:10px;padding:4px;border:1px solid var(--border)}
.tab{flex:1;padding:10px 16px;text-align:center;border-radius:8px;cursor:pointer;font-size:0.85rem;font-weight:500;color:var(--text-dim);transition:all 0.2s}
.tab.active{background:var(--border);color:var(--text)}
.tab:hover:not(.active){color:var(--text)}
.tab-content{display:none;animation:fadeIn 0.3s ease}
.tab-content.active{display:block}
.theory-section{margin-bottom:24px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px}
.theory-title{font-size:1rem;font-weight:600;margin-bottom:12px;color:var(--cyan)}
.theory-point{font-size:0.85rem;color:var(--text-dim);margin-bottom:8px;padding-left:16px;position:relative;line-height:1.6}
.theory-point::before{content:'>';position:absolute;left:0;color:var(--green)}
pre.code-block{background:rgba(0,0,0,0.4);border:1px solid var(--border);border-radius:8px;padding:16px;margin-top:12px;overflow-x:auto;font-size:0.8rem;line-height:1.6}
.example-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:16px}
.example-title{font-size:0.9rem;font-weight:600;margin-bottom:8px;color:var(--purple)}
.example-desc{font-size:0.82rem;color:var(--text-dim);margin-bottom:12px}
</style>


<style>
.practice-item{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;transition:border-color 0.2s}
.practice-item:hover{border-color:var(--cyan)}
.practice-item input[type="checkbox"]{width:18px;height:18px;margin-top:2px;accent-color:var(--green);cursor:pointer}
.practice-item.done{opacity:0.6;border-color:var(--green)}
.practice-text{flex:1;font-size:0.82rem;line-height:1.5}
.difficulty{font-size:0.65rem;padding:2px 8px;border-radius:4px;font-weight:600;white-space:nowrap}
.difficulty.easy{background:rgba(74,222,128,0.15);color:#4ade80}
.difficulty.medium{background:rgba(251,191,36,0.15);color:#fbbf24}
.difficulty.hard{background:rgba(244,114,182,0.15);color:#f472b6}
.solution-item{background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:12px;overflow:hidden}
.solution-header{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.solution-header:hover{background:rgba(34,211,238,0.05)}
.solution-num{font-size:0.75rem;color:var(--text-dim);font-family:'JetBrains Mono',monospace;margin-right:10px}
.solution-q{font-size:0.82rem;flex:1}
.solution-toggle{padding:4px 12px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--cyan);font-size:0.72rem;cursor:pointer;font-family:'Sora',sans-serif;transition:all 0.2s}
.solution-toggle:hover{background:rgba(34,211,238,0.1);border-color:var(--cyan)}
.solution-body{display:none;padding:0 16px 16px;border-top:1px solid var(--border)}
.solution-body.open{display:block}
.cm{color:#6b7280}.str{color:#a5d6ff}.kw{color:#ff7b72}.fn{color:#d2a8ff}.num{color:#79c0ff}.dec{color:#ffa657}
.mcq-options{list-style:none;margin:8px 0;padding:0}
.mcq-option{padding:8px 12px;margin:4px 0;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:6px;font-size:0.82rem;cursor:default;transition:border-color 0.2s}
.mcq-option:hover{border-color:var(--cyan)}
.mcq-option.correct{border-color:var(--green);background:rgba(74,222,128,0.08)}
.solution-explanation{font-size:0.82rem;color:var(--text-dim);padding:12px;background:rgba(34,211,238,0.05);border-left:3px solid var(--cyan);border-radius:0 6px 6px 0;margin-top:8px;line-height:1.6}
@media(max-width:640px){.roadmap{padding-left:40px}.roadmap::before{left:16px}.node-number{left:-32px;width:26px;height:26px;font-size:0.7rem}.header-inner{flex-wrap:wrap;gap:8px}.progress-container{max-width:100%;margin-left:0}}
</style>


<script>
const topics = [
{id:1,title:"SQL Basics & SELECT",color:"#38bdf8",chips:["SELECT","WHERE","ORDER BY","LIMIT","Operators"],
subtopics:[
{name:"SELECT & FROM",theory:["SELECT specifies which columns to retrieve; FROM specifies the table to query data from.","SELECT * returns all columns, while naming specific columns improves performance and clarity.","Every SQL query requires at least SELECT and FROM clauses to retrieve data from a database table."],code:"-- Basic SELECT statement\nSELECT first_name, last_name, email\nFROM employees;\n\n-- Select all columns\nSELECT * FROM departments;\n\n-- Select with expressions\nSELECT\n    first_name,\n    last_name,\n    salary,\n    salary * 12 AS annual_salary\nFROM employees;"},
{name:"WHERE & Filtering",theory:["WHERE filters rows based on conditions before results are returned; it reduces the result set.","Combine conditions with AND (all must be true), OR (any can be true), and NOT (negates condition).","IN checks membership in a list, BETWEEN checks a range, LIKE uses pattern matching with % and _ wildcards."],code:"-- Basic WHERE\nSELECT * FROM employees WHERE department = 'Engineering';\n\n-- Multiple conditions\nSELECT * FROM employees\nWHERE salary > 50000 AND department = 'Sales'\n   OR department = 'Marketing';\n\n-- IN, BETWEEN, LIKE\nSELECT * FROM employees WHERE department IN ('Sales', 'Marketing', 'HR');\nSELECT * FROM orders WHERE order_date BETWEEN '2024-01-01' AND '2024-12-31';\nSELECT * FROM customers WHERE email LIKE '%@gmail.com';"},
{name:"ORDER BY & LIMIT",theory:["ORDER BY sorts results by one or more columns; ASC (default) for ascending, DESC for descending.","LIMIT restricts the number of rows returned; combined with OFFSET it enables pagination.","ORDER BY executes after WHERE filtering, so sorting applies only to the filtered result set."],code:"-- Sort by salary descending\nSELECT first_name, salary FROM employees ORDER BY salary DESC;\n\n-- Multiple sort columns\nSELECT * FROM employees ORDER BY department ASC, salary DESC;\n\n-- Pagination with LIMIT and OFFSET\nSELECT * FROM products ORDER BY price DESC LIMIT 10;        -- Top 10\nSELECT * FROM products ORDER BY price DESC LIMIT 10 OFFSET 20; -- Page 3"},
{name:"DISTINCT & Aliases",theory:["DISTINCT removes duplicate rows from results; it applies to the entire row, not just one column.","Column aliases (AS) rename output columns for readability; table aliases shorten table references in queries.","DISTINCT can be expensive on large datasets since it requires sorting or hashing to identify duplicates."],code:"-- Remove duplicate values\nSELECT DISTINCT department FROM employees;\nSELECT DISTINCT city, state FROM customers;\n\n-- Column aliases\nSELECT\n    first_name AS name,\n    salary * 12 AS annual_pay,\n    department AS dept\nFROM employees;\n\n-- Table aliases (useful in JOINs)\nSELECT e.first_name, d.department_name\nFROM employees e\nJOIN departments d ON e.dept_id = d.id;"},
{name:"Comparison & Logical Operators",theory:["Comparison operators: = (equal), != or <> (not equal), <, >, <=, >= compare values in WHERE clauses.","IS NULL and IS NOT NULL check for missing values; = NULL never works because NULL is not a value.","Operator precedence: NOT evaluates first, then AND, then OR; use parentheses to control evaluation order."],code:"-- Comparison operators\nSELECT * FROM products WHERE price >= 100 AND price <= 500;\nSELECT * FROM employees WHERE manager_id IS NOT NULL;\nSELECT * FROM orders WHERE status != 'cancelled';\n\n-- Precedence matters\n-- Without parentheses: AND binds tighter than OR\nSELECT * FROM employees\nWHERE (department = 'Sales' OR department = 'Marketing')\n  AND salary > 60000;\n\n-- IS NULL check\nSELECT * FROM customers WHERE phone IS NULL;"}
],
examples:[
{title:"Employee Directory Query",desc:"Retrieve filtered and sorted employee data with computed columns.",code:"SELECT\n    first_name || ' ' || last_name AS full_name,\n    department,\n    salary,\n    ROUND(salary / 2080.0, 2) AS hourly_rate\nFROM employees\nWHERE department IN ('Engineering', 'Product', 'Design')\n  AND salary > 60000\n  AND termination_date IS NULL\nORDER BY department ASC, salary DESC\nLIMIT 20;"},
{title:"Customer Search with Pattern Matching",desc:"Find customers using LIKE patterns and multiple filter conditions.",code:"SELECT\n    customer_id,\n    first_name,\n    last_name,\n    email,\n    signup_date\nFROM customers\nWHERE email LIKE '%@company.com'\n  AND signup_date BETWEEN '2024-01-01' AND '2024-06-30'\n  AND city IS NOT NULL\nORDER BY signup_date DESC;"},
{title:"Product Catalog with Pagination",desc:"Paginated product listing with price range and availability filters.",code:"-- Page 3 of products (20 per page)\nSELECT\n    product_id,\n    product_name,\n    category,\n    price,\n    stock_quantity\nFROM products\nWHERE price BETWEEN 10 AND 200\n  AND stock_quantity > 0\n  AND category != 'Discontinued'\nORDER BY category, price ASC\nLIMIT 20 OFFSET 40;"}
],
practice:[
{q:"A report needs employee names and salaries for the 'Finance' department only, sorted by highest salary first. Which query is correct?",options:["A) SELECT name, salary FROM employees WHERE department = 'Finance' ORDER BY salary DESC","B) SELECT name, salary FROM employees ORDER BY salary DESC WHERE department = 'Finance'","C) SELECT name, salary WHERE department = 'Finance' FROM employees ORDER BY salary DESC","D) SELECT * FROM employees WHERE department = 'Finance' SORT BY salary DESC"],answer:"A",d:"E"},
{q:"A customer table has 50,000 rows. A query uses SELECT DISTINCT city FROM customers. The result has 200 rows. What happened?",options:["A) The query deleted 49,800 rows from the table","B) DISTINCT removed duplicate city values, returning only unique cities","C) The query failed because DISTINCT only works with numeric columns","D) DISTINCT randomly selected 200 rows from the table"],answer:"B",d:"E"},
{q:"An analyst writes: SELECT * FROM orders WHERE total > 100 AND status = 'shipped' OR status = 'delivered'. They expected only high-value shipped/delivered orders but get low-value delivered orders too. Why?",options:["A) The OR operator has higher precedence than AND","B) AND binds tighter than OR, so the query means (total>100 AND status='shipped') OR (status='delivered')","C) The WHERE clause cannot combine AND and OR","D) The > operator doesn't work with OR"],answer:"B",d:"E"},
{q:"A developer queries: SELECT * FROM users WHERE email = NULL. It returns no rows even though some users have no email. What is wrong?",options:["A) The table is empty","B) NULL cannot be compared with =; must use IS NULL instead","C) The email column doesn't exist","D) = NULL is valid but returns NULLs only on Tuesdays"],answer:"B",d:"E"},
{q:"A paginated API returns page 5 with 25 items per page. What LIMIT and OFFSET values show page 5?",options:["A) LIMIT 25 OFFSET 100","B) LIMIT 25 OFFSET 125","C) LIMIT 5 OFFSET 25","D) LIMIT 25 OFFSET 4"],answer:"A",d:"E"},
{q:"A query returns duplicate full names because two employees share the same name. Adding DISTINCT full_name still shows duplicates. Why might this happen?",options:["A) DISTINCT is broken in SQL","B) If SELECT DISTINCT includes additional columns (like id), rows differ on those columns making them not duplicates","C) DISTINCT only works on the first column","D) Full names cannot have duplicates"],answer:"B",d:"E"},
{q:"You need all products priced between $10 and $50 inclusive. Which WHERE clause is correct?",options:["A) WHERE price > 10 AND price < 50","B) WHERE price BETWEEN 10 AND 50","C) WHERE price IN (10, 50)","D) WHERE price >= 10 OR price <= 50"],answer:"B",d:"E"},
{q:"A dashboard query: SELECT department, COUNT(*) FROM employees WHERE salary > 50000. It fails. The developer adds GROUP BY department and it works. But now they want only departments with more than 5 such employees. What should they add?",options:["A) Another WHERE COUNT(*) > 5","B) HAVING COUNT(*) > 5 after GROUP BY","C) LIMIT 5","D) ORDER BY COUNT(*) > 5"],answer:"B",d:"M"},
{q:"An e-commerce report uses: SELECT product_name, price FROM products ORDER BY price DESC LIMIT 5. If two products tie at position 5, which one appears in results?",options:["A) Both always appear","B) The database arbitrarily picks one - results are non-deterministic without a tiebreaker column","C) Neither appears","D) An error is thrown"],answer:"B",d:"M"},
{q:"A query uses: SELECT * FROM employees WHERE last_name LIKE '_a%'. Which last names match?",options:["A) Names starting with 'a'","B) Names where the second character is 'a' (e.g., 'Martin', 'Daniels')","C) Names containing 'a' anywhere","D) Names ending with 'a'"],answer:"B",d:"M"},
{q:"A query: SELECT DISTINCT department, city FROM employees returns 45 rows while SELECT DISTINCT department returns 8 rows. Why the difference?",options:["A) DISTINCT is applied only to the first column","B) DISTINCT applies to the combination of all selected columns; there are 45 unique department-city pairs","C) The second query is wrong","D) City column has NULL values causing extra rows"],answer:"B",d:"M"},
{q:"Your query filters: WHERE order_date BETWEEN '2024-01-01' AND '2024-01-31'. Orders placed at '2024-01-31 14:30:00' are missing. Why?",options:["A) BETWEEN excludes the end value","B) If order_date is TIMESTAMP, '2024-01-31' means midnight, so afternoon orders on Jan 31 are excluded","C) The query syntax is wrong","D) BETWEEN doesn't work with dates"],answer:"B",d:"M"},
{q:"A table has 10 million rows. Query A uses SELECT * and Query B selects only 3 needed columns. Both have the same WHERE clause. Which is likely faster and why?",options:["A) They perform identically since WHERE does the filtering","B) Query B is faster because it reads less data from disk, especially in columnar storage","C) Query A is faster because * is optimized internally","D) Neither is fast on 10M rows regardless of column selection"],answer:"B",d:"M"},
{q:"A developer writes: SELECT * FROM products WHERE category = 'Electronics' ORDER BY price LIMIT 10 OFFSET -1. What happens?",options:["A) Returns 10 rows starting from the last row","B) OFFSET with a negative value causes an error in most databases","C) Returns all rows","D) Returns 9 rows"],answer:"B",d:"M"},
{q:"A WHERE clause uses: WHERE first_name LIKE '%john%'. This query is very slow on a 50M row table with an index on first_name. Why?",options:["A) LIKE always performs full table scans","B) Leading wildcard (%) prevents the database from using the index efficiently, forcing a full scan","C) The index is corrupted","D) 50M rows is too small for indexes to help"],answer:"B",d:"M"},
{q:"A complex reporting query has: WHERE (A OR B) AND (C OR D). The database returns unexpected rows. To debug, which approach helps most?",options:["A) Remove all conditions and start over","B) Break into subsets: test (A OR B) alone, then (C OR D) alone, then combine to verify logic","C) Add more OR conditions","D) Replace all ORs with ANDs"],answer:"B",d:"H"},
{q:"A query uses ORDER BY on a non-indexed column over 100M rows and times out. Adding LIMIT 10 makes it fast. But the DBA says the plan still does a full sort. Why is it faster with LIMIT?",options:["A) LIMIT prevents the sort entirely","B) The optimizer uses a top-N heap sort (partial sort), keeping only 10 candidates instead of sorting all 100M rows","C) LIMIT skips the WHERE clause","D) The database caches LIMIT queries"],answer:"B",d:"H"},
{q:"A multi-tenant application has a 'tenant_id' column on every table. Developers sometimes forget the WHERE tenant_id = ? filter, leaking data between tenants. Which database feature prevents this at the SQL level?",options:["A) Adding more indexes on tenant_id","B) Row-level security policies that automatically filter by tenant_id for each session","C) Renaming tenant_id to something memorable","D) Using DISTINCT to avoid cross-tenant duplicates"],answer:"B",d:"H"},
{q:"You need the 5th highest salary without using LIMIT/OFFSET (for databases that don't support them). Which approach works?",options:["A) SELECT MAX(salary) FROM employees","B) Use a correlated subquery: SELECT salary FROM employees e1 WHERE 4 = (SELECT COUNT(DISTINCT salary) FROM employees e2 WHERE e2.salary > e1.salary)","C) SELECT salary FROM employees ORDER BY salary","D) SELECT DISTINCT salary FROM employees WHERE rownum = 5"],answer:"B",d:"H"},
{q:"A query joins 4 tables with complex WHERE conditions. It runs in 2 seconds. Adding ORDER BY to the result makes it take 45 seconds. The result has 5M rows. What is the most effective fix?",options:["A) Remove the ORDER BY entirely","B) Add an index that covers the ORDER BY columns, or reduce result size with stricter WHERE before sorting","C) Increase server memory to 1TB","D) Use ORDER BY RANDOM() instead"],answer:"B",d:"H"}
]},


{id:2,title:"JOINs",color:"#34d399",chips:["INNER","LEFT","RIGHT","FULL","CROSS","SELF"],
subtopics:[
{name:"INNER JOIN",theory:["INNER JOIN returns only rows that have matching values in both tables based on the join condition.","If a row in either table has no match in the other, it is excluded from the INNER JOIN result.","INNER JOIN is the default JOIN type; writing JOIN without a qualifier implies INNER JOIN."],code:"-- INNER JOIN: only matching rows\nSELECT\n    e.first_name,\n    e.last_name,\n    d.department_name\nFROM employees e\nINNER JOIN departments d ON e.department_id = d.id;\n\n-- Only employees with a valid department appear\n-- Employees with NULL department_id are excluded\n-- Departments with no employees are excluded"},
{name:"LEFT & RIGHT JOIN",theory:["LEFT JOIN returns all rows from the left table and matched rows from the right; unmatched right columns become NULL.","RIGHT JOIN is the mirror of LEFT JOIN: all rows from the right table, matched rows from the left.","LEFT JOIN is far more common in practice; RIGHT JOIN can always be rewritten as LEFT JOIN by swapping table order."],code:"-- LEFT JOIN: all employees, even without departments\nSELECT\n    e.first_name,\n    d.department_name\nFROM employees e\nLEFT JOIN departments d ON e.department_id = d.id;\n-- Employees without a department show NULL for department_name\n\n-- Find employees WITHOUT a department\nSELECT e.first_name\nFROM employees e\nLEFT JOIN departments d ON e.department_id = d.id\nWHERE d.id IS NULL;\n\n-- RIGHT JOIN equivalent\nSELECT e.first_name, d.department_name\nFROM departments d\nLEFT JOIN employees e ON e.department_id = d.id;"},
{name:"FULL OUTER JOIN",theory:["FULL OUTER JOIN returns all rows from both tables; unmatched rows on either side get NULLs for the other table's columns.","Useful for finding mismatches or performing data reconciliation between two datasets.","Not all databases support FULL OUTER JOIN (e.g., MySQL); it can be emulated with UNION of LEFT and RIGHT JOINs."],code:"-- FULL OUTER JOIN: all rows from both sides\nSELECT\n    e.first_name,\n    d.department_name\nFROM employees e\nFULL OUTER JOIN departments d ON e.department_id = d.id;\n\n-- Emulate in MySQL (no native FULL OUTER JOIN)\nSELECT e.first_name, d.department_name\nFROM employees e LEFT JOIN departments d ON e.department_id = d.id\nUNION\nSELECT e.first_name, d.department_name\nFROM employees e RIGHT JOIN departments d ON e.department_id = d.id;"},
{name:"CROSS JOIN",theory:["CROSS JOIN produces the Cartesian product: every row in table A paired with every row in table B.","If table A has 100 rows and table B has 50 rows, CROSS JOIN produces 5,000 rows (100 x 50).","Useful for generating combinations (all products x all stores) or creating date/dimension scaffolds."],code:"-- CROSS JOIN: all combinations\nSELECT\n    p.product_name,\n    s.store_name\nFROM products p\nCROSS JOIN stores s;\n-- If 50 products and 10 stores = 500 rows\n\n-- Practical: generate a calendar for all employees\nSELECT\n    e.employee_id,\n    d.date\nFROM employees e\nCROSS JOIN generate_series('2024-01-01'::date, '2024-12-31'::date, '1 day') AS d(date);"},
{name:"SELF JOIN",theory:["A SELF JOIN joins a table to itself using different aliases; useful for hierarchical or comparative data.","Common use cases: employee-manager relationships, finding duplicates, comparing rows within the same table.","Always requires table aliases to distinguish between the two instances of the same table."],code:"-- SELF JOIN: employee with their manager\nSELECT\n    e.first_name AS employee,\n    m.first_name AS manager\nFROM employees e\nLEFT JOIN employees m ON e.manager_id = m.employee_id;\n\n-- Find employees earning more than their manager\nSELECT\n    e.first_name AS employee,\n    e.salary AS emp_salary,\n    m.first_name AS manager,\n    m.salary AS mgr_salary\nFROM employees e\nJOIN employees m ON e.manager_id = m.employee_id\nWHERE e.salary > m.salary;"}
],
examples:[
{title:"Multi-Table Report with JOINs",desc:"Combine employees, departments, and locations for a full org report.",code:"SELECT\n    e.first_name || ' ' || e.last_name AS employee_name,\n    d.department_name,\n    l.city,\n    l.country,\n    m.first_name || ' ' || m.last_name AS manager_name\nFROM employees e\nINNER JOIN departments d ON e.department_id = d.department_id\nINNER JOIN locations l ON d.location_id = l.location_id\nLEFT JOIN employees m ON e.manager_id = m.employee_id\nORDER BY d.department_name, e.last_name;"},
{title:"Finding Unmatched Records",desc:"Use LEFT JOIN with NULL check to find orphaned records between tables.",code:"-- Customers who never placed an order\nSELECT c.customer_id, c.name, c.email\nFROM customers c\nLEFT JOIN orders o ON c.customer_id = o.customer_id\nWHERE o.order_id IS NULL;\n\n-- Products never sold\nSELECT p.product_id, p.product_name\nFROM products p\nLEFT JOIN order_items oi ON p.product_id = oi.product_id\nWHERE oi.id IS NULL;"},
{title:"CROSS JOIN for Scaffolding",desc:"Generate all store-month combinations to identify missing sales data.",code:"-- All store-month combinations\nWITH months AS (\n    SELECT generate_series(\n        '2024-01-01'::date,\n        '2024-12-01'::date,\n        '1 month'\n    )::date AS month_start\n)\nSELECT\n    s.store_name,\n    m.month_start,\n    COALESCE(SUM(o.total), 0) AS revenue\nFROM stores s\nCROSS JOIN months m\nLEFT JOIN orders o ON o.store_id = s.store_id\n    AND o.order_date >= m.month_start\n    AND o.order_date < m.month_start + INTERVAL '1 month'\nGROUP BY s.store_name, m.month_start\nORDER BY s.store_name, m.month_start;"}
],
practice:[
{q:"A query joins employees (100 rows) to departments (10 rows) with INNER JOIN. 5 employees have NULL department_id. How many rows maximum can the result have?",options:["A) 100","B) 95 - the 5 employees with NULL department_id are excluded from INNER JOIN results","C) 110","D) 1000"],answer:"B",d:"E"},
{q:"A manager wants a list of ALL customers including those who haven't ordered yet. Which JOIN type should be used between customers and orders?",options:["A) INNER JOIN","B) LEFT JOIN from customers to orders","C) RIGHT JOIN from customers to orders","D) CROSS JOIN"],answer:"B",d:"E"},
{q:"A query uses LEFT JOIN but returns the same row count as INNER JOIN. What does this tell you about the data?",options:["A) The LEFT JOIN is broken","B) Every row in the left table has at least one match in the right table - no unmatched rows exist","C) The tables are identical","D) There is a syntax error"],answer:"B",d:"E"},
{q:"A CROSS JOIN between a table with 1000 products and a table with 365 days produces how many rows?",options:["A) 1,365","B) 365,000","C) 1,000","D) 365"],answer:"B",d:"E"},
{q:"An employee-manager hierarchy is stored in one table with columns: employee_id, name, manager_id. To show each employee with their manager's name, what type of JOIN is needed?",options:["A) JOIN to a separate managers table","B) SELF JOIN - join the employees table to itself using manager_id = employee_id","C) CROSS JOIN on the same table","D) No join needed, use WHERE clause only"],answer:"B",d:"E"},
{q:"A query uses: FROM orders o RIGHT JOIN customers c ON o.customer_id = c.id. Which rewrite produces identical results?",options:["A) FROM orders o LEFT JOIN customers c ON o.customer_id = c.id","B) FROM customers c LEFT JOIN orders o ON o.customer_id = c.id","C) FROM orders o INNER JOIN customers c ON o.customer_id = c.id","D) FROM orders o CROSS JOIN customers c"],answer:"B",d:"E"},
{q:"A LEFT JOIN returns 150 rows while the left table has 100 rows. What explains the extra 50 rows?",options:["A) The LEFT JOIN created new data","B) Some left-table rows matched multiple rows in the right table, causing row multiplication","C) The database has a bug","D) NULL values created extra rows"],answer:"B",d:"E"},
{q:"A query joins employees to departments with INNER JOIN and adds WHERE d.budget > 100000. An employee in a qualifying department doesn't appear. What could cause this?",options:["A) INNER JOIN randomly excludes rows","B) The employee's department_id might not match any department id (NULL or invalid FK), so INNER JOIN excludes them","C) WHERE runs before JOIN","D) Budget filter is applied to employees"],answer:"B",d:"M"},
{q:"A developer writes: SELECT * FROM orders o LEFT JOIN customers c ON o.customer_id = c.id WHERE c.country = 'USA'. They expect all orders (including those without customers) filtered to USA. But orders without customers disappear. Why?",options:["A) LEFT JOIN doesn't work with WHERE","B) The WHERE c.country = 'USA' filters out NULLs from unmatched rows; the condition should be in the ON clause instead","C) Country column doesn't exist","D) LEFT JOIN automatically filters NULL rows"],answer:"B",d:"M"},
{q:"Two tables: products (500 rows) and categories (20 rows). A FULL OUTER JOIN on category_id returns 510 rows. What can you infer?",options:["A) 10 products have no category and 10 categories have no products","B) Some combination of unmatched rows from both sides adds 10 extra rows beyond the 500 matched products","C) The join is duplicating rows","D) 510 is always the result of FULL OUTER JOIN"],answer:"B",d:"M"},
{q:"A self-join query finds employees who share the same manager. The WHERE clause has: WHERE e1.manager_id = e2.manager_id AND e1.employee_id < e2.employee_id. Why the < condition?",options:["A) To sort results","B) To avoid pairing each employee with themselves and to prevent duplicate pairs (A,B) and (B,A)","C) To filter by employee ID","D) < doesn't work in WHERE clauses"],answer:"B",d:"M"},
{q:"A query joining 4 tables (A JOIN B JOIN C JOIN D) is slow. The DBA suggests changing the join order. Why would this help?",options:["A) Join order never affects performance","B) Joining smaller intermediate result sets first reduces the data the optimizer must process for subsequent joins","C) SQL always executes joins left-to-right","D) Reversing order uses different indexes"],answer:"B",d:"M"},
{q:"A CROSS JOIN between employees (100 rows) and projects (50 rows) produces 5000 rows. Adding WHERE e.department = p.required_dept reduces it to 800 rows. What is this equivalent to?",options:["A) A FULL OUTER JOIN","B) An INNER JOIN with the same condition in the ON clause","C) A LEFT JOIN","D) A SELF JOIN"],answer:"B",d:"M"},
{q:"A query uses multiple LEFT JOINs: FROM orders LEFT JOIN items LEFT JOIN categories. If an item has no category, what happens to the order row?",options:["A) The order row disappears entirely","B) The order row is preserved with NULL values for all category columns due to LEFT JOIN cascading","C) Only the item row becomes NULL","D) The query errors out"],answer:"B",d:"M"},
{q:"An anti-join pattern uses: LEFT JOIN ... WHERE right.id IS NULL. A developer replaces it with NOT EXISTS subquery. Which performs better on large datasets?",options:["A) LEFT JOIN is always faster","B) Performance depends on the database optimizer - NOT EXISTS often performs equally or better as it can short-circuit","C) NOT EXISTS is always slower","D) They cannot produce the same results"],answer:"B",d:"M"},
{q:"A many-to-many relationship (students-courses) uses a junction table enrollments. A query joins all three tables. One student enrolled in 5 courses and one course has 30 students. How many rows appear for that one student?",options:["A) 1 row","B) 5 rows - one for each course that student is enrolled in","C) 30 rows","D) 150 rows"],answer:"B",d:"H"},
{q:"A large fact table (1B rows) is joined to a small dimension (1000 rows). The optimizer chooses a nested loop join. A developer suggests a hash join would be better. When is the developer correct?",options:["A) Hash join is never better","B) When both tables are large relative to memory and no index exists on the join key; for small dimension lookups nested loop with index is often optimal","C) Hash join is always better for any size","D) Join algorithm doesn't affect performance"],answer:"B",d:"H"},
{q:"A query needs the latest order for each customer. Developer A uses a JOIN with a subquery finding MAX(order_date). Developer B uses a lateral join. What advantage does the lateral approach offer?",options:["A) No advantage, they are identical","B) Lateral join can reference the outer row and use LIMIT 1 with an index, avoiding the aggregate over all orders","C) Lateral joins work without indexes","D) Lateral joins don't use JOIN syntax"],answer:"B",d:"H"},
{q:"A recursive organizational hierarchy needs all reports (direct and indirect) under a VP. The org has 10 levels. A self-join approach requires 9 separate joins. What SQL feature handles this cleanly?",options:["A) CROSS JOIN with a depth counter","B) Recursive CTE (WITH RECURSIVE) that iterates through hierarchy levels dynamically","C) Multiple UNION ALL statements","D) Nested subqueries for each level"],answer:"B",d:"H"},
{q:"A query joins table A (10M rows) to table B (10M rows) on a non-unique key producing 50M rows due to many-to-many matches. The application crashes with memory errors. Which approach reduces the result set while preserving the analysis?",options:["A) Use LIMIT to cap results arbitrarily","B) Pre-aggregate one side before joining, or add additional join conditions to reduce the many-to-many cardinality","C) Switch to CROSS JOIN for better memory management","D) Remove the join entirely"],answer:"B",d:"H"}
]},


{id:3,title:"Aggregations & GROUP BY",color:"#a78bfa",chips:["COUNT","SUM","AVG","GROUP BY","HAVING"],
subtopics:[
{name:"Aggregate Functions",theory:["COUNT(*) counts all rows including NULLs; COUNT(column) counts only non-NULL values in that column.","SUM and AVG work on numeric columns; MIN and MAX work on any comparable type (numbers, dates, strings).","Aggregate functions ignore NULL values except COUNT(*); this can affect AVG calculations significantly."],code:"-- Basic aggregates\nSELECT\n    COUNT(*) AS total_employees,\n    COUNT(commission) AS employees_with_commission,\n    SUM(salary) AS total_payroll,\n    AVG(salary) AS avg_salary,\n    MIN(hire_date) AS earliest_hire,\n    MAX(salary) AS highest_salary\nFROM employees;\n\n-- NULL impact on AVG\n-- Salaries: 100, 200, NULL, 400\n-- AVG = (100+200+400)/3 = 233.33 (NULL excluded from count)"},
{name:"GROUP BY",theory:["GROUP BY collapses rows sharing the same values in grouped columns into summary rows.","Every column in SELECT must either be in GROUP BY or wrapped in an aggregate function.","GROUP BY executes after WHERE filtering, so only filtered rows participate in grouping."],code:"-- Group employees by department\nSELECT\n    department,\n    COUNT(*) AS employee_count,\n    AVG(salary) AS avg_salary,\n    MAX(salary) AS max_salary\nFROM employees\nWHERE status = 'active'\nGROUP BY department;\n\n-- SQL execution order:\n-- FROM -> WHERE -> GROUP BY -> HAVING -> SELECT -> ORDER BY"},
{name:"HAVING",theory:["HAVING filters groups after aggregation; WHERE filters individual rows before aggregation.","HAVING can reference aggregate functions (HAVING COUNT(*) > 5) which WHERE cannot.","Use WHERE to filter raw rows for performance, then HAVING to filter the grouped results."],code:"-- HAVING: filter groups\nSELECT\n    department,\n    COUNT(*) AS emp_count,\n    AVG(salary) AS avg_sal\nFROM employees\nGROUP BY department\nHAVING COUNT(*) >= 5 AND AVG(salary) > 60000;\n\n-- Combined WHERE + HAVING\nSELECT category, SUM(revenue) AS total_rev\nFROM sales\nWHERE sale_date >= '2024-01-01'  -- Filter rows first\nGROUP BY category\nHAVING SUM(revenue) > 100000;   -- Then filter groups"},
{name:"GROUP BY with Multiple Columns",theory:["Grouping by multiple columns creates groups for each unique combination of those column values.","More columns in GROUP BY means more granular groups (finer detail in results).","Useful for hierarchical breakdowns: region > city > store, or year > quarter > month."],code:"-- Group by multiple columns\nSELECT\n    region,\n    product_category,\n    COUNT(*) AS order_count,\n    SUM(amount) AS total_sales\nFROM orders\nGROUP BY region, product_category\nORDER BY region, total_sales DESC;\n\n-- Hierarchical: year and month\nSELECT\n    EXTRACT(YEAR FROM order_date) AS year,\n    EXTRACT(MONTH FROM order_date) AS month,\n    SUM(total) AS monthly_revenue\nFROM orders\nGROUP BY EXTRACT(YEAR FROM order_date), EXTRACT(MONTH FROM order_date)\nORDER BY year, month;"},
{name:"Aggregation with NULL Handling",theory:["NULL values are excluded from COUNT(column), SUM, AVG, MIN, MAX calculations but counted in COUNT(*).","COALESCE(column, default) replaces NULLs before aggregation to include them in calculations.","Group by a nullable column: NULL values form their own group in the GROUP BY results."],code:"-- NULL handling in aggregates\nSELECT\n    COUNT(*) AS all_rows,              -- Counts NULLs\n    COUNT(commission) AS with_comm,     -- Excludes NULLs\n    AVG(commission) AS avg_comm,        -- Excludes NULLs\n    AVG(COALESCE(commission, 0)) AS avg_with_zeros  -- Treats NULL as 0\nFROM employees;\n\n-- NULL as a group\nSELECT\n    department,  -- NULL department forms its own group\n    COUNT(*) AS cnt\nFROM employees\nGROUP BY department;"}
],
examples:[
{title:"Sales Summary Report",desc:"Multi-level aggregation with department and time-period breakdown.",code:"SELECT\n    d.department_name,\n    EXTRACT(QUARTER FROM o.order_date) AS quarter,\n    COUNT(DISTINCT o.order_id) AS num_orders,\n    COUNT(DISTINCT o.customer_id) AS unique_customers,\n    SUM(oi.quantity * oi.unit_price) AS revenue,\n    AVG(oi.quantity * oi.unit_price) AS avg_order_value\nFROM orders o\nJOIN order_items oi ON o.order_id = oi.order_id\nJOIN departments d ON o.dept_id = d.dept_id\nWHERE o.order_date >= '2024-01-01'\nGROUP BY d.department_name, EXTRACT(QUARTER FROM o.order_date)\nHAVING SUM(oi.quantity * oi.unit_price) > 10000\nORDER BY revenue DESC;"},
{title:"Top Categories by Revenue",desc:"Find top 5 product categories with highest revenue using aggregation.",code:"SELECT\n    p.category,\n    COUNT(*) AS items_sold,\n    SUM(oi.quantity) AS total_units,\n    SUM(oi.quantity * oi.price) AS total_revenue,\n    ROUND(AVG(oi.price), 2) AS avg_price\nFROM order_items oi\nJOIN products p ON oi.product_id = p.product_id\nGROUP BY p.category\nORDER BY total_revenue DESC\nLIMIT 5;"},
{title:"Customer Segmentation with Aggregates",desc:"Segment customers by order frequency and total spend.",code:"SELECT\n    CASE\n        WHEN COUNT(*) >= 20 THEN 'VIP'\n        WHEN COUNT(*) >= 5 THEN 'Regular'\n        ELSE 'Occasional'\n    END AS segment,\n    COUNT(DISTINCT customer_id) AS num_customers,\n    AVG(total_spent) AS avg_spend\nFROM (\n    SELECT\n        customer_id,\n        COUNT(*) AS order_count,\n        SUM(total) AS total_spent\n    FROM orders\n    GROUP BY customer_id\n) customer_stats\nGROUP BY segment\nORDER BY avg_spend DESC;"}
],
practice:[
{q:"A table has 1000 rows. Column 'bonus' has 200 NULL values. What does SELECT COUNT(bonus) return?",options:["A) 1000","B) 800 - COUNT(column) excludes NULL values","C) 200","D) 0"],answer:"B",d:"E"},
{q:"A developer writes: SELECT department, salary FROM employees GROUP BY department. This query fails. Why?",options:["A) GROUP BY doesn't work with SELECT","B) salary is not in GROUP BY and not wrapped in an aggregate function - it must be one or the other","C) department cannot be grouped","D) You can only GROUP BY numeric columns"],answer:"B",d:"E"},
{q:"A query uses WHERE salary > 50000 and HAVING COUNT(*) > 3. In what order are these evaluated?",options:["A) HAVING first, then WHERE","B) WHERE filters rows first, then GROUP BY groups them, then HAVING filters groups","C) Both run simultaneously","D) ORDER BY runs between them"],answer:"B",d:"E"},
{q:"A query: SELECT department, AVG(salary) FROM employees GROUP BY department ORDER BY AVG(salary) DESC. The result shows NULL for one department. What does this mean?",options:["A) The query is broken","B) Some employees have NULL department_id; NULLs form their own group in GROUP BY","C) AVG returned NULL for all salaries","D) The department table is missing"],answer:"B",d:"E"},
{q:"SELECT COUNT(*) vs SELECT COUNT(email) on a table where 50 out of 500 rows have NULL email. What are the results?",options:["A) Both return 500","B) COUNT(*) returns 500, COUNT(email) returns 450","C) COUNT(*) returns 450, COUNT(email) returns 500","D) Both return 450"],answer:"B",d:"E"},
{q:"A report needs total revenue per region but only for regions with revenue exceeding $1M. Which clause filters this?",options:["A) WHERE SUM(revenue) > 1000000","B) HAVING SUM(revenue) > 1000000 after GROUP BY region","C) LIMIT 1000000","D) ORDER BY revenue > 1000000"],answer:"B",d:"E"},
{q:"A table has sales for 3 years (2022, 2023, 2024) across 5 regions. How many rows does GROUP BY year, region produce?",options:["A) 3","B) 15 - one row for each unique combination (3 years x 5 regions)","C) 5","D) 8"],answer:"B",d:"E"},
{q:"A query computes AVG(response_time) but the result seems too high. Investigation shows 10% of rows have NULL response_time (for requests that timed out). These NULLs are excluded from AVG. How do you include timeouts as a specific value (e.g., 30s)?",options:["A) Replace NULLs in the table permanently","B) Use AVG(COALESCE(response_time, 30)) to treat NULLs as 30 seconds in the calculation","C) Use COUNT(*) instead of AVG","D) Exclude the non-NULL values too"],answer:"B",d:"M"},
{q:"A query: SELECT customer_id, COUNT(*) AS orders FROM orders GROUP BY customer_id HAVING orders > 5. This fails in some databases. Why?",options:["A) HAVING cannot reference aggregate results","B) HAVING cannot use column aliases in all databases; use HAVING COUNT(*) > 5 instead","C) customer_id must be in HAVING","D) COUNT(*) doesn't work in HAVING"],answer:"B",d:"M"},
{q:"A report shows monthly revenue. Some months show $0 but they should show NULL (no data vs actually zero). How do you distinguish months with zero revenue from months with no sales at all?",options:["A) They are the same thing","B) Use CASE: if COUNT(*) = 0 then NULL else SUM(revenue) - this separates no-data (NULL) from actual zero-sum months","C) Replace 0 with NULL after the query","D) Use LEFT JOIN to a calendar table and leave unmatched months as NULL"],answer:"D",d:"M"},
{q:"A query groups by 'country' and counts customers. The result shows 'USA' appearing twice because some records have 'USA' and others have 'usa'. How do you fix this?",options:["A) Remove duplicate countries from the table","B) Use GROUP BY UPPER(country) or LOWER(country) to normalize case before grouping","C) Add DISTINCT to the SELECT","D) Use HAVING COUNT(*) > 1 to merge them"],answer:"B",d:"M"},
{q:"A developer uses: SELECT department, SUM(salary), AVG(salary), MAX(salary) FROM employees GROUP BY department. They want to add each employee's name to the output. Can they?",options:["A) Just add name to SELECT","B) No - adding name requires it in GROUP BY (which defeats grouping) or using a window function instead of GROUP BY","C) Use HAVING to include names","D) Add name to the aggregate function"],answer:"B",d:"M"},
{q:"A query counts orders per customer per month. On a table with 10M orders and 500K customers, GROUP BY customer_id, DATE_TRUNC('month', order_date) is slow. What optimization helps most?",options:["A) Add HAVING COUNT(*) > 0","B) Create a composite index on (customer_id, order_date) to speed up the grouping operation","C) Remove the date grouping entirely","D) Use LIMIT to reduce output"],answer:"B",d:"M"},
{q:"A query: SELECT category, SUM(sales) FROM products WHERE SUM(sales) > 1000 GROUP BY category. This fails. What's the fix?",options:["A) Remove the GROUP BY","B) Move SUM(sales) > 1000 from WHERE to HAVING since WHERE cannot use aggregate functions","C) Use ORDER BY instead of WHERE","D) Replace SUM with COUNT"],answer:"B",d:"M"},
{q:"COUNT(DISTINCT customer_id) on a table with 100M rows is slow. The business only needs an approximate count. What alternative is more performant?",options:["A) Use COUNT(*) instead","B) Use an approximate distinct count function (e.g., APPROX_COUNT_DISTINCT or HyperLogLog) which trades precision for speed","C) Remove DISTINCT and accept duplicates","D) Add an index on customer_id"],answer:"B",d:"M"},
{q:"A query uses GROUP BY with ROLLUP to show subtotals. The result has extra rows with NULLs in grouped columns. A developer confuses these with actual NULL data. How do you distinguish ROLLUP NULLs from data NULLs?",options:["A) They cannot be distinguished","B) Use GROUPING() function which returns 1 for ROLLUP-generated NULL rows and 0 for actual data NULLs","C) ROLLUP never produces NULLs","D) Remove NULL data before grouping"],answer:"B",d:"H"},
{q:"A dashboard query computes 15 different aggregates (SUM, AVG, percentiles, etc.) across 20 dimensions on a 500M row table. It takes 10 minutes. The data updates hourly. What architecture pattern reduces dashboard query time?",options:["A) Add more indexes","B) Pre-compute aggregations into a materialized view or summary table that refreshes hourly, then query the smaller summary","C) Reduce to 5 aggregates","D) Increase query timeout to 30 minutes"],answer:"B",d:"H"},
{q:"A query needs the top 3 products per category by revenue. Using GROUP BY alone cannot solve this because it collapses to one row per group. What approach works?",options:["A) GROUP BY category with LIMIT 3","B) Use a window function (ROW_NUMBER OVER PARTITION BY category ORDER BY revenue DESC) then filter to rank <= 3","C) Use multiple queries per category","D) Use HAVING to limit rows per group"],answer:"B",d:"H"},
{q:"A financial report must show the running total of transactions within each account, maintaining the order of transaction dates. GROUP BY collapses rows so you cannot see individual transactions. What SQL feature is needed?",options:["A) GROUP BY with ORDER BY","B) Window function SUM(amount) OVER (PARTITION BY account_id ORDER BY txn_date) to compute running totals without collapsing rows","C) Recursive CTE","D) Multiple self-joins"],answer:"B",d:"H"},
{q:"A dataset has 1B rows and a query computes COUNT(DISTINCT user_id) per day for 365 days. The distinct count per day averages 10M users. The query runs for 2 hours. What optimization strategy yields the biggest improvement?",options:["A) Add an index on user_id","B) Pre-aggregate distinct users per day into a daily summary table during ETL, then query the 365-row summary","C) Use HAVING to filter days","D) Increase memory to handle all data in RAM"],answer:"B",d:"H"}
]},


{id:4,title:"Subqueries",color:"#fbbf24",chips:["Scalar","Correlated","EXISTS","IN","Derived Tables"],
subtopics:[
{name:"Scalar Subqueries",theory:["A scalar subquery returns exactly one value (one row, one column) and can be used wherever a single value is expected.","Used in SELECT list to add computed columns, or in WHERE to compare against a dynamic value.","If a scalar subquery returns more than one row, the database throws an error at runtime."],code:"-- Scalar subquery in SELECT\nSELECT\n    first_name,\n    salary,\n    salary - (SELECT AVG(salary) FROM employees) AS diff_from_avg\nFROM employees;\n\n-- Scalar subquery in WHERE\nSELECT first_name, salary\nFROM employees\nWHERE salary > (SELECT AVG(salary) FROM employees);\n\n-- Returns error if subquery yields multiple rows:\n-- WHERE salary > (SELECT salary FROM employees WHERE dept='Sales')  -- ERROR if multiple salespeople"},
{name:"Subqueries with IN/NOT IN",theory:["IN subquery checks if a value exists in a list returned by the subquery (can return multiple rows, one column).","NOT IN has a trap: if the subquery result contains NULL, NOT IN returns no rows due to three-valued logic.","IN is equivalent to = ANY; NOT IN is equivalent to <> ALL; both compare against a set of values."],code:"-- IN subquery\nSELECT first_name, department\nFROM employees\nWHERE department_id IN (\n    SELECT department_id FROM departments WHERE location = 'New York'\n);\n\n-- NOT IN trap with NULLs\n-- If subquery returns (1, 2, NULL), NOT IN always returns empty!\nSELECT * FROM orders\nWHERE customer_id NOT IN (\n    SELECT customer_id FROM blacklist WHERE customer_id IS NOT NULL  -- Filter NULLs!\n);"},
{name:"Correlated Subqueries",theory:["A correlated subquery references a column from the outer query; it executes once per outer row.","More expressive than simple subqueries but can be slower due to repeated execution.","Common patterns: finding max per group, checking existence, comparing row to its group average."],code:"-- Find employees earning more than their department average\nSELECT e.first_name, e.salary, e.department_id\nFROM employees e\nWHERE e.salary > (\n    SELECT AVG(e2.salary)\n    FROM employees e2\n    WHERE e2.department_id = e.department_id  -- References outer query\n);\n\n-- Latest order per customer (correlated)\nSELECT o.customer_id, o.order_date, o.total\nFROM orders o\nWHERE o.order_date = (\n    SELECT MAX(o2.order_date)\n    FROM orders o2\n    WHERE o2.customer_id = o.customer_id\n);"},
{name:"EXISTS/NOT EXISTS",theory:["EXISTS returns TRUE if the subquery returns at least one row; it short-circuits and stops at the first match.","NOT EXISTS returns TRUE only if the subquery returns zero rows; preferred over NOT IN for NULL safety.","EXISTS ignores what is selected in the subquery; SELECT 1 or SELECT * both work identically."],code:"-- EXISTS: customers who have placed orders\nSELECT c.customer_name\nFROM customers c\nWHERE EXISTS (\n    SELECT 1 FROM orders o\n    WHERE o.customer_id = c.customer_id\n);\n\n-- NOT EXISTS: customers without orders (NULL-safe alternative to NOT IN)\nSELECT c.customer_name\nFROM customers c\nWHERE NOT EXISTS (\n    SELECT 1 FROM orders o\n    WHERE o.customer_id = c.customer_id\n);\n\n-- EXISTS vs IN: EXISTS can short-circuit, IN must evaluate all values"},
{name:"Subqueries in FROM (Derived Tables)",theory:["A subquery in FROM creates a temporary result set (derived table) that the outer query treats as a regular table.","Derived tables must have an alias; they help break complex logic into manageable steps.","Common for pre-aggregating data before joining, or applying filters to aggregated results."],code:"-- Derived table: pre-aggregate then filter\nSELECT dept_stats.department, dept_stats.avg_salary\nFROM (\n    SELECT department, AVG(salary) AS avg_salary, COUNT(*) AS emp_count\n    FROM employees\n    GROUP BY department\n) dept_stats\nWHERE dept_stats.emp_count > 5;\n\n-- Join with derived table\nSELECT e.first_name, e.salary, d.avg_sal\nFROM employees e\nJOIN (\n    SELECT department_id, AVG(salary) AS avg_sal\n    FROM employees\n    GROUP BY department_id\n) d ON e.department_id = d.department_id\nWHERE e.salary > d.avg_sal;"}
],
examples:[
{title:"Multi-Level Subquery Report",desc:"Use subqueries to find above-average performers in high-revenue departments.",code:"SELECT e.first_name, e.salary, e.department_id\nFROM employees e\nWHERE e.department_id IN (\n    -- Departments with total salary bill > $1M\n    SELECT department_id\n    FROM employees\n    GROUP BY department_id\n    HAVING SUM(salary) > 1000000\n)\nAND e.salary > (\n    -- Above overall average\n    SELECT AVG(salary) FROM employees\n)\nORDER BY e.salary DESC;"},
{title:"Correlated Subquery for Latest Records",desc:"Find the most recent order for each customer using correlated subquery.",code:"SELECT\n    c.customer_name,\n    o.order_date,\n    o.total_amount\nFROM customers c\nJOIN orders o ON c.customer_id = o.customer_id\nWHERE o.order_date = (\n    SELECT MAX(o2.order_date)\n    FROM orders o2\n    WHERE o2.customer_id = c.customer_id\n)\nORDER BY o.order_date DESC;"},
{title:"Derived Table for Ranking",desc:"Use a derived table to compute ranks and filter top results.",code:"SELECT ranked.*\nFROM (\n    SELECT\n        product_name,\n        category,\n        revenue,\n        RANK() OVER (PARTITION BY category ORDER BY revenue DESC) AS rnk\n    FROM (\n        SELECT\n            p.product_name,\n            p.category,\n            SUM(oi.quantity * oi.price) AS revenue\n        FROM order_items oi\n        JOIN products p ON oi.product_id = p.product_id\n        GROUP BY p.product_name, p.category\n    ) product_revenue\n) ranked\nWHERE ranked.rnk <= 3;"}
],
practice:[
{q:"A query: SELECT name FROM employees WHERE salary > (SELECT AVG(salary) FROM employees). How many times does the subquery execute?",options:["A) Once per row in employees","B) Once total - it is a non-correlated scalar subquery that computes AVG independently","C) Zero times","D) Twice"],answer:"B",d:"E"},
{q:"A developer writes: WHERE status IN (SELECT status FROM archived_orders). The subquery returns NULL among other values. What issue arises with NOT IN version?",options:["A) No issue at all","B) NOT IN returns no rows when the subquery result contains NULL due to three-valued logic (NULL comparisons yield UNKNOWN)","C) IN fails with NULLs","D) NULLs are automatically filtered"],answer:"B",d:"E"},
{q:"A subquery in the FROM clause: SELECT * FROM (SELECT dept, COUNT(*) AS cnt FROM employees GROUP BY dept) sub WHERE sub.cnt > 10. What is 'sub'?",options:["A) A permanent table","B) A derived table (temporary named result set created by the subquery in FROM)","C) A view","D) A CTE"],answer:"B",d:"E"},
{q:"EXISTS (SELECT 1 FROM orders WHERE customer_id = c.customer_id) - what does SELECT 1 mean here?",options:["A) Only returns the number 1","B) The value selected inside EXISTS doesn't matter - EXISTS only checks if any row is returned, not what values they contain","C) Selects column number 1","D) Returns TRUE"],answer:"B",d:"E"},
{q:"A correlated subquery: WHERE salary > (SELECT AVG(salary) FROM employees e2 WHERE e2.dept = e1.dept). For a company with 10 departments and 1000 total employees, approximately how many times does this subquery execute?",options:["A) 10 times (once per department)","B) 1000 times - once for each row in the outer query (though optimizer may cache results)","C) Once total","D) 10,000 times"],answer:"B",d:"E"},
{q:"A developer needs departments with no employees. They write: WHERE dept_id NOT IN (SELECT dept_id FROM employees). Another developer uses: WHERE NOT EXISTS (SELECT 1 FROM employees e WHERE e.dept_id = d.dept_id). Which is safer with NULLs?",options:["A) NOT IN is always safer","B) NOT EXISTS is NULL-safe; NOT IN fails if any employee has NULL dept_id","C) Both handle NULLs identically","D) Neither handles NULLs"],answer:"B",d:"E"},
{q:"A subquery returns multiple rows but is used as: WHERE salary = (subquery). What happens?",options:["A) It takes the first row","B) The database throws a runtime error because a scalar subquery context requires exactly one row","C) It uses the maximum value","D) It converts to IN automatically"],answer:"B",d:"E"},
{q:"A query uses IN with a subquery that returns 50,000 values. An alternative uses EXISTS with a correlated subquery. On a large outer table, which typically performs better and why?",options:["A) IN is always faster because it's simpler","B) EXISTS often performs better because it short-circuits at the first match per row, while IN must materialize the full list","C) They always perform identically","D) EXISTS is always slower due to correlation"],answer:"B",d:"M"},
{q:"A developer rewrites a correlated subquery as a JOIN for performance. The original: WHERE salary > (SELECT AVG(salary) FROM emp WHERE dept = outer.dept). What is the equivalent JOIN approach?",options:["A) CROSS JOIN with a filter","B) JOIN a derived table that pre-computes AVG per dept, then compare salary > avg_salary in the WHERE clause","C) SELF JOIN on salary","D) It cannot be rewritten as a JOIN"],answer:"B",d:"M"},
{q:"A query: SELECT * FROM products WHERE price > ALL (SELECT price FROM products WHERE category = 'Budget'). What does > ALL mean?",options:["A) Greater than any one value in the list","B) Greater than every value in the subquery result - the price must exceed the maximum budget product price","C) Greater than the average","D) ALL means no comparison is made"],answer:"B",d:"M"},
{q:"A derived table query: SELECT * FROM (SELECT customer_id, SUM(total) AS lifetime_value FROM orders GROUP BY customer_id) lv WHERE lv.lifetime_value > 10000. Could a CTE replace this derived table?",options:["A) No, CTEs and derived tables are fundamentally different","B) Yes - WITH lv AS (SELECT ...) SELECT * FROM lv WHERE ... achieves the same result with better readability","C) CTEs cannot contain GROUP BY","D) Derived tables are always faster"],answer:"B",d:"M"},
{q:"A correlated subquery finds the second-highest salary per department. The query runs slowly on 1M employees across 50 departments. What is the performance issue?",options:["A) Correlated subqueries are always fast","B) The subquery executes approximately once per employee row (1M times), each time scanning department employees - use a window function instead","C) 50 departments is too many","D) The second-highest logic is impossible"],answer:"B",d:"M"},
{q:"A developer uses: SELECT (SELECT department_name FROM departments d WHERE d.id = e.dept_id) AS dept FROM employees e. If an employee's dept_id doesn't match any department, what appears in the dept column?",options:["A) An error is thrown","B) NULL - when a scalar subquery returns no rows, the result is NULL","C) Empty string","D) The query skips that employee row"],answer:"B",d:"M"},
{q:"A query uses multiple subqueries: WHERE id IN (subquery1) AND id IN (subquery2). Each subquery runs on a 10M row table. What optimization replaces both subqueries?",options:["A) Use OR instead of AND","B) Use EXISTS with a single correlated subquery combining both conditions, or JOIN both result sets","C) Remove one subquery","D) Add LIMIT to each subquery"],answer:"B",d:"M"},
{q:"A NOT EXISTS subquery checks if a student has no enrollments. The enrollments table has an index on student_id. Will the database use the index for the correlated NOT EXISTS check?",options:["A) Indexes cannot be used in subqueries","B) Yes - the correlated condition (WHERE enrollments.student_id = s.student_id) can use the index for a fast lookup per student","C) NOT EXISTS always does a full scan","D) Only EXISTS uses indexes, not NOT EXISTS"],answer:"B",d:"M"},
{q:"A complex query has 5 levels of nested subqueries making it nearly unreadable. What SQL feature improves readability while maintaining the same logic?",options:["A) Use longer table aliases","B) Refactor into Common Table Expressions (CTEs) using WITH clauses to name each logical step","C) Add more comments","D) Use stored procedures"],answer:"B",d:"H"},
{q:"A query: SELECT * FROM orders WHERE total > (SELECT AVG(total) FROM orders WHERE category = outer.category) needs to handle cases where a category has no orders (subquery returns NULL). What happens to the comparison total > NULL?",options:["A) It returns TRUE","B) total > NULL evaluates to UNKNOWN (falsy) - those rows are excluded; use COALESCE to handle this","C) It returns FALSE","D) An error is thrown"],answer:"B",d:"H"},
{q:"An application generates queries with IN lists of 10,000+ IDs from application logic. The database query planner struggles with such large IN lists. What database-side approach handles this better?",options:["A) Increase IN list limit","B) Insert IDs into a temporary table and JOIN to it, letting the optimizer use hash/merge join strategies","C) Split into 100 separate queries with 100 IDs each","D) Use OR for each ID"],answer:"B",d:"H"},
{q:"A lateral subquery (FROM orders o, LATERAL (SELECT ... FROM items WHERE items.order_id = o.id LIMIT 3)) differs from a correlated subquery in WHERE. What unique capability does LATERAL provide?",options:["A) LATERAL is just syntax sugar for correlated subqueries","B) LATERAL can return multiple rows/columns per outer row and JOIN them, while WHERE correlated subqueries only filter","C) LATERAL cannot reference the outer query","D) LATERAL only works with LIMIT 1"],answer:"B",d:"H"},
{q:"A query uses a correlated subquery in SELECT that runs a complex aggregation per row. With 500K outer rows, this is extremely slow. The optimizer cannot decorrelate it. What advanced strategy eliminates the per-row execution?",options:["A) Add more indexes","B) Pre-compute the correlated result in a CTE or materialized derived table, then JOIN once to the outer query","C) Increase CPU cores","D) Use EXPLAIN without changing the query"],answer:"B",d:"H"}
]},


{id:5,title:"Window Functions",color:"#f472b6",chips:["ROW_NUMBER","RANK","LAG/LEAD","SUM OVER","PARTITION BY"],
subtopics:[
{name:"ROW_NUMBER, RANK, DENSE_RANK",theory:["ROW_NUMBER assigns a unique sequential number to each row within a partition; no ties.","RANK assigns the same number to ties but skips subsequent numbers (1,2,2,4); DENSE_RANK does not skip (1,2,2,3).","All three require ORDER BY within the OVER clause to determine ranking order."],code:"-- ROW_NUMBER: unique sequential\nSELECT\n    first_name,\n    department,\n    salary,\n    ROW_NUMBER() OVER (PARTITION BY department ORDER BY salary DESC) AS row_num\nFROM employees;\n\n-- RANK vs DENSE_RANK with ties\nSELECT\n    product_name,\n    revenue,\n    RANK() OVER (ORDER BY revenue DESC) AS rank,         -- 1,2,2,4\n    DENSE_RANK() OVER (ORDER BY revenue DESC) AS d_rank  -- 1,2,2,3\nFROM products;"},
{name:"LAG and LEAD",theory:["LAG(column, n) accesses a value from n rows before the current row within the partition (default n=1).","LEAD(column, n) accesses a value from n rows after the current row within the partition.","Both accept an optional default value as the third argument for when there is no previous/next row (avoids NULL)."],code:"-- LAG: compare with previous row\nSELECT\n    order_date,\n    daily_revenue,\n    LAG(daily_revenue, 1) OVER (ORDER BY order_date) AS prev_day_revenue,\n    daily_revenue - LAG(daily_revenue, 1, 0) OVER (ORDER BY order_date) AS day_over_day_change\nFROM daily_sales;\n\n-- LEAD: look ahead\nSELECT\n    employee_id,\n    promotion_date,\n    LEAD(promotion_date) OVER (PARTITION BY employee_id ORDER BY promotion_date) AS next_promotion,\n    LEAD(promotion_date) OVER (PARTITION BY employee_id ORDER BY promotion_date) - promotion_date AS days_between_promotions\nFROM promotions;"},
{name:"Aggregate Window Functions (SUM/AVG/COUNT OVER)",theory:["Aggregate functions with OVER() compute aggregates without collapsing rows - each row retains its detail.","SUM() OVER() without PARTITION BY gives a grand total; with PARTITION BY gives group-level totals.","Adding ORDER BY inside OVER creates a running/cumulative aggregate up to the current row."],code:"-- Running total\nSELECT\n    order_date,\n    amount,\n    SUM(amount) OVER (ORDER BY order_date) AS running_total\nFROM orders;\n\n-- Partition aggregate: show each employee's salary and department average\nSELECT\n    first_name,\n    department,\n    salary,\n    AVG(salary) OVER (PARTITION BY department) AS dept_avg,\n    salary - AVG(salary) OVER (PARTITION BY department) AS diff_from_dept_avg\nFROM employees;"},
{name:"PARTITION BY and ORDER BY in Windows",theory:["PARTITION BY divides rows into groups for the window function; it resets the calculation per group.","ORDER BY within OVER defines the sequence for ranking or running aggregates within each partition.","Without PARTITION BY, the window function operates over the entire result set as one partition."],code:"-- PARTITION BY: rank within each category\nSELECT\n    product_name,\n    category,\n    revenue,\n    ROW_NUMBER() OVER (PARTITION BY category ORDER BY revenue DESC) AS rank_in_category,\n    SUM(revenue) OVER (PARTITION BY category) AS category_total,\n    ROUND(revenue * 100.0 / SUM(revenue) OVER (PARTITION BY category), 2) AS pct_of_category\nFROM products;\n\n-- Without PARTITION BY: operates over all rows\nSELECT\n    product_name,\n    revenue,\n    SUM(revenue) OVER () AS grand_total,\n    ROUND(revenue * 100.0 / SUM(revenue) OVER (), 2) AS pct_of_total\nFROM products;"},
{name:"Frame Clauses (ROWS BETWEEN)",theory:["Frame clauses define which rows relative to the current row are included in the window calculation.","ROWS BETWEEN N PRECEDING AND CURRENT ROW gives a sliding window of N+1 rows (e.g., moving average).","RANGE vs ROWS: RANGE groups rows with same ORDER BY value together; ROWS counts physical row positions."],code:"-- Moving average (last 7 days)\nSELECT\n    order_date,\n    daily_revenue,\n    AVG(daily_revenue) OVER (\n        ORDER BY order_date\n        ROWS BETWEEN 6 PRECEDING AND CURRENT ROW\n    ) AS moving_avg_7day\nFROM daily_sales;\n\n-- Frame clause options\nSELECT\n    id, value,\n    SUM(value) OVER (ORDER BY id ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW) AS running_sum,\n    SUM(value) OVER (ORDER BY id ROWS BETWEEN 2 PRECEDING AND 2 FOLLOWING) AS centered_window,\n    SUM(value) OVER (ORDER BY id ROWS BETWEEN CURRENT ROW AND UNBOUNDED FOLLOWING) AS reverse_running\nFROM data;"}
],
examples:[
{title:"Top-N Per Group Analysis",desc:"Find the top 3 highest-paid employees in each department using window functions.",code:"WITH ranked AS (\n    SELECT\n        first_name,\n        department,\n        salary,\n        DENSE_RANK() OVER (PARTITION BY department ORDER BY salary DESC) AS rnk\n    FROM employees\n)\nSELECT first_name, department, salary, rnk\nFROM ranked\nWHERE rnk <= 3\nORDER BY department, rnk;"},
{title:"Month-over-Month Growth Calculation",desc:"Calculate percentage change in revenue compared to previous month using LAG.",code:"WITH monthly AS (\n    SELECT\n        DATE_TRUNC('month', order_date) AS month,\n        SUM(total) AS revenue\n    FROM orders\n    GROUP BY DATE_TRUNC('month', order_date)\n)\nSELECT\n    month,\n    revenue,\n    LAG(revenue) OVER (ORDER BY month) AS prev_month,\n    ROUND(\n        (revenue - LAG(revenue) OVER (ORDER BY month)) * 100.0\n        / NULLIF(LAG(revenue) OVER (ORDER BY month), 0), 2\n    ) AS pct_growth\nFROM monthly\nORDER BY month;"},
{title:"Running Totals and Percentages",desc:"Calculate running total and percentage of grand total for cumulative analysis.",code:"SELECT\n    order_date,\n    customer_id,\n    amount,\n    SUM(amount) OVER (ORDER BY order_date) AS running_total,\n    SUM(amount) OVER () AS grand_total,\n    ROUND(amount * 100.0 / SUM(amount) OVER (), 2) AS pct_of_total,\n    SUM(amount) OVER (\n        PARTITION BY customer_id ORDER BY order_date\n    ) AS customer_running_total\nFROM orders\nORDER BY order_date;"}
],
practice:[
{q:"Two employees in the same department have the same salary. ROW_NUMBER() OVER (PARTITION BY dept ORDER BY salary DESC) gives them different numbers. Why?",options:["A) There's a bug in the query","B) ROW_NUMBER always assigns unique sequential numbers even for ties - the tiebreaker is non-deterministic","C) Duplicates are automatically removed","D) The partition is ignored for ties"],answer:"B",d:"E"},
{q:"RANK() assigns values 1, 2, 2, 4 to four rows. What caused the jump from 2 to 4?",options:["A) A row was deleted","B) RANK skips the next number after a tie - two rows tied at rank 2, so the next rank is 4 (not 3)","C) The data has a gap","D) RANK malfunctioned"],answer:"B",d:"E"},
{q:"A query uses: LAG(price, 1) OVER (ORDER BY date). The first row in the result shows NULL for LAG. Why?",options:["A) The price column has NULL in the first row","B) There is no previous row before the first row, so LAG returns NULL (the default when no prior row exists)","C) LAG only works on numeric columns","D) The ORDER BY is wrong"],answer:"B",d:"E"},
{q:"SELECT salary, SUM(salary) OVER () FROM employees returns the same SUM value in every row. Why?",options:["A) The query is wrong","B) OVER() with no PARTITION BY and no ORDER BY computes the aggregate over the entire result set for every row","C) SUM always returns the same value","D) There's only one row"],answer:"B",d:"E"},
{q:"A developer wants each employee's salary as a percentage of their department total. Which expression computes this?",options:["A) salary / SUM(salary)","B) salary * 100.0 / SUM(salary) OVER (PARTITION BY department)","C) PERCENT(salary, department)","D) salary / COUNT(*) OVER ()"],answer:"B",d:"E"},
{q:"SUM(amount) OVER (ORDER BY date) produces a running total. Adding PARTITION BY customer_id resets the running total. Per what?",options:["A) Per date","B) Per customer - each customer gets their own independent running total that resets at each new partition","C) Per amount value","D) It doesn't reset"],answer:"B",d:"E"},
{q:"ROWS BETWEEN 6 PRECEDING AND CURRENT ROW includes how many rows in the window frame?",options:["A) 6 rows","B) 7 rows - the current row plus the 6 rows before it","C) 8 rows","D) It varies based on data"],answer:"B",d:"E"},
{q:"A query uses ROW_NUMBER() OVER (PARTITION BY customer_id ORDER BY order_date DESC) AS rn, then filters WHERE rn = 1. What does this return?",options:["A) All orders","B) The most recent order for each customer - ROW_NUMBER = 1 with DESC order picks the latest","C) The oldest order per customer","D) Exactly one row total"],answer:"B",d:"M"},
{q:"A developer uses LAG to compute day-over-day change. On Monday, the LAG looks at Friday (weekend has no data). The change appears as 3-day gap. How do you get only consecutive-day comparisons?",options:["A) Use LEAD instead of LAG","B) Add a condition that checks if the previous date is exactly 1 day before, using CASE WHEN order_date - LAG(order_date) = 1 THEN ...","C) Remove weekends from the calendar table","D) Use ROWS BETWEEN 3 PRECEDING"],answer:"B",d:"M"},
{q:"A query has both GROUP BY and a window function. In what order do they execute?",options:["A) Window functions execute before GROUP BY","B) GROUP BY executes first (reducing rows), then window functions operate on the grouped result set","C) They execute simultaneously","D) Window functions replace GROUP BY"],answer:"B",d:"M"},
{q:"A query uses: RANK() OVER (ORDER BY score DESC) but needs exactly 3 winners for a contest (no ties at position 3). Score ties exist. Which function guarantees exactly 3 distinct row numbers?",options:["A) DENSE_RANK()","B) ROW_NUMBER() - it always assigns unique numbers, ensuring exactly 3 rows when filtering WHERE rn <= 3","C) RANK() with a tiebreaker","D) NTILE(3)"],answer:"B",d:"M"},
{q:"SUM(revenue) OVER (PARTITION BY region ORDER BY month ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW) vs without the frame clause. Are they the same?",options:["A) Never the same","B) Yes - when ORDER BY is specified without an explicit frame, the default frame is RANGE BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW, which is similar but not identical for ties","C) The frame clause always changes results dramatically","D) ORDER BY is ignored without a frame"],answer:"B",d:"M"},
{q:"A window function AVG(price) OVER (ORDER BY date ROWS BETWEEN 29 PRECEDING AND CURRENT ROW) computes a 30-day moving average. For the first 10 rows in the result, the window contains fewer than 30 rows. What happens?",options:["A) Those rows are excluded from results","B) The average is computed using however many rows are available in the frame - partial windows are valid","C) NULL is returned for insufficient data","D) The frame expands to include future rows"],answer:"B",d:"M"},
{q:"A query: SELECT *, ROW_NUMBER() OVER (ORDER BY id) FROM large_table ORDER BY name. Does the window function's ORDER BY affect the final output order?",options:["A) Yes, window ORDER BY determines final sort","B) No - the window's ORDER BY only affects the window calculation; the final query ORDER BY name determines result order","C) They conflict and cause an error","D) Only the first ORDER BY matters"],answer:"B",d:"M"},
{q:"LEAD(salary, 2, 0) OVER (PARTITION BY dept ORDER BY hire_date) - what does the '0' parameter represent?",options:["A) Look at row index 0","B) The default value returned when there is no row 2 positions ahead (e.g., for the last two rows in the partition)","C) Start counting from 0","D) The minimum value"],answer:"B",d:"M"},
{q:"A financial report needs a cumulative sum that resets every fiscal quarter. The fiscal year starts in April. What PARTITION BY expression achieves this?",options:["A) PARTITION BY EXTRACT(MONTH FROM date)","B) PARTITION BY EXTRACT(YEAR FROM date), CEIL(EXTRACT(MONTH FROM date) - 3) / 3 (or a fiscal quarter function)","C) No partition needed, just ORDER BY date","D) PARTITION BY date"],answer:"B",d:"H"},
{q:"A query computes 10 different window functions all with the same PARTITION BY and ORDER BY. Does the database sort the data 10 times?",options:["A) Yes, once per window function","B) No - the optimizer recognizes compatible window specifications and typically sorts once, computing all 10 functions in a single pass","C) It depends on the number of rows","D) Window functions don't require sorting"],answer:"B",d:"H"},
{q:"A real-time dashboard needs the running average of the last 1000 events per device. With 100K devices and millions of events, how do you make this query performant?",options:["A) Compute all windows in one massive query","B) Partition by device_id with an index on (device_id, event_time) and use ROWS BETWEEN 999 PRECEDING AND CURRENT ROW to limit the frame size","C) Use GROUP BY instead of window functions","D) Precompute all running averages in application code"],answer:"B",d:"H"},
{q:"A window function query assigns ROW_NUMBER but the same query run twice returns different numbering for tied rows. This causes issues in pagination (users see same items on different pages). How do you make it deterministic?",options:["A) Use RANK instead of ROW_NUMBER","B) Add a unique tiebreaker column (like primary key) to the ORDER BY clause to guarantee deterministic ordering","C) Add DISTINCT to the query","D) Use a random seed"],answer:"B",d:"H"},
{q:"A query uses NTILE(4) OVER (ORDER BY revenue DESC) to segment customers into quartiles. However, with 10 customers, the groups have 3,3,2,2 members respectively. A stakeholder wants exactly equal groups. Is this possible?",options:["A) Use a different function for equal groups","B) No - when the row count isn't evenly divisible by N, NTILE distributes the remainder rows to the first groups; this is inherent behavior","C) Add dummy rows to make it divisible","D) NTILE always creates equal groups"],answer:"B",d:"H"}
]},
{id:6,title:"CTEs & Recursive CTEs",color:"#22d3ee",chips:["WITH","Named CTEs","Recursive","Hierarchies","Sequences"],
subtopics:[
{name:"WITH Clause Basics",theory:["A CTE (Common Table Expression) uses WITH to define a named temporary result set that exists only for the duration of the query.","CTEs improve readability by breaking complex queries into logical, named steps that can be referenced like tables.","CTEs are not stored physically; they are inline definitions that the optimizer may materialize or fold into the main query."],code:"-- Basic CTE\nWITH active_employees AS (\n    SELECT employee_id, first_name, salary, department_id\n    FROM employees\n    WHERE status = 'active'\n)\nSELECT\n    ae.first_name,\n    ae.salary,\n    d.department_name\nFROM active_employees ae\nJOIN departments d ON ae.department_id = d.id\nWHERE ae.salary > 50000;"},
{name:"Multiple CTEs",theory:["Multiple CTEs are separated by commas after a single WITH keyword; each can reference previously defined CTEs.","Chaining CTEs allows step-by-step data transformation, making complex logic easier to read and debug.","Each CTE acts like a building block; later CTEs can join or filter results from earlier ones."],code:"-- Multiple CTEs chained together\nWITH dept_stats AS (\n    SELECT department_id,\n           AVG(salary) AS avg_salary,\n           COUNT(*) AS emp_count\n    FROM employees\n    GROUP BY department_id\n),\nhigh_paying_depts AS (\n    SELECT department_id, avg_salary, emp_count\n    FROM dept_stats\n    WHERE avg_salary > 75000\n)\nSELECT\n    d.department_name,\n    hp.avg_salary,\n    hp.emp_count\nFROM high_paying_depts hp\nJOIN departments d ON hp.department_id = d.id\nORDER BY hp.avg_salary DESC;"},
{name:"Recursive CTEs",theory:["A recursive CTE references itself, consisting of an anchor member (base case) and a recursive member joined by UNION ALL.","The anchor executes once, then the recursive part iterates until it produces no new rows (termination condition).","A MAXRECURSION or iteration limit prevents infinite loops; most databases default to 100 or 1000 iterations."],code:"-- Recursive CTE: generate numbers 1-10\nWITH RECURSIVE numbers AS (\n    SELECT 1 AS n          -- anchor\n    UNION ALL\n    SELECT n + 1 FROM numbers WHERE n < 10  -- recursive\n)\nSELECT n FROM numbers;\n\n-- Generate date series\nWITH RECURSIVE dates AS (\n    SELECT DATE '2024-01-01' AS dt\n    UNION ALL\n    SELECT dt + INTERVAL '1 day'\n    FROM dates WHERE dt < '2024-01-31'\n)\nSELECT dt FROM dates;"},
{name:"Hierarchy Traversal",theory:["Recursive CTEs excel at traversing tree structures like org charts, category trees, and bill-of-materials.","The anchor selects root nodes (e.g., CEO with no manager), and recursion follows parent-child links down the tree.","You can track depth level and build path strings to show the full hierarchy path for each node."],code:"-- Org chart traversal\nWITH RECURSIVE org_tree AS (\n    -- Anchor: top-level (CEO)\n    SELECT employee_id, name, manager_id, 1 AS level,\n           CAST(name AS VARCHAR(1000)) AS path\n    FROM employees WHERE manager_id IS NULL\n    UNION ALL\n    -- Recursive: find direct reports\n    SELECT e.employee_id, e.name, e.manager_id,\n           ot.level + 1,\n           ot.path || ' > ' || e.name\n    FROM employees e\n    JOIN org_tree ot ON e.manager_id = ot.employee_id\n)\nSELECT level, name, path\nFROM org_tree ORDER BY path;"},
