`In standard SQL, concatenating any value with NULL produces NULL. CONCAT('Hello', NULL, 'World') returns NULL because NULL is unknown. Use COALESCE(value, '') to substitute empty strings for NULLs before concatenation.`,
`String comparison is lexicographic (character by character). '12/15/2023' compared to '01/01/2024': '1' > '0' makes the entire comparison TRUE, incorrectly placing Dec 2023 after Jan 2024. Converting to DATE type enables correct temporal comparison.`,
`COALESCE evaluates arguments left to right and returns the first one that is not NULL. It skips the first two NULLs and returns 'default' as the first non-NULL value found.`,
`Standard SQL ROUND typically rounds .5 up (15.5 → 16, 16.5 → 17). However, some databases (notably PostgreSQL) use banker's rounding where .5 rounds to the nearest even number (16.5 → 16 because 16 is even). Behavior varies by database.`,
`DATE_TRUNC truncates a timestamp/date to the start of the specified period. Truncating to 'month' returns the first day of that month with time set to 00:00:00. March 15 becomes March 1.`,
`NULLIF(count, 0) returns NULL when count equals 0. Division by NULL produces NULL (not an error). This is the standard SQL pattern to safely handle potential division by zero without TRY/CATCH blocks.`,
`EXTRACT(DOW FROM date) in PostgreSQL returns the day of week as an integer. The numbering is 0=Sunday, 1=Monday, ..., 6=Saturday. January 1, 2024 was a Monday, so it returns 1.`,
`The || operator propagates NULL: if any operand is NULL, the entire expression is NULL. Wrapping nullable columns in COALESCE(city, '') substitutes an empty string, preventing NULL from nullifying the entire concatenated result.`,
`TRY_CAST (SQL Server) or safe_cast (BigQuery) attempt type conversion and return NULL on failure instead of throwing an error. For databases without this feature, a CASE expression with regex validation can pre-check before CAST.`,
`Simple year subtraction (2024 - 2000 = 24) doesn't account for whether the birthday has occurred in the current year. Born Dec 15, queried March 1: the birthday hasn't passed yet, so actual age is still 23. Use AGE() or compare month/day.`,
`A CASE expression without ELSE returns NULL implicitly when no condition matches. If status is 'P' and no WHEN clause handles 'P', the result is NULL. Always include ELSE for explicit handling of unexpected values.`,
`Applying a function to a column in WHERE (WHERE UPPER(email) = ...) prevents index usage because the index stores original values, not uppercased ones. The optimizer cannot match the transformed value to the index. A functional index on UPPER(email) solves this.`,
`FLOAT uses IEEE 754 binary floating-point which cannot exactly represent most decimal fractions (like 0.1). Accumulated operations compound these tiny errors. DECIMAL/NUMERIC stores values as exact decimal digits, preserving monetary precision.`,
`DATE_TRUNC('quarter', date) uses calendar quarters (Jan, Apr, Jul, Oct starts). For April-starting fiscal quarters, shift the date back 3 months to align with calendar quarters, truncate, then shift forward. This maps Aug→May(shift)→Apr(trunc)→Jul(shift back).`,

`VARCHAR stores text that can only be compared alphabetically by default. To sort by actual duration, you must parse the string (extract the numeric hour and minute parts), convert to a single numeric value (total minutes), and sort by that computed value.`,
`Native JSON types with specialized indexes (like GIN indexes for JSONB in PostgreSQL) allow the database to index individual JSON paths and values. This enables efficient filtered queries on JSON attributes without scanning every row's text content.`,

`DECIMAL precision is specified as (total_digits, decimal_places). For a ratio like 1/1,000,000,000 = 0.000000001, you need at least 9 decimal places. DECIMAL(19,18) provides 18 decimal places of precision, easily capturing such small ratios.`,
`AT TIME ZONE converts UTC timestamps to local time. After conversion, DATE_TRUNC('day', local_timestamp) gives the local date. DST rules are automatically applied when using named timezones (e.g., 'America/New_York') rather than fixed offsets.`

`Without a PRIMARY KEY, the table has no guaranteed way to uniquely identify rows. This makes targeted UPDATE/DELETE operations ambiguous, prevents foreign key references from other tables, and complicates data integrity enforcement.`,
`When ON DELETE behavior is not specified, the default is RESTRICT (or NO ACTION). This prevents deletion of the parent row if any child rows reference it, raising a foreign key violation error to protect referential integrity.`,
`Adding a NOT NULL column to a table with existing data fails because those rows would need a value in the new column. Either provide a DEFAULT value (ADD COLUMN x INT NOT NULL DEFAULT 0) or add as nullable first, backfill, then set NOT NULL.`,

`SERIAL/AUTO_INCREMENT sequences only move forward. Deleted IDs are never reclaimed or reused. After deleting ID 5 and inserting a new row, the new row gets the next sequence value (6, or higher if other inserts occurred). Gaps in IDs are normal and expected.`,
`A composite primary key enforces uniqueness on the combination of columns. The same order_id can appear in multiple rows as long as each row has a different product_id. The pair (order_id, product_id) must be unique, not each column individually.`,

`CASCADE automatically deletes all dependent rows when the parent is deleted. For a customer with 50,000 orders, one DELETE cascades through all those orders. ON DELETE RESTRICT blocks the parent deletion, requiring explicit handling of child rows first.`,
`When an index has very low selectivity (few distinct values relative to table size), using the index requires many random I/O operations to fetch the matching rows. The optimizer determines a sequential full table scan is cheaper than thousands of random index lookups.`,
`A NOT NULL constraint requires ALL existing values to be non-NULL. If 500 rows have NULL in that column, the ALTER fails with a constraint violation. First UPDATE those 500 rows to appropriate non-NULL values, then add the constraint.`,
`DECIMAL(10,2) stores numbers as exact decimal digits: 0.1 + 0.2 = 0.30 exactly. FLOAT uses binary representation where 0.1 and 0.2 cannot be represented exactly, producing tiny errors (0.30000000000000004) that compound in calculations.`,
`CREATE INDEX CONCURRENTLY builds the index in the background without holding an exclusive lock. Normal CREATE INDEX locks the table against writes for the entire build duration. CONCURRENTLY takes longer and uses more resources but allows uninterrupted read/write operations.`,
`Individual boolean columns provide: type checking (must be true/false), individual NOT NULL constraints, targeted indexes, simple WHERE clauses, and clear schema documentation. JSONB offers: flexible schema evolution (add fields without ALTER), but loses these safety guarantees.`,
`Schema-per-tenant isolation allows independent migration of each tenant's schema. Column additions to one tenant don't affect others. Feature flags combined with nullable columns provide gradual rollout. This balances shared infrastructure efficiency with migration safety.`,
`INT (4 bytes) maxes out at 2,147,483,647. Approaching this limit requires migration to BIGINT (8 bytes, max 9.2 quintillion). On a 2-billion-row table, the ALTER is a massive operation that may require online schema change tools, a new column with gradual backfill, or table rebuild during maintenance.`,

`Online schema migration tools (gh-ost, pt-online-schema-change) create a shadow table with the new schema, copy existing rows in small batches, use triggers or binlog to capture live changes during copy, and atomically rename tables when sync is complete. This avoids long-held locks on the original table.`

`When the column list is omitted from INSERT, VALUES must provide exactly one value for every column in table-definition order. With 5 columns but only 3 values, the database raises a column count mismatch error. Always specify the column list explicitly.`,
`UPDATE without WHERE applies the change to every row in the table. All employees would have salary set to 100000. This is one of the most dangerous SQL mistakes. Always include WHERE, and test with SELECT first using the same condition.`,

`When any statement in a transaction fails, most databases mark the transaction as aborted. No further commands are accepted except ROLLBACK. Both the failed INSERT and the previous successful INSERT are undone, maintaining atomicity.`,
`INSERT ... SELECT is a single set-based operation that transfers all rows from the SELECT result into the target table in one statement. This is significantly more efficient than 10,000 individual INSERT statements because it minimizes transaction overhead and round trips.`,
`ON DELETE SET NULL means when the parent (referenced) row is deleted, the foreign key column in all child rows is updated to NULL. The child rows continue to exist in the table but now have no parent reference. This requires the FK column to be nullable.`,

`MERGE matches each source row against the target using the ON condition. Without an index on the target's match column, each of the 1M source rows triggers a full scan of the 10M target rows. An index enables O(log n) lookups instead of O(n) scans per row.`,
`The UPDATE changes employees' department_id from 3 to 5. This succeeds as long as department 5 exists in the departments table (satisfying the FK from employees TO departments). The projects table references might be on a different relationship that isn't affected by this change.`,
`REPEATABLE READ provides a consistent snapshot for the duration of the transaction. Even if other transactions modify and commit changes to the same row, this transaction sees the row as it was when the transaction started. It prevents non-repeatable reads.`,
`The database's UNIQUE constraint is the ultimate guarantee at the storage level. Even if two transactions simultaneously pass application-level checks, the UNIQUE index serializes the actual row insertions. One succeeds, the other receives a unique violation error that must be handled.`,
`Non-repeatable reads (reading different values for the same row within one transaction) are prevented by REPEATABLE READ and SERIALIZABLE. Both maintain a snapshot from transaction start, ensuring consistent reads regardless of concurrent modifications.`,
`Table partitioning by date allows instant removal of entire partitions: DROP PARTITION is a metadata-only operation (like dropping a table), taking milliseconds regardless of row count. Recent data remains in its own partition completely unaffected.`,
`Auto-commit means each INSERT is a separate transaction with its own fsync to disk. Batching 100 orders in one transaction shares a single fsync across all 400 statements (100 orders × 4 inserts each), dramatically reducing disk I/O overhead.`,
`Deadlocks occur from circular lock dependencies. If all transactions always lock rows in the same order (e.g., by ascending primary key), no circular wait can form. Transaction A locks row 1 then row 2; Transaction B also locks row 1 first, then row 2, preventing the cycle.`

`A B-tree (balanced tree) maintains keys in sorted order across multiple levels. For 50M rows, the tree depth is approximately 3-4 levels, meaning any lookup requires reading only 3-4 pages from disk (O(log n)) compared to scanning all pages sequentially. This transforms a 3-second full scan into a 5ms seek.`,
`A composite index on (customer_id, status) stores both values together in the B-tree. The database can navigate to customer_id=5 AND status='shipped' in a single index operation without scanning additional rows after the customer_id filter. Two separate indexes would require intersecting results.`,
`Seq Scan means Sequential Scan - the database reads every page of the table from beginning to end. On a 20M row table this involves reading potentially gigabytes of data. This occurs when no index exists for the query's filter conditions, or when the optimizer determines an index would not be more efficient.`,
`Each of the 5 indexes is an independent B-tree data structure that must be kept in sync with the table. Every INSERT requires: 1) writing the row to the heap, 2) inserting an entry into each of the 5 index B-trees. This means 6 write operations per row instead of 1, explaining the 5x slowdown.`,
`Composite indexes follow a leftmost-prefix rule analogous to a phone book sorted by last name, then first name. You can efficiently look up by last name (customer_id) or last+first (customer_id+order_date), but not by first name alone (order_date only) because the sort order doesn't help.`,
`A partial index only contains rows matching its WHERE predicate. Since this index is WHERE status='pending', rows with status='shipped' are simply not stored in the index. The optimizer correctly determines this index cannot answer queries about shipped orders and falls back to Seq Scan.`,
`When the optimizer estimates 100 rows, it picks Nested Loop because it's efficient for small result sets (100 index lookups is cheap). But with actual 500K rows, those 500K individual index probes are far more expensive than a Hash Join that reads both tables once. The misestimate cascades into a catastrophically wrong plan.`,
`A B-tree index stores raw column values in sorted order. When you apply LOWER(), the optimizer would need to compute LOWER(email) for every index entry to compare - defeating the purpose of the index. A functional index on LOWER(email) pre-computes and stores the lowercased values for direct lookup.`,
`Index Only Scan means the index contains all columns needed by the query (a "covering" index). Without INCLUDE, the index has customer_id+order_date but the query also needs total and status, requiring a heap lookup per row. With INCLUDE(total, status), these values are stored in index leaf pages.`,
`The trade-off between read and write performance is fundamental to indexing. Before the index, INSERTs wrote only to the table heap. Now each INSERT must also: maintain B-tree sort order, potentially split pages, and update the index's internal pointers. For 1M-row batches, this overhead is substantial.`,
`The B-tree for (country, city, zip_code) is sorted first by country, then within each country by city. Without knowing the country, the database cannot navigate the tree efficiently for city alone - it would need to check every country's section. This is why WHERE city='London' alone cannot use this index.`,
`Low selectivity means the index would return a large fraction of the table. When 90% of rows match, using an index actually costs MORE than a sequential scan because: 1) random I/O per index entry is slower than sequential reads, 2) nearly every data page must be fetched anyway. The optimizer is correct to choose Seq Scan.`,
`Sort Method: external merge Disk indicates the data to sort exceeded work_mem, forcing the database to write intermediate sorted runs to disk and merge them. This is dramatically slower than an in-memory quicksort. Solutions: increase work_mem for the session, or provide an index matching the ORDER BY to eliminate sorting.`,
`GIN (Generalized Inverted Index) creates one index entry per key/element in the indexed value. A JSONB document with 50 keys means 50 separate index entries must be created, maintained, and potentially spread across multiple index pages. B-tree creates just one entry per row regardless of JSON complexity.`,
`CREATE INDEX CONCURRENTLY builds the index in multiple passes: first it scans the table and builds a preliminary index, then it handles all rows modified during the first pass. It holds only a ShareUpdateExclusiveLock (not AccessExclusiveLock), allowing concurrent INSERT/UPDATE/DELETE throughout the process.`,
`The optimizer uses table statistics (row counts, value distributions, histograms) to estimate how many rows each operation produces. Stale statistics after bulk loads or data changes cause systematic misestimates. ANALYZE collects fresh statistics, giving the optimizer accurate cardinality information to select appropriate join strategies.`,
`DATE(created_at) computes a new value from the column at query time. The B-tree index on created_at stores raw timestamp values and cannot navigate to a computed DATE value. The range condition (>= and <) works directly with the stored timestamp values, allowing the B-tree to seek to the start point and scan forward.`,
`REINDEX CONCURRENTLY (PostgreSQL 12+) builds a completely new index under a different name without blocking writes, then atomically swaps it with the old index. Alternatively, CREATE INDEX CONCURRENTLY with a new name followed by DROP INDEX CONCURRENTLY on the old one achieves the same result on older versions.`,
`B-tree indexes have a fixed page size. When rows are deleted or updated, the old index entries become dead but the page space is not immediately reclaimed. Unlike heap pages where VACUUM can mark space reusable, B-tree pages with dead entries retain their allocated size. Only REINDEX physically rebuilds and compacts the structure.`,
`The optimizer uses the PK index to produce rows in id order (satisfying ORDER BY id) and applies the status filter as a residual check per row. If only 0.1% are 'active', it must scan ~10,000 rows on average to find each matching one. A composite index on (status, id) would jump directly to active rows in id order.`

`A VIEW encapsulates a complex query (joins, filters, aggregations) behind a simple name. Instead of repeating the 10-table JOIN logic in 5 reports, each report does SELECT ... FROM the_view with its own additional filters. Schema changes to the underlying query happen in one place - the view definition.`,
`A regular (non-materialized) view is not a table - it stores only the SQL definition. Every time you query the view, the database substitutes the view's SQL and executes the full underlying query. Complex multi-table joins with 50M rows execute fresh each time, explaining the 8-second response.`,
`Materialized views store query results as physical data at REFRESH time. They are point-in-time snapshots. Any data inserted into source tables after the last refresh is invisible to the materialized view until REFRESH MATERIALIZED VIEW is explicitly executed again.`,
`Simple views (single table, no aggregates, no DISTINCT, no GROUP BY, no UNION) are updatable by default. DELETE FROM the view translates directly to DELETE on the base table with the same WHERE condition. The view acts as a transparent window to the underlying table for DML operations.`,
`By granting SELECT on a restrictive view (not the base table), the user can only query columns and rows exposed by the view's definition. The view acts as a security layer - even if the user knows the table structure, direct table access is denied while view access provides only safe, filtered data.`,
`REFRESH MATERIALIZED VIEW CONCURRENTLY computes the new result set and diffs it against the existing data, applying only the changes (inserts/deletes/updates). This requires a UNIQUE INDEX to identify matching rows. During this process, read queries continue accessing the old data without blocking.`,
`WITH CHECK OPTION creates a validation rule: any DML through the view must result in rows that still satisfy the view's WHERE clause. Setting status='shipped' would make the row no longer match WHERE status='pending', so the database rejects the modification to maintain view consistency.`,
`This hybrid approach leverages the materialized view for historical data (fast, pre-computed) and only runs the expensive base query for the current time period (small dataset, fast). UNION combines both result sets, giving the executive real-time numbers for today with instant historical context.`,
`In SQL standard, ORDER BY in a subquery or view definition is not guaranteed to persist when the view is used in an outer query. The optimizer may reorder operations for efficiency. Only the outermost ORDER BY in the final query is guaranteed to determine result ordering.`,
`CREATE OR REPLACE VIEW succeeds as long as the replacement is compatible with the view's original column names and types. However, if a column that view B references is removed from view A's new definition, view B becomes broken. The error only manifests when view B is actually queried.`,
`Concurrent refresh computes the full new result set, then uses the unique index to identify which rows are new, which are deleted, and which changed. It applies only the differential changes to the stored data. Full refresh drops all data and reinserts everything under an exclusive lock.`,
`Views expose exactly the columns listed in their SELECT clause. The view creates an abstraction boundary - columns in the underlying table that are not in the view's definition simply do not exist from the perspective of anyone querying the view. The column SSN is not queryable through the view.`,
`After view merging (inlining), the optimizer sees one unified query plan, not three separate views. The index you added might not be on the columns that matter in the merged plan's actual access pattern. You need to examine the final merged execution plan to identify the actual bottleneck.`,
`Incremental refresh maintains metadata about what changed since the last refresh (using timestamps, change data capture, or materialized view logs). Instead of recomputing 500M rows, it processes only the delta (new/changed/deleted rows since last refresh), making the refresh proportional to changes, not total size.`,
`Deep view nesting obscures data lineage: it becomes unclear which layer introduces NULLs (from LEFT JOINs, missing data, or CASE expressions). Limiting depth to 2-3 layers with clear documentation of each layer's input/output contract makes debugging tractable and testing each layer independently possible.`,
`Connection poolers maintain long-lived database sessions shared across application requests. Session-level settings like SET app.tenant_id persist across requests on the same connection. If one request sets tenant_id=A and the next request forgets to reset it, request B executes in tenant A's context - a data leak.`,
`REFRESH CONCURRENTLY requires a UNIQUE INDEX to diff old vs new results row-by-row. Without natural uniqueness, you can create a deterministic artificial key: ROW_NUMBER() OVER (ORDER BY stable_columns) generates a repeatable unique identifier, or combine enough columns to ensure uniqueness.`,
`The optimizer's plan choice for a view depends on the merged query structure. When specific filter patterns consistently produce bad plans, materialized views pre-compute the result (eliminating the optimization problem), or CTE MATERIALIZED hints create optimization barriers that prevent the optimizer from merging in problematic ways.`,
`SELECT * in view definitions dynamically resolves to all current columns at query time (in most databases). When a new column like SSN is added to the base table, the view automatically exposes it. Explicit column lists freeze the view's output structure, requiring deliberate ALTER to expose new columns.`,
`The hybrid approach queries the materialized view (cheap, pre-computed) for bulk data, then runs a small live query for just the rows inserted/updated since the last refresh timestamp. Combining both results gives near-real-time accuracy while keeping 99% of the work pre-computed.`
],

`A user-defined function encapsulates the calculation logic in one place. All 20 queries call calc_total(price, qty, discount) instead of repeating the formula. When business rules change, you update the function definition once and all queries automatically use the new logic.`,
`In PostgreSQL, functions that modify data (INSERT/UPDATE/DELETE) can technically be used in SELECT but this is often unexpected behavior. Data-modifying operations are better expressed as stored procedures called with CALL, which makes the side effects explicit and allows transaction control.`,
`A BEFORE trigger fires after the new row values are determined but before they are written to disk. By modifying NEW.updated_at, the trigger overwrites whatever value was originally specified (or not specified) in the UPDATE SET clause, ensuring updated_at always reflects the actual modification time.`,
`In PostgreSQL, an unhandled RAISE EXCEPTION causes the current transaction to enter an aborted state. All modifications made within that transaction (before the exception) are rolled back when the transaction ends. This maintains atomicity - either all changes succeed or none persist.`,
`A RETURNS TABLE function is a set-returning function (SRF). Unlike scalar functions used in SELECT list or WHERE, table functions appear in the FROM clause and return multiple rows, making them queryable like tables: SELECT * FROM get_top_customers(10) WHERE total_spent > 5000.`,
`In trigger functions, NEW represents the row being created or modified (available for INSERT and UPDATE), while OLD represents the row before modification (available for UPDATE and DELETE). For DELETE operations, there is no new row being created, so NEW is NULL - only OLD contains the deleted row's data.`,
`FOUND is a special PL/pgSQL boolean variable automatically set after certain operations. After SELECT INTO, FOUND is TRUE if a row was assigned, FALSE if the query returned no rows. This is the idiomatic way to detect "not found" conditions without relying on exception handling.`,
`IMMUTABLE tells PostgreSQL the function always returns the same output for the same input. The index pre-computes function results at index-creation and INSERT time. If you change the function's behavior, existing index entries still hold the old computed values, creating inconsistency between index lookups and actual computations.`,
`Unlike functions, stored procedures can contain transaction control statements (COMMIT/ROLLBACK). When COMMIT executes mid-procedure, it permanently saves all work in that transaction. A new implicit transaction begins for subsequent statements. Failure after COMMIT cannot undo previously committed changes.`,
`Row-by-row (cursor/loop) processing incurs overhead per iteration: PL/pgSQL context switch, individual statement planning, per-row transaction logging, and buffer management. A single set-based UPDATE lets the executor process all rows in one optimized plan with batch I/O, minimal logging overhead, and no per-row context switches.`,
`BEFORE triggers execute after NEW is populated from the statement but before the physical write occurs. The trigger function can freely modify any field in NEW. Since the trigger sets NEW.status='pending' last, this value overwrites the INSERT's original 'active' value before the row is written to disk.`,
`Trigger A fires on table A changes and modifies table B. Table B's trigger fires on changes and modifies table A. This creates a potentially infinite loop: A triggers B triggers A triggers B... Most databases have a recursion limit (e.g., 32 levels) that eventually stops this, raising an error.`,
`client_min_messages controls which severity levels of messages are sent to the client. Setting it to WARNING suppresses NOTICE-level messages. The RAISE NOTICE statements still execute (no code change needed) but their output is filtered at the protocol level before reaching the application.`,
`PL/pgSQL implements EXCEPTION blocks using subtransactions (internal savepoints). When entering a BEGIN/EXCEPTION block, PostgreSQL creates an implicit savepoint. If an error occurs, it rolls back to that savepoint (undoing only work within that block) while the outer transaction continues normally.`,
`Synchronous trigger-based audit adds latency to every write operation (the audit INSERT is part of the same transaction). Asynchronous approaches decouple audit from the write path: logical replication streams changes to a separate system, or a minimal trigger writes to a buffer table that's processed in batch by a background worker.`,
`A function called per-row executes its entire body (planning, execution, context switching) 10M times. Inlining the logic as a SQL expression lets the optimizer incorporate it into the overall query plan, processing all 10M rows in a single efficient scan. IMMUTABLE/STABLE hints enable the planner to cache results for repeated identical inputs.`,
`Triggers validate their SQL at runtime, not creation time. The trigger is created successfully regardless of whether referenced objects exist. Only when the trigger actually fires (next INSERT/UPDATE/DELETE) does the function body execute and discover the missing column. Proper migration ordering: ALTER TABLE first, then CREATE/REPLACE TRIGGER.`,
`SAVEPOINT before step 5 creates a rollback point within the transaction. If step 5 fails, ROLLBACK TO SAVEPOINT undoes only step 5's work while preserving steps 1-4. Alternatively, committing after step 4 permanently saves that work, then steps 5-8 run in a new transaction that can independently fail.`,
`500-line trigger logic is untestable in isolation (it only runs during DML events), hard to debug (no breakpoints), and invisible in version control diffs. Refactoring into a stored procedure that the trigger calls (one line: CALL process_insert(NEW)) enables unit testing the procedure directly with known inputs, independent of DML.`,
`IMMUTABLE tells PostgreSQL the function output depends only on inputs, never on database state or time. The optimizer may evaluate it once and cache the result, or pre-compute it during planning. A function calling NOW() produces time-dependent output, violating the IMMUTABLE contract. It should be STABLE (constant within a transaction) or VOLATILE (may change per call).`
],
14:[
`PIVOT transforms row-level values into columns. With SUM(CASE WHEN month='Jan' THEN revenue END) AS jan, each unique month value becomes a separate column in the output. The aggregation (SUM) handles multiple rows per group while the CASE expression routes values to the correct column.`,
`STRING_AGG (PostgreSQL/SQL Server) takes all values in a group and concatenates them with a specified delimiter. With GROUP BY department, it collects all employee names within each department into a single comma-separated string, turning N rows per group into one row with a concatenated list.`,
`GIN (Generalized Inverted Index) for JSONB decomposes each document into individual key-value pairs and indexes them separately. This enables containment queries (@>) and key-existence (?) queries to quickly locate matching documents without scanning all 5M rows, using inverted lookups from key/value to row.`,
`A temp table physically materializes intermediate results. Unlike CTEs (which may be re-evaluated each reference in some databases), a temp table stores data once and allows multiple subsequent queries to read from it. It can also be indexed for efficient joins, something CTEs cannot do.`,
`The input 'users; DROP TABLE users;--' gets concatenated into the SQL string, creating: SELECT * FROM users; DROP TABLE users;-- WHERE... The semicolons create separate statements. The database executes both: first the SELECT, then the destructive DROP TABLE. Parameterization ($1) or format(%I) prevents values from being interpreted as SQL.`,
`Temporary tables are visible only within the session (connection) that created them. Each session has its own private namespace for temp tables. Other sessions cannot see, query, or even know about another session's temp tables. This provides automatic isolation for intermediate processing.`,
`STRING_AGG processes rows in whatever physical order the executor produces them, which can vary based on execution plan, parallelism, and buffer state. Without ORDER BY inside STRING_AGG(), identical data might produce differently-ordered results across runs. Always specify ORDER BY for deterministic output.`,
`GIN indexes support operator-level queries (@> containment, ? key existence) but not arbitrary path extractions (->>). For path-based queries, you need an expression index: CREATE INDEX ON t((payload->'address'->>'city')). This indexes the specific extracted value rather than the whole document structure.`,
`ON COMMIT DROP is a temp table lifecycle option: the table exists only within the transaction that created it. When COMMIT (or ROLLBACK) executes, the table and all its data are automatically dropped. This is useful for transaction-scoped staging that should never persist beyond its intended use.`,
`format('%I', identifier) wraps the value in double-quotes, treating it as a SQL identifier. The string 'id; DROP TABLE users;--' becomes the quoted identifier "id; DROP TABLE users;--" which is interpreted as a (nonexistent) column name, not as multiple SQL statements. $1 handles value parameters safely through prepared statement binding.`,
`Dynamic SQL with dynamic pivot first queries distinct values (SELECT DISTINCT category FROM data), then programmatically generates one CASE expression per value. This means new categories appearing in the data automatically get their own column on the next execution, eliminating manual maintenance.`,
`COALESCE(json_agg(filter_result), '[]'::json) handles the edge case where the input to json_agg is empty. When no rows pass to the aggregate, json_agg returns NULL (not empty array). COALESCE substitutes the NULL with an empty JSON array, matching API expectations for "no results."`,
`DISTINCT within STRING_AGG requires the database to: collect all values for the group, sort or hash them to identify duplicates, remove duplicates, then concatenate. With 10K values per group, this sorting/hashing is expensive. Pre-filtering with a subquery or using a separate DISTINCT step before aggregation is more efficient.`,
`Temp tables lack statistics by default because no ANALYZE has been run on them. Without statistics, the query planner uses default estimates (often wrong for 50M rows), choosing suboptimal join strategies. Running CREATE INDEX + ANALYZE on temp tables gives the planner accurate information for efficient joins.`,
`format(%I) with %I specifically handles identifier injection. It double-quotes the string, meaning any embedded SQL metacharacters (semicolons, comments, quotes) become part of the quoted identifier name and cannot break out of the identifier context. It is a safe mechanism for dynamic column/table names.`,
`GIN write amplification is structural: a 50-key JSON document means 50 individual index entries must be created, potentially across 50 different index pages. Each B-tree insert is one entry per row regardless of content complexity. For write-heavy workloads with complex documents, this 50x per-row overhead is significant.`,
`Connection pools keep database sessions alive indefinitely for reuse. Temp tables live until session end. With sessions never ending (pool keeps them), temp tables accumulate indefinitely. ON COMMIT DROP ensures cleanup per transaction. Alternatively, explicit DROP TABLE in a finally/cleanup block prevents accumulation.`,
`Standard UNPIVOT requires all source columns to share the same data type since they're combined into a single output column. For mixed types, CAST to TEXT first (losing type specificity), or use LATERAL JOIN with VALUES which lets you explicitly handle each column's conversion independently while unpivoting.`,
`When SQL text varies per request, the database cannot reuse query plans (each unique text gets its own plan entry). A stable parameterized structure like WHERE (col = $1 OR $1 IS NULL) produces identical SQL text regardless of which parameters are active, enabling plan caching and reuse across all invocations.`,
`COPY uses a specialized bulk-loading protocol: it streams binary/CSV data directly into the storage layer, bypassing SQL parsing, query planning, and per-statement transaction management. Multi-row INSERT still goes through the full SQL pipeline (parse, plan, execute) for each batch statement, adding overhead that COPY avoids entirely.`
],
15:[
`Table statistics (pg_statistic) contain row counts, distinct value counts, and value distribution histograms. When these are stale (reflecting pre-load data), the optimizer's row estimate for the filter condition is wildly wrong. Running ANALYZE rebuilds these statistics from current data, enabling accurate cost estimates and proper plan selection.`,
`OFFSET N requires the database to execute the query, produce all rows up to N+LIMIT, then discard the first N. For OFFSET 100000, that means scanning and sorting 100,020 rows just to return 20. Cost grows linearly with page number. Keyset pagination (WHERE id > last_id) does a direct index seek regardless of depth.`,
`Individual INSERTs each incur: network round-trip, SQL parsing, plan creation, transaction begin, row write, WAL flush (fsync), transaction commit. Multi-row batches share one round-trip, one parse, one plan, and one commit/fsync across 1000 rows, amortizing all fixed costs. The fsync savings alone often explain the 40x difference.`,
`YEAR(created_at) transforms every stored timestamp into a year integer. The B-tree on created_at contains raw timestamp values sorted chronologically. The optimizer cannot seek through timestamps using a year integer. The range condition (>= and <) specifies actual timestamp boundaries the B-tree can navigate directly.`,
`SELECT * forces the database to read all columns from the heap (or prevents covering index usage). If an index covers the 3 needed columns, SELECT id, total, status can use an Index Only Scan. SELECT * forces a heap fetch for every row to retrieve the other 47 columns, adding random I/O per row.`,
`Partition pruning is the optimizer's ability to examine the WHERE clause and eliminate partitions whose defined ranges cannot contain matching data. With WHERE created_at > '2024-06-15', partitions for Jan-May 2024 have ranges entirely before this date, so they are excluded from the scan plan entirely.`,
`After bulk loading 5M rows, the system catalog still shows old statistics (maybe reflecting 1000 rows pre-load). The planner estimates 1000 rows for a scan that actually returns 5M, leading to catastrophically wrong plan choices (like Nested Loop instead of Hash Join). ANALYZE updates statistics to reflect the actual 5M rows.`,
`Nested Loop with inner Index Scan does one random I/O per outer row. With 500K outer rows, that is 500K random reads (each seeking to a different disk location). Hash Join reads the inner table once sequentially (one pass) and probes the hash for each outer row (memory operation). Sequential I/O + memory probes beats 500K random seeks.`,
`Partition pruning requires the WHERE condition to reference the partition key column directly in a way the optimizer can evaluate at planning time. Functions wrapping the column (WHERE YEAR(logged_at) = 2024) prevent the optimizer from comparing against partition boundaries. Use raw column range conditions.`,
`Dead tuples are rows that have been UPDATE'd or DELETE'd but not yet reclaimed by VACUUM. They still occupy disk pages. Sequential scans must read these pages (skipping dead tuples adds I/O waste), and the table is physically larger than necessary. VACUUM marks space as reusable; VACUUM FULL physically compacts the table.`,
`The N+1 pattern fires 50 individual network round-trips plus 50 separate query parses and executions. Combining into WHERE id IN (1,2,...,50) uses one round-trip, one parse, one execution, and lets the database optimize the batch lookup (potentially using a single index scan). Total overhead reduced by ~50x.`,
`PostgreSQL's shared buffer cache stores recently-accessed disk pages in memory. First execution reads pages from disk (shared read). Subsequent execution finds those same pages already in the buffer cache (shared hit), eliminating disk I/O entirely. This explains why queries are faster on second execution.`,
`A single 10M-row DELETE generates a transaction log proportional to all deleted rows (for rollback capability), holds locks on all affected rows for the entire duration, and prevents VACUUM from reclaiming any space until COMMIT. Batching in 10K-row chunks: commits frequently (short locks, bounded WAL), allows interleaved operations.`,
`A correlated subquery executes once per outer row (1M times). Each execution does a full aggregation over matching orders. Rewriting as a derived table (GROUP BY cust_id) computes MAX(date) for ALL customers in one table scan, then the JOIN matches results. This transforms O(N*M) into O(N+M) complexity.`,
`The optimizer evaluates many possible join orders using dynamic programming (considering all permutations up to join_collapse_limit). With 5 tables, there are 120 possible orders. Statistical estimation errors can make a suboptimal order appear cheaper. Hints or restructuring the query can guide the optimizer toward the efficient order.`,
`With 500 partitions, the planner must evaluate each partition's constraints against the query to determine inclusion/exclusion. This partition pruning evaluation has overhead proportional to partition count. Coarser partitioning (quarterly = 4/year instead of daily = 365/year) dramatically reduces the number of partitions the planner must evaluate.`,
`Autovacuum and regular queries compete for I/O and buffer resources. vacuum_cost_delay introduces pauses between vacuum I/O operations, reducing its throughput but also its interference with query latency. vacuum_cost_limit controls how much work vacuum does between pauses. Tuning these balances maintenance needs against query performance.`,
`Data skew means one tenant might have 50M rows while another has 100. For the 50M-row tenant, the index returns 50% of the table, making it less efficient than a sequential scan. The optimizer correctly chooses Seq Scan for large tenants. Partitioning by tenant_id gives each tenant its own physical segment, making indexes effective regardless of size.`,
`Processing 500M rows in one UPDATE holds a massive lock, generates unbounded WAL, and the transaction cannot be interrupted without losing all progress. Batching by ID range (WHERE id BETWEEN x AND x+50000) makes each transaction: short-lived (seconds), bounded WAL, allows checkpointing between batches, and enables progress tracking.`,
`Hash Join has two phases: BUILD (create hash table from one input) and PROBE (scan other input, looking up each row in hash). Building on the 1B-row table requires 1B entries in the hash table, exhausting memory and spilling to disk. Building on the 100-row table creates a tiny hash that fits in memory; probing with the 1B-row table streams through efficiently.`
]

function renderSolutions() {
    var container = document.getElementById('solutionsContent');
    if (!currentTopic) return;
    var sols = solutionData[currentTopic.id] || [];
    var html = '';
    currentTopic.practice.forEach(function(p, i) {
        var sol = sols[i] || 'Explanation coming soon...';
        html += '<div class="solution-item">' +
            '<div class="solution-header" onclick="toggleSolution(' + i + ')">' +
            '<span class="solution-num">#' + (i+1) + '</span>' +
            '<span class="solution-q">' + escHtml(p.q) + '</span>' +
            '<button class="solution-toggle" id="btn_' + i + '">Show Answer</button>' +
            '</div>' +
            '<div class="solution-body" id="sol_' + i + '">' +
            '<div style="margin-bottom:8px"><strong style="color:var(--green)">Correct Answer: ' + p.answer + '</strong></div>' +
            '<ul class="mcq-options">' +
            p.options.map(function(opt) {
                var isCorrect = opt.startsWith(p.answer + ')');
                return '<li class="mcq-option' + (isCorrect ? ' correct' : '') + '">' + escHtml(opt) + '</li>';
            }).join('') +
            '</ul>' +
            '<div class="solution-explanation">' + escHtml(sol) + '</div>' +
            '</div></div>';
    });
    container.innerHTML = html;
}

function toggleSolution(i) {
    const body = document.getElementById('sol_' + i);
    const btn = document.getElementById('btn_' + i);
    body.classList.toggle('open');
    btn.textContent = body.classList.contains('open') ? 'Hide Solution' : 'Show Solution';
}

// Initialize
renderRoadmap();
updateProgressBar();
